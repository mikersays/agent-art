<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Horizontal balance line near top -->
  <line x1="40" y1="80" x2="760" y2="80" stroke="#000000" stroke-width="3" opacity="0.8"/>
  <rect x="35" y="75" width="10" height="10" fill="#000000" opacity="0.6"/>
  <rect x="755" y="75" width="10" height="10" fill="#000000" opacity="0.6"/>

  <!-- Vertical hanging lines -->
  <line x1="120" y1="80" x2="120" y2="350" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="220" y1="80" x2="220" y2="520" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <line x1="310" y1="80" x2="310" y2="440" stroke="#000000" stroke-width="1.5" opacity="0.45"/>
  <line x1="400" y1="80" x2="400" y2="620" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="500" y1="80" x2="500" y2="380" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="580" y1="80" x2="580" y2="550" stroke="#000000" stroke-width="1" opacity="0.45"/>
  <line x1="680" y1="80" x2="680" y2="480" stroke="#000000" stroke-width="1.5" opacity="0.5"/>

  <!-- Hanging shape 1: Large red circle -->
  <circle cx="120" cy="370" r="45" fill="#E63946" opacity="0.85"/>

  <!-- Hanging shape 2: Blue square -->
  <rect x="190" y="520" width="60" height="60" fill="#1D3557" opacity="0.9"/>

  <!-- Hanging shape 3: Yellow triangle -->
  <polygon points="310,440 280,510 340,510" fill="#F4D35E" opacity="0.85"/>

  <!-- Hanging shape 4: Large forest green circle (dominant) -->
  <circle cx="400" cy="660" r="65" fill="#264653" opacity="0.8"/>
  <circle cx="400" cy="660" r="30" fill="#FEFAE0" opacity="0.5"/>

  <!-- Hanging shape 5: Small red square -->
  <rect x="485" y="380" width="30" height="30" fill="#E63946" opacity="0.7"/>

  <!-- Hanging shape 6: Blue triangle (large) -->
  <polygon points="580,550 540,650 620,650" fill="#1D3557" opacity="0.85"/>

  <!-- Hanging shape 7: Yellow circle -->
  <circle cx="680" cy="510" r="35" fill="#F4D35E" opacity="0.8"/>

  <!-- Additional small hanging elements on thinner lines -->
  <line x1="160" y1="80" x2="160" y2="230" stroke="#A89F91" stroke-width="0.5" opacity="0.3"/>
  <circle cx="160" cy="240" r="10" fill="#2A9D8F" opacity="0.6"/>

  <line x1="450" y1="80" x2="450" y2="280" stroke="#A89F91" stroke-width="0.5" opacity="0.3"/>
  <rect x="442" y="280" width="16" height="16" fill="#E76F51" opacity="0.6"/>

  <line x1="640" y1="80" x2="640" y2="320" stroke="#A89F91" stroke-width="0.5" opacity="0.3"/>
  <polygon points="640,320 630,345 650,345" fill="#264653" opacity="0.5"/>

  <line x1="80" y1="80" x2="80" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.3"/>
  <circle cx="80" cy="210" r="8" fill="#1D3557" opacity="0.5"/>

  <line x1="740" y1="80" x2="740" y2="260" stroke="#A89F91" stroke-width="0.5" opacity="0.3"/>
  <rect x="733" y="260" width="14" height="14" fill="#E63946" opacity="0.5"/>

  <!-- Ground shadow elements -->
  <ellipse cx="120" cy="750" rx="30" ry="4" fill="#000000" opacity="0.08"/>
  <ellipse cx="220" cy="750" rx="25" ry="3" fill="#000000" opacity="0.06"/>
  <ellipse cx="400" cy="760" rx="40" ry="5" fill="#000000" opacity="0.1"/>
  <ellipse cx="580" cy="755" rx="30" ry="4" fill="#000000" opacity="0.07"/>
  <ellipse cx="680" cy="750" rx="25" ry="3" fill="#000000" opacity="0.06"/>

  <!-- Subtle horizontal reference lines -->
  <line x1="60" y1="300" x2="760" y2="300" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="60" y1="500" x2="760" y2="500" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="60" y1="700" x2="760" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>

  <!-- Corner accents -->
  <rect x="30" y="30" width="8" height="8" fill="#000000" opacity="0.2"/>
  <rect x="762" y="30" width="8" height="8" fill="#000000" opacity="0.2"/>
  <circle cx="34" cy="766" r="4" fill="#E63946" opacity="0.2"/>
  <circle cx="766" cy="766" r="4" fill="#1D3557" opacity="0.2"/>
</svg>