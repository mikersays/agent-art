<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#A89F91"/>

  <!-- Origami Crane - large, center-left -->
  <!-- Body -->
  <polygon points="150,350 300,250 350,400" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <polygon points="300,250 350,400 450,320" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <polygon points="150,350 350,400 280,480" fill="#000000" stroke="#000000" stroke-width="2" opacity="0.7"/>
  <!-- Wing upper -->
  <polygon points="300,250 450,320 420,200" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <polygon points="300,250 420,200 340,170" fill="#E63946" stroke="#000000" stroke-width="1.5" opacity="0.8"/>
  <!-- Wing lower -->
  <polygon points="350,400 280,480 420,450" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <polygon points="350,400 450,320 420,450" fill="#457B9D" stroke="#000000" stroke-width="2"/>
  <!-- Tail -->
  <polygon points="150,350 100,300 130,280" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <polygon points="150,350 130,280 170,310" fill="#FFFFFF" stroke="#000000" stroke-width="1.5" opacity="0.9"/>
  <!-- Head/beak -->
  <polygon points="420,200 470,180 450,220" fill="#E63946" stroke="#000000" stroke-width="1.5"/>

  <!-- Origami Star/Shuriken - upper right -->
  <polygon points="620,100 660,160 620,140" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <polygon points="620,100 660,160 700,100" fill="#457B9D" stroke="#000000" stroke-width="2"/>
  <polygon points="700,100 660,160 700,200" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <polygon points="700,200 660,160 740,180" fill="#A8DADC" stroke="#000000" stroke-width="2"/>
  <polygon points="620,100 580,130 620,140" fill="#A8DADC" stroke="#000000" stroke-width="2"/>
  <polygon points="700,200 720,240 660,210" fill="#457B9D" stroke="#000000" stroke-width="1.5"/>
  <polygon points="620,140 660,210 700,200" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <polygon points="620,140 660,210 580,200" fill="#1D3557" stroke="#000000" stroke-width="1.5" opacity="0.8"/>

  <!-- Origami Boat - lower center -->
  <polygon points="300,620 500,620 550,680" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <polygon points="300,620 550,680 250,680" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <!-- Sail -->
  <polygon points="380,620 380,520 440,580" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <polygon points="380,620 440,580 440,620" fill="#A8DADC" stroke="#000000" stroke-width="2"/>
  <polygon points="380,520 440,580 380,560" fill="#000000" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <!-- Hull shadow -->
  <polygon points="250,680 550,680 530,710 270,710" fill="#000000" stroke="none" opacity="0.2"/>
  <!-- Water line -->
  <polygon points="200,710 600,710 580,720 220,720" fill="#457B9D" stroke="none" opacity="0.4"/>

  <!-- Origami Fox - right side -->
  <polygon points="580,400 680,350 700,430" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <polygon points="580,400 700,430 650,500" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <polygon points="700,430 650,500 740,480" fill="#F4D35E" stroke="#000000" stroke-width="2" opacity="0.8"/>
  <!-- Ears -->
  <polygon points="680,350 720,310 700,370" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <polygon points="680,350 650,300 660,360" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <!-- Face fold -->
  <polygon points="680,350 700,430 720,380" fill="#FFFFFF" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <!-- Nose -->
  <polygon points="740,480 760,470 750,490" fill="#000000" stroke="none"/>
  <!-- Eye -->
  <circle cx="710" cy="390" r="4" fill="#000000"/>

  <!-- Origami Diamond/Gem - upper left -->
  <polygon points="100,100 160,60 200,100" fill="#457B9D" stroke="#000000" stroke-width="2"/>
  <polygon points="100,100 200,100 180,160" fill="#A8DADC" stroke="#000000" stroke-width="2"/>
  <polygon points="100,100 180,160 80,150" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <polygon points="160,60 200,100 220,70" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <polygon points="80,150 180,160 140,200" fill="#457B9D" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <polygon points="180,160 200,100 230,140" fill="#A8DADC" stroke="#000000" stroke-width="1.5" opacity="0.6"/>

  <!-- Origami Butterfly - lower left -->
  <polygon points="100,550 160,500 170,560" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <polygon points="100,550 170,560 130,610" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <polygon points="170,560 160,500 220,530" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <polygon points="170,560 220,530 210,580" fill="#E63946" stroke="#000000" stroke-width="2" opacity="0.8"/>
  <polygon points="170,560 130,610 190,600" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <polygon points="170,560 210,580 190,600" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
  <!-- Antennae -->
  <line x1="170" y1="560" x2="155" y2="480" stroke="#000000" stroke-width="1.5"/>
  <line x1="170" y1="560" x2="185" y2="485" stroke="#000000" stroke-width="1.5"/>
  <circle cx="155" cy="480" r="3" fill="#000000"/>
  <circle cx="185" cy="485" r="3" fill="#000000"/>

  <!-- Fold crease lines (decorative) -->
  <line x1="300" y1="250" x2="350" y2="400" stroke="#000000" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="660" y1="160" x2="660" y2="210" stroke="#000000" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="380" y1="520" x2="440" y2="620" stroke="#000000" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Shadow underneath shapes -->
  <ellipse cx="300" cy="500" rx="120" ry="12" fill="#000000" opacity="0.1"/>
  <ellipse cx="660" cy="240" rx="60" ry="8" fill="#000000" opacity="0.1"/>
  <ellipse cx="400" cy="730" rx="140" ry="10" fill="#000000" opacity="0.1"/>
  <ellipse cx="680" cy="510" rx="70" ry="8" fill="#000000" opacity="0.1"/>

  <!-- Background paper texture squares -->
  <rect x="20" y="750" width="40" height="40" fill="#FFFFFF" opacity="0.15" transform="rotate(15 40 770)"/>
  <rect x="740" y="20" width="35" height="35" fill="#FFFFFF" opacity="0.15" transform="rotate(-10 757 37)"/>
  <rect x="500" y="700" width="30" height="30" fill="#F4D35E" opacity="0.1" transform="rotate(25 515 715)"/>
</svg>