<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle horizontal structure lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>

  <!-- Massive blue rectangle - left third, dominant shape -->
  <rect x="40" y="120" width="240" height="560" fill="#1D3557" opacity="0.92"/>

  <!-- Thin vertical accent line on blue rect -->
  <line x1="280" y1="120" x2="280" y2="680" stroke="#000000" stroke-width="2" opacity="0.6"/>
  <line x1="40" y1="680" x2="280" y2="680" stroke="#000000" stroke-width="2" opacity="0.6"/>

  <!-- Scattered shapes in right two-thirds -->
  <!-- Red circles -->
  <circle cx="420" cy="180" r="35" fill="#E63946" opacity="0.85"/>
  <circle cx="650" cy="260" r="22" fill="#E63946" opacity="0.7"/>
  <circle cx="550" cy="650" r="18" fill="#E63946" opacity="0.6"/>

  <!-- Yellow squares -->
  <rect x="480" y="350" width="55" height="55" fill="#F4D35E" opacity="0.8"/>
  <rect x="680" y="500" width="35" height="35" fill="#F4D35E" opacity="0.7"/>
  <rect x="370" y="580" width="28" height="28" fill="#F4D35E" opacity="0.65"/>

  <!-- Orange elements -->
  <circle cx="580" cy="150" r="16" fill="#E76F51" opacity="0.75"/>
  <rect x="700" y="380" width="45" height="25" fill="#E76F51" opacity="0.7"/>

  <!-- Teal elements -->
  <circle cx="450" cy="500" r="28" fill="#2A9D8F" opacity="0.7"/>
  <polygon points="620,580 650,640 590,640" fill="#2A9D8F" opacity="0.65"/>

  <!-- Small triangles -->
  <polygon points="380,300 410,260 440,300" fill="#E63946" opacity="0.6"/>
  <polygon points="720,160 740,120 760,160" fill="#F4D35E" opacity="0.55"/>
  <polygon points="500,720 530,680 560,720" fill="#E76F51" opacity="0.6"/>

  <!-- Tiny accent squares -->
  <rect x="340" y="440" width="14" height="14" fill="#000000" opacity="0.5"/>
  <rect x="620" y="420" width="14" height="14" fill="#000000" opacity="0.4"/>
  <rect x="730" y="680" width="14" height="14" fill="#1D3557" opacity="0.5"/>

  <!-- Connecting lines between elements -->
  <line x1="280" y1="400" x2="420" y2="180" stroke="#000000" stroke-width="1" opacity="0.25"/>
  <line x1="420" y1="180" x2="580" y2="150" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="580" y1="150" x2="650" y2="260" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="650" y1="260" x2="480" y2="375" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="480" y1="375" x2="450" y2="500" stroke="#000000" stroke-width="1" opacity="0.25"/>
  <line x1="450" y1="500" x2="550" y2="650" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="550" y1="650" x2="700" y2="392" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="280" y1="300" x2="380" y2="280" stroke="#E63946" stroke-width="0.8" opacity="0.3"/>
  <line x1="280" y1="580" x2="370" y2="590" stroke="#2A9D8F" stroke-width="0.8" opacity="0.3"/>

  <!-- Small dots along connecting lines -->
  <circle cx="350" cy="290" r="3" fill="#000000" opacity="0.4"/>
  <circle cx="500" cy="165" r="3" fill="#000000" opacity="0.4"/>
  <circle cx="565" cy="205" r="3" fill="#000000" opacity="0.4"/>
  <circle cx="465" cy="440" r="3" fill="#000000" opacity="0.4"/>

  <!-- Horizontal bar accent -->
  <rect x="350" y="760" width="400" height="6" fill="#1D3557" opacity="0.4"/>
  <rect x="350" y="38" width="300" height="4" fill="#E63946" opacity="0.3"/>
</svg>