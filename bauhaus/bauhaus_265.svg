<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Vertical line accents -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="1.5" opacity="0.12"/>
  <line x1="250" y1="0" x2="250" y2="800" stroke="#000000" stroke-width="1" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="2" opacity="0.15"/>
  <line x1="550" y1="0" x2="550" y2="800" stroke="#000000" stroke-width="1" opacity="0.08"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="1.5" opacity="0.12"/>

  <!-- Wave 1 - top, light blue fill above -->
  <path d="M0,120 C100,80 200,160 300,120 C400,80 500,160 600,120 C700,80 800,140 800,120 L800,0 L0,0 Z" fill="#A8DADC" opacity="0.4"/>

  <!-- Wave 2 -->
  <path d="M0,220 C80,180 180,260 300,210 C420,160 500,270 620,220 C720,180 800,240 800,220 L800,120 C700,80 600,160 500,120 C400,80 300,160 200,120 C100,80 0,140 0,120 Z" fill="#1D3557" opacity="0.6"/>

  <!-- Wave 3 -->
  <path d="M0,330 C120,280 220,370 340,310 C440,260 540,360 660,310 C740,280 800,340 800,330 L800,220 C700,180 620,260 500,220 C400,170 300,260 200,210 C100,170 0,240 0,220 Z" fill="#2A9D8F" opacity="0.65"/>

  <!-- Wave 4 -->
  <path d="M0,440 C100,390 200,470 320,420 C440,370 520,460 640,420 C730,390 800,450 800,440 L800,330 C740,280 660,360 540,310 C440,260 340,350 220,310 C120,270 0,340 0,330 Z" fill="#A8DADC" opacity="0.5"/>

  <!-- Wave 5 -->
  <path d="M0,550 C80,510 200,580 330,530 C450,490 540,570 660,530 C740,500 800,550 800,550 L800,440 C730,390 640,470 520,420 C420,370 320,460 200,420 C100,380 0,440 0,440 Z" fill="#1D3557" opacity="0.55"/>

  <!-- Wave 6 -->
  <path d="M0,660 C110,620 220,690 350,640 C460,600 560,680 680,640 C750,620 800,660 800,660 L800,550 C740,500 660,580 540,530 C440,490 330,570 200,530 C100,500 0,550 0,550 Z" fill="#2A9D8F" opacity="0.6"/>

  <!-- Wave 7 - bottom fill -->
  <path d="M0,800 L800,800 L800,660 C750,620 680,700 560,660 C450,620 350,700 220,660 C110,620 0,680 0,660 Z" fill="#1D3557" opacity="0.5"/>

  <!-- Black structural horizontal bars -->
  <rect x="0" y="115" width="800" height="3" fill="#000000" opacity="0.3"/>
  <rect x="0" y="325" width="800" height="4" fill="#000000" opacity="0.25"/>
  <rect x="0" y="545" width="800" height="3" fill="#000000" opacity="0.3"/>

  <!-- Red circles riding the waves -->
  <circle cx="150" cy="195" r="22" fill="#E63946" stroke="#000000" stroke-width="1.5" opacity="0.85"/>
  <circle cx="460" cy="290" r="18" fill="#E63946" stroke="#000000" stroke-width="1" opacity="0.75"/>
  <circle cx="700" cy="405" r="25" fill="#E63946" stroke="#000000" stroke-width="1.5" opacity="0.8"/>
  <circle cx="250" cy="510" r="20" fill="#E63946" stroke="#000000" stroke-width="1" opacity="0.7"/>
  <circle cx="580" cy="620" r="16" fill="#E63946" stroke="#000000" stroke-width="1" opacity="0.75"/>

  <!-- Yellow circles riding the waves -->
  <circle cx="350" cy="185" r="15" fill="#F4D35E" stroke="#000000" stroke-width="1" opacity="0.8"/>
  <circle cx="620" cy="195" r="12" fill="#F4D35E" stroke="#000000" stroke-width="1" opacity="0.7"/>
  <circle cx="130" cy="400" r="18" fill="#F4D35E" stroke="#000000" stroke-width="1.5" opacity="0.8"/>
  <circle cx="480" cy="520" r="14" fill="#F4D35E" stroke="#000000" stroke-width="1" opacity="0.75"/>
  <circle cx="340" cy="620" r="20" fill="#F4D35E" stroke="#000000" stroke-width="1.5" opacity="0.8"/>

  <!-- Vertical accent bars -->
  <rect x="97" y="50" width="6" height="100" fill="#000000" opacity="0.35"/>
  <rect x="397" y="150" width="6" height="80" fill="#000000" opacity="0.3"/>
  <rect x="697" y="250" width="6" height="100" fill="#000000" opacity="0.35"/>
  <rect x="247" y="400" width="6" height="70" fill="#000000" opacity="0.3"/>
  <rect x="547" y="480" width="6" height="90" fill="#000000" opacity="0.3"/>

  <!-- Corner accents -->
  <rect x="20" y="20" width="16" height="16" fill="#E63946" opacity="0.5"/>
  <rect x="764" y="20" width="16" height="16" fill="#1D3557" opacity="0.5"/>
  <circle cx="30" cy="775" r="10" fill="#F4D35E" opacity="0.4"/>
  <circle cx="770" cy="775" r="10" fill="#2A9D8F" opacity="0.4"/>

  <!-- Small teal circle accents -->
  <circle cx="50" cy="300" r="8" fill="#2A9D8F" stroke="none" opacity="0.4"/>
  <circle cx="750" cy="550" r="8" fill="#2A9D8F" stroke="none" opacity="0.4"/>
</svg>