<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFF"/>
  <defs>
    <clipPath id="canvas">
      <rect x="0" y="0" width="800" height="800"/>
    </clipPath>
  </defs>
  <g clip-path="url(#canvas)">
    <!-- Horizontal strips (under) - Row 1 -->
    <rect x="0" y="0" width="160" height="50" fill="#E63946"/>
    <rect x="160" y="0" width="160" height="50" fill="#1D3557"/>
    <rect x="320" y="0" width="160" height="50" fill="#E63946"/>
    <rect x="480" y="0" width="160" height="50" fill="#1D3557"/>
    <rect x="640" y="0" width="160" height="50" fill="#E63946"/>
    <!-- Vertical strips over row 1 -->
    <rect x="80" y="0" width="50" height="100" fill="#F4D35E"/>
    <rect x="240" y="0" width="50" height="100" fill="#2A9D8F"/>
    <rect x="400" y="0" width="50" height="100" fill="#F4D35E"/>
    <rect x="560" y="0" width="50" height="100" fill="#2A9D8F"/>
    <rect x="720" y="0" width="50" height="100" fill="#F4D35E"/>
    <!-- Horizontal strips - Row 2 -->
    <rect x="0" y="100" width="160" height="50" fill="#457B9D"/>
