    <!-- Horizontal strips - Row 4 -->
    <rect x="0" y="300" width="160" height="50" fill="#457B9D"/>
    <rect x="160" y="300" width="160" height="50" fill="#E76F51"/>
    <rect x="320" y="300" width="160" height="50" fill="#457B9D"/>
    <rect x="480" y="300" width="160" height="50" fill="#E76F51"/>
    <rect x="640" y="300" width="160" height="50" fill="#457B9D"/>
