    <rect x="640" y="50" width="50" height="100" fill="#000"/>
    <!-- Horizontal strips - Row 3 -->
    <rect x="0" y="200" width="160" height="50" fill="#E63946"/>
    <rect x="160" y="200" width="160" height="50" fill="#1D3557"/>
