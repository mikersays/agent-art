    <line x1="0" y1="250" x2="800" y2="250" stroke="#000" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#000" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="450" x2="800" y2="450" stroke="#000" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="550" x2="800" y2="550" stroke="#000" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="650" x2="800" y2="650" stroke="#000" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="750" x2="800" y2="750" stroke="#000" stroke-width="1" opacity="0.2"/>
