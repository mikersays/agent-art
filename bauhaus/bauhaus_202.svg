    <rect x="0" y="450" width="50" height="100" fill="#000"/>
    <rect x="160" y="450" width="50" height="100" fill="#E63946"/>
    <rect x="320" y="450" width="50" height="100" fill="#000"/>
    <rect x="480" y="450" width="50" height="100" fill="#E63946"/>
    <rect x="640" y="450" width="50" height="100" fill="#000"/>
    <!-- Horizontal strips - Row 7 -->
    <rect x="0" y="600" width="160" height="50" fill="#E63946"/>
    <rect x="160" y="600" width="160" height="50" fill="#1D3557"/>
    <rect x="320" y="600" width="160" height="50" fill="#E63946"/>
    <rect x="480" y="600" width="160" height="50" fill="#1D3557"/>
