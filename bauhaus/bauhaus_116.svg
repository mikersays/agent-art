<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#1D3557"/>
  <!-- Mask outer shape -->
  <ellipse cx="400" cy="370" rx="220" ry="280" fill="#F4D35E"/>
  <!-- Mask inner cutout bottom -->
  <ellipse cx="400" cy="520" rx="140" ry="100" fill="#1D3557"/>
  <!-- Left eye hole -->
  <ellipse cx="310" cy="320" rx="55" ry="40" fill="#000"/>
  <ellipse cx="310" cy="320" rx="35" ry="25" fill="#FFF"/>
  <!-- Right eye hole -->
  <ellipse cx="490" cy="320" rx="55" ry="40" fill="#000"/>
  <ellipse cx="490" cy="320" rx="35" ry="25" fill="#FFF"/>
  <!-- Nose triangle -->
  <polygon points="400,350 380,410 420,410" fill="#E63946"/>
  <!-- Forehead decorative triangles -->
  <polygon points="400,120 370,180 430,180" fill="#E63946"/>
  <polygon points="330,160 310,210 350,210" fill="#2A9D8F"/>
  <polygon points="470,160 450,210 490,210" fill="#2A9D8F"/>
  <polygon points="400,190 380,230 420,230" fill="#E76F51"/>
  <!-- Cheek decorations -->
  <circle cx="260" cy="400" r="20" fill="#E76F51"/>
  <circle cx="540" cy="400" r="20" fill="#E76F51"/>
  <circle cx="240" cy="360" r="12" fill="#FFF"/>
  <circle cx="560" cy="360" r="12" fill="#FFF"/>
  <!-- Brow lines -->
  <rect x="250" y="270" width="120" height="8" rx="4" fill="#000"/>
  <rect x="430" y="270" width="120" height="8" rx="4" fill="#000"/>
  <!-- Crown decorative circles -->
  <circle cx="400" cy="100" r="18" fill="#E63946"/>
  <circle cx="350" cy="115" r="12" fill="#FFF"/>
  <circle cx="450" cy="115" r="12" fill="#FFF"/>
  <!-- Side decorative elements -->
  <polygon points="200,300 180,350 220,350" fill="#457B9D"/>
  <polygon points="600,300 580,350 620,350" fill="#457B9D"/>
  <!-- Mouth area -->
  <rect x="365" y="440" width="70" height="10" rx="5" fill="#E63946"/>
  <!-- Bottom decorative row -->
  <circle cx="340" cy="480" r="8" fill="#2A9D8F"/>
  <circle cx="370" cy="490" r="8" fill="#E76F51"/>
  <circle cx="400" cy="495" r="8" fill="#F4D35E"/>
  <circle cx="430" cy="490" r="8" fill="#E76F51"/>
  <circle cx="460" cy="480" r="8" fill="#2A9D8F"/>
  <!-- Frame corners -->
  <rect x="20" y="20" width="60" height="8" fill="#F4D35E"/>
  <rect x="20" y="20" width="8" height="60" fill="#F4D35E"/>
  <rect x="720" y="20" width="60" height="8" fill="#F4D35E"/>
  <rect x="772" y="20" width="8" height="60" fill="#F4D35E"/>
  <rect x="20" y="772" width="60" height="8" fill="#F4D35E"/>
  <rect x="20" y="720" width="8" height="60" fill="#F4D35E"/>
  <rect x="720" y="772" width="60" height="8" fill="#F4D35E"/>
  <rect x="772" y="720" width="8" height="60" fill="#F4D35E"/>
</svg>