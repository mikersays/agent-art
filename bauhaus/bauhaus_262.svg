<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Warm gray background panel -->
  <rect x="40" y="40" width="720" height="720" fill="#A89F91" opacity="0.3"/>

  <!-- Suspension bar at top -->
  <rect x="60" y="60" width="680" height="6" fill="#000000" opacity="0.9"/>

  <!-- Hanging lines -->
  <line x1="120" y1="66" x2="120" y2="220" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="250" y1="66" x2="250" y2="380" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <line x1="370" y1="66" x2="370" y2="170" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="480" y1="66" x2="480" y2="450" stroke="#000000" stroke-width="1" opacity="0.65"/>
  <line x1="580" y1="66" x2="580" y2="300" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="670" y1="66" x2="670" y2="520" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <line x1="180" y1="66" x2="180" y2="550" stroke="#000000" stroke-width="0.8" opacity="0.5"/>
  <line x1="430" y1="66" x2="430" y2="280" stroke="#000000" stroke-width="1" opacity="0.6"/>

  <!-- Suspended circle - large blue -->
  <circle cx="120" cy="260" r="40" fill="#1D3557" stroke="#000000" stroke-width="1.5" opacity="0.85"/>

  <!-- Suspended triangle - red -->
  <polygon points="250,380 220,440 280,440" fill="#E63946" stroke="#000000" stroke-width="1.5" opacity="0.8"/>

  <!-- Suspended rectangle - yellow -->
  <rect x="345" y="170" width="50" height="80" fill="#F4D35E" stroke="#000000" stroke-width="1.5" opacity="0.85"/>

  <!-- Suspended large circle - red -->
  <circle cx="480" cy="510" r="55" fill="#E63946" stroke="#000000" stroke-width="2" opacity="0.75"/>
  <!-- Yellow highlight inside -->
  <circle cx="480" cy="500" r="20" fill="#F4D35E" stroke="none" opacity="0.6"/>

  <!-- Suspended rectangle - blue -->
  <rect x="555" y="300" width="50" height="120" fill="#1D3557" stroke="#000000" stroke-width="1.5" opacity="0.8"/>

  <!-- Suspended small circle - yellow -->
  <circle cx="670" cy="555" r="30" fill="#F4D35E" stroke="#000000" stroke-width="1.5" opacity="0.85"/>

  <!-- Suspended triangle - blue, small -->
  <polygon points="180,550 160,600 200,600" fill="#1D3557" stroke="#000000" stroke-width="1" opacity="0.7"/>

  <!-- Suspended diamond - teal -->
  <polygon points="430,280 455,320 430,360 405,320" fill="#2A9D8F" stroke="#000000" stroke-width="1.5" opacity="0.75"/>

  <!-- Additional dangling elements for depth -->
  <!-- Small red circle high up -->
  <line x1="320" y1="66" x2="320" y2="130" stroke="#000000" stroke-width="0.8" opacity="0.5"/>
  <circle cx="320" cy="145" r="15" fill="#E63946" stroke="#000000" stroke-width="1" opacity="0.65"/>

  <!-- Small blue rectangle low -->
  <line x1="710" y1="66" x2="710" y2="350" stroke="#000000" stroke-width="0.8" opacity="0.5"/>
  <rect x="695" y="350" width="30" height="50" fill="#457B9D" stroke="#000000" stroke-width="1" opacity="0.7"/>

  <!-- Extra thin line with small yellow square -->
  <line x1="90" y1="66" x2="90" y2="430" stroke="#000000" stroke-width="0.5" opacity="0.4"/>
  <rect x="78" y="430" width="24" height="24" fill="#F4D35E" stroke="#000000" stroke-width="1" opacity="0.6"/>

  <!-- Horizontal accent line -->
  <line x1="60" y1="680" x2="740" y2="680" stroke="#000000" stroke-width="2" opacity="0.15"/>
  <line x1="60" y1="700" x2="740" y2="700" stroke="#1D3557" stroke-width="1" opacity="0.1"/>

  <!-- Shadow ellipses on ground -->
  <ellipse cx="120" cy="700" rx="35" ry="6" fill="#000000" opacity="0.08"/>
  <ellipse cx="250" cy="700" rx="28" ry="5" fill="#000000" opacity="0.08"/>
  <ellipse cx="480" cy="700" rx="50" ry="7" fill="#000000" opacity="0.1"/>
  <ellipse cx="580" cy="700" rx="25" ry="5" fill="#000000" opacity="0.08"/>
  <ellipse cx="670" cy="700" rx="30" ry="5" fill="#000000" opacity="0.08"/>

  <!-- Corner accents -->
  <rect x="60" y="60" width="12" height="12" fill="#E63946" opacity="0.5"/>
  <rect x="728" y="60" width="12" height="12" fill="#1D3557" opacity="0.5"/>
  <circle cx="72" cy="728" r="8" fill="#F4D35E" opacity="0.4"/>
  <circle cx="728" cy="728" r="8" fill="#2A9D8F" opacity="0.4"/>

  <!-- Subtle diagonal accent -->
  <line x1="650" y1="150" x2="720" y2="220" stroke="#E63946" stroke-width="1" opacity="0.2"/>
  <line x1="80" y1="650" x2="150" y2="580" stroke="#1D3557" stroke-width="1" opacity="0.2"/>
</svg>