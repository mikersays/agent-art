<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>
  <!-- Chessboard Warp - base grid with displaced/rotated/missing squares -->
  <!-- Row 0 -->
  <rect x="100" y="100" width="100" height="100" fill="#000000" opacity="0.85"/>
  <rect x="300" y="100" width="100" height="100" fill="#000000" opacity="0.85"/>
  <rect x="500" y="100" width="100" height="100" fill="#E63946" opacity="0.7"/>
  <!-- Row 1 -->
  <rect x="200" y="200" width="100" height="100" fill="#000000" opacity="0.85"/>
  <rect x="400" y="200" width="100" height="100" fill="#1D3557" opacity="0.75"/>
  <rect x="600" y="200" width="100" height="100" fill="#000000" opacity="0.85"/>
  <!-- Row 2 -->
  <rect x="100" y="300" width="100" height="100" fill="#F4D35E" opacity="0.7"/>
  <rect x="300" y="300" width="100" height="100" fill="#000000" opacity="0.85"/>
  <rect x="500" y="300" width="100" height="100" fill="#000000" opacity="0.85"/>
  <!-- Row 3 -->
  <rect x="200" y="400" width="100" height="100" fill="#000000" opacity="0.85"/>
  <rect x="400" y="400" width="100" height="100" fill="#000000" opacity="0.85"/>
  <rect x="600" y="400" width="100" height="100" fill="#E63946" opacity="0.65"/>
  <!-- Row 4 -->
  <rect x="100" y="500" width="100" height="100" fill="#000000" opacity="0.85"/>
  <rect x="300" y="500" width="100" height="100" fill="#1D3557" opacity="0.7"/>
  <rect x="500" y="500" width="100" height="100" fill="#F4D35E" opacity="0.6"/>
  <!-- Row 5 -->
  <rect x="200" y="600" width="100" height="100" fill="#000000" opacity="0.85"/>
  <rect x="600" y="600" width="100" height="100" fill="#000000" opacity="0.85"/>
  <!-- Displaced/rotated squares -->
  <rect x="105" y="205" width="90" height="90" fill="#A89F91" opacity="0.5" transform="rotate(8, 150, 250)"/>
  <rect x="510" y="405" width="90" height="90" fill="#F4D35E" opacity="0.5" transform="rotate(-12, 555, 450)"/>
  <rect x="405" y="305" width="85" height="85" fill="#2A9D8F" opacity="0.45" transform="rotate(15, 448, 348)"/>
  <rect x="205" y="505" width="80" height="80" fill="#E76F51" opacity="0.4" transform="rotate(-6, 245, 545)"/>
  <rect x="610" y="105" width="85" height="85" fill="#000000" opacity="0.3" transform="rotate(20, 653, 148)"/>
  <!-- Circles overlapping grid intersections -->
  <circle cx="200" cy="200" r="25" fill="#E63946" opacity="0.5"/>
  <circle cx="400" cy="400" r="30" fill="#F4D35E" opacity="0.45"/>
  <circle cx="600" cy="200" r="20" fill="#1D3557" opacity="0.5"/>
  <circle cx="300" cy="500" r="22" fill="#E76F51" opacity="0.5"/>
  <circle cx="500" cy="300" r="28" fill="#2A9D8F" opacity="0.4"/>
  <circle cx="200" cy="600" r="18" fill="#F4D35E" opacity="0.55"/>
  <circle cx="600" cy="600" r="24" fill="#E63946" opacity="0.4"/>
  <circle cx="400" cy="200" r="15" fill="#FFFFFF" opacity="0.6" stroke="#000000" stroke-width="1"/>
  <circle cx="300" cy="300" r="20" fill="#000000" opacity="0.3"/>
  <!-- Subtle grid lines showing distortion -->
  <line x1="100" y1="100" x2="700" y2="100" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="100" y1="200" x2="700" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="100" y1="300" x2="700" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="100" y1="400" x2="700" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="100" y1="500" x2="700" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="100" y1="600" x2="700" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="100" y1="700" x2="700" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="100" y1="100" x2="100" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="200" y1="100" x2="200" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="300" y1="100" x2="300" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="400" y1="100" x2="400" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="500" y1="100" x2="500" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="600" y1="100" x2="600" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="700" y1="100" x2="700" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <!-- Corner accents -->
  <rect x="30" y="30" width="40" height="40" fill="#1D3557" opacity="0.3"/>
  <rect x="730" y="730" width="40" height="40" fill="#E63946" opacity="0.3"/>
</svg>