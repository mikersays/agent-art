<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Radiating lines from bottom-center (400, 750) -->
  <line x1="400" y1="750" x2="50" y2="50" stroke="#E63946" stroke-width="2"/>
  <line x1="400" y1="750" x2="120" y2="30" stroke="#1D3557" stroke-width="3"/>
  <line x1="400" y1="750" x2="180" y2="20" stroke="#F4D35E" stroke-width="1.5"/>
  <line x1="400" y1="750" x2="240" y2="15" stroke="#000000" stroke-width="4"/>
  <line x1="400" y1="750" x2="300" y2="10" stroke="#2A9D8F" stroke-width="2"/>
  <line x1="400" y1="750" x2="350" y2="5" stroke="#E63946" stroke-width="1"/>
  <line x1="400" y1="750" x2="400" y2="5" stroke="#1D3557" stroke-width="3"/>
  <line x1="400" y1="750" x2="450" y2="5" stroke="#F4D35E" stroke-width="2"/>
  <line x1="400" y1="750" x2="500" y2="10" stroke="#000000" stroke-width="1.5"/>
  <line x1="400" y1="750" x2="560" y2="15" stroke="#2A9D8F" stroke-width="4"/>
  <line x1="400" y1="750" x2="620" y2="20" stroke="#E63946" stroke-width="2"/>
  <line x1="400" y1="750" x2="680" y2="30" stroke="#1D3557" stroke-width="3"/>
  <line x1="400" y1="750" x2="750" y2="50" stroke="#F4D35E" stroke-width="1"/>
  <line x1="400" y1="750" x2="150" y2="80" stroke="#000000" stroke-width="2.5"/>
  <line x1="400" y1="750" x2="650" y2="80" stroke="#2A9D8F" stroke-width="2.5"/>
  <line x1="400" y1="750" x2="80" y2="120" stroke="#E63946" stroke-width="1.5"/>
  <line x1="400" y1="750" x2="720" y2="120" stroke="#1D3557" stroke-width="3.5"/>
  <line x1="400" y1="750" x2="270" y2="40" stroke="#F4D35E" stroke-width="2"/>
  <line x1="400" y1="750" x2="530" y2="40" stroke="#000000" stroke-width="1"/>
  <line x1="400" y1="750" x2="30" y2="200" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="400" y1="750" x2="770" y2="200" stroke="#E63946" stroke-width="2"/>
  <!-- Triangular wedge shapes between rays -->
  <polygon points="400,750 180,20 240,15" fill="#E76F51" opacity="0.3"/>
  <polygon points="400,750 350,5 450,5" fill="#E9C46A" opacity="0.3"/>
  <polygon points="400,750 500,10 560,15" fill="#E76F51" opacity="0.3"/>
  <polygon points="400,750 120,30 180,20" fill="#E9C46A" opacity="0.3"/>
  <polygon points="400,750 620,20 680,30" fill="#E76F51" opacity="0.3"/>
  <polygon points="400,750 300,10 350,5" fill="#E9C46A" opacity="0.3"/>
  <polygon points="400,750 50,50 120,30" fill="#E76F51" opacity="0.3"/>
  <!-- Forest-colored horizon bar at top -->
  <rect x="100" y="40" width="600" height="80" fill="#264653"/>
  <!-- Scattered burgundy circles in upper area -->
  <circle cx="150" cy="160" r="8" fill="#6D2E46"/>
  <circle cx="320" cy="180" r="6" fill="#6D2E46"/>
  <circle cx="500" cy="150" r="10" fill="#6D2E46"/>
  <circle cx="650" cy="170" r="7" fill="#6D2E46"/>
  <circle cx="230" cy="200" r="5" fill="#6D2E46"/>
  <circle cx="580" cy="195" r="9" fill="#6D2E46"/>
  <circle cx="400" cy="145" r="6" fill="#6D2E46"/>
  <circle cx="710" cy="210" r="5" fill="#6D2E46"/>
  <circle cx="90" cy="220" r="7" fill="#6D2E46"/>
  <circle cx="440" cy="230" r="4" fill="#6D2E46"/>
</svg>