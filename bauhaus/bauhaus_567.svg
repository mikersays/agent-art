<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Background grid -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.12"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="100" y1="0" x2="100" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.12"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>

  <!-- Red pole (left) -->
  <circle cx="160" cy="400" r="80" fill="#E63946" opacity="0.85"/>
  <circle cx="160" cy="400" r="55" fill="#E63946" opacity="0.5"/>
  <circle cx="160" cy="400" r="30" fill="#FFFFFF" opacity="0.3"/>

  <!-- Blue pole (right) -->
  <circle cx="640" cy="400" r="80" fill="#1D3557" opacity="0.85"/>
  <circle cx="640" cy="400" r="55" fill="#1D3557" opacity="0.5"/>
  <circle cx="640" cy="400" r="30" fill="#FFFFFF" opacity="0.2"/>

  <!-- Field lines - top set -->
  <path d="M 200 360 Q 400 80 600 360" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <path d="M 210 340 Q 400 120 590 340" fill="none" stroke="#457B9D" stroke-width="1.2" opacity="0.45"/>
  <path d="M 215 320 Q 400 150 585 320" fill="none" stroke="#000000" stroke-width="1" opacity="0.35"/>
  <path d="M 220 300 Q 400 180 580 300" fill="none" stroke="#457B9D" stroke-width="0.8" opacity="0.3"/>

  <!-- Field lines - middle set -->
  <path d="M 240 400 Q 400 320 560 400" fill="none" stroke="#000000" stroke-width="1.8" opacity="0.3"/>
  <path d="M 240 400 Q 400 480 560 400" fill="none" stroke="#000000" stroke-width="1.8" opacity="0.3"/>

  <!-- Field lines - bottom set -->
  <path d="M 200 440 Q 400 720 600 440" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <path d="M 210 460 Q 400 680 590 460" fill="none" stroke="#457B9D" stroke-width="1.2" opacity="0.45"/>
  <path d="M 215 480 Q 400 650 585 480" fill="none" stroke="#000000" stroke-width="1" opacity="0.35"/>
  <path d="M 220 500 Q 400 620 580 500" fill="none" stroke="#457B9D" stroke-width="0.8" opacity="0.3"/>

  <!-- Outer field lines wrapping around -->
  <path d="M 160 310 Q 50 400 160 490" fill="none" stroke="#E63946" stroke-width="1.2" opacity="0.4"/>
  <path d="M 160 280 Q 20 400 160 520" fill="none" stroke="#E63946" stroke-width="1" opacity="0.3"/>
  <path d="M 640 310 Q 750 400 640 490" fill="none" stroke="#1D3557" stroke-width="1.2" opacity="0.4"/>
  <path d="M 640 280 Q 780 400 640 520" fill="none" stroke="#1D3557" stroke-width="1" opacity="0.3"/>

  <!-- Small shapes scattered along field lines -->
  <circle cx="300" cy="200" r="5" fill="#F4D35E"/>
  <circle cx="500" cy="200" r="5" fill="#F4D35E"/>
  <rect x="395" y="145" width="10" height="10" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="350" cy="260" r="4" fill="#E76F51" opacity="0.7"/>
  <circle cx="450" cy="260" r="4" fill="#E76F51" opacity="0.7"/>
  <rect x="297" y="540" width="8" height="8" fill="#F4D35E" opacity="0.8"/>
  <rect x="495" y="540" width="8" height="8" fill="#F4D35E" opacity="0.8"/>
  <circle cx="350" cy="580" r="4" fill="#E76F51" opacity="0.7"/>
  <circle cx="450" cy="580" r="4" fill="#E76F51" opacity="0.7"/>
  <circle cx="400" cy="640" r="5" fill="#2A9D8F"/>
  <circle cx="400" cy="160" r="5" fill="#2A9D8F"/>

  <!-- Small diamond shapes along center line -->
  <polygon points="400,350 408,360 400,370 392,360" fill="#F4D35E" opacity="0.7"/>
  <polygon points="400,430 408,440 400,450 392,440" fill="#F4D35E" opacity="0.7"/>

  <!-- Corner accents -->
  <rect x="15" y="15" width="20" height="20" fill="#E63946" opacity="0.4"/>
  <rect x="765" y="15" width="20" height="20" fill="#1D3557" opacity="0.4"/>
  <rect x="15" y="765" width="20" height="20" fill="#1D3557" opacity="0.4"/>
  <rect x="765" y="765" width="20" height="20" fill="#E63946" opacity="0.4"/>
</svg>