<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <!-- Large blue block - original position outline -->
  <rect x="100" y="150" width="350" height="300" fill="none" stroke="#1D3557" stroke-width="1" opacity="0.15" stroke-dasharray="8,4"/>
  <!-- Large blue block - shifted -->
  <rect x="130" y="180" width="350" height="300" fill="#1D3557" opacity="0.85"/>
  <!-- Red block that "slid" away -->
  <rect x="520" y="320" width="200" height="180" fill="#E63946" opacity="0.85"/>
  <!-- Displacement gap area -->
  <rect x="480" y="180" width="40" height="300" fill="#2A9D8F" opacity="0.4"/>
  <rect x="130" y="480" width="350" height="30" fill="#2A9D8F" opacity="0.3"/>
  <!-- Yellow triangles in gaps -->
  <polygon points="480,180 520,180 480,240" fill="#F4D35E" opacity="0.85"/>
  <polygon points="480,380 520,320 520,380" fill="#F4D35E" opacity="0.8"/>
  <polygon points="480,440 520,480 480,480" fill="#F4D35E" opacity="0.7"/>
  <polygon points="350,480 400,510 300,510" fill="#F4D35E" opacity="0.65"/>
  <!-- Displacement vector lines -->
  <line x1="450" y1="300" x2="520" y2="320" stroke="#000000" stroke-width="2.5" opacity="0.8"/>
  <line x1="450" y1="300" x2="520" y2="300" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <line x1="520" y1="300" x2="520" y2="320" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <!-- Arrow head -->
  <polygon points="520,320 510,308 525,312" fill="#000000" opacity="0.8"/>
  <!-- More displacement vectors -->
  <line x1="300" y1="450" x2="340" y2="490" stroke="#000000" stroke-width="2" opacity="0.6"/>
  <polygon points="340,490 328,482 336,478" fill="#000000" opacity="0.6"/>
  <line x1="200" y1="300" x2="230" y2="330" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Teal crack fills -->
  <rect x="280" y="340" width="4" height="140" fill="#2A9D8F" opacity="0.6"/>
  <rect x="180" y="280" width="3" height="100" fill="#2A9D8F" opacity="0.5"/>
  <polygon points="460,200 465,350 455,350" fill="#2A9D8F" opacity="0.5"/>
  <!-- Secondary shifted block -->
  <rect x="560" y="550" width="160" height="120" fill="#264653" opacity="0.7"/>
  <rect x="540" y="530" width="160" height="120" fill="none" stroke="#264653" stroke-width="1" opacity="0.2" stroke-dasharray="6,3"/>
  <!-- Small displaced fragments -->
  <rect x="150" y="540" width="60" height="40" fill="#457B9D" opacity="0.6"/>
  <rect x="140" y="530" width="60" height="40" fill="none" stroke="#457B9D" stroke-width="0.5" opacity="0.2" stroke-dasharray="4,2"/>
  <!-- Stress lines -->
  <line x1="480" y1="180" x2="520" y2="150" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="480" y1="220" x2="510" y2="200" stroke="#000000" stroke-width="0.8" opacity="0.25"/>
  <line x1="480" y1="300" x2="505" y2="285" stroke="#000000" stroke-width="0.8" opacity="0.25"/>
  <!-- Orange accent fragments -->
  <rect x="530" y="290" width="25" height="25" fill="#E76F51" opacity="0.6"/>
  <rect x="720" y="320" width="30" height="15" fill="#E76F51" opacity="0.5"/>
  <!-- Scattered debris shapes -->
  <rect x="620" y="220" width="12" height="12" fill="#1D3557" opacity="0.3" transform="rotate(15 626 226)"/>
  <rect x="680" y="260" width="8" height="8" fill="#E63946" opacity="0.25" transform="rotate(-10 684 264)"/>
  <circle cx="590" cy="270" r="4" fill="#000000" opacity="0.3"/>
  <circle cx="650" cy="180" r="3" fill="#F4D35E" opacity="0.4"/>
  <!-- Bottom tectonic layer -->
  <rect x="60" y="660" width="680" height="8" fill="#000000" opacity="0.15"/>
  <rect x="80" y="680" width="640" height="4" fill="#A89F91" opacity="0.2"/>
  <!-- Corner accents -->
  <rect x="20" y="20" width="14" height="14" fill="#E63946" opacity="0.3"/>
  <rect x="766" y="766" width="14" height="14" fill="#1D3557" opacity="0.3"/>
</svg>