<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFF"/>
  <!-- Stacking Rings - Child's ring stacker toy -->
  <!-- Shadow under base -->
  <ellipse cx="420" cy="720" rx="180" ry="25" fill="#000" opacity="0.1"/>
  <!-- Base platform -->
  <ellipse cx="400" cy="700" rx="170" ry="30" fill="#A89F91"/>
  <ellipse cx="400" cy="695" rx="170" ry="30" fill="#E9C46A"/>
  <rect x="380" y="690" width="40" height="10" fill="#E9C46A"/>
  <!-- Central tapered post -->
  <polygon points="390,200 410,200 415,690 385,690" fill="#A89F91"/>
  <line x1="390" y1="200" x2="410" y2="200" stroke="#000" stroke-width="1"/>
  <!-- Post top knob -->
  <circle cx="400" cy="195" r="18" fill="#E63946"/>
  <circle cx="400" cy="195" r="10" fill="#E63946" stroke="#000" stroke-width="1"/>
  <!-- Ring 1 (bottom, largest) - Red -->
  <ellipse cx="400" cy="665" rx="140" ry="22" fill="#E63946"/>
  <rect x="260" y="630" width="280" height="35" rx="5" fill="#E63946"/>
  <ellipse cx="400" cy="630" rx="140" ry="22" fill="#E63946" stroke="#000" stroke-width="1.5"/>
  <!-- Ring 2 - Blue -->
  <ellipse cx="400" cy="600" rx="125" ry="20" fill="#1D3557"/>
  <rect x="275" y="568" width="250" height="32" rx="5" fill="#1D3557"/>
  <ellipse cx="400" cy="568" rx="125" ry="20" fill="#1D3557" stroke="#000" stroke-width="1.5"/>
  <!-- Ring 3 - Yellow -->
  <ellipse cx="400" cy="540" rx="110" ry="18" fill="#F4D35E"/>
  <rect x="290" y="510" width="220" height="30" rx="5" fill="#F4D35E"/>
  <ellipse cx="400" cy="510" rx="110" ry="18" fill="#F4D35E" stroke="#000" stroke-width="1.5"/>
  <!-- Ring 4 - Forest -->
  <ellipse cx="400" cy="482" rx="95" ry="16" fill="#264653"/>
  <rect x="305" y="455" width="190" height="27" rx="5" fill="#264653"/>
  <ellipse cx="400" cy="455" rx="95" ry="16" fill="#264653" stroke="#000" stroke-width="1.5"/>
  <!-- Ring 5 - Coral/Gold -->
  <ellipse cx="400" cy="430" rx="80" ry="14" fill="#E9C46A"/>
  <rect x="320" y="405" width="160" height="25" rx="5" fill="#E9C46A"/>
  <ellipse cx="400" cy="405" rx="80" ry="14" fill="#E9C46A" stroke="#000" stroke-width="1.5"/>
  <!-- Ring 6 - Warm gray -->
  <ellipse cx="400" cy="382" rx="65" ry="12" fill="#A89F91"/>
  <rect x="335" y="360" width="130" height="22" rx="4" fill="#A89F91"/>
  <ellipse cx="400" cy="360" rx="65" ry="12" fill="#A89F91" stroke="#000" stroke-width="1.5"/>
  <!-- Ring 7 (top, smallest) - Red again -->
  <ellipse cx="400" cy="338" rx="50" ry="10" fill="#E63946"/>
  <rect x="350" y="320" width="100" height="18" rx="4" fill="#E63946"/>
  <ellipse cx="400" cy="320" rx="50" ry="10" fill="#E63946" stroke="#000" stroke-width="1.5"/>
  <!-- Highlight stripes on rings for Bauhaus graphic feel -->
  <line x1="290" y1="648" x2="510" y2="648" stroke="#FFF" stroke-width="1.5" opacity="0.3"/>
  <line x1="305" y1="585" x2="495" y2="585" stroke="#FFF" stroke-width="1.5" opacity="0.3"/>
  <line x1="315" y1="525" x2="485" y2="525" stroke="#FFF" stroke-width="1.5" opacity="0.3"/>
  <line x1="325" y1="468" x2="475" y2="468" stroke="#FFF" stroke-width="1.5" opacity="0.3"/>
</svg>