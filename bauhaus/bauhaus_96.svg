<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Sky background strips -->
  <rect x="0" y="0" width="800" height="200" fill="#A8DADC" opacity="0.3"/>
  <rect x="0" y="200" width="800" height="100" fill="#A8DADC" opacity="0.15"/>

  <!-- Parachute canopy - semicircle divided into panels -->
  <path d="M 150 350 A 250 250 0 0 1 650 350" fill="#E63946"/>
  <!-- Panel divisions -->
  <path d="M 150 350 A 250 250 0 0 1 250 150 L 400 350 Z" fill="#1D3557"/>
  <path d="M 250 150 A 250 250 0 0 1 370 105 L 400 350 Z" fill="#F4D35E"/>
  <path d="M 370 105 A 250 250 0 0 1 430 105 L 400 350 Z" fill="#E63946"/>
  <path d="M 430 105 A 250 250 0 0 1 550 150 L 400 350 Z" fill="#FFFFFF" stroke="#333333" stroke-width="1"/>
  <path d="M 550 150 A 250 250 0 0 1 650 350 L 400 350 Z" fill="#E76F51"/>

  <!-- Canopy outline -->
  <path d="M 150 350 A 250 250 0 0 1 650 350" fill="none" stroke="#000000" stroke-width="4"/>
  <line x1="150" y1="350" x2="650" y2="350" stroke="#000000" stroke-width="3"/>

  <!-- Suspension lines -->
  <line x1="150" y1="350" x2="400" y2="650" stroke="#000000" stroke-width="2"/>
  <line x1="220" y1="200" x2="400" y2="650" stroke="#000000" stroke-width="1.5"/>
  <line x1="300" y1="130" x2="400" y2="650" stroke="#000000" stroke-width="1.5"/>
  <line x1="400" y1="105" x2="400" y2="650" stroke="#000000" stroke-width="1.5"/>
  <line x1="500" y1="130" x2="400" y2="650" stroke="#000000" stroke-width="1.5"/>
  <line x1="580" y1="200" x2="400" y2="650" stroke="#000000" stroke-width="1.5"/>
  <line x1="650" y1="350" x2="400" y2="650" stroke="#000000" stroke-width="2"/>

  <!-- Payload/harness point -->
  <circle cx="400" cy="650" r="12" fill="#000000"/>
  <rect x="385" y="660" width="30" height="40" fill="#333333"/>
  <rect x="380" y="695" width="40" height="5" fill="#000000"/>

  <!-- Decorative geometric elements - floating shapes -->
  <circle cx="100" cy="150" r="30" fill="#F4D35E" opacity="0.7"/>
  <circle cx="700" cy="180" r="25" fill="#E63946" opacity="0.6"/>
  <rect x="60" y="500" width="50" height="50" fill="#1D3557" opacity="0.5"/>
  <rect x="680" y="480" width="60" height="35" fill="#E76F51" opacity="0.5"/>

  <!-- Wind lines -->
  <line x1="50" y1="250" x2="130" y2="245" stroke="#333333" stroke-width="2" opacity="0.5"/>
  <line x1="670" y1="270" x2="750" y2="265" stroke="#333333" stroke-width="2" opacity="0.5"/>
  <line x1="30" y1="300" x2="120" y2="298" stroke="#333333" stroke-width="1.5" opacity="0.4"/>

  <!-- Ground elements -->
  <rect x="0" y="750" width="800" height="50" fill="#333333"/>
  <rect x="0" y="740" width="800" height="15" fill="#1D3557" opacity="0.4"/>
  <rect x="200" y="730" width="80" height="20" fill="#E76F51" opacity="0.6"/>
  <rect x="500" y="735" width="60" height="15" fill="#F4D35E" opacity="0.5"/>

  <!-- Additional canopy detail - stitching lines -->
  <path d="M 150 350 A 250 250 0 0 1 250 150" fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M 250 150 A 250 250 0 0 1 370 105" fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M 370 105 A 250 250 0 0 1 430 105" fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M 430 105 A 250 250 0 0 1 550 150" fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M 550 150 A 250 250 0 0 1 650 350" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Small triangles decoration -->
  <polygon points="90,600 110,570 130,600" fill="#F4D35E" opacity="0.6"/>
  <polygon points="660,600 680,570 700,600" fill="#A8DADC" opacity="0.6"/>
</svg>