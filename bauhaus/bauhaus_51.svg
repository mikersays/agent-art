<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Background grid pattern -->
  <g stroke="#A8DADC" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="700" x2="800" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/>
  </g>

  <!-- Hexagonal ring 1 - center -->
  <g stroke="#000000" stroke-width="3" fill="none">
    <line x1="400" y1="300" x2="450" y2="330"/>
    <line x1="450" y1="330" x2="450" y2="380"/>
    <line x1="450" y1="380" x2="400" y2="410"/>
    <line x1="400" y1="410" x2="350" y2="380"/>
    <line x1="350" y1="380" x2="350" y2="330"/>
    <line x1="350" y1="330" x2="400" y2="300"/>
  </g>
  <!-- Atoms on hex 1 -->
  <circle cx="400" cy="300" r="18" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <circle cx="450" cy="330" r="14" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <circle cx="450" cy="380" r="18" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <circle cx="400" cy="410" r="14" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <circle cx="350" cy="380" r="18" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <circle cx="350" cy="330" r="14" fill="#F4D35E" stroke="#000000" stroke-width="2"/>

  <!-- Hexagonal ring 2 - upper right -->
  <g stroke="#000000" stroke-width="3" fill="none">
    <line x1="550" y1="180" x2="600" y2="210"/>
    <line x1="600" y1="210" x2="600" y2="260"/>
    <line x1="600" y1="260" x2="550" y2="290"/>
    <line x1="550" y1="290" x2="500" y2="260"/>
    <line x1="500" y1="260" x2="500" y2="210"/>
    <line x1="500" y1="210" x2="550" y2="180"/>
  </g>
  <circle cx="550" cy="180" r="16" fill="#457B9D" stroke="#000000" stroke-width="2"/>
  <circle cx="600" cy="210" r="12" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <circle cx="600" cy="260" r="16" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <circle cx="550" cy="290" r="12" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <circle cx="500" cy="260" r="16" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <circle cx="500" cy="210" r="12" fill="#457B9D" stroke="#000000" stroke-width="2"/>

  <!-- Hexagonal ring 3 - lower left -->
  <g stroke="#000000" stroke-width="3" fill="none">
    <line x1="250" y1="480" x2="300" y2="510"/>
    <line x1="300" y1="510" x2="300" y2="560"/>
    <line x1="300" y1="560" x2="250" y2="590"/>
    <line x1="250" y1="590" x2="200" y2="560"/>
    <line x1="200" y1="560" x2="200" y2="510"/>
    <line x1="200" y1="510" x2="250" y2="480"/>
  </g>
  <circle cx="250" cy="480" r="15" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <circle cx="300" cy="510" r="11" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <circle cx="300" cy="560" r="15" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <circle cx="250" cy="590" r="11" fill="#457B9D" stroke="#000000" stroke-width="2"/>
  <circle cx="200" cy="560" r="15" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <circle cx="200" cy="510" r="11" fill="#E63946" stroke="#000000" stroke-width="2"/>

  <!-- Bond connections between rings -->
  <line x1="450" y1="330" x2="500" y2="260" stroke="#000000" stroke-width="3"/>
  <line x1="350" y1="380" x2="300" y2="510" stroke="#000000" stroke-width="3"/>

  <!-- Double bonds (parallel lines) -->
  <line x1="398" y1="302" x2="348" y2="332" stroke="#A89F91" stroke-width="1.5"/>
  <line x1="448" y1="378" x2="398" y2="408" stroke="#A89F91" stroke-width="1.5"/>

  <!-- Dangling atoms - branches -->
  <line x1="400" y1="300" x2="400" y2="220" stroke="#000000" stroke-width="3"/>
  <circle cx="400" cy="220" r="20" fill="#A8DADC" stroke="#000000" stroke-width="2"/>

  <line x1="400" y1="220" x2="340" y2="160" stroke="#000000" stroke-width="3"/>
  <circle cx="340" cy="160" r="12" fill="#E63946" stroke="#000000" stroke-width="2"/>

  <line x1="400" y1="220" x2="460" y2="160" stroke="#000000" stroke-width="3"/>
  <circle cx="460" cy="160" r="12" fill="#1D3557" stroke="#000000" stroke-width="2"/>

  <line x1="400" y1="410" x2="400" y2="500" stroke="#000000" stroke-width="3"/>
  <circle cx="400" cy="500" r="20" fill="#A8DADC" stroke="#000000" stroke-width="2"/>

  <line x1="400" y1="500" x2="340" y2="560" stroke="#000000" stroke-width="3"/>
  <circle cx="340" cy="560" r="10" fill="#F4D35E" stroke="#000000" stroke-width="2"/>

  <line x1="400" y1="500" x2="460" y2="560" stroke="#000000" stroke-width="3"/>
  <circle cx="460" cy="560" r="10" fill="#457B9D" stroke="#000000" stroke-width="2"/>

  <!-- Upper left branch -->
  <line x1="550" y1="180" x2="550" y2="110" stroke="#000000" stroke-width="3"/>
  <circle cx="550" cy="110" r="16" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <line x1="550" y1="110" x2="620" y2="70" stroke="#000000" stroke-width="3"/>
  <circle cx="620" cy="70" r="10" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <line x1="550" y1="110" x2="480" y2="70" stroke="#000000" stroke-width="3"/>
  <circle cx="480" cy="70" r="10" fill="#1D3557" stroke="#000000" stroke-width="2"/>

  <!-- Right branch from hex2 -->
  <line x1="600" y1="210" x2="680" y2="190" stroke="#000000" stroke-width="3"/>
  <circle cx="680" cy="190" r="14" fill="#A89F91" stroke="#000000" stroke-width="2"/>
  <line x1="680" y1="190" x2="740" y2="140" stroke="#000000" stroke-width="3"/>
  <circle cx="740" cy="140" r="10" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <line x1="680" y1="190" x2="750" y2="230" stroke="#000000" stroke-width="3"/>
  <circle cx="750" cy="230" r="10" fill="#F4D35E" stroke="#000000" stroke-width="2"/>

  <!-- Lower branches from hex3 -->
  <line x1="250" y1="590" x2="250" y2="660" stroke="#000000" stroke-width="3"/>
  <circle cx="250" cy="660" r="16" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <line x1="250" y1="660" x2="180" y2="720" stroke="#000000" stroke-width="3"/>
  <circle cx="180" cy="720" r="10" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <line x1="250" y1="660" x2="320" y2="720" stroke="#000000" stroke-width="3"/>
  <circle cx="320" cy="720" r="10" fill="#F4D35E" stroke="#000000" stroke-width="2"/>

  <!-- Left branch from hex3 -->
  <line x1="200" y1="510" x2="120" y2="480" stroke="#000000" stroke-width="3"/>
  <circle cx="120" cy="480" r="14" fill="#A89F91" stroke="#000000" stroke-width="2"/>
  <line x1="120" y1="480" x2="60" y2="430" stroke="#000000" stroke-width="3"/>
  <circle cx="60" cy="430" r="10" fill="#457B9D" stroke="#000000" stroke-width="2"/>
  <line x1="120" y1="480" x2="50" y2="520" stroke="#000000" stroke-width="3"/>
  <circle cx="50" cy="520" r="10" fill="#A8DADC" stroke="#000000" stroke-width="2"/>

  <!-- Extra floating molecule fragment - lower right -->
  <line x1="600" y1="550" x2="660" y2="520" stroke="#000000" stroke-width="2.5"/>
  <line x1="660" y1="520" x2="720" y2="550" stroke="#000000" stroke-width="2.5"/>
  <line x1="720" y1="550" x2="720" y2="620" stroke="#000000" stroke-width="2.5"/>
  <line x1="720" y1="620" x2="660" y2="650" stroke="#000000" stroke-width="2.5"/>
  <line x1="660" y1="650" x2="600" y2="620" stroke="#000000" stroke-width="2.5"/>
  <line x1="600" y1="620" x2="600" y2="550" stroke="#000000" stroke-width="2.5"/>
  <circle cx="600" cy="550" r="12" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <circle cx="660" cy="520" r="9" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <circle cx="720" cy="550" r="12" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <circle cx="720" cy="620" r="9" fill="#457B9D" stroke="#000000" stroke-width="2"/>
  <circle cx="660" cy="650" r="12" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <circle cx="600" cy="620" r="9" fill="#A8DADC" stroke="#000000" stroke-width="2"/>

  <!-- Connecting bond from hex1 to lower right fragment -->
  <line x1="450" y1="380" x2="600" y2="550" stroke="#000000" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Electron cloud indicators -->
  <circle cx="400" cy="355" r="40" fill="#A8DADC" opacity="0.15" stroke="none"/>
  <circle cx="550" cy="235" r="35" fill="#F4D35E" opacity="0.12" stroke="none"/>
  <circle cx="250" cy="535" r="35" fill="#E63946" opacity="0.12" stroke="none"/>
  <circle cx="660" cy="585" r="35" fill="#457B9D" opacity="0.12" stroke="none"/>
</svg>