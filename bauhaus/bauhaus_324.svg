<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Black horizontal bars at top and bottom -->
  <rect x="0" y="0" width="800" height="40" fill="#000000" opacity="0.9"/>
  <rect x="0" y="760" width="800" height="40" fill="#000000" opacity="0.9"/>

  <!-- Repeating vertical rectangles (blue) -->
  <rect x="60" y="200" width="20" height="200" fill="#1D3557" opacity="0.9"/>
  <rect x="160" y="200" width="20" height="200" fill="#1D3557" opacity="0.9"/>
  <rect x="260" y="200" width="20" height="200" fill="#1D3557" opacity="0.9"/>
  <rect x="360" y="200" width="20" height="200" fill="#1D3557" opacity="0.9"/>
  <rect x="560" y="200" width="20" height="200" fill="#1D3557" opacity="0.9"/>
  <rect x="660" y="200" width="20" height="200" fill="#1D3557" opacity="0.9"/>

  <!-- Repeating circles (red) between rects -->
  <circle cx="120" cy="300" r="25" fill="#E63946" opacity="0.85"/>
  <circle cx="220" cy="300" r="25" fill="#E63946" opacity="0.85"/>
  <circle cx="320" cy="300" r="25" fill="#E63946" opacity="0.85"/>
  <circle cx="420" cy="300" r="25" fill="#E63946" opacity="0.85"/>
  <circle cx="620" cy="300" r="25" fill="#E63946" opacity="0.85"/>
  <circle cx="720" cy="300" r="25" fill="#E63946" opacity="0.85"/>

  <!-- Yellow connecting lines between pairs -->
  <line x1="80" y1="300" x2="95" y2="300" stroke="#F4D35E" stroke-width="2" opacity="0.8"/>
  <line x1="145" y1="300" x2="155" y2="300" stroke="#F4D35E" stroke-width="2" opacity="0.8"/>
  <line x1="180" y1="300" x2="195" y2="300" stroke="#F4D35E" stroke-width="2" opacity="0.8"/>
  <line x1="245" y1="300" x2="255" y2="300" stroke="#F4D35E" stroke-width="2" opacity="0.8"/>
  <line x1="280" y1="300" x2="295" y2="300" stroke="#F4D35E" stroke-width="2" opacity="0.8"/>
  <line x1="345" y1="300" x2="355" y2="300" stroke="#F4D35E" stroke-width="2" opacity="0.8"/>
  <line x1="380" y1="300" x2="395" y2="300" stroke="#F4D35E" stroke-width="2" opacity="0.8"/>
  <line x1="445" y1="300" x2="535" y2="300" stroke="#F4D35E" stroke-width="2" opacity="0.8"/>
  <line x1="580" y1="300" x2="595" y2="300" stroke="#F4D35E" stroke-width="2" opacity="0.8"/>
  <line x1="645" y1="300" x2="655" y2="300" stroke="#F4D35E" stroke-width="2" opacity="0.8"/>
  <line x1="680" y1="300" x2="695" y2="300" stroke="#F4D35E" stroke-width="2" opacity="0.8"/>

  <!-- Rhythm breaker: large orange polygon replacing element at position 5 -->
  <polygon points="460,180 540,180 560,300 540,420 460,420 440,300" fill="#E76F51" opacity="0.9"/>

  <!-- Warm gray gear-like circle 1 -->
  <circle cx="120" cy="550" r="40" fill="#A89F91" opacity="0.5"/>
  <rect x="112" y="500" width="16" height="16" fill="#A89F91" opacity="0.7"/>
  <rect x="112" y="584" width="16" height="16" fill="#A89F91" opacity="0.7"/>
  <rect x="70" y="542" width="16" height="16" fill="#A89F91" opacity="0.7"/>
  <rect x="154" y="542" width="16" height="16" fill="#A89F91" opacity="0.7"/>

  <!-- Warm gray gear-like circle 2 -->
  <circle cx="680" cy="550" r="40" fill="#A89F91" opacity="0.5"/>
  <rect x="672" y="500" width="16" height="16" fill="#A89F91" opacity="0.7"/>
  <rect x="672" y="584" width="16" height="16" fill="#A89F91" opacity="0.7"/>
  <rect x="630" y="542" width="16" height="16" fill="#A89F91" opacity="0.7"/>
  <rect x="714" y="542" width="16" height="16" fill="#A89F91" opacity="0.7"/>

  <!-- Teal accents -->
  <rect x="350" y="500" width="100" height="15" fill="#2A9D8F" opacity="0.75"/>
  <rect x="350" y="530" width="100" height="15" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="400" cy="600" r="12" fill="#2A9D8F" opacity="0.7"/>

  <!-- Lower rhythm echo - smaller -->
  <rect x="200" y="650" width="12" height="80" fill="#1D3557" opacity="0.4"/>
  <rect x="300" y="650" width="12" height="80" fill="#1D3557" opacity="0.4"/>
  <rect x="500" y="650" width="12" height="80" fill="#1D3557" opacity="0.4"/>
  <rect x="600" y="650" width="12" height="80" fill="#1D3557" opacity="0.4"/>
  <circle cx="250" cy="690" r="10" fill="#E63946" opacity="0.4"/>
  <circle cx="550" cy="690" r="10" fill="#E63946" opacity="0.4"/>

  <!-- Thin structural lines -->
  <line x1="0" y1="180" x2="800" y2="180" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="#000000" stroke-width="1" opacity="0.2"/>
</svg>