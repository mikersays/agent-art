<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Strong horizontal dividing line -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="4" opacity="0.9"/>

  <!-- UPPER HALF - Cool colors, scattered geometric shapes -->
  <!-- Sky-like background wash -->
  <rect x="0" y="0" width="800" height="400" fill="#A8DADC" opacity="0.15"/>

  <!-- Circles in upper half -->
  <circle cx="150" cy="120" r="55" fill="#1D3557" opacity="0.7"/>
  <circle cx="150" cy="120" r="30" fill="#457B9D" opacity="0.5"/>
  <circle cx="620" cy="80" r="40" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="400" cy="200" r="70" fill="#A8DADC" opacity="0.4"/>
  <circle cx="400" cy="200" r="35" fill="#1D3557" opacity="0.5"/>
  <circle cx="700" cy="280" r="28" fill="#457B9D" opacity="0.65"/>
  <circle cx="90" cy="320" r="22" fill="#2A9D8F" opacity="0.5"/>
  <circle cx="520" cy="150" r="18" fill="#1D3557" opacity="0.4"/>

  <!-- Triangles in upper half -->
  <polygon points="300,50 340,150 260,150" fill="#2A9D8F" opacity="0.6"/>
  <polygon points="550,220 600,320 500,320" fill="#A8DADC" opacity="0.5"/>
  <polygon points="700,100 740,180 660,180" fill="#1D3557" opacity="0.35"/>
  <polygon points="200,250 240,350 160,350" fill="#457B9D" opacity="0.45"/>

  <!-- LOWER HALF - Warm colors, rectangular blocks -->
  <rect x="0" y="400" width="800" height="400" fill="#DDA15E" opacity="0.08"/>

  <!-- Warm rectangular blocks -->
  <rect x="30" y="440" width="180" height="80" fill="#E63946" opacity="0.75"/>
  <rect x="50" y="560" width="140" height="60" fill="#E76F51" opacity="0.6"/>
  <rect x="250" y="470" width="120" height="120" fill="#DDA15E" opacity="0.7"/>
  <rect x="420" y="430" width="160" height="70" fill="#E63946" opacity="0.5"/>
  <rect x="440" y="540" width="100" height="100" fill="#E76F51" opacity="0.65"/>
  <rect x="600" y="480" width="170" height="55" fill="#DDA15E" opacity="0.6"/>
  <rect x="620" y="580" width="130" height="90" fill="#E63946" opacity="0.45"/>
  <rect x="80" y="660" width="200" height="50" fill="#E9C46A" opacity="0.5"/>
  <rect x="350" y="680" width="150" height="70" fill="#E76F51" opacity="0.55"/>
  <rect x="580" y="710" width="180" height="40" fill="#DDA15E" opacity="0.4"/>

  <!-- Vertical bridging lines -->
  <line x1="150" y1="350" x2="150" y2="460" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="320" y1="320" x2="320" y2="490" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="480" y1="300" x2="480" y2="450" stroke="#000000" stroke-width="2" opacity="0.45"/>
  <line x1="650" y1="340" x2="650" y2="500" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="550" y1="370" x2="550" y2="440" stroke="#000000" stroke-width="1" opacity="0.35"/>

  <!-- Subtle secondary horizontal lines -->
  <line x1="0" y1="398" x2="800" y2="398" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="402" x2="800" y2="402" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
</svg>