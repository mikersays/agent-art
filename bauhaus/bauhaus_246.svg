<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Kaleidoscope III</title>
  <rect width="800" height="800" fill="#1D3557"/>
  <!-- 12-fold rotational symmetry kaleidoscope -->
  <defs>
    <clipPath id="wedge">
      <polygon points="400,400 400,0 607,0"/>
    </clipPath>
    <g id="segment">
      <!-- Intricate geometric fills within each segment -->
      <polygon points="400,400 400,50 440,50" fill="#E63946" opacity="0.9"/>
      <polygon points="400,400 440,50 480,80" fill="#F4D35E" opacity="0.85"/>
      <polygon points="400,400 480,80 500,130" fill="#457B9D" opacity="0.8"/>
      <rect x="405" y="100" width="30" height="60" fill="#E9C46A" opacity="0.7" transform="rotate(8,400,400)"/>
      <circle cx="430" cy="180" r="18" fill="#E63946" opacity="0.8"/>
      <circle cx="420" cy="120" r="10" fill="#FFF" opacity="0.9"/>
      <polygon points="400,400 410,200 450,220" fill="#264653" opacity="0.75"/>
      <polygon points="400,400 450,220 470,260" fill="#F4D35E" opacity="0.65"/>
      <rect x="415" y="250" width="20" height="40" fill="#000" opacity="0.5"/>
      <circle cx="440" cy="300" r="12" fill="#FFF" opacity="0.6"/>
      <line x1="400" y1="400" x2="430" y2="60" stroke="#E9C46A" stroke-width="1.5" opacity="0.7"/>
      <line x1="400" y1="400" x2="500" y2="130" stroke="#FFF" stroke-width="1" opacity="0.5"/>
      <polygon points="410,320 435,290 460,340" fill="#E63946" opacity="0.5"/>
      <circle cx="425" cy="350" r="8" fill="#457B9D" opacity="0.7"/>
    </g>
  </defs>
  <!-- 12 rotated copies for 12-fold symmetry -->
  <use href="#segment" transform="rotate(0,400,400)"/>
  <use href="#segment" transform="rotate(30,400,400)"/>
  <use href="#segment" transform="rotate(60,400,400)"/>
  <use href="#segment" transform="rotate(90,400,400)"/>
  <use href="#segment" transform="rotate(120,400,400)"/>
  <use href="#segment" transform="rotate(150,400,400)"/>
  <use href="#segment" transform="rotate(180,400,400)"/>
  <use href="#segment" transform="rotate(210,400,400)"/>
  <use href="#segment" transform="rotate(240,400,400)"/>
  <use href="#segment" transform="rotate(270,400,400)"/>
  <use href="#segment" transform="rotate(300,400,400)"/>
  <use href="#segment" transform="rotate(330,400,400)"/>
  <!-- Center hub -->
  <circle cx="400" cy="400" r="40" fill="#000" stroke="#F4D35E" stroke-width="3"/>
  <circle cx="400" cy="400" r="28" fill="#E63946"/>
  <circle cx="400" cy="400" r="16" fill="#F4D35E"/>
  <circle cx="400" cy="400" r="8" fill="#FFF"/>
  <!-- Outer ring decorations -->
  <circle cx="400" cy="400" r="350" fill="none" stroke="#F4D35E" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="400" r="370" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.5"/>
  <circle cx="400" cy="400" r="380" fill="none" stroke="#FFF" stroke-width="1" opacity="0.4"/>
  <!-- Corner accents -->
  <rect x="0" y="0" width="60" height="60" fill="#E63946" opacity="0.8"/>
  <rect x="740" y="0" width="60" height="60" fill="#F4D35E" opacity="0.8"/>
  <rect x="0" y="740" width="60" height="60" fill="#F4D35E" opacity="0.8"/>
  <rect x="740" y="740" width="60" height="60" fill="#E63946" opacity="0.8"/>
  <circle cx="30" cy="30" r="15" fill="#000"/>
  <circle cx="770" cy="30" r="15" fill="#000"/>
  <circle cx="30" cy="770" r="15" fill="#000"/>
  <circle cx="770" cy="770" r="15" fill="#000"/>
</svg>