<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Grid lines -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <!-- Dense center checkerboard - Row 3 -->
  <rect x="200" y="200" width="80" height="80" fill="#E63946" opacity="0.9"/>
  <rect x="280" y="200" width="80" height="80" fill="#1D3557" opacity="0.9"/>
  <rect x="360" y="200" width="80" height="80" fill="#E63946" opacity="0.9"/>
  <rect x="440" y="200" width="80" height="80" fill="#1D3557" opacity="0.85"/>
  <rect x="520" y="200" width="80" height="80" fill="#E63946" opacity="0.7"/>
  <!-- Row 4 -->
  <rect x="200" y="280" width="80" height="80" fill="#1D3557" opacity="0.9"/>
  <rect x="280" y="280" width="80" height="80" fill="#E63946" opacity="0.9"/>
  <!-- Disrupted square - displaced -->
  <rect x="370" y="290" width="80" height="80" fill="#1D3557" opacity="0.7" transform="rotate(12, 410, 330)"/>
  <rect x="440" y="280" width="80" height="80" fill="#E63946" opacity="0.9"/>
  <rect x="520" y="280" width="80" height="80" fill="#1D3557" opacity="0.7"/>
  <!-- Row 5 -->
  <rect x="200" y="360" width="80" height="80" fill="#E63946" opacity="0.9"/>
  <!-- Disrupted - circle replaces square -->
  <circle cx="320" cy="400" r="40" fill="#F4D35E" opacity="0.85"/>
  <rect x="360" y="360" width="80" height="80" fill="#E63946" opacity="0.9"/>
  <!-- Disrupted - rotated -->
  <rect x="440" y="360" width="80" height="80" fill="#1D3557" opacity="0.75" transform="rotate(-8, 480, 400)"/>
  <rect x="520" y="360" width="80" height="80" fill="#E63946" opacity="0.6"/>
  <!-- Row 6 -->
  <rect x="200" y="440" width="80" height="80" fill="#1D3557" opacity="0.85"/>
  <rect x="280" y="440" width="80" height="80" fill="#E63946" opacity="0.9"/>
  <rect x="360" y="440" width="80" height="80" fill="#1D3557" opacity="0.9"/>
  <!-- Disrupted - circle -->
  <circle cx="480" cy="480" r="42" fill="#F4D35E" opacity="0.9"/>
  <!-- Disrupted - displaced -->
  <rect x="530" y="450" width="80" height="80" fill="#E63946" opacity="0.5" transform="rotate(20, 570, 490)"/>
  <!-- Row 7 - fading -->
  <rect x="280" y="520" width="80" height="80" fill="#E63946" opacity="0.5"/>
  <rect x="360" y="520" width="80" height="80" fill="#1D3557" opacity="0.6"/>
  <!-- Disrupted - replaced with circle -->
  <circle cx="480" cy="560" r="35" fill="#E63946" opacity="0.45"/>
  <!-- Outer fading squares -->
  <rect x="120" y="300" width="70" height="70" fill="#1D3557" opacity="0.3"/>
  <rect x="120" y="400" width="70" height="70" fill="#E63946" opacity="0.25"/>
  <rect x="600" y="300" width="70" height="70" fill="#E63946" opacity="0.25"/>
  <rect x="600" y="400" width="70" height="70" fill="#1D3557" opacity="0.2"/>
  <!-- Yellow accent shapes in disruption zones -->
  <circle cx="375" cy="305" r="12" fill="#F4D35E" opacity="0.9"/>
  <rect x="455" y="365" width="18" height="18" fill="#F4D35E" opacity="0.8" transform="rotate(45, 464, 374)"/>
  <circle cx="545" cy="465" r="10" fill="#F4D35E" opacity="0.85"/>
  <rect x="525" y="535" width="15" height="15" fill="#F4D35E" opacity="0.7" transform="rotate(30, 532, 542)"/>
  <!-- Black grid lines over checker area -->
  <line x1="200" y1="200" x2="600" y2="200" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="200" y1="360" x2="600" y2="360" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="200" y1="520" x2="600" y2="520" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <line x1="200" y1="200" x2="200" y2="600" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="360" y1="200" x2="360" y2="600" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="520" y1="200" x2="520" y2="600" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <!-- Corner accents -->
  <rect x="30" y="30" width="25" height="25" fill="#1D3557" opacity="0.4"/>
  <rect x="745" y="745" width="25" height="25" fill="#E63946" opacity="0.4"/>
  <circle cx="745" cy="42" r="12" fill="#F4D35E" opacity="0.35"/>
  <circle cx="42" cy="745" r="12" fill="#2A9D8F" opacity="0.35"/>
</svg>