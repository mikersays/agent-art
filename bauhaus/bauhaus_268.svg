<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle background grid -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>

  <!-- Heavy dark blue rectangle in bottom-left quadrant -->
  <rect x="40" y="450" width="340" height="310" fill="#1D3557" opacity="0.92"/>

  <!-- Smaller blue accent block -->
  <rect x="60" y="500" width="120" height="80" fill="#264653" opacity="0.5"/>

  <!-- Yellow diagonal line as fulcrum -->
  <line x1="100" y1="750" x2="700" y2="50" stroke="#F4D35E" stroke-width="4" opacity="0.85"/>

  <!-- Second yellow line for emphasis -->
  <line x1="110" y1="760" x2="710" y2="60" stroke="#F4D35E" stroke-width="1.5" opacity="0.4"/>

  <!-- Red accent shapes on the heavy block -->
  <rect x="200" y="520" width="80" height="50" fill="#E63946" opacity="0.8"/>
  <circle cx="120" cy="680" r="30" fill="#E63946" opacity="0.7"/>
  <rect x="280" y="650" width="60" height="60" fill="#E63946" opacity="0.6"/>

  <!-- Scattered shapes in upper-right quadrant -->
  <!-- Circles -->
  <circle cx="580" cy="120" r="18" fill="#E63946" opacity="0.75"/>
  <circle cx="680" cy="200" r="12" fill="#1D3557" opacity="0.6"/>
  <circle cx="620" cy="80" r="8" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="720" cy="140" r="15" fill="#F4D35E" opacity="0.65"/>
  <circle cx="550" cy="250" r="10" fill="#E76F51" opacity="0.7"/>
  <circle cx="660" cy="300" r="7" fill="#457B9D" opacity="0.6"/>
  <circle cx="740" cy="80" r="11" fill="#E63946" opacity="0.55"/>

  <!-- Small squares -->
  <rect x="600" y="170" width="16" height="16" fill="#000000" opacity="0.5"/>
  <rect x="530" y="100" width="12" height="12" fill="#E9C46A" opacity="0.6"/>
  <rect x="700" y="250" width="14" height="14" fill="#A8DADC" opacity="0.7"/>
  <rect x="650" y="50" width="10" height="10" fill="#6D2E46" opacity="0.6"/>
  <rect x="560" y="320" width="18" height="18" fill="#DDA15E" opacity="0.5"/>

  <!-- Small triangles -->
  <polygon points="590,200 600,180 610,200" fill="#2A9D8F" opacity="0.7"/>
  <polygon points="700,100 715,80 730,100" fill="#F4D35E" opacity="0.6"/>
  <polygon points="520,160 530,140 540,160" fill="#E63946" opacity="0.65"/>
  <polygon points="670,350 685,330 700,350" fill="#1D3557" opacity="0.5"/>
  <polygon points="750,200 760,180 770,200" fill="#E76F51" opacity="0.6"/>

  <!-- A few shapes in transitional zone -->
  <circle cx="450" cy="350" r="6" fill="#A89F91" opacity="0.5"/>
  <rect x="480" y="280" width="10" height="10" fill="#000000" opacity="0.3"/>
  <circle cx="500" cy="400" r="9" fill="#457B9D" opacity="0.4"/>

  <!-- Structural lines -->
  <line x1="380" y1="450" x2="800" y2="450" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#000000" stroke-width="1" opacity="0.15"/>

  <!-- Corner accents -->
  <rect x="15" y="15" width="20" height="20" fill="#E63946" opacity="0.3"/>
  <circle cx="780" cy="780" r="10" fill="#1D3557" opacity="0.3"/>
  <circle cx="780" cy="25" r="8" fill="#F4D35E" opacity="0.4"/>
  <rect x="15" y="765" width="15" height="15" fill="#2A9D8F" opacity="0.3"/>
</svg>