<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#FFF"/>
  <!-- Ground -->
  <rect x="0" y="700" width="800" height="100" fill="#2A9D8F" opacity="0.3"/>
  <!-- Central maypole -->
  <rect x="392" y="100" width="16" height="600" fill="#000"/>
  <!-- Pole top ornament -->
  <circle cx="400" cy="100" r="25" fill="#E63946"/>
  <circle cx="400" cy="100" r="12" fill="#F4D35E"/>
  <polygon points="400,60 390,80 410,80" fill="#E63946"/>
  <!-- Wreath around top -->
  <circle cx="400" cy="140" r="35" fill="none" stroke="#2A9D8F" stroke-width="6"/>
  <!-- Ribbons radiating to dancers -->
  <line x1="400" y1="140" x2="120" y2="620" stroke="#E63946" stroke-width="3"/>
  <line x1="400" y1="140" x2="230" y2="650" stroke="#F4D35E" stroke-width="3"/>
  <line x1="400" y1="140" x2="340" y2="680" stroke="#1D3557" stroke-width="3"/>
  <line x1="400" y1="140" x2="460" y2="680" stroke="#E76F51" stroke-width="3"/>
  <line x1="400" y1="140" x2="570" y2="650" stroke="#6D2E46" stroke-width="3"/>
  <line x1="400" y1="140" x2="680" y2="620" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="400" y1="140" x2="720" y2="550" stroke="#E63946" stroke-width="3"/>
  <line x1="400" y1="140" x2="80" y2="550" stroke="#1D3557" stroke-width="3"/>
  <!-- Dancer 1 (bottom-left) -->
  <circle cx="120" cy="600" r="14" fill="#E63946"/>
  <rect x="112" y="614" width="16" height="35" fill="#E63946"/>
  <line x1="120" y1="649" x2="108" y2="690" stroke="#000" stroke-width="4"/>
  <line x1="120" y1="649" x2="132" y2="690" stroke="#000" stroke-width="4"/>
  <!-- Dancer 2 -->
  <circle cx="230" cy="630" r="14" fill="#F4D35E"/>
  <rect x="222" y="644" width="16" height="35" fill="#F4D35E"/>
  <line x1="230" y1="679" x2="218" y2="700" stroke="#000" stroke-width="4"/>
  <line x1="230" y1="679" x2="242" y2="700" stroke="#000" stroke-width="4"/>
  <!-- Dancer 3 -->
  <circle cx="340" cy="660" r="14" fill="#1D3557"/>
  <rect x="332" y="674" width="16" height="26" fill="#1D3557"/>
  <!-- Dancer 4 -->
  <circle cx="460" cy="660" r="14" fill="#E76F51"/>
  <rect x="452" y="674" width="16" height="26" fill="#E76F51"/>
  <!-- Dancer 5 -->
  <circle cx="570" cy="630" r="14" fill="#6D2E46"/>
  <rect x="562" y="644" width="16" height="35" fill="#6D2E46"/>
  <line x1="570" y1="679" x2="558" y2="700" stroke="#000" stroke-width="4"/>
  <line x1="570" y1="679" x2="582" y2="700" stroke="#000" stroke-width="4"/>
  <!-- Dancer 6 -->
  <circle cx="680" cy="600" r="14" fill="#2A9D8F"/>
  <rect x="672" y="614" width="16" height="35" fill="#2A9D8F"/>
  <line x1="680" y1="649" x2="668" y2="690" stroke="#000" stroke-width="4"/>
  <line x1="680" y1="649" x2="692" y2="690" stroke="#000" stroke-width="4"/>
  <!-- Dancer 7 (far right) -->
  <circle cx="720" cy="530" r="14" fill="#E63946"/>
  <rect x="712" y="544" width="16" height="35" fill="#E63946"/>
  <!-- Dancer 8 (far left) -->
  <circle cx="80" cy="530" r="14" fill="#1D3557"/>
  <rect x="72" y="544" width="16" height="35" fill="#1D3557"/>
  <!-- Flowers on ground -->
  <circle cx="200" cy="720" r="8" fill="#E63946"/>
  <circle cx="350" cy="730" r="6" fill="#F4D35E"/>
  <circle cx="500" cy="725" r="7" fill="#6D2E46"/>
  <circle cx="650" cy="718" r="8" fill="#E76F51"/>
  <!-- Pole base -->
  <rect x="370" y="690" width="60" height="20" rx="5" fill="#000"/>
  <!-- Decorative cross-pieces on pole -->
  <rect x="380" y="250" width="40" height="8" fill="#F4D35E"/>
  <rect x="380" y="400" width="40" height="8" fill="#F4D35E"/>
  <rect x="380" y="550" width="40" height="8" fill="#F4D35E"/>
</svg>