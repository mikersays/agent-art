<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Upper-left triangle: dark blue -->
  <polygon points="0,0 800,0 0,800" fill="#1D3557" opacity="1"/>
  <!-- Lower-right triangle: cream -->
  <polygon points="800,0 800,800 0,800" fill="#FEFAE0" opacity="1"/>

  <!-- Dividing line emphasis -->
  <line x1="0" y1="800" x2="800" y2="0" stroke="#000000" stroke-width="3" opacity="0.6"/>

  <!-- Red circles on the dark (blue) side -->
  <circle cx="120" cy="180" r="40" fill="#E63946" opacity="0.8"/>
  <circle cx="80" cy="400" r="25" fill="#E63946" opacity="0.7"/>
  <circle cx="250" cy="120" r="18" fill="#E63946" opacity="0.65"/>
  <circle cx="180" cy="320" r="30" fill="#E63946" opacity="0.6"/>
  <circle cx="60" cy="600" r="22" fill="#E63946" opacity="0.55"/>
  <circle cx="320" cy="200" r="15" fill="#E63946" opacity="0.7"/>
  <circle cx="200" cy="500" r="12" fill="#E63946" opacity="0.5"/>
  <circle cx="400" cy="100" r="35" fill="#E63946" opacity="0.45"/>

  <!-- Blue rectangles on the light (cream) side -->
  <rect x="520" y="500" width="60" height="90" fill="#1D3557" opacity="0.75"/>
  <rect x="650" y="420" width="45" height="70" fill="#1D3557" opacity="0.65"/>
  <rect x="580" y="620" width="80" height="50" fill="#1D3557" opacity="0.7"/>
  <rect x="700" y="560" width="50" height="120" fill="#1D3557" opacity="0.6"/>
  <rect x="450" y="600" width="55" height="40" fill="#1D3557" opacity="0.55"/>
  <rect x="620" y="700" width="70" height="45" fill="#1D3557" opacity="0.5"/>
  <rect x="480" y="450" width="40" height="60" fill="#457B9D" opacity="0.5"/>

  <!-- Yellow triangles straddling the dividing line -->
  <polygon points="200,600 230,550 260,600" fill="#F4D35E" opacity="0.85"/>
  <polygon points="400,400 430,350 460,400" fill="#F4D35E" opacity="0.8"/>
  <polygon points="550,250 580,200 610,250" fill="#F4D35E" opacity="0.75"/>
  <polygon points="300,500 325,455 350,500" fill="#F4D35E" opacity="0.7"/>
  <polygon points="650,150 675,105 700,150" fill="#F4D35E" opacity="0.65"/>
  <polygon points="100,700 125,660 150,700" fill="#F4D35E" opacity="0.6"/>

  <!-- Accent elements -->
  <!-- Small teal circles near divide -->
  <circle cx="350" cy="420" r="8" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="500" cy="320" r="10" fill="#2A9D8F" opacity="0.55"/>
  <circle cx="250" cy="570" r="7" fill="#2A9D8F" opacity="0.5"/>

  <!-- Black structural accents -->
  <rect x="150" y="60" width="4" height="80" fill="#000000" opacity="0.3"/>
  <rect x="680" y="650" width="80" height="4" fill="#000000" opacity="0.3"/>
  <circle cx="500" cy="150" r="5" fill="#000000" opacity="0.25"/>
  <circle cx="300" cy="650" r="4" fill="#000000" opacity="0.25"/>

  <!-- Corner accents -->
  <rect x="10" y="10" width="20" height="20" fill="#FEFAE0" opacity="0.3"/>
  <rect x="770" y="770" width="20" height="20" fill="#1D3557" opacity="0.3"/>

  <!-- Small orange accents -->
  <circle cx="550" cy="380" r="6" fill="#E76F51" opacity="0.5"/>
  <circle cx="150" cy="250" r="5" fill="#E76F51" opacity="0.4"/>
</svg>