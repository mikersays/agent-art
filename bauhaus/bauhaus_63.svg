<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Piano Keys - Abstract keyboard with sound waves -->
  <!-- White keys at bottom -->
  <rect x="50" y="580" width="70" height="200" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <rect x="120" y="580" width="70" height="200" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <rect x="190" y="580" width="70" height="200" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <rect x="260" y="580" width="70" height="200" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <rect x="330" y="580" width="70" height="200" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <rect x="400" y="580" width="70" height="200" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <rect x="470" y="580" width="70" height="200" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <rect x="540" y="580" width="70" height="200" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <rect x="610" y="580" width="70" height="200" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <rect x="680" y="580" width="70" height="200" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <!-- Black keys -->
  <rect x="100" y="580" width="45" height="130" fill="#000000"/>
  <rect x="175" y="580" width="45" height="130" fill="#000000"/>
  <rect x="310" y="580" width="45" height="130" fill="#000000"/>
  <rect x="385" y="580" width="45" height="130" fill="#000000"/>
  <rect x="455" y="580" width="45" height="130" fill="#000000"/>
  <rect x="595" y="580" width="45" height="130" fill="#000000"/>
  <rect x="670" y="580" width="45" height="130" fill="#000000"/>
  <!-- Sound wave curves - Red -->
  <path d="M100,560 Q200,480 300,520 Q400,560 500,440 Q600,320 700,380" fill="none" stroke="#E63946" stroke-width="4"/>
  <path d="M80,530 Q180,440 280,490 Q380,540 480,400 Q580,260 700,340" fill="none" stroke="#E63946" stroke-width="3" opacity="0.7"/>
  <!-- Sound wave curves - Yellow -->
  <path d="M120,550 Q220,420 320,470 Q420,520 520,370 Q620,220 720,300" fill="none" stroke="#F4D35E" stroke-width="4"/>
  <path d="M100,510 Q200,370 300,430 Q400,490 500,320 Q600,150 700,250" fill="none" stroke="#F4D35E" stroke-width="3" opacity="0.7"/>
  <!-- Sound wave curves - Teal -->
  <path d="M140,540 Q240,390 340,450 Q440,510 540,330 Q640,150 740,250" fill="none" stroke="#2A9D8F" stroke-width="4"/>
  <path d="M60,500 Q160,340 260,400 Q360,460 460,280 Q560,100 660,200" fill="none" stroke="#2A9D8F" stroke-width="3" opacity="0.7"/>
  <!-- Floating musical note circles -->
  <circle cx="200" cy="200" r="15" fill="#E63946" opacity="0.6"/>
  <circle cx="400" cy="120" r="20" fill="#F4D35E" opacity="0.6"/>
  <circle cx="600" cy="180" r="12" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="300" cy="80" r="10" fill="#1D3557" opacity="0.5"/>
  <circle cx="550" cy="100" r="18" fill="#E76F51" opacity="0.5"/>
  <circle cx="150" cy="300" r="8" fill="#E63946" opacity="0.4"/>
</svg>