<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle grid lines for structure -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>

  <!-- Floating large blue circle top-right -->
  <circle cx="600" cy="180" r="90" fill="#1D3557" opacity="0.85"/>

  <!-- Floating red rectangle left area -->
  <rect x="80" y="320" width="140" height="100" fill="#E63946" opacity="0.8"/>

  <!-- Large blue rectangle bottom area -->
  <rect x="450" y="520" width="180" height="130" fill="#1D3557" opacity="0.7"/>

  <!-- Floating red circle mid-left -->
  <circle cx="250" cy="150" r="55" fill="#E63946" opacity="0.75"/>

  <!-- Medium blue circle center-left -->
  <circle cx="350" cy="480" r="40" fill="#457B9D" opacity="0.6"/>

  <!-- Thin connecting lines between shapes -->
  <line x1="250" y1="150" x2="600" y2="180" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="150" y1="370" x2="350" y2="480" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="350" y1="480" x2="540" y2="520" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="180" x2="630" y2="520" stroke="#000000" stroke-width="0.8" opacity="0.2"/>
  <line x1="250" y1="150" x2="150" y2="320" stroke="#000000" stroke-width="0.8" opacity="0.2"/>

  <!-- Yellow small accents -->
  <circle cx="420" cy="250" r="12" fill="#F4D35E" opacity="0.9"/>
  <rect x="680" y="400" width="18" height="18" fill="#F4D35E" opacity="0.85"/>
  <circle cx="150" cy="600" r="10" fill="#F4D35E" opacity="0.9"/>
  <rect x="300" y="680" width="15" height="15" fill="#F4D35E" opacity="0.8"/>
  <circle cx="720" cy="650" r="8" fill="#F4D35E" opacity="0.85"/>

  <!-- Floating small red circle far right -->
  <circle cx="720" cy="280" r="25" fill="#E63946" opacity="0.65"/>

  <!-- Small blue rectangle top-left -->
  <rect x="60" y="80" width="50" height="35" fill="#1D3557" opacity="0.5"/>

  <!-- Thin diagonal structure lines -->
  <line x1="0" y1="0" x2="250" y2="150" stroke="#1D3557" stroke-width="0.5" opacity="0.15"/>
  <line x1="600" y1="180" x2="800" y2="300" stroke="#E63946" stroke-width="0.5" opacity="0.15"/>

  <!-- More floating shapes -->
  <rect x="500" y="350" width="60" height="45" fill="#E63946" opacity="0.5"/>
  <circle cx="180" cy="500" r="30" fill="#1D3557" opacity="0.4"/>

  <!-- Corner accents -->
  <rect x="750" y="750" width="25" height="25" fill="#000000" opacity="0.2"/>
  <circle cx="30" cy="770" r="8" fill="#1D3557" opacity="0.3"/>
  <rect x="10" y="10" width="12" height="12" fill="#E63946" opacity="0.25"/>

  <!-- Additional connecting lines -->
  <line x1="720" y1="280" x2="680" y2="400" stroke="#000000" stroke-width="0.8" opacity="0.2"/>
  <line x1="150" y1="600" x2="300" y2="680" stroke="#000000" stroke-width="0.8" opacity="0.2"/>

  <!-- Small floating shapes for texture -->
  <circle cx="500" cy="120" r="6" fill="#000000" opacity="0.3"/>
  <circle cx="340" cy="300" r="5" fill="#000000" opacity="0.25"/>
  <rect x="650" y="600" width="10" height="10" fill="#1D3557" opacity="0.35"/>
  <circle cx="100" cy="700" r="4" fill="#E63946" opacity="0.4"/>
  <rect x="400" y="600" width="8" height="8" fill="#000000" opacity="0.2"/>
</svg>