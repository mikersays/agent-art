<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#1D3557"/>
  <!-- Night sky background with geometric stars -->
  <circle cx="120" cy="80" r="4" fill="#F4D35E"/>
  <circle cx="250" cy="50" r="3" fill="#FFFFFF"/>
  <circle cx="380" cy="30" r="5" fill="#F4D35E"/>
  <circle cx="550" cy="70" r="3" fill="#FFFFFF"/>
  <circle cx="680" cy="45" r="4" fill="#E9C46A"/>
  <circle cx="90" cy="160" r="3" fill="#FFFFFF"/>
  <circle cx="720" cy="130" r="3" fill="#F4D35E"/>

  <!-- Lighthouse beam - sweeping triangle of light -->
  <polygon points="420,180 50,0 350,0" fill="#F4D35E" opacity="0.15"/>
  <polygon points="420,180 750,0 500,0" fill="#F4D35E" opacity="0.2"/>
  <polygon points="420,180 800,50 800,250" fill="#F4D35E" opacity="0.12"/>
  <polygon points="420,180 0,100 0,250" fill="#E9C46A" opacity="0.1"/>

  <!-- Main beam - bright cone -->
  <polygon points="420,185 200,0 640,0" fill="#F4D35E" opacity="0.3"/>
  <polygon points="420,185 320,0 520,0" fill="#FFFFFF" opacity="0.15"/>

  <!-- Lighthouse tower -->
  <rect x="380" y="180" width="80" height="280" fill="#FFFFFF" stroke="#000000" stroke-width="3"/>
  <!-- Lighthouse stripes -->
  <rect x="380" y="220" width="80" height="40" fill="#E63946"/>
  <rect x="380" y="300" width="80" height="40" fill="#E63946"/>
  <rect x="380" y="380" width="80" height="40" fill="#E63946"/>

  <!-- Lighthouse top / lamp housing -->
  <rect x="370" y="160" width="100" height="25" fill="#000000"/>
  <rect x="390" y="145" width="60" height="20" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <polygon points="390,145 420,120 450,145" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <circle cx="420" cy="155" r="8" fill="#FFFFFF"/>

  <!-- Lighthouse base -->
  <rect x="360" y="455" width="120" height="15" fill="#000000"/>
  <polygon points="360,470 340,520 500,520 480,470" fill="#264653" stroke="#000000" stroke-width="2"/>

  <!-- Rocky base -->
  <polygon points="280,520 340,480 400,520" fill="#264653"/>
  <polygon points="400,520 460,485 520,520" fill="#264653"/>
  <polygon points="240,550 320,510 400,550" fill="#264653" stroke="#000000" stroke-width="1"/>
  <polygon points="400,550 480,510 560,550" fill="#264653" stroke="#000000" stroke-width="1"/>

  <!-- Geometric ocean waves -->
  <!-- Wave row 1 -->
  <path d="M0,580 Q50,550 100,580 Q150,610 200,580 Q250,550 300,580 Q350,610 400,580 Q450,550 500,580 Q550,610 600,580 Q650,550 700,580 Q750,610 800,580 L800,610 Q750,580 700,610 Q650,640 600,610 Q550,580 500,610 Q450,640 400,610 Q350,580 300,610 Q250,640 200,610 Q150,580 100,610 Q50,640 0,610 Z" fill="#1D3557" stroke="#E9C46A" stroke-width="2"/>

  <!-- Wave row 2 - triangular waves -->
  <polygon points="0,620 40,595 80,620 120,595 160,620 200,595 240,620 280,595 320,620 360,595 400,620 440,595 480,620 520,595 560,620 600,595 640,620 680,595 720,620 760,595 800,620 800,650 0,650" fill="#264653" opacity="0.7"/>

  <!-- Wave row 3 -->
  <polygon points="0,660 60,635 120,660 180,635 240,660 300,635 360,660 420,635 480,660 540,635 600,660 660,635 720,660 780,635 800,645 800,690 0,690" fill="#1D3557" stroke="#DDA15E" stroke-width="1.5"/>

  <!-- Wave row 4 -->
  <polygon points="0,700 50,680 100,700 150,680 200,700 250,680 300,700 350,680 400,700 450,680 500,700 550,680 600,700 650,680 700,700 750,680 800,700 800,740 0,740" fill="#264653" opacity="0.8"/>

  <!-- Deep water -->
  <rect x="0" y="740" width="800" height="60" fill="#1D3557"/>
  <line x1="0" y1="760" x2="800" y2="760" stroke="#264653" stroke-width="2"/>
  <line x1="0" y1="780" x2="800" y2="780" stroke="#264653" stroke-width="1.5"/>
</svg>