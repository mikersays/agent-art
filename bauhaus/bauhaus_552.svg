<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Concentric circle group 1 - Blue/Teal near top-right -->
  <circle cx="580" cy="200" r="160" fill="none" stroke="#1D3557" stroke-width="3" opacity="0.8"/>
  <circle cx="580" cy="200" r="130" fill="none" stroke="#1D3557" stroke-width="2.5" opacity="0.6"/>
  <circle cx="580" cy="200" r="100" fill="#1D3557" opacity="0.1"/>
  <circle cx="580" cy="200" r="100" fill="none" stroke="#2A9D8F" stroke-width="2" opacity="0.7"/>
  <circle cx="580" cy="200" r="70" fill="none" stroke="#457B9D" stroke-width="2" opacity="0.65"/>
  <circle cx="580" cy="200" r="40" fill="#2A9D8F" opacity="0.35"/>
  <circle cx="580" cy="200" r="40" fill="none" stroke="#264653" stroke-width="1.5" opacity="0.8"/>
  <circle cx="580" cy="200" r="12" fill="#1D3557" opacity="0.9"/>

  <!-- Concentric circle group 2 - Red/Orange near bottom-left -->
  <circle cx="220" cy="580" r="150" fill="none" stroke="#E63946" stroke-width="3" opacity="0.8"/>
  <circle cx="220" cy="580" r="120" fill="none" stroke="#E63946" stroke-width="2.5" opacity="0.55"/>
  <circle cx="220" cy="580" r="90" fill="#E63946" opacity="0.08"/>
  <circle cx="220" cy="580" r="90" fill="none" stroke="#E76F51" stroke-width="2" opacity="0.7"/>
  <circle cx="220" cy="580" r="60" fill="none" stroke="#DDA15E" stroke-width="2" opacity="0.6"/>
  <circle cx="220" cy="580" r="30" fill="#E76F51" opacity="0.4"/>
  <circle cx="220" cy="580" r="30" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.8"/>
  <circle cx="220" cy="580" r="10" fill="#E63946" opacity="0.9"/>

  <!-- Thin black lines connecting the two groups -->
  <line x1="580" y1="200" x2="220" y2="580" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="420" y1="200" x2="70" y2="580" stroke="#000000" stroke-width="0.8" opacity="0.3"/>
  <line x1="740" y1="200" x2="370" y2="580" stroke="#000000" stroke-width="0.8" opacity="0.3"/>
  <line x1="580" y1="40" x2="220" y2="430" stroke="#000000" stroke-width="0.8" opacity="0.25"/>
  <line x1="580" y1="360" x2="220" y2="730" stroke="#000000" stroke-width="0.8" opacity="0.25"/>

  <!-- Small squares as accent points along connecting lines -->
  <rect x="440" y="328" width="14" height="14" fill="#F4D35E" opacity="0.85" transform="rotate(45 447 335)"/>
  <rect x="360" y="420" width="12" height="12" fill="#000000" opacity="0.7" transform="rotate(30 366 426)"/>
  <rect x="490" y="260" width="10" height="10" fill="#E63946" opacity="0.7"/>
  <rect x="310" y="490" width="10" height="10" fill="#1D3557" opacity="0.7"/>
  <rect x="400" y="390" width="16" height="16" fill="#F4D35E" opacity="0.8"/>

  <!-- Additional accent squares scattered -->
  <rect x="100" y="100" width="18" height="18" fill="#000000" opacity="0.5"/>
  <rect x="680" y="680" width="18" height="18" fill="#000000" opacity="0.5"/>
  <rect x="700" y="400" width="12" height="12" fill="#2A9D8F" opacity="0.6"/>
  <rect x="90" y="380" width="12" height="12" fill="#E76F51" opacity="0.6"/>
  <rect x="400" y="100" width="10" height="10" fill="#457B9D" opacity="0.5"/>
  <rect x="400" y="700" width="10" height="10" fill="#DDA15E" opacity="0.5"/>

  <!-- Small third orbital group - top left, subtle -->
  <circle cx="120" cy="140" r="50" fill="none" stroke="#A89F91" stroke-width="1" opacity="0.4"/>
  <circle cx="120" cy="140" r="30" fill="none" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <circle cx="120" cy="140" r="10" fill="#A89F91" opacity="0.4"/>

  <!-- Faint connecting line from third group -->
  <line x1="120" y1="140" x2="580" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="120" y1="140" x2="220" y2="580" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>

  <!-- Corner frame elements -->
  <line x1="0" y1="30" x2="30" y2="0" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="770" y1="800" x2="800" y2="770" stroke="#000000" stroke-width="1" opacity="0.3"/>
</svg>