<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#DDA15E" opacity="0.35"/>
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0" opacity="0.7"/>

  <!-- Wind curves - large sweeping paths -->
  <path d="M -50 300 Q 200 180 450 320 Q 700 460 850 280" fill="none" stroke="#1D3557" stroke-width="3" opacity="0.5"/>
  <path d="M -30 350 Q 220 220 480 350 Q 720 490 860 320" fill="none" stroke="#1D3557" stroke-width="2" opacity="0.3"/>
  <path d="M -50 400 Q 180 280 400 400 Q 650 530 850 370" fill="none" stroke="#2A9D8F" stroke-width="3.5" opacity="0.45"/>
  <path d="M -20 440 Q 200 330 420 430 Q 660 550 870 400" fill="none" stroke="#2A9D8F" stroke-width="2" opacity="0.25"/>
  <path d="M -60 500 Q 250 350 500 480 Q 700 580 860 450" fill="none" stroke="#A8DADC" stroke-width="4" opacity="0.5"/>
  <path d="M -40 530 Q 230 400 470 510 Q 680 600 850 490" fill="none" stroke="#A8DADC" stroke-width="2.5" opacity="0.3"/>

  <!-- Upper wind streams -->
  <path d="M -30 150 Q 300 80 500 200 Q 700 300 850 150" fill="none" stroke="#457B9D" stroke-width="2.5" opacity="0.35"/>
  <path d="M -50 200 Q 280 120 520 230 Q 720 330 860 190" fill="none" stroke="#1D3557" stroke-width="1.5" opacity="0.2"/>

  <!-- Lower wind streams -->
  <path d="M -40 620 Q 200 550 450 640 Q 680 720 860 600" fill="none" stroke="#2A9D8F" stroke-width="2" opacity="0.3"/>
  <path d="M -20 680 Q 250 600 500 680 Q 700 750 850 660" fill="none" stroke="#A8DADC" stroke-width="3" opacity="0.35"/>

  <!-- Scattered blown shapes - Red triangles -->
  <polygon points="180,250 195,220 210,250" fill="#E63946" opacity="0.75" transform="rotate(25 195 235)"/>
  <polygon points="520,180 535,150 550,180" fill="#E63946" opacity="0.6" transform="rotate(40 535 165)"/>
  <polygon points="680,350 695,320 710,350" fill="#E63946" opacity="0.55" transform="rotate(15 695 335)"/>

  <!-- Orange squares - tumbling -->
  <rect x="290" y="280" width="16" height="16" fill="#E76F51" opacity="0.7" transform="rotate(35 298 288)"/>
  <rect x="600" y="430" width="14" height="14" fill="#E76F51" opacity="0.65" transform="rotate(55 607 437)"/>
  <rect x="130" y="450" width="18" height="18" fill="#E76F51" opacity="0.6" transform="rotate(20 139 459)"/>
  <rect x="720" y="250" width="12" height="12" fill="#E76F51" opacity="0.5" transform="rotate(70 726 256)"/>

  <!-- Yellow circles - floating -->
  <circle cx="350" cy="200" r="8" fill="#F4D35E" opacity="0.75"/>
  <circle cx="560" cy="320" r="6" fill="#F4D35E" opacity="0.65"/>
  <circle cx="240" cy="380" r="10" fill="#F4D35E" opacity="0.7"/>
  <circle cx="650" cy="520" r="7" fill="#F4D35E" opacity="0.6"/>
  <circle cx="450" cy="560" r="9" fill="#F4D35E" opacity="0.55"/>
  <circle cx="100" cy="300" r="5" fill="#F4D35E" opacity="0.5"/>

  <!-- Small red squares -->
  <rect x="410" y="150" width="10" height="10" fill="#E63946" opacity="0.5" transform="rotate(45 415 155)"/>
  <rect x="750" y="500" width="11" height="11" fill="#E63946" opacity="0.45" transform="rotate(30 755 505)"/>

  <!-- Tiny accent triangles -->
  <polygon points="480,450 488,435 496,450" fill="#E76F51" opacity="0.5" transform="rotate(50 488 442)"/>
  <polygon points="320,600 330,580 340,600" fill="#F4D35E" opacity="0.6" transform="rotate(15 330 590)"/>
  <polygon points="700,150 710,130 720,150" fill="#E63946" opacity="0.4" transform="rotate(60 710 140)"/>

  <!-- Ground scatter shapes -->
  <polygon points="160,700 175,670 190,700" fill="#E63946" opacity="0.4"/>
  <rect x="400" y="720" width="15" height="15" fill="#E76F51" opacity="0.35" transform="rotate(25 407 727)"/>
  <circle cx="600" cy="700" r="6" fill="#F4D35E" opacity="0.45"/>

  <!-- Corner anchors -->
  <circle cx="40" cy="40" r="5" fill="#1D3557" opacity="0.3"/>
  <circle cx="760" cy="760" r="5" fill="#2A9D8F" opacity="0.3"/>
  <rect x="745" y="25" width="20" height="3" fill="#1D3557" opacity="0.2"/>
  <rect x="35" y="755" width="20" height="3" fill="#2A9D8F" opacity="0.2"/>
</svg>