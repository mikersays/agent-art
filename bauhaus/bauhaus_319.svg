<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Subtle grid lines -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.15"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <!-- Diagonal support lines from base -->
  <line x1="250" y1="720" x2="100" y2="200" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="550" y1="720" x2="700" y2="200" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="300" y1="700" x2="150" y2="350" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="700" x2="650" y2="350" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <!-- Steel blue horizontal bars at different heights -->
  <rect x="50" y="250" width="700" height="4" fill="#457B9D" opacity="0.3"/>
  <rect x="100" y="400" width="600" height="5" fill="#457B9D" opacity="0.25"/>
  <rect x="150" y="550" width="500" height="4" fill="#457B9D" opacity="0.2"/>
  <rect x="200" y="150" width="400" height="3" fill="#457B9D" opacity="0.35"/>
  <!-- Base: Wide red rectangle -->
  <rect x="250" y="660" width="300" height="60" fill="#E63946"/>
  <!-- Second tier: Blue rectangle, slightly offset -->
  <rect x="280" y="570" width="220" height="80" fill="#1D3557" opacity="0.9"/>
  <!-- Third tier: Yellow rectangle -->
  <rect x="310" y="480" width="180" height="80" fill="#F4D35E" opacity="0.85"/>
  <!-- Fourth tier: Teal rectangle -->
  <rect x="330" y="400" width="150" height="70" fill="#2A9D8F" opacity="0.9"/>
  <!-- Fifth tier: Orange rectangle, narrower -->
  <rect x="350" y="330" width="120" height="60" fill="#E76F51" opacity="0.85"/>
  <!-- Sixth tier: Forest rectangle -->
  <rect x="365" y="270" width="90" height="50" fill="#264653" opacity="0.8"/>
  <!-- Seventh tier: Burgundy -->
  <rect x="378" y="220" width="65" height="42" fill="#6D2E46" opacity="0.85"/>
  <!-- Sand semicircle at top -->
  <path d="M370,180 A50,50 0 0,1 460,180" fill="#DDA15E" opacity="0.9"/>
  <!-- Small orange circles floating around tower -->
  <circle cx="220" cy="500" r="10" fill="#E76F51" opacity="0.6"/>
  <circle cx="570" cy="450" r="8" fill="#E76F51" opacity="0.7"/>
  <circle cx="190" cy="350" r="6" fill="#E76F51" opacity="0.5"/>
  <circle cx="620" cy="550" r="9" fill="#E76F51" opacity="0.65"/>
  <circle cx="160" cy="600" r="7" fill="#E76F51" opacity="0.55"/>
  <circle cx="640" cy="350" r="11" fill="#E76F51" opacity="0.5"/>
  <circle cx="500" cy="200" r="5" fill="#E76F51" opacity="0.7"/>
  <circle cx="300" cy="250" r="6" fill="#E76F51" opacity="0.6"/>
  <!-- Corner accents -->
  <rect x="20" y="20" width="15" height="15" fill="#000000" opacity="0.3"/>
  <rect x="765" y="20" width="15" height="15" fill="#000000" opacity="0.3"/>
  <rect x="20" y="765" width="15" height="15" fill="#000000" opacity="0.3"/>
  <rect x="765" y="765" width="15" height="15" fill="#000000" opacity="0.3"/>
</svg>