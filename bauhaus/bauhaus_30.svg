<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Final Composition</title>
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Grid structure - underlying Bauhaus order -->
  <line x1="200" y1="0" x2="200" y2="800" stroke="#333333" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#333333" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#333333" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#333333" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#333333" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#333333" stroke-width="0.5" opacity="0.1"/>

  <!-- Large primary circle - top left quadrant -->
  <circle cx="250" cy="250" r="160" fill="#E63946" opacity="0.7"/>
  <circle cx="250" cy="250" r="100" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.5"/>
  <circle cx="250" cy="250" r="50" fill="#FFFFFF" opacity="0.4"/>

  <!-- Large primary square - bottom right -->
  <rect x="480" y="480" width="250" height="250" fill="#1D3557" opacity="0.75"/>
  <rect x="520" y="520" width="170" height="170" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <rect x="570" y="570" width="70" height="70" fill="#F4D35E" opacity="0.6"/>

  <!-- Large primary triangle - top right -->
  <polygon points="650,80 770,300 530,300" fill="#F4D35E" opacity="0.75"/>
  <polygon points="650,140 730,270 570,270" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>

  <!-- Diagonal composition line -->
  <line x1="50" y1="50" x2="750" y2="750" stroke="#000000" stroke-width="3" opacity="0.5"/>
  <line x1="750" y1="50" x2="50" y2="750" stroke="#333333" stroke-width="2" opacity="0.25"/>

  <!-- Arc elements -->
  <path d="M0,400 A200,200 0 0,1 200,200" fill="none" stroke="#E63946" stroke-width="4" opacity="0.6"/>
  <path d="M800,400 A200,200 0 0,0 600,600" fill="none" stroke="#2A9D8F" stroke-width="4" opacity="0.6"/>
  <path d="M400,0 A150,150 0 0,1 550,150" fill="none" stroke="#F4D35E" stroke-width="3" opacity="0.5"/>
  <path d="M400,800 A150,150 0 0,0 250,650" fill="none" stroke="#1D3557" stroke-width="3" opacity="0.5"/>

  <!-- Semicircle -->
  <path d="M300,600 A100,100 0 0,1 500,600" fill="#2A9D8F" opacity="0.5"/>

  <!-- Medium geometric elements -->
  <!-- Teal circle cluster -->
  <circle cx="600" cy="180" r="30" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="560" cy="140" r="18" fill="#2A9D8F" opacity="0.4"/>
  <circle cx="640" cy="350" r="25" fill="#2A9D8F" opacity="0.5"/>

  <!-- Yellow triangle cluster -->
  <polygon points="80,500 140,500 110,450" fill="#F4D35E" opacity="0.6"/>
  <polygon points="120,550 180,600 60,600" fill="#E9C46A" opacity="0.5"/>

  <!-- Horizontal bars -->
  <rect x="50" y="380" width="300" height="8" fill="#000000" opacity="0.7"/>
  <rect x="50" y="395" width="200" height="4" fill="#E63946" opacity="0.5"/>
  <rect x="50" y="405" width="250" height="6" fill="#1D3557" opacity="0.4"/>

  <!-- Vertical bars -->
  <rect x="420" y="50" width="8" height="200" fill="#000000" opacity="0.6"/>
  <rect x="435" y="80" width="4" height="170" fill="#E63946" opacity="0.5"/>
  <rect x="445" y="60" width="6" height="190" fill="#F4D35E" opacity="0.4"/>

  <!-- Small accent shapes scattered throughout -->
  <!-- Red accents -->
  <circle cx="480" cy="380" r="12" fill="#E63946" opacity="0.7"/>
  <rect x="700" y="400" width="25" height="25" fill="#E63946" opacity="0.5" transform="rotate(45 712 412)"/>

  <!-- Blue accents -->
  <polygon points="180,680 210,680 195,650" fill="#1D3557" opacity="0.6"/>
  <circle cx="350" cy="650" r="15" fill="#1D3557" opacity="0.5"/>

  <!-- Yellow accents -->
  <rect x="700" y="700" width="35" height="35" fill="#F4D35E" opacity="0.6"/>
  <circle cx="150" cy="150" r="10" fill="#F4D35E" opacity="0.8"/>

  <!-- Black geometric punctuation -->
  <circle cx="400" cy="400" r="8" fill="#000000"/>
  <rect x="395" y="350" width="10" height="10" fill="#000000" opacity="0.6"/>
  <polygon points="370,430 400,430 385,455" fill="#000000" opacity="0.5"/>

  <!-- Coral/warm accents -->
  <circle cx="320" cy="500" r="20" fill="#E9C46A" opacity="0.5"/>
  <rect x="500" y="350" width="40" height="15" fill="#E9C46A" opacity="0.4"/>

  <!-- Charcoal connecting lines -->
  <line x1="250" y1="250" x2="480" y2="480" stroke="#333333" stroke-width="2" opacity="0.4"/>
  <line x1="250" y1="250" x2="650" y2="180" stroke="#333333" stroke-width="1.5" opacity="0.3"/>
  <line x1="650" y1="180" x2="600" y2="600" stroke="#333333" stroke-width="1.5" opacity="0.3"/>

  <!-- Dotted rhythm line -->
  <circle cx="50" cy="750" r="4" fill="#000000" opacity="0.5"/>
  <circle cx="80" cy="750" r="4" fill="#000000" opacity="0.5"/>
  <circle cx="110" cy="750" r="4" fill="#000000" opacity="0.5"/>
  <circle cx="140" cy="750" r="4" fill="#000000" opacity="0.5"/>
  <circle cx="170" cy="750" r="4" fill="#000000" opacity="0.5"/>
  <circle cx="200" cy="750" r="4" fill="#000000" opacity="0.5"/>
  <circle cx="230" cy="750" r="4" fill="#000000" opacity="0.5"/>
  <circle cx="260" cy="750" r="4" fill="#000000" opacity="0.5"/>

  <!-- Final synthesis: overlapping transparent shapes at center -->
  <circle cx="400" cy="400" r="60" fill="#E63946" opacity="0.15"/>
  <rect x="365" y="365" width="70" height="70" fill="#1D3557" opacity="0.15" transform="rotate(15 400 400)"/>
  <polygon points="400,345 440,400 400,455 360,400" fill="#F4D35E" opacity="0.2"/>

  <!-- Border frame elements -->
  <line x1="20" y1="20" x2="780" y2="20" stroke="#000000" stroke-width="2"/>
  <line x1="20" y1="780" x2="780" y2="780" stroke="#000000" stroke-width="2"/>
  <line x1="20" y1="20" x2="20" y2="780" stroke="#000000" stroke-width="2"/>
  <line x1="780" y1="20" x2="780" y2="780" stroke="#000000" stroke-width="2"/>

  <!-- Corner marks -->
  <rect x="20" y="20" width="15" height="15" fill="#000000"/>
  <rect x="765" y="20" width="15" height="15" fill="#000000"/>
  <rect x="20" y="765" width="15" height="15" fill="#000000"/>
  <rect x="765" y="765" width="15" height="15" fill="#000000"/>
</svg>