<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background cream -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Subtle grid -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <!-- Bold red horizontal bar (off-center cross) -->
  <rect x="50" y="320" width="700" height="50" fill="#E63946" opacity="0.9"/>
  <!-- Bold blue vertical bar -->
  <rect x="280" y="80" width="50" height="650" fill="#1D3557" opacity="0.85"/>
  <!-- Cross intersection highlight -->
  <rect x="280" y="320" width="50" height="50" fill="#6D2E46" opacity="0.7"/>
  <!-- Orange polygons filling quadrants asymmetrically -->
  <polygon points="100,150 180,100 160,200" fill="#E76F51" opacity="0.7"/>
  <polygon points="400,120 500,80 480,180 390,170" fill="#E76F51" opacity="0.6"/>
  <polygon points="600,450 700,400 720,500 650,520" fill="#E76F51" opacity="0.65"/>
  <polygon points="80,500 150,480 170,560 100,580" fill="#E76F51" opacity="0.55"/>
  <polygon points="500,550 580,520 600,600 530,610" fill="#E76F51" opacity="0.6"/>
  <!-- Yellow circles orbiting -->
  <circle cx="150" cy="250" r="20" fill="#F4D35E" opacity="0.85"/>
  <circle cx="450" cy="200" r="15" fill="#F4D35E" opacity="0.8"/>
  <circle cx="600" cy="280" r="22" fill="#F4D35E" opacity="0.75"/>
  <circle cx="200" cy="500" r="18" fill="#F4D35E" opacity="0.8"/>
  <circle cx="500" cy="480" r="12" fill="#F4D35E" opacity="0.85"/>
  <circle cx="680" cy="600" r="16" fill="#F4D35E" opacity="0.7"/>
  <!-- Black squares orbiting -->
  <rect x="400" y="430" width="18" height="18" fill="#000000" opacity="0.8" transform="rotate(15 409 439)"/>
  <rect x="130" y="380" width="14" height="14" fill="#000000" opacity="0.75"/>
  <rect x="550" y="250" width="20" height="20" fill="#000000" opacity="0.8" transform="rotate(30 560 260)"/>
  <rect x="350" y="600" width="16" height="16" fill="#000000" opacity="0.7" transform="rotate(45 358 608)"/>
  <rect x="680" y="180" width="12" height="12" fill="#000000" opacity="0.75"/>
  <!-- Teal triangles orbiting -->
  <polygon points="180,650 200,620 220,650" fill="#2A9D8F" opacity="0.8"/>
  <polygon points="470,680 495,640 520,680" fill="#2A9D8F" opacity="0.75"/>
  <polygon points="650,350 670,320 690,350" fill="#2A9D8F" opacity="0.8"/>
  <polygon points="100,100 120,70 140,100" fill="#2A9D8F" opacity="0.7"/>
  <polygon points="380,180 400,150 420,180" fill="#2A9D8F" opacity="0.75"/>
  <!-- Thin burgundy tension lines -->
  <line x1="50" y1="80" x2="280" y2="320" stroke="#6D2E46" stroke-width="1.5" opacity="0.5"/>
  <line x1="330" y1="80" x2="750" y2="320" stroke="#6D2E46" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="370" x2="280" y2="730" stroke="#6D2E46" stroke-width="1.5" opacity="0.45"/>
  <line x1="330" y1="370" x2="750" y2="730" stroke="#6D2E46" stroke-width="1" opacity="0.4"/>
  <line x1="150" y1="50" x2="650" y2="750" stroke="#6D2E46" stroke-width="0.8" opacity="0.3"/>
  <line x1="650" y1="50" x2="150" y2="750" stroke="#6D2E46" stroke-width="0.8" opacity="0.3"/>
  <!-- Small corner accents -->
  <circle cx="25" cy="25" r="8" fill="#E63946" opacity="0.5"/>
  <circle cx="775" cy="775" r="8" fill="#1D3557" opacity="0.5"/>
  <rect x="760" y="15" width="16" height="16" fill="#F4D35E" opacity="0.5"/>
</svg>