  <text x="700" y="200" text-anchor="middle" fill="#FFF" font-family="sans-serif" font-size="16" font-weight="bold">4</text>
  <text x="760" y="315" text-anchor="middle" fill="#FFF" font-family="sans-serif" font-size="16" font-weight="bold">13</text>
  <text x="765" y="405" text-anchor="middle" fill="#FFF" font-family="sans-serif" font-size="16" font-weight="bold">6</text>
  <text x="755" y="495" text-anchor="middle" fill="#FFF" font-family="sans-serif" font-size="16" font-weight="bold">10</text>
  <text x="700" y="605" text-anchor="middle" fill="#FFF" font-family="sans-serif" font-size="16" font-weight="bold">15</text>
  <text x="615" y="695" text-anchor="middle" fill="#FFF" font-family="sans-serif" font-size="16" font-weight="bold">2</text>
  <text x="505" y="750" text-anchor="middle" fill="#FFF" font-family="sans-serif" font-size="16" font-weight="bold">17</text>
