  <!-- Ring 1 outermost -->
  <circle cx="400" cy="400" r="350" fill="none" stroke="#E63946" stroke-width="45"/>
  <!-- Ring 2 -->
  <circle cx="400" cy="400" r="300" fill="none" stroke="#FFF" stroke-width="15"/>
  <!-- Ring 3 -->
  <circle cx="400" cy="400" r="280" fill="none" stroke="#333" stroke-width="25"/>
  <!-- Ring 4 -->
  <circle cx="400" cy="400" r="250" fill="none" stroke="#F4D35E" stroke-width="30"/>
  <!-- Ring 5 -->
  <circle cx="400" cy="400" r="225" fill="none" stroke="#000" stroke-width="20"/>
  <!-- Ring 6 -->
  <circle cx="400" cy="400" r="205" fill="none" stroke="#A8DADC" stroke-width="20"/>
  <!-- Ring 7 -->
  <circle cx="400" cy="400" r="185" fill="none" stroke="#E63946" stroke-width="20"/>
  <!-- Ring 8 -->
  <circle cx="400" cy="400" r="160" fill="none" stroke="#FFF" stroke-width="15"/>
  <!-- Ring 9 -->
  <circle cx="400" cy="400" r="140" fill="none" stroke="#1D3557" stroke-width="20"/>
  <!-- Ring 10 -->
  <circle cx="400" cy="400" r="120" fill="none" stroke="#F4D35E" stroke-width="20"/>
  <!-- Ring 11 -->
  <circle cx="400" cy="400" r="100" fill="none" stroke="#333" stroke-width="20"/>
  <!-- Ring 12 -->
  <circle cx="400" cy="400" r="80" fill="none" stroke="#DDA15E" stroke-width="15"/>
  <!-- Ring 13 -->
  <circle cx="400" cy="400" r="60" fill="none" stroke="#E63946" stroke-width="20"/>
  <!-- Ring 14 inner -->
  <circle cx="400" cy="400" r="40" fill="none" stroke="#A8DADC" stroke-width="20"/>
  <!-- Bullseye center -->
  <circle cx="400" cy="400" r="25" fill="#E63946"/>
  <circle cx="400" cy="400" r="12" fill="#F4D35E"/>
  <circle cx="400" cy="400" r="5" fill="#000"/>
