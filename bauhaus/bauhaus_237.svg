<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#1D3557"/>
  <!-- Outer ring background -->
  <circle cx="400" cy="400" r="350" fill="#000"/>
  <!-- Wire frame ring -->
  <circle cx="400" cy="400" r="350" fill="none" stroke="#333" stroke-width="3"/>
  <!-- 20 wedge segments using clip paths and rings -->
