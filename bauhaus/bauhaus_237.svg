  <text x="400" y="38" text-anchor="middle" fill="#FFF" font-family="sans-serif" font-size="16" font-weight="bold">20</text>
  <text x="505" y="55" text-anchor="middle" fill="#FFF" font-family="sans-serif" font-size="16" font-weight="bold">1</text>
