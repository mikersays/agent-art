  <line x1="400" y1="400" x2="400" y2="50" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="508.5" y2="64.7" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="609.7" y2="118.6" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="693.4" y2="206.6" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="746.4" y2="318.4" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="750" y2="400" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="746.4" y2="481.6" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="693.4" y2="593.4" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="609.7" y2="681.4" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="508.5" y2="735.3" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="400" y2="750" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="291.5" y2="735.3" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="190.3" y2="681.4" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="106.6" y2="593.4" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="53.6" y2="481.6" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="50" y2="400" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="53.6" y2="318.4" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="106.6" y2="206.6" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="190.3" y2="118.6" stroke="#DDA15E" stroke-width="2"/>
  <line x1="400" y1="400" x2="291.5" y2="64.7" stroke="#DDA15E" stroke-width="2"/>
