<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <title>Signal Light</title>
  <!-- Background -->
  <rect width="800" height="800" fill="#1D3557"/>
  <!-- Pole -->
  <rect x="380" y="600" width="40" height="200" fill="#000"/>
  <!-- Pole base plate -->
  <rect x="340" y="750" width="120" height="20" fill="#000"/>
  <rect x="320" y="765" width="160" height="15" fill="#457B9D"/>
  <!-- Signal housing - main body -->
  <rect x="300" y="100" width="200" height="510" rx="20" ry="20" fill="#000"/>
  <!-- Housing inner panel -->
  <rect x="310" y="110" width="180" height="490" rx="15" ry="15" fill="#000" stroke="#457B9D" stroke-width="3"/>
  <!-- Visor/hood for top light -->
  <path d="M295,170 L300,130 L500,130 L505,170" fill="#000" stroke="#6D2E46" stroke-width="2"/>
  <!-- Visor for middle light -->
  <path d="M295,330 L300,290 L500,290 L505,330" fill="#000" stroke="#6D2E46" stroke-width="2"/>
  <!-- Visor for bottom light -->
  <path d="M295,490 L300,450 L500,450 L505,490" fill="#000" stroke="#6D2E46" stroke-width="2"/>
  <!-- Top light - RED (active/glowing) -->
  <circle cx="400" cy="210" r="60" fill="#E63946"/>
  <circle cx="400" cy="210" r="50" fill="#E63946" opacity="0.8"/>
  <circle cx="400" cy="210" r="35" fill="#FFF" opacity="0.3"/>
  <circle cx="400" cy="210" r="18" fill="#FFF" opacity="0.5"/>
  <!-- Red glow effect -->
  <circle cx="400" cy="210" r="75" fill="#E63946" opacity="0.15"/>
  <!-- Middle light - YELLOW (dim) -->
  <circle cx="400" cy="370" r="60" fill="#F4D35E" opacity="0.4"/>
  <circle cx="400" cy="370" r="50" fill="#F4D35E" opacity="0.3"/>
  <circle cx="400" cy="370" r="35" fill="#000" opacity="0.3"/>
  <!-- Bottom light - GREEN/TEAL (dim) -->
  <circle cx="400" cy="530" r="60" fill="#2A9D8F" opacity="0.4"/>
  <circle cx="400" cy="530" r="50" fill="#2A9D8F" opacity="0.3"/>
  <circle cx="400" cy="530" r="35" fill="#000" opacity="0.3"/>
  <!-- Housing bolts/rivets -->
  <circle cx="315" cy="120" r="5" fill="#457B9D"/>
  <circle cx="485" cy="120" r="5" fill="#457B9D"/>
  <circle cx="315" cy="590" r="5" fill="#457B9D"/>
  <circle cx="485" cy="590" r="5" fill="#457B9D"/>
  <!-- Light rays emanating from red light -->
  <line x1="470" y1="180" x2="600" y2="120" stroke="#E63946" stroke-width="3" opacity="0.5"/>
  <line x1="470" y1="210" x2="620" y2="210" stroke="#E63946" stroke-width="3" opacity="0.5"/>
  <line x1="470" y1="240" x2="600" y2="300" stroke="#E63946" stroke-width="3" opacity="0.5"/>
  <line x1="330" y1="180" x2="200" y2="120" stroke="#E63946" stroke-width="3" opacity="0.5"/>
  <line x1="330" y1="210" x2="180" y2="210" stroke="#E63946" stroke-width="3" opacity="0.5"/>
  <line x1="330" y1="240" x2="200" y2="300" stroke="#E63946" stroke-width="3" opacity="0.5"/>
  <!-- Ground/road context -->
  <rect x="0" y="770" width="800" height="30" fill="#000"/>
  <!-- Bauhaus decorative elements -->
  <rect x="50" y="650" width="80" height="40" fill="#F4D35E" opacity="0.6"/>
  <rect x="670" y="650" width="80" height="40" fill="#2A9D8F" opacity="0.6"/>
  <!-- Stars/night dots -->
  <circle cx="100" cy="100" r="3" fill="#FFF"/>
  <circle cx="700" cy="80" r="3" fill="#FFF"/>
  <circle cx="650" cy="400" r="3" fill="#FFF"/>
  <circle cx="150" cy="500" r="3" fill="#FFF"/>
</svg>