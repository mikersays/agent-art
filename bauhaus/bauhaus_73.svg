<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Background grid lines for clinical/monitor feel -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#E9C46A" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#E9C46A" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#E9C46A" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#E9C46A" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#E9C46A" stroke-width="0.5" opacity="0.3"/>

  <!-- Vertical grid -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#E9C46A" stroke-width="0.5" opacity="0.2"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#E9C46A" stroke-width="0.5" opacity="0.2"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#E9C46A" stroke-width="0.5" opacity="0.2"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#E9C46A" stroke-width="0.5" opacity="0.2"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#E9C46A" stroke-width="0.5" opacity="0.2"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#E9C46A" stroke-width="0.5" opacity="0.2"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#E9C46A" stroke-width="0.5" opacity="0.2"/>

  <!-- ECG/Heartbeat pulse line -->
  <polyline points="0,400 60,400 80,400 100,390 120,400 140,400
    170,400 185,380 200,340 215,160 230,520 245,350 260,400
    290,400 320,400 340,395 360,400
    400,400 420,400 440,390 455,370 470,320 485,130 500,550 515,330 530,400
    560,400 590,400 610,395 630,400
    660,400 680,400 695,385 710,350 725,200 740,500 755,360 770,400
    800,400"
    fill="none" stroke="#E63946" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Geometric shapes at peaks -->
  <!-- Peak 1 - triangle -->
  <polygon points="215,160 195,120 235,120" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <!-- Peak 1 valley - circle -->
  <circle cx="230" cy="520" r="15" fill="#1D3557" stroke="#000000" stroke-width="2"/>

  <!-- Peak 2 - diamond -->
  <polygon points="485,130 465,105 485,80 505,105" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <!-- Peak 2 valley - square -->
  <rect x="490" y="540" width="25" height="25" fill="#264653" stroke="#000000" stroke-width="2"/>

  <!-- Peak 3 - circle -->
  <circle cx="725" cy="200" r="18" fill="#DDA15E" stroke="#000000" stroke-width="2"/>
  <!-- Peak 3 valley - triangle inverted -->
  <polygon points="740,500 720,535 760,535" fill="#E9C46A" stroke="#000000" stroke-width="2"/>

  <!-- Decorative geometric elements along the line -->
  <rect x="55" y="393" width="14" height="14" fill="#1D3557" opacity="0.6"/>
  <circle cx="320" cy="400" r="8" fill="#264653" opacity="0.5"/>
  <circle cx="590" cy="400" r="8" fill="#264653" opacity="0.5"/>
  <rect x="143" y="394" width="10" height="10" fill="#E63946" opacity="0.4" transform="rotate(45,148,399)"/>

  <!-- Top decorative bar -->
  <rect x="0" y="0" width="800" height="12" fill="#000000"/>
  <rect x="0" y="12" width="200" height="6" fill="#E63946"/>
  <rect x="200" y="12" width="200" height="6" fill="#F4D35E"/>
  <rect x="400" y="12" width="200" height="6" fill="#1D3557"/>
  <rect x="600" y="12" width="200" height="6" fill="#264653"/>

  <!-- Bottom decorative bar -->
  <rect x="0" y="782" width="800" height="18" fill="#000000"/>
  <rect x="0" y="776" width="200" height="6" fill="#264653"/>
  <rect x="200" y="776" width="200" height="6" fill="#1D3557"/>
  <rect x="400" y="776" width="200" height="6" fill="#F4D35E"/>
  <rect x="600" y="776" width="200" height="6" fill="#E63946"/>

  <!-- Side accents -->
  <rect x="0" y="350" width="8" height="100" fill="#E63946" opacity="0.6"/>
  <rect x="792" y="350" width="8" height="100" fill="#E63946" opacity="0.6"/>
</svg>