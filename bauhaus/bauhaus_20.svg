<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Outer building footprint -->
  <rect x="80" y="80" width="640" height="640" fill="none" stroke="#000000" stroke-width="4"/>

  <!-- Main structural walls -->
  <!-- Horizontal walls -->
  <line x1="80" y1="250" x2="500" y2="250" stroke="#000000" stroke-width="4"/>
  <line x1="80" y1="450" x2="720" y2="450" stroke="#000000" stroke-width="4"/>
  <line x1="300" y1="580" x2="720" y2="580" stroke="#000000" stroke-width="4"/>
  <line x1="550" y1="250" x2="720" y2="250" stroke="#000000" stroke-width="3"/>

  <!-- Vertical walls -->
  <line x1="300" y1="80" x2="300" y2="450" stroke="#000000" stroke-width="4"/>
  <line x1="500" y1="250" x2="500" y2="720" stroke="#000000" stroke-width="4"/>
  <line x1="300" y1="580" x2="300" y2="720" stroke="#000000" stroke-width="3"/>
  <line x1="180" y1="450" x2="180" y2="720" stroke="#000000" stroke-width="3"/>
  <line x1="620" y1="250" x2="620" y2="450" stroke="#000000" stroke-width="3"/>

  <!-- Room fills - colored rectangles -->
  <!-- Large room top-left: Living -->
  <rect x="82" y="82" width="216" height="166" fill="#1D3557" opacity="0.25"/>

  <!-- Top-center room: Dining -->
  <rect x="302" y="82" width="196" height="166" fill="#E63946" opacity="0.2"/>

  <!-- Top-right room: Study -->
  <rect x="552" y="82" width="166" height="166" fill="#F4D35E" opacity="0.3"/>

  <!-- Middle-right room: Kitchen -->
  <rect x="622" y="252" width="96" height="196" fill="#2A9D8F" opacity="0.25"/>

  <!-- Middle-center room: Hallway/corridor -->
  <rect x="502" y="252" width="116" height="196" fill="#FEFAE0" opacity="0.5"/>

  <!-- Middle-left room: Bedroom 1 -->
  <rect x="82" y="252" width="216" height="196" fill="#E76F51" opacity="0.2"/>

  <!-- Center room -->
  <rect x="302" y="252" width="196" height="196" fill="#F4D35E" opacity="0.15"/>

  <!-- Bottom-left room: Bath -->
  <rect x="82" y="452" width="96" height="266" fill="#2A9D8F" opacity="0.3"/>

  <!-- Bottom-center-left: Bedroom 2 -->
  <rect x="182" y="452" width="116" height="266" fill="#1D3557" opacity="0.2"/>

  <!-- Bottom-center: Utility -->
  <rect x="302" y="452" width="196" height="126" fill="#E63946" opacity="0.15"/>

  <!-- Bottom-center-right: Storage -->
  <rect x="302" y="582" width="196" height="136" fill="#000000" opacity="0.08"/>

  <!-- Bottom-right room: Garden/Terrace -->
  <rect x="502" y="452" width="216" height="266" fill="#2A9D8F" opacity="0.12"/>

  <!-- Door openings (gaps in walls shown as white rects) -->
  <!-- Door in top wall between living and dining -->
  <rect x="290" y="76" width="20" height="12" fill="#FFFFFF"/>
  <line x1="290" y1="80" x2="280" y2="60" stroke="#000000" stroke-width="1" opacity="0.5"/>

  <!-- Door between living and bedroom -->
  <rect x="150" y="244" width="30" height="12" fill="#FFFFFF"/>

  <!-- Door between hall and kitchen -->
  <rect x="616" y="320" width="12" height="30" fill="#FFFFFF"/>

  <!-- Door between bedroom1 and center -->
  <rect x="294" y="330" width="12" height="30" fill="#FFFFFF"/>

  <!-- Door to bottom rooms -->
  <rect x="220" y="444" width="30" height="12" fill="#FFFFFF"/>
  <rect x="370" y="444" width="30" height="12" fill="#FFFFFF"/>

  <!-- Door bottom-right -->
  <rect x="494" y="500" width="12" height="30" fill="#FFFFFF"/>

  <!-- Staircase symbol -->
  <line x1="510" y1="260" x2="540" y2="260" stroke="#000000" stroke-width="1"/>
  <line x1="510" y1="270" x2="540" y2="270" stroke="#000000" stroke-width="1"/>
  <line x1="510" y1="280" x2="540" y2="280" stroke="#000000" stroke-width="1"/>
  <line x1="510" y1="290" x2="540" y2="290" stroke="#000000" stroke-width="1"/>
  <line x1="510" y1="300" x2="540" y2="300" stroke="#000000" stroke-width="1"/>
  <line x1="510" y1="310" x2="540" y2="310" stroke="#000000" stroke-width="1"/>
  <line x1="510" y1="320" x2="540" y2="320" stroke="#000000" stroke-width="1"/>
  <rect x="508" y="258" width="34" height="64" fill="none" stroke="#000000" stroke-width="1.5"/>
  <polygon points="525,258 510,258 525,270" fill="#000000" opacity="0.3"/>

  <!-- Window markers on exterior walls -->
  <!-- Top windows -->
  <rect x="140" y="76" width="40" height="8" fill="#1D3557"/>
  <rect x="370" y="76" width="40" height="8" fill="#1D3557"/>
  <rect x="600" y="76" width="40" height="8" fill="#1D3557"/>

  <!-- Right windows -->
  <rect x="716" y="140" width="8" height="40" fill="#1D3557"/>
  <rect x="716" y="330" width="8" height="40" fill="#1D3557"/>
  <rect x="716" y="520" width="8" height="40" fill="#1D3557"/>

  <!-- Bottom windows -->
  <rect x="120" y="716" width="40" height="8" fill="#1D3557"/>
  <rect x="380" y="716" width="40" height="8" fill="#1D3557"/>
  <rect x="600" y="716" width="40" height="8" fill="#1D3557"/>

  <!-- Left windows -->
  <rect x="76" y="150" width="8" height="40" fill="#1D3557"/>
  <rect x="76" y="340" width="8" height="40" fill="#1D3557"/>
  <rect x="76" y="550" width="8" height="40" fill="#1D3557"/>

  <!-- Interior furniture hints - geometric only -->
  <!-- Table in dining -->
  <rect x="360" y="130" width="80" height="50" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Bed in bedroom 1 -->
  <rect x="120" y="300" width="70" height="100" fill="none" stroke="#000000" stroke-width="1.5"/>
  <line x1="120" y1="330" x2="190" y2="330" stroke="#000000" stroke-width="1"/>

  <!-- Bathtub in bath -->
  <ellipse cx="130" cy="560" rx="30" ry="18" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Bed in bedroom 2 -->
  <rect x="210" y="530" width="60" height="90" fill="none" stroke="#000000" stroke-width="1.5"/>
  <line x1="210" y1="555" x2="270" y2="555" stroke="#000000" stroke-width="1"/>

  <!-- Terrace pattern -->
  <line x1="520" y1="470" x2="520" y2="700" stroke="#2A9D8F" stroke-width="0.5" opacity="0.4"/>
  <line x1="560" y1="470" x2="560" y2="700" stroke="#2A9D8F" stroke-width="0.5" opacity="0.4"/>
  <line x1="600" y1="470" x2="600" y2="700" stroke="#2A9D8F" stroke-width="0.5" opacity="0.4"/>
  <line x1="640" y1="470" x2="640" y2="700" stroke="#2A9D8F" stroke-width="0.5" opacity="0.4"/>
  <line x1="680" y1="470" x2="680" y2="700" stroke="#2A9D8F" stroke-width="0.5" opacity="0.4"/>

  <!-- Dimension markers - architectural style -->
  <!-- Top dimension -->
  <line x1="80" y1="50" x2="720" y2="50" stroke="#E63946" stroke-width="1"/>
  <line x1="80" y1="45" x2="80" y2="55" stroke="#E63946" stroke-width="1"/>
  <line x1="300" y1="45" x2="300" y2="55" stroke="#E63946" stroke-width="1"/>
  <line x1="500" y1="45" x2="500" y2="55" stroke="#E63946" stroke-width="1"/>
  <line x1="720" y1="45" x2="720" y2="55" stroke="#E63946" stroke-width="1"/>

  <!-- Left dimension -->
  <line x1="50" y1="80" x2="50" y2="720" stroke="#E63946" stroke-width="1"/>
  <line x1="45" y1="80" x2="55" y2="80" stroke="#E63946" stroke-width="1"/>
  <line x1="45" y1="250" x2="55" y2="250" stroke="#E63946" stroke-width="1"/>
  <line x1="45" y1="450" x2="55" y2="450" stroke="#E63946" stroke-width="1"/>
  <line x1="45" y1="720" x2="55" y2="720" stroke="#E63946" stroke-width="1"/>

  <!-- North arrow -->
  <polygon points="750,30 745,55 755,55" fill="#000000"/>
  <line x1="750" y1="55" x2="750" y2="70" stroke="#000000" stroke-width="2"/>

  <!-- Corner accent squares -->
  <rect x="30" y="30" width="15" height="15" fill="#E63946"/>
  <rect x="755" y="755" width="15" height="15" fill="#1D3557"/>
</svg>