<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>

  <!-- Large transparent blue rectangle overlaying top-right quadrant -->
  <rect x="380" y="40" width="380" height="380" fill="#1D3557" opacity="0.12"/>

  <!-- Dot grid - Row 1 (y=80) -->
  <circle cx="100" cy="80" r="10" fill="#A89F91" opacity="0.6"/>
  <circle cx="200" cy="80" r="8" fill="#E63946" opacity="0.7"/>
  <circle cx="300" cy="80" r="10" fill="#1D3557" opacity="0.5"/>
  <circle cx="400" cy="80" r="12" fill="#F4D35E" opacity="0.8"/>
  <circle cx="500" cy="80" r="9" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="600" cy="80" r="10" fill="#264653" opacity="0.65"/>
  <circle cx="700" cy="80" r="8" fill="#A89F91" opacity="0.5"/>

  <!-- Row 2 (y=180) -->
  <circle cx="100" cy="180" r="9" fill="#2A9D8F" opacity="0.55"/>
  <circle cx="200" cy="180" r="15" fill="#1D3557" opacity="0.8"/>
  <circle cx="300" cy="180" r="10" fill="#E76F51" opacity="0.7"/>
  <circle cx="400" cy="180" r="8" fill="#A89F91" opacity="0.5"/>
  <circle cx="500" cy="180" r="13" fill="#E63946" opacity="0.75"/>
  <circle cx="600" cy="180" r="10" fill="#F4D35E" opacity="0.7"/>
  <circle cx="700" cy="180" r="11" fill="#457B9D" opacity="0.6"/>

  <!-- Row 3 (y=280) -->
  <circle cx="100" cy="280" r="10" fill="#F4D35E" opacity="0.65"/>
  <circle cx="200" cy="280" r="8" fill="#264653" opacity="0.5"/>
  <circle cx="300" cy="280" r="14" fill="#E63946" opacity="0.85"/>
  <circle cx="400" cy="280" r="10" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="500" cy="280" r="8" fill="#DDA15E" opacity="0.55"/>
  <circle cx="600" cy="280" r="15" fill="#1D3557" opacity="0.8"/>
  <circle cx="700" cy="280" r="10" fill="#E76F51" opacity="0.65"/>

  <!-- Row 4 (y=380) -->
  <circle cx="100" cy="380" r="8" fill="#457B9D" opacity="0.5"/>
  <circle cx="200" cy="380" r="12" fill="#F4D35E" opacity="0.75"/>
  <circle cx="300" cy="380" r="9" fill="#1D3557" opacity="0.6"/>
  <circle cx="400" cy="380" r="15" fill="#000000" opacity="0.7"/>
  <circle cx="500" cy="380" r="10" fill="#F4D35E" opacity="0.7"/>
  <circle cx="600" cy="380" r="8" fill="#2A9D8F" opacity="0.55"/>
  <circle cx="700" cy="380" r="12" fill="#E63946" opacity="0.7"/>

  <!-- Row 5 (y=480) -->
  <circle cx="100" cy="480" r="11" fill="#E63946" opacity="0.7"/>
  <circle cx="200" cy="480" r="9" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="300" cy="480" r="10" fill="#A89F91" opacity="0.5"/>
  <circle cx="400" cy="480" r="8" fill="#E76F51" opacity="0.6"/>
  <circle cx="500" cy="480" r="14" fill="#264653" opacity="0.8"/>
  <circle cx="600" cy="480" r="10" fill="#DDA15E" opacity="0.65"/>
  <circle cx="700" cy="480" r="9" fill="#1D3557" opacity="0.55"/>

  <!-- Row 6 (y=580) -->
  <circle cx="100" cy="580" r="10" fill="#264653" opacity="0.6"/>
  <circle cx="200" cy="580" r="13" fill="#E76F51" opacity="0.75"/>
  <circle cx="300" cy="580" r="8" fill="#F4D35E" opacity="0.55"/>
  <circle cx="400" cy="580" r="11" fill="#1D3557" opacity="0.65"/>
  <circle cx="500" cy="580" r="9" fill="#E63946" opacity="0.6"/>
  <circle cx="600" cy="580" r="15" fill="#F4D35E" opacity="0.85"/>
  <circle cx="700" cy="580" r="10" fill="#2A9D8F" opacity="0.6"/>

  <!-- Row 7 (y=680) -->
  <circle cx="100" cy="680" r="8" fill="#DDA15E" opacity="0.5"/>
  <circle cx="200" cy="680" r="10" fill="#1D3557" opacity="0.6"/>
  <circle cx="300" cy="680" r="12" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="400" cy="680" r="9" fill="#A89F91" opacity="0.5"/>
  <circle cx="500" cy="680" r="10" fill="#E76F51" opacity="0.6"/>
  <circle cx="600" cy="680" r="8" fill="#264653" opacity="0.55"/>
  <circle cx="700" cy="680" r="14" fill="#E63946" opacity="0.8"/>

  <!-- Connecting lines between select dots -->
  <line x1="200" y1="180" x2="300" y2="280" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="300" y1="280" x2="400" y2="380" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="380" x2="500" y2="480" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="500" y1="480" x2="600" y2="580" stroke="#000000" stroke-width="1" opacity="0.15"/>

  <line x1="600" y1="280" x2="500" y2="380" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="500" y1="380" x2="600" y2="480" stroke="#000000" stroke-width="1" opacity="0.12"/>

  <line x1="100" y1="480" x2="200" y2="480" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="200" y1="480" x2="300" y2="480" stroke="#000000" stroke-width="1" opacity="0.1"/>

  <line x1="400" y1="80" x2="500" y2="180" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="500" y1="180" x2="600" y2="280" stroke="#000000" stroke-width="1" opacity="0.12"/>

  <line x1="200" y1="580" x2="300" y2="680" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="700" y1="380" x2="700" y2="480" stroke="#000000" stroke-width="1" opacity="0.1"/>

  <!-- Focal point highlights - larger circles with low opacity rings -->
  <circle cx="400" cy="380" r="25" fill="none" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <circle cx="300" cy="280" r="22" fill="none" stroke="#E63946" stroke-width="0.8" opacity="0.15"/>
  <circle cx="600" cy="580" r="23" fill="none" stroke="#F4D35E" stroke-width="0.8" opacity="0.15"/>
</svg>