<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Bold black base line -->
  <line x1="80" y1="700" x2="720" y2="700" stroke="#000000" stroke-width="4"/>
  <!-- LEFT COLUMN (x=150): stacked rectangles in blues/teals, tight spacing -->
  <rect x="115" y="100" width="70" height="50" fill="#1D3557" opacity="0.9"/>
  <rect x="115" y="155" width="70" height="45" fill="#457B9D" opacity="0.85"/>
  <rect x="115" y="205" width="70" height="55" fill="#2A9D8F" opacity="0.9"/>
  <rect x="115" y="265" width="70" height="40" fill="#1D3557" opacity="0.7"/>
  <rect x="115" y="310" width="70" height="60" fill="#A8DADC" opacity="0.8"/>
  <rect x="115" y="375" width="70" height="45" fill="#264653" opacity="0.9"/>
  <rect x="115" y="425" width="70" height="50" fill="#457B9D" opacity="0.75"/>
  <rect x="115" y="480" width="70" height="55" fill="#2A9D8F" opacity="0.85"/>
  <rect x="115" y="540" width="70" height="40" fill="#1D3557" opacity="0.8"/>
  <rect x="115" y="585" width="70" height="60" fill="#A8DADC" opacity="0.7"/>
  <rect x="115" y="650" width="70" height="45" fill="#264653" opacity="0.9"/>
  <!-- CENTER COLUMN (x=400): alternating circles and squares in red/yellow -->
  <circle cx="400" cy="120" r="28" fill="#E63946" opacity="0.9"/>
  <rect x="375" y="190" width="50" height="50" fill="#F4D35E" opacity="0.85"/>
  <circle cx="400" cy="300" r="32" fill="#E63946" opacity="0.8"/>
  <rect x="378" y="370" width="44" height="44" fill="#F4D35E" opacity="0.9"/>
  <circle cx="400" cy="465" r="26" fill="#E63946" opacity="0.85"/>
  <rect x="372" y="530" width="56" height="56" fill="#F4D35E" opacity="0.8"/>
  <circle cx="400" cy="640" r="30" fill="#E63946" opacity="0.9"/>
  <!-- RIGHT COLUMN (x=650): triangles and diamonds in orange/burgundy -->
  <polygon points="650,100 680,160 620,160" fill="#E76F51" opacity="0.9"/>
  <polygon points="650,210 675,250 650,290 625,250" fill="#6D2E46" opacity="0.85"/>
  <polygon points="650,320 685,390 615,390" fill="#E76F51" opacity="0.8"/>
  <polygon points="650,420 680,470 650,520 620,470" fill="#6D2E46" opacity="0.9"/>
  <polygon points="650,540 678,600 622,600" fill="#E76F51" opacity="0.85"/>
  <polygon points="650,620 672,660 650,700 628,660" fill="#6D2E46" opacity="0.8"/>
  <!-- Thin black horizontal connectors between columns -->
  <line x1="185" y1="125" x2="372" y2="125" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <line x1="185" y1="310" x2="368" y2="300" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <line x1="185" y1="480" x2="374" y2="465" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <line x1="185" y1="650" x2="370" y2="640" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <line x1="430" y1="120" x2="620" y2="130" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <line x1="428" y1="300" x2="615" y2="355" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <line x1="426" y1="465" x2="620" y2="470" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <line x1="430" y1="640" x2="628" y2="640" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <!-- Small coral dots at intersections -->
  <circle cx="185" cy="125" r="4" fill="#E9C46A"/>
  <circle cx="185" cy="310" r="4" fill="#E9C46A"/>
  <circle cx="185" cy="480" r="4" fill="#E9C46A"/>
  <circle cx="185" cy="650" r="4" fill="#E9C46A"/>
  <circle cx="430" cy="120" r="4" fill="#E9C46A"/>
  <circle cx="428" cy="300" r="4" fill="#E9C46A"/>
  <circle cx="426" cy="465" r="4" fill="#E9C46A"/>
  <circle cx="430" cy="640" r="4" fill="#E9C46A"/>
  <circle cx="620" cy="130" r="4" fill="#E9C46A"/>
  <circle cx="615" cy="355" r="4" fill="#E9C46A"/>
  <circle cx="620" cy="470" r="4" fill="#E9C46A"/>
  <circle cx="628" cy="640" r="4" fill="#E9C46A"/>
</svg>