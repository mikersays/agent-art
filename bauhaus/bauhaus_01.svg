<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Large blue circle -->
  <circle cx="320" cy="350" r="180" fill="#1D3557" opacity="0.85"/>

  <!-- Large red circle overlapping -->
  <circle cx="500" cy="300" r="150" fill="#E63946" opacity="0.8"/>

  <!-- Medium yellow circle -->
  <circle cx="400" cy="520" r="130" fill="#F4D35E" opacity="0.85"/>

  <!-- Small black circle -->
  <circle cx="250" cy="200" r="60" fill="#000000"/>

  <!-- Small white circle with black stroke -->
  <circle cx="600" cy="180" r="45" fill="#FFFFFF" stroke="#000000" stroke-width="3"/>

  <!-- Tiny red circle -->
  <circle cx="150" cy="500" r="35" fill="#E63946"/>

  <!-- Tiny blue circle -->
  <circle cx="680" cy="450" r="50" fill="#1D3557" opacity="0.7"/>

  <!-- Medium black circle outline -->
  <circle cx="350" cy="650" r="80" fill="none" stroke="#000000" stroke-width="4"/>

  <!-- Small yellow circle -->
  <circle cx="550" cy="600" r="40" fill="#F4D35E"/>

  <!-- Micro circles cluster -->
  <circle cx="100" cy="100" r="25" fill="#E63946"/>
  <circle cx="140" cy="80" r="18" fill="#1D3557"/>
  <circle cx="120" cy="130" r="20" fill="#F4D35E"/>

  <!-- Large outline circle -->
  <circle cx="400" cy="400" r="280" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Intersecting thin black lines -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="1.5"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="1.5"/>
  <line x1="50" y1="200" x2="750" y2="200" stroke="#000000" stroke-width="1"/>
  <line x1="100" y1="600" x2="700" y2="600" stroke="#000000" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="1"/>
  <line x1="600" y1="50" x2="600" y2="750" stroke="#000000" stroke-width="1"/>

  <!-- Diagonal thin lines -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="0.75"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#000000" stroke-width="0.75"/>

  <!-- Additional small circles at intersections -->
  <circle cx="200" cy="200" r="12" fill="#000000"/>
  <circle cx="600" cy="600" r="12" fill="#E63946"/>
  <circle cx="200" cy="600" r="12" fill="#1D3557"/>
  <circle cx="600" cy="200" r="12" fill="#F4D35E"/>

  <!-- Large semi-transparent overlapping circle -->
  <circle cx="700" cy="700" r="100" fill="#1D3557" opacity="0.3"/>
  <circle cx="100" cy="700" r="70" fill="#E63946" opacity="0.4"/>
</svg>