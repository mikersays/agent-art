<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Steel blue background -->
  <rect width="800" height="800" fill="#457B9D"/>
  <!-- Subtle grid lines -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#FFFFFF" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#FFFFFF" stroke-width="0.5" opacity="0.05"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#FFFFFF" stroke-width="0.5" opacity="0.05"/>
  <!-- Central vertical spine -->
  <line x1="400" y1="80" x2="400" y2="720" stroke="#000000" stroke-width="3"/>
  <!-- Top horizontal bar -->
  <line x1="180" y1="160" x2="620" y2="160" stroke="#000000" stroke-width="2.5"/>
  <!-- Hanging line from left of top bar -->
  <line x1="220" y1="160" x2="220" y2="280" stroke="#000000" stroke-width="1.5"/>
  <!-- Red circle hanging -->
  <circle cx="220" cy="310" r="30" fill="#E63946" opacity="0.9"/>
  <!-- Hanging line from right of top bar -->
  <line x1="560" y1="160" x2="560" y2="240" stroke="#000000" stroke-width="1.5"/>
  <!-- Yellow square hanging -->
  <rect x="535" y="245" width="50" height="50" fill="#F4D35E" opacity="0.9"/>
  <!-- Second horizontal bar -->
  <line x1="250" y1="340" x2="550" y2="340" stroke="#000000" stroke-width="2"/>
  <!-- Hanging from second bar left -->
  <line x1="300" y1="340" x2="300" y2="430" stroke="#000000" stroke-width="1.5"/>
  <!-- Blue circle -->
  <circle cx="300" cy="460" r="28" fill="#1D3557" opacity="0.9"/>
  <!-- Hanging from second bar right -->
  <line x1="500" y1="340" x2="500" y2="400" stroke="#000000" stroke-width="1.5"/>
  <!-- Small red square -->
  <rect x="482" y="405" width="36" height="36" fill="#E63946" opacity="0.85"/>
  <!-- Third horizontal bar - wider left -->
  <line x1="120" y1="500" x2="480" y2="500" stroke="#000000" stroke-width="2"/>
  <!-- Hanging from third bar far left -->
  <line x1="160" y1="500" x2="160" y2="580" stroke="#000000" stroke-width="1.5"/>
  <!-- Yellow circle -->
  <circle cx="160" cy="608" r="25" fill="#F4D35E" opacity="0.85"/>
  <!-- Hanging from third bar mid -->
  <line x1="350" y1="500" x2="350" y2="560" stroke="#000000" stroke-width="1.5"/>
  <!-- Teal square -->
  <rect x="330" y="565" width="40" height="40" fill="#2A9D8F" opacity="0.9"/>
  <!-- Fourth bar extending right -->
  <line x1="400" y1="620" x2="680" y2="620" stroke="#000000" stroke-width="2"/>
  <!-- Hanging from fourth bar -->
  <line x1="600" y1="620" x2="600" y2="700" stroke="#000000" stroke-width="1.5"/>
  <!-- Blue square -->
  <rect x="578" y="705" width="44" height="44" fill="#1D3557" opacity="0.9"/>
  <!-- Hanging small circle right -->
  <line x1="660" y1="620" x2="660" y2="670" stroke="#000000" stroke-width="1"/>
  <circle cx="660" cy="685" r="14" fill="#E63946" opacity="0.8"/>
  <!-- Small accent shapes floating -->
  <circle cx="100" cy="120" r="8" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="700" cy="100" r="10" fill="#F4D35E" opacity="0.5"/>
  <rect x="680" y="400" width="20" height="20" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="80" cy="680" r="12" fill="#E9C46A" opacity="0.5"/>
  <rect x="720" y="700" width="18" height="18" fill="#A8DADC" opacity="0.4"/>
  <!-- Top pivot point -->
  <circle cx="400" cy="80" r="8" fill="#000000"/>
  <!-- Bottom weight -->
  <circle cx="400" cy="720" r="10" fill="#000000" opacity="0.7"/>
  <!-- Counterweight circles on bars -->
  <circle cx="180" cy="160" r="5" fill="#000000"/>
  <circle cx="620" cy="160" r="5" fill="#000000"/>
  <circle cx="250" cy="340" r="4" fill="#000000"/>
  <circle cx="550" cy="340" r="4" fill="#000000"/>
  <circle cx="120" cy="500" r="4" fill="#000000"/>
  <circle cx="480" cy="500" r="4" fill="#000000"/>
  <circle cx="680" cy="620" r="4" fill="#000000"/>
  <!-- Thin diagonal accent lines -->
  <line x1="100" y1="200" x2="180" y2="160" stroke="#FFFFFF" stroke-width="0.5" opacity="0.2"/>
  <line x1="700" y1="300" x2="620" y2="160" stroke="#FFFFFF" stroke-width="0.5" opacity="0.15"/>
</svg>