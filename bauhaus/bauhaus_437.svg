<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Sky background (warm cream) -->
  <rect width="800" height="267" fill="#FEFAE0"/>
  <!-- Ground background (dark cool) -->
  <rect y="267" width="800" height="533" fill="#264653"/>

  <!-- Strong horizon line -->
  <rect y="261" width="800" height="12" fill="#000000"/>

  <!-- Sky zone: warm scattered shapes -->
  <!-- Large red circle, upper left -->
  <circle cx="130" cy="110" r="72" fill="#E63946" opacity="0.90"/>
  <!-- Orange rectangle -->
  <rect x="240" y="40" width="90" height="55" fill="#E76F51" opacity="0.85"/>
  <!-- Coral/sand diamond -->
  <polygon points="430,50 460,100 430,150 400,100" fill="#E9C46A" opacity="0.88"/>
  <!-- Sand square -->
  <rect x="530" y="70" width="65" height="65" fill="#DDA15E" opacity="0.80"/>
  <!-- Red triangle -->
  <polygon points="680,30 740,140 620,140" fill="#E63946" opacity="0.70"/>
  <!-- Small orange circle -->
  <circle cx="360" cy="185" r="28" fill="#E76F51" opacity="0.75"/>
  <!-- Small yellow square -->
  <rect x="480" y="160" width="40" height="40" fill="#F4D35E" opacity="0.85"/>
  <!-- Coral ellipse -->
  <ellipse cx="620" cy="190" rx="50" ry="28" fill="#E9C46A" opacity="0.72"/>
  <!-- Sand small circle -->
  <circle cx="100" cy="220" r="18" fill="#DDA15E" opacity="0.65"/>
  <!-- Warm gray rect -->
  <rect x="690" y="150" width="50" height="30" fill="#A89F91" opacity="0.60"/>
  <!-- Tiny red squares scattered -->
  <rect x="200" y="210" width="18" height="18" fill="#E63946" opacity="0.55"/>
  <rect x="280" y="130" width="14" height="14" fill="#E76F51" opacity="0.60"/>
  <rect x="590" y="130" width="20" height="20" fill="#F4D35E" opacity="0.70"/>
  <!-- Thin diagonal accent line in sky -->
  <line x1="0" y1="267" x2="800" y2="0" stroke="#A89F91" stroke-width="1" opacity="0.18"/>
  <line x1="0" y1="0" x2="800" y2="267" stroke="#A89F91" stroke-width="1" opacity="0.10"/>

  <!-- Ground zone: cool vertical lines and rectangles -->
  <!-- Vertical structural lines, teal/blue/forest -->
  <line x1="60" y1="273" x2="60" y2="800" stroke="#2A9D8F" stroke-width="3" opacity="0.85"/>
  <line x1="130" y1="273" x2="130" y2="800" stroke="#457B9D" stroke-width="2" opacity="0.70"/>
  <line x1="200" y1="273" x2="200" y2="800" stroke="#1D3557" stroke-width="4" opacity="0.90"/>
  <line x1="270" y1="273" x2="270" y2="800" stroke="#2A9D8F" stroke-width="1.5" opacity="0.60"/>
  <line x1="340" y1="273" x2="340" y2="800" stroke="#457B9D" stroke-width="2.5" opacity="0.75"/>
  <line x1="410" y1="273" x2="410" y2="800" stroke="#1D3557" stroke-width="3.5" opacity="0.85"/>
  <line x1="480" y1="273" x2="480" y2="800" stroke="#2A9D8F" stroke-width="2" opacity="0.65"/>
  <line x1="550" y1="273" x2="550" y2="800" stroke="#457B9D" stroke-width="3" opacity="0.78"/>
  <line x1="620" y1="273" x2="620" y2="800" stroke="#1D3557" stroke-width="1.5" opacity="0.60"/>
  <line x1="690" y1="273" x2="690" y2="800" stroke="#2A9D8F" stroke-width="4" opacity="0.88"/>
  <line x1="755" y1="273" x2="755" y2="800" stroke="#457B9D" stroke-width="2" opacity="0.55"/>

  <!-- Ground rectangles: cool tones -->
  <rect x="75" y="360" width="45" height="120" fill="#2A9D8F" opacity="0.60"/>
  <rect x="215" y="310" width="40" height="200" fill="#1D3557" opacity="0.70"/>
  <rect x="355" y="380" width="35" height="150" fill="#457B9D" opacity="0.55"/>
  <rect x="425" y="430" width="40" height="230" fill="#2A9D8F" opacity="0.50"/>
  <rect x="565" y="350" width="45" height="180" fill="#1D3557" opacity="0.65"/>
  <rect x="635" y="440" width="35" height="140" fill="#457B9D" opacity="0.50"/>
  <rect x="705" y="510" width="30" height="100" fill="#264653" opacity="0.80"/>

  <!-- Horizontal ground bands (subtle) -->
  <rect x="0" y="450" width="800" height="6" fill="#457B9D" opacity="0.18"/>
  <rect x="0" y="600" width="800" height="4" fill="#2A9D8F" opacity="0.15"/>
  <rect x="0" y="720" width="800" height="3" fill="#1D3557" opacity="0.20"/>

  <!-- Small cool accent circles near horizon -->
  <circle cx="160" cy="310" r="12" fill="#A8DADC" opacity="0.75"/>
  <circle cx="500" cy="330" r="9" fill="#A8DADC" opacity="0.60"/>
  <circle cx="730" cy="295" r="14" fill="#457B9D" opacity="0.70"/>

  <!-- Corner accents -->
  <rect x="0" y="0" width="30" height="30" fill="#E63946" opacity="0.40"/>
  <rect x="770" y="0" width="30" height="30" fill="#1D3557" opacity="0.40"/>
  <rect x="0" y="770" width="30" height="30" fill="#2A9D8F" opacity="0.40"/>
  <rect x="770" y="770" width="30" height="30" fill="#264653" opacity="0.40"/>
</svg>
