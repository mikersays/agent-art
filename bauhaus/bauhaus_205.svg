<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFF"/>
  <!-- Background decorative circles -->
  <circle cx="100" cy="650" r="80" fill="#F4D35E" opacity="0.15"/>
  <circle cx="700" cy="650" r="100" fill="#E63946" opacity="0.1"/>
  <circle cx="400" cy="700" r="60" fill="#2A9D8F" opacity="0.1"/>
  <!-- String line -->
  <path d="M 30,250 Q 100,200 170,260 Q 240,200 310,260 Q 380,200 450,260 Q 520,200 590,260 Q 660,200 730,260 Q 770,240 790,250" fill="none" stroke="#000" stroke-width="4"/>
  <!-- Pennant 1 - Red with black circle -->
  <polygon points="100,205 170,260 100,520" fill="#E63946" stroke="#000" stroke-width="2"/>
  <circle cx="115" cy="340" r="25" fill="#000"/>
  <circle cx="115" cy="340" r="10" fill="#E63946"/>
  <!-- Pennant 2 - Blue with yellow triangle -->
  <polygon points="170,260 240,205 240,520" fill="#1D3557" stroke="#000" stroke-width="2"/>
  <polygon points="225,320 240,400 210,400" fill="#F4D35E"/>
  <!-- Pennant 3 - Yellow with red cross -->
  <polygon points="240,205 310,260 240,520" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <rect x="250" y="330" width="30" height="6" fill="#E63946"/>
  <rect x="262" y="318" width="6" height="30" fill="#E63946"/>
  <!-- Pennant 4 - Teal with white diamond -->
  <polygon points="310,260 380,205 380,520" fill="#2A9D8F" stroke="#000" stroke-width="2"/>
  <polygon points="365,320 380,360 365,400 350,360" fill="#FFF"/>
  <!-- Pennant 5 - Orange with black stripes -->
  <polygon points="380,205 450,260 380,520" fill="#E76F51" stroke="#000" stroke-width="2"/>
  <line x1="385" y1="300" x2="420" y2="270" stroke="#000" stroke-width="4"/>
  <line x1="385" y1="350" x2="435" y2="285" stroke="#000" stroke-width="4"/>
  <line x1="385" y1="400" x2="440" y2="310" stroke="#000" stroke-width="4"/>
  <!-- Pennant 6 - Steel blue with concentric squares -->
  <polygon points="450,260 520,205 520,520" fill="#457B9D" stroke="#000" stroke-width="2"/>
  <rect x="490" y="300" width="30" height="30" fill="none" stroke="#FFF" stroke-width="2"/>
  <rect x="498" y="308" width="14" height="14" fill="#F4D35E"/>
  <!-- Pennant 7 - Black with red/yellow halves -->
  <polygon points="520,205 590,260 520,520" fill="#000" stroke="#000" stroke-width="2"/>
  <polygon points="520,205 555,232 520,370" fill="#E63946"/>
  <polygon points="520,370 555,340 520,520" fill="#F4D35E"/>
  <!-- Pennant 8 - Red with zigzag -->
  <polygon points="590,260 660,205 660,520" fill="#E63946" stroke="#000" stroke-width="2"/>
  <polyline points="625,280 645,310 625,340 645,370 625,400 645,430" fill="none" stroke="#FFF" stroke-width="3"/>
  <!-- Knot/attachment dots on string -->
  <circle cx="100" cy="210" r="6" fill="#000"/>
  <circle cx="170" cy="260" r="6" fill="#000"/>
  <circle cx="240" cy="210" r="6" fill="#000"/>
  <circle cx="310" cy="260" r="6" fill="#000"/>
  <circle cx="380" cy="210" r="6" fill="#000"/>
  <circle cx="450" cy="260" r="6" fill="#000"/>
  <circle cx="520" cy="210" r="6" fill="#000"/>
  <circle cx="590" cy="260" r="6" fill="#000"/>
  <circle cx="660" cy="210" r="6" fill="#000"/>
  <!-- Bottom decorative bar -->
  <rect x="50" y="620" width="700" height="8" fill="#000"/>
  <rect x="50" y="640" width="175" height="30" fill="#E63946"/>
  <rect x="225" y="640" width="175" height="30" fill="#F4D35E"/>
  <rect x="400" y="640" width="175" height="30" fill="#1D3557"/>
  <rect x="575" y="640" width="175" height="30" fill="#2A9D8F"/>
</svg>