  <line x1="0" y1="320" x2="800" y2="320" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="480" x2="800" y2="480" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="560" x2="800" y2="560" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="640" x2="800" y2="640" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="720" x2="800" y2="720" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <!-- Concentric circles centered slightly right of middle -->
  <circle cx="450" cy="400" r="300" fill="#1D3557" opacity="0.7"/>
  <circle cx="450" cy="400" r="250" fill="#FEFAE0" opacity="0.8"/>
  <circle cx="450" cy="400" r="200" fill="#E63946" opacity="0.65"/>
  <circle cx="450" cy="400" r="155" fill="#F4D35E" opacity="0.75"/>
  <circle cx="450" cy="400" r="110" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="450" cy="400" r="70" fill="#1D3557" opacity="0.6"/>
  <circle cx="450" cy="400" r="35" fill="#FEFAE0" opacity="0.9"/>
