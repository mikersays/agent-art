  <circle cx="120" cy="60" r="7" fill="#E9C46A" opacity="0.8"/>
  <circle cx="165" cy="50" r="9" fill="#E9C46A" opacity="0.85"/>
  <circle cx="210" cy="55" r="6" fill="#E9C46A" opacity="0.75"/>
  <circle cx="255" cy="70" r="8" fill="#E9C46A" opacity="0.8"/>
  <circle cx="295" cy="95" r="7" fill="#E9C46A" opacity="0.85"/>
  <circle cx="325" cy="130" r="9" fill="#E9C46A" opacity="0.8"/>
  <circle cx="345" cy="170" r="6" fill="#E9C46A" opacity="0.75"/>
  <circle cx="50" cy="110" r="7" fill="#E9C46A" opacity="0.8"/>
