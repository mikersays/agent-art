<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <defs>
    <!-- Gear tooth pattern helper -->
    <clipPath id="circClip">
      <rect x="0" y="0" width="800" height="800"/>
    </clipPath>
  </defs>

  <!-- Background geometric accents -->
  <rect x="0" y="0" width="400" height="400" fill="#A89F91" opacity="0.08"/>
  <rect x="400" y="400" width="400" height="400" fill="#1D3557" opacity="0.05"/>

  <!-- Gear 1: Large red gear, center-left -->
  <g transform="translate(280,320)">
    <circle cx="0" cy="0" r="140" fill="#E63946"/>
    <circle cx="0" cy="0" r="110" fill="#E63946"/>
    <!-- Teeth -->
    <rect x="-15" y="-155" width="30" height="30" fill="#E63946"/>
    <rect x="-15" y="125" width="30" height="30" fill="#E63946"/>
    <rect x="125" y="-15" width="30" height="30" fill="#E63946"/>
    <rect x="-155" y="-15" width="30" height="30" fill="#E63946"/>
    <rect x="82" y="-120" width="30" height="30" fill="#E63946" transform="rotate(30,97,-105)"/>
    <rect x="-112" y="-120" width="30" height="30" fill="#E63946" transform="rotate(-30,-97,-105)"/>
    <rect x="82" y="90" width="30" height="30" fill="#E63946" transform="rotate(-30,97,105)"/>
    <rect x="-112" y="90" width="30" height="30" fill="#E63946" transform="rotate(30,-97,105)"/>
    <rect x="115" y="50" width="30" height="30" fill="#E63946" transform="rotate(-60,130,65)"/>
    <rect x="-145" y="50" width="30" height="30" fill="#E63946" transform="rotate(60,-130,65)"/>
    <rect x="115" y="-80" width="30" height="30" fill="#E63946" transform="rotate(60,130,-65)"/>
    <rect x="-145" y="-80" width="30" height="30" fill="#E63946" transform="rotate(-60,-130,-65)"/>
    <!-- Hub -->
    <circle cx="0" cy="0" r="50" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#000000" stroke-width="3"/>
    <circle cx="0" cy="0" r="15" fill="#000000"/>
    <!-- Spokes -->
    <line x1="-45" y1="0" x2="-15" y2="0" stroke="#000000" stroke-width="4"/>
    <line x1="15" y1="0" x2="45" y2="0" stroke="#000000" stroke-width="4"/>
    <line x1="0" y1="-45" x2="0" y2="-15" stroke="#000000" stroke-width="4"/>
    <line x1="0" y1="15" x2="0" y2="45" stroke="#000000" stroke-width="4"/>
  </g>

  <!-- Gear 2: Medium blue gear, upper-right, meshing with gear 1 -->
  <g transform="translate(500,180)">
    <circle cx="0" cy="0" r="100" fill="#1D3557"/>
    <!-- Teeth -->
    <rect x="-12" y="-115" width="24" height="25" fill="#1D3557"/>
    <rect x="-12" y="90" width="24" height="25" fill="#1D3557"/>
    <rect x="90" y="-12" width="25" height="24" fill="#1D3557"/>
    <rect x="-115" y="-12" width="25" height="24" fill="#1D3557"/>
    <rect x="60" y="-90" width="24" height="25" fill="#1D3557" transform="rotate(30,72,-77)"/>
    <rect x="-84" y="-90" width="24" height="25" fill="#1D3557" transform="rotate(-30,-72,-77)"/>
    <rect x="60" y="65" width="24" height="25" fill="#1D3557" transform="rotate(-30,72,77)"/>
    <rect x="-84" y="65" width="24" height="25" fill="#1D3557" transform="rotate(30,-72,77)"/>
    <rect x="85" y="35" width="24" height="25" fill="#1D3557" transform="rotate(-60,97,47)"/>
    <rect x="-109" y="35" width="24" height="25" fill="#1D3557" transform="rotate(60,-97,47)"/>
    <!-- Hub -->
    <circle cx="0" cy="0" r="35" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#000000" stroke-width="3"/>
    <circle cx="0" cy="0" r="10" fill="#000000"/>
    <line x1="-30" y1="0" x2="-10" y2="0" stroke="#000000" stroke-width="3"/>
    <line x1="10" y1="0" x2="30" y2="0" stroke="#000000" stroke-width="3"/>
    <line x1="0" y1="-30" x2="0" y2="-10" stroke="#000000" stroke-width="3"/>
    <line x1="0" y1="10" x2="0" y2="30" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Gear 3: Yellow gear, lower-right -->
  <g transform="translate(530,480)">
    <circle cx="0" cy="0" r="120" fill="#F4D35E"/>
    <!-- Teeth -->
    <rect x="-14" y="-135" width="28" height="28" fill="#F4D35E"/>
    <rect x="-14" y="107" width="28" height="28" fill="#F4D35E"/>
    <rect x="107" y="-14" width="28" height="28" fill="#F4D35E"/>
    <rect x="-135" y="-14" width="28" height="28" fill="#F4D35E"/>
    <rect x="70" y="-107" width="28" height="28" fill="#F4D35E" transform="rotate(30,84,-93)"/>
    <rect x="-98" y="-107" width="28" height="28" fill="#F4D35E" transform="rotate(-30,-84,-93)"/>
    <rect x="70" y="79" width="28" height="28" fill="#F4D35E" transform="rotate(-30,84,93)"/>
    <rect x="-98" y="79" width="28" height="28" fill="#F4D35E" transform="rotate(30,-84,93)"/>
    <rect x="100" y="42" width="28" height="28" fill="#F4D35E" transform="rotate(-60,114,56)"/>
    <rect x="-128" y="42" width="28" height="28" fill="#F4D35E" transform="rotate(60,-114,56)"/>
    <rect x="100" y="-70" width="28" height="28" fill="#F4D35E" transform="rotate(60,114,-56)"/>
    <rect x="-128" y="-70" width="28" height="28" fill="#F4D35E" transform="rotate(-60,-114,-56)"/>
    <!-- Hub -->
    <circle cx="0" cy="0" r="42" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="37" fill="none" stroke="#000000" stroke-width="3"/>
    <circle cx="0" cy="0" r="12" fill="#000000"/>
    <line x1="-37" y1="0" x2="-12" y2="0" stroke="#000000" stroke-width="3"/>
    <line x1="12" y1="0" x2="37" y2="0" stroke="#000000" stroke-width="3"/>
    <line x1="0" y1="-37" x2="0" y2="-12" stroke="#000000" stroke-width="3"/>
    <line x1="0" y1="12" x2="0" y2="37" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Gear 4: Small black gear, between gears -->
  <g transform="translate(410,400)">
    <circle cx="0" cy="0" r="50" fill="#000000"/>
    <rect x="-10" y="-62" width="20" height="20" fill="#000000"/>
    <rect x="-10" y="42" width="20" height="20" fill="#000000"/>
    <rect x="42" y="-10" width="20" height="20" fill="#000000"/>
    <rect x="-62" y="-10" width="20" height="20" fill="#000000"/>
    <rect x="30" y="-50" width="20" height="20" fill="#000000" transform="rotate(45,40,-40)"/>
    <rect x="-50" y="-50" width="20" height="20" fill="#000000" transform="rotate(-45,-40,-40)"/>
    <rect x="30" y="30" width="20" height="20" fill="#000000" transform="rotate(-45,40,40)"/>
    <rect x="-50" y="30" width="20" height="20" fill="#000000" transform="rotate(45,-40,40)"/>
    <circle cx="0" cy="0" r="20" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="6" fill="#E63946"/>
  </g>

  <!-- Gear 5: Small steel-blue gear, top-left -->
  <g transform="translate(150,130)">
    <circle cx="0" cy="0" r="60" fill="#457B9D"/>
    <rect x="-10" y="-72" width="20" height="20" fill="#457B9D"/>
    <rect x="-10" y="52" width="20" height="20" fill="#457B9D"/>
    <rect x="52" y="-10" width="20" height="20" fill="#457B9D"/>
    <rect x="-72" y="-10" width="20" height="20" fill="#457B9D"/>
    <rect x="35" y="-58" width="20" height="20" fill="#457B9D" transform="rotate(30,45,-48)"/>
    <rect x="-55" y="-58" width="20" height="20" fill="#457B9D" transform="rotate(-30,-45,-48)"/>
    <rect x="35" y="38" width="20" height="20" fill="#457B9D" transform="rotate(-30,45,48)"/>
    <rect x="-55" y="38" width="20" height="20" fill="#457B9D" transform="rotate(30,-45,48)"/>
    <circle cx="0" cy="0" r="22" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="8" fill="#000000"/>
    <line x1="-22" y1="0" x2="-8" y2="0" stroke="#000000" stroke-width="2"/>
    <line x1="8" y1="0" x2="22" y2="0" stroke="#000000" stroke-width="2"/>
  </g>

  <!-- Gear 6: Burgundy gear, bottom-left -->
  <g transform="translate(180,620)">
    <circle cx="0" cy="0" r="90" fill="#6D2E46"/>
    <rect x="-12" y="-103" width="24" height="22" fill="#6D2E46"/>
    <rect x="-12" y="81" width="24" height="22" fill="#6D2E46"/>
    <rect x="81" y="-12" width="22" height="24" fill="#6D2E46"/>
    <rect x="-103" y="-12" width="22" height="24" fill="#6D2E46"/>
    <rect x="52" y="-82" width="24" height="22" fill="#6D2E46" transform="rotate(30,64,-71)"/>
    <rect x="-76" y="-82" width="24" height="22" fill="#6D2E46" transform="rotate(-30,-64,-71)"/>
    <rect x="52" y="60" width="24" height="22" fill="#6D2E46" transform="rotate(-30,64,71)"/>
    <rect x="-76" y="60" width="24" height="22" fill="#6D2E46" transform="rotate(30,-64,71)"/>
    <rect x="75" y="30" width="24" height="22" fill="#6D2E46" transform="rotate(-60,87,41)"/>
    <rect x="-99" y="30" width="24" height="22" fill="#6D2E46" transform="rotate(60,-87,41)"/>
    <circle cx="0" cy="0" r="32" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="27" fill="none" stroke="#000000" stroke-width="3"/>
    <circle cx="0" cy="0" r="10" fill="#000000"/>
    <line x1="-27" y1="0" x2="-10" y2="0" stroke="#000000" stroke-width="3"/>
    <line x1="10" y1="0" x2="27" y2="0" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Gear 7: Small warm gray gear, top-center -->
  <g transform="translate(370,100)">
    <circle cx="0" cy="0" r="45" fill="#A89F91"/>
    <rect x="-9" y="-56" width="18" height="18" fill="#A89F91"/>
    <rect x="-9" y="38" width="18" height="18" fill="#A89F91"/>
    <rect x="38" y="-9" width="18" height="18" fill="#A89F91"/>
    <rect x="-56" y="-9" width="18" height="18" fill="#A89F91"/>
    <rect x="24" y="-44" width="18" height="18" fill="#A89F91" transform="rotate(45,33,-35)"/>
    <rect x="-42" y="-44" width="18" height="18" fill="#A89F91" transform="rotate(-45,-33,-35)"/>
    <rect x="24" y="26" width="18" height="18" fill="#A89F91" transform="rotate(-45,33,35)"/>
    <rect x="-42" y="26" width="18" height="18" fill="#A89F91" transform="rotate(45,-33,35)"/>
    <circle cx="0" cy="0" r="18" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="6" fill="#000000"/>
  </g>

  <!-- Connection lines / axle lines -->
  <line x1="280" y1="320" x2="280" y2="750" stroke="#000000" stroke-width="3" stroke-dasharray="8,4" opacity="0.3"/>
  <line x1="530" y1="480" x2="750" y2="480" stroke="#000000" stroke-width="3" stroke-dasharray="8,4" opacity="0.3"/>
  <line x1="500" y1="180" x2="720" y2="180" stroke="#000000" stroke-width="3" stroke-dasharray="8,4" opacity="0.3"/>

  <!-- Decorative corner brackets -->
  <path d="M20,20 L80,20 L80,30 L30,30 L30,80 L20,80 Z" fill="#000000"/>
  <path d="M780,20 L720,20 L720,30 L770,30 L770,80 L780,80 Z" fill="#000000"/>
  <path d="M20,780 L80,780 L80,770 L30,770 L30,720 L20,720 Z" fill="#000000"/>
  <path d="M780,780 L720,780 L720,770 L770,770 L770,720 L780,720 Z" fill="#000000"/>
</svg>