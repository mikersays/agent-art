<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Sand background -->
  <rect x="0" y="0" width="800" height="800" fill="#DDA15E"/>

  <!-- Warm gray horizontal lines at low opacity -->
  <line x1="0" y1="80" x2="800" y2="80" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="480" x2="800" y2="480" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="560" x2="800" y2="560" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="640" x2="800" y2="640" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="720" x2="800" y2="720" stroke="#A89F91" stroke-width="1" opacity="0.1"/>

  <!-- Large floating rotated rectangles -->
  <!-- Blue square behind others -->
  <rect x="280" y="250" width="200" height="200" fill="#1D3557" opacity="0.6" stroke="#000000" stroke-width="2" transform="rotate(-10, 380, 350)"/>

  <!-- Red rectangle -->
  <rect x="200" y="180" width="250" height="180" fill="#E63946" opacity="0.6" stroke="#000000" stroke-width="2" transform="rotate(15, 325, 270)"/>

  <!-- Yellow rectangle -->
  <rect x="350" y="350" width="180" height="120" fill="#F4D35E" opacity="0.6" stroke="#000000" stroke-width="2" transform="rotate(25, 440, 410)"/>

  <!-- Additional floating planes -->
  <rect x="450" y="150" width="160" height="110" fill="#2A9D8F" opacity="0.55" stroke="#000000" stroke-width="2" transform="rotate(-20, 530, 205)"/>

  <rect x="100" y="450" width="190" height="130" fill="#1D3557" opacity="0.5" stroke="#000000" stroke-width="2" transform="rotate(8, 195, 515)"/>

  <rect x="480" y="480" width="170" height="140" fill="#E63946" opacity="0.55" stroke="#000000" stroke-width="2" transform="rotate(-15, 565, 550)"/>

  <rect x="550" y="100" width="120" height="80" fill="#F4D35E" opacity="0.65" stroke="#000000" stroke-width="2" transform="rotate(35, 610, 140)"/>

  <!-- Scattered teal circles -->
  <circle cx="120" cy="100" r="10" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="680" cy="80" r="8" fill="#2A9D8F" opacity="0.75"/>
  <circle cx="750" cy="350" r="12" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="60" cy="350" r="9" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="400" cy="700" r="11" fill="#2A9D8F" opacity="0.75"/>
  <circle cx="150" cy="700" r="7" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="700" cy="680" r="10" fill="#2A9D8F" opacity="0.7"/>

  <!-- Scattered burgundy circles -->
  <circle cx="50" cy="200" r="8" fill="#6D2E46" opacity="0.75"/>
  <circle cx="740" cy="200" r="11" fill="#6D2E46" opacity="0.7"/>
  <circle cx="400" cy="50" r="9" fill="#6D2E46" opacity="0.8"/>
  <circle cx="700" cy="500" r="7" fill="#6D2E46" opacity="0.75"/>
  <circle cx="100" cy="600" r="10" fill="#6D2E46" opacity="0.7"/>
  <circle cx="350" cy="750" r="8" fill="#6D2E46" opacity="0.8"/>
  <circle cx="600" cy="750" r="12" fill="#6D2E46" opacity="0.7"/>

  <!-- Small accent shapes at edges -->
  <rect x="10" y="10" width="18" height="18" fill="#000000" opacity="0.6"/>
  <rect x="772" y="10" width="18" height="18" fill="#000000" opacity="0.6"/>
  <rect x="10" y="772" width="18" height="18" fill="#000000" opacity="0.6"/>
  <rect x="772" y="772" width="18" height="18" fill="#000000" opacity="0.6"/>
