<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#1D3557"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="50" fill="#000000"/>
  <text x="400" y="35" font-family="sans-serif" font-size="22" font-weight="bold" fill="#FEFAE0" text-anchor="middle" letter-spacing="6">SIGNAL FLAGS</text>

  <!-- Row 1 of flags -->

  <!-- Flag 1: Diagonal split - red/yellow (like Oscar) -->
  <g transform="translate(60, 80)">
    <rect width="140" height="140" fill="#F4D35E" stroke="#000000" stroke-width="3"/>
    <polygon points="0,0 140,0 0,140" fill="#E63946"/>
    <rect width="140" height="140" fill="none" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Flag 2: Horizontal halves - blue/white (like Sierra) -->
  <g transform="translate(230, 80)">
    <rect width="140" height="70" fill="#FFFFFF" stroke="#000000" stroke-width="3"/>
    <rect y="70" width="140" height="70" fill="#1D3557" stroke="#000000" stroke-width="3"/>
    <rect width="140" height="140" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Center circle -->
    <circle cx="70" cy="70" r="25" fill="#2A9D8F"/>
  </g>

  <!-- Flag 3: Quartered - red/white checkerboard (like Uniform) -->
  <g transform="translate(400, 80)">
    <rect width="70" height="70" fill="#E63946"/>
    <rect x="70" width="70" height="70" fill="#FFFFFF"/>
    <rect y="70" width="70" height="70" fill="#FFFFFF"/>
    <rect x="70" y="70" width="70" height="70" fill="#E63946"/>
    <rect width="140" height="140" fill="none" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Flag 4: Vertical thirds - blue/white/blue (like Tango) -->
  <g transform="translate(570, 80)">
    <rect width="47" height="140" fill="#E63946"/>
    <rect x="47" width="46" height="140" fill="#FFFFFF"/>
    <rect x="93" width="47" height="140" fill="#1D3557"/>
    <rect width="140" height="140" fill="none" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Row 2 of flags -->

  <!-- Flag 5: Cross pattern - teal cross on cream (like plus) -->
  <g transform="translate(60, 250)">
    <rect width="140" height="140" fill="#FEFAE0"/>
    <rect x="50" width="40" height="140" fill="#2A9D8F"/>
    <rect y="50" width="140" height="40" fill="#2A9D8F"/>
    <rect width="140" height="140" fill="none" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Flag 6: X diagonal - yellow on black -->
  <g transform="translate(230, 250)">
    <rect width="140" height="140" fill="#000000"/>
    <polygon points="0,0 25,0 140,115 140,140 115,140 0,25" fill="#F4D35E"/>
    <polygon points="115,0 140,0 140,25 25,140 0,140 0,115" fill="#F4D35E"/>
    <rect width="140" height="140" fill="none" stroke="#F4D35E" stroke-width="3"/>
  </g>

  <!-- Flag 7: Horizontal thirds - orange/white/orange -->
  <g transform="translate(400, 250)">
    <rect width="140" height="47" fill="#E76F51"/>
    <rect y="47" width="140" height="46" fill="#FFFFFF"/>
    <rect y="93" width="140" height="47" fill="#E76F51"/>
    <rect width="140" height="140" fill="none" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Flag 8: Diagonal quarters - four triangles -->
  <g transform="translate(570, 250)">
    <rect width="140" height="140" fill="#FEFAE0"/>
    <polygon points="0,0 70,70 140,0" fill="#E63946"/>
    <polygon points="140,0 70,70 140,140" fill="#1D3557"/>
    <polygon points="140,140 70,70 0,140" fill="#F4D35E"/>
    <polygon points="0,140 70,70 0,0" fill="#2A9D8F"/>
    <rect width="140" height="140" fill="none" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Row 3 of flags -->

  <!-- Flag 9: Border flag - red border, blue center -->
  <g transform="translate(60, 420)">
    <rect width="140" height="140" fill="#E63946"/>
    <rect x="20" y="20" width="100" height="100" fill="#1D3557"/>
    <rect x="40" y="40" width="60" height="60" fill="#FEFAE0"/>
    <rect width="140" height="140" fill="none" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Flag 10: Vertical halves with circles -->
  <g transform="translate(230, 420)">
    <rect width="70" height="140" fill="#F4D35E"/>
    <rect x="70" width="70" height="140" fill="#000000"/>
    <circle cx="35" cy="70" r="20" fill="#000000"/>
    <circle cx="105" cy="70" r="20" fill="#F4D35E"/>
    <rect width="140" height="140" fill="none" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Flag 11: Pennant stripes - horizontal stripes -->
  <g transform="translate(400, 420)">
    <rect width="140" height="28" fill="#1D3557"/>
    <rect y="28" width="140" height="28" fill="#FFFFFF"/>
    <rect y="56" width="140" height="28" fill="#E63946"/>
    <rect y="84" width="140" height="28" fill="#FFFFFF"/>
    <rect y="112" width="140" height="28" fill="#2A9D8F"/>
    <rect width="140" height="140" fill="none" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Flag 12: Diamond center - orange diamond on cream -->
  <g transform="translate(570, 420)">
    <rect width="140" height="140" fill="#FEFAE0"/>
    <polygon points="70,10 130,70 70,130 10,70" fill="#E76F51"/>
    <polygon points="70,35 105,70 70,105 35,70" fill="#F4D35E"/>
    <rect width="140" height="140" fill="none" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Row 4 of flags -->

  <!-- Flag 13: Diagonal split other way -->
  <g transform="translate(60, 590)">
    <rect width="140" height="140" fill="#2A9D8F"/>
    <polygon points="140,0 140,140 0,140" fill="#FFFFFF"/>
    <rect width="140" height="140" fill="none" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Flag 14: Vertical split with cross -->
  <g transform="translate(230, 590)">
    <rect width="140" height="140" fill="#FFFFFF"/>
    <rect width="50" height="140" fill="#1D3557"/>
    <rect x="50" width="40" height="140" fill="#E63946"/>
    <rect x="90" width="50" height="140" fill="#1D3557"/>
    <rect width="140" height="140" fill="none" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Flag 15: Checkered 3x3 -->
  <g transform="translate(400, 590)">
    <rect width="47" height="47" fill="#F4D35E"/>
    <rect x="47" width="46" height="47" fill="#000000"/>
    <rect x="93" width="47" height="47" fill="#F4D35E"/>
    <rect y="47" width="47" height="46" fill="#000000"/>
    <rect x="47" y="47" width="46" height="46" fill="#F4D35E"/>
    <rect x="93" y="47" width="47" height="46" fill="#000000"/>
    <rect y="93" width="47" height="47" fill="#F4D35E"/>
    <rect x="47" y="93" width="46" height="47" fill="#000000"/>
    <rect x="93" y="93" width="47" height="47" fill="#F4D35E"/>
    <rect width="140" height="140" fill="none" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Flag 16: Circle on solid -->
  <g transform="translate(570, 590)">
    <rect width="140" height="140" fill="#E63946"/>
    <circle cx="70" cy="70" r="45" fill="#FFFFFF"/>
    <circle cx="70" cy="70" r="25" fill="#1D3557"/>
    <circle cx="70" cy="70" r="8" fill="#F4D35E"/>
    <rect width="140" height="140" fill="none" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Connecting decorative lines between rows -->
  <line x1="40" y1="155" x2="40" y2="245" stroke="#F4D35E" stroke-width="2" opacity="0.5"/>
  <line x1="40" y1="325" x2="40" y2="415" stroke="#F4D35E" stroke-width="2" opacity="0.5"/>
  <line x1="40" y1="495" x2="40" y2="585" stroke="#F4D35E" stroke-width="2" opacity="0.5"/>
  <line x1="760" y1="155" x2="760" y2="245" stroke="#F4D35E" stroke-width="2" opacity="0.5"/>
  <line x1="760" y1="325" x2="760" y2="415" stroke="#F4D35E" stroke-width="2" opacity="0.5"/>
  <line x1="760" y1="495" x2="760" y2="585" stroke="#F4D35E" stroke-width="2" opacity="0.5"/>

  <!-- Small nautical accent dots -->
  <circle cx="40" cy="150" r="4" fill="#F4D35E"/>
  <circle cx="40" cy="250" r="4" fill="#F4D35E"/>
  <circle cx="40" cy="420" r="4" fill="#F4D35E"/>
  <circle cx="40" cy="590" r="4" fill="#F4D35E"/>
  <circle cx="760" cy="150" r="4" fill="#F4D35E"/>
  <circle cx="760" cy="250" r="4" fill="#F4D35E"/>
  <circle cx="760" cy="420" r="4" fill="#F4D35E"/>
  <circle cx="760" cy="590" r="4" fill="#F4D35E"/>

  <!-- Bottom border -->
  <rect x="0" y="760" width="800" height="40" fill="#000000"/>
  <rect x="60" y="770" width="30" height="20" fill="#E63946"/>
  <rect x="100" y="770" width="30" height="20" fill="#F4D35E"/>
  <rect x="140" y="770" width="30" height="20" fill="#2A9D8F"/>
  <rect x="180" y="770" width="30" height="20" fill="#FFFFFF"/>
  <rect x="220" y="770" width="30" height="20" fill="#E76F51"/>
  <rect x="260" y="770" width="30" height="20" fill="#1D3557"/>
</svg>