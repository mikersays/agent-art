<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Define bar width and spacing -->
  <!-- Horizontal bars: 8 bars, ~60px tall, spaced ~100px apart starting at y=50 -->
  <!-- Vertical bars: 8 bars, ~60px wide, spaced ~100px apart starting at x=50 -->
  <!-- Weave: odd horizontal bars go OVER vertical bars (drawn after), even go UNDER (drawn before) -->

  <!-- === LAYER 1: Vertical bars (behind even horizontal bars) === -->
  <!-- V1: x=50 -->
  <rect x="50" y="0" width="60" height="800" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <!-- V2: x=150 -->
  <rect x="150" y="0" width="60" height="800" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <!-- V3: x=250 -->
  <rect x="250" y="0" width="60" height="800" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <!-- V4: x=350 -->
  <rect x="350" y="0" width="60" height="800" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <!-- V5: x=450 -->
  <rect x="450" y="0" width="60" height="800" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <!-- V6: x=550 -->
  <rect x="550" y="0" width="60" height="800" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <!-- V7: x=650 -->
  <rect x="650" y="0" width="60" height="800" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <!-- V8: x=750 -->
  <rect x="750" y="0" width="60" height="800" fill="#E63946" stroke="#000000" stroke-width="2"/>

  <!-- === LAYER 2: Even horizontal bars (over vertical bars at even positions, under at odd) === -->
  <!-- H2: y=150, EVEN — goes over V-even (2,4,6,8), under V-odd (1,3,5,7) -->
  <!-- Draw H2 segments only between the odd vertical bars -->
  <rect x="0" y="150" width="50" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="110" y="150" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="310" y="150" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="510" y="150" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="710" y="150" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>

  <!-- H4: y=350 -->
  <rect x="0" y="350" width="50" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="110" y="350" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="310" y="350" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="510" y="350" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="710" y="350" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>

  <!-- H6: y=550 -->
  <rect x="0" y="550" width="50" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="110" y="550" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="310" y="550" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="510" y="550" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="710" y="550" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>

  <!-- H8: y=750 -->
  <rect x="0" y="750" width="50" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="110" y="750" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="310" y="750" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="510" y="750" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="710" y="750" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="2"/>

  <!-- === LAYER 3: Odd horizontal bars (full width — go OVER all vertical bars) === -->
  <!-- H1: y=50 -->
  <rect x="0" y="50" width="800" height="60" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <!-- H3: y=250 -->
  <rect x="0" y="250" width="800" height="60" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <!-- H5: y=450 -->
  <rect x="0" y="450" width="800" height="60" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <!-- H7: y=650 -->
  <rect x="0" y="650" width="800" height="60" fill="#1D3557" stroke="#000000" stroke-width="2"/>

  <!-- === LAYER 4: Yellow squares at ALL intersections (on top of everything) === -->
  <!-- Row H1 (y=50): intersections at x=50,150,250,350,450,550,650,750 -->
  <rect x="50" y="50" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="150" y="50" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="250" y="50" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="350" y="50" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="450" y="50" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="550" y="50" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="650" y="50" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="750" y="50" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>

  <!-- Row H2 (y=150) -->
  <rect x="50" y="150" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="150" y="150" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="250" y="150" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="350" y="150" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="450" y="150" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="550" y="150" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="650" y="150" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="750" y="150" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>

  <!-- Row H3 (y=250) -->
  <rect x="50" y="250" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="150" y="250" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="250" y="250" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="350" y="250" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="450" y="250" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="550" y="250" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="650" y="250" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="750" y="250" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>

  <!-- Row H4 (y=350) -->
  <rect x="50" y="350" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="150" y="350" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="250" y="350" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="350" y="350" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="450" y="350" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="550" y="350" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="650" y="350" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="750" y="350" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>

  <!-- Row H5 (y=450) -->
  <rect x="50" y="450" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="150" y="450" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="250" y="450" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="350" y="450" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="450" y="450" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="550" y="450" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="650" y="450" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="750" y="450" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>

  <!-- Row H6 (y=550) -->
  <rect x="50" y="550" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="150" y="550" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="250" y="550" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="350" y="550" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="450" y="550" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="550" y="550" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="650" y="550" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="750" y="550" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>

  <!-- Row H7 (y=650) -->
  <rect x="50" y="650" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="150" y="650" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="250" y="650" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="350" y="650" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="450" y="650" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="550" y="650" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="650" y="650" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="750" y="650" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>

  <!-- Row H8 (y=750) -->
  <rect x="50" y="750" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="150" y="750" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="250" y="750" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="350" y="750" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="450" y="750" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="550" y="750" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="650" y="750" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="750" y="750" width="60" height="60" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
</svg>
