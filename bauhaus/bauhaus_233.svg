<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Abacus III</title>
  <rect width="800" height="800" fill="#FFF"/>

  <!-- Background subtle grid -->
  <rect x="0" y="0" width="800" height="800" fill="#A89F91" opacity="0.05"/>

  <!-- Outer wooden frame - perspective trapezoid feel -->
  <polygon points="100,120 700,100 720,700 80,720" fill="none" stroke="#000" stroke-width="5"/>

  <!-- Frame fill - wood color -->
  <!-- Left frame -->
  <polygon points="100,120 120,120 100,720 80,720" fill="#A89F91"/>
  <!-- Right frame -->
  <polygon points="680,100 700,100 720,700 700,700" fill="#A89F91"/>
  <!-- Top frame -->
  <rect x="100" y="100" width="600" height="25" fill="#A89F91"/>
  <rect x="100" y="100" width="600" height="25" fill="#000" opacity="0.15"/>
  <!-- Bottom frame -->
  <rect x="85" y="695" width="630" height="25" fill="#A89F91"/>
  <rect x="85" y="695" width="630" height="25" fill="#000" opacity="0.15"/>

  <!-- Frame decorative lines -->
  <line x1="100" y1="115" x2="700" y2="115" stroke="#E63946" stroke-width="2"/>
  <line x1="85" y1="705" x2="715" y2="705" stroke="#1D3557" stroke-width="2"/>

  <!-- Rod 1 -->
  <line x1="110" y1="180" x2="695" y2="175" stroke="#000" stroke-width="3"/>
  <!-- Beads on rod 1 -->
  <circle cx="180" cy="178" r="22" fill="#E63946"/>
  <ellipse cx="180" cy="178" rx="22" ry="20" fill="#E63946"/>
  <circle cx="230" cy="177" r="22" fill="#E63946"/>
  <circle cx="450" cy="176" r="22" fill="#A89F91"/>
  <circle cx="500" cy="176" r="22" fill="#A89F91"/>
  <circle cx="550" cy="175" r="22" fill="#A89F91"/>
  <circle cx="600" cy="175" r="22" fill="#A89F91"/>
  <circle cx="650" cy="175" r="22" fill="#A89F91"/>

  <!-- Rod 2 -->
  <line x1="108" y1="260" x2="696" y2="255" stroke="#000" stroke-width="3"/>
  <!-- Beads on rod 2 -->
  <circle cx="170" cy="258" r="22" fill="#1D3557"/>
  <circle cx="220" cy="258" r="22" fill="#1D3557"/>
  <circle cx="270" cy="257" r="22" fill="#1D3557"/>
  <circle cx="500" cy="256" r="22" fill="#F4D35E"/>
  <circle cx="550" cy="256" r="22" fill="#F4D35E"/>
  <circle cx="600" cy="255" r="22" fill="#F4D35E"/>
  <circle cx="650" cy="255" r="22" fill="#F4D35E"/>

  <!-- Rod 3 -->
  <line x1="106" y1="340" x2="697" y2="335" stroke="#000" stroke-width="3"/>
  <!-- Beads on rod 3 -->
  <circle cx="165" cy="338" r="22" fill="#2A9D8F"/>
  <circle cx="550" cy="336" r="22" fill="#E9C46A"/>
  <circle cx="600" cy="336" r="22" fill="#E9C46A"/>
  <circle cx="650" cy="335" r="22" fill="#E9C46A"/>

  <!-- Rod 4 -->
  <line x1="104" y1="420" x2="698" y2="415" stroke="#000" stroke-width="3"/>
  <!-- Beads on rod 4 -->
  <circle cx="160" cy="418" r="22" fill="#F4D35E"/>
  <circle cx="210" cy="418" r="22" fill="#F4D35E"/>
  <circle cx="260" cy="417" r="22" fill="#F4D35E"/>
  <circle cx="310" cy="417" r="22" fill="#F4D35E"/>
  <circle cx="600" cy="416" r="22" fill="#E63946"/>
  <circle cx="650" cy="415" r="22" fill="#E63946"/>

  <!-- Rod 5 -->
  <line x1="102" y1="500" x2="699" y2="495" stroke="#000" stroke-width="3"/>
  <!-- Beads on rod 5 -->
  <circle cx="155" cy="498" r="22" fill="#E9C46A"/>
  <circle cx="205" cy="498" r="22" fill="#E9C46A"/>
  <circle cx="255" cy="498" r="22" fill="#E9C46A"/>
  <circle cx="305" cy="497" r="22" fill="#E9C46A"/>
  <circle cx="355" cy="497" r="22" fill="#E9C46A"/>

  <!-- Rod 6 -->
  <line x1="100" y1="580" x2="700" y2="575" stroke="#000" stroke-width="3"/>
  <!-- Beads on rod 6 -->
  <circle cx="150" cy="578" r="22" fill="#2A9D8F"/>
  <circle cx="200" cy="578" r="22" fill="#2A9D8F"/>
  <circle cx="500" cy="576" r="22" fill="#1D3557"/>
  <circle cx="550" cy="576" r="22" fill="#1D3557"/>
  <circle cx="600" cy="576" r="22" fill="#1D3557"/>
  <circle cx="650" cy="575" r="22" fill="#1D3557"/>

  <!-- Rod 7 -->
  <line x1="98" y1="650" x2="701" y2="645" stroke="#000" stroke-width="3"/>
  <circle cx="145" cy="648" r="22" fill="#E63946"/>
  <circle cx="195" cy="648" r="22" fill="#E63946"/>
  <circle cx="245" cy="647" r="22" fill="#E63946"/>
  <circle cx="295" cy="647" r="22" fill="#E63946"/>
  <circle cx="345" cy="647" r="22" fill="#E63946"/>
  <circle cx="395" cy="646" r="22" fill="#E63946"/>

  <!-- Bead shine highlights -->
  <circle cx="175" cy="172" r="6" fill="#FFF" opacity="0.4"/>
  <circle cx="165" cy="252" r="6" fill="#FFF" opacity="0.4"/>
  <circle cx="160" cy="332" r="6" fill="#FFF" opacity="0.4"/>
  <circle cx="155" cy="412" r="6" fill="#FFF" opacity="0.4"/>
  <circle cx="150" cy="492" r="6" fill="#FFF" opacity="0.4"/>
  <circle cx="145" cy="572" r="6" fill="#FFF" opacity="0.4"/>
  <circle cx="140" cy="642" r="6" fill="#FFF" opacity="0.4"/>

  <!-- Shadow beneath frame -->
  <rect x="90" y="720" width="640" height="10" rx="5" fill="#000" opacity="0.15"/>
</svg>