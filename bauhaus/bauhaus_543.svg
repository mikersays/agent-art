<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FFFFFF"/>
  <!-- Five large overlapping circles -->
  <circle cx="300" cy="320" r="190" fill="#E63946" opacity="0.45"/>
  <circle cx="500" cy="300" r="180" fill="#1D3557" opacity="0.5"/>
  <circle cx="400" cy="480" r="175" fill="#F4D35E" opacity="0.45"/>
  <circle cx="250" cy="500" r="160" fill="#2A9D8F" opacity="0.4"/>
  <circle cx="530" cy="500" r="165" fill="#FEFAE0" opacity="0.55" stroke="#A89F91" stroke-width="1"/>
  <!-- Structural lines connecting circle centers -->
  <line x1="300" y1="320" x2="500" y2="300" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="500" y1="300" x2="400" y2="480" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="480" x2="250" y2="500" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="250" y1="500" x2="300" y2="320" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="480" x2="530" y2="500" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="530" y1="500" x2="500" y2="300" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <!-- Small black squares at intersection points -->
  <rect x="392" y="295" width="10" height="10" fill="#000000" opacity="0.7"/>
  <rect x="340" y="395" width="10" height="10" fill="#000000" opacity="0.7"/>
  <rect x="450" y="385" width="10" height="10" fill="#000000" opacity="0.7"/>
  <rect x="270" y="415" width="10" height="10" fill="#000000" opacity="0.7"/>
  <rect x="480" y="440" width="10" height="10" fill="#000000" opacity="0.7"/>
  <rect x="320" y="485" width="10" height="10" fill="#000000" opacity="0.7"/>
  <rect x="385" y="345" width="8" height="8" fill="#000000" opacity="0.6"/>
  <rect x="420" y="470" width="8" height="8" fill="#000000" opacity="0.6"/>
  <rect x="350" y="450" width="9" height="9" fill="#000000" opacity="0.65"/>
  <rect x="460" y="350" width="9" height="9" fill="#000000" opacity="0.65"/>
  <!-- Center point marker -->
  <circle cx="395" cy="410" r="6" fill="#000000" opacity="0.8"/>
  <circle cx="395" cy="410" r="15" fill="none" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <!-- Thin radial structural lines from center -->
  <line x1="395" y1="410" x2="100" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="395" y1="410" x2="700" y2="150" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="395" y1="410" x2="750" y2="650" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="395" y1="410" x2="100" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <!-- Corner accents -->
  <rect x="20" y="20" width="30" height="30" fill="#1D3557" opacity="0.25"/>
  <rect x="750" y="20" width="30" height="30" fill="#E63946" opacity="0.25"/>
  <rect x="20" y="750" width="30" height="30" fill="#F4D35E" opacity="0.25"/>
  <rect x="750" y="750" width="30" height="30" fill="#2A9D8F" opacity="0.25"/>
  <!-- Additional small intersection markers -->
  <rect x="305" y="340" width="7" height="7" fill="#000000" opacity="0.5" transform="rotate(45,308,343)"/>
  <rect x="475" y="305" width="7" height="7" fill="#000000" opacity="0.5" transform="rotate(45,478,308)"/>
  <rect x="255" y="470" width="7" height="7" fill="#000000" opacity="0.5" transform="rotate(45,258,473)"/>
  <rect x="505" y="475" width="7" height="7" fill="#000000" opacity="0.5" transform="rotate(45,508,478)"/>
  <!-- Edge structural lines -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
</svg>