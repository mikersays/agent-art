<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Bauhaus Cuckoo Clock -->
  <!-- Background -->
  <rect width="800" height="800" fill="#FFF"/>

  <!-- Clock house shape - main body -->
  <rect x="250" y="180" width="300" height="350" fill="#1D3557" stroke="#000" stroke-width="3"/>

  <!-- Roof - triangular -->
  <polygon points="230,180 400,60 570,180" fill="#6D2E46" stroke="#000" stroke-width="3"/>

  <!-- Roof peak ornament -->
  <circle cx="400" cy="70" r="15" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <rect x="395" y="55" width="10" height="30" fill="#000" transform="rotate(45,400,70)"/>

  <!-- Decorative roof trim -->
  <line x1="230" y1="180" x2="570" y2="180" stroke="#F4D35E" stroke-width="5"/>
  <rect x="260" y="170" width="20" height="10" fill="#F4D35E"/>
  <rect x="310" y="170" width="20" height="10" fill="#F4D35E"/>
  <rect x="360" y="170" width="20" height="10" fill="#F4D35E"/>
  <rect x="420" y="170" width="20" height="10" fill="#F4D35E"/>
  <rect x="470" y="170" width="20" height="10" fill="#F4D35E"/>
  <rect x="520" y="170" width="20" height="10" fill="#F4D35E"/>

  <!-- Clock face -->
  <circle cx="400" cy="340" r="110" fill="#FFF" stroke="#000" stroke-width="4"/>
  <circle cx="400" cy="340" r="100" fill="#FFF" stroke="#E63946" stroke-width="2"/>

  <!-- Hour markers -->
  <rect x="397" y="245" width="6" height="20" fill="#000"/>
  <rect x="397" y="415" width="6" height="20" fill="#000"/>
  <rect x="305" y="337" width="20" height="6" fill="#000"/>
  <rect x="475" y="337" width="20" height="6" fill="#000"/>
  <!-- Diagonal hour markers -->
  <rect x="397" y="245" width="6" height="15" fill="#000" transform="rotate(30,400,340)"/>
  <rect x="397" y="245" width="6" height="15" fill="#000" transform="rotate(60,400,340)"/>
  <rect x="397" y="245" width="6" height="15" fill="#000" transform="rotate(120,400,340)"/>
  <rect x="397" y="245" width="6" height="15" fill="#000" transform="rotate(150,400,340)"/>
  <rect x="397" y="245" width="6" height="15" fill="#000" transform="rotate(210,400,340)"/>
  <rect x="397" y="245" width="6" height="15" fill="#000" transform="rotate(240,400,340)"/>
  <rect x="397" y="245" width="6" height="15" fill="#000" transform="rotate(300,400,340)"/>
  <rect x="397" y="245" width="6" height="15" fill="#000" transform="rotate(330,400,340)"/>

  <!-- Clock hands -->
  <line x1="400" y1="340" x2="400" y2="270" stroke="#000" stroke-width="5" stroke-linecap="round"/>
  <line x1="400" y1="340" x2="450" y2="310" stroke="#E63946" stroke-width="3" stroke-linecap="round"/>
  <circle cx="400" cy="340" r="8" fill="#E63946"/>

  <!-- Cuckoo door -->
  <rect x="375" y="195" width="50" height="40" fill="#264653" stroke="#F4D35E" stroke-width="2" rx="5"/>
  <circle cx="400" cy="215" r="5" fill="#F4D35E"/>

  <!-- Side decorative elements - leaves/brackets -->
  <polygon points="250,250 230,280 250,310" fill="#264653" stroke="#000" stroke-width="2"/>
  <polygon points="550,250 570,280 550,310" fill="#264653" stroke="#000" stroke-width="2"/>

  <!-- Bottom decorative panel -->
  <rect x="280" y="460" width="240" height="50" fill="#E76F51" stroke="#000" stroke-width="2"/>
  <circle cx="320" cy="485" r="12" fill="#F4D35E"/>
  <circle cx="400" cy="485" r="12" fill="#F4D35E"/>
  <circle cx="480" cy="485" r="12" fill="#F4D35E"/>

  <!-- Pendulum rod -->
  <line x1="400" y1="530" x2="400" y2="680" stroke="#000" stroke-width="4"/>

  <!-- Pendulum bob -->
  <circle cx="400" cy="695" r="30" fill="#F4D35E" stroke="#000" stroke-width="3"/>
  <circle cx="400" cy="695" r="15" fill="#E76F51"/>

  <!-- Hanging chains (left) -->
  <ellipse cx="340" cy="550" rx="6" ry="10" fill="none" stroke="#000" stroke-width="2"/>
  <ellipse cx="340" cy="568" rx="6" ry="10" fill="none" stroke="#000" stroke-width="2"/>
  <ellipse cx="340" cy="586" rx="6" ry="10" fill="none" stroke="#000" stroke-width="2"/>
  <ellipse cx="340" cy="604" rx="6" ry="10" fill="none" stroke="#000" stroke-width="2"/>
  <ellipse cx="340" cy="622" rx="6" ry="10" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Hanging chains (right) -->
  <ellipse cx="460" cy="550" rx="6" ry="10" fill="none" stroke="#000" stroke-width="2"/>
  <ellipse cx="460" cy="568" rx="6" ry="10" fill="none" stroke="#000" stroke-width="2"/>
  <ellipse cx="460" cy="586" rx="6" ry="10" fill="none" stroke="#000" stroke-width="2"/>
  <ellipse cx="460" cy="604" rx="6" ry="10" fill="none" stroke="#000" stroke-width="2"/>
  <ellipse cx="460" cy="622" rx="6" ry="10" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Pine cone weights -->
  <polygon points="340,632 325,670 340,660 355,670" fill="#6D2E46" stroke="#000" stroke-width="2"/>
  <polygon points="460,632 445,670 460,660 475,670" fill="#6D2E46" stroke="#000" stroke-width="2"/>

  <!-- Window shutters -->
  <rect x="265" y="200" width="30" height="50" fill="#E63946" stroke="#000" stroke-width="2"/>
  <rect x="505" y="200" width="30" height="50" fill="#E63946" stroke="#000" stroke-width="2"/>

  <!-- Corner ornaments -->
  <circle cx="265" cy="195" r="8" fill="#F4D35E"/>
  <circle cx="535" cy="195" r="8" fill="#F4D35E"/>
  <circle cx="265" cy="515" r="8" fill="#F4D35E"/>
  <circle cx="535" cy="515" r="8" fill="#F4D35E"/>
</svg>