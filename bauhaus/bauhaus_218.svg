<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Moebius Strip</title>
  <rect width="800" height="800" fill="#FFF"/>

  <!-- Background geometric accents -->
  <circle cx="400" cy="400" r="300" fill="none" stroke="#DDA15E" stroke-width="1" stroke-dasharray="8,8"/>
  <circle cx="400" cy="400" r="200" fill="none" stroke="#DDA15E" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Moebius strip - back portion (behind) -->
  <path d="M 150,400 C 150,250 250,150 400,150 C 550,150 650,250 650,350 C 650,400 620,440 580,460"
        fill="none" stroke="#333" stroke-width="50" stroke-linecap="round" opacity="0.4"/>

  <!-- Moebius strip - twist section back -->
  <path d="M 580,460 C 540,480 520,520 540,560"
        fill="none" stroke="#1D3557" stroke-width="45" stroke-linecap="round" opacity="0.5"/>

  <!-- Moebius strip - bottom curve back -->
  <path d="M 540,560 C 570,620 540,680 460,700 C 380,720 280,700 220,650"
        fill="none" stroke="#E63946" stroke-width="40" stroke-linecap="round" opacity="0.5"/>

  <!-- Moebius strip - front portion (crossing over) -->
  <path d="M 220,650 C 170,610 150,540 180,480 C 210,420 270,400 320,410"
        fill="none" stroke="#E63946" stroke-width="48" stroke-linecap="round"/>

  <!-- Moebius strip - twist section front -->
  <path d="M 320,410 C 360,418 380,380 360,340"
        fill="none" stroke="#F4D35E" stroke-width="44" stroke-linecap="round"/>

  <!-- Moebius strip - top curve front -->
  <path d="M 360,340 C 340,290 360,230 420,200 C 480,170 560,190 610,240"
        fill="none" stroke="#E76F51" stroke-width="42" stroke-linecap="round"/>

  <!-- Moebius strip - connecting back to start -->
  <path d="M 610,240 C 650,280 660,330 640,370 C 620,410 580,430 550,430"
        fill="none" stroke="#1D3557" stroke-width="46" stroke-linecap="round"/>

  <!-- Inner edge highlight lines -->
  <path d="M 165,400 C 165,260 260,165 400,165 C 540,165 635,260 635,350"
        fill="none" stroke="#FFF" stroke-width="2" opacity="0.6"/>
  <path d="M 230,648 C 180,610 165,540 195,482"
        fill="none" stroke="#FFF" stroke-width="2" opacity="0.6"/>

  <!-- Infinity symbol accent in center -->
  <path d="M 340,400 C 340,370 370,350 400,370 C 430,390 460,370 460,400 C 460,430 430,450 400,430 C 370,410 340,430 340,400 Z"
        fill="none" stroke="#000" stroke-width="3"/>

  <!-- Corner geometric accents -->
  <rect x="30" y="30" width="60" height="60" fill="none" stroke="#E63946" stroke-width="3"/>
  <rect x="710" y="30" width="60" height="60" fill="none" stroke="#1D3557" stroke-width="3"/>
  <rect x="30" y="710" width="60" height="60" fill="none" stroke="#F4D35E" stroke-width="3"/>
  <rect x="710" y="710" width="60" height="60" fill="none" stroke="#E76F51" stroke-width="3"/>

  <!-- Small directional arrows suggesting motion -->
  <polygon points="700,380 720,400 700,420" fill="#333" opacity="0.3"/>
  <polygon points="100,420 80,400 100,380" fill="#333" opacity="0.3"/>
  <polygon points="380,100 400,80 420,100" fill="#333" opacity="0.3"/>
  <polygon points="420,700 400,720 380,700" fill="#333" opacity="0.3"/>

  <!-- Dot accents -->
  <circle cx="400" cy="400" r="6" fill="#000"/>
  <circle cx="400" cy="150" r="5" fill="#E63946"/>
  <circle cx="400" cy="650" r="5" fill="#1D3557"/>
  <circle cx="150" cy="400" r="5" fill="#F4D35E"/>
  <circle cx="650" cy="400" r="5" fill="#E76F51"/>
</svg>