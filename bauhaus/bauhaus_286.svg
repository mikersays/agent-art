  <polygon points="630,30 780,70 760,190 610,180" fill="#A8DADC" opacity="0.55"/>
  <!-- Second row -->
  <polygon points="60,220 200,210 230,370 90,390" fill="#2A9D8F" opacity="0.6" stroke="#000000" stroke-width="1.5"/>
  <polygon points="240,205 410,220 380,380 210,380" fill="#E76F51" opacity="0.45"/>
  <polygon points="420,215 580,205 610,360 440,385" fill="#457B9D" opacity="0.65" stroke="#000000" stroke-width="1"/>
  <polygon points="620,195 770,210 750,370 630,365" fill="#F4D35E" opacity="0.4"/>
  <!-- Third row -->
  <polygon points="70,410 230,395 260,550 100,570" fill="#000000" opacity="0.3"/>
