  <polygon points="50,50 220,30 250,180 80,200" fill="#1D3557" opacity="0.7" stroke="#000000" stroke-width="1.5"/>
  <polygon points="260,25 430,60 400,210 240,190" fill="#E63946" opacity="0.5"/>
