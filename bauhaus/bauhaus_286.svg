  <polygon points="600,400 760,385 745,545 615,555" fill="#1D3557" opacity="0.5"/>
  <!-- Fourth row -->
  <polygon points="55,590 210,580 240,740 85,760" fill="#DDA15E" opacity="0.55" stroke="#000000" stroke-width="1"/>
  <polygon points="250,575 415,590 395,745 225,755" fill="#6D2E46" opacity="0.5"/>
  <polygon points="425,585 585,575 610,730 445,750" fill="#2A9D8F" opacity="0.6" stroke="#000000" stroke-width="1.5"/>
  <polygon points="620,570 775,585 755,740 635,745" fill="#E63946" opacity="0.35"/>
  <!-- Small accent triangles in gaps -->
  <polygon points="235,185 255,195 240,210" fill="#E76F51" opacity="0.8"/>
  <polygon points="415,205 440,215 420,230" fill="#000000" opacity="0.6"/>
  <polygon points="225,375 250,395 215,400" fill="#F4D35E" opacity="0.7"/>
  <polygon points="405,380 430,395 400,405" fill="#A89F91" opacity="0.6"/>
  <polygon points="595,365 625,380 600,400" fill="#E63946" opacity="0.7"/>
  <polygon points="240,555 270,570 245,580" fill="#264653" opacity="0.6"/>
  <polygon points="575,550 605,565 580,585" fill="#F4D35E" opacity="0.5"/>
  <!-- Irregular quadrilaterals overlapping -->
  <polygon points="150,120 310,150 280,290 130,270" fill="#E9C46A" opacity="0.25"/>
  <polygon points="480,100 650,80 670,250 510,260" fill="#264653" opacity="0.3"/>
  <polygon points="320,450 490,430 510,600 340,610" fill="#A89F91" opacity="0.35" stroke="#000000" stroke-width="0.5"/>
  <polygon points="100,620 270,640 250,780 80,770" fill="#457B9D" opacity="0.3"/>
  <polygon points="530,630 700,610 720,770 550,780" fill="#E9C46A" opacity="0.4" stroke="#000000" stroke-width="1"/>
