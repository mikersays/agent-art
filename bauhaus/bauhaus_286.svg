  <polygon points="350,100 370,80 380,110" fill="#000000" opacity="0.5"/>
  <polygon points="700,300 720,280 730,310" fill="#E63946" opacity="0.6"/>
  <polygon points="150,500 170,480 180,510" fill="#1D3557" opacity="0.5"/>
  <polygon points="650,650 670,630 680,660" fill="#2A9D8F" opacity="0.7"/>
  <polygon points="400,300 420,280 430,310" fill="#F4D35E" opacity="0.6"/>
  <!-- Thin black structural lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="390" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="580" x2="800" y2="575" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="230" y1="0" x2="240" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="430" y1="0" x2="440" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="620" y1="0" x2="615" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
