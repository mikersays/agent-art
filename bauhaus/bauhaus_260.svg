<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Subtle grid -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <!-- Forest green base/ground rectangles -->
  <rect x="0" y="620" width="800" height="180" fill="#264653" opacity="0.6"/>
  <rect x="50" y="650" width="250" height="60" fill="#264653" opacity="0.8"/>
  <rect x="500" y="660" width="280" height="50" fill="#264653" opacity="0.75"/>
  <!-- Bridge deck - main horizontal beam -->
  <rect x="30" y="340" width="740" height="35" fill="#000000" opacity="0.85"/>
  <rect x="20" y="370" width="760" height="10" fill="#1D3557" opacity="0.7"/>
  <!-- Thick diagonal beams - left tower -->
  <polygon points="150,340 180,340 210,620 170,620" fill="#000000" opacity="0.8"/>
  <polygon points="220,340 190,340 160,620 200,620" fill="#1D3557" opacity="0.7"/>
  <!-- Left tower vertical -->
  <rect x="165" y="140" width="40" height="200" fill="#000000" opacity="0.85"/>
  <rect x="155" y="130" width="60" height="20" fill="#1D3557" opacity="0.8"/>
  <!-- Thick diagonal beams - right tower -->
  <polygon points="580,340 610,340 640,620 600,620" fill="#000000" opacity="0.8"/>
  <polygon points="650,340 620,340 590,620 630,620" fill="#1D3557" opacity="0.7"/>
  <!-- Right tower vertical -->
  <rect x="595" y="120" width="40" height="220" fill="#000000" opacity="0.85"/>
  <rect x="585" y="110" width="60" height="20" fill="#1D3557" opacity="0.8"/>
  <!-- Red triangular supports -->
  <polygon points="185,340 100,620 140,620" fill="#E63946" opacity="0.7"/>
  <polygon points="185,340 240,620 280,620" fill="#E63946" opacity="0.65"/>
  <polygon points="615,340 530,620 570,620" fill="#E63946" opacity="0.7"/>
  <polygon points="615,340 670,620 710,620" fill="#E63946" opacity="0.65"/>
  <!-- Small red triangle accents -->
  <polygon points="380,340 360,380 400,380" fill="#E63946" opacity="0.6"/>
  <polygon points="420,340 400,380 440,380" fill="#E63946" opacity="0.55"/>
  <!-- Yellow highlight rectangles -->
  <rect x="170" y="180" width="30" height="50" fill="#F4D35E" opacity="0.85"/>
  <rect x="600" y="160" width="30" height="50" fill="#F4D35E" opacity="0.85"/>
  <rect x="350" y="350" width="100" height="8" fill="#F4D35E" opacity="0.8"/>
  <rect x="60" y="345" width="80" height="6" fill="#F4D35E" opacity="0.7"/>
  <rect x="660" y="345" width="80" height="6" fill="#F4D35E" opacity="0.7"/>
  <!-- Cable arcs - left side -->
  <path d="M185,140 Q100,260 30,340" fill="none" stroke="#000000" stroke-width="3" opacity="0.5"/>
  <path d="M185,140 Q240,260 340,340" fill="none" stroke="#000000" stroke-width="3" opacity="0.5"/>
  <path d="M185,150 Q130,250 70,340" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.4"/>
  <path d="M185,150 Q220,250 300,340" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.4"/>
  <!-- Cable arcs - right side -->
  <path d="M615,120 Q530,240 460,340" fill="none" stroke="#000000" stroke-width="3" opacity="0.5"/>
  <path d="M615,120 Q700,240 770,340" fill="none" stroke="#000000" stroke-width="3" opacity="0.5"/>
  <path d="M615,130 Q550,240 490,340" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.4"/>
  <path d="M615,130 Q680,240 740,340" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.4"/>
  <!-- Center cable arc connecting towers -->
  <path d="M185,140 Q400,60 615,120" fill="none" stroke="#1D3557" stroke-width="2.5" opacity="0.6"/>
  <path d="M185,150 Q400,80 615,130" fill="none" stroke="#457B9D" stroke-width="1.5" opacity="0.4"/>
  <!-- Vertical cable lines -->
  <line x1="250" y1="225" x2="250" y2="340" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="320" y1="180" x2="320" y2="340" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="65" x2="400" y2="340" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="480" y1="145" x2="480" y2="340" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="540" y1="175" x2="540" y2="340" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <!-- Accent shapes -->
  <circle cx="400" cy="65" r="6" fill="#E63946" opacity="0.8"/>
  <circle cx="185" cy="140" r="7" fill="#F4D35E" opacity="0.85"/>
  <circle cx="615" cy="120" r="7" fill="#F4D35E" opacity="0.85"/>
  <!-- Corner accents -->
  <rect x="15" y="15" width="22" height="22" fill="#E63946" opacity="0.6"/>
  <rect x="763" y="15" width="22" height="22" fill="#1D3557" opacity="0.6"/>
  <rect x="763" y="763" width="22" height="22" fill="#264653" opacity="0.6"/>
  <rect x="15" y="763" width="22" height="22" fill="#F4D35E" opacity="0.6"/>
</svg>