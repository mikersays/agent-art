<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Escalator</title>
  <rect width="800" height="800" fill="#FFF"/>

  <!-- Background geometric shapes -->
  <rect x="0" y="0" width="800" height="200" fill="#A8DADC" opacity="0.3"/>
  <rect x="0" y="600" width="800" height="200" fill="#DDA15E" opacity="0.3"/>

  <!-- Escalator stepped diagonal band -->
  <polygon points="100,700 150,700 150,650 200,650 200,600 250,600 250,550 300,550 300,500 350,500 350,450 400,450 400,400 450,400 450,350 500,350 500,300 550,300 550,250 600,250 600,200 650,200 650,150 700,150 700,100 700,100 650,100 650,150 600,150 600,200 550,200 550,250 500,250 500,300 450,300 450,350 400,350 400,400 350,400 350,450 300,450 300,500 250,500 250,550 200,550 200,600 150,600 150,650 100,650" fill="#333" stroke="#000" stroke-width="2"/>

  <!-- Left handrail -->
  <line x1="80" y1="720" x2="680" y2="80" stroke="#000" stroke-width="6"/>
  <line x1="70" y1="715" x2="670" y2="75" stroke="#000" stroke-width="3"/>

  <!-- Right handrail -->
  <line x1="720" y1="720" x2="720" y2="80" stroke="#000" stroke-width="6" transform="rotate(-45, 400, 400)" />
  <line x1="130" y1="720" x2="730" y2="120" stroke="#000" stroke-width="6"/>
  <line x1="140" y1="725" x2="740" y2="125" stroke="#000" stroke-width="3"/>

  <!-- Figure 1 - bottom of escalator (circle head + triangle body) -->
  <circle cx="170" cy="635" r="15" fill="#E63946"/>
  <polygon points="155,655 185,655 170,695" fill="#E63946"/>
  <line x1="170" y1="655" x2="170" y2="685" stroke="#E63946" stroke-width="3"/>

  <!-- Figure 2 - mid-lower -->
  <circle cx="280" cy="535" r="15" fill="#1D3557"/>
  <polygon points="265,555 295,555 280,595" fill="#1D3557"/>
  <line x1="280" y1="555" x2="280" y2="585" stroke="#1D3557" stroke-width="3"/>

  <!-- Figure 3 - middle -->
  <circle cx="390" cy="435" r="15" fill="#F4D35E"/>
  <polygon points="375,455 405,455 390,495" fill="#F4D35E"/>
  <line x1="390" y1="455" x2="390" y2="485" stroke="#F4D35E" stroke-width="3"/>

  <!-- Figure 4 - mid-upper -->
  <circle cx="500" cy="335" r="15" fill="#E63946"/>
  <polygon points="485,355 515,355 500,395" fill="#E63946"/>
  <line x1="500" y1="355" x2="500" y2="385" stroke="#E63946" stroke-width="3"/>

  <!-- Figure 5 - top -->
  <circle cx="610" cy="235" r="15" fill="#1D3557"/>
  <polygon points="595,255 625,255 610,295" fill="#1D3557"/>
  <line x1="610" y1="255" x2="610" y2="285" stroke="#1D3557" stroke-width="3"/>

  <!-- Step detail lines -->
  <line x1="150" y1="650" x2="200" y2="650" stroke="#F4D35E" stroke-width="3"/>
  <line x1="200" y1="600" x2="250" y2="600" stroke="#F4D35E" stroke-width="3"/>
  <line x1="250" y1="550" x2="300" y2="550" stroke="#F4D35E" stroke-width="3"/>
  <line x1="300" y1="500" x2="350" y2="500" stroke="#F4D35E" stroke-width="3"/>
  <line x1="350" y1="450" x2="400" y2="450" stroke="#F4D35E" stroke-width="3"/>
  <line x1="400" y1="400" x2="450" y2="400" stroke="#F4D35E" stroke-width="3"/>
  <line x1="450" y1="350" x2="500" y2="350" stroke="#F4D35E" stroke-width="3"/>
  <line x1="500" y1="300" x2="550" y2="300" stroke="#F4D35E" stroke-width="3"/>
  <line x1="550" y1="250" x2="600" y2="250" stroke="#F4D35E" stroke-width="3"/>
  <line x1="600" y1="200" x2="650" y2="200" stroke="#F4D35E" stroke-width="3"/>
  <line x1="650" y1="150" x2="700" y2="150" stroke="#F4D35E" stroke-width="3"/>

  <!-- Decorative geometric elements -->
  <rect x="30" y="30" width="60" height="60" fill="#E63946" opacity="0.8"/>
  <circle cx="750" cy="60" r="30" fill="#1D3557" opacity="0.8"/>
  <rect x="30" y="710" width="40" height="40" fill="#F4D35E" opacity="0.8"/>
  <polygon points="750,750 720,780 780,780" fill="#DDA15E"/>

  <!-- Floor lines at bottom -->
  <line x1="0" y1="740" x2="150" y2="740" stroke="#000" stroke-width="4"/>
  <line x1="0" y1="750" x2="120" y2="750" stroke="#333" stroke-width="2"/>

  <!-- Ceiling lines at top -->
  <line x1="650" y1="100" x2="800" y2="100" stroke="#000" stroke-width="4"/>
  <line x1="680" y1="90" x2="800" y2="90" stroke="#333" stroke-width="2"/>
</svg>