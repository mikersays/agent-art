<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background: white -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>
  <!-- Subtle grid -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <!-- Shadow/depth rectangles (warm gray at low opacity) -->
  <rect x="85" y="105" width="140" height="100" fill="#A89F91" opacity="0.3"/>
  <rect x="205" y="205" width="140" height="100" fill="#A89F91" opacity="0.3"/>
  <rect x="325" y="305" width="140" height="100" fill="#A89F91" opacity="0.3"/>
  <rect x="445" y="405" width="140" height="100" fill="#A89F91" opacity="0.3"/>
  <rect x="565" y="505" width="140" height="100" fill="#A89F91" opacity="0.3"/>
  <!-- Step 1: Blue -->
  <rect x="70" y="80" width="140" height="100" fill="#1D3557" stroke="#000000" stroke-width="3"/>
  <!-- Step 2: Red -->
  <rect x="190" y="180" width="140" height="100" fill="#E63946" stroke="#000000" stroke-width="3"/>
  <!-- Step 3: Yellow -->
  <rect x="310" y="280" width="140" height="100" fill="#F4D35E" stroke="#000000" stroke-width="3"/>
  <!-- Step 4: Teal -->
  <rect x="430" y="380" width="140" height="100" fill="#2A9D8F" stroke="#000000" stroke-width="3"/>
  <!-- Step 5: Orange -->
  <rect x="550" y="480" width="140" height="100" fill="#E76F51" stroke="#000000" stroke-width="3"/>
  <!-- Extra steps continuing the descent -->
  <rect x="640" y="570" width="120" height="85" fill="#1D3557" stroke="#000000" stroke-width="2.5" opacity="0.7"/>
  <rect x="710" y="645" width="80" height="65" fill="#E63946" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <!-- Corner circles on steps (contrasting colors) -->
  <circle cx="70" cy="80" r="8" fill="#F4D35E"/>
  <circle cx="210" cy="80" r="8" fill="#F4D35E"/>
  <circle cx="190" cy="180" r="8" fill="#1D3557"/>
  <circle cx="330" cy="180" r="8" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <circle cx="310" cy="280" r="8" fill="#E63946"/>
  <circle cx="450" cy="280" r="8" fill="#E63946"/>
  <circle cx="430" cy="380" r="8" fill="#F4D35E"/>
  <circle cx="570" cy="380" r="8" fill="#000000"/>
  <circle cx="550" cy="480" r="8" fill="#1D3557"/>
  <circle cx="690" cy="480" r="8" fill="#1D3557"/>
  <circle cx="550" cy="580" r="8" fill="#2A9D8F"/>
  <circle cx="690" cy="580" r="8" fill="#F4D35E"/>
  <!-- Forest green triangles pointing along descent -->
  <polygon points="160,150 180,135 180,165" fill="#264653"/>
  <polygon points="280,250 300,235 300,265" fill="#264653"/>
  <polygon points="400,350 420,335 420,365" fill="#264653"/>
  <polygon points="520,450 540,435 540,465" fill="#264653"/>
  <polygon points="640,550 660,535 660,565" fill="#264653"/>
  <!-- Diagonal guide line -->
  <line x1="70" y1="80" x2="750" y2="710" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <!-- Accent elements -->
  <rect x="20" y="700" width="50" height="50" fill="#DDA15E" opacity="0.4"/>
  <circle cx="750" cy="100" r="20" fill="#A8DADC" opacity="0.3"/>
  <circle cx="400" cy="400" r="5" fill="#E63946" opacity="0.5"/>
  <rect x="600" y="50" width="30" height="30" fill="#6D2E46" opacity="0.3"/>
</svg>