<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>

  <!-- Subtle background grid -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>

  <!-- Cascading rectangles: top-left to bottom-right, cool to warm, decreasing size -->
  <!-- Rectangle 1 - largest, top-left, deep blue -->
  <rect x="10" y="10" width="260" height="180" fill="#1D3557" opacity="0.92"/>
  <!-- Rectangle 2 - forest -->
  <rect x="70" y="70" width="230" height="160" fill="#264653" opacity="0.88"/>
  <!-- Rectangle 3 - steel blue -->
  <rect x="130" y="130" width="210" height="148" fill="#457B9D" opacity="0.85"/>
  <!-- Rectangle 4 - teal -->
  <rect x="190" y="190" width="190" height="136" fill="#2A9D8F" opacity="0.85"/>
  <!-- Rectangle 5 - light blue transition -->
  <rect x="250" y="250" width="170" height="124" fill="#A8DADC" opacity="0.8"/>
  <!-- Rectangle 6 - warm transition begins, sand -->
  <rect x="310" y="310" width="150" height="112" fill="#DDA15E" opacity="0.85"/>
  <!-- Rectangle 7 - coral/golden -->
  <rect x="370" y="370" width="130" height="100" fill="#E9C46A" opacity="0.88"/>
  <!-- Rectangle 8 - orange -->
  <rect x="420" y="420" width="115" height="90" fill="#E76F51" opacity="0.88"/>
  <!-- Rectangle 9 - red-orange -->
  <rect x="470" y="470" width="100" height="80" fill="#E63946" opacity="0.9"/>
  <!-- Rectangle 10 - deep red/burgundy -->
  <rect x="520" y="520" width="85" height="70" fill="#6D2E46" opacity="0.9"/>
  <!-- Rectangle 11 - red -->
  <rect x="565" y="565" width="72" height="60" fill="#E63946" opacity="0.92"/>
  <!-- Rectangle 12 -->
  <rect x="608" y="608" width="60" height="50" fill="#E76F51" opacity="0.9"/>
  <!-- Rectangle 13 -->
  <rect x="648" y="648" width="50" height="42" fill="#DDA15E" opacity="0.9"/>
  <!-- Rectangle 14 -->
  <rect x="685" y="685" width="42" height="35" fill="#6D2E46" opacity="0.92"/>
  <!-- Rectangle 15 - smallest -->
  <rect x="720" y="720" width="34" height="28" fill="#E63946" opacity="0.95"/>
  <!-- Tail anchor -->
  <rect x="750" y="752" width="26" height="22" fill="#000000" opacity="0.85"/>
  <rect x="774" y="774" width="18" height="18" fill="#000000"/>

  <!-- Accent lines along diagonal -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="1.5" opacity="0.12"/>
  <line x1="40" y1="0" x2="800" y2="760" stroke="#000000" stroke-width="0.8" opacity="0.08"/>
  <line x1="0" y1="40" x2="760" y2="800" stroke="#000000" stroke-width="0.8" opacity="0.08"/>

  <!-- Top-left anchor shapes -->
  <rect x="0" y="0" width="50" height="8" fill="#1D3557"/>
  <rect x="0" y="0" width="8" height="50" fill="#1D3557"/>

  <!-- Bottom-right anchor shapes -->
  <rect x="750" y="792" width="50" height="8" fill="#E63946"/>
  <rect x="792" y="750" width="8" height="50" fill="#E63946"/>

  <!-- Small scattered accent squares along the cascade edges -->
  <rect x="30" y="220" width="14" height="14" fill="#2A9D8F" opacity="0.6"/>
  <rect x="80" y="300" width="12" height="12" fill="#457B9D" opacity="0.5"/>
  <rect x="200" y="80" width="10" height="10" fill="#264653" opacity="0.5"/>
  <rect x="560" y="340" width="12" height="12" fill="#E76F51" opacity="0.5"/>
  <rect x="680" y="440" width="10" height="10" fill="#E63946" opacity="0.5"/>
  <rect x="740" y="550" width="14" height="14" fill="#6D2E46" opacity="0.6"/>

  <!-- Corner accent -->
  <rect x="0" y="0" width="12" height="12" fill="#000000"/>
  <rect x="788" y="788" width="12" height="12" fill="#000000"/>
</svg>
