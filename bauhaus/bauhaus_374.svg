<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Horizontal parallel lines (varied spacing) -->
  <line x1="50" y1="80" x2="750" y2="80" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="160" x2="750" y2="160" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="260" x2="750" y2="260" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="340" x2="750" y2="340" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="450" x2="750" y2="450" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="550" x2="750" y2="550" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="630" x2="750" y2="630" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="740" x2="750" y2="740" stroke="#000000" stroke-width="1.5" opacity="0.6"/>

  <!-- Vertical parallel lines (different spacing) -->
  <line x1="100" y1="50" x2="100" y2="770" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="210" y1="50" x2="210" y2="770" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="350" y1="50" x2="350" y2="770" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="460" y1="50" x2="460" y2="770" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="540" y1="50" x2="540" y2="770" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="670" y1="50" x2="670" y2="770" stroke="#000000" stroke-width="1.5" opacity="0.5"/>

  <!-- Filled cells - Red -->
  <rect x="100" y="80" width="110" height="80" fill="#E63946" opacity="0.75"/>
  <rect x="460" y="260" width="80" height="80" fill="#E63946" opacity="0.7"/>
  <rect x="350" y="630" width="110" height="110" fill="#E63946" opacity="0.65"/>

  <!-- Filled cells - Blue -->
  <rect x="350" y="80" width="110" height="80" fill="#1D3557" opacity="0.8"/>
  <rect x="100" y="340" width="110" height="110" fill="#1D3557" opacity="0.7"/>
  <rect x="540" y="550" width="130" height="80" fill="#1D3557" opacity="0.65"/>

  <!-- Filled cells - Yellow -->
  <rect x="540" y="160" width="130" height="100" fill="#F4D35E" opacity="0.8"/>
  <rect x="210" y="450" width="140" height="100" fill="#F4D35E" opacity="0.75"/>
  <rect x="670" y="630" width="80" height="110" fill="#F4D35E" opacity="0.7"/>

  <!-- Large teal ellipse overlay -->
  <ellipse cx="380" cy="380" rx="280" ry="220" fill="#2A9D8F" opacity="0.4"/>

  <!-- Black accent dots at intersections -->
  <circle cx="100" cy="80" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="210" cy="80" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="350" cy="160" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="460" cy="260" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="540" cy="340" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="670" cy="450" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="100" cy="550" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="210" cy="630" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="350" cy="740" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="460" cy="450" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="540" cy="160" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="670" cy="260" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="100" cy="340" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="210" cy="260" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="460" cy="550" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="540" cy="630" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="670" cy="740" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="350" cy="340" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="100" cy="740" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="670" cy="80" r="5" fill="#000000" opacity="0.8"/>

  <!-- Additional small accent dots -->
  <circle cx="540" cy="80" r="3" fill="#000000" opacity="0.6"/>
  <circle cx="460" cy="160" r="3" fill="#000000" opacity="0.6"/>
  <circle cx="670" cy="160" r="3" fill="#000000" opacity="0.6"/>
  <circle cx="210" cy="340" r="3" fill="#000000" opacity="0.6"/>
  <circle cx="350" cy="450" r="3" fill="#000000" opacity="0.6"/>
  <circle cx="460" cy="740" r="3" fill="#000000" opacity="0.6"/>
  <circle cx="540" cy="740" r="3" fill="#000000" opacity="0.6"/>
  <circle cx="210" cy="740" r="3" fill="#000000" opacity="0.6"/>
</svg>