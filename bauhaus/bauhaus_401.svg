<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Background grid lines at low opacity -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>

  <!-- Large red rectangle rotated 30deg as anchor -->
  <rect x="150" y="250" width="400" height="180" fill="#E63946" opacity="0.85" transform="rotate(30, 350, 340)"/>

  <!-- Bold diagonal lines from corners -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#1D3557" stroke-width="4" opacity="0.9"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#1D3557" stroke-width="4" opacity="0.9"/>
  <line x1="0" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="800" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="200" x2="800" y2="600" stroke="#457B9D" stroke-width="2.5" opacity="0.7"/>
  <line x1="0" y1="600" x2="800" y2="200" stroke="#457B9D" stroke-width="2.5" opacity="0.7"/>

  <!-- Circles at diagonal intersections -->
  <circle cx="400" cy="400" r="30" fill="#F4D35E" stroke="#000000" stroke-width="2" opacity="0.95"/>
  <circle cx="267" cy="533" r="18" fill="#2A9D8F" stroke="#000000" stroke-width="1.5" opacity="0.9"/>
  <circle cx="533" cy="267" r="18" fill="#2A9D8F" stroke="#000000" stroke-width="1.5" opacity="0.9"/>
  <circle cx="200" cy="600" r="12" fill="#F4D35E" opacity="0.8"/>
  <circle cx="600" cy="200" r="12" fill="#F4D35E" opacity="0.8"/>
  <circle cx="150" cy="350" r="10" fill="#E63946" opacity="0.7"/>
  <circle cx="650" cy="450" r="10" fill="#E63946" opacity="0.7"/>

  <!-- Small teal squares scattered -->
  <rect x="60" y="60" width="28" height="28" fill="#2A9D8F" opacity="0.85"/>
  <rect x="710" y="70" width="22" height="22" fill="#2A9D8F" opacity="0.8"/>
  <rect x="680" y="680" width="30" height="30" fill="#2A9D8F" opacity="0.75"/>
  <rect x="55" y="720" width="25" height="25" fill="#2A9D8F" opacity="0.8"/>
  <rect x="340" y="120" width="18" height="18" fill="#2A9D8F" opacity="0.7"/>
  <rect x="470" y="640" width="20" height="20" fill="#2A9D8F" opacity="0.7"/>

  <!-- Small yellow squares scattered -->
  <rect x="130" y="490" width="20" height="20" fill="#F4D35E" opacity="0.9"/>
  <rect x="620" y="540" width="24" height="24" fill="#F4D35E" opacity="0.85"/>
  <rect x="250" y="680" width="16" height="16" fill="#F4D35E" opacity="0.8"/>
  <rect x="560" y="120" width="18" height="18" fill="#F4D35E" opacity="0.8"/>
  <rect x="740" y="350" width="20" height="20" fill="#F4D35E" opacity="0.75"/>
  <rect x="30" y="380" width="16" height="16" fill="#F4D35E" opacity="0.75"/>

  <!-- Additional structural accent lines -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.25"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="1.5" opacity="0.25"/>

  <!-- Steel blue accent circle -->
  <circle cx="400" cy="400" r="120" fill="none" stroke="#457B9D" stroke-width="2" opacity="0.35"/>
  <circle cx="400" cy="400" r="60" fill="none" stroke="#1D3557" stroke-width="1.5" opacity="0.3"/>
</svg>
