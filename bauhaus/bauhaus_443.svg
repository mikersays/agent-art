<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background: Dark blue -->
  <rect width="800" height="800" fill="#1D3557"/>

  <!-- Horizontal connecting lines (rhythm backbone) -->
  <line x1="30" y1="620" x2="770" y2="620" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  <line x1="30" y1="650" x2="770" y2="650" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
  <line x1="30" y1="200" x2="770" y2="200" stroke="#FFFFFF" stroke-width="1.5" opacity="0.2"/>
  <line x1="30" y1="180" x2="770" y2="180" stroke="#F4D35E" stroke-width="0.8" opacity="0.25"/>

  <!-- Tall bars (primary colors) - the "beats" -->
  <!-- Bar 1: Red tall -->
  <rect x="40" y="200" width="55" height="420" fill="#E63946"/>
  <!-- Bar 2: Blue tall -->
  <rect x="160" y="150" width="55" height="470" fill="#457B9D"/>
  <!-- Bar 3: Yellow tall -->
  <rect x="280" y="230" width="55" height="390" fill="#F4D35E"/>
  <!-- Bar 4: Red tall -->
  <rect x="400" y="170" width="55" height="450" fill="#E63946" opacity="0.9"/>
  <!-- Bar 5: Steel Blue tall -->
  <rect x="520" y="210" width="55" height="410" fill="#2A9D8F"/>
  <!-- Bar 6: Blue tall -->
  <rect x="640" y="140" width="55" height="480" fill="#1D3557" stroke="#457B9D" stroke-width="3"/>
  <!-- Bar 7: Orange tall (partial, right edge) -->
  <rect x="730" y="250" width="40" height="370" fill="#E76F51"/>

  <!-- Short bars (muted colors) - the "rests" -->
  <!-- Short 1: Warm Gray -->
  <rect x="100" y="500" width="55" height="120" fill="#A89F91"/>
  <!-- Short 2: Sand -->
  <rect x="220" y="480" width="55" height="140" fill="#DDA15E"/>
  <!-- Short 3: Cream -->
  <rect x="340" y="510" width="55" height="110" fill="#FEFAE0" opacity="0.85"/>
  <!-- Short 4: Warm Gray -->
  <rect x="460" y="490" width="55" height="130" fill="#A89F91" opacity="0.8"/>
  <!-- Short 5: Sand -->
  <rect x="580" y="505" width="55" height="115" fill="#DDA15E" opacity="0.9"/>
  <!-- Short 6: Light Blue small -->
  <rect x="695" y="515" width="30" height="105" fill="#A8DADC" opacity="0.75"/>

  <!-- Connecting horizontal lines at bar tops -->
  <line x1="40" y1="200" x2="95" y2="200" stroke="#E63946" stroke-width="2" opacity="0.6"/>
  <line x1="160" y1="150" x2="215" y2="150" stroke="#457B9D" stroke-width="2" opacity="0.6"/>
  <line x1="280" y1="230" x2="335" y2="230" stroke="#F4D35E" stroke-width="2" opacity="0.6"/>
  <line x1="400" y1="170" x2="455" y2="170" stroke="#E63946" stroke-width="2" opacity="0.6"/>
  <line x1="520" y1="210" x2="575" y2="210" stroke="#2A9D8F" stroke-width="2" opacity="0.6"/>
  <line x1="640" y1="140" x2="695" y2="140" stroke="#457B9D" stroke-width="2" opacity="0.6"/>

  <!-- Thin lines connecting bar tops in a rhythm wave -->
  <polyline points="67,200 187,150 307,230 427,170 547,210 667,140 750,250" fill="none" stroke="#F4D35E" stroke-width="1.5" opacity="0.4"/>

  <!-- Small circle accents at bar tops -->
  <circle cx="67" cy="200" r="7" fill="#F4D35E"/>
  <circle cx="187" cy="150" r="7" fill="#F4D35E"/>
  <circle cx="307" cy="230" r="7" fill="#F4D35E"/>
  <circle cx="427" cy="170" r="7" fill="#F4D35E"/>
  <circle cx="547" cy="210" r="7" fill="#F4D35E"/>
  <circle cx="667" cy="140" r="7" fill="#F4D35E"/>
  <circle cx="750" cy="250" r="5" fill="#E9C46A"/>

  <!-- Small circle accents at short bar tops -->
  <circle cx="127" cy="500" r="5" fill="#FEFAE0" opacity="0.6"/>
  <circle cx="247" cy="480" r="5" fill="#FEFAE0" opacity="0.6"/>
  <circle cx="367" cy="510" r="5" fill="#FEFAE0" opacity="0.6"/>
  <circle cx="487" cy="490" r="5" fill="#FEFAE0" opacity="0.6"/>
  <circle cx="607" cy="505" r="5" fill="#FEFAE0" opacity="0.6"/>

  <!-- Base line -->
  <rect x="30" y="618" width="740" height="4" fill="#FFFFFF" opacity="0.2"/>

  <!-- Top grid lines for atmosphere -->
  <line x1="0" y1="80" x2="800" y2="80" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="730" x2="800" y2="730" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>

  <!-- Corner accents -->
  <rect x="15" y="15" width="25" height="25" fill="none" stroke="#F4D35E" stroke-width="1.5" opacity="0.4"/>
  <rect x="760" y="760" width="25" height="25" fill="none" stroke="#F4D35E" stroke-width="1.5" opacity="0.4"/>
</svg>
