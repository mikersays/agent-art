<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background cream -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Steel blue horizontal lines at low opacity -->
  <line x1="0" y1="50" x2="800" y2="50" stroke="#457B9D" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="120" x2="800" y2="120" stroke="#457B9D" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="190" x2="800" y2="190" stroke="#457B9D" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="260" x2="800" y2="260" stroke="#457B9D" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="330" x2="800" y2="330" stroke="#457B9D" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#457B9D" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="470" x2="800" y2="470" stroke="#457B9D" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="540" x2="800" y2="540" stroke="#457B9D" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="610" x2="800" y2="610" stroke="#457B9D" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="680" x2="800" y2="680" stroke="#457B9D" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="750" x2="800" y2="750" stroke="#457B9D" stroke-width="1" opacity="0.08"/>
  <!-- Tower base - wide blue rectangle -->
  <rect x="200" y="620" width="400" height="100" fill="#1D3557" opacity="0.95"/>
  <!-- Black outline for base -->
  <rect x="200" y="620" width="400" height="100" fill="none" stroke="#000000" stroke-width="2"/>
  <!-- Second level - slightly narrower red -->
  <rect x="240" y="530" width="320" height="90" fill="#E63946" opacity="0.9"/>
  <rect x="240" y="530" width="320" height="90" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- Third level - red square -->
  <rect x="290" y="450" width="220" height="80" fill="#E63946" opacity="0.85"/>
  <rect x="290" y="450" width="220" height="80" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- Fourth level - yellow section -->
  <rect x="320" y="380" width="160" height="70" fill="#F4D35E" opacity="0.9"/>
  <rect x="320" y="380" width="160" height="70" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- Yellow triangle -->
  <polygon points="340,310 460,310 400,240" fill="#F4D35E" opacity="0.9"/>
  <polygon points="340,310 460,310 400,240" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- Teal circle on top -->
  <circle cx="400" cy="200" r="45" fill="#2A9D8F" opacity="0.9"/>
  <circle cx="400" cy="200" r="45" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- Small teal circle at peak -->
  <circle cx="400" cy="140" r="20" fill="#2A9D8F" opacity="0.85"/>
  <circle cx="400" cy="140" r="20" fill="none" stroke="#000000" stroke-width="1"/>
  <!-- Tiny red square at very top -->
  <rect x="392" y="105" width="16" height="16" fill="#E63946" opacity="0.9"/>
  <!-- Black vertical line through tower center -->
  <line x1="400" y1="100" x2="400" y2="720" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <!-- Scattered coral shapes around tower -->
  <circle cx="120" cy="400" r="12" fill="#E9C46A" opacity="0.7"/>
  <circle cx="680" cy="350" r="15" fill="#E9C46A" opacity="0.65"/>
  <circle cx="100" cy="600" r="10" fill="#E9C46A" opacity="0.6"/>
  <rect x="660" y="550" width="18" height="18" fill="#E9C46A" opacity="0.7"/>
  <circle cx="150" cy="250" r="8" fill="#E9C46A" opacity="0.55"/>
  <!-- Sand shapes -->
  <rect x="80" y="500" width="25" height="12" fill="#DDA15E" opacity="0.7"/>
  <rect x="690" y="460" width="20" height="14" fill="#DDA15E" opacity="0.65"/>
  <rect x="650" y="200" width="22" height="10" fill="#DDA15E" opacity="0.6"/>
  <rect x="110" y="150" width="18" height="18" fill="#DDA15E" opacity="0.55"/>
  <circle cx="720" cy="650" r="9" fill="#DDA15E" opacity="0.6"/>
  <!-- Small accent elements -->
  <rect x="170" y="680" width="20" height="8" fill="#1D3557" opacity="0.4"/>
  <rect x="620" y="700" width="20" height="8" fill="#1D3557" opacity="0.4"/>
  <circle cx="500" cy="760" r="6" fill="#E63946" opacity="0.4"/>
  <circle cx="300" cy="760" r="6" fill="#F4D35E" opacity="0.4"/>
  <!-- Corner accents -->
  <rect x="20" y="20" width="30" height="30" fill="#000000" opacity="0.15"/>
  <rect x="750" y="20" width="30" height="30" fill="#000000" opacity="0.15"/>
  <rect x="20" y="750" width="30" height="30" fill="#000000" opacity="0.15"/>
  <rect x="750" y="750" width="30" height="30" fill="#000000" opacity="0.15"/>
  <!-- Horizontal bars for rhythm -->
  <rect x="50" y="330" width="100" height="3" fill="#457B9D" opacity="0.3"/>
  <rect x="650" y="280" width="100" height="3" fill="#457B9D" opacity="0.3"/>
  <rect x="50" y="710" width="80" height="3" fill="#E63946" opacity="0.3"/>
</svg>