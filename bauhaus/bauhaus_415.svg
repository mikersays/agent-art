<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Sky background -->
  <rect x="0" y="0" width="800" height="800" fill="#A8DADC"/>

  <!-- Sun -->
  <circle cx="120" cy="120" r="60" fill="#F4D35E"/>
  <circle cx="120" cy="120" r="48" fill="#E9C46A"/>

  <!-- Sun rays (lines) -->
  <line x1="120" y1="40" x2="120" y2="15" stroke="#F4D35E" stroke-width="3"/>
  <line x1="120" y1="200" x2="120" y2="225" stroke="#F4D35E" stroke-width="3"/>
  <line x1="40" y1="120" x2="15" y2="120" stroke="#F4D35E" stroke-width="3"/>
  <line x1="200" y1="120" x2="225" y2="120" stroke="#F4D35E" stroke-width="3"/>
  <line x1="63" y1="63" x2="45" y2="45" stroke="#F4D35E" stroke-width="2.5"/>
  <line x1="177" y1="63" x2="195" y2="45" stroke="#F4D35E" stroke-width="2.5"/>
  <line x1="63" y1="177" x2="45" y2="195" stroke="#F4D35E" stroke-width="2.5"/>
  <line x1="177" y1="177" x2="195" y2="195" stroke="#F4D35E" stroke-width="2.5"/>

  <!-- Horizontal horizon lines -->
  <line x1="0" y1="480" x2="800" y2="480" stroke="#264653" stroke-width="2" opacity="0.4"/>
  <line x1="0" y1="560" x2="800" y2="560" stroke="#264653" stroke-width="2" opacity="0.35"/>
  <line x1="0" y1="640" x2="800" y2="640" stroke="#264653" stroke-width="1.5" opacity="0.3"/>

  <!-- Back mountain range: Forest (darkest, furthest) -->
  <polyline points="0,480 60,380 130,440 200,330 280,420 360,300 440,390 520,280 600,370 680,260 760,360 800,300 800,480 0,480"
            fill="#264653" opacity="0.85"/>

  <!-- Mid mountain range: Teal -->
  <polyline points="0,560 40,480 110,530 180,440 260,510 340,400 420,490 500,360 580,450 660,380 740,460 800,410 800,560 0,560"
            fill="#2A9D8F" opacity="0.9"/>

  <!-- Near mountain range: Steel Blue -->
  <polyline points="0,640 50,570 120,610 200,540 280,590 370,510 450,570 530,490 610,560 690,510 770,570 800,540 800,640 0,640"
            fill="#457B9D" opacity="0.95"/>

  <!-- Foreground zigzag: Sand -->
  <polyline points="0,720 80,660 160,720 240,650 320,720 400,640 480,720 560,650 640,720 720,650 800,720 800,800 0,800"
            fill="#DDA15E"/>

  <!-- Bottom ground: Coral/golden -->
  <polyline points="0,760 60,730 140,760 220,730 300,770 380,730 460,765 540,730 620,760 700,730 800,760 800,800 0,800"
            fill="#E9C46A" opacity="0.9"/>

  <!-- Extra zigzag accent line on mid range -->
  <polyline points="0,440 80,390 160,440 240,370 320,430 400,350 480,420 560,340 640,400 720,320 800,380"
            fill="none" stroke="#264653" stroke-width="2" opacity="0.4"/>

  <!-- Foreground accent polyline strokes -->
  <polyline points="0,640 80,590 160,640 240,580 320,640 400,560 480,640 560,580 640,640 720,570 800,620"
            fill="none" stroke="#457B9D" stroke-width="2.5" opacity="0.5"/>

  <!-- Small accent shapes: dots/triangles on foreground -->
  <circle cx="200" cy="740" r="12" fill="#E63946" opacity="0.75"/>
  <circle cx="480" cy="755" r="9" fill="#E63946" opacity="0.65"/>
  <circle cx="680" cy="748" r="8" fill="#1D3557" opacity="0.6"/>

  <!-- Triangular accent shapes in foreground -->
  <polygon points="350,720 370,680 390,720" fill="#E63946" opacity="0.7"/>
  <polygon points="590,730 610,695 630,730" fill="#1D3557" opacity="0.65"/>
  <polygon points="100,715 115,685 130,715" fill="#6D2E46" opacity="0.6"/>

  <!-- Horizontal accent bands in sky -->
  <rect x="300" y="60" width="200" height="4" fill="#FFFFFF" opacity="0.2"/>
  <rect x="400" y="80" width="150" height="3" fill="#FFFFFF" opacity="0.15"/>
  <rect x="550" y="150" width="180" height="3" fill="#FFFFFF" opacity="0.12"/>
  <rect x="250" y="180" width="100" height="2" fill="#FFFFFF" opacity="0.15"/>

  <!-- Small clouds (ellipses) in sky -->
  <ellipse cx="500" cy="100" rx="55" ry="22" fill="#FFFFFF" opacity="0.45"/>
  <ellipse cx="570" cy="90" rx="40" ry="16" fill="#FFFFFF" opacity="0.35"/>
  <ellipse cx="680" cy="160" rx="45" ry="18" fill="#FFFFFF" opacity="0.35"/>
  <ellipse cx="730" cy="150" rx="30" ry="13" fill="#FFFFFF" opacity="0.25"/>
  <ellipse cx="350" cy="200" rx="38" ry="15" fill="#FFFFFF" opacity="0.3"/>
</svg>
