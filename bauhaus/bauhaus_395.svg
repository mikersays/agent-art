<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle horizontal lines -->
  <line x1="0" y1="270" x2="800" y2="270" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="530" x2="800" y2="530" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>

  <!-- Fence posts - vertical rectangles across middle third -->
  <rect x="60" y="300" width="22" height="200" fill="#000000" opacity="0.85"/>
  <rect x="140" y="300" width="22" height="200" fill="#1D3557" opacity="0.85"/>
  <rect x="220" y="300" width="22" height="200" fill="#264653" opacity="0.85"/>
  <rect x="300" y="300" width="22" height="200" fill="#000000" opacity="0.85"/>
  <rect x="380" y="300" width="22" height="200" fill="#1D3557" opacity="0.85"/>
  <rect x="460" y="300" width="22" height="200" fill="#264653" opacity="0.85"/>
  <rect x="540" y="300" width="22" height="200" fill="#000000" opacity="0.85"/>
  <rect x="620" y="300" width="22" height="200" fill="#1D3557" opacity="0.85"/>
  <rect x="700" y="300" width="22" height="200" fill="#264653" opacity="0.85"/>

  <!-- Horizontal connecting bars -->
  <rect x="60" y="340" width="662" height="8" fill="#000000" opacity="0.6"/>
  <rect x="60" y="400" width="662" height="8" fill="#1D3557" opacity="0.5"/>
  <rect x="60" y="460" width="662" height="8" fill="#264653" opacity="0.5"/>

  <!-- Post caps (small rects on top of each post) -->
  <rect x="55" y="292" width="32" height="10" fill="#000000" opacity="0.7"/>
  <rect x="135" y="292" width="32" height="10" fill="#1D3557" opacity="0.7"/>
  <rect x="215" y="292" width="32" height="10" fill="#264653" opacity="0.7"/>
  <rect x="295" y="292" width="32" height="10" fill="#000000" opacity="0.7"/>
  <rect x="375" y="292" width="32" height="10" fill="#1D3557" opacity="0.7"/>
  <rect x="455" y="292" width="32" height="10" fill="#264653" opacity="0.7"/>
  <rect x="535" y="292" width="32" height="10" fill="#000000" opacity="0.7"/>
  <rect x="615" y="292" width="32" height="10" fill="#1D3557" opacity="0.7"/>
  <rect x="695" y="292" width="32" height="10" fill="#264653" opacity="0.7"/>

  <!-- Above fence: scattered yellow and coral circles -->
  <circle cx="100" cy="120" r="18" fill="#F4D35E" opacity="0.7"/>
  <circle cx="250" cy="80" r="12" fill="#E9C46A" opacity="0.65"/>
  <circle cx="400" cy="150" r="22" fill="#F4D35E" opacity="0.6"/>
  <circle cx="550" cy="100" r="15" fill="#E9C46A" opacity="0.7"/>
  <circle cx="680" cy="170" r="20" fill="#F4D35E" opacity="0.55"/>
  <circle cx="180" cy="200" r="10" fill="#E9C46A" opacity="0.6"/>
  <circle cx="480" cy="220" r="14" fill="#F4D35E" opacity="0.5"/>
  <circle cx="350" cy="60" r="8" fill="#E9C46A" opacity="0.55"/>
  <circle cx="620" cy="240" r="11" fill="#F4D35E" opacity="0.45"/>
  <circle cx="750" cy="80" r="9" fill="#E9C46A" opacity="0.5"/>

  <!-- Below fence: red and orange triangles -->
  <polygon points="120,580 140,550 160,580" fill="#E63946" opacity="0.7"/>
  <polygon points="250,620 275,580 300,620" fill="#E76F51" opacity="0.65"/>
  <polygon points="400,600 420,565 440,600" fill="#E63946" opacity="0.6"/>
  <polygon points="550,640 570,605 590,640" fill="#E76F51" opacity="0.7"/>
  <polygon points="680,590 700,555 720,590" fill="#E63946" opacity="0.55"/>
  <polygon points="180,680 200,650 220,680" fill="#E76F51" opacity="0.6"/>
  <polygon points="330,720 350,690 370,720" fill="#E63946" opacity="0.5"/>
  <polygon points="500,700 518,670 536,700" fill="#E76F51" opacity="0.55"/>
  <polygon points="650,730 665,700 680,730" fill="#E63946" opacity="0.45"/>
  <polygon points="80,720 95,695 110,720" fill="#E76F51" opacity="0.5"/>

  <!-- Corner accents -->
  <rect x="20" y="20" width="10" height="10" fill="#000000" opacity="0.25"/>
  <rect x="770" y="20" width="10" height="10" fill="#1D3557" opacity="0.25"/>
  <rect x="20" y="770" width="10" height="10" fill="#E63946" opacity="0.25"/>
  <rect x="770" y="770" width="10" height="10" fill="#E76F51" opacity="0.25"/>
</svg>