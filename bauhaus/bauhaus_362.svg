<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Dense crosshatch pattern - diagonal lines going top-left to bottom-right -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#1D3557" stroke-width="1.5" opacity="0.15"/>
  <line x1="80" y1="0" x2="800" y2="720" stroke="#E63946" stroke-width="1" opacity="0.2"/>
  <line x1="160" y1="0" x2="800" y2="640" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="240" y1="0" x2="800" y2="560" stroke="#1D3557" stroke-width="1.5" opacity="0.25"/>
  <line x1="320" y1="0" x2="800" y2="480" stroke="#E63946" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="0" x2="800" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <line x1="480" y1="0" x2="800" y2="320" stroke="#1D3557" stroke-width="1" opacity="0.3"/>
  <line x1="560" y1="0" x2="800" y2="240" stroke="#E63946" stroke-width="1" opacity="0.1"/>
  <line x1="640" y1="0" x2="800" y2="160" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="720" y1="0" x2="800" y2="80" stroke="#1D3557" stroke-width="1.5" opacity="0.15"/>
  <line x1="0" y1="80" x2="720" y2="800" stroke="#E63946" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="160" x2="640" y2="800" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <line x1="0" y1="240" x2="560" y2="800" stroke="#1D3557" stroke-width="1" opacity="0.25"/>
  <line x1="0" y1="320" x2="480" y2="800" stroke="#E63946" stroke-width="1.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="400" y2="800" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="480" x2="320" y2="800" stroke="#1D3557" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="560" x2="240" y2="800" stroke="#E63946" stroke-width="1.5" opacity="0.15"/>
  <line x1="0" y1="640" x2="160" y2="800" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="720" x2="80" y2="800" stroke="#1D3557" stroke-width="1" opacity="0.1"/>

  <!-- Diagonal lines going top-right to bottom-left -->
  <line x1="800" y1="0" x2="0" y2="800" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <line x1="720" y1="0" x2="0" y2="720" stroke="#E63946" stroke-width="1" opacity="0.2"/>
  <line x1="640" y1="0" x2="0" y2="640" stroke="#1D3557" stroke-width="1" opacity="0.15"/>
  <line x1="560" y1="0" x2="0" y2="560" stroke="#000000" stroke-width="1.5" opacity="0.25"/>
  <line x1="480" y1="0" x2="0" y2="480" stroke="#E63946" stroke-width="1" opacity="0.1"/>
  <line x1="400" y1="0" x2="0" y2="400" stroke="#1D3557" stroke-width="1.5" opacity="0.2"/>
  <line x1="320" y1="0" x2="0" y2="320" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="240" y1="0" x2="0" y2="240" stroke="#E63946" stroke-width="1" opacity="0.15"/>
  <line x1="160" y1="0" x2="0" y2="160" stroke="#1D3557" stroke-width="1" opacity="0.2"/>
  <line x1="80" y1="0" x2="0" y2="80" stroke="#000000" stroke-width="1.5" opacity="0.1"/>
  <line x1="800" y1="80" x2="80" y2="800" stroke="#E63946" stroke-width="1" opacity="0.2"/>
  <line x1="800" y1="160" x2="160" y2="800" stroke="#1D3557" stroke-width="1.5" opacity="0.15"/>
  <line x1="800" y1="240" x2="240" y2="800" stroke="#000000" stroke-width="1" opacity="0.25"/>
  <line x1="800" y1="320" x2="320" y2="800" stroke="#E63946" stroke-width="1.5" opacity="0.1"/>
  <line x1="800" y1="400" x2="400" y2="800" stroke="#1D3557" stroke-width="1" opacity="0.3"/>
  <line x1="800" y1="480" x2="480" y2="800" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="800" y1="560" x2="560" y2="800" stroke="#E63946" stroke-width="1.5" opacity="0.15"/>
  <line x1="800" y1="640" x2="640" y2="800" stroke="#1D3557" stroke-width="1" opacity="0.2"/>
  <line x1="800" y1="720" x2="720" y2="800" stroke="#000000" stroke-width="1" opacity="0.1"/>

  <!-- Large yellow circle overlay -->
  <circle cx="320" cy="350" r="180" fill="#F4D35E" opacity="0.75"/>

  <!-- Large red rectangle overlay -->
  <rect x="420" y="280" width="260" height="340" fill="#E63946" opacity="0.65"/>

  <!-- Forest green corner triangles -->
  <polygon points="0,0 120,0 0,120" fill="#264653" opacity="0.8"/>
  <polygon points="800,0 680,0 800,120" fill="#264653" opacity="0.8"/>
  <polygon points="0,800 120,800 0,680" fill="#264653" opacity="0.8"/>
  <polygon points="800,800 680,800 800,680" fill="#264653" opacity="0.8"/>

  <!-- Small accent shapes on overlays -->
  <circle cx="320" cy="350" r="30" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <circle cx="550" cy="450" r="20" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  <rect x="500" y="310" width="40" height="40" fill="none" stroke="#F4D35E" stroke-width="1.5" opacity="0.6"/>
</svg>