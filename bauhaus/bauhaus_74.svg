<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#F4D35E" opacity="0.15"/>
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Wall background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFF8EE"/>

  <!-- Shelf 1 - top -->
  <rect x="40" y="190" width="720" height="12" fill="#000000"/>
  <!-- Shelf 2 - middle -->
  <rect x="40" y="430" width="720" height="12" fill="#000000"/>
  <!-- Shelf 3 - bottom -->
  <rect x="40" y="670" width="720" height="12" fill="#000000"/>

  <!-- === TOP SHELF BOOKS === -->
  <!-- Book 1 - tall red -->
  <rect x="60" y="50" width="35" height="140" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <line x1="77" y1="60" x2="77" y2="80" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Book 2 - medium blue -->
  <rect x="100" y="80" width="28" height="110" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
  <rect x="106" y="90" width="16" height="4" fill="#F4D35E"/>

  <!-- Book 3 - short yellow -->
  <rect x="133" y="120" width="40" height="70" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="153" cy="150" r="8" fill="#000000" opacity="0.3"/>

  <!-- Book 4 - tall forest -->
  <rect x="180" y="40" width="30" height="150" fill="#264653" stroke="#000000" stroke-width="1.5"/>
  <line x1="195" y1="50" x2="195" y2="180" stroke="#E9C46A" stroke-width="1"/>

  <!-- Book 5 - medium sand -->
  <rect x="218" y="90" width="45" height="100" fill="#DDA15E" stroke="#000000" stroke-width="1.5"/>
  <rect x="228" y="100" width="25" height="6" fill="#000000"/>

  <!-- Book 6 - thin coral -->
  <rect x="270" y="100" width="18" height="90" fill="#E9C46A" stroke="#000000" stroke-width="1.5"/>

  <!-- Book 7 - leaning book -->
  <rect x="300" y="55" width="32" height="135" fill="#E63946" stroke="#000000" stroke-width="1.5" transform="rotate(-5,316,120)"/>

  <!-- Book 8 - wide white -->
  <rect x="345" y="95" width="50" height="95" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <rect x="355" y="105" width="30" height="5" fill="#1D3557"/>
  <rect x="355" y="115" width="30" height="3" fill="#1D3557"/>

  <!-- Decorative object - sphere on shelf 1 -->
  <circle cx="430" cy="172" r="18" fill="#E63946" stroke="#000000" stroke-width="1.5"/>

  <!-- Book 9 -->
  <rect x="460" y="70" width="25" height="120" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
  <!-- Book 10 -->
  <rect x="490" y="110" width="38" height="80" fill="#264653" stroke="#000000" stroke-width="1.5"/>
  <rect x="498" y="120" width="22" height="5" fill="#F4D35E"/>
  <!-- Book 11 -->
  <rect x="535" y="60" width="22" height="130" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>

  <!-- === MIDDLE SHELF BOOKS === -->
  <!-- Book 12 - fat blue -->
  <rect x="60" y="300" width="55" height="130" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
  <rect x="70" y="310" width="35" height="8" fill="#F4D35E"/>
  <rect x="70" y="325" width="35" height="4" fill="#FFFFFF"/>

  <!-- Book 13 -->
  <rect x="122" y="330" width="20" height="100" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <!-- Book 14 -->
  <rect x="148" y="310" width="30" height="120" fill="#DDA15E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="163" cy="360" r="6" fill="#000000" opacity="0.4"/>

  <!-- Book 15 - tall -->
  <rect x="185" y="270" width="28" height="160" fill="#264653" stroke="#000000" stroke-width="1.5"/>
  <line x1="199" y1="280" x2="199" y2="420" stroke="#E9C46A" stroke-width="2"/>

  <!-- Book 16 -->
  <rect x="220" y="340" width="42" height="90" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <rect x="228" y="355" width="26" height="4" fill="#E63946"/>

  <!-- Decorative object - triangle -->
  <polygon points="310,430 330,370 350,430" fill="#F4D35E" stroke="#000000" stroke-width="2"/>

  <!-- Book 17 -->
  <rect x="370" y="290" width="35" height="140" fill="#E9C46A" stroke="#000000" stroke-width="1.5"/>
  <!-- Book 18 -->
  <rect x="412" y="320" width="25" height="110" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <line x1="424" y1="330" x2="424" y2="350" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Book 19 -->
  <rect x="445" y="350" width="48" height="80" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
  <rect x="455" y="365" width="28" height="6" fill="#DDA15E"/>
  <!-- Book 20 -->
  <rect x="500" y="300" width="22" height="130" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>

  <!-- === BOTTOM SHELF BOOKS === -->
  <!-- Book 21 -->
  <rect x="60" y="530" width="40" height="140" fill="#264653" stroke="#000000" stroke-width="1.5"/>
  <rect x="68" y="545" width="24" height="6" fill="#E9C46A"/>
  <!-- Book 22 -->
  <rect x="108" y="560" width="30" height="110" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <!-- Book 23 -->
  <rect x="145" y="540" width="50" height="130" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <rect x="155" y="560" width="30" height="5" fill="#1D3557"/>
  <rect x="155" y="572" width="30" height="3" fill="#1D3557"/>
  <rect x="155" y="582" width="30" height="3" fill="#1D3557"/>
  <!-- Book 24 -->
  <rect x="202" y="510" width="25" height="160" fill="#DDA15E" stroke="#000000" stroke-width="1.5"/>
  <!-- Book 25 - leaning -->
  <rect x="240" y="525" width="32" height="145" fill="#1D3557" stroke="#000000" stroke-width="1.5" transform="rotate(4,256,600)"/>

  <!-- Decorative cube -->
  <rect x="310" y="635" width="35" height="35" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <line x1="310" y1="635" x2="330" y2="615" stroke="#000000" stroke-width="1.5"/>
  <line x1="345" y1="635" x2="365" y2="615" stroke="#000000" stroke-width="1.5"/>
  <line x1="330" y1="615" x2="365" y2="615" stroke="#000000" stroke-width="1.5"/>

  <!-- Book 26 -->
  <rect x="380" y="550" width="28" height="120" fill="#E9C46A" stroke="#000000" stroke-width="1.5"/>
  <!-- Book 27 -->
  <rect x="415" y="520" width="20" height="150" fill="#264653" stroke="#000000" stroke-width="1.5"/>
  <!-- Book 28 -->
  <rect x="442" y="570" width="45" height="100" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <rect x="452" y="585" width="25" height="5" fill="#FFFFFF"/>

  <!-- Side supports -->
  <rect x="40" y="30" width="8" height="650" fill="#000000"/>
  <rect x="752" y="30" width="8" height="650" fill="#000000"/>
</svg>