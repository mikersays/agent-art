<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#F4D35E" opacity="0.15"/>
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Wall background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>

  <!-- Shadow behind dresser -->
  <rect x="175" y="115" width="470" height="600" rx="3" fill="#000000" opacity="0.1"/>

  <!-- Main dresser body -->
  <rect x="160" y="100" width="470" height="600" rx="2" fill="#E76F51"/>
  <!-- Dresser border -->
  <rect x="160" y="100" width="470" height="600" rx="2" fill="none" stroke="#000000" stroke-width="4"/>

  <!-- Top surface -->
  <rect x="160" y="100" width="470" height="20" fill="#6D2E46"/>
  <rect x="160" y="100" width="470" height="20" fill="none" stroke="#000000" stroke-width="3"/>

  <!-- Wood grain patterns on sides -->
  <line x1="170" y1="140" x2="170" y2="690" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="178" y1="150" x2="178" y2="680" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="620" y1="140" x2="620" y2="690" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="612" y1="150" x2="612" y2="680" stroke="#000000" stroke-width="0.5" opacity="0.15"/>

  <!-- Drawer 1 (top - small) -->
  <rect x="190" y="135" width="410" height="90" rx="1" fill="#F4D35E"/>
  <rect x="190" y="135" width="410" height="90" rx="1" fill="none" stroke="#000000" stroke-width="3"/>
  <!-- Wood grain -->
  <line x1="210" y1="155" x2="580" y2="155" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="215" y1="175" x2="575" y2="175" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="210" y1="195" x2="580" y2="195" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <!-- Knob -->
  <circle cx="395" cy="180" r="12" fill="#000000"/>
  <circle cx="395" cy="180" r="7" fill="#1D3557"/>
  <circle cx="395" cy="178" r="3" fill="#FFFFFF" opacity="0.3"/>

  <!-- Drawer 2 -->
  <rect x="190" y="240" width="410" height="100" rx="1" fill="#2A9D8F"/>
  <rect x="190" y="240" width="410" height="100" rx="1" fill="none" stroke="#000000" stroke-width="3"/>
  <!-- Wood grain -->
  <line x1="210" y1="260" x2="580" y2="260" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="215" y1="285" x2="575" y2="285" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="210" y1="310" x2="580" y2="310" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <!-- Two knobs -->
  <circle cx="320" cy="290" r="12" fill="#000000"/>
  <circle cx="320" cy="290" r="7" fill="#E63946"/>
  <circle cx="320" cy="288" r="3" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="470" cy="290" r="12" fill="#000000"/>
  <circle cx="470" cy="290" r="7" fill="#E63946"/>
  <circle cx="470" cy="288" r="3" fill="#FFFFFF" opacity="0.3"/>

  <!-- Drawer 3 -->
  <rect x="190" y="355" width="410" height="100" rx="1" fill="#1D3557"/>
  <rect x="190" y="355" width="410" height="100" rx="1" fill="none" stroke="#000000" stroke-width="3"/>
  <!-- Wood grain -->
  <line x1="210" y1="375" x2="580" y2="375" stroke="#FFFFFF" stroke-width="0.5" opacity="0.1"/>
  <line x1="215" y1="400" x2="575" y2="400" stroke="#FFFFFF" stroke-width="0.5" opacity="0.08"/>
  <line x1="210" y1="425" x2="580" y2="425" stroke="#FFFFFF" stroke-width="0.5" opacity="0.1"/>
  <!-- Two knobs -->
  <circle cx="320" cy="405" r="12" fill="#000000"/>
  <circle cx="320" cy="405" r="7" fill="#F4D35E"/>
  <circle cx="320" cy="403" r="3" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="470" cy="405" r="12" fill="#000000"/>
  <circle cx="470" cy="405" r="7" fill="#F4D35E"/>
  <circle cx="470" cy="403" r="3" fill="#FFFFFF" opacity="0.3"/>

  <!-- Drawer 4 (large bottom) -->
  <rect x="190" y="470" width="410" height="120" rx="1" fill="#E63946"/>
  <rect x="190" y="470" width="410" height="120" rx="1" fill="none" stroke="#000000" stroke-width="3"/>
  <!-- Wood grain -->
  <line x1="210" y1="495" x2="580" y2="495" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="215" y1="525" x2="575" y2="525" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="210" y1="555" x2="580" y2="555" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <!-- Two knobs -->
  <circle cx="320" cy="530" r="14" fill="#000000"/>
  <circle cx="320" cy="530" r="8" fill="#2A9D8F"/>
  <circle cx="320" cy="528" r="3" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="470" cy="530" r="14" fill="#000000"/>
  <circle cx="470" cy="530" r="8" fill="#2A9D8F"/>
  <circle cx="470" cy="528" r="3" fill="#FFFFFF" opacity="0.3"/>

  <!-- Bottom base/plinth -->
  <rect x="150" y="700" width="490" height="20" rx="2" fill="#000000"/>
  <rect x="165" y="690" width="460" height="15" fill="#6D2E46"/>
  <rect x="165" y="690" width="460" height="15" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Legs -->
  <rect x="180" y="720" width="30" height="30" fill="#000000"/>
  <rect x="580" y="720" width="30" height="30" fill="#000000"/>
  <!-- Geometric leg detail -->
  <polygon points="180,750 195,730 210,750" fill="#6D2E46"/>
  <polygon points="580,750 595,730 610,750" fill="#6D2E46"/>

  <!-- Decorative item on top - geometric vase -->
  <polygon points="520,100 535,60 550,100" fill="#1D3557"/>
  <circle cx="535" cy="55" r="10" fill="#E63946"/>
  <rect x="528" y="90" width="14" height="10" fill="#000000"/>

  <!-- Decorative item on top - small box -->
  <rect x="230" y="78" width="35" height="22" fill="#2A9D8F"/>
  <rect x="230" y="78" width="35" height="22" fill="none" stroke="#000000" stroke-width="2"/>
  <line x1="230" y1="89" x2="265" y2="89" stroke="#000000" stroke-width="1"/>
</svg>