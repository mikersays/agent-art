<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Bauhaus Panopticon II -->
  <!-- Background -->
  <rect width="800" height="800" fill="#FFF"/>

  <!-- Outer wall - circular prison -->
  <circle cx="400" cy="400" r="340" fill="none" stroke="#000" stroke-width="6"/>
  <circle cx="400" cy="400" r="330" fill="#1D3557" opacity="0.15"/>
  <circle cx="400" cy="400" r="320" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Cell blocks - radiating segments -->
  <!-- 12 radiating walls -->
  <line x1="400" y1="400" x2="400" y2="60" stroke="#000" stroke-width="3"/>
  <line x1="400" y1="400" x2="694" y2="230" stroke="#000" stroke-width="3"/>
  <line x1="400" y1="400" x2="694" y2="570" stroke="#000" stroke-width="3"/>
  <line x1="400" y1="400" x2="400" y2="740" stroke="#000" stroke-width="3"/>
  <line x1="400" y1="400" x2="106" y2="570" stroke="#000" stroke-width="3"/>
  <line x1="400" y1="400" x2="106" y2="230" stroke="#000" stroke-width="3"/>

  <!-- Additional radiating walls (30-degree offsets) -->
  <line x1="400" y1="400" x2="570" y2="106" stroke="#264653" stroke-width="2"/>
  <line x1="400" y1="400" x2="740" y2="400" stroke="#264653" stroke-width="2"/>
  <line x1="400" y1="400" x2="570" y2="694" stroke="#264653" stroke-width="2"/>
  <line x1="400" y1="400" x2="230" y2="694" stroke="#264653" stroke-width="2"/>
  <line x1="400" y1="400" x2="60" y2="400" stroke="#264653" stroke-width="2"/>
  <line x1="400" y1="400" x2="230" y2="106" stroke="#264653" stroke-width="2"/>

  <!-- Inner surveillance ring -->
  <circle cx="400" cy="400" r="180" fill="none" stroke="#E63946" stroke-width="3"/>
  <circle cx="400" cy="400" r="170" fill="none" stroke="#6D2E46" stroke-width="1" stroke-dasharray="8,4"/>

  <!-- Cell block fills (alternating colors in outer ring) -->
  <path d="M400,80 A320,320 0 0,1 677,237 L400,400 Z" fill="#1D3557" opacity="0.2"/>
  <path d="M400,720 A320,320 0 0,1 123,563 L400,400 Z" fill="#1D3557" opacity="0.2"/>
  <path d="M677,563 A320,320 0 0,1 400,720 L400,400 Z" fill="#E63946" opacity="0.12"/>
  <path d="M123,237 A320,320 0 0,1 400,80 L400,400 Z" fill="#E63946" opacity="0.12"/>

  <!-- Central tower -->
  <circle cx="400" cy="400" r="60" fill="#264653" stroke="#000" stroke-width="4"/>
  <circle cx="400" cy="400" r="45" fill="#1D3557" stroke="#000" stroke-width="2"/>
  <circle cx="400" cy="400" r="25" fill="#000"/>

  <!-- Eye of surveillance (center) -->
  <ellipse cx="400" cy="400" rx="18" ry="10" fill="#E63946"/>
  <circle cx="400" cy="400" r="6" fill="#FFF"/>

  <!-- Surveillance beams radiating from center -->
  <line x1="400" y1="400" x2="400" y2="70" stroke="#E63946" stroke-width="1" opacity="0.4" stroke-dasharray="5,5"/>
  <line x1="400" y1="400" x2="686" y2="235" stroke="#E63946" stroke-width="1" opacity="0.4" stroke-dasharray="5,5"/>
  <line x1="400" y1="400" x2="686" y2="565" stroke="#E63946" stroke-width="1" opacity="0.4" stroke-dasharray="5,5"/>
  <line x1="400" y1="400" x2="400" y2="730" stroke="#E63946" stroke-width="1" opacity="0.4" stroke-dasharray="5,5"/>
  <line x1="400" y1="400" x2="114" y2="565" stroke="#E63946" stroke-width="1" opacity="0.4" stroke-dasharray="5,5"/>
  <line x1="400" y1="400" x2="114" y2="235" stroke="#E63946" stroke-width="1" opacity="0.4" stroke-dasharray="5,5"/>

  <!-- Cell doors (small rectangles on outer ring) -->
  <rect x="393" y="85" width="14" height="20" fill="#6D2E46" stroke="#000" stroke-width="1"/>
  <rect x="685" y="225" width="14" height="20" fill="#6D2E46" stroke="#000" stroke-width="1" transform="rotate(60,692,235)"/>
  <rect x="685" y="555" width="14" height="20" fill="#6D2E46" stroke="#000" stroke-width="1" transform="rotate(120,692,565)"/>
  <rect x="393" y="695" width="14" height="20" fill="#6D2E46" stroke="#000" stroke-width="1" transform="rotate(180,400,705)"/>
  <rect x="100" y="555" width="14" height="20" fill="#6D2E46" stroke="#000" stroke-width="1" transform="rotate(240,107,565)"/>
  <rect x="100" y="225" width="14" height="20" fill="#6D2E46" stroke="#000" stroke-width="1" transform="rotate(300,107,235)"/>

  <!-- Guard towers on perimeter -->
  <rect x="388" y="48" width="24" height="24" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <rect x="718" y="388" width="24" height="24" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <rect x="388" y="728" width="24" height="24" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <rect x="58" y="388" width="24" height="24" fill="#F4D35E" stroke="#000" stroke-width="2"/>

  <!-- Concentric surveillance rings -->
  <circle cx="400" cy="400" r="240" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="3,6"/>
  <circle cx="400" cy="400" r="280" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="3,6"/>
  <circle cx="400" cy="400" r="120" fill="none" stroke="#264653" stroke-width="1" stroke-dasharray="3,6"/>

  <!-- Corner geometric accents -->
  <rect x="20" y="20" width="60" height="60" fill="#E63946" opacity="0.8"/>
  <rect x="720" y="20" width="60" height="60" fill="#1D3557" opacity="0.8"/>
  <rect x="20" y="720" width="60" height="60" fill="#F4D35E" opacity="0.8"/>
  <rect x="720" y="720" width="60" height="60" fill="#264653" opacity="0.8"/>

  <!-- Watchtower searchlight arcs -->
  <path d="M400,60 L370,120 L430,120 Z" fill="#F4D35E" opacity="0.3"/>
  <path d="M740,400 L680,370 L680,430 Z" fill="#F4D35E" opacity="0.3"/>
</svg>