<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <title>Gear Train</title>
  <defs>
    <!-- Gear tooth pattern as repeated elements -->
    <clipPath id="gearClip1">
      <circle cx="150" cy="400" r="110"/>
    </clipPath>
    <clipPath id="gearClip2">
      <circle cx="370" cy="400" r="90"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="800" height="800" fill="#1D3557"/>
  <!-- Decorative frame -->
  <rect x="20" y="20" width="760" height="760" fill="none" stroke="#F4D35E" stroke-width="4"/>
  <rect x="30" y="30" width="740" height="740" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Gear 1 - Large, left (Red) -->
  <circle cx="130" cy="370" r="120" fill="#E63946" stroke="#000" stroke-width="3"/>
  <circle cx="130" cy="370" r="90" fill="#E63946" stroke="#6D2E46" stroke-width="2"/>
  <circle cx="130" cy="370" r="20" fill="#000"/>
  <circle cx="130" cy="370" r="8" fill="#F4D35E"/>
  <!-- Gear 1 teeth -->
  <rect x="105" y="245" width="50" height="25" rx="4" fill="#E63946" stroke="#000" stroke-width="2"/>
  <rect x="105" y="490" width="50" height="25" rx="4" fill="#E63946" stroke="#000" stroke-width="2"/>
  <rect x="5" y="345" width="25" height="50" rx="4" fill="#E63946" stroke="#000" stroke-width="2"/>
  <rect x="245" y="345" width="25" height="50" rx="4" fill="#E63946" stroke="#000" stroke-width="2"/>
  <rect x="45" y="265" width="45" height="22" rx="4" fill="#E63946" stroke="#000" stroke-width="2" transform="rotate(-45,67,276)"/>
  <rect x="180" y="455" width="45" height="22" rx="4" fill="#E63946" stroke="#000" stroke-width="2" transform="rotate(-45,202,466)"/>
  <rect x="180" y="265" width="45" height="22" rx="4" fill="#E63946" stroke="#000" stroke-width="2" transform="rotate(45,202,276)"/>
  <rect x="45" y="455" width="45" height="22" rx="4" fill="#E63946" stroke="#000" stroke-width="2" transform="rotate(45,67,466)"/>
  <!-- Gear 1 spokes -->
  <line x1="130" y1="280" x2="130" y2="460" stroke="#6D2E46" stroke-width="3"/>
  <line x1="40" y1="370" x2="220" y2="370" stroke="#6D2E46" stroke-width="3"/>
  <!-- Gear 2 - Medium (Yellow) -->
  <circle cx="330" cy="370" r="95" fill="#F4D35E" stroke="#000" stroke-width="3"/>
  <circle cx="330" cy="370" r="70" fill="#F4D35E" stroke="#000" stroke-width="2" stroke-opacity="0.3"/>
  <circle cx="330" cy="370" r="18" fill="#000"/>
  <circle cx="330" cy="370" r="7" fill="#E63946"/>
  <!-- Gear 2 teeth -->
  <rect x="305" y="270" width="50" height="22" rx="4" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <rect x="305" y="448" width="50" height="22" rx="4" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <rect x="230" y="345" width="22" height="50" rx="4" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <rect x="420" y="345" width="22" height="50" rx="4" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <rect x="254" y="290" width="40" height="20" rx="4" fill="#F4D35E" stroke="#000" stroke-width="2" transform="rotate(-45,274,300)"/>
  <rect x="370" y="430" width="40" height="20" rx="4" fill="#F4D35E" stroke="#000" stroke-width="2" transform="rotate(-45,390,440)"/>
  <!-- Gear 2 spokes -->
  <line x1="330" y1="300" x2="330" y2="440" stroke="#000" stroke-width="2" opacity="0.3"/>
  <line x1="260" y1="370" x2="400" y2="370" stroke="#000" stroke-width="2" opacity="0.3"/>
  <!-- Gear 3 - Small (Teal) -->
  <circle cx="490" cy="370" r="70" fill="#2A9D8F" stroke="#000" stroke-width="3"/>
  <circle cx="490" cy="370" r="50" fill="#2A9D8F" stroke="#1D3557" stroke-width="2"/>
  <circle cx="490" cy="370" r="15" fill="#000"/>
  <circle cx="490" cy="370" r="6" fill="#FFF"/>
  <!-- Gear 3 teeth -->
  <rect x="465" y="296" width="50" height="20" rx="4" fill="#2A9D8F" stroke="#000" stroke-width="2"/>
  <rect x="465" y="424" width="50" height="20" rx="4" fill="#2A9D8F" stroke="#000" stroke-width="2"/>
  <rect x="416" y="345" width="20" height="50" rx="4" fill="#2A9D8F" stroke="#000" stroke-width="2"/>
  <rect x="556" y="345" width="20" height="50" rx="4" fill="#2A9D8F" stroke="#000" stroke-width="2"/>
  <!-- Gear 4 - Medium (White) -->
  <circle cx="620" cy="310" r="85" fill="#FFF" stroke="#000" stroke-width="3"/>
  <circle cx="620" cy="310" r="62" fill="#FFF" stroke="#A8DADC" stroke-width="2"/>
  <circle cx="620" cy="310" r="16" fill="#000"/>
  <circle cx="620" cy="310" r="6" fill="#E63946"/>
  <!-- Gear 4 teeth -->
  <rect x="595" y="220" width="50" height="22" rx="4" fill="#FFF" stroke="#000" stroke-width="2"/>
  <rect x="595" y="378" width="50" height="22" rx="4" fill="#FFF" stroke="#000" stroke-width="2"/>
  <rect x="530" y="285" width="22" height="50" rx="4" fill="#FFF" stroke="#000" stroke-width="2"/>
  <rect x="700" y="285" width="22" height="50" rx="4" fill="#FFF" stroke="#000" stroke-width="2"/>
  <rect x="545" y="235" width="42" height="20" rx="4" fill="#FFF" stroke="#000" stroke-width="2" transform="rotate(-45,566,245)"/>
  <rect x="665" y="365" width="42" height="20" rx="4" fill="#FFF" stroke="#000" stroke-width="2" transform="rotate(-45,686,375)"/>
  <!-- Gear 4 spokes -->
  <line x1="620" y1="248" x2="620" y2="372" stroke="#A8DADC" stroke-width="2"/>
  <line x1="558" y1="310" x2="682" y2="310" stroke="#A8DADC" stroke-width="2"/>
  <!-- Gear 5 - Small (Burgundy) -->
  <circle cx="700" cy="460" r="65" fill="#6D2E46" stroke="#000" stroke-width="3"/>
  <circle cx="700" cy="460" r="45" fill="#6D2E46" stroke="#E63946" stroke-width="2"/>
  <circle cx="700" cy="460" r="14" fill="#000"/>
  <circle cx="700" cy="460" r="5" fill="#F4D35E"/>
  <!-- Gear 5 teeth -->
  <rect x="675" y="391" width="50" height="18" rx="4" fill="#6D2E46" stroke="#000" stroke-width="2"/>
  <rect x="675" y="511" width="50" height="18" rx="4" fill="#6D2E46" stroke="#000" stroke-width="2"/>
  <rect x="631" y="435" width="18" height="50" rx="4" fill="#6D2E46" stroke="#000" stroke-width="2"/>
  <rect x="761" y="435" width="18" height="50" rx="4" fill="#6D2E46" stroke="#000" stroke-width="2"/>
  <!-- Motion arrows -->
  <path d="M130 230 Q150 215 170 230" fill="none" stroke="#F4D35E" stroke-width="3"/>
  <polygon points="170,225 170,235 180,230" fill="#F4D35E"/>
  <path d="M330 260 Q310 245 290 260" fill="none" stroke="#F4D35E" stroke-width="3"/>
  <polygon points="290,255 290,265 280,260" fill="#F4D35E"/>
  <path d="M490 285 Q510 270 530 285" fill="none" stroke="#F4D35E" stroke-width="3"/>
  <polygon points="530,280 530,290 540,285" fill="#F4D35E"/>
  <!-- Title bar -->
  <rect x="50" y="700" width="700" height="50" fill="#000" opacity="0.5"/>
  <line x1="50" y1="700" x2="750" y2="700" stroke="#F4D35E" stroke-width="2"/>
</svg>