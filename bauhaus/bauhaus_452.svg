<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Secondary diagonal grid in steel blue -->
  <line x1="0" y1="0" x2="200" y2="800" stroke="#457B9D" stroke-width="0.8" opacity="0.15"/>
  <line x1="100" y1="0" x2="300" y2="800" stroke="#457B9D" stroke-width="0.8" opacity="0.15"/>
  <line x1="200" y1="0" x2="400" y2="800" stroke="#457B9D" stroke-width="0.8" opacity="0.15"/>
  <line x1="300" y1="0" x2="500" y2="800" stroke="#457B9D" stroke-width="0.8" opacity="0.15"/>
  <line x1="400" y1="0" x2="600" y2="800" stroke="#457B9D" stroke-width="0.8" opacity="0.15"/>
  <line x1="500" y1="0" x2="700" y2="800" stroke="#457B9D" stroke-width="0.8" opacity="0.15"/>
  <line x1="600" y1="0" x2="800" y2="800" stroke="#457B9D" stroke-width="0.8" opacity="0.15"/>
  <line x1="700" y1="0" x2="800" y2="400" stroke="#457B9D" stroke-width="0.8" opacity="0.15"/>
  <line x1="0" y1="400" x2="100" y2="800" stroke="#457B9D" stroke-width="0.8" opacity="0.15"/>
  <!-- Bold diagonal bands - red -->
  <polygon points="0,0 120,0 800,580 800,700" fill="#E63946" opacity="0.85"/>
  <polygon points="0,80 60,0 180,0 0,160" fill="#E63946" opacity="0.7"/>
  <!-- Bold diagonal bands - yellow -->
  <polygon points="0,200 250,0 380,0 0,340" fill="#F4D35E" opacity="0.8"/>
  <polygon points="200,800 800,100 800,250 350,800" fill="#F4D35E" opacity="0.75"/>
  <!-- Thinner diagonal band -->
  <polygon points="500,800 800,340 800,400 560,800" fill="#F4D35E" opacity="0.6"/>
  <!-- Large black circle at intersection -->
  <circle cx="400" cy="400" r="110" fill="#000000" opacity="0.9"/>
  <circle cx="400" cy="400" r="70" fill="none" stroke="#FEFAE0" stroke-width="2" opacity="0.3"/>
  <!-- Forest green rectangles at perpendicular angles -->
  <rect x="80" y="500" width="160" height="50" fill="#264653" opacity="0.85" transform="rotate(-45, 160, 525)"/>
  <rect x="550" y="120" width="140" height="45" fill="#264653" opacity="0.8" transform="rotate(-45, 620, 142)"/>
  <rect x="600" y="550" width="120" height="40" fill="#264653" opacity="0.75" transform="rotate(-45, 660, 570)"/>
  <rect x="150" y="200" width="100" height="35" fill="#264653" opacity="0.7" transform="rotate(-45, 200, 217)"/>
  <!-- Steel blue diagonal lines - secondary grid -->
  <line x1="800" y1="0" x2="0" y2="600" stroke="#457B9D" stroke-width="1.5" opacity="0.3"/>
  <line x1="800" y1="200" x2="200" y2="800" stroke="#457B9D" stroke-width="1.5" opacity="0.3"/>
  <line x1="800" y1="400" x2="400" y2="800" stroke="#457B9D" stroke-width="1.5" opacity="0.3"/>
  <!-- Small orange triangles in margins -->
  <polygon points="30,650 60,650 45,620" fill="#E76F51" opacity="0.85"/>
  <polygon points="750,50 780,50 765,20" fill="#E76F51" opacity="0.85"/>
  <polygon points="720,750 750,750 735,720" fill="#E76F51" opacity="0.8"/>
  <polygon points="50,50 80,50 65,20" fill="#E76F51" opacity="0.8"/>
  <polygon points="400,750 430,750 415,720" fill="#E76F51" opacity="0.75"/>
  <polygon points="750,400 780,400 765,370" fill="#E76F51" opacity="0.8"/>
  <polygon points="20,400 50,400 35,370" fill="#E76F51" opacity="0.75"/>
  <!-- Accent details -->
  <circle cx="400" cy="400" r="40" fill="none" stroke="#F4D35E" stroke-width="1.5" opacity="0.5"/>
  <rect x="380" y="380" width="40" height="40" fill="#E63946" opacity="0.4"/>
  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <!-- Small accent squares -->
  <rect x="680" y="680" width="20" height="20" fill="#1D3557" opacity="0.6"/>
  <rect x="100" y="700" width="15" height="15" fill="#1D3557" opacity="0.5"/>
  <rect x="700" y="100" width="18" height="18" fill="#2A9D8F" opacity="0.6"/>
</svg>