<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Semaphore Grid</title>
  <rect width="800" height="800" fill="#FFF"/>

  <!-- Grid lines -->
  <line x1="160" y1="0" x2="160" y2="800" stroke="#DDA15E" stroke-width="1" opacity="0.3"/>
  <line x1="320" y1="0" x2="320" y2="800" stroke="#DDA15E" stroke-width="1" opacity="0.3"/>
  <line x1="480" y1="0" x2="480" y2="800" stroke="#DDA15E" stroke-width="1" opacity="0.3"/>
  <line x1="640" y1="0" x2="640" y2="800" stroke="#DDA15E" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="#DDA15E" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#DDA15E" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="480" x2="800" y2="480" stroke="#DDA15E" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="640" x2="800" y2="640" stroke="#DDA15E" stroke-width="1" opacity="0.3"/>

  <!-- Row 1 -->
  <!-- Figure 1,1 - A: left arm down-left, right arm down -->
  <g transform="translate(80,80)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="-35" y2="30" stroke="#E63946" stroke-width="5"/>
    <rect x="-42" y="22" width="14" height="14" fill="#E63946" transform="rotate(-40,-35,30)"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#F4D35E" stroke-width="5"/>
    <rect x="-7" y="33" width="14" height="14" fill="#F4D35E"/>
  </g>

  <!-- Figure 1,2 - B: left arm left, right arm down -->
  <g transform="translate(240,80)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="-40" y2="0" stroke="#E63946" stroke-width="5"/>
    <rect x="-47" y="-7" width="14" height="14" fill="#E63946"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#F4D35E" stroke-width="5"/>
    <rect x="-7" y="33" width="14" height="14" fill="#F4D35E"/>
  </g>

  <!-- Figure 1,3 - C: left arm up-left, right arm down -->
  <g transform="translate(400,80)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="-35" y2="-30" stroke="#E63946" stroke-width="5"/>
    <rect x="-42" y="-40" width="14" height="14" fill="#E63946" transform="rotate(40,-35,-30)"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#F4D35E" stroke-width="5"/>
    <rect x="-7" y="33" width="14" height="14" fill="#F4D35E"/>
  </g>

  <!-- Figure 1,4 - D: left arm up, right arm down -->
  <g transform="translate(560,80)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="0" y2="-45" stroke="#E63946" stroke-width="5"/>
    <rect x="-7" y="-55" width="14" height="14" fill="#E63946"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#F4D35E" stroke-width="5"/>
    <rect x="-7" y="33" width="14" height="14" fill="#F4D35E"/>
  </g>

  <!-- Figure 1,5 - E: right arm up-right, left arm down -->
  <g transform="translate(720,80)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="35" y2="-30" stroke="#F4D35E" stroke-width="5"/>
    <rect x="28" y="-40" width="14" height="14" fill="#F4D35E" transform="rotate(-40,35,-30)"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#E63946" stroke-width="5"/>
    <rect x="-7" y="33" width="14" height="14" fill="#E63946"/>
  </g>

  <!-- Row 2 -->
  <!-- Figure 2,1 - both arms horizontal -->
  <g transform="translate(80,240)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="-40" y2="0" stroke="#E63946" stroke-width="5"/>
    <rect x="-47" y="-7" width="14" height="14" fill="#E63946"/>
    <line x1="0" y1="0" x2="40" y2="0" stroke="#F4D35E" stroke-width="5"/>
    <rect x="33" y="-7" width="14" height="14" fill="#F4D35E"/>
  </g>

  <!-- Figure 2,2 - both arms up -->
  <g transform="translate(240,240)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="-30" y2="-35" stroke="#E63946" stroke-width="5"/>
    <rect x="-38" y="-43" width="14" height="14" fill="#E63946" transform="rotate(40,-30,-35)"/>
    <line x1="0" y1="0" x2="30" y2="-35" stroke="#F4D35E" stroke-width="5"/>
    <rect x="24" y="-43" width="14" height="14" fill="#F4D35E" transform="rotate(-40,30,-35)"/>
  </g>

  <!-- Figure 2,3 - left up, right horizontal -->
  <g transform="translate(400,240)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="-30" y2="-35" stroke="#E63946" stroke-width="5"/>
    <rect x="-38" y="-43" width="14" height="14" fill="#E63946" transform="rotate(40,-30,-35)"/>
    <line x1="0" y1="0" x2="40" y2="0" stroke="#F4D35E" stroke-width="5"/>
    <rect x="33" y="-7" width="14" height="14" fill="#F4D35E"/>
  </g>

  <!-- Figure 2,4 - both arms down-diagonal -->
  <g transform="translate(560,240)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="-35" y2="30" stroke="#E63946" stroke-width="5"/>
    <rect x="-42" y="22" width="14" height="14" fill="#E63946" transform="rotate(-40,-35,30)"/>
    <line x1="0" y1="0" x2="35" y2="30" stroke="#F4D35E" stroke-width="5"/>
    <rect x="28" y="22" width="14" height="14" fill="#F4D35E" transform="rotate(40,35,30)"/>
  </g>

  <!-- Figure 2,5 - left horizontal, right down -->
  <g transform="translate(720,240)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="-40" y2="0" stroke="#E63946" stroke-width="5"/>
    <rect x="-47" y="-7" width="14" height="14" fill="#E63946"/>
    <line x1="0" y1="0" x2="35" y2="30" stroke="#F4D35E" stroke-width="5"/>
    <rect x="28" y="22" width="14" height="14" fill="#F4D35E" transform="rotate(40,35,30)"/>
  </g>

  <!-- Row 3 -->
  <!-- Figure 3,1 - left up, right down-right -->
  <g transform="translate(80,400)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="0" y2="-45" stroke="#E63946" stroke-width="5"/>
    <rect x="-7" y="-55" width="14" height="14" fill="#E63946"/>
    <line x1="0" y1="0" x2="35" y2="30" stroke="#F4D35E" stroke-width="5"/>
    <rect x="28" y="22" width="14" height="14" fill="#F4D35E" transform="rotate(40,35,30)"/>
  </g>

  <!-- Figure 3,2 - crossed: left up-right, right up-left -->
  <g transform="translate(240,400)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="30" y2="-35" stroke="#E63946" stroke-width="5"/>
    <rect x="24" y="-43" width="14" height="14" fill="#E63946" transform="rotate(-40,30,-35)"/>
    <line x1="0" y1="0" x2="-30" y2="-35" stroke="#F4D35E" stroke-width="5"/>
    <rect x="-38" y="-43" width="14" height="14" fill="#F4D35E" transform="rotate(40,-30,-35)"/>
  </g>

  <!-- Figure 3,3 - left down-left, right up-right -->
  <g transform="translate(400,400)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="-35" y2="30" stroke="#E63946" stroke-width="5"/>
    <rect x="-42" y="22" width="14" height="14" fill="#E63946" transform="rotate(-40,-35,30)"/>
    <line x1="0" y1="0" x2="35" y2="-30" stroke="#F4D35E" stroke-width="5"/>
    <rect x="28" y="-40" width="14" height="14" fill="#F4D35E" transform="rotate(-40,35,-30)"/>
  </g>

  <!-- Figure 3,4 - right arm right, left arm up -->
  <g transform="translate(560,400)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="40" y2="0" stroke="#F4D35E" stroke-width="5"/>
    <rect x="33" y="-7" width="14" height="14" fill="#F4D35E"/>
    <line x1="0" y1="0" x2="0" y2="-45" stroke="#E63946" stroke-width="5"/>
    <rect x="-7" y="-55" width="14" height="14" fill="#E63946"/>
  </g>

  <!-- Figure 3,5 - both arms up vertical -->
  <g transform="translate(720,400)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="-5" x2="-15" y2="-45" stroke="#E63946" stroke-width="5"/>
    <rect x="-22" y="-53" width="14" height="14" fill="#E63946"/>
    <line x1="0" y1="-5" x2="15" y2="-45" stroke="#F4D35E" stroke-width="5"/>
    <rect x="8" y="-53" width="14" height="14" fill="#F4D35E"/>
  </g>

  <!-- Row 4 -->
  <!-- Figure 4,1 -->
  <g transform="translate(80,560)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="-40" y2="0" stroke="#E63946" stroke-width="5"/>
    <rect x="-47" y="-7" width="14" height="14" fill="#E63946"/>
    <line x1="0" y1="0" x2="30" y2="-35" stroke="#F4D35E" stroke-width="5"/>
    <rect x="24" y="-43" width="14" height="14" fill="#F4D35E" transform="rotate(-40,30,-35)"/>
  </g>

  <!-- Figure 4,2 -->
  <g transform="translate(240,560)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="-35" y2="-30" stroke="#E63946" stroke-width="5"/>
    <rect x="-42" y="-40" width="14" height="14" fill="#E63946" transform="rotate(40,-35,-30)"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#F4D35E" stroke-width="5"/>
    <rect x="-7" y="33" width="14" height="14" fill="#F4D35E"/>
  </g>

  <!-- Figure 4,3 -->
  <g transform="translate(400,560)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="0" y2="-45" stroke="#E63946" stroke-width="5"/>
    <rect x="-7" y="-55" width="14" height="14" fill="#E63946"/>
    <line x1="0" y1="0" x2="40" y2="0" stroke="#F4D35E" stroke-width="5"/>
    <rect x="33" y="-7" width="14" height="14" fill="#F4D35E"/>
  </g>

  <!-- Figure 4,4 -->
  <g transform="translate(560,560)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="-35" y2="30" stroke="#E63946" stroke-width="5"/>
    <rect x="-42" y="22" width="14" height="14" fill="#E63946" transform="rotate(-40,-35,30)"/>
    <line x1="0" y1="0" x2="40" y2="0" stroke="#F4D35E" stroke-width="5"/>
    <rect x="33" y="-7" width="14" height="14" fill="#F4D35E"/>
  </g>

  <!-- Figure 4,5 -->
  <g transform="translate(720,560)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="-40" y2="0" stroke="#E63946" stroke-width="5"/>
    <rect x="-47" y="-7" width="14" height="14" fill="#E63946"/>
    <line x1="0" y1="0" x2="35" y2="-30" stroke="#F4D35E" stroke-width="5"/>
    <rect x="28" y="-40" width="14" height="14" fill="#F4D35E" transform="rotate(-40,35,-30)"/>
  </g>

  <!-- Row 5 -->
  <!-- Figure 5,1 -->
  <g transform="translate(80,720)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="0" y2="-45" stroke="#E63946" stroke-width="5"/>
    <rect x="-7" y="-55" width="14" height="14" fill="#E63946"/>
    <line x1="0" y1="0" x2="-40" y2="0" stroke="#F4D35E" stroke-width="5"/>
    <rect x="-47" y="-7" width="14" height="14" fill="#F4D35E"/>
  </g>

  <!-- Figure 5,2 -->
  <g transform="translate(240,720)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="35" y2="30" stroke="#F4D35E" stroke-width="5"/>
    <rect x="28" y="22" width="14" height="14" fill="#F4D35E" transform="rotate(40,35,30)"/>
    <line x1="0" y1="0" x2="-35" y2="-30" stroke="#E63946" stroke-width="5"/>
    <rect x="-42" y="-40" width="14" height="14" fill="#E63946" transform="rotate(40,-35,-30)"/>
  </g>

  <!-- Figure 5,3 -->
  <g transform="translate(400,720)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="35" y2="-30" stroke="#F4D35E" stroke-width="5"/>
    <rect x="28" y="-40" width="14" height="14" fill="#F4D35E" transform="rotate(-40,35,-30)"/>
    <line x1="0" y1="0" x2="-35" y2="30" stroke="#E63946" stroke-width="5"/>
    <rect x="-42" y="22" width="14" height="14" fill="#E63946" transform="rotate(-40,-35,30)"/>
  </g>

  <!-- Figure 5,4 -->
  <g transform="translate(560,720)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#F4D35E" stroke-width="5"/>
    <rect x="-7" y="33" width="14" height="14" fill="#F4D35E"/>
    <line x1="0" y1="0" x2="40" y2="0" stroke="#E63946" stroke-width="5"/>
    <rect x="33" y="-7" width="14" height="14" fill="#E63946"/>
  </g>

  <!-- Figure 5,5 - cancel/error signal: both arms crossed overhead -->
  <g transform="translate(720,720)">
    <circle cx="0" cy="-20" r="10" fill="#000"/>
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#000" stroke-width="4"/>
    <line x1="0" y1="0" x2="-20" y2="-45" stroke="#E63946" stroke-width="5"/>
    <rect x="-27" y="-53" width="14" height="14" fill="#E63946"/>
    <line x1="0" y1="0" x2="20" y2="-45" stroke="#F4D35E" stroke-width="5"/>
    <rect x="13" y="-53" width="14" height="14" fill="#F4D35E"/>
  </g>

  <!-- Border frame -->
  <rect x="5" y="5" width="790" height="790" fill="none" stroke="#000" stroke-width="3"/>
</svg>