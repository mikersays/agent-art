<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background: deep space -->
  <rect width="800" height="800" fill="#1D3557"/>

  <!-- Stars scattered -->
  <circle cx="50" cy="30" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="150" cy="80" r="1" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="720" cy="45" r="1.5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="680" cy="150" r="1" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="760" cy="300" r="1.5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="90" cy="200" r="1" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="40" cy="450" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="200" cy="30" r="1" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="500" cy="60" r="1.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="620" cy="700" r="1" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="750" cy="500" r="1.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="100" cy="700" r="1" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="300" cy="750" r="1.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="550" cy="720" r="1" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="400" cy="50" r="1" fill="#FFFFFF" opacity="0.6"/>

  <!-- Orbit paths (ellipses, centered off-canvas at 350, 380) -->
  <ellipse cx="350" cy="380" rx="80" ry="60" fill="none" stroke="#A8DADC" stroke-width="0.8" opacity="0.3"/>
  <ellipse cx="350" cy="380" rx="140" ry="110" fill="none" stroke="#A8DADC" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="350" cy="380" rx="210" ry="170" fill="none" stroke="#A8DADC" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="350" cy="380" rx="290" ry="230" fill="none" stroke="#A8DADC" stroke-width="0.8" opacity="0.18"/>
  <ellipse cx="350" cy="380" rx="370" ry="300" fill="none" stroke="#A8DADC" stroke-width="0.8" opacity="0.15"/>
  <ellipse cx="350" cy="380" rx="460" ry="370" fill="none" stroke="#A8DADC" stroke-width="0.7" opacity="0.12"/>

  <!-- Sun - large yellow circle -->
  <circle cx="350" cy="380" r="50" fill="#F4D35E" opacity="0.9"/>
  <circle cx="350" cy="380" r="60" fill="#F4D35E" opacity="0.15"/>
  <circle cx="350" cy="380" r="38" fill="#E9C46A" opacity="0.6"/>

  <!-- Planet 1 - small red, orbit 1 -->
  <circle cx="420" cy="345" r="8" fill="#E63946"/>

  <!-- Planet 2 - teal, orbit 2 -->
  <circle cx="230" cy="320" r="12" fill="#2A9D8F"/>

  <!-- Planet 3 - orange, orbit 3 -->
  <circle cx="500" cy="270" r="16" fill="#E76F51"/>

  <!-- Planet 4 - steel blue, orbit 4 -->
  <circle cx="120" cy="450" r="22" fill="#457B9D"/>
  <!-- Moon for planet 4 -->
  <circle cx="140" cy="432" r="5" fill="#A89F91"/>

  <!-- Planet 5 - large burgundy, orbit 5 -->
  <circle cx="600" cy="200" r="28" fill="#6D2E46" opacity="0.85"/>
  <!-- Ring for planet 5 -->
  <ellipse cx="600" cy="200" rx="42" ry="10" fill="none" stroke="#DDA15E" stroke-width="2" opacity="0.6"/>

  <!-- Planet 6 - forest green, orbit 6 -->
  <circle cx="100" cy="680" r="20" fill="#264653"/>

  <!-- Asteroid belt dots between orbit 3 and 4 -->
  <circle cx="580" cy="340" r="2" fill="#A89F91" opacity="0.5"/>
  <circle cx="560" cy="380" r="1.5" fill="#A89F91" opacity="0.4"/>
  <circle cx="150" cy="250" r="2" fill="#A89F91" opacity="0.5"/>
  <circle cx="170" cy="540" r="1.5" fill="#A89F91" opacity="0.4"/>
  <circle cx="530" cy="500" r="2" fill="#A89F91" opacity="0.5"/>
  <circle cx="200" cy="580" r="1.5" fill="#A89F91" opacity="0.3"/>

  <!-- Comet -->
  <line x1="650" y1="100" x2="720" y2="50" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  <circle cx="650" cy="100" r="4" fill="#FFFFFF" opacity="0.8"/>
  <line x1="650" y1="100" x2="700" y2="70" stroke="#A8DADC" stroke-width="2" opacity="0.3"/>
</svg>