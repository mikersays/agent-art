<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Jagged black dividing line down center -->
  <polyline points="400,0 405,80 395,160 410,240 390,320 408,400 392,480 412,560 388,640 405,720 400,800" fill="none" stroke="#000000" stroke-width="3" opacity="0.85"/>

  <!-- LEFT SIDE - Blue rectangles (mirrored pattern, kept) -->
  <rect x="60" y="120" width="120" height="60" fill="#1D3557" opacity="0.8"/>
  <rect x="60" y="320" width="120" height="60" fill="#1D3557" opacity="0.8"/>
  <rect x="60" y="520" width="120" height="60" fill="#1D3557" opacity="0.8"/>
  <rect x="200" y="220" width="80" height="40" fill="#1D3557" opacity="0.6"/>
  <rect x="200" y="420" width="80" height="40" fill="#1D3557" opacity="0.6"/>
  <rect x="200" y="620" width="80" height="40" fill="#1D3557" opacity="0.6"/>

  <!-- RIGHT SIDE - Red rectangles (mirrored positions, then shifted/broken) -->
  <rect x="620" y="130" width="120" height="60" fill="#E63946" opacity="0.8"/>
  <rect x="620" y="310" width="120" height="70" fill="#E63946" opacity="0.75"/>
  <rect x="600" y="530" width="140" height="50" fill="#E63946" opacity="0.85"/>
  <rect x="520" y="200" width="80" height="50" fill="#E63946" opacity="0.55"/>
  <rect x="530" y="430" width="70" height="35" fill="#E63946" opacity="0.6"/>
  <rect x="510" y="640" width="90" height="45" fill="#E63946" opacity="0.65"/>

  <!-- Yellow circles ONLY on left -->
  <circle cx="150" cy="250" r="30" fill="#F4D35E" opacity="0.8"/>
  <circle cx="100" cy="450" r="25" fill="#F4D35E" opacity="0.75"/>
  <circle cx="250" cy="150" r="18" fill="#F4D35E" opacity="0.65"/>
  <circle cx="300" cy="550" r="22" fill="#F4D35E" opacity="0.7"/>
  <circle cx="200" cy="700" r="28" fill="#F4D35E" opacity="0.6"/>

  <!-- Orange polygons ONLY on right -->
  <polygon points="600,150 640,120 640,180" fill="#E76F51" opacity="0.75"/>
  <polygon points="700,400 740,370 740,430" fill="#E76F51" opacity="0.7"/>
  <polygon points="550,600 590,570 590,630" fill="#E76F51" opacity="0.65"/>
  <polygon points="650,700 690,670 690,730" fill="#E76F51" opacity="0.7"/>
  <polygon points="500,300 530,270 530,330" fill="#E76F51" opacity="0.6"/>

  <!-- Extra shapes on right side only (breaking symmetry) -->
  <rect x="680" y="500" width="40" height="40" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="750" cy="250" r="20" fill="#457B9D" opacity="0.5"/>
  <rect x="450" y="720" width="60" height="25" fill="#6D2E46" opacity="0.5"/>

  <!-- Small warm gray and sand shapes scattered asymmetrically -->
  <rect x="30" y="60" width="25" height="15" fill="#A89F91" opacity="0.4"/>
  <rect x="310" y="380" width="20" height="12" fill="#A89F91" opacity="0.35"/>
  <rect x="720" y="80" width="30" height="10" fill="#DDA15E" opacity="0.45"/>
  <rect x="480" y="480" width="18" height="18" fill="#DDA15E" opacity="0.4"/>
  <rect x="100" y="760" width="22" height="14" fill="#A89F91" opacity="0.35"/>
  <rect x="650" y="770" width="28" height="12" fill="#DDA15E" opacity="0.4"/>
  <rect x="50" y="680" width="15" height="20" fill="#DDA15E" opacity="0.3"/>
  <rect x="340" y="100" width="20" height="10" fill="#A89F91" opacity="0.3"/>

  <!-- Additional left-side-only accents -->
  <circle cx="80" cy="40" r="8" fill="#264653" opacity="0.5"/>
  <circle cx="350" cy="700" r="6" fill="#2A9D8F" opacity="0.45"/>

  <!-- Additional right-side-only accents -->
  <rect x="760" y="600" width="20" height="80" fill="#000000" opacity="0.3"/>
  <circle cx="580" cy="80" r="12" fill="#A8DADC" opacity="0.5"/>

  <!-- Thin structural lines -->
  <line x1="60" y1="100" x2="340" y2="100" stroke="#000000" stroke-width="0.8" opacity="0.15"/>
  <line x1="460" y1="100" x2="740" y2="100" stroke="#000000" stroke-width="0.8" opacity="0.15"/>
  <line x1="60" y1="750" x2="340" y2="750" stroke="#000000" stroke-width="0.8" opacity="0.15"/>
  <line x1="460" y1="750" x2="740" y2="750" stroke="#000000" stroke-width="0.8" opacity="0.15"/>
</svg>