<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FFFFFF"/>
  <!-- Grid lines -->
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="3"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="3"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="3"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="3"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="3"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="3"/>
  <!-- Cell (0,0): Concentric circles -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#E63946" stroke-width="2"/>
  <circle cx="100" cy="100" r="55" fill="none" stroke="#E63946" stroke-width="2"/>
  <circle cx="100" cy="100" r="30" fill="#E63946" opacity="0.4"/>
  <!-- Cell (1,0): Diagonal cross -->
  <line x1="210" y1="10" x2="390" y2="190" stroke="#1D3557" stroke-width="3"/>
  <line x1="390" y1="10" x2="210" y2="190" stroke="#1D3557" stroke-width="3"/>
  <circle cx="300" cy="100" r="15" fill="#1D3557" opacity="0.5"/>
  <!-- Cell (2,0): Triangle -->
  <polygon points="500,20 590,180 410,180" fill="#F4D35E" opacity="0.7"/>
  <polygon points="500,60 560,160 440,160" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- Cell (3,0): Nested squares -->
  <rect x="620" y="20" width="160" height="160" fill="none" stroke="#2A9D8F" stroke-width="2"/>
  <rect x="650" y="50" width="100" height="100" fill="none" stroke="#2A9D8F" stroke-width="2"/>
  <rect x="675" y="75" width="50" height="50" fill="#2A9D8F" opacity="0.4"/>
  <!-- Cell (0,1): Horizontal bars -->
  <rect x="20" y="220" width="160" height="20" fill="#E76F51" opacity="0.8"/>
  <rect x="20" y="260" width="120" height="20" fill="#E76F51" opacity="0.6"/>
  <rect x="20" y="300" width="160" height="20" fill="#E76F51" opacity="0.4"/>
  <rect x="20" y="340" width="80" height="20" fill="#E76F51" opacity="0.9"/>
  <!-- Cell (1,1): Diamond -->
  <polygon points="300,210 390,300 300,390 210,300" fill="#457B9D" opacity="0.6"/>
  <polygon points="300,240 360,300 300,360 240,300" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Cell (2,1): Semicircle arcs -->
  <path d="M410,300 A90,90 0 0,1 590,300" fill="none" stroke="#6D2E46" stroke-width="3"/>
  <path d="M430,300 A70,70 0 0,0 570,300" fill="none" stroke="#6D2E46" stroke-width="3"/>
  <circle cx="500" cy="300" r="20" fill="#6D2E46" opacity="0.5"/>
  <!-- Cell (3,1): Vertical bars -->
  <rect x="620" y="210" width="20" height="170" fill="#264653" opacity="0.9"/>
  <rect x="660" y="210" width="20" height="130" fill="#264653" opacity="0.7"/>
  <rect x="700" y="210" width="20" height="170" fill="#264653" opacity="0.5"/>
  <rect x="740" y="210" width="20" height="100" fill="#264653" opacity="0.8"/>
  <!-- Cell (0,2): Radiating lines -->
  <line x1="100" y1="500" x2="20" y2="420" stroke="#DDA15E" stroke-width="2"/>
  <line x1="100" y1="500" x2="180" y2="420" stroke="#DDA15E" stroke-width="2"/>
  <line x1="100" y1="500" x2="20" y2="580" stroke="#DDA15E" stroke-width="2"/>
  <line x1="100" y1="500" x2="180" y2="580" stroke="#DDA15E" stroke-width="2"/>
  <line x1="100" y1="500" x2="100" y2="410" stroke="#DDA15E" stroke-width="2"/>
  <circle cx="100" cy="500" r="10" fill="#DDA15E"/>
  <!-- Cell (1,2): Checkerboard -->
  <rect x="210" y="410" width="45" height="45" fill="#E63946" opacity="0.7"/>
  <rect x="300" y="410" width="45" height="45" fill="#E63946" opacity="0.7"/>
  <rect x="255" y="455" width="45" height="45" fill="#E63946" opacity="0.7"/>
  <rect x="345" y="455" width="45" height="45" fill="#E63946" opacity="0.7"/>
  <rect x="210" y="500" width="45" height="45" fill="#E63946" opacity="0.7"/>
  <rect x="300" y="500" width="45" height="45" fill="#E63946" opacity="0.7"/>
  <!-- Cell (2,2): Overlapping circles -->
  <circle cx="470" cy="480" r="50" fill="#A8DADC" opacity="0.6"/>
  <circle cx="530" cy="480" r="50" fill="#F4D35E" opacity="0.5"/>
  <circle cx="500" cy="530" r="50" fill="#E63946" opacity="0.4"/>
  <!-- Cell (3,2): Arrow/chevron -->
  <polyline points="620,500 700,450 780,500" fill="none" stroke="#1D3557" stroke-width="3"/>
  <polyline points="620,530 700,480 780,530" fill="none" stroke="#1D3557" stroke-width="3"/>
  <polyline points="620,560 700,510 780,560" fill="none" stroke="#1D3557" stroke-width="3"/>
  <!-- Cell (0,3): Spiral squares -->
  <rect x="30" y="630" width="140" height="140" fill="none" stroke="#A89F91" stroke-width="2" transform="rotate(5,100,700)"/>
  <rect x="45" y="645" width="110" height="110" fill="none" stroke="#A89F91" stroke-width="2" transform="rotate(10,100,700)"/>
  <rect x="60" y="660" width="80" height="80" fill="none" stroke="#A89F91" stroke-width="2" transform="rotate(15,100,700)"/>
  <rect x="75" y="675" width="50" height="50" fill="#A89F91" opacity="0.3" transform="rotate(20,100,700)"/>
  <!-- Cell (1,3): Dots pattern -->
  <circle cx="240" cy="650" r="8" fill="#2A9D8F"/>
  <circle cx="280" cy="650" r="8" fill="#2A9D8F"/>
  <circle cx="320" cy="650" r="8" fill="#2A9D8F"/>
  <circle cx="360" cy="650" r="8" fill="#2A9D8F"/>
  <circle cx="260" cy="690" r="8" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="300" cy="690" r="8" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="340" cy="690" r="8" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="280" cy="730" r="8" fill="#2A9D8F" opacity="0.3"/>
  <circle cx="320" cy="730" r="8" fill="#2A9D8F" opacity="0.3"/>
  <!-- Cell (2,3): Zigzag -->
  <polyline points="410,620 450,680 490,620 530,680 570,620" fill="none" stroke="#E76F51" stroke-width="3"/>
  <polyline points="410,700 450,760 490,700 530,760 570,700" fill="none" stroke="#E76F51" stroke-width="2" opacity="0.6"/>
  <!-- Cell (3,3): Target -->
  <circle cx="700" cy="700" r="80" fill="#1D3557" opacity="0.2"/>
  <circle cx="700" cy="700" r="55" fill="#E63946" opacity="0.3"/>
  <circle cx="700" cy="700" r="30" fill="#F4D35E" opacity="0.5"/>
  <circle cx="700" cy="700" r="10" fill="#000000"/>
</svg>