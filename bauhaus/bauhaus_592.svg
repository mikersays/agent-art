<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Floor / ground -->
  <rect x="0" y="620" width="800" height="180" fill="#A89F91" opacity="0.2"/>

  <!-- Diagonal support structures below belt -->
  <line x1="80" y1="500" x2="180" y2="620" stroke="#264653" stroke-width="4" opacity="0.7"/>
  <line x1="180" y1="500" x2="80" y2="620" stroke="#264653" stroke-width="4" opacity="0.7"/>
  <line x1="280" y1="500" x2="380" y2="620" stroke="#264653" stroke-width="4" opacity="0.7"/>
  <line x1="380" y1="500" x2="280" y2="620" stroke="#264653" stroke-width="4" opacity="0.7"/>
  <line x1="480" y1="500" x2="580" y2="620" stroke="#264653" stroke-width="4" opacity="0.7"/>
  <line x1="580" y1="500" x2="480" y2="620" stroke="#264653" stroke-width="4" opacity="0.7"/>
  <line x1="650" y1="500" x2="750" y2="620" stroke="#264653" stroke-width="4" opacity="0.7"/>
  <line x1="750" y1="500" x2="650" y2="620" stroke="#264653" stroke-width="4" opacity="0.7"/>

  <!-- Vertical support legs -->
  <rect x="125" y="500" width="10" height="120" fill="#264653" opacity="0.8"/>
  <rect x="325" y="500" width="10" height="120" fill="#264653" opacity="0.8"/>
  <rect x="525" y="500" width="10" height="120" fill="#264653" opacity="0.8"/>
  <rect x="695" y="500" width="10" height="120" fill="#264653" opacity="0.8"/>

  <!-- Conveyor belt - horizontal parallel lines -->
  <line x1="30" y1="470" x2="770" y2="470" stroke="#000000" stroke-width="3"/>
  <line x1="30" y1="500" x2="770" y2="500" stroke="#000000" stroke-width="3"/>
  <line x1="30" y1="485" x2="770" y2="485" stroke="#457B9D" stroke-width="1" opacity="0.4"/>

  <!-- Rollers (circles at regular intervals) -->
  <circle cx="60" cy="485" r="16" fill="#457B9D" opacity="0.8" stroke="#000000" stroke-width="1.5"/>
  <circle cx="160" cy="485" r="16" fill="#457B9D" opacity="0.8" stroke="#000000" stroke-width="1.5"/>
  <circle cx="260" cy="485" r="16" fill="#457B9D" opacity="0.8" stroke="#000000" stroke-width="1.5"/>
  <circle cx="360" cy="485" r="16" fill="#457B9D" opacity="0.8" stroke="#000000" stroke-width="1.5"/>
  <circle cx="460" cy="485" r="16" fill="#457B9D" opacity="0.8" stroke="#000000" stroke-width="1.5"/>
  <circle cx="560" cy="485" r="16" fill="#457B9D" opacity="0.8" stroke="#000000" stroke-width="1.5"/>
  <circle cx="660" cy="485" r="16" fill="#457B9D" opacity="0.8" stroke="#000000" stroke-width="1.5"/>
  <circle cx="740" cy="485" r="16" fill="#457B9D" opacity="0.8" stroke="#000000" stroke-width="1.5"/>

  <!-- Packages/items on belt -->
  <rect x="90" y="410" width="60" height="60" fill="#E63946" opacity="0.85" stroke="#000000" stroke-width="1"/>
  <rect x="220" y="425" width="50" height="45" fill="#1D3557" opacity="0.85" stroke="#000000" stroke-width="1"/>
  <rect x="340" y="400" width="45" height="70" fill="#F4D35E" opacity="0.85" stroke="#000000" stroke-width="1"/>
  <rect x="470" y="430" width="70" height="40" fill="#2A9D8F" opacity="0.85" stroke="#000000" stroke-width="1"/>
  <rect x="590" y="415" width="55" height="55" fill="#E76F51" opacity="0.85" stroke="#000000" stroke-width="1"/>

  <!-- Direction arrows (triangles) -->
  <polygon points="180,350 210,370 180,390" fill="#E63946" opacity="0.6"/>
  <polygon points="380,340 410,360 380,380" fill="#E63946" opacity="0.6"/>
  <polygon points="560,345 590,365 560,385" fill="#E63946" opacity="0.6"/>

  <!-- Upper structural elements - industrial framing -->
  <line x1="50" y1="250" x2="750" y2="250" stroke="#A89F91" stroke-width="2" opacity="0.3"/>
  <line x1="50" y1="250" x2="50" y2="470" stroke="#A89F91" stroke-width="2" opacity="0.3"/>
  <line x1="750" y1="250" x2="750" y2="470" stroke="#A89F91" stroke-width="2" opacity="0.3"/>

  <!-- Hanging chain/mechanism shapes -->
  <circle cx="400" cy="280" r="25" fill="none" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="305" x2="400" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.4"/>

  <!-- Small accent shapes -->
  <rect x="700" y="270" width="15" height="15" fill="#F4D35E" opacity="0.5"/>
  <circle cx="120" cy="300" r="8" fill="#E63946" opacity="0.4"/>
  <rect x="60" y="650" width="20" height="20" fill="#1D3557" opacity="0.3"/>
  <circle cx="720" cy="680" r="10" fill="#2A9D8F" opacity="0.3"/>
</svg>