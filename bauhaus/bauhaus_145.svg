<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFF"/>

  <!-- 3D Scaffold Grid with perspective -->
  <!-- Vanishing point concept: converging lines toward upper center -->

  <!-- Back vertical grid lines (thinner, lighter - further away) -->
  <line x1="250" y1="120" x2="200" y2="650" stroke="#000" stroke-width="1.5" opacity="0.5"/>
  <line x1="340" y1="120" x2="310" y2="650" stroke="#000" stroke-width="1.5" opacity="0.5"/>
  <line x1="430" y1="120" x2="420" y2="650" stroke="#000" stroke-width="1.5" opacity="0.5"/>
  <line x1="520" y1="120" x2="530" y2="650" stroke="#000" stroke-width="1.5" opacity="0.5"/>
  <line x1="610" y1="120" x2="640" y2="650" stroke="#000" stroke-width="1.5" opacity="0.5"/>

  <!-- Horizontal rows (perspective - closer spacing at top) -->
  <line x1="180" y1="180" x2="680" y2="180" stroke="#000" stroke-width="1.5" opacity="0.4"/>
  <line x1="170" y1="280" x2="690" y2="280" stroke="#000" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="390" x2="700" y2="390" stroke="#000" stroke-width="2" opacity="0.6"/>
  <line x1="150" y1="510" x2="710" y2="510" stroke="#000" stroke-width="2.5" opacity="0.7"/>
  <line x1="140" y1="640" x2="720" y2="640" stroke="#000" stroke-width="3" opacity="0.8"/>

  <!-- Diagonal depth lines (creating 3D illusion) -->
  <line x1="200" y1="650" x2="250" y2="120" stroke="#457B9D" stroke-width="1" opacity="0.4"/>
  <line x1="310" y1="650" x2="340" y2="120" stroke="#457B9D" stroke-width="1" opacity="0.4"/>
  <line x1="420" y1="650" x2="430" y2="120" stroke="#457B9D" stroke-width="1" opacity="0.4"/>
  <line x1="530" y1="650" x2="520" y2="120" stroke="#457B9D" stroke-width="1" opacity="0.4"/>
  <line x1="640" y1="650" x2="610" y2="120" stroke="#457B9D" stroke-width="1" opacity="0.4"/>

  <!-- Colored panels at intersections - Row 1 (top, small) -->
  <rect x="253" y="160" width="35" height="20" fill="#E63946" opacity="0.8" transform="skewX(-2)"/>
  <rect x="433" y="160" width="35" height="20" fill="#1D3557" opacity="0.8" transform="skewX(2)"/>

  <!-- Colored panels - Row 2 -->
  <rect x="245" y="255" width="50" height="30" fill="#F4D35E" opacity="0.85" transform="skewX(-3)"/>
  <rect x="345" y="255" width="50" height="30" fill="#2A9D8F" opacity="0.85"/>
  <rect x="520" y="255" width="50" height="30" fill="#E76F51" opacity="0.85" transform="skewX(2)"/>

  <!-- Colored panels - Row 3 -->
  <rect x="230" y="360" width="60" height="35" fill="#1D3557" opacity="0.8" transform="skewX(-3)"/>
  <rect x="410" y="360" width="60" height="35" fill="#E63946" opacity="0.8" transform="skewX(1)"/>
  <rect x="530" y="360" width="60" height="35" fill="#F4D35E" opacity="0.8" transform="skewX(3)"/>

  <!-- Colored panels - Row 4 (larger, closer) -->
  <rect x="215" y="475" width="70" height="40" fill="#2A9D8F" opacity="0.85" transform="skewX(-4)"/>
  <rect x="320" y="475" width="70" height="40" fill="#E76F51" opacity="0.85" transform="skewX(-1)"/>
  <rect x="430" y="475" width="70" height="40" fill="#457B9D" opacity="0.85" transform="skewX(1)"/>
  <rect x="545" y="475" width="70" height="40" fill="#E63946" opacity="0.85" transform="skewX(4)"/>

  <!-- Colored panels - Row 5 (bottom, largest) -->
  <rect x="195" y="600" width="80" height="45" fill="#F4D35E" opacity="0.9" transform="skewX(-5)"/>
  <rect x="310" y="600" width="80" height="45" fill="#1D3557" opacity="0.9" transform="skewX(-2)"/>
  <rect x="430" y="600" width="80" height="45" fill="#2A9D8F" opacity="0.9" transform="skewX(2)"/>
  <rect x="555" y="600" width="80" height="45" fill="#E76F51" opacity="0.9" transform="skewX(5)"/>

  <!-- Node circles at key intersections -->
  <circle cx="250" cy="180" r="4" fill="#000"/>
  <circle cx="340" cy="180" r="4" fill="#000"/>
  <circle cx="430" cy="180" r="4" fill="#000"/>
  <circle cx="520" cy="180" r="4" fill="#000"/>
  <circle cx="610" cy="180" r="4" fill="#000"/>

  <circle cx="245" cy="280" r="5" fill="#000"/>
  <circle cx="340" cy="280" r="5" fill="#000"/>
  <circle cx="425" cy="280" r="5" fill="#000"/>
  <circle cx="525" cy="280" r="5" fill="#000"/>
  <circle cx="615" cy="280" r="5" fill="#000"/>

  <circle cx="240" cy="390" r="5" fill="#000"/>
  <circle cx="335" cy="390" r="5" fill="#000"/>
  <circle cx="422" cy="390" r="5" fill="#000"/>
  <circle cx="530" cy="390" r="5" fill="#000"/>
  <circle cx="625" cy="390" r="5" fill="#000"/>

  <!-- Frame border -->
  <rect x="120" y="100" width="560" height="580" fill="none" stroke="#000" stroke-width="3"/>

  <!-- Title block -->
  <rect x="250" y="720" width="300" height="45" fill="#000"/>
  <text x="400" y="750" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#FFF">SCAFFOLD GRID</text>
</svg>