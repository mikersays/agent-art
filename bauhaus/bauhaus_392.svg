<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>

  <!-- Subtle background grid -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>

  <!-- Ziggurat levels (bottom to top) -->
  <!-- Level 1 - Forest (base) -->
  <rect x="100" y="620" width="600" height="70" fill="#264653" opacity="0.95"/>
  <!-- Level 2 - Blue -->
  <rect x="150" y="545" width="500" height="70" fill="#1D3557" opacity="0.9"/>
  <!-- Level 3 - Steel Blue -->
  <rect x="200" y="470" width="400" height="70" fill="#457B9D" opacity="0.9"/>
  <!-- Level 4 - Teal -->
  <rect x="250" y="395" width="300" height="70" fill="#2A9D8F" opacity="0.9"/>
  <!-- Level 5 - Orange -->
  <rect x="300" y="320" width="200" height="70" fill="#E76F51" opacity="0.9"/>
  <!-- Level 6 - Red -->
  <rect x="335" y="250" width="130" height="65" fill="#E63946" opacity="0.9"/>
  <!-- Level 7 - Yellow (top) -->
  <rect x="365" y="190" width="70" height="55" fill="#F4D35E" opacity="0.95"/>

  <!-- Small circles on step edges -->
  <!-- Level 1 edges -->
  <circle cx="100" cy="620" r="6" fill="#E9C46A" opacity="0.8"/>
  <circle cx="700" cy="620" r="6" fill="#E9C46A" opacity="0.8"/>
  <!-- Level 2 edges -->
  <circle cx="150" cy="545" r="5" fill="#DDA15E" opacity="0.8"/>
  <circle cx="650" cy="545" r="5" fill="#DDA15E" opacity="0.8"/>
  <!-- Level 3 edges -->
  <circle cx="200" cy="470" r="5" fill="#F4D35E" opacity="0.8"/>
  <circle cx="600" cy="470" r="5" fill="#F4D35E" opacity="0.8"/>
  <!-- Level 4 edges -->
  <circle cx="250" cy="395" r="4.5" fill="#E63946" opacity="0.8"/>
  <circle cx="550" cy="395" r="4.5" fill="#E63946" opacity="0.8"/>
  <!-- Level 5 edges -->
  <circle cx="300" cy="320" r="4" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="500" cy="320" r="4" fill="#FFFFFF" opacity="0.9"/>
  <!-- Level 6 edges -->
  <circle cx="335" cy="250" r="3.5" fill="#F4D35E" opacity="0.9"/>
  <circle cx="465" cy="250" r="3.5" fill="#F4D35E" opacity="0.9"/>
  <!-- Level 7 (top) -->
  <circle cx="400" cy="190" r="4" fill="#E63946" opacity="0.9"/>

  <!-- Column lines on sides -->
  <line x1="70" y1="200" x2="70" y2="690" stroke="#000000" stroke-width="2" opacity="0.3"/>
  <line x1="50" y1="250" x2="50" y2="690" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <line x1="730" y1="200" x2="730" y2="690" stroke="#000000" stroke-width="2" opacity="0.3"/>
  <line x1="750" y1="250" x2="750" y2="690" stroke="#000000" stroke-width="1.5" opacity="0.2"/>

  <!-- Column bases -->
  <rect x="60" y="690" width="20" height="8" fill="#000000" opacity="0.4"/>
  <rect x="40" y="690" width="20" height="8" fill="#000000" opacity="0.3"/>
  <rect x="720" y="690" width="20" height="8" fill="#000000" opacity="0.4"/>
  <rect x="740" y="690" width="20" height="8" fill="#000000" opacity="0.3"/>

  <!-- Ground line -->
  <line x1="30" y1="698" x2="770" y2="698" stroke="#000000" stroke-width="2" opacity="0.25"/>

  <!-- Corner accents -->
  <rect x="20" y="20" width="14" height="14" fill="#E63946" opacity="0.4"/>
  <rect x="766" y="20" width="14" height="14" fill="#1D3557" opacity="0.4"/>
  <rect x="20" y="766" width="14" height="14" fill="#2A9D8F" opacity="0.4"/>
  <rect x="766" y="766" width="14" height="14" fill="#F4D35E" opacity="0.4"/>

  <!-- Small decorative elements near top -->
  <circle cx="400" cy="160" r="3" fill="#000000" opacity="0.3"/>
  <line x1="370" y1="170" x2="430" y2="170" stroke="#000000" stroke-width="1" opacity="0.15"/>

  <!-- Shadow/depth rectangles -->
  <rect x="105" y="688" width="590" height="6" fill="#000000" opacity="0.1"/>
</svg>