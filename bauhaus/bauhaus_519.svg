<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FFFFFF"/>
  <!-- Band 1 - Blue -->
  <rect x="0" y="0" width="800" height="80" fill="#1D3557" opacity="0.9"/>
  <!-- Band 2 - Cream -->
  <rect x="0" y="95" width="800" height="50" fill="#FEFAE0" opacity="0.9"/>
  <!-- Band 3 - Red -->
  <rect x="0" y="155" width="800" height="100" fill="#E63946" opacity="0.85"/>
  <!-- Band 4 - Yellow -->
  <rect x="0" y="275" width="800" height="60" fill="#F4D35E" opacity="0.9"/>
  <!-- Band 5 - Teal -->
  <rect x="0" y="355" width="800" height="90" fill="#2A9D8F" opacity="0.8"/>
  <!-- Band 6 - Cream -->
  <rect x="0" y="465" width="800" height="40" fill="#FEFAE0" opacity="0.85"/>
  <!-- Band 7 - Blue -->
  <rect x="0" y="520" width="800" height="110" fill="#1D3557" opacity="0.85"/>
  <!-- Band 8 - Red -->
  <rect x="0" y="650" width="800" height="70" fill="#E63946" opacity="0.9"/>
  <!-- Band 9 - Yellow -->
  <rect x="0" y="740" width="800" height="60" fill="#F4D35E" opacity="0.85"/>
  <!-- Cutout shapes - circles in background color on bands -->
  <circle cx="200" cy="40" r="25" fill="#FFFFFF"/>
  <circle cx="600" cy="200" r="35" fill="#FFFFFF"/>
  <circle cx="400" cy="570" r="40" fill="#FFFFFF"/>
  <circle cx="150" cy="680" r="22" fill="#FFFFFF"/>
  <!-- Cutout triangles -->
  <polygon points="500,275 540,335 460,335" fill="#FFFFFF"/>
  <polygon points="700,155 750,255 650,255" fill="#FFFFFF"/>
  <polygon points="100,520 150,630 50,630" fill="#FFFFFF"/>
  <!-- Black accent lines between bands -->
  <line x1="0" y1="80" x2="800" y2="80" stroke="#000000" stroke-width="2.5"/>
  <line x1="0" y1="155" x2="800" y2="155" stroke="#000000" stroke-width="1.5"/>
  <line x1="0" y1="275" x2="800" y2="275" stroke="#000000" stroke-width="2"/>
  <line x1="0" y1="520" x2="800" y2="520" stroke="#000000" stroke-width="2.5"/>
  <line x1="0" y1="650" x2="800" y2="650" stroke="#000000" stroke-width="1.5"/>
  <line x1="0" y1="740" x2="800" y2="740" stroke="#000000" stroke-width="2"/>
  <!-- Vertical rhythm lines -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="250" y1="0" x2="250" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.18"/>
  <line x1="550" y1="0" x2="550" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <!-- Thin colored vertical accents -->
  <line x1="320" y1="95" x2="320" y2="155" stroke="#E63946" stroke-width="2" opacity="0.7"/>
  <line x1="480" y1="355" x2="480" y2="465" stroke="#F4D35E" stroke-width="2" opacity="0.7"/>
  <line x1="620" y1="650" x2="620" y2="740" stroke="#1D3557" stroke-width="2" opacity="0.6"/>
  <!-- Small geometric accents on bands -->
  <rect x="340" y="10" width="30" height="30" fill="#F4D35E" opacity="0.8"/>
  <rect x="60" y="290" width="25" height="25" fill="#E63946" opacity="0.7"/>
  <circle cx="750" cy="390" r="12" fill="#F4D35E" opacity="0.7"/>
  <rect x="250" y="480" width="20" height="20" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="500" cy="760" r="10" fill="#1D3557" opacity="0.7"/>
</svg>