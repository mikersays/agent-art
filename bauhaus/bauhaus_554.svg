<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Outer sparse grid outlines -->
  <rect x="20" y="20" width="120" height="120" fill="none" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <rect x="660" y="20" width="120" height="120" fill="none" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <rect x="20" y="660" width="120" height="120" fill="none" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <rect x="660" y="660" width="120" height="120" fill="none" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <rect x="160" y="60" width="100" height="100" fill="none" stroke="#A89F91" stroke-width="0.5" opacity="0.15"/>
  <rect x="540" y="60" width="100" height="100" fill="none" stroke="#A89F91" stroke-width="0.5" opacity="0.15"/>
  <rect x="60" y="540" width="100" height="100" fill="none" stroke="#A89F91" stroke-width="0.5" opacity="0.15"/>
  <rect x="640" y="540" width="100" height="100" fill="none" stroke="#A89F91" stroke-width="0.5" opacity="0.15"/>

  <!-- Mid-density grid cells - some filled, some outlined -->
  <rect x="200" y="200" width="80" height="80" fill="#1D3557" opacity="0.75"/>
  <rect x="290" y="200" width="80" height="80" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <rect x="380" y="200" width="80" height="80" fill="#E63946" opacity="0.15"/>
  <rect x="470" y="200" width="80" height="80" fill="none" stroke="#1D3557" stroke-width="1" opacity="0.35"/>

  <rect x="200" y="290" width="80" height="80" fill="none" stroke="#E63946" stroke-width="1" opacity="0.4"/>
  <rect x="290" y="290" width="80" height="80" fill="#F4D35E" opacity="0.8"/>
  <rect x="380" y="290" width="80" height="80" fill="#1D3557" opacity="0.65"/>
  <rect x="470" y="290" width="80" height="80" fill="#E63946" opacity="0.7"/>

  <rect x="200" y="380" width="80" height="80" fill="#E63946" opacity="0.8"/>
  <rect x="290" y="380" width="80" height="80" fill="#2A9D8F" opacity="0.6"/>
  <rect x="380" y="380" width="80" height="80" fill="#000000" opacity="0.85"/>
  <rect x="470" y="380" width="80" height="80" fill="#F4D35E" opacity="0.7"/>

  <rect x="200" y="470" width="80" height="80" fill="none" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <rect x="290" y="470" width="80" height="80" fill="#1D3557" opacity="0.6"/>
  <rect x="380" y="470" width="80" height="80" fill="#E76F51" opacity="0.65"/>
  <rect x="470" y="470" width="80" height="80" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.5"/>

  <!-- Rotated/angled cells - fragmented effect -->
  <rect x="150" y="310" width="60" height="60" fill="#457B9D" opacity="0.4" transform="rotate(15 180 340)"/>
  <rect x="540" y="340" width="70" height="70" fill="#F4D35E" opacity="0.35" transform="rotate(-20 575 375)"/>
  <rect x="320" y="150" width="55" height="55" fill="none" stroke="#E63946" stroke-width="1" opacity="0.35" transform="rotate(30 347 177)"/>
  <rect x="420" y="530" width="65" height="65" fill="none" stroke="#1D3557" stroke-width="1" opacity="0.3" transform="rotate(-12 452 562)"/>
  <rect x="160" y="500" width="50" height="50" fill="#6D2E46" opacity="0.3" transform="rotate(25 185 525)"/>
  <rect x="560" y="230" width="55" height="55" fill="#264653" opacity="0.35" transform="rotate(-35 587 257)"/>

  <!-- Additional sparse edge outlines -->
  <rect x="80" y="250" width="70" height="70" fill="none" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <rect x="620" y="450" width="70" height="70" fill="none" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>

  <!-- Small accent elements -->
  <circle cx="330" cy="330" r="6" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="420" cy="420" r="4" fill="#FFFFFF" opacity="0.9"/>
  <rect x="556" y="556" width="8" height="8" fill="#E63946" opacity="0.5"/>
  <rect x="236" y="556" width="8" height="8" fill="#1D3557" opacity="0.5"/>
</svg>