<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#1D3557"/>
  <!-- Abstract torus rendered as concentric ellipses with shading -->
  <!-- Outer shadow -->
  <ellipse cx="410" cy="410" rx="280" ry="200" fill="none" stroke="#000" stroke-width="3" opacity="0.3"/>
  <!-- Outermost ellipse ring -->
  <ellipse cx="400" cy="400" rx="300" ry="220" fill="none" stroke="#E63946" stroke-width="30"/>
  <ellipse cx="400" cy="400" rx="300" ry="220" fill="none" stroke="#6D2E46" stroke-width="20" opacity="0.5"/>
  <!-- Second ring -->
  <ellipse cx="400" cy="400" rx="260" ry="185" fill="none" stroke="#F4D35E" stroke-width="18"/>
  <!-- Third ring -->
  <ellipse cx="400" cy="400" rx="220" ry="150" fill="none" stroke="#2A9D8F" stroke-width="14"/>
  <!-- Inner ring -->
  <ellipse cx="400" cy="400" rx="180" ry="115" fill="none" stroke="#A8DADC" stroke-width="10"/>
  <!-- Torus hole - dark center -->
  <ellipse cx="400" cy="400" rx="140" ry="80" fill="#1D3557"/>
  <ellipse cx="400" cy="400" rx="140" ry="80" fill="none" stroke="#000" stroke-width="4"/>
  <!-- Cross-section ellipses to give 3D depth - vertical slices -->
  <ellipse cx="250" cy="400" rx="40" ry="130" fill="none" stroke="#FFF" stroke-width="2" opacity="0.3"/>
  <ellipse cx="320" cy="400" rx="35" ry="155" fill="none" stroke="#FFF" stroke-width="2" opacity="0.25"/>
  <ellipse cx="400" cy="400" rx="30" ry="165" fill="none" stroke="#FFF" stroke-width="2" opacity="0.2"/>
  <ellipse cx="480" cy="400" rx="35" ry="155" fill="none" stroke="#FFF" stroke-width="2" opacity="0.25"/>
  <ellipse cx="550" cy="400" rx="40" ry="130" fill="none" stroke="#FFF" stroke-width="2" opacity="0.3"/>
  <!-- Highlight arcs on top -->
  <ellipse cx="400" cy="400" rx="290" ry="210" fill="none" stroke="#FFF" stroke-width="3" opacity="0.15"
    stroke-dasharray="120,500"/>
  <ellipse cx="400" cy="400" rx="250" ry="175" fill="none" stroke="#FFF" stroke-width="2" opacity="0.2"
    stroke-dasharray="80,400"/>
  <!-- Shadow underneath -->
  <ellipse cx="400" cy="620" rx="200" ry="30" fill="#000" opacity="0.3"/>
  <!-- Decorative corner elements -->
  <rect x="30" y="30" width="60" height="60" fill="#E63946" opacity="0.7"/>
  <rect x="710" y="30" width="60" height="60" fill="#F4D35E" opacity="0.7"/>
  <rect x="30" y="710" width="60" height="60" fill="#2A9D8F" opacity="0.7"/>
  <rect x="710" y="710" width="60" height="60" fill="#6D2E46" opacity="0.7"/>
  <!-- Border frame -->
  <rect x="15" y="15" width="770" height="770" fill="none" stroke="#FFF" stroke-width="2" opacity="0.3"/>
  <!-- Small accent circles -->
  <circle cx="400" cy="180" r="8" fill="#F4D35E"/>
  <circle cx="400" cy="620" r="8" fill="#E63946" opacity="0.6"/>
</svg>