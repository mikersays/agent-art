<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#1D3557"/>
  <text x="400" y="40" font-family="sans-serif" font-size="28" font-weight="bold" fill="#FEFAE0" text-anchor="middle">PENDULUM MOTION</text>

  <!-- Pivot points along top -->
  <rect x="195" y="80" width="10" height="30" fill="#000000"/>
  <rect x="395" y="80" width="10" height="30" fill="#000000"/>
  <rect x="595" y="80" width="10" height="30" fill="#000000"/>

  <!-- Mounting bar -->
  <rect x="100" y="75" width="600" height="10" fill="#000000"/>

  <!-- Pendulum 1: Left - red, wide arc -->
  <path d="M 200 110 Q 80 400 120 550" stroke="#E63946" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
  <path d="M 200 110 Q 140 400 160 550" stroke="#E63946" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
  <path d="M 200 110 L 200 550" stroke="#E63946" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
  <path d="M 200 110 Q 260 400 240 550" stroke="#E63946" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
  <path d="M 200 110 Q 320 400 280 550" stroke="#E63946" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
  <!-- Arc trace -->
  <path d="M 120 550 Q 160 580 200 550 Q 240 520 280 550" stroke="#E63946" stroke-width="3" fill="none"/>
  <!-- Endpoint circles -->
  <circle cx="120" cy="550" r="18" fill="#E63946"/>
  <circle cx="160" cy="550" r="15" fill="#E63946" opacity="0.7"/>
  <circle cx="200" cy="550" r="12" fill="#E63946" opacity="0.5"/>
  <circle cx="240" cy="550" r="15" fill="#E63946" opacity="0.7"/>
  <circle cx="280" cy="550" r="18" fill="#E63946"/>

  <!-- Pendulum 2: Center - blue, medium arc -->
  <path d="M 400 110 Q 310 350 330 500" stroke="#1D3557" stroke-width="2" fill="none" stroke-dasharray="6,6"/>
  <path d="M 400 110 Q 350 350 370 500" stroke="#1D3557" stroke-width="2" fill="none" stroke-dasharray="6,6"/>
  <path d="M 400 110 L 400 500" stroke="#1D3557" stroke-width="3" fill="none"/>
  <path d="M 400 110 Q 450 350 430 500" stroke="#1D3557" stroke-width="2" fill="none" stroke-dasharray="6,6"/>
  <path d="M 400 110 Q 490 350 470 500" stroke="#1D3557" stroke-width="2" fill="none" stroke-dasharray="6,6"/>
  <!-- Arc trace -->
  <path d="M 330 500 Q 370 530 400 500 Q 430 470 470 500" stroke="#1D3557" stroke-width="3" fill="none"/>
  <!-- Endpoint circles -->
  <circle cx="330" cy="500" r="22" fill="#1D3557"/>
  <circle cx="370" cy="500" r="16" fill="#1D3557" opacity="0.6"/>
  <circle cx="400" cy="500" r="12" fill="#1D3557" opacity="0.4"/>
  <circle cx="430" cy="500" r="16" fill="#1D3557" opacity="0.6"/>
  <circle cx="470" cy="500" r="22" fill="#1D3557"/>

  <!-- Pendulum 3: Right - yellow/orange, short arc -->
  <path d="M 600 110 Q 530 300 550 450" stroke="#E76F51" stroke-width="2" fill="none" stroke-dasharray="10,3"/>
  <path d="M 600 110 Q 570 300 580 450" stroke="#E76F51" stroke-width="2" fill="none" stroke-dasharray="10,3"/>
  <path d="M 600 110 L 600 450" stroke="#E76F51" stroke-width="3" fill="none"/>
  <path d="M 600 110 Q 630 300 620 450" stroke="#E76F51" stroke-width="2" fill="none" stroke-dasharray="10,3"/>
  <path d="M 600 110 Q 670 300 650 450" stroke="#E76F51" stroke-width="2" fill="none" stroke-dasharray="10,3"/>
  <!-- Arc trace -->
  <path d="M 550 450 Q 575 475 600 450 Q 625 425 650 450" stroke="#E76F51" stroke-width="3" fill="none"/>
  <!-- Endpoint circles -->
  <circle cx="550" cy="450" r="20" fill="#F4D35E" stroke="#E76F51" stroke-width="3"/>
  <circle cx="580" cy="450" r="14" fill="#F4D35E" stroke="#E76F51" stroke-width="2" opacity="0.7"/>
  <circle cx="600" cy="450" r="10" fill="#F4D35E" stroke="#E76F51" stroke-width="2" opacity="0.4"/>
  <circle cx="620" cy="450" r="14" fill="#F4D35E" stroke="#E76F51" stroke-width="2" opacity="0.7"/>
  <circle cx="650" cy="450" r="20" fill="#F4D35E" stroke="#E76F51" stroke-width="3"/>

  <!-- Motion study arrows at bottom -->
  <line x1="80" y1="650" x2="720" y2="650" stroke="#000000" stroke-width="2"/>
  <polygon points="720,645 735,650 720,655" fill="#000000"/>
  <text x="740" y="655" font-family="sans-serif" font-size="14" fill="#000000">t</text>

  <!-- Time markers -->
  <line x1="150" y1="645" x2="150" y2="655" stroke="#000000" stroke-width="2"/>
  <line x1="250" y1="645" x2="250" y2="655" stroke="#000000" stroke-width="2"/>
  <line x1="350" y1="645" x2="350" y2="655" stroke="#000000" stroke-width="2"/>
  <line x1="450" y1="645" x2="450" y2="655" stroke="#000000" stroke-width="2"/>
  <line x1="550" y1="645" x2="550" y2="655" stroke="#000000" stroke-width="2"/>
  <line x1="650" y1="645" x2="650" y2="655" stroke="#000000" stroke-width="2"/>

  <!-- Sine wave trace - red -->
  <path d="M 80 700 Q 130 670 180 700 Q 230 730 280 700 Q 330 670 380 700 Q 430 730 480 700 Q 530 670 580 700 Q 630 730 680 700" stroke="#E63946" stroke-width="2.5" fill="none"/>
  <!-- Sine wave trace - blue (phase shifted) -->
  <path d="M 80 720 Q 150 690 220 720 Q 290 750 360 720 Q 430 690 500 720 Q 570 750 640 720 Q 680 700 720 720" stroke="#1D3557" stroke-width="2.5" fill="none"/>
  <!-- Sine wave trace - orange (different frequency) -->
  <path d="M 80 740 Q 110 720 140 740 Q 170 760 200 740 Q 230 720 260 740 Q 290 760 320 740 Q 350 720 380 740 Q 410 760 440 740 Q 470 720 500 740 Q 530 760 560 740 Q 590 720 620 740 Q 650 760 680 740 Q 700 725 720 740" stroke="#E76F51" stroke-width="2.5" fill="none"/>

  <!-- Decorative geometric elements -->
  <rect x="30" y="130" width="40" height="40" fill="#2A9D8F" opacity="0.6"/>
  <rect x="730" y="130" width="40" height="40" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="50" cy="200" r="15" fill="#F4D35E" opacity="0.5"/>
  <circle cx="750" cy="200" r="15" fill="#F4D35E" opacity="0.5"/>

  <!-- Ghost pendulum positions (motion blur effect) -->
  <line x1="200" y1="110" x2="120" y2="548" stroke="#E63946" stroke-width="1.5" opacity="0.15"/>
  <line x1="200" y1="110" x2="280" y2="548" stroke="#E63946" stroke-width="1.5" opacity="0.15"/>
  <line x1="400" y1="110" x2="330" y2="498" stroke="#1D3557" stroke-width="1.5" opacity="0.15"/>
  <line x1="400" y1="110" x2="470" y2="498" stroke="#1D3557" stroke-width="1.5" opacity="0.15"/>
  <line x1="600" y1="110" x2="550" y2="448" stroke="#E76F51" stroke-width="1.5" opacity="0.15"/>
  <line x1="600" y1="110" x2="650" y2="448" stroke="#E76F51" stroke-width="1.5" opacity="0.15"/>

  <!-- Angular measurement arcs -->
  <path d="M 180 140 A 30 30 0 0 1 220 140" stroke="#000000" stroke-width="1.5" fill="none"/>
  <path d="M 375 140 A 30 30 0 0 1 425 140" stroke="#000000" stroke-width="1.5" fill="none"/>
  <path d="M 580 140 A 30 30 0 0 1 620 140" stroke="#000000" stroke-width="1.5" fill="none"/>

  <!-- Small teal accent triangles -->
  <polygon points="50,600 70,600 60,580" fill="#2A9D8F"/>
  <polygon points="730,600 750,600 740,580" fill="#2A9D8F"/>

  <!-- Bottom border -->
  <rect x="0" y="770" width="800" height="30" fill="#1D3557"/>
</svg>