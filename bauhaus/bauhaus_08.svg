<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Color Blocks</title>
  <rect width="800" height="800" fill="#F5F0E8"/>

  <!-- Large bold rectangular color blocks - asymmetric arrangement -->
  <!-- Dominant red block top-left -->
  <rect x="40" y="40" width="320" height="240" fill="#E63946"/>

  <!-- Blue block right side -->
  <rect x="480" y="60" width="280" height="180" fill="#1D3557"/>

  <!-- Yellow block center-left -->
  <rect x="60" y="340" width="240" height="160" fill="#F4D35E"/>

  <!-- Black block bottom-right -->
  <rect x="500" y="520" width="260" height="240" fill="#000000"/>

  <!-- Steel blue block center -->
  <rect x="340" y="300" width="180" height="200" fill="#457B9D"/>

  <!-- Light blue block bottom-left -->
  <rect x="40" y="560" width="200" height="200" fill="#A8DADC"/>

  <!-- White block overlapping -->
  <rect x="380" y="100" width="80" height="280" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>

  <!-- Thin horizontal red bar -->
  <rect x="280" y="520" width="200" height="30" fill="#E63946"/>

  <!-- Narrow yellow vertical bar -->
  <rect x="260" y="60" width="25" height="400" fill="#F4D35E" opacity="0.85"/>

  <!-- Dark horizontal bar -->
  <rect x="520" y="260" width="240" height="20" fill="#000000"/>

  <!-- Medium steel blue rectangle -->
  <rect x="560" y="300" width="180" height="80" fill="#457B9D" opacity="0.7"/>

  <!-- Small accent circles -->
  <circle cx="200" cy="180" r="15" fill="#FFFFFF"/>
  <circle cx="620" cy="150" r="12" fill="#F4D35E"/>
  <circle cx="180" cy="420" r="10" fill="#000000"/>
  <circle cx="430" cy="400" r="8" fill="#FFFFFF"/>
  <circle cx="630" cy="640" r="14" fill="#E63946"/>
  <circle cx="140" cy="660" r="11" fill="#1D3557"/>
  <circle cx="350" cy="560" r="9" fill="#F4D35E"/>
  <circle cx="490" cy="480" r="7" fill="#FFFFFF"/>
  <circle cx="100" cy="500" r="6" fill="#000000"/>
  <circle cx="720" cy="430" r="10" fill="#A8DADC"/>
  <circle cx="310" cy="250" r="5" fill="#FFFFFF"/>
  <circle cx="540" cy="700" r="8" fill="#F4D35E"/>

  <!-- Thin line accents -->
  <line x1="40" y1="290" x2="360" y2="290" stroke="#000000" stroke-width="2"/>
  <line x1="480" y1="250" x2="480" y2="520" stroke="#E63946" stroke-width="2"/>
  <line x1="300" y1="560" x2="500" y2="560" stroke="#000000" stroke-width="1.5"/>

  <!-- Frame -->
  <rect x="20" y="20" width="760" height="760" fill="none" stroke="#000000" stroke-width="3"/>
</svg>