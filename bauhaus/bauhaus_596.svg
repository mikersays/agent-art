<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Background grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>

  <!-- Thin horizontal lines extending left from totem -->
  <line x1="80" y1="95" x2="450" y2="95" stroke="#264653" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="195" x2="450" y2="195" stroke="#6D2E46" stroke-width="1" opacity="0.25"/>
  <line x1="60" y1="295" x2="450" y2="295" stroke="#264653" stroke-width="1.5" opacity="0.2"/>
  <line x1="150" y1="395" x2="450" y2="395" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="100" y1="495" x2="450" y2="495" stroke="#6D2E46" stroke-width="1" opacity="0.3"/>
  <line x1="180" y1="595" x2="450" y2="595" stroke="#264653" stroke-width="1.5" opacity="0.2"/>
  <line x1="90" y1="695" x2="450" y2="695" stroke="#000000" stroke-width="1" opacity="0.25"/>

  <!-- Totem structure - center-right vertical stack -->
  <!-- Base rectangle -->
  <rect x="470" y="700" width="100" height="60" fill="#264653" opacity="0.9"/>

  <!-- Circle 1 -->
  <circle cx="520" cy="665" r="35" fill="#E63946" opacity="0.85"/>

  <!-- Rectangle 2 -->
  <rect x="480" y="595" width="80" height="45" fill="#1D3557" opacity="0.9"/>

  <!-- Circle 2 -->
  <circle cx="520" cy="560" r="30" fill="#F4D35E" opacity="0.9"/>

  <!-- Rectangle 3 -->
  <rect x="485" y="495" width="70" height="40" fill="#2A9D8F" opacity="0.85"/>

  <!-- Circle 3 -->
  <circle cx="520" cy="460" r="28" fill="#E76F51" opacity="0.8"/>

  <!-- Rectangle 4 -->
  <rect x="490" y="400" width="60" height="35" fill="#6D2E46" opacity="0.9"/>

  <!-- Circle 4 -->
  <circle cx="520" cy="370" r="25" fill="#457B9D" opacity="0.85"/>

  <!-- Rectangle 5 -->
  <rect x="495" y="310" width="50" height="38" fill="#264653" opacity="0.9"/>

  <!-- Circle 5 -->
  <circle cx="520" cy="280" r="22" fill="#E63946" opacity="0.8"/>

  <!-- Rectangle 6 -->
  <rect x="498" y="228" width="44" height="32" fill="#000000" opacity="0.85"/>

  <!-- Circle 6 - top -->
  <circle cx="520" cy="200" r="20" fill="#F4D35E" opacity="0.9"/>

  <!-- Top cap rectangle -->
  <rect x="505" y="155" width="30" height="28" fill="#6D2E46" opacity="0.9"/>

  <!-- Triangular protrusions on sides -->
  <polygon points="470,665 440,650 470,635" fill="#264653" opacity="0.7"/>
  <polygon points="570,665 600,650 570,635" fill="#264653" opacity="0.7"/>

  <polygon points="480,560 450,545 480,530" fill="#6D2E46" opacity="0.6"/>
  <polygon points="560,560 590,545 560,530" fill="#6D2E46" opacity="0.6"/>

  <polygon points="485,460 455,448 485,436" fill="#264653" opacity="0.65"/>
  <polygon points="555,460 585,448 555,436" fill="#264653" opacity="0.65"/>

  <polygon points="490,370 462,358 490,346" fill="#6D2E46" opacity="0.55"/>
  <polygon points="550,370 578,358 550,346" fill="#6D2E46" opacity="0.55"/>

  <polygon points="495,280 468,270 495,260" fill="#264653" opacity="0.6"/>
  <polygon points="545,280 572,270 545,260" fill="#264653" opacity="0.6"/>

  <polygon points="505,200 480,190 505,180" fill="#6D2E46" opacity="0.5"/>
  <polygon points="535,200 560,190 535,180" fill="#6D2E46" opacity="0.5"/>

  <!-- Small accent shapes in left area -->
  <rect x="200" y="150" width="15" height="15" fill="#E63946" opacity="0.3"/>
  <circle cx="150" cy="400" r="8" fill="#F4D35E" opacity="0.4"/>
  <rect x="250" y="550" width="12" height="12" fill="#2A9D8F" opacity="0.35"/>
  <circle cx="300" cy="250" r="6" fill="#6D2E46" opacity="0.3"/>

  <!-- Corner accents -->
  <rect x="20" y="20" width="25" height="25" fill="#264653" opacity="0.2"/>
  <rect x="755" y="20" width="25" height="25" fill="#6D2E46" opacity="0.2"/>
  <circle cx="35" cy="770" r="12" fill="#264653" opacity="0.15"/>
  <circle cx="770" cy="770" r="12" fill="#6D2E46" opacity="0.15"/>
</svg>