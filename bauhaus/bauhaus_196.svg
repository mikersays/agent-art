<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#1D3557"/>
  <!-- Outer ring -->
  <circle cx="400" cy="400" r="340" fill="none" stroke="#DDA15E" stroke-width="8"/>
  <circle cx="400" cy="400" r="330" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="400" cy="400" r="320" fill="#000" fill-opacity="0.3"/>
  <!-- Degree marks around outer ring -->
  <g stroke="#F4D35E" stroke-width="2">
    <line x1="400" y1="60" x2="400" y2="80"/>
    <line x1="400" y1="720" x2="400" y2="740"/>
    <line x1="60" y1="400" x2="80" y2="400"/>
    <line x1="720" y1="400" x2="740" y2="400"/>
    <line x1="160" y1="117" x2="170" y2="134"/>
    <line x1="640" y1="117" x2="630" y2="134"/>
    <line x1="160" y1="683" x2="170" y2="666"/>
    <line x1="640" y1="683" x2="630" y2="666"/>
    <line x1="117" y1="160" x2="134" y2="170"/>
    <line x1="683" y1="160" x2="666" y2="170"/>
    <line x1="117" y1="640" x2="134" y2="630"/>
    <line x1="683" y1="640" x2="666" y2="630"/>
  </g>
  <!-- Inner graduated circle -->
  <circle cx="400" cy="400" r="280" fill="none" stroke="#DDA15E" stroke-width="3"/>
  <circle cx="400" cy="400" r="260" fill="none" stroke="#F4D35E" stroke-width="1"/>
  <!-- Rete overlay - eccentric circle -->
  <circle cx="380" cy="380" r="200" fill="none" stroke="#F4D35E" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- Star pointers -->
  <polygon points="400,140 406,158 396,158" fill="#E63946"/>
  <polygon points="580,300 564,308 564,294" fill="#E63946"/>
  <polygon points="250,520 264,512 264,528" fill="#E63946"/>
  <polygon points="540,580 524,572 534,590" fill="#E63946"/>
  <polygon points="300,200 310,216 292,216" fill="#F4D35E"/>
  <!-- Rotating arm 1 -->
  <line x1="400" y1="400" x2="400" y2="80" stroke="#DDA15E" stroke-width="4"/>
  <circle cx="400" cy="80" r="6" fill="#F4D35E"/>
  <!-- Rotating arm 2 -->
  <line x1="400" y1="400" x2="640" y2="260" stroke="#DDA15E" stroke-width="4"/>
  <circle cx="640" cy="260" r="6" fill="#F4D35E"/>
  <!-- Rotating arm 3 -->
  <line x1="400" y1="400" x2="200" y2="580" stroke="#6D2E46" stroke-width="3"/>
  <circle cx="200" cy="580" r="5" fill="#E63946"/>
  <!-- Central hub -->
  <circle cx="400" cy="400" r="20" fill="#333"/>
  <circle cx="400" cy="400" r="12" fill="#DDA15E"/>
  <circle cx="400" cy="400" r="5" fill="#000"/>
  <!-- Cross hairs on center -->
  <line x1="385" y1="400" x2="415" y2="400" stroke="#FFF" stroke-width="1"/>
  <line x1="400" y1="385" x2="400" y2="415" stroke="#FFF" stroke-width="1"/>
  <!-- Rete geometric overlay arcs -->
  <path d="M 300 200 Q 200 400 300 600" fill="none" stroke="#F4D35E" stroke-width="1.5"/>
  <path d="M 500 200 Q 600 400 500 600" fill="none" stroke="#F4D35E" stroke-width="1.5"/>
  <!-- Additional degree tick marks - fine -->
  <g stroke="#DDA15E" stroke-width="1">
    <line x1="230" y1="98" x2="236" y2="112"/>
    <line x1="320" y1="72" x2="323" y2="88"/>
    <line x1="480" y1="72" x2="477" y2="88"/>
    <line x1="570" y1="98" x2="564" y2="112"/>
    <line x1="702" y1="320" x2="688" y2="323"/>
    <line x1="702" y1="480" x2="688" y2="477"/>
    <line x1="98" y1="320" x2="112" y2="323"/>
    <line x1="98" y1="480" x2="112" y2="477"/>
    <line x1="230" y1="702" x2="236" y2="688"/>
    <line x1="570" y1="702" x2="564" y2="688"/>
  </g>
  <!-- Altitude scale arcs -->
  <path d="M 200 400 A 200 200 0 0 1 400 200" fill="none" stroke="#FFF" stroke-width="1" stroke-opacity="0.4"/>
  <path d="M 250 400 A 150 150 0 0 1 400 250" fill="none" stroke="#FFF" stroke-width="1" stroke-opacity="0.3"/>
  <path d="M 300 400 A 100 100 0 0 1 400 300" fill="none" stroke="#FFF" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Decorative corner marks -->
  <rect x="20" y="20" width="40" height="40" fill="none" stroke="#DDA15E" stroke-width="2"/>
  <rect x="740" y="20" width="40" height="40" fill="none" stroke="#DDA15E" stroke-width="2"/>
  <rect x="20" y="740" width="40" height="40" fill="none" stroke="#DDA15E" stroke-width="2"/>
  <rect x="740" y="740" width="40" height="40" fill="none" stroke="#DDA15E" stroke-width="2"/>
</svg>