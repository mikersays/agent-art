<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <title>Heliostat</title>
  <!-- Background - sky gradient feel -->
  <rect width="800" height="800" fill="#1D3557"/>
  <!-- Sun disc -->
  <circle cx="400" cy="120" r="70" fill="#F4D35E"/>
  <circle cx="400" cy="120" r="55" fill="#FFF" opacity="0.4"/>
  <!-- Light beam from sun to mirror 1 -->
  <line x1="400" y1="190" x2="150" y2="400" stroke="#F4D35E" stroke-width="3" opacity="0.7"/>
  <!-- Reflected beam from mirror 1 -->
  <line x1="150" y1="400" x2="350" y2="700" stroke="#F4D35E" stroke-width="2" opacity="0.5"/>
  <!-- Light beam to mirror 2 -->
  <line x1="400" y1="190" x2="300" y2="350" stroke="#F4D35E" stroke-width="3" opacity="0.7"/>
  <!-- Reflected beam from mirror 2 -->
  <line x1="300" y1="350" x2="500" y2="650" stroke="#F4D35E" stroke-width="2" opacity="0.5"/>
  <!-- Light beam to mirror 3 -->
  <line x1="400" y1="190" x2="500" y2="320" stroke="#F4D35E" stroke-width="3" opacity="0.7"/>
  <!-- Reflected beam from mirror 3 -->
  <line x1="500" y1="320" x2="700" y2="600" stroke="#F4D35E" stroke-width="2" opacity="0.5"/>
  <!-- Light beam to mirror 4 -->
  <line x1="400" y1="190" x2="650" y2="450" stroke="#F4D35E" stroke-width="3" opacity="0.7"/>
  <!-- Reflected beam from mirror 4 -->
  <line x1="650" y1="450" x2="400" y2="750" stroke="#F4D35E" stroke-width="2" opacity="0.5"/>
  <!-- Mirror panel 1 - tilted left -->
  <rect x="110" y="370" width="80" height="50" fill="#457B9D" stroke="#FFF" stroke-width="2" transform="rotate(-25,150,395)"/>
  <line x1="150" y1="420" x2="150" y2="500" stroke="#000" stroke-width="4"/>
  <rect x="135" y="495" width="30" height="10" fill="#000"/>
  <!-- Mirror panel 2 - slight tilt -->
  <rect x="260" y="320" width="80" height="50" fill="#457B9D" stroke="#FFF" stroke-width="2" transform="rotate(-15,300,345)"/>
  <line x1="300" y1="370" x2="300" y2="460" stroke="#000" stroke-width="4"/>
  <rect x="285" y="455" width="30" height="10" fill="#000"/>
  <!-- Mirror panel 3 - tilted right -->
  <rect x="460" y="290" width="80" height="50" fill="#457B9D" stroke="#FFF" stroke-width="2" transform="rotate(20,500,315)"/>
  <line x1="500" y1="340" x2="500" y2="430" stroke="#000" stroke-width="4"/>
  <rect x="485" y="425" width="30" height="10" fill="#000"/>
  <!-- Mirror panel 4 - steep tilt -->
  <rect x="610" y="420" width="80" height="50" fill="#457B9D" stroke="#FFF" stroke-width="2" transform="rotate(35,650,445)"/>
  <line x1="650" y1="470" x2="650" y2="560" stroke="#000" stroke-width="4"/>
  <rect x="635" y="555" width="30" height="10" fill="#000"/>
  <!-- Ground plane -->
  <rect x="0" y="580" width="800" height="220" fill="#000" opacity="0.5"/>
  <!-- Ground line -->
  <line x1="0" y1="580" x2="800" y2="580" stroke="#2A9D8F" stroke-width="2"/>
  <!-- Reflection spots on ground -->
  <ellipse cx="350" cy="700" rx="40" ry="15" fill="#F4D35E" opacity="0.6"/>
  <ellipse cx="500" cy="650" rx="35" ry="12" fill="#F4D35E" opacity="0.5"/>
  <ellipse cx="700" cy="620" rx="30" ry="10" fill="#F4D35E" opacity="0.4"/>
  <ellipse cx="400" cy="750" rx="45" ry="18" fill="#F4D35E" opacity="0.5"/>
  <!-- Decorative Bauhaus geometric elements -->
  <circle cx="50" cy="50" r="25" fill="#E63946"/>
  <rect x="720" y="30" width="50" height="50" fill="#6D2E46"/>
  <polygon points="50,750 75,710 100,750" fill="#2A9D8F"/>
  <!-- Additional mirror glint effects -->
  <circle cx="150" cy="390" r="5" fill="#FFF" opacity="0.8"/>
  <circle cx="300" cy="340" r="5" fill="#FFF" opacity="0.8"/>
  <circle cx="500" cy="310" r="5" fill="#FFF" opacity="0.8"/>
  <circle cx="650" cy="440" r="5" fill="#FFF" opacity="0.8"/>
</svg>