<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>

  <!-- Large color field blocks - asymmetric subdivision -->
  <!-- Top-left large blue field -->
  <rect x="0" y="0" width="480" height="320" fill="#1D3557" opacity="0.9"/>

  <!-- Top-right yellow field -->
  <rect x="490" y="0" width="310" height="180" fill="#F4D35E" opacity="0.85"/>

  <!-- Top-right lower white field -->
  <rect x="490" y="188" width="310" height="132" fill="#FFFFFF" opacity="1"/>

  <!-- Middle-left red field -->
  <rect x="0" y="328" width="200" height="260" fill="#E63946" opacity="0.9"/>

  <!-- Middle-center warm gray field -->
  <rect x="208" y="328" width="272" height="160" fill="#A89F91" opacity="0.7"/>

  <!-- Middle-center lower white field -->
  <rect x="208" y="496" width="272" height="92" fill="#FFFFFF" opacity="1"/>

  <!-- Middle-right blue field -->
  <rect x="490" y="328" width="180" height="260" fill="#1D3557" opacity="0.75"/>

  <!-- Middle-far-right yellow narrow field -->
  <rect x="678" y="328" width="122" height="260" fill="#F4D35E" opacity="0.8"/>

  <!-- Bottom-left white field -->
  <rect x="0" y="596" width="200" height="204" fill="#FFFFFF" opacity="1"/>

  <!-- Bottom-center red field -->
  <rect x="208" y="596" width="340" height="204" fill="#E63946" opacity="0.85"/>

  <!-- Bottom-right warm gray field -->
  <rect x="556" y="596" width="244" height="204" fill="#A89F91" opacity="0.6"/>

  <!-- Black dividing lines of varying thickness -->
  <!-- Horizontal lines -->
  <line x1="0" y1="320" x2="480" y2="320" stroke="#000000" stroke-width="8"/>
  <line x1="480" y1="180" x2="800" y2="180" stroke="#000000" stroke-width="5"/>
  <line x1="480" y1="320" x2="800" y2="320" stroke="#000000" stroke-width="6"/>
  <line x1="0" y1="588" x2="800" y2="588" stroke="#000000" stroke-width="8"/>
  <line x1="200" y1="488" x2="480" y2="488" stroke="#000000" stroke-width="4"/>

  <!-- Vertical lines -->
  <line x1="480" y1="0" x2="480" y2="600" stroke="#000000" stroke-width="8"/>
  <line x1="200" y1="320" x2="200" y2="800" stroke="#000000" stroke-width="6"/>
  <line x1="670" y1="320" x2="670" y2="588" stroke="#000000" stroke-width="5"/>
  <line x1="548" y1="588" x2="548" y2="800" stroke="#000000" stroke-width="6"/>

  <!-- Border lines -->
  <line x1="0" y1="0" x2="800" y2="0" stroke="#000000" stroke-width="4"/>
  <line x1="0" y1="800" x2="800" y2="800" stroke="#000000" stroke-width="4"/>
  <line x1="0" y1="0" x2="0" y2="800" stroke="#000000" stroke-width="4"/>
  <line x1="800" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="4"/>

  <!-- Teal circle accents at intersections -->
  <circle cx="480" cy="320" r="14" fill="#2A9D8F" opacity="0.85"/>
  <circle cx="200" cy="588" r="11" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="480" cy="588" r="12" fill="#2A9D8F" opacity="0.75"/>
  <circle cx="670" cy="320" r="9" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="480" cy="180" r="10" fill="#2A9D8F" opacity="0.8"/>

  <!-- Orange triangle accents at intersections -->
  <polygon points="200,320 215,300 185,300" fill="#E76F51" opacity="0.85"/>
  <polygon points="548,588 563,568 533,568" fill="#E76F51" opacity="0.8"/>
  <polygon points="670,588 685,568 655,568" fill="#E76F51" opacity="0.75"/>
  <polygon points="200,488 215,473 185,473" fill="#E76F51" opacity="0.7"/>

  <!-- Small accent shapes within fields -->
  <circle cx="240" cy="160" r="30" fill="#F4D35E" opacity="0.3"/>
  <rect x="600" y="80" width="25" height="25" fill="#E63946" opacity="0.4"/>
  <circle cx="100" cy="460" r="15" fill="#FFFFFF" opacity="0.4"/>
  <rect x="360" y="650" width="20" height="20" fill="#1D3557" opacity="0.35"/>
  <circle cx="720" cy="700" r="18" fill="#2A9D8F" opacity="0.3"/>
</svg>