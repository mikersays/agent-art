<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Outermost scattered shapes - light, airy -->
  <circle cx="80" cy="100" r="18" fill="#A8DADC" opacity="0.5"/>
  <rect x="680" y="60" width="30" height="25" fill="#FEFAE0" stroke="#A8DADC" stroke-width="1.5" opacity="0.6"/>
  <circle cx="720" cy="700" r="22" fill="#E9C46A" opacity="0.45"/>
  <rect x="50" y="650" width="35" height="28" fill="#A8DADC" opacity="0.4"/>
  <circle cx="150" cy="720" r="15" fill="#FEFAE0" stroke="#E9C46A" stroke-width="1" opacity="0.5"/>
  <rect x="620" y="720" width="25" height="20" fill="#A8DADC" opacity="0.35"/>
  <circle cx="700" cy="150" r="12" fill="#E9C46A" opacity="0.4"/>
  <circle cx="60" cy="400" r="14" fill="#A8DADC" opacity="0.45"/>
  <rect x="730" y="420" width="20" height="30" fill="#E9C46A" opacity="0.4"/>
  <circle cx="130" cy="50" r="10" fill="#E9C46A" opacity="0.35"/>

  <!-- Mid-range scattered shapes -->
  <circle cx="200" cy="200" r="25" fill="#457B9D" opacity="0.5"/>
  <rect x="580" y="180" width="45" height="35" fill="#A8DADC" opacity="0.55"/>
  <circle cx="620" cy="580" r="28" fill="#E9C46A" opacity="0.5"/>
  <rect x="150" y="560" width="40" height="32" fill="#457B9D" opacity="0.45"/>
  <circle cx="250" cy="620" r="20" fill="#A8DADC" opacity="0.5"/>
  <rect x="560" y="250" width="35" height="40" fill="#E9C46A" opacity="0.45"/>

  <!-- Red accent ring around core -->
  <circle cx="400" cy="400" r="180" fill="none" stroke="#E63946" stroke-width="3" opacity="0.7"/>
  <circle cx="400" cy="400" r="170" fill="none" stroke="#E63946" stroke-width="1" opacity="0.35"/>

  <!-- Dense core - outer layer -->
  <rect x="310" y="300" width="80" height="70" fill="#1D3557" opacity="0.6"/>
  <circle cx="450" cy="340" r="45" fill="#6D2E46" opacity="0.55"/>
  <rect x="380" y="420" width="90" height="60" fill="#264653" opacity="0.6"/>
  <circle cx="350" cy="430" r="40" fill="#1D3557" opacity="0.5"/>
  <rect x="420" y="300" width="60" height="80" fill="#000000" opacity="0.4"/>

  <!-- Dense core - middle layer -->
  <circle cx="400" cy="380" r="55" fill="#1D3557" opacity="0.7"/>
  <rect x="360" y="350" width="70" height="70" fill="#6D2E46" opacity="0.6"/>
  <circle cx="380" cy="400" r="35" fill="#000000" opacity="0.55"/>
  <rect x="390" y="370" width="50" height="50" fill="#264653" opacity="0.65"/>

  <!-- Dense core - innermost -->
  <circle cx="400" cy="390" r="25" fill="#000000" opacity="0.8"/>
  <rect x="385" y="378" width="30" height="25" fill="#1D3557" opacity="0.75"/>
  <circle cx="405" cy="395" r="15" fill="#6D2E46" opacity="0.85"/>

  <!-- Structural lines radiating from center -->
  <line x1="400" y1="400" x2="80" y2="100" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="720" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="700" y2="150" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="60" y2="650" stroke="#000000" stroke-width="0.5" opacity="0.1"/>

  <!-- Small accents near core -->
  <circle cx="320" cy="320" r="8" fill="#E63946" opacity="0.7"/>
  <circle cx="480" cy="460" r="7" fill="#E63946" opacity="0.65"/>
  <rect x="340" y="460" width="12" height="12" fill="#E63946" opacity="0.6"/>
  <rect x="450" y="340" width="10" height="10" fill="#E63946" opacity="0.55"/>
</svg>