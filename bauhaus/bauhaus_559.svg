<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle background grid -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>

  <!-- Flag 1 - Red, tilted left -->
  <line x1="120" y1="700" x2="150" y2="200" stroke="#000000" stroke-width="2.5" opacity="0.8"/>
  <rect x="152" y="200" width="110" height="70" fill="#E63946" opacity="0.85" transform="rotate(-5, 152, 200)"/>
  <circle cx="120" cy="700" r="6" fill="#000000" opacity="0.7"/>

  <!-- Flag 2 - Blue, upright -->
  <line x1="260" y1="720" x2="270" y2="150" stroke="#000000" stroke-width="2.5" opacity="0.8"/>
  <rect x="272" y="150" width="100" height="65" fill="#1D3557" opacity="0.85"/>
  <circle cx="260" cy="720" r="6" fill="#000000" opacity="0.7"/>

  <!-- Flag 3 - Yellow, tilted right -->
  <line x1="420" y1="680" x2="440" y2="100" stroke="#000000" stroke-width="2.5" opacity="0.8"/>
  <rect x="442" y="100" width="120" height="75" fill="#F4D35E" opacity="0.9" transform="rotate(8, 442, 100)"/>
  <circle cx="420" cy="680" r="6" fill="#000000" opacity="0.7"/>

  <!-- Flag 4 - Red, shorter pole -->
  <line x1="540" y1="710" x2="555" y2="280" stroke="#000000" stroke-width="2" opacity="0.75"/>
  <rect x="557" y="280" width="90" height="55" fill="#E63946" opacity="0.75" transform="rotate(-10, 557, 280)"/>
  <circle cx="540" cy="710" r="5" fill="#000000" opacity="0.7"/>

  <!-- Flag 5 - Blue, tallest -->
  <line x1="670" y1="730" x2="690" y2="80" stroke="#000000" stroke-width="3" opacity="0.8"/>
  <rect x="692" y="80" width="95" height="60" fill="#1D3557" opacity="0.8" transform="rotate(3, 692, 80)"/>
  <circle cx="670" cy="730" r="7" fill="#000000" opacity="0.7"/>

  <!-- Flag 6 - Yellow, mid-height, between others -->
  <line x1="190" y1="740" x2="200" y2="350" stroke="#000000" stroke-width="2" opacity="0.7"/>
  <rect x="202" y="350" width="85" height="50" fill="#F4D35E" opacity="0.8" transform="rotate(12, 202, 350)"/>
  <circle cx="190" cy="740" r="5" fill="#000000" opacity="0.6"/>

  <!-- Flag 7 - Red, small, background -->
  <line x1="350" y1="750" x2="360" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <rect x="362" y="400" width="70" height="45" fill="#E63946" opacity="0.5" transform="rotate(-7, 362, 400)"/>
  <circle cx="350" cy="750" r="4" fill="#000000" opacity="0.5"/>

  <!-- Ground line -->
  <line x1="40" y1="760" x2="760" y2="760" stroke="#000000" stroke-width="1.5" opacity="0.3"/>

  <!-- Small accent shapes -->
  <rect x="60" y="600" width="20" height="20" fill="#2A9D8F" opacity="0.3" transform="rotate(45, 70, 610)"/>
  <rect x="730" y="550" width="18" height="18" fill="#E76F51" opacity="0.3" transform="rotate(30, 739, 559)"/>
  <circle cx="480" cy="500" r="8" fill="#457B9D" opacity="0.25"/>
  <circle cx="320" cy="620" r="10" fill="#DDA15E" opacity="0.2"/>
</svg>