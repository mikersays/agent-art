<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#FFF"/>
  <!-- Grid lines -->
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <!-- Row 1: Abstract letterform fragments -->
  <!-- Arc shape top-left -->
  <path d="M 80 180 A 80 80 0 0 1 160 100" stroke="#000" stroke-width="12" fill="none"/>
  <rect x="160" y="100" width="12" height="80" fill="#000"/>
  <!-- Vertical stroke with half circle -->
  <rect x="260" y="80" width="14" height="140" fill="#1D3557"/>
  <circle cx="274" cy="150" r="40" fill="none" stroke="#1D3557" stroke-width="10"/>
  <!-- Diagonal cross form -->
  <line x1="380" y1="80" x2="440" y2="180" stroke="#E63946" stroke-width="10"/>
  <line x1="440" y1="80" x2="380" y2="180" stroke="#E63946" stroke-width="10"/>
  <circle cx="410" cy="130" r="12" fill="#F4D35E"/>
  <!-- Arc with horizontal bar -->
  <path d="M 520 180 A 60 60 0 1 1 640 180" stroke="#000" stroke-width="10" fill="none"/>
  <line x1="520" y1="140" x2="640" y2="140" stroke="#F4D35E" stroke-width="8"/>
  <!-- Row 2: More abstract letterforms -->
  <!-- Circle with vertical cut -->
  <circle cx="120" cy="320" r="60" fill="#E63946" opacity="0.8"/>
  <rect x="110" y="260" width="20" height="120" fill="#FFF"/>
  <!-- Stacked arcs -->
  <path d="M 250 280 A 50 50 0 0 1 350 280" stroke="#2A9D8F" stroke-width="10" fill="none"/>
  <path d="M 250 340 A 50 50 0 0 1 350 340" stroke="#2A9D8F" stroke-width="10" fill="none"/>
  <rect x="250" y="280" width="10" height="60" fill="#2A9D8F"/>
  <!-- Angular form like a geometric K -->
  <rect x="420" y="260" width="12" height="130" fill="#000"/>
  <line x1="432" y1="330" x2="500" y2="260" stroke="#000" stroke-width="10"/>
  <line x1="432" y1="330" x2="500" y2="390" stroke="#F4D35E" stroke-width="10"/>
  <!-- Circular glyph -->
  <circle cx="600" cy="320" r="55" fill="none" stroke="#1D3557" stroke-width="12"/>
  <circle cx="600" cy="320" r="25" fill="#A8DADC"/>
  <line x1="600" y1="265" x2="600" y2="375" stroke="#1D3557" stroke-width="6"/>
  <!-- Row 3: Larger compositions -->
  <!-- Wide arc with descender -->
  <path d="M 60 480 A 70 70 0 0 1 200 480" stroke="#E63946" stroke-width="14" fill="none"/>
  <rect x="190" y="480" width="14" height="80" fill="#E63946"/>
  <circle cx="197" cy="560" r="10" fill="#F4D35E"/>
  <!-- Three parallel diagonals -->
  <line x1="280" y1="440" x2="320" y2="560" stroke="#000" stroke-width="8"/>
  <line x1="310" y1="440" x2="350" y2="560" stroke="#1D3557" stroke-width="8"/>
  <line x1="340" y1="440" x2="380" y2="560" stroke="#E63946" stroke-width="8"/>
  <!-- Geometric E-like shape -->
  <rect x="440" y="440" width="12" height="130" fill="#000"/>
  <rect x="440" y="440" width="80" height="12" fill="#000"/>
  <rect x="440" y="500" width="60" height="10" fill="#2A9D8F"/>
  <rect x="440" y="558" width="80" height="12" fill="#000"/>
  <!-- Half circle with dot -->
  <path d="M 600 560 A 55 55 0 1 1 710 560" stroke="#A89F91" stroke-width="12" fill="none"/>
  <circle cx="655" cy="505" r="14" fill="#F4D35E"/>
  <!-- Row 4: Bottom compositions -->
  <!-- Overlapping circles -->
  <circle cx="100" cy="700" r="45" fill="#A8DADC" opacity="0.7"/>
  <circle cx="145" cy="700" r="45" fill="#E63946" opacity="0.5"/>
  <!-- Vertical bars rhythm -->
  <rect x="260" y="640" width="10" height="80" fill="#000"/>
  <rect x="285" y="660" width="10" height="60" fill="#1D3557"/>
  <rect x="310" y="650" width="10" height="70" fill="#E63946"/>
  <rect x="335" y="640" width="10" height="80" fill="#F4D35E"/>
  <rect x="360" y="670" width="10" height="50" fill="#2A9D8F"/>
  <!-- Large angular form -->
  <polygon points="460,760 530,640 540,640 470,760" fill="#000"/>
  <polygon points="530,640 600,760 590,760 530,660" fill="#E63946"/>
  <line x1="470" y1="720" x2="590" y2="720" stroke="#F4D35E" stroke-width="6"/>
  <!-- Final arc composition -->
  <path d="M 640 760 A 80 80 0 0 1 640 620" stroke="#1D3557" stroke-width="14" fill="none"/>
  <path d="M 680 740 A 40 40 0 0 1 680 660" stroke="#2A9D8F" stroke-width="8" fill="none"/>
  <circle cx="700" cy="700" r="8" fill="#E63946"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="40" fill="#000"/>
  <rect x="20" y="15" width="60" height="10" fill="#E63946"/>
  <rect x="100" y="15" width="40" height="10" fill="#F4D35E"/>
  <rect x="160" y="15" width="80" height="10" fill="#1D3557"/>
</svg>