<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Large black rectangle, tilted -->
  <rect x="250" y="150" width="280" height="180" fill="#000000" transform="rotate(-15,390,240)"/>

  <!-- Red square, floating upper right -->
  <rect x="520" y="80" width="140" height="140" fill="#E63946" transform="rotate(25,590,150)"/>

  <!-- Blue parallelogram -->
  <polygon points="100,350 250,320 280,450 130,480" fill="#1D3557"/>

  <!-- Yellow rectangle, angled -->
  <rect x="450" y="380" width="220" height="90" fill="#F4D35E" transform="rotate(-8,560,425)"/>

  <!-- Small black square -->
  <rect x="180" y="180" width="60" height="60" fill="#000000" transform="rotate(45,210,210)"/>

  <!-- Teal triangle floating -->
  <polygon points="620,280 700,400 540,400" fill="#2A9D8F" transform="rotate(12,620,340)"/>

  <!-- Orange rectangle, vertical -->
  <rect x="90" y="520" width="70" height="200" fill="#E76F51" transform="rotate(-20,125,620)"/>

  <!-- Large cross shape in black -->
  <rect x="370" y="550" width="120" height="30" fill="#000000" transform="rotate(35,430,565)"/>
  <rect x="415" y="505" width="30" height="120" fill="#000000" transform="rotate(35,430,565)"/>

  <!-- Small red circle -->
  <circle cx="680" cy="550" r="35" fill="#E63946"/>

  <!-- Blue bar, diagonal -->
  <rect x="300" y="600" width="200" height="25" fill="#1D3557" transform="rotate(-30,400,612)"/>

  <!-- Thin black line, diagonal -->
  <line x1="50" y1="100" x2="350" y2="50" stroke="#000000" stroke-width="3"/>
  <line x1="600" y1="650" x2="750" y2="750" stroke="#000000" stroke-width="3"/>

  <!-- Small yellow square -->
  <rect x="650" y="150" width="45" height="45" fill="#F4D35E" transform="rotate(-40,672,172)"/>

  <!-- Tiny black rectangles scattered -->
  <rect x="500" y="520" width="40" height="15" fill="#000000" transform="rotate(60,520,527)"/>
  <rect x="150" y="650" width="50" height="12" fill="#000000" transform="rotate(-45,175,656)"/>
  <rect x="700" y="400" width="35" height="10" fill="#000000" transform="rotate(20,717,405)"/>

  <!-- Large blue triangle -->
  <polygon points="50,700 200,500 200,700" fill="#1D3557" opacity="0.85" transform="rotate(10,140,620)"/>

  <!-- Cream/beige rectangle -->
  <rect x="320" y="460" width="100" height="60" fill="#FEFAE0" stroke="#000000" stroke-width="2" transform="rotate(-12,370,490)"/>

  <!-- Red thin bar -->
  <rect x="80" y="250" width="150" height="8" fill="#E63946" transform="rotate(15,155,254)"/>

  <!-- Floating teal small square -->
  <rect x="430" y="300" width="35" height="35" fill="#2A9D8F" transform="rotate(50,447,317)"/>

  <!-- Orange triangle -->
  <polygon points="300,720 380,680 340,770" fill="#E76F51" transform="rotate(-5,340,723)"/>

  <!-- Black circle, small -->
  <circle cx="550" cy="650" r="20" fill="#000000"/>

  <!-- Yellow line accent -->
  <line x1="650" y1="50" x2="750" y2="120" stroke="#F4D35E" stroke-width="5"/>

  <!-- Subtle shadow rectangles -->
  <rect x="260" y="160" width="280" height="180" fill="none" stroke="#000000" stroke-width="1" opacity="0.2" transform="rotate(-15,400,250) translate(5,5)"/>
</svg>