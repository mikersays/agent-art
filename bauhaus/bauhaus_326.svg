<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Forest ground plane -->
  <rect x="0" y="580" width="800" height="220" fill="#264653"/>
  <!-- Warm gray horizon line -->
  <rect x="0" y="570" width="800" height="4" fill="#A89F91"/>
  <!-- Subtle structural grid lines -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <!-- Left pillar -->
  <rect x="140" y="320" width="60" height="250" fill="#000000"/>
  <!-- Right pillar -->
  <rect x="600" y="320" width="60" height="250" fill="#000000"/>
  <!-- Pillar caps -->
  <rect x="130" y="310" width="80" height="20" fill="#000000"/>
  <rect x="590" y="310" width="80" height="20" fill="#000000"/>
  <!-- Arch made of small red rectangles arranged in arc pattern -->
  <rect x="180" y="340" width="20" height="12" fill="#E63946" transform="rotate(-60,190,346)"/>
  <rect x="210" y="315" width="20" height="12" fill="#E63946" transform="rotate(-50,220,321)"/>
  <rect x="245" y="295" width="20" height="12" fill="#E63946" transform="rotate(-40,255,301)"/>
  <rect x="285" y="280" width="20" height="12" fill="#E63946" transform="rotate(-30,295,286)"/>
  <rect x="325" y="270" width="20" height="12" fill="#E63946" transform="rotate(-20,335,276)"/>
  <rect x="370" y="265" width="20" height="12" fill="#E63946" transform="rotate(-8,380,271)"/>
  <rect x="410" y="264" width="20" height="12" fill="#E63946" transform="rotate(5,420,270)"/>
  <rect x="450" y="268" width="20" height="12" fill="#E63946" transform="rotate(15,460,274)"/>
  <rect x="490" y="278" width="20" height="12" fill="#E63946" transform="rotate(25,500,284)"/>
  <rect x="525" y="292" width="20" height="12" fill="#E63946" transform="rotate(38,535,298)"/>
  <rect x="555" y="312" width="20" height="12" fill="#E63946" transform="rotate(50,565,318)"/>
  <rect x="580" y="335" width="20" height="12" fill="#E63946" transform="rotate(60,590,341)"/>
  <!-- Blue and teal circles below the bridge -->
  <circle cx="220" cy="450" r="25" fill="#1D3557" opacity="0.7"/>
  <circle cx="320" cy="480" r="18" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="400" cy="440" r="30" fill="#1D3557" opacity="0.5"/>
  <circle cx="500" cy="470" r="22" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="580" cy="500" r="15" fill="#1D3557" opacity="0.8"/>
  <circle cx="260" cy="510" r="12" fill="#2A9D8F" opacity="0.9"/>
  <circle cx="450" cy="520" r="20" fill="#457B9D" opacity="0.5"/>
  <circle cx="350" cy="540" r="14" fill="#1D3557" opacity="0.6"/>
  <!-- Yellow triangles above -->
  <polygon points="250,120 270,80 290,120" fill="#F4D35E" opacity="0.85"/>
  <polygon points="420,150 445,100 470,150" fill="#F4D35E" opacity="0.7"/>
  <polygon points="560,90 580,50 600,90" fill="#F4D35E" opacity="0.9"/>
  <polygon points="150,180 165,145 180,180" fill="#F4D35E" opacity="0.6"/>
  <polygon points="680,170 700,130 720,170" fill="#F4D35E" opacity="0.75"/>
  <!-- Orange squares above -->
  <rect x="310" y="100" width="25" height="25" fill="#E76F51" opacity="0.8"/>
  <rect x="500" y="140" width="20" height="20" fill="#E76F51" opacity="0.7"/>
  <rect x="180" y="70" width="18" height="18" fill="#E76F51" opacity="0.9"/>
  <rect x="630" y="110" width="22" height="22" fill="#E76F51" opacity="0.65"/>
  <!-- Thin structural lines on bridge -->
  <line x1="170" y1="330" x2="630" y2="330" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="170" y1="400" x2="630" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <!-- Corner accents -->
  <rect x="10" y="10" width="12" height="12" fill="#A89F91" opacity="0.4"/>
  <rect x="778" y="10" width="12" height="12" fill="#A89F91" opacity="0.4"/>
  <circle cx="30" cy="770" r="6" fill="#DDA15E" opacity="0.5"/>
</svg>