<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#A89F91"/>

  <!-- Glass dome (large circle) -->
  <circle cx="400" cy="380" r="300" fill="#FFF" opacity="0.15" stroke="#000" stroke-width="4"/>
  <circle cx="400" cy="380" r="295" fill="none" stroke="#FFF" stroke-width="1" opacity="0.4"/>

  <!-- Glass reflection arcs -->
  <path d="M200 250 Q250 180 350 160" fill="none" stroke="#FFF" stroke-width="3" opacity="0.5"/>
  <path d="M210 270 Q260 200 340 185" fill="none" stroke="#FFF" stroke-width="2" opacity="0.3"/>

  <!-- Substrate layers at bottom of dome -->
  <!-- Gravel layer -->
  <path d="M150 580 Q250 560 400 570 Q550 580 650 560 L650 620 Q550 640 400 630 Q250 620 150 640 Z" fill="#A89F91" stroke="#000" stroke-width="1"/>
  <!-- Charcoal layer -->
  <path d="M160 610 Q300 600 400 605 Q500 610 640 600 L645 630 Q500 640 400 635 Q300 630 155 640 Z" fill="#000" opacity="0.7"/>
  <!-- Soil layer -->
  <path d="M155 635 Q300 625 400 630 Q500 635 645 625 L648 670 Q500 680 400 675 Q300 670 152 680 Z" fill="#E76F51" opacity="0.6"/>
  <!-- Top soil / moss layer -->
  <path d="M170 555 Q300 540 400 548 Q500 555 630 540 L635 575 Q500 585 400 578 Q300 570 165 585 Z" fill="#2A9D8F" opacity="0.7"/>

  <!-- Geometric plant 1 - tall triangle cactus -->
  <polygon points="350,300 365,545 335,545" fill="#2A9D8F" stroke="#1D3557" stroke-width="2"/>
  <line x1="350" y1="380" x2="320" y2="420" stroke="#2A9D8F" stroke-width="6"/>
  <line x1="320" y1="420" x2="320" y2="390" stroke="#2A9D8F" stroke-width="6"/>
  <line x1="350" y1="430" x2="380" y2="460" stroke="#2A9D8F" stroke-width="6"/>
  <line x1="380" y1="460" x2="380" y2="430" stroke="#2A9D8F" stroke-width="6"/>

  <!-- Geometric plant 2 - circle succulent rosette -->
  <circle cx="480" cy="510" r="30" fill="#2A9D8F" stroke="#1D3557" stroke-width="2"/>
  <circle cx="480" cy="510" r="18" fill="#F4D35E" opacity="0.6"/>
  <circle cx="480" cy="510" r="8" fill="#E76F51"/>
  <!-- Succulent leaves -->
  <ellipse cx="480" cy="480" rx="12" ry="8" fill="#2A9D8F" stroke="#1D3557" stroke-width="1"/>
  <ellipse cx="505" cy="500" rx="8" ry="12" fill="#2A9D8F" stroke="#1D3557" stroke-width="1"/>
  <ellipse cx="455" cy="500" rx="8" ry="12" fill="#2A9D8F" stroke="#1D3557" stroke-width="1"/>
  <ellipse cx="480" cy="540" rx="12" ry="8" fill="#2A9D8F" stroke="#1D3557" stroke-width="1"/>

  <!-- Geometric plant 3 - diamond leaf plant -->
  <line x1="270" y1="545" x2="270" y2="420" stroke="#1D3557" stroke-width="3"/>
  <polygon points="270,420 250,460 270,480 290,460" fill="#2A9D8F" stroke="#1D3557" stroke-width="1"/>
  <polygon points="270,450 255,480 270,500 285,480" fill="#2A9D8F" stroke="#1D3557" stroke-width="1" opacity="0.7"/>

  <!-- Geometric plant 4 - triangle fern -->
  <line x1="540" y1="545" x2="540" y2="380" stroke="#1D3557" stroke-width="2"/>
  <polygon points="540,380 520,430 560,430" fill="#2A9D8F" stroke="#1D3557" stroke-width="1"/>
  <polygon points="540,410 515,460 565,460" fill="#2A9D8F" stroke="#1D3557" stroke-width="1" opacity="0.8"/>
  <polygon points="540,440 510,500 570,500" fill="#2A9D8F" stroke="#1D3557" stroke-width="1" opacity="0.6"/>

  <!-- Small rocks on substrate -->
  <ellipse cx="220" cy="555" rx="10" ry="7" fill="#A89F91" stroke="#000" stroke-width="1"/>
  <ellipse cx="580" cy="550" rx="8" ry="5" fill="#A89F91" stroke="#000" stroke-width="1"/>
  <circle cx="430" cy="555" r="5" fill="#000" opacity="0.3"/>

  <!-- Geometric flower on plant 1 -->
  <circle cx="350" cy="295" r="10" fill="#E63946"/>
  <circle cx="350" cy="295" r="5" fill="#F4D35E"/>

  <!-- Mushroom -->
  <rect x="195" y="520" width="8" height="25" fill="#FFF"/>
  <ellipse cx="199" cy="520" rx="15" ry="10" fill="#E63946"/>
  <circle cx="194" cy="516" r="2" fill="#FFF"/>
  <circle cx="204" cy="518" r="2" fill="#FFF"/>

  <!-- Base platform -->
  <ellipse cx="400" cy="685" rx="260" ry="20" fill="#000" stroke="#A89F91" stroke-width="2"/>
  <rect x="140" y="670" width="520" height="15" fill="#1D3557" stroke="#000" stroke-width="2"/>

  <!-- Dome knob at top -->
  <circle cx="400" cy="80" r="12" fill="#000" stroke="#A89F91" stroke-width="2"/>
  <circle cx="400" cy="80" r="5" fill="#F4D35E"/>
</svg>