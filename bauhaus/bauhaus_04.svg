<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Outermost square -->
  <rect x="40" y="40" width="720" height="720" fill="#000000"/>

  <!-- Second square inset -->
  <rect x="80" y="80" width="640" height="640" fill="#E63946"/>

  <!-- Third square inset -->
  <rect x="130" y="130" width="540" height="540" fill="#FFFFFF"/>

  <!-- Fourth square inset -->
  <rect x="175" y="175" width="450" height="450" fill="#1D3557"/>

  <!-- Fifth square inset -->
  <rect x="225" y="225" width="350" height="350" fill="#F4D35E"/>

  <!-- Innermost square -->
  <rect x="280" y="280" width="240" height="240" fill="#000000"/>

  <!-- Concentric circles overlaid -->
  <circle cx="400" cy="400" r="340" fill="none" stroke="#F4D35E" stroke-width="4"/>
  <circle cx="400" cy="400" r="290" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="400" cy="400" r="240" fill="none" stroke="#E63946" stroke-width="4"/>
  <circle cx="400" cy="400" r="190" fill="none" stroke="#000000" stroke-width="3"/>
  <circle cx="400" cy="400" r="140" fill="none" stroke="#1D3557" stroke-width="4"/>

  <!-- Filled concentric circles in center -->
  <circle cx="400" cy="400" r="100" fill="#E63946"/>
  <circle cx="400" cy="400" r="75" fill="#FFFFFF"/>
  <circle cx="400" cy="400" r="55" fill="#1D3557"/>
  <circle cx="400" cy="400" r="35" fill="#F4D35E"/>
  <circle cx="400" cy="400" r="18" fill="#000000"/>
  <circle cx="400" cy="400" r="8" fill="#FFFFFF"/>

  <!-- Corner accent squares -->
  <rect x="40" y="40" width="50" height="50" fill="#F4D35E"/>
  <rect x="710" y="40" width="50" height="50" fill="#F4D35E"/>
  <rect x="40" y="710" width="50" height="50" fill="#F4D35E"/>
  <rect x="710" y="710" width="50" height="50" fill="#F4D35E"/>

  <!-- Corner accent circles -->
  <circle cx="65" cy="65" r="15" fill="#000000"/>
  <circle cx="735" cy="65" r="15" fill="#000000"/>
  <circle cx="65" cy="735" r="15" fill="#000000"/>
  <circle cx="735" cy="735" r="15" fill="#000000"/>

  <!-- Cross lines through center -->
  <line x1="400" y1="40" x2="400" y2="760" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <line x1="40" y1="400" x2="760" y2="400" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
</svg>