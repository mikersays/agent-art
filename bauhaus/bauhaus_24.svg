<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Spectrum Analysis - Bauhaus Style</title>
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Background grid lines -->
  <line x1="60" y1="700" x2="760" y2="700" stroke="#000000" stroke-width="2"/>
  <line x1="60" y1="700" x2="60" y2="60" stroke="#000000" stroke-width="2"/>

  <!-- Horizontal grid lines -->
  <line x1="60" y1="600" x2="760" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="60" y1="500" x2="760" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="60" y1="400" x2="760" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="60" y1="300" x2="760" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="60" y1="200" x2="760" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="60" y1="100" x2="760" y2="100" stroke="#000000" stroke-width="0.5" opacity="0.15"/>

  <!-- Spectrum bars - varying heights and widths -->
  <!-- Group 1: Low frequencies -->
  <rect x="70" y="200" width="28" height="500" fill="#1D3557"/>
  <rect x="102" y="280" width="28" height="420" fill="#264653"/>
  <rect x="134" y="150" width="22" height="550" fill="#1D3557"/>
  <rect x="160" y="320" width="18" height="380" fill="#264653"/>

  <!-- Group 2: Low-mid frequencies -->
  <rect x="186" y="100" width="24" height="600" fill="#6D2E46"/>
  <rect x="214" y="180" width="30" height="520" fill="#E63946"/>
  <rect x="248" y="250" width="20" height="450" fill="#6D2E46"/>
  <rect x="272" y="120" width="26" height="580" fill="#E63946"/>
  <rect x="302" y="300" width="16" height="400" fill="#6D2E46" opacity="0.7"/>

  <!-- Group 3: Mid frequencies - tallest section -->
  <rect x="324" y="80" width="32" height="620" fill="#F4D35E"/>
  <rect x="360" y="140" width="28" height="560" fill="#DDA15E"/>
  <rect x="392" y="70" width="36" height="630" fill="#F4D35E"/>
  <rect x="432" y="110" width="24" height="590" fill="#DDA15E"/>
  <rect x="460" y="160" width="20" height="540" fill="#F4D35E"/>

  <!-- Group 4: High-mid frequencies -->
  <rect x="486" y="220" width="26" height="480" fill="#E63946"/>
  <rect x="516" y="340" width="22" height="360" fill="#6D2E46"/>
  <rect x="542" y="180" width="30" height="520" fill="#E63946"/>
  <rect x="576" y="300" width="18" height="400" fill="#6D2E46" opacity="0.8"/>

  <!-- Group 5: High frequencies -->
  <rect x="600" y="380" width="20" height="320" fill="#1D3557"/>
  <rect x="624" y="450" width="16" height="250" fill="#264653"/>
  <rect x="644" y="350" width="24" height="350" fill="#1D3557"/>
  <rect x="672" y="480" width="14" height="220" fill="#264653"/>
  <rect x="690" y="520" width="18" height="180" fill="#1D3557"/>
  <rect x="712" y="560" width="12" height="140" fill="#264653"/>
  <rect x="728" y="600" width="10" height="100" fill="#1D3557"/>
  <rect x="742" y="630" width="10" height="70" fill="#264653" opacity="0.6"/>

  <!-- Peak markers - triangles on top of tallest bars -->
  <polygon points="382,65 400,45 418,65" fill="#E63946"/>
  <polygon points="314,75 330,55 346,75" fill="#E63946"/>
  <polygon points="262,115 275,95 288,115" fill="#000000"/>
  <polygon points="176,95 198,75 210,95" fill="#000000"/>
  <polygon points="124,145 145,125 156,145" fill="#000000"/>

  <!-- Decorative circles at certain bar tops -->
  <circle cx="84" cy="195" r="6" fill="#F4D35E"/>
  <circle cx="227" cy="175" r="6" fill="#F4D35E"/>
  <circle cx="410" cy="65" r="8" fill="#E63946"/>
  <circle cx="557" cy="175" r="6" fill="#F4D35E"/>
  <circle cx="656" cy="345" r="5" fill="#F4D35E"/>

  <!-- Black accent bars overlaid at half-opacity for depth -->
  <rect x="100" y="600" width="28" height="100" fill="#000000" opacity="0.2"/>
  <rect x="248" y="580" width="20" height="120" fill="#000000" opacity="0.2"/>
  <rect x="392" y="550" width="36" height="150" fill="#000000" opacity="0.15"/>
  <rect x="542" y="600" width="30" height="100" fill="#000000" opacity="0.2"/>
  <rect x="644" y="620" width="24" height="80" fill="#000000" opacity="0.2"/>

  <!-- Title band at top -->
  <rect x="0" y="0" width="800" height="40" fill="#000000"/>
  <rect x="0" y="0" width="200" height="40" fill="#1D3557"/>
  <rect x="200" y="0" width="160" height="40" fill="#E63946"/>
  <rect x="360" y="0" width="160" height="40" fill="#F4D35E"/>
  <rect x="520" y="0" width="120" height="40" fill="#E63946"/>
  <rect x="640" y="0" width="160" height="40" fill="#1D3557"/>

  <!-- Bottom frequency label band -->
  <rect x="0" y="760" width="800" height="40" fill="#000000"/>
  <rect x="70" y="765" width="100" height="6" fill="#1D3557"/>
  <rect x="185" y="765" width="130" height="6" fill="#E63946"/>
  <rect x="324" y="765" width="160" height="6" fill="#F4D35E"/>
  <rect x="486" y="765" width="108" height="6" fill="#E63946"/>
  <rect x="600" y="765" width="155" height="6" fill="#1D3557"/>

  <!-- Amplitude scale ticks on left axis -->
  <line x1="50" y1="600" x2="60" y2="600" stroke="#000000" stroke-width="1.5"/>
  <line x1="50" y1="500" x2="60" y2="500" stroke="#000000" stroke-width="1.5"/>
  <line x1="50" y1="400" x2="60" y2="400" stroke="#000000" stroke-width="1.5"/>
  <line x1="50" y1="300" x2="60" y2="300" stroke="#000000" stroke-width="1.5"/>
  <line x1="50" y1="200" x2="60" y2="200" stroke="#000000" stroke-width="1.5"/>
  <line x1="50" y1="100" x2="60" y2="100" stroke="#000000" stroke-width="1.5"/>

  <!-- Small geometric accents -->
  <rect x="30" y="595" width="8" height="10" fill="#DDA15E"/>
  <rect x="30" y="495" width="8" height="10" fill="#DDA15E"/>
  <rect x="30" y="395" width="8" height="10" fill="#F4D35E"/>
  <rect x="30" y="295" width="8" height="10" fill="#F4D35E"/>
  <rect x="30" y="195" width="8" height="10" fill="#E63946"/>
  <rect x="30" y="95" width="8" height="10" fill="#E63946"/>

  <!-- Envelope curve connecting peaks -->
  <path d="M 84,200 Q 116,280 145,150 Q 198,100 229,180 Q 285,120 340,80 Q 410,70 444,110 Q 470,160 499,220 Q 557,180 610,380 Q 656,350 699,520 Q 738,600 752,630" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
</svg>