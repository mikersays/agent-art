<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <!-- Diagonal guide lines connecting steps -->
  <line x1="50" y1="50" x2="750" y2="750" stroke="#000000" stroke-width="1" opacity="0.08"/>
  <line x1="100" y1="50" x2="800" y2="750" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="50" y1="100" x2="750" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <!-- Step 1 - top left -->
  <rect x="30" y="40" width="140" height="70" fill="#E63946" opacity="0.9"/>
  <circle cx="30" cy="40" r="6" fill="#000000" opacity="0.7"/>
  <circle cx="170" cy="110" r="6" fill="#1D3557" opacity="0.7"/>
  <!-- Step 2 -->
  <rect x="120" y="140" width="130" height="65" fill="#1D3557" opacity="0.85"/>
  <circle cx="120" cy="140" r="5" fill="#F4D35E" opacity="0.8"/>
  <circle cx="250" cy="205" r="5" fill="#E63946" opacity="0.8"/>
  <line x1="170" y1="110" x2="120" y2="140" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Step 3 -->
  <rect x="210" y="230" width="150" height="75" fill="#F4D35E" opacity="0.9"/>
  <circle cx="210" cy="230" r="7" fill="#000000" opacity="0.6"/>
  <circle cx="360" cy="305" r="7" fill="#2A9D8F" opacity="0.7"/>
  <line x1="250" y1="205" x2="210" y2="230" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Step 4 -->
  <rect x="300" y="330" width="135" height="68" fill="#E63946" opacity="0.85"/>
  <circle cx="300" cy="330" r="5" fill="#1D3557" opacity="0.7"/>
  <circle cx="435" cy="398" r="5" fill="#F4D35E" opacity="0.8"/>
  <line x1="360" y1="305" x2="300" y2="330" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Step 5 -->
  <rect x="390" y="420" width="145" height="72" fill="#1D3557" opacity="0.9"/>
  <circle cx="390" cy="420" r="6" fill="#E63946" opacity="0.7"/>
  <circle cx="535" cy="492" r="6" fill="#000000" opacity="0.6"/>
  <line x1="435" y1="398" x2="390" y2="420" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Step 6 -->
  <rect x="480" y="520" width="140" height="70" fill="#F4D35E" opacity="0.85"/>
  <circle cx="480" cy="520" r="7" fill="#1D3557" opacity="0.7"/>
  <circle cx="620" cy="590" r="7" fill="#E63946" opacity="0.7"/>
  <line x1="535" y1="492" x2="480" y2="520" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Step 7 -->
  <rect x="570" y="615" width="155" height="78" fill="#E63946" opacity="0.9"/>
  <circle cx="570" cy="615" r="5" fill="#F4D35E" opacity="0.8"/>
  <circle cx="725" cy="693" r="5" fill="#1D3557" opacity="0.7"/>
  <line x1="620" y1="590" x2="570" y2="615" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Forest green corner accents - top right -->
  <rect x="700" y="30" width="50" height="50" fill="#264653" opacity="0.7"/>
  <rect x="720" y="50" width="25" height="25" fill="#2A9D8F" opacity="0.6"/>
  <!-- Forest green corner accents - bottom left -->
  <rect x="30" y="720" width="55" height="55" fill="#264653" opacity="0.7"/>
  <rect x="45" y="735" width="28" height="28" fill="#2A9D8F" opacity="0.6"/>
  <!-- Teal accent shapes -->
  <circle cx="680" y="150" r="18" fill="#2A9D8F" opacity="0.4"/>
  <circle cx="100" cy="680" r="15" fill="#2A9D8F" opacity="0.35"/>
  <!-- Additional diagonal connecting lines -->
  <line x1="100" y1="75" x2="700" y2="655" stroke="#E63946" stroke-width="0.8" opacity="0.15"/>
  <line x1="80" y1="110" x2="680" y2="690" stroke="#1D3557" stroke-width="0.8" opacity="0.15"/>
  <!-- Small accent rectangles along the cascade -->
  <rect x="175" y="170" width="15" height="15" fill="#E76F51" opacity="0.5"/>
  <rect x="365" y="360" width="12" height="12" fill="#DDA15E" opacity="0.5"/>
  <rect x="540" y="550" width="14" height="14" fill="#E76F51" opacity="0.5"/>
</svg>