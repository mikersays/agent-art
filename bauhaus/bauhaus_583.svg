<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Deep background -->
  <rect x="0" y="0" width="800" height="800" fill="#264653"/>

  <!-- Outermost concentric circles - Light Blue -->
  <circle cx="420" cy="420" r="350" fill="none" stroke="#A8DADC" stroke-width="2" opacity="0.7"/>
  <circle cx="415" cy="415" r="320" fill="none" stroke="#A8DADC" stroke-width="1.5" opacity="0.6"/>
  <circle cx="410" cy="410" r="290" fill="none" stroke="#A8DADC" stroke-width="1.5" opacity="0.55"/>

  <!-- Mid-outer circles - Steel Blue -->
  <circle cx="405" cy="405" r="260" fill="none" stroke="#457B9D" stroke-width="2" opacity="0.65"/>
  <circle cx="400" cy="400" r="230" fill="none" stroke="#457B9D" stroke-width="1.5" opacity="0.6"/>
  <circle cx="395" cy="398" r="200" fill="none" stroke="#457B9D" stroke-width="1.5" opacity="0.55"/>

  <!-- Mid circles - Teal -->
  <circle cx="390" cy="395" r="170" fill="none" stroke="#2A9D8F" stroke-width="2" opacity="0.7"/>
  <circle cx="385" cy="390" r="145" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.6"/>

  <!-- Inner-mid circles - Blue -->
  <circle cx="380" cy="385" r="120" fill="none" stroke="#1D3557" stroke-width="2.5" opacity="0.75"/>
  <circle cx="375" cy="380" r="95" fill="none" stroke="#1D3557" stroke-width="2" opacity="0.7"/>
  <circle cx="370" cy="375" r="70" fill="none" stroke="#1D3557" stroke-width="2" opacity="0.65"/>

  <!-- Innermost circles - Forest -->
  <circle cx="365" cy="370" r="50" fill="#264653" stroke="#1D3557" stroke-width="3" opacity="0.9"/>
  <circle cx="360" cy="365" r="30" fill="#1D3557" stroke="#000000" stroke-width="2" opacity="0.8"/>
  <circle cx="358" cy="362" r="12" fill="#000000" opacity="0.9"/>

  <!-- Filled accent rings for depth -->
  <circle cx="408" cy="408" r="275" fill="#457B9D" opacity="0.06"/>
  <circle cx="395" cy="398" r="185" fill="#2A9D8F" opacity="0.08"/>
  <circle cx="378" cy="382" r="108" fill="#1D3557" opacity="0.1"/>

  <!-- Spiral path lines -->
  <path d="M 420 70 A 350 350 0 0 1 770 420" fill="none" stroke="#A8DADC" stroke-width="1" opacity="0.35"/>
  <path d="M 770 420 A 340 340 0 0 1 410 760" fill="none" stroke="#457B9D" stroke-width="1" opacity="0.35"/>
  <path d="M 410 760 A 330 330 0 0 1 80 400" fill="none" stroke="#2A9D8F" stroke-width="1" opacity="0.35"/>
  <path d="M 80 400 A 280 280 0 0 1 390 120" fill="none" stroke="#1D3557" stroke-width="1" opacity="0.4"/>

  <!-- Objects caught in the current -->
  <!-- Small triangles spinning -->
  <polygon points="580,200 595,230 565,230" fill="#E63946" opacity="0.7" transform="rotate(25 580 215)"/>
  <polygon points="650,450 660,475 640,475" fill="#F4D35E" opacity="0.6" transform="rotate(60 650 462)"/>
  <polygon points="250,600 265,625 235,625" fill="#E76F51" opacity="0.65" transform="rotate(-15 250 612)"/>

  <!-- Small rectangles drifting -->
  <rect x="180" y="220" width="18" height="10" fill="#E63946" opacity="0.55" transform="rotate(40 189 225)"/>
  <rect x="520" y="620" width="15" height="9" fill="#F4D35E" opacity="0.5" transform="rotate(-30 527 624)"/>
  <rect x="620" y="320" width="16" height="10" fill="#E9C46A" opacity="0.5" transform="rotate(70 628 325)"/>

  <!-- Small circles caught in flow -->
  <circle cx="300" cy="160" r="8" fill="#E63946" opacity="0.6"/>
  <circle cx="550" cy="560" r="6" fill="#F4D35E" opacity="0.55"/>
  <circle cx="200" cy="430" r="7" fill="#E76F51" opacity="0.5"/>
  <circle cx="480" cy="680" r="5" fill="#DDA15E" opacity="0.5"/>
  <circle cx="670" cy="380" r="5" fill="#A8DADC" opacity="0.6"/>
  <circle cx="160" cy="340" r="4" fill="#E9C46A" opacity="0.45"/>

  <!-- Tiny dots suggesting debris -->
  <circle cx="350" cy="130" r="2.5" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="600" cy="250" r="2" fill="#FFFFFF" opacity="0.25"/>
  <circle cx="680" cy="500" r="2.5" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="500" cy="700" r="2" fill="#FFFFFF" opacity="0.25"/>
  <circle cx="140" cy="500" r="2" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="280" cy="680" r="2.5" fill="#FFFFFF" opacity="0.2"/>
</svg>