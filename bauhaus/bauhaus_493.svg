<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#264653"/>
  <!-- Thin black lines connecting totem to edges -->
  <line x1="280" y1="100" x2="0" y2="50" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <line x1="280" y1="300" x2="0" y2="400" stroke="#000000" stroke-width="1" opacity="0.35"/>
  <line x1="320" y1="200" x2="800" y2="100" stroke="#000000" stroke-width="1" opacity="0.35"/>
  <line x1="320" y1="500" x2="800" y2="600" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <line x1="300" y1="700" x2="0" y2="800" stroke="#000000" stroke-width="1" opacity="0.35"/>
  <line x1="300" y1="700" x2="800" y2="750" stroke="#000000" stroke-width="1" opacity="0.35"/>
  <line x1="280" y1="400" x2="800" y2="350" stroke="#000000" stroke-width="0.8" opacity="0.3"/>
  <!-- Burgundy ground shapes -->
  <rect x="0" y="720" width="800" height="80" fill="#6D2E46" opacity="0.6"/>
  <rect x="150" y="700" width="300" height="30" fill="#6D2E46" opacity="0.7"/>
  <polygon points="100,720 200,720 150,690" fill="#6D2E46" opacity="0.5"/>
  <polygon points="380,720 440,720 410,695" fill="#6D2E46" opacity="0.5"/>
  <!-- Central totem structure - stacked shapes, slightly left of center -->
  <!-- Base: large rectangle -->
  <rect x="230" y="660" width="140" height="60" fill="#E63946"/>
  <!-- Circle on base -->
  <circle cx="300" cy="620" r="45" fill="#1D3557"/>
  <!-- Rectangle tier -->
  <rect x="255" y="540" width="90" height="40" fill="#F4D35E"/>
  <!-- Triangle tier -->
  <polygon points="300,460 340,530 260,530" fill="#2A9D8F"/>
  <!-- Small circle -->
  <circle cx="300" cy="430" r="30" fill="#E76F51"/>
  <!-- Tall thin rectangle -->
  <rect x="280" y="340" width="40" height="80" fill="#457B9D"/>
  <!-- Triangle pointing up -->
  <polygon points="300,270 335,340 265,340" fill="#E63946" opacity="0.9"/>
  <!-- Small square -->
  <rect x="280" y="230" width="40" height="40" fill="#F4D35E" opacity="0.9"/>
  <!-- Tiny circle on top -->
  <circle cx="300" cy="205" r="22" fill="#1D3557" opacity="0.9"/>
  <!-- Top cap triangle -->
  <polygon points="300,155 320,185 280,185" fill="#FFFFFF" opacity="0.8"/>
  <!-- Crown circle -->
  <circle cx="300" cy="140" r="14" fill="#E63946"/>
  <!-- Decorative flanking shapes - left side -->
  <rect x="100" y="300" width="20" height="20" fill="#E76F51" opacity="0.7"/>
  <rect x="120" y="450" width="18" height="18" fill="#E76F51" opacity="0.6"/>
  <rect x="80" y="580" width="22" height="22" fill="#E76F51" opacity="0.65"/>
  <circle cx="140" cy="200" r="12" fill="#FEFAE0" opacity="0.6"/>
  <circle cx="110" cy="520" r="10" fill="#FEFAE0" opacity="0.55"/>
  <circle cx="160" cy="650" r="14" fill="#FEFAE0" opacity="0.5"/>
  <polygon points="130,370 145,350 160,370" fill="#457B9D" opacity="0.7"/>
  <polygon points="90,250 105,230 120,250" fill="#457B9D" opacity="0.6"/>
  <!-- Decorative flanking shapes - right side -->
  <rect x="480" y="280" width="20" height="20" fill="#E76F51" opacity="0.7"/>
  <rect x="500" y="430" width="18" height="18" fill="#E76F51" opacity="0.6"/>
  <rect x="460" y="600" width="22" height="22" fill="#E76F51" opacity="0.65"/>
  <circle cx="520" cy="180" r="12" fill="#FEFAE0" opacity="0.6"/>
  <circle cx="490" cy="540" r="10" fill="#FEFAE0" opacity="0.55"/>
  <circle cx="540" cy="350" r="14" fill="#FEFAE0" opacity="0.5"/>
  <polygon points="470,480 485,460 500,480" fill="#457B9D" opacity="0.7"/>
  <polygon points="510,250 525,230 540,250" fill="#457B9D" opacity="0.6"/>
  <!-- Far right scattered accents -->
  <circle cx="650" cy="300" r="8" fill="#F4D35E" opacity="0.4"/>
  <circle cx="700" cy="500" r="6" fill="#E63946" opacity="0.35"/>
  <rect x="670" y="200" width="12" height="12" fill="#2A9D8F" opacity="0.4"/>
  <rect x="620" y="650" width="15" height="15" fill="#FEFAE0" opacity="0.3"/>
  <!-- Small black accents -->
  <circle cx="300" cy="100" r="5" fill="#000000" opacity="0.6"/>
  <rect x="295" y="750" width="10" height="10" fill="#000000" opacity="0.5"/>
</svg>