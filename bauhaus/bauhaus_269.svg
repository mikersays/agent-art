<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle grid -->
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>

  <!-- Large arcs - outermost layer (from bottom-left origin point 100,700) -->
  <!-- Red quarter-circle arc, largest -->
  <path d="M 100 700 A 550 550 0 0 1 650 150" fill="none" stroke="#E63946" stroke-width="18" opacity="0.35"/>

  <!-- Blue arc -->
  <path d="M 100 700 A 450 450 0 0 1 550 250" fill="none" stroke="#1D3557" stroke-width="16" opacity="0.4"/>

  <!-- Yellow arc -->
  <path d="M 100 700 A 350 350 0 0 1 450 350" fill="none" stroke="#F4D35E" stroke-width="14" opacity="0.5"/>

  <!-- Teal arc -->
  <path d="M 100 700 A 250 250 0 0 1 350 450" fill="none" stroke="#2A9D8F" stroke-width="12" opacity="0.55"/>

  <!-- Red inner arc -->
  <path d="M 100 700 A 150 150 0 0 1 250 550" fill="none" stroke="#E63946" stroke-width="10" opacity="0.6"/>

  <!-- Second set of arcs from top-right (700, 100) -->
  <!-- Blue half-circle -->
  <path d="M 700 100 A 400 400 0 0 1 300 100" fill="none" stroke="#1D3557" stroke-width="10" opacity="0.3"/>

  <!-- Yellow arc from top-right -->
  <path d="M 700 100 A 300 300 0 0 1 700 400" fill="none" stroke="#F4D35E" stroke-width="8" opacity="0.4"/>

  <!-- Teal arc from top-right -->
  <path d="M 700 100 A 200 200 0 0 1 500 100" fill="none" stroke="#2A9D8F" stroke-width="6" opacity="0.45"/>

  <!-- Straight lines intersecting the arcs -->
  <line x1="100" y1="700" x2="700" y2="100" stroke="#000000" stroke-width="2" opacity="0.3"/>
  <line x1="50" y1="400" x2="750" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <line x1="400" y1="50" x2="400" y2="750" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <line x1="100" y1="100" x2="700" y2="700" stroke="#457B9D" stroke-width="1" opacity="0.25"/>
  <line x1="250" y1="50" x2="250" y2="750" stroke="#E63946" stroke-width="1" opacity="0.15"/>
  <line x1="50" y1="550" x2="750" y2="250" stroke="#1D3557" stroke-width="1" opacity="0.2"/>

  <!-- Small squares at arc endpoints -->
  <rect x="90" y="690" width="20" height="20" fill="#E63946" opacity="0.8"/>
  <rect x="640" y="140" width="20" height="20" fill="#1D3557" opacity="0.8"/>
  <rect x="540" y="240" width="16" height="16" fill="#F4D35E" opacity="0.75"/>
  <rect x="440" y="340" width="14" height="14" fill="#2A9D8F" opacity="0.7"/>
  <rect x="340" y="440" width="12" height="12" fill="#E76F51" opacity="0.7"/>
  <rect x="240" y="540" width="12" height="12" fill="#E63946" opacity="0.65"/>
  <rect x="690" y="90" width="18" height="18" fill="#F4D35E" opacity="0.7"/>
  <rect x="290" y="90" width="14" height="14" fill="#1D3557" opacity="0.6"/>
  <rect x="690" y="390" width="14" height="14" fill="#2A9D8F" opacity="0.6"/>
  <rect x="490" y="90" width="12" height="12" fill="#E9C46A" opacity="0.55"/>

  <!-- Accent circles -->
  <circle cx="400" cy="400" r="8" fill="#000000" opacity="0.5"/>
  <circle cx="200" cy="600" r="10" fill="#DDA15E" opacity="0.5"/>
  <circle cx="600" cy="200" r="10" fill="#A8DADC" opacity="0.5"/>
  <circle cx="500" cy="500" r="6" fill="#6D2E46" opacity="0.4"/>

  <!-- Corner accents -->
  <rect x="20" y="20" width="15" height="15" fill="#264653" opacity="0.4"/>
  <rect x="765" y="765" width="15" height="15" fill="#264653" opacity="0.4"/>
</svg>