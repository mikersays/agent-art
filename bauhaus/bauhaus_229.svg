<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Bauhaus Spirograph -->
  <!-- Background -->
  <rect width="800" height="800" fill="#FFF"/>

  <!-- Large outer guide circle -->
  <circle cx="400" cy="400" r="350" fill="none" stroke="#000" stroke-width="2" opacity="0.2"/>

  <!-- Spirograph pattern 1 - Red, large hypotrochoid approximation -->
  <circle cx="400" cy="400" r="280" fill="none" stroke="#E63946" stroke-width="2" opacity="0.6"/>
  <ellipse cx="400" cy="400" rx="280" ry="180" fill="none" stroke="#E63946" stroke-width="2" opacity="0.6"/>
  <ellipse cx="400" cy="400" rx="280" ry="180" fill="none" stroke="#E63946" stroke-width="2" opacity="0.6" transform="rotate(30,400,400)"/>
  <ellipse cx="400" cy="400" rx="280" ry="180" fill="none" stroke="#E63946" stroke-width="2" opacity="0.6" transform="rotate(60,400,400)"/>
  <ellipse cx="400" cy="400" rx="280" ry="180" fill="none" stroke="#E63946" stroke-width="2" opacity="0.6" transform="rotate(90,400,400)"/>
  <ellipse cx="400" cy="400" rx="280" ry="180" fill="none" stroke="#E63946" stroke-width="2" opacity="0.6" transform="rotate(120,400,400)"/>
  <ellipse cx="400" cy="400" rx="280" ry="180" fill="none" stroke="#E63946" stroke-width="2" opacity="0.6" transform="rotate(150,400,400)"/>

  <!-- Spirograph pattern 2 - Blue, medium epitrochoid -->
  <ellipse cx="400" cy="400" rx="200" ry="100" fill="none" stroke="#1D3557" stroke-width="2" opacity="0.7"/>
  <ellipse cx="400" cy="400" rx="200" ry="100" fill="none" stroke="#1D3557" stroke-width="2" opacity="0.7" transform="rotate(36,400,400)"/>
  <ellipse cx="400" cy="400" rx="200" ry="100" fill="none" stroke="#1D3557" stroke-width="2" opacity="0.7" transform="rotate(72,400,400)"/>
  <ellipse cx="400" cy="400" rx="200" ry="100" fill="none" stroke="#1D3557" stroke-width="2" opacity="0.7" transform="rotate(108,400,400)"/>
  <ellipse cx="400" cy="400" rx="200" ry="100" fill="none" stroke="#1D3557" stroke-width="2" opacity="0.7" transform="rotate(144,400,400)"/>

  <!-- Spirograph pattern 3 - Yellow, inner pattern -->
  <ellipse cx="400" cy="400" rx="140" ry="60" fill="none" stroke="#F4D35E" stroke-width="2.5" opacity="0.8"/>
  <ellipse cx="400" cy="400" rx="140" ry="60" fill="none" stroke="#F4D35E" stroke-width="2.5" opacity="0.8" transform="rotate(25,400,400)"/>
  <ellipse cx="400" cy="400" rx="140" ry="60" fill="none" stroke="#F4D35E" stroke-width="2.5" opacity="0.8" transform="rotate(50,400,400)"/>
  <ellipse cx="400" cy="400" rx="140" ry="60" fill="none" stroke="#F4D35E" stroke-width="2.5" opacity="0.8" transform="rotate(75,400,400)"/>
  <ellipse cx="400" cy="400" rx="140" ry="60" fill="none" stroke="#F4D35E" stroke-width="2.5" opacity="0.8" transform="rotate(100,400,400)"/>
  <ellipse cx="400" cy="400" rx="140" ry="60" fill="none" stroke="#F4D35E" stroke-width="2.5" opacity="0.8" transform="rotate(125,400,400)"/>
  <ellipse cx="400" cy="400" rx="140" ry="60" fill="none" stroke="#F4D35E" stroke-width="2.5" opacity="0.8" transform="rotate(150,400,400)"/>

  <!-- Spirograph pattern 4 - Burgundy, tight inner -->
  <ellipse cx="400" cy="400" rx="90" ry="30" fill="none" stroke="#6D2E46" stroke-width="2" opacity="0.7"/>
  <ellipse cx="400" cy="400" rx="90" ry="30" fill="none" stroke="#6D2E46" stroke-width="2" opacity="0.7" transform="rotate(20,400,400)"/>
  <ellipse cx="400" cy="400" rx="90" ry="30" fill="none" stroke="#6D2E46" stroke-width="2" opacity="0.7" transform="rotate(40,400,400)"/>
  <ellipse cx="400" cy="400" rx="90" ry="30" fill="none" stroke="#6D2E46" stroke-width="2" opacity="0.7" transform="rotate(60,400,400)"/>
  <ellipse cx="400" cy="400" rx="90" ry="30" fill="none" stroke="#6D2E46" stroke-width="2" opacity="0.7" transform="rotate(80,400,400)"/>
  <ellipse cx="400" cy="400" rx="90" ry="30" fill="none" stroke="#6D2E46" stroke-width="2" opacity="0.7" transform="rotate(100,400,400)"/>
  <ellipse cx="400" cy="400" rx="90" ry="30" fill="none" stroke="#6D2E46" stroke-width="2" opacity="0.7" transform="rotate(120,400,400)"/>
  <ellipse cx="400" cy="400" rx="90" ry="30" fill="none" stroke="#6D2E46" stroke-width="2" opacity="0.7" transform="rotate(140,400,400)"/>
  <ellipse cx="400" cy="400" rx="90" ry="30" fill="none" stroke="#6D2E46" stroke-width="2" opacity="0.7" transform="rotate(160,400,400)"/>

  <!-- Orange accent ring -->
  <circle cx="400" cy="400" r="160" fill="none" stroke="#E76F51" stroke-width="1.5" opacity="0.5" stroke-dasharray="8,4"/>

  <!-- Forest green small spirograph orbit -->
  <ellipse cx="400" cy="400" rx="50" ry="15" fill="none" stroke="#264653" stroke-width="2"/>
  <ellipse cx="400" cy="400" rx="50" ry="15" fill="none" stroke="#264653" stroke-width="2" transform="rotate(45,400,400)"/>
  <ellipse cx="400" cy="400" rx="50" ry="15" fill="none" stroke="#264653" stroke-width="2" transform="rotate(90,400,400)"/>
  <ellipse cx="400" cy="400" rx="50" ry="15" fill="none" stroke="#264653" stroke-width="2" transform="rotate(135,400,400)"/>

  <!-- Center point -->
  <circle cx="400" cy="400" r="8" fill="#000"/>
  <circle cx="400" cy="400" r="4" fill="#E63946"/>

  <!-- Decorative outer dots at cardinal points -->
  <circle cx="400" cy="45" r="6" fill="#1D3557"/>
  <circle cx="755" cy="400" r="6" fill="#E63946"/>
  <circle cx="400" cy="755" r="6" fill="#F4D35E"/>
  <circle cx="45" cy="400" r="6" fill="#264653"/>
</svg>