<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Warm gray horizontal lines behind everything -->
  <line x1="0" y1="50" x2="800" y2="50" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="150" x2="800" y2="150" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="250" x2="800" y2="250" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="350" x2="800" y2="350" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="450" x2="800" y2="450" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="550" x2="800" y2="550" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="650" x2="800" y2="650" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="750" x2="800" y2="750" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <!-- WARM shapes above the zigzag (upper portion) -->
  <circle cx="120" cy="120" r="55" fill="#E63946" opacity="0.8"/>
  <circle cx="350" cy="80" r="35" fill="#E76F51" opacity="0.7"/>
  <circle cx="550" cy="150" r="45" fill="#F4D35E" opacity="0.75"/>
  <circle cx="700" cy="100" r="30" fill="#E9C46A" opacity="0.8"/>
  <rect x="200" y="60" width="80" height="50" fill="#E63946" opacity="0.6"/>
  <rect x="450" y="30" width="60" height="80" fill="#E76F51" opacity="0.65"/>
  <rect x="620" y="180" width="70" height="45" fill="#F4D35E" opacity="0.7"/>
  <circle cx="80" cy="250" r="25" fill="#E9C46A" opacity="0.6"/>
  <rect x="300" y="200" width="90" height="40" fill="#E63946" opacity="0.5"/>
  <circle cx="500" cy="260" r="20" fill="#E76F51" opacity="0.8"/>
  <rect x="650" y="250" width="50" height="60" fill="#F4D35E" opacity="0.55"/>
  <!-- Bold zigzag polyline -->
  <polyline points="0,400 100,300 200,500 300,300 400,500 500,300 600,500 700,300 800,400" fill="none" stroke="#000000" stroke-width="5" stroke-linejoin="miter"/>
  <!-- Burgundy squares at zigzag peaks and valleys -->
  <rect x="92" y="292" width="16" height="16" fill="#6D2E46"/>
  <rect x="192" y="492" width="16" height="16" fill="#6D2E46"/>
  <rect x="292" y="292" width="16" height="16" fill="#6D2E46"/>
  <rect x="392" y="492" width="16" height="16" fill="#6D2E46"/>
  <rect x="492" y="292" width="16" height="16" fill="#6D2E46"/>
  <rect x="592" y="492" width="16" height="16" fill="#6D2E46"/>
  <rect x="692" y="292" width="16" height="16" fill="#6D2E46"/>
  <!-- COOL shapes below the zigzag (lower portion) -->
  <polygon points="150,600 200,700 100,700" fill="#1D3557" opacity="0.7"/>
  <polygon points="400,580 450,680 350,680" fill="#2A9D8F" opacity="0.65"/>
  <polygon points="650,620 710,730 590,730" fill="#264653" opacity="0.7"/>
  <line x1="50" y1="650" x2="250" y2="650" stroke="#457B9D" stroke-width="3" opacity="0.6"/>
  <line x1="300" y1="720" x2="550" y2="720" stroke="#1D3557" stroke-width="2" opacity="0.5"/>
  <line x1="500" y1="600" x2="750" y2="600" stroke="#2A9D8F" stroke-width="2.5" opacity="0.55"/>
  <polygon points="280,550 310,620 250,620" fill="#457B9D" opacity="0.6"/>
  <line x1="600" y1="680" x2="780" y2="680" stroke="#264653" stroke-width="2" opacity="0.5"/>
  <polygon points="720,560 760,640 680,640" fill="#1D3557" opacity="0.5"/>
  <line x1="80" y1="750" x2="400" y2="750" stroke="#457B9D" stroke-width="1.5" opacity="0.4"/>
  <polygon points="500,700 530,760 470,760" fill="#2A9D8F" opacity="0.6"/>
</svg>