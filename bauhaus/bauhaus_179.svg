<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Xylophone</title>
  <rect width="800" height="800" fill="#FFF"/>

  <!-- Background accent -->
  <circle cx="400" cy="400" r="350" fill="#A8DADC" opacity="0.1"/>

  <!-- Xylophone frame - left leg -->
  <polygon points="80,700 100,700 160,150 140,150" fill="#333" stroke="#000" stroke-width="2"/>
  <!-- Xylophone frame - right leg -->
  <polygon points="700,700 720,700 660,150 640,150" fill="#333" stroke="#000" stroke-width="2"/>

  <!-- Frame top bar -->
  <rect x="130" y="140" width="540" height="15" fill="#000" rx="5"/>
  <!-- Frame bottom bar -->
  <rect x="70" y="700" width="660" height="15" fill="#000" rx="5"/>

  <!-- Cross support strings -->
  <line x1="150" y1="155" x2="90" y2="700" stroke="#333" stroke-width="1"/>
  <line x1="650" y1="155" x2="710" y2="700" stroke="#333" stroke-width="1"/>

  <!-- Bar 1 (C - longest) - Red -->
  <rect x="120" y="190" width="560" height="40" rx="5" fill="#E63946" stroke="#000" stroke-width="2"/>
  <circle cx="140" cy="210" r="6" fill="#000" opacity="0.3"/>
  <circle cx="660" cy="210" r="6" fill="#000" opacity="0.3"/>

  <!-- Bar 2 (D) - Blue -->
  <rect x="140" y="245" width="520" height="40" rx="5" fill="#1D3557" stroke="#000" stroke-width="2"/>
  <circle cx="160" cy="265" r="6" fill="#FFF" opacity="0.3"/>
  <circle cx="640" cy="265" r="6" fill="#FFF" opacity="0.3"/>

  <!-- Bar 3 (E) - Yellow -->
  <rect x="160" y="300" width="480" height="40" rx="5" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <circle cx="180" cy="320" r="6" fill="#000" opacity="0.3"/>
  <circle cx="620" cy="320" r="6" fill="#000" opacity="0.3"/>

  <!-- Bar 4 (F) - Sand -->
  <rect x="180" y="355" width="440" height="40" rx="5" fill="#DDA15E" stroke="#000" stroke-width="2"/>
  <circle cx="200" cy="375" r="6" fill="#000" opacity="0.3"/>
  <circle cx="600" cy="375" r="6" fill="#000" opacity="0.3"/>

  <!-- Bar 5 (G) - Light Blue -->
  <rect x="200" y="410" width="400" height="40" rx="5" fill="#A8DADC" stroke="#000" stroke-width="2"/>
  <circle cx="220" cy="430" r="6" fill="#000" opacity="0.3"/>
  <circle cx="580" cy="430" r="6" fill="#000" opacity="0.3"/>

  <!-- Bar 6 (A) - Red darker -->
  <rect x="220" y="465" width="360" height="40" rx="5" fill="#E63946" stroke="#000" stroke-width="2" opacity="0.8"/>
  <circle cx="240" cy="485" r="6" fill="#000" opacity="0.3"/>
  <circle cx="560" cy="485" r="6" fill="#000" opacity="0.3"/>

  <!-- Bar 7 (B) - Charcoal -->
  <rect x="240" y="520" width="320" height="40" rx="5" fill="#333" stroke="#000" stroke-width="2"/>
  <circle cx="260" cy="540" r="6" fill="#FFF" opacity="0.3"/>
  <circle cx="540" cy="540" r="6" fill="#FFF" opacity="0.3"/>

  <!-- Bar 8 (C high) - Blue -->
  <rect x="260" y="575" width="280" height="40" rx="5" fill="#1D3557" stroke="#000" stroke-width="2" opacity="0.8"/>
  <circle cx="280" cy="595" r="6" fill="#FFF" opacity="0.3"/>
  <circle cx="520" cy="595" r="6" fill="#FFF" opacity="0.3"/>

  <!-- Mallet 1 -->
  <line x1="620" y1="100" x2="500" y2="280" stroke="#DDA15E" stroke-width="6" stroke-linecap="round"/>
  <circle cx="500" cy="280" r="22" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <circle cx="500" cy="280" r="12" fill="#DDA15E"/>

  <!-- Mallet 2 -->
  <line x1="680" y1="120" x2="560" y2="300" stroke="#DDA15E" stroke-width="6" stroke-linecap="round"/>
  <circle cx="560" cy="300" r="22" fill="#E63946" stroke="#000" stroke-width="2"/>
  <circle cx="560" cy="300" r="12" fill="#333"/>

  <!-- Sound wave indicators -->
  <path d="M60,300 Q40,320 60,340" fill="none" stroke="#1D3557" stroke-width="3" opacity="0.5"/>
  <path d="M40,290 Q15,320 40,350" fill="none" stroke="#1D3557" stroke-width="2" opacity="0.3"/>
  <path d="M740,450 Q760,470 740,490" fill="none" stroke="#E63946" stroke-width="3" opacity="0.5"/>
  <path d="M760,440 Q785,470 760,500" fill="none" stroke="#E63946" stroke-width="2" opacity="0.3"/>

  <!-- Decorative corner elements -->
  <rect x="20" y="20" width="40" height="40" fill="#E63946" opacity="0.7"/>
  <rect x="740" y="20" width="40" height="40" fill="#1D3557" opacity="0.7"/>
  <circle cx="40" cy="760" r="20" fill="#F4D35E" opacity="0.7"/>
  <circle cx="760" cy="760" r="20" fill="#A8DADC" opacity="0.7"/>
</svg>