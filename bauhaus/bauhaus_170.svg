<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#FFF"/>

  <!-- Ground -->
  <rect x="0" y="700" width="800" height="100" fill="#264653"/>

  <!-- Left post -->
  <rect x="80" y="200" width="25" height="500" fill="#000"/>
  <rect x="70" y="190" width="45" height="20" fill="#1D3557"/>
  <!-- Left post base -->
  <rect x="60" y="680" width="65" height="20" fill="#000"/>

  <!-- Right post -->
  <rect x="695" y="200" width="25" height="500" fill="#000"/>
  <rect x="685" y="190" width="45" height="20" fill="#1D3557"/>
  <!-- Right post base -->
  <rect x="675" y="680" width="65" height="20" fill="#000"/>

  <!-- Left attachment rings -->
  <circle cx="92" cy="250" r="8" fill="none" stroke="#F4D35E" stroke-width="3"/>
  <circle cx="92" cy="290" r="8" fill="none" stroke="#F4D35E" stroke-width="3"/>

  <!-- Right attachment rings -->
  <circle cx="708" cy="250" r="8" fill="none" stroke="#F4D35E" stroke-width="3"/>
  <circle cx="708" cy="290" r="8" fill="none" stroke="#F4D35E" stroke-width="3"/>

  <!-- Hammock catenary curves - main structural lines -->
  <!-- Top edge catenary -->
  <path d="M100,250 Q400,500 700,250" fill="none" stroke="#E63946" stroke-width="4"/>
  <!-- Bottom edge catenary -->
  <path d="M100,290 Q400,550 700,290" fill="none" stroke="#E63946" stroke-width="4"/>

  <!-- Hammock mesh fill - horizontal catenary lines -->
  <path d="M100,258 Q400,510 700,258" fill="none" stroke="#6D2E46" stroke-width="1.5" opacity="0.7"/>
  <path d="M100,266 Q400,520 700,266" fill="none" stroke="#6D2E46" stroke-width="1.5" opacity="0.7"/>
  <path d="M100,274 Q400,530 700,274" fill="none" stroke="#6D2E46" stroke-width="1.5" opacity="0.7"/>
  <path d="M100,282 Q400,540 700,282" fill="none" stroke="#6D2E46" stroke-width="1.5" opacity="0.7"/>

  <!-- Vertical weave lines across the hammock -->
  <line x1="160" y1="262" x2="160" y2="298" stroke="#E9C46A" stroke-width="1.5"/>
  <line x1="220" y1="298" x2="220" y2="340" stroke="#E9C46A" stroke-width="1.5"/>
  <line x1="280" y1="330" x2="280" y2="380" stroke="#E9C46A" stroke-width="1.5"/>
  <line x1="340" y1="365" x2="340" y2="420" stroke="#E9C46A" stroke-width="1.5"/>
  <line x1="400" y1="390" x2="400" y2="450" stroke="#E9C46A" stroke-width="1.5"/>
  <line x1="460" y1="365" x2="460" y2="420" stroke="#E9C46A" stroke-width="1.5"/>
  <line x1="520" y1="330" x2="520" y2="380" stroke="#E9C46A" stroke-width="1.5"/>
  <line x1="580" y1="298" x2="580" y2="340" stroke="#E9C46A" stroke-width="1.5"/>
  <line x1="640" y1="262" x2="640" y2="298" stroke="#E9C46A" stroke-width="1.5"/>

  <!-- Diagonal weave pattern -->
  <line x1="140" y1="260" x2="200" y2="310" stroke="#1D3557" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="260" x2="260" y2="340" stroke="#1D3557" stroke-width="1" opacity="0.5"/>
  <line x1="260" y1="280" x2="340" y2="400" stroke="#1D3557" stroke-width="1" opacity="0.5"/>
  <line x1="340" y1="300" x2="420" y2="440" stroke="#1D3557" stroke-width="1" opacity="0.5"/>
  <line x1="460" y1="300" x2="380" y2="440" stroke="#1D3557" stroke-width="1" opacity="0.5"/>
  <line x1="540" y1="280" x2="460" y2="400" stroke="#1D3557" stroke-width="1" opacity="0.5"/>
  <line x1="600" y1="260" x2="540" y2="340" stroke="#1D3557" stroke-width="1" opacity="0.5"/>
  <line x1="660" y1="260" x2="600" y2="310" stroke="#1D3557" stroke-width="1" opacity="0.5"/>

  <!-- Hammock gathered ends - left -->
  <line x1="100" y1="250" x2="115" y2="260" stroke="#E63946" stroke-width="2"/>
  <line x1="100" y1="260" x2="115" y2="268" stroke="#E63946" stroke-width="2"/>
  <line x1="100" y1="270" x2="115" y2="275" stroke="#E63946" stroke-width="2"/>
  <line x1="100" y1="280" x2="115" y2="282" stroke="#E63946" stroke-width="2"/>
  <line x1="100" y1="290" x2="115" y2="290" stroke="#E63946" stroke-width="2"/>

  <!-- Hammock gathered ends - right -->
  <line x1="700" y1="250" x2="685" y2="260" stroke="#E63946" stroke-width="2"/>
  <line x1="700" y1="260" x2="685" y2="268" stroke="#E63946" stroke-width="2"/>
  <line x1="700" y1="270" x2="685" y2="275" stroke="#E63946" stroke-width="2"/>
  <line x1="700" y1="280" x2="685" y2="282" stroke="#E63946" stroke-width="2"/>
  <line x1="700" y1="290" x2="685" y2="290" stroke="#E63946" stroke-width="2"/>

  <!-- Decorative Bauhaus geometric elements -->
  <circle cx="400" cy="150" r="40" fill="#F4D35E" opacity="0.6"/>
  <rect x="350" y="110" width="100" height="80" fill="none" stroke="#E63946" stroke-width="2"/>
  <polygon points="400,90 420,130 380,130" fill="#E63946"/>

  <!-- Ground texture elements -->
  <rect x="150" y="720" width="60" height="30" fill="#1D3557" opacity="0.5"/>
  <rect x="400" y="730" width="80" height="25" fill="#6D2E46" opacity="0.4"/>
  <rect x="600" y="715" width="50" height="35" fill="#1D3557" opacity="0.5"/>
</svg>