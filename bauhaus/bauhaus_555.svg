<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle background structure -->
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="650" x2="800" y2="650" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>

  <!-- Pendulum arc 1 - from top-left area -->
  <path d="M 100,0 A 350,350 0 0,1 400,280" fill="none" stroke="#E76F51" stroke-width="2.5" opacity="0.7"/>
  <path d="M 100,0 A 300,300 0 0,1 360,240" fill="none" stroke="#DDA15E" stroke-width="1.5" opacity="0.5"/>
  <circle cx="400" cy="280" r="14" fill="#E76F51" opacity="0.85"/>
  <circle cx="360" cy="240" r="8" fill="#DDA15E" opacity="0.7"/>

  <!-- Pendulum arc 2 - from top-center-left -->
  <path d="M 250,0 A 280,280 0 0,1 480,220" fill="none" stroke="#E9C46A" stroke-width="2.5" opacity="0.65"/>
  <path d="M 250,0 A 220,220 0 0,1 430,180" fill="none" stroke="#E76F51" stroke-width="1.5" opacity="0.45"/>
  <circle cx="480" cy="220" r="12" fill="#E9C46A" opacity="0.8"/>
  <circle cx="430" cy="180" r="7" fill="#E76F51" opacity="0.6"/>

  <!-- Pendulum arc 3 - from top-center -->
  <path d="M 400,0 A 320,320 0 0,1 620,320" fill="none" stroke="#DDA15E" stroke-width="3" opacity="0.7"/>
  <path d="M 400,0 A 250,250 0 0,1 570,260" fill="none" stroke="#E9C46A" stroke-width="1.5" opacity="0.5"/>
  <path d="M 400,0 A 400,400 0 0,1 680,380" fill="none" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <circle cx="620" cy="320" r="16" fill="#DDA15E" opacity="0.85"/>
  <circle cx="570" cy="260" r="9" fill="#E9C46A" opacity="0.65"/>
  <circle cx="680" cy="380" r="6" fill="#A89F91" opacity="0.5"/>

  <!-- Pendulum arc 4 - from top-center-right -->
  <path d="M 550,0 A 260,260 0 0,1 700,240" fill="none" stroke="#E63946" stroke-width="2" opacity="0.55"/>
  <path d="M 550,0 A 350,350 0 0,1 750,340" fill="none" stroke="#E76F51" stroke-width="1.5" opacity="0.4"/>
  <circle cx="700" cy="240" r="10" fill="#E63946" opacity="0.7"/>
  <circle cx="750" cy="340" r="7" fill="#E76F51" opacity="0.55"/>

  <!-- Pendulum arc 5 - from top-right -->
  <path d="M 700,0 A 300,300 0 0,1 760,450" fill="none" stroke="#E9C46A" stroke-width="2" opacity="0.5"/>
  <circle cx="760" cy="450" r="11" fill="#E9C46A" opacity="0.7"/>

  <!-- Bold rectangular blocks at bottom - grounding element -->
  <rect x="40" y="620" width="200" height="140" fill="#E76F51" opacity="0.85"/>
  <rect x="260" y="650" width="160" height="110" fill="#DDA15E" opacity="0.8"/>
  <rect x="440" y="630" width="180" height="130" fill="#E9C46A" opacity="0.75"/>
  <rect x="640" y="660" width="130" height="100" fill="#E63946" opacity="0.7"/>

  <!-- Darker accent blocks overlapping -->
  <rect x="120" y="640" width="80" height="60" fill="#264653" opacity="0.6"/>
  <rect x="500" y="670" width="70" height="50" fill="#1D3557" opacity="0.5"/>

  <!-- Thin vertical lines from pendulum origins -->
  <line x1="100" y1="0" x2="100" y2="40" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="250" y1="0" x2="250" y2="35" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="0" x2="400" y2="30" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="550" y1="0" x2="550" y2="30" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="700" y1="0" x2="700" y2="25" stroke="#000000" stroke-width="1.5" opacity="0.4"/>

  <!-- Small accent dots on the ground blocks -->
  <circle cx="140" cy="690" r="4" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="340" cy="705" r="4" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="530" cy="695" r="4" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="705" cy="710" r="3" fill="#FFFFFF" opacity="0.5"/>

  <!-- Top edge accent marks -->
  <rect x="95" y="0" width="10" height="4" fill="#E76F51" opacity="0.6"/>
  <rect x="245" y="0" width="10" height="4" fill="#E9C46A" opacity="0.6"/>
  <rect x="395" y="0" width="10" height="4" fill="#DDA15E" opacity="0.6"/>
  <rect x="545" y="0" width="10" height="4" fill="#E63946" opacity="0.6"/>
  <rect x="695" y="0" width="10" height="4" fill="#E9C46A" opacity="0.6"/>
</svg>