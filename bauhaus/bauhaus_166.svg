<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#FFF"/>

  <!-- Ground -->
  <rect x="0" y="700" width="800" height="100" fill="#264653"/>

  <!-- Crane base platform -->
  <rect x="120" y="650" width="160" height="50" fill="#000"/>

  <!-- Crane tower (vertical lattice) -->
  <rect x="180" y="150" width="10" height="500" fill="#000"/>
  <rect x="210" y="150" width="10" height="500" fill="#000"/>
  <!-- Lattice cross members on tower -->
  <line x1="180" y1="200" x2="220" y2="250" stroke="#000" stroke-width="3"/>
  <line x1="220" y1="200" x2="180" y2="250" stroke="#000" stroke-width="3"/>
  <line x1="180" y1="300" x2="220" y2="350" stroke="#000" stroke-width="3"/>
  <line x1="220" y1="300" x2="180" y2="350" stroke="#000" stroke-width="3"/>
  <line x1="180" y1="400" x2="220" y2="450" stroke="#000" stroke-width="3"/>
  <line x1="220" y1="400" x2="180" y2="450" stroke="#000" stroke-width="3"/>
  <line x1="180" y1="500" x2="220" y2="550" stroke="#000" stroke-width="3"/>
  <line x1="220" y1="500" x2="180" y2="550" stroke="#000" stroke-width="3"/>
  <line x1="180" y1="580" x2="220" y2="630" stroke="#000" stroke-width="3"/>
  <line x1="220" y1="580" x2="180" y2="630" stroke="#000" stroke-width="3"/>

  <!-- Boom (horizontal lattice arm) -->
  <rect x="190" y="150" width="420" height="8" fill="#E63946"/>
  <rect x="190" y="175" width="420" height="8" fill="#E63946"/>
  <!-- Boom lattice diagonals -->
  <line x1="250" y1="150" x2="290" y2="183" stroke="#E63946" stroke-width="2.5"/>
  <line x1="290" y1="150" x2="250" y2="183" stroke="#E63946" stroke-width="2.5"/>
  <line x1="330" y1="150" x2="370" y2="183" stroke="#E63946" stroke-width="2.5"/>
  <line x1="370" y1="150" x2="330" y2="183" stroke="#E63946" stroke-width="2.5"/>
  <line x1="410" y1="150" x2="450" y2="183" stroke="#E63946" stroke-width="2.5"/>
  <line x1="450" y1="150" x2="410" y2="183" stroke="#E63946" stroke-width="2.5"/>
  <line x1="490" y1="150" x2="530" y2="183" stroke="#E63946" stroke-width="2.5"/>
  <line x1="530" y1="150" x2="490" y2="183" stroke="#E63946" stroke-width="2.5"/>
  <line x1="560" y1="150" x2="600" y2="183" stroke="#E63946" stroke-width="2.5"/>
  <line x1="600" y1="150" x2="560" y2="183" stroke="#E63946" stroke-width="2.5"/>

  <!-- Counter-jib (rear arm) -->
  <rect x="60" y="155" width="140" height="6" fill="#1D3557"/>
  <rect x="60" y="172" width="140" height="6" fill="#1D3557"/>
  <line x1="70" y1="155" x2="100" y2="178" stroke="#1D3557" stroke-width="2"/>
  <line x1="100" y1="155" x2="70" y2="178" stroke="#1D3557" stroke-width="2"/>
  <line x1="120" y1="155" x2="150" y2="178" stroke="#1D3557" stroke-width="2"/>
  <line x1="150" y1="155" x2="120" y2="178" stroke="#1D3557" stroke-width="2"/>

  <!-- Counterweight blocks -->
  <rect x="60" y="180" width="40" height="35" fill="#1D3557"/>
  <rect x="105" y="180" width="40" height="35" fill="#6D2E46"/>
  <rect x="80" y="218" width="45" height="30" fill="#000"/>

  <!-- Top cable stays -->
  <line x1="200" y1="100" x2="600" y2="150" stroke="#000" stroke-width="3"/>
  <line x1="200" y1="100" x2="60" y2="155" stroke="#000" stroke-width="3"/>
  <!-- Tower peak -->
  <polygon points="195,100 205,100 200,80" fill="#F4D35E"/>
  <rect x="195" y="100" width="10" height="50" fill="#000"/>

  <!-- Hoist cable -->
  <line x1="560" y1="183" x2="560" y2="480" stroke="#000" stroke-width="3"/>

  <!-- Hook assembly -->
  <rect x="548" y="480" width="24" height="15" fill="#F4D35E"/>
  <path d="M560,495 L560,530 Q560,555 540,555 Q520,555 520,535" stroke="#F4D35E" fill="none" stroke-width="6" stroke-linecap="round"/>

  <!-- Operator cab -->
  <rect x="175" y="155" width="50" height="45" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <rect x="180" y="162" width="18" height="20" fill="#1D3557" opacity="0.6"/>

  <!-- Turntable circle -->
  <circle cx="200" cy="650" r="20" fill="#6D2E46" stroke="#000" stroke-width="2"/>

  <!-- Decorative Bauhaus circles -->
  <circle cx="680" cy="120" r="50" fill="#E63946" opacity="0.3"/>
  <circle cx="720" cy="600" r="35" fill="#F4D35E" opacity="0.4"/>
  <circle cx="50" cy="500" r="25" fill="#1D3557" opacity="0.3"/>
</svg>