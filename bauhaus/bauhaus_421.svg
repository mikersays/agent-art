<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Background structural grid lines -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>

  <!-- Radiating structural lines from center -->
  <line x1="400" y1="400" x2="400" y2="80" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="400" y1="400" x2="400" y2="720" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="400" y1="400" x2="80" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="400" y1="400" x2="720" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="400" y1="400" x2="174" y2="174" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="400" y1="400" x2="626" y2="626" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="400" y1="400" x2="626" y2="174" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="400" y1="400" x2="174" y2="626" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="400" y1="400" x2="103" y2="287" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="400" x2="697" y2="513" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="400" x2="287" y2="103" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="400" x2="513" y2="697" stroke="#000000" stroke-width="1" opacity="0.5"/>

  <!-- Arc segments of the large circle (radius 260), broken into pieces with gaps -->
  <!-- Segment 1: 0-50 degrees - Red -->
  <path d="M 400 140 A 260 260 0 0 1 567 182" fill="none" stroke="#E63946" stroke-width="38" stroke-linecap="butt"/>
  <!-- Segment 2: 60-110 degrees - Blue -->
  <path d="M 590 175 A 260 260 0 0 1 656 336" fill="none" stroke="#1D3557" stroke-width="38" stroke-linecap="butt"/>
  <!-- Segment 3: 120-170 degrees - Yellow -->
  <path d="M 660 356 A 260 260 0 0 1 626 533" fill="none" stroke="#F4D35E" stroke-width="38" stroke-linecap="butt"/>
  <!-- Segment 4: 180-230 degrees - Teal -->
  <path d="M 620 555 A 260 260 0 0 1 503 647" fill="none" stroke="#2A9D8F" stroke-width="38" stroke-linecap="butt"/>
  <!-- Segment 5: 240-290 degrees - Orange -->
  <path d="M 482 656 A 260 260 0 0 1 296 650" fill="none" stroke="#E76F51" stroke-width="38" stroke-linecap="butt"/>
  <!-- Segment 6: 300-350 degrees - Burgundy -->
  <path d="M 277 638 A 260 260 0 0 1 143 490" fill="none" stroke="#6D2E46" stroke-width="38" stroke-linecap="butt"/>
  <!-- Segment 7: 360-410 = 0-50 equiv shifted - Steel Blue -->
  <path d="M 140 468 A 260 260 0 0 1 145 314" fill="none" stroke="#457B9D" stroke-width="38" stroke-linecap="butt"/>
  <!-- Segment 8: last arc - Forest -->
  <path d="M 153 294 A 260 260 0 0 1 385 140" fill="none" stroke="#264653" stroke-width="38" stroke-linecap="butt"/>

  <!-- Inner ring segments (radius 160) -->
  <path d="M 400 240 A 160 160 0 0 1 536 291" fill="none" stroke="#E63946" stroke-width="18" opacity="0.6" stroke-linecap="butt"/>
  <path d="M 554 306 A 160 160 0 0 1 556 494" fill="none" stroke="#1D3557" stroke-width="18" opacity="0.6" stroke-linecap="butt"/>
  <path d="M 548 514 A 160 160 0 0 1 400 560" fill="none" stroke="#F4D35E" stroke-width="18" opacity="0.6" stroke-linecap="butt"/>
  <path d="M 378 559 A 160 160 0 0 1 246 468" fill="none" stroke="#2A9D8F" stroke-width="18" opacity="0.6" stroke-linecap="butt"/>
  <path d="M 241 446 A 160 160 0 0 1 252 306" fill="none" stroke="#E76F51" stroke-width="18" opacity="0.6" stroke-linecap="butt"/>
  <path d="M 264 288 A 160 160 0 0 1 378 241" fill="none" stroke="#6D2E46" stroke-width="18" opacity="0.6" stroke-linecap="butt"/>

  <!-- Small squares filling negative space in gap areas -->
  <rect x="390" y="90" width="20" height="20" fill="#E63946" transform="rotate(10, 400, 100)"/>
  <rect x="630" y="150" width="16" height="16" fill="#F4D35E" transform="rotate(30, 638, 158)"/>
  <rect x="700" y="380" width="18" height="18" fill="#2A9D8F" transform="rotate(-15, 709, 389)"/>
  <rect x="650" y="610" width="14" height="14" fill="#1D3557" transform="rotate(20, 657, 617)"/>
  <rect x="420" y="700" width="18" height="18" fill="#E76F51" transform="rotate(5, 429, 709)"/>
  <rect x="185" y="670" width="16" height="16" fill="#F4D35E" transform="rotate(-25, 193, 678)"/>
  <rect x="90" y="510" width="20" height="20" fill="#E63946" transform="rotate(15, 100, 520)"/>
  <rect x="100" y="270" width="14" height="14" fill="#457B9D" transform="rotate(-10, 107, 277)"/>
  <rect x="215" y="120" width="16" height="16" fill="#2A9D8F" transform="rotate(35, 223, 128)"/>

  <!-- Triangles in negative space -->
  <polygon points="400,60 415,90 385,90" fill="#1D3557" opacity="0.85"/>
  <polygon points="700,185 725,205 700,225" fill="#E63946" opacity="0.85"/>
  <polygon points="720,440 750,420 750,460" fill="#F4D35E" opacity="0.85"/>
  <polygon points="690,640 715,625 715,655" fill="#2A9D8F" opacity="0.85"/>
  <polygon points="470,730 490,710 510,730" fill="#E76F51" opacity="0.85"/>
  <polygon points="230,720 210,700 250,700" fill="#6D2E46" opacity="0.85"/>
  <polygon points="70,530 50,510 70,490" fill="#457B9D" opacity="0.85"/>
  <polygon points="75,300 55,280 95,280" fill="#264653" opacity="0.85"/>

  <!-- Center circle -->
  <circle cx="400" cy="400" r="35" fill="#000000"/>
  <circle cx="400" cy="400" r="20" fill="#FEFAE0"/>
  <circle cx="400" cy="400" r="8" fill="#E63946"/>

  <!-- Outer decorative circles at corners -->
  <circle cx="80" cy="80" r="18" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <circle cx="720" cy="80" r="18" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <circle cx="80" cy="720" r="18" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <circle cx="720" cy="720" r="18" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
</svg>
