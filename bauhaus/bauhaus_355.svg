<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Warm gray background -->
  <rect x="0" y="0" width="800" height="800" fill="#A89F91"/>

  <!-- 6x6 grid of squares, slightly off-center (starting at 75,75) -->
  <!-- Row 1 -->
  <rect x="75" y="75" width="100" height="100" fill="#1D3557" opacity="0.8"/>
  <rect x="185" y="75" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <circle cx="235" cy="125" r="40" fill="#E63946" opacity="0.7"/>
  <rect x="295" y="75" width="100" height="100" fill="#F4D35E" opacity="0.75"/>
  <rect x="405" y="75" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <rect x="515" y="75" width="100" height="100" fill="#2A9D8F" opacity="0.7"/>
  <rect x="625" y="75" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <circle cx="675" cy="125" r="40" fill="#1D3557" opacity="0.6"/>

  <!-- Row 2 -->
  <rect x="75" y="185" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <circle cx="125" cy="235" r="40" fill="#F4D35E" opacity="0.7"/>
  <rect x="185" y="185" width="100" height="100" fill="#E63946" opacity="0.8"/>
  <rect x="295" y="185" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <rect x="345" y="235" width="70" height="70" fill="#264653" opacity="0.7" transform="rotate(45, 345, 235)"/>
  <rect x="405" y="185" width="100" height="100" fill="#E76F51" opacity="0.7"/>
  <rect x="515" y="185" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <rect x="625" y="185" width="100" height="100" fill="#F4D35E" opacity="0.65"/>

  <!-- Row 3 -->
  <rect x="75" y="295" width="100" height="100" fill="#E76F51" opacity="0.75"/>
  <rect x="185" y="295" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <rect x="235" y="345" width="70" height="70" fill="#E63946" opacity="0.6" transform="rotate(45, 235, 345)"/>
  <rect x="295" y="295" width="100" height="100" fill="#1D3557" opacity="0.7"/>
  <rect x="405" y="295" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <circle cx="455" cy="345" r="40" fill="#2A9D8F" opacity="0.7"/>
  <rect x="515" y="295" width="100" height="100" fill="#DDA15E" opacity="0.75"/>
  <rect x="625" y="295" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>

  <!-- Row 4 -->
  <rect x="75" y="405" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <rect x="125" y="455" width="70" height="70" fill="#1D3557" opacity="0.65" transform="rotate(45, 125, 455)"/>
  <rect x="185" y="405" width="100" height="100" fill="#2A9D8F" opacity="0.7"/>
  <rect x="295" y="405" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <circle cx="345" cy="455" r="40" fill="#F4D35E" opacity="0.75"/>
  <rect x="405" y="405" width="100" height="100" fill="#6D2E46" opacity="0.8"/>
  <rect x="515" y="405" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <rect x="565" y="455" width="70" height="70" fill="#E63946" opacity="0.6" transform="rotate(45, 565, 455)"/>
  <rect x="625" y="405" width="100" height="100" fill="#457B9D" opacity="0.7"/>

  <!-- Row 5 -->
  <rect x="75" y="515" width="100" height="100" fill="#F4D35E" opacity="0.7"/>
  <rect x="185" y="515" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <rect x="295" y="515" width="100" height="100" fill="#264653" opacity="0.8"/>
  <rect x="405" y="515" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <circle cx="455" cy="565" r="40" fill="#E76F51" opacity="0.7"/>
  <rect x="515" y="515" width="100" height="100" fill="#E63946" opacity="0.75"/>
  <rect x="625" y="515" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <rect x="675" y="565" width="70" height="70" fill="#F4D35E" opacity="0.6" transform="rotate(45, 675, 565)"/>

  <!-- Row 6 -->
  <rect x="75" y="625" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <circle cx="125" cy="675" r="40" fill="#6D2E46" opacity="0.7"/>
  <rect x="185" y="625" width="100" height="100" fill="#457B9D" opacity="0.7"/>
  <rect x="295" y="625" width="100" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <rect x="345" y="675" width="70" height="70" fill="#2A9D8F" opacity="0.55" transform="rotate(45, 345, 675)"/>
  <rect x="405" y="625" width="100" height="100" fill="#1D3557" opacity="0.8"/>
  <rect x="515" y="625" width="100" height="100" fill="#FEFAE0" opacity="0.6"/>
  <rect x="625" y="625" width="100" height="100" fill="#E63946" opacity="0.75"/>
</svg>