  <path d="M335,90 L320,70 L305,95 L290,75 L278,100" fill="none" stroke="#E63946" stroke-width="2.5" opacity="0.85"/>
  <path d="M630,200 L650,185 L655,210 L675,195 L670,220" fill="none" stroke="#E63946" stroke-width="2.5" opacity="0.85"/>
