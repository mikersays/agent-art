  <line x1="420" y1="380" x2="160" y2="530" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="420" y1="380" x2="120" y2="380" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="420" y1="380" x2="160" y2="230" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
