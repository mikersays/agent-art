  <circle cx="420" cy="680" r="8" fill="#F4D35E" opacity="0.95"/>
  <circle cx="160" cy="530" r="8" fill="#F4D35E" opacity="0.95"/>
  <circle cx="120" cy="380" r="8" fill="#F4D35E" opacity="0.95"/>
  <circle cx="160" cy="230" r="8" fill="#F4D35E" opacity="0.95"/>
  <circle cx="570" cy="120" r="6" fill="#F4D35E" opacity="0.8"/>
  <circle cx="270" cy="120" r="6" fill="#F4D35E" opacity="0.8"/>
