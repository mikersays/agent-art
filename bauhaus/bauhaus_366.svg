<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Large rectangles divided by thick black lines - Mondrian style -->
  <!-- Top-left large white rectangle -->
  <rect x="4" y="4" width="460" height="340" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
  <!-- Top-right tall rectangle - RED -->
  <rect x="464" y="4" width="332" height="220" fill="#E63946" stroke="#000000" stroke-width="8"/>
  <!-- Mid-right rectangle - white -->
  <rect x="464" y="224" width="332" height="120" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
  <!-- Large center-left rectangle - BLUE (dominant) -->
  <rect x="4" y="344" width="300" height="452" fill="#1D3557" stroke="#000000" stroke-width="8"/>
  <!-- Center rectangle - YELLOW -->
  <rect x="304" y="344" width="160" height="200" fill="#F4D35E" stroke="#000000" stroke-width="8"/>
  <!-- Center-right rectangle - white -->
  <rect x="464" y="344" width="200" height="200" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
  <!-- Far right mid rectangle - cream -->
  <rect x="664" y="344" width="132" height="200" fill="#FEFAE0" stroke="#000000" stroke-width="8"/>
  <!-- Bottom center rectangle - white -->
  <rect x="304" y="544" width="160" height="252" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
  <!-- Bottom right large rectangle - white -->
  <rect x="464" y="544" width="332" height="140" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
  <!-- Bottom far right rectangle - RED -->
  <rect x="464" y="684" width="200" height="112" fill="#E63946" stroke="#000000" stroke-width="8"/>
  <!-- Small bottom-right rectangle - cream -->
  <rect x="664" y="684" width="132" height="112" fill="#FEFAE0" stroke="#000000" stroke-width="8"/>

  <!-- Small teal accent rectangle -->
  <rect x="680" y="700" width="40" height="30" fill="#2A9D8F" stroke="#000000" stroke-width="4"/>
  <!-- Small orange accent rectangle -->
  <rect x="730" y="700" width="50" height="30" fill="#E76F51" stroke="#000000" stroke-width="4"/>
  <!-- Another small teal rectangle top area -->
  <rect x="480" y="240" width="35" height="25" fill="#2A9D8F" stroke="#000000" stroke-width="4"/>
  <!-- Small orange in center area -->
  <rect x="320" y="560" width="30" height="35" fill="#E76F51" stroke="#000000" stroke-width="4"/>

  <!-- Additional subdivisions with thick lines -->
  <line x1="200" y1="4" x2="200" y2="344" stroke="#000000" stroke-width="8"/>
  <rect x="4" y="4" width="196" height="160" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
  <rect x="4" y="164" width="196" height="180" fill="#FEFAE0" stroke="#000000" stroke-width="8"/>
  <rect x="200" y="4" width="264" height="160" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
  <rect x="200" y="164" width="264" height="180" fill="#F4D35E" stroke="#000000" stroke-width="8"/>

  <!-- Extra small accent squares -->
  <rect x="210" y="174" width="20" height="20" fill="#2A9D8F" stroke="#000000" stroke-width="3"/>
  <rect x="420" y="310" width="25" height="25" fill="#E76F51" stroke="#000000" stroke-width="3"/>
  <rect x="14" y="360" width="18" height="18" fill="#FFFFFF" stroke="none"/>
  <rect x="14" y="760" width="22" height="22" fill="#E76F51" stroke="#000000" stroke-width="3"/>

  <!-- Horizontal and vertical structural lines -->
  <line x1="560" y1="344" x2="560" y2="544" stroke="#000000" stroke-width="8"/>
  <rect x="464" y="344" width="96" height="200" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
  <rect x="560" y="344" width="104" height="200" fill="#FEFAE0" stroke="#000000" stroke-width="8"/>
</svg>