<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Subtle background grid -->
  <g stroke="#A8DADC" stroke-width="0.3" opacity="0.4">
    <line x1="0" y1="0" x2="800" y2="800"/>
    <line x1="800" y1="0" x2="0" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
  </g>

  <!-- Target 1 - Large, upper left -->
  <circle cx="250" cy="250" r="140" fill="#FFFFFF" stroke="#000000" stroke-width="3"/>
  <circle cx="250" cy="250" r="115" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <circle cx="250" cy="250" r="90" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="250" cy="250" r="65" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <circle cx="250" cy="250" r="40" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="250" cy="250" r="18" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <!-- Crosshair 1 -->
  <line x1="80" y1="250" x2="420" y2="250" stroke="#000000" stroke-width="1.5"/>
  <line x1="250" y1="80" x2="250" y2="420" stroke="#000000" stroke-width="1.5"/>
  <!-- Tick marks -->
  <line x1="250" y1="105" x2="250" y2="120" stroke="#000000" stroke-width="2"/>
  <line x1="250" y1="380" x2="250" y2="395" stroke="#000000" stroke-width="2"/>
  <line x1="105" y1="250" x2="120" y2="250" stroke="#000000" stroke-width="2"/>
  <line x1="380" y1="250" x2="395" y2="250" stroke="#000000" stroke-width="2"/>

  <!-- Target 2 - Medium, right side, overlapping target 1 -->
  <circle cx="520" cy="300" r="110" fill="#FFFFFF" stroke="#000000" stroke-width="3"/>
  <circle cx="520" cy="300" r="88" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <circle cx="520" cy="300" r="66" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="520" cy="300" r="44" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <circle cx="520" cy="300" r="22" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="520" cy="300" r="8" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <!-- Crosshair 2 -->
  <line x1="390" y1="300" x2="650" y2="300" stroke="#E63946" stroke-width="1.5"/>
  <line x1="520" y1="170" x2="520" y2="430" stroke="#E63946" stroke-width="1.5"/>
  <!-- Tick marks -->
  <line x1="520" y1="185" x2="520" y2="198" stroke="#E63946" stroke-width="2"/>
  <line x1="520" y1="402" x2="520" y2="415" stroke="#E63946" stroke-width="2"/>
  <line x1="405" y1="300" x2="418" y2="300" stroke="#E63946" stroke-width="2"/>
  <line x1="622" y1="300" x2="635" y2="300" stroke="#E63946" stroke-width="2"/>

  <!-- Target 3 - Large, lower center -->
  <circle cx="400" cy="560" r="160" fill="#FFFFFF" stroke="#000000" stroke-width="3"/>
  <circle cx="400" cy="560" r="132" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <circle cx="400" cy="560" r="104" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="400" cy="560" r="76" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <circle cx="400" cy="560" r="48" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="400" cy="560" r="22" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <!-- Crosshair 3 -->
  <line x1="210" y1="560" x2="590" y2="560" stroke="#000000" stroke-width="1.5"/>
  <line x1="400" y1="370" x2="400" y2="750" stroke="#000000" stroke-width="1.5"/>
  <!-- Diagonal crosshairs -->
  <line x1="290" y1="450" x2="510" y2="670" stroke="#A89F91" stroke-width="1"/>
  <line x1="510" y1="450" x2="290" y2="670" stroke="#A89F91" stroke-width="1"/>
  <!-- Tick marks -->
  <line x1="400" y1="395" x2="400" y2="410" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="710" x2="400" y2="725" stroke="#000000" stroke-width="2"/>
  <line x1="235" y1="560" x2="250" y2="560" stroke="#000000" stroke-width="2"/>
  <line x1="550" y1="560" x2="565" y2="560" stroke="#000000" stroke-width="2"/>

  <!-- Target 4 - Small, upper right -->
  <circle cx="680" cy="130" r="70" fill="#FFFFFF" stroke="#000000" stroke-width="3"/>
  <circle cx="680" cy="130" r="55" fill="#457B9D" stroke="#000000" stroke-width="2"/>
  <circle cx="680" cy="130" r="40" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="680" cy="130" r="25" fill="#457B9D" stroke="#000000" stroke-width="2"/>
  <circle cx="680" cy="130" r="10" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <!-- Crosshair 4 -->
  <line x1="595" y1="130" x2="765" y2="130" stroke="#000000" stroke-width="1"/>
  <line x1="680" y1="45" x2="680" y2="215" stroke="#000000" stroke-width="1"/>

  <!-- Target 5 - Small, lower left -->
  <circle cx="100" cy="600" r="65" fill="#FFFFFF" stroke="#000000" stroke-width="3"/>
  <circle cx="100" cy="600" r="50" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <circle cx="100" cy="600" r="35" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="100" cy="600" r="20" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <circle cx="100" cy="600" r="7" fill="#000000" stroke="none"/>
  <!-- Crosshair 5 -->
  <line x1="20" y1="600" x2="180" y2="600" stroke="#1D3557" stroke-width="1.5"/>
  <line x1="100" y1="520" x2="100" y2="680" stroke="#1D3557" stroke-width="1.5"/>

  <!-- Target 6 - Tiny, scattered -->
  <circle cx="700" cy="550" r="40" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="700" cy="550" r="28" fill="#A8DADC" stroke="#000000" stroke-width="1.5"/>
  <circle cx="700" cy="550" r="16" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <circle cx="700" cy="550" r="6" fill="#1D3557" stroke="none"/>
  <line x1="650" y1="550" x2="750" y2="550" stroke="#000000" stroke-width="1"/>
  <line x1="700" y1="500" x2="700" y2="600" stroke="#000000" stroke-width="1"/>

  <!-- Target 7 - Tiny top center -->
  <circle cx="400" cy="80" r="45" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="400" cy="80" r="33" fill="#A89F91" stroke="#000000" stroke-width="1.5"/>
  <circle cx="400" cy="80" r="21" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <circle cx="400" cy="80" r="9" fill="#000000" stroke="none"/>
  <line x1="345" y1="80" x2="455" y2="80" stroke="#E63946" stroke-width="1"/>
  <line x1="400" y1="25" x2="400" y2="135" stroke="#E63946" stroke-width="1"/>

  <!-- Hit markers / bullet holes -->
  <circle cx="260" cy="240" r="4" fill="#000000"/>
  <circle cx="245" cy="260" r="3" fill="#000000"/>
  <circle cx="525" cy="295" r="4" fill="#000000"/>
  <circle cx="515" cy="310" r="3" fill="#000000"/>
  <circle cx="405" cy="555" r="4" fill="#000000"/>
  <circle cx="395" cy="570" r="3" fill="#000000"/>
  <circle cx="680" cy="135" r="3" fill="#000000"/>
  <circle cx="103" cy="598" r="3" fill="#000000"/>

  <!-- Score numbers -->
  <text x="250" y="140" font-family="monospace" font-size="14" fill="#000000" text-anchor="middle">10</text>
  <text x="250" y="178" font-family="monospace" font-size="12" fill="#FFFFFF" text-anchor="middle">8</text>
  <text x="250" y="210" font-family="monospace" font-size="12" fill="#000000" text-anchor="middle">6</text>

  <text x="520" y="240" font-family="monospace" font-size="12" fill="#FFFFFF" text-anchor="middle">8</text>
  <text x="520" y="268" font-family="monospace" font-size="10" fill="#000000" text-anchor="middle">6</text>

  <text x="400" y="520" font-family="monospace" font-size="12" fill="#000000" text-anchor="middle">6</text>
  <text x="400" y="498" font-family="monospace" font-size="12" fill="#FFFFFF" text-anchor="middle">4</text>
</svg>