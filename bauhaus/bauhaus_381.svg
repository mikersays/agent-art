<!-- Contour 7 -->
<path d="M350,402 C350,375 362,352 392,345 C412,340 445,345 468,358 C490,370 498,388 499,402 C501,420 492,440 468,452 C445,462 412,465 392,458 C365,450 350,428 350,402Z" fill="none" stroke="#A8DADC" stroke-width="2" opacity="0.7"/>

