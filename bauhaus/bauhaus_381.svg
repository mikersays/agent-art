<!-- Filled inner area -->
<ellipse cx="415" cy="400" rx="25" ry="20" fill="#FEFAE0" opacity="0.5"/>

<!-- Center black dot -->
<circle cx="415" cy="400" r="5" fill="#000000"/>

<!-- Peak markers - red triangles -->
<polygon points="320,280 330,260 340,280" fill="#E63946" opacity="0.85"/>
<polygon points="530,320 540,300 550,320" fill="#E63946" opacity="0.85"/>
<polygon points="280,450 290,430 300,450" fill="#E63946" opacity="0.85"/>
<polygon points="500,520 510,500 520,520" fill="#E63946" opacity="0.85"/>
<polygon points="380,230 390,210 400,230" fill="#E63946" opacity="0.85"/>
<polygon points="600,420 610,400 620,420" fill="#E63946" opacity="0.85"/>
<polygon points="350,580 360,560 370,580" fill="#E63946" opacity="0.85"/>

