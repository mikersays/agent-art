<rect x="765" y="20" width="15" height="15" fill="#264653" opacity="0.3"/>
<rect x="20" y="765" width="15" height="15" fill="#264653" opacity="0.3"/>
<rect x="765" y="765" width="15" height="15" fill="#264653" opacity="0.3"/>

<!-- Structural grid lines -->
<line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
<line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>

<!-- Extra peak triangles for balance -->
<polygon points="450,160 460,140 470,160" fill="#E63946" opacity="0.7"/>
<polygon points="230,360 240,340 250,360" fill="#E63946" opacity="0.7"/>
<polygon points="560,480 570,460 580,480" fill="#E63946" opacity="0.7"/>
</svg>