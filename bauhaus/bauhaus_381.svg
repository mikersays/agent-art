<path d="M160,300 C170,250 210,190 280,160" fill="none" stroke="#264653" stroke-width="1.5" opacity="0.4"/>
<path d="M620,250 C660,290 690,360 695,420" fill="none" stroke="#264653" stroke-width="1.5" opacity="0.4"/>
<path d="M600,600 C560,640 480,670 400,680" fill="none" stroke="#264653" stroke-width="1.5" opacity="0.4"/>
<path d="M200,550 C180,500 170,450 175,390" fill="none" stroke="#264653" stroke-width="1.5" opacity="0.4"/>

<!-- Small accent dots along contours -->
<circle cx="340" cy="120" r="3" fill="#000000" opacity="0.5"/>
<circle cx="600" cy="180" r="3" fill="#000000" opacity="0.5"/>
<circle cx="710" cy="400" r="3" fill="#000000" opacity="0.5"/>
<circle cx="600" cy="650" r="3" fill="#000000" opacity="0.5"/>
<circle cx="140" cy="400" r="3" fill="#000000" opacity="0.5"/>

