<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Background structural grid lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="1" opacity="0.2"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="1" opacity="0.2"/>

  <!-- Additional subtle diagonal lines -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#A89F91" stroke-width="0.8" opacity="0.08"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#A89F91" stroke-width="0.8" opacity="0.08"/>

  <!-- Pendulum arcs - swinging from top edge -->
  <!-- Arc 1: leftmost, teal, long -->
  <path d="M 100 0 A 520 520 0 0 1 540 480" fill="none" stroke="#2A9D8F" stroke-width="4"/>
  <!-- Arc 2: teal, medium -->
  <path d="M 100 0 A 380 380 0 0 1 420 340" fill="none" stroke="#2A9D8F" stroke-width="3" opacity="0.7"/>
  <!-- Arc 3: teal, short -->
  <path d="M 100 0 A 240 240 0 0 1 300 200" fill="none" stroke="#2A9D8F" stroke-width="2" opacity="0.5"/>

  <!-- Arc 4: orange, from left-center pivot -->
  <path d="M 300 0 A 480 480 0 0 1 720 380" fill="none" stroke="#E76F51" stroke-width="5"/>
  <!-- Arc 5: orange, shorter -->
  <path d="M 300 0 A 320 320 0 0 1 580 260" fill="none" stroke="#E76F51" stroke-width="3" opacity="0.65"/>
  <!-- Arc 6: orange, shorter still -->
  <path d="M 300 0 A 180 180 0 0 1 450 140" fill="none" stroke="#E76F51" stroke-width="2" opacity="0.4"/>

  <!-- Arc 7: burgundy, from right-center pivot -->
  <path d="M 550 0 A 440 440 0 0 1 200 360" fill="none" stroke="#6D2E46" stroke-width="5"/>
  <!-- Arc 8: burgundy, medium -->
  <path d="M 550 0 A 300 300 0 0 1 310 240" fill="none" stroke="#6D2E46" stroke-width="3" opacity="0.65"/>
  <!-- Arc 9: burgundy, short -->
  <path d="M 550 0 A 160 160 0 0 1 430 120" fill="none" stroke="#6D2E46" stroke-width="2" opacity="0.4"/>

  <!-- Arc 10: steel blue, from far right -->
  <path d="M 720 0 A 500 500 0 0 0 160 420" fill="none" stroke="#457B9D" stroke-width="4"/>
  <!-- Arc 11: steel blue, medium -->
  <path d="M 720 0 A 340 340 0 0 0 340 280" fill="none" stroke="#457B9D" stroke-width="2.5" opacity="0.6"/>

  <!-- Arc 12: extra wide teal across bottom half -->
  <path d="M 0 400 A 400 400 0 0 1 800 400" fill="none" stroke="#2A9D8F" stroke-width="2" opacity="0.15"/>

  <!-- Endpoint circles at arc termini -->
  <circle cx="540" cy="480" r="14" fill="#2A9D8F"/>
  <circle cx="420" cy="340" r="9" fill="#2A9D8F" opacity="0.75"/>
  <circle cx="300" cy="200" r="6" fill="#2A9D8F" opacity="0.5"/>

  <circle cx="720" cy="380" r="16" fill="#E76F51"/>
  <circle cx="580" cy="260" r="10" fill="#E76F51" opacity="0.75"/>
  <circle cx="450" cy="140" r="6" fill="#E76F51" opacity="0.5"/>

  <circle cx="200" cy="360" r="15" fill="#6D2E46"/>
  <circle cx="310" cy="240" r="10" fill="#6D2E46" opacity="0.75"/>
  <circle cx="430" cy="120" r="6" fill="#6D2E46" opacity="0.5"/>

  <circle cx="160" cy="420" r="13" fill="#457B9D"/>
  <circle cx="340" cy="280" r="8" fill="#457B9D" opacity="0.7"/>

  <!-- Pivot circles at top edge -->
  <circle cx="100" cy="0" r="10" fill="#2A9D8F"/>
  <circle cx="300" cy="0" r="10" fill="#E76F51"/>
  <circle cx="550" cy="0" r="10" fill="#6D2E46"/>
  <circle cx="720" cy="0" r="10" fill="#457B9D"/>

  <!-- Small decorative accent circles scattered -->
  <circle cx="650" cy="600" r="8" fill="#F4D35E" opacity="0.8"/>
  <circle cx="80" cy="680" r="6" fill="#E63946" opacity="0.7"/>
  <circle cx="760" cy="700" r="5" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="400" cy="720" r="7" fill="#6D2E46" opacity="0.5"/>

  <!-- Horizontal accent bars at bottom -->
  <rect x="0" y="760" width="800" height="3" fill="#A89F91" opacity="0.3"/>
  <rect x="0" y="780" width="500" height="2" fill="#A89F91" opacity="0.2"/>
</svg>
