<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Subtle grid structure -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <!-- Base - widest block (dark forest) -->
  <rect x="100" y="680" width="600" height="70" fill="#264653" opacity="0.95"/>
  <!-- Separator line -->
  <line x1="100" y1="680" x2="700" y2="680" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Layer 2 - dark blue -->
  <rect x="130" y="610" width="540" height="65" fill="#1D3557" opacity="0.9"/>
  <line x1="130" y1="610" x2="670" y2="610" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Layer 3 - steel blue -->
  <rect x="160" y="545" width="480" height="60" fill="#457B9D" opacity="0.85"/>
  <line x1="160" y1="545" x2="640" y2="545" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Layer 4 - burgundy -->
  <rect x="190" y="485" width="420" height="55" fill="#6D2E46" opacity="0.8"/>
  <line x1="190" y1="485" x2="610" y2="485" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Layer 5 - teal -->
  <rect x="215" y="430" width="370" height="50" fill="#2A9D8F" opacity="0.8"/>
  <line x1="215" y1="430" x2="585" y2="430" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Layer 6 - red -->
  <rect x="240" y="375" width="320" height="50" fill="#E63946" opacity="0.85"/>
  <line x1="240" y1="375" x2="560" y2="375" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Layer 7 - orange -->
  <rect x="270" y="325" width="260" height="45" fill="#E76F51" opacity="0.85"/>
  <line x1="270" y1="325" x2="530" y2="325" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Layer 8 - coral/sand -->
  <rect x="300" y="278" width="200" height="42" fill="#DDA15E" opacity="0.8"/>
  <line x1="300" y1="278" x2="500" y2="278" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Layer 9 - yellow -->
  <rect x="330" y="235" width="140" height="38" fill="#F4D35E" opacity="0.9"/>
  <line x1="330" y1="235" x2="470" y2="235" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Layer 10 - bright yellow/orange peak -->
  <rect x="360" y="198" width="80" height="32" fill="#E9C46A" opacity="0.85"/>
  <line x1="360" y1="198" x2="440" y2="198" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- Apex - small red square -->
  <rect x="385" y="170" width="30" height="24" fill="#E63946" opacity="0.95"/>
  <!-- Triangular frame outline connecting base to apex -->
  <line x1="100" y1="750" x2="400" y2="160" stroke="#000000" stroke-width="2" opacity="0.2"/>
  <line x1="700" y1="750" x2="400" y2="160" stroke="#000000" stroke-width="2" opacity="0.2"/>
  <line x1="100" y1="750" x2="700" y2="750" stroke="#000000" stroke-width="2" opacity="0.2"/>
  <!-- Small accent shapes -->
  <circle cx="400" cy="155" r="8" fill="#E63946" opacity="0.9"/>
  <circle cx="150" cy="720" r="10" fill="#F4D35E" opacity="0.7"/>
  <circle cx="650" cy="720" r="10" fill="#F4D35E" opacity="0.7"/>
  <rect x="80" y="770" width="15" height="15" fill="#000000" opacity="0.4"/>
  <rect x="705" y="770" width="15" height="15" fill="#000000" opacity="0.4"/>
  <!-- Floating accent elements outside tower -->
  <circle cx="100" cy="300" r="18" fill="#1D3557" opacity="0.3"/>
  <circle cx="700" cy="350" r="22" fill="#E63946" opacity="0.25"/>
  <rect x="60" y="500" width="20" height="20" fill="#F4D35E" opacity="0.4" transform="rotate(45,70,510)"/>
  <rect x="720" y="550" width="16" height="16" fill="#2A9D8F" opacity="0.4" transform="rotate(30,728,558)"/>
  <circle cx="750" cy="200" r="12" fill="#E76F51" opacity="0.35"/>
  <circle cx="50" cy="600" r="14" fill="#457B9D" opacity="0.3"/>
</svg>