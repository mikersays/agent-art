  <line x1="430" y1="380" x2="607" y2="557" stroke="#FEFAE0" stroke-width="0.8" opacity="0.15"/>
  <line x1="430" y1="380" x2="253" y2="203" stroke="#FEFAE0" stroke-width="0.8" opacity="0.15"/>
  <line x1="430" y1="380" x2="253" y2="557" stroke="#FEFAE0" stroke-width="0.8" opacity="0.15"/>
  <!-- Orbiting red squares -->
  <rect x="415" y="115" width="18" height="18" fill="#E63946" opacity="0.95" transform="rotate(15,424,124)"/>
