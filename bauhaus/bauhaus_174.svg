<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#F4D35E"/>

  <!-- Ground line -->
  <rect x="0" y="700" width="800" height="100" fill="#2A9D8F"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#000" stroke-width="3"/>

  <!-- Tower base - wide trapezoid -->
  <polygon points="300,700 500,700 470,620 330,620" fill="#1D3557" stroke="#000" stroke-width="3"/>

  <!-- Tower second section -->
  <rect x="340" y="480" width="120" height="140" fill="#1D3557" stroke="#000" stroke-width="3"/>

  <!-- Tower third section -->
  <rect x="355" y="340" width="90" height="140" fill="#1D3557" stroke="#000" stroke-width="3"/>

  <!-- Tower top section -->
  <rect x="370" y="220" width="60" height="120" fill="#1D3557" stroke="#000" stroke-width="3"/>

  <!-- Tower crown / finial -->
  <rect x="385" y="180" width="30" height="40" fill="#000" stroke="#000" stroke-width="2"/>
  <polygon points="400,140 385,180 415,180" fill="#E63946" stroke="#000" stroke-width="2"/>
  <circle cx="400" cy="135" r="8" fill="#E63946" stroke="#000" stroke-width="2"/>

  <!-- Horizontal cross beams -->
  <rect x="330" y="615" width="140" height="8" fill="#000"/>
  <rect x="340" y="540" width="120" height="6" fill="#000"/>
  <rect x="355" y="410" width="90" height="6" fill="#000"/>
  <rect x="370" y="300" width="60" height="5" fill="#000"/>

  <!-- Semaphore arm 1 (top) - angled up-right at 45 degrees -->
  <g transform="translate(400,240)">
    <line x1="0" y1="0" x2="120" y2="-80" stroke="#000" stroke-width="8" stroke-linecap="round"/>
    <rect x="90" y="-95" width="50" height="30" rx="3" fill="#E63946" stroke="#000" stroke-width="2" transform="rotate(-34, 115, -80)"/>
    <circle cx="0" cy="0" r="10" fill="#E76F51" stroke="#000" stroke-width="2"/>
  </g>

  <!-- Semaphore arm 2 (top) - angled up-left -->
  <g transform="translate(400,240)">
    <line x1="0" y1="0" x2="-100" y2="-100" stroke="#000" stroke-width="8" stroke-linecap="round"/>
    <rect x="-130" y="-120" width="50" height="30" rx="3" fill="#F4D35E" stroke="#000" stroke-width="2" transform="rotate(45, -105, -105)"/>
  </g>

  <!-- Semaphore arm 3 (middle) - horizontal right -->
  <g transform="translate(400,370)">
    <line x1="0" y1="0" x2="140" y2="0" stroke="#000" stroke-width="8" stroke-linecap="round"/>
    <rect x="110" y="-15" width="50" height="30" rx="3" fill="#E63946" stroke="#000" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#E76F51" stroke="#000" stroke-width="2"/>
  </g>

  <!-- Semaphore arm 4 (middle) - angled down-left -->
  <g transform="translate(400,370)">
    <line x1="0" y1="0" x2="-130" y2="40" stroke="#000" stroke-width="8" stroke-linecap="round"/>
    <rect x="-160" y="25" width="50" height="30" rx="3" fill="#2A9D8F" stroke="#000" stroke-width="2" transform="rotate(-17, -135, 40)"/>
  </g>

  <!-- Semaphore arm 5 (lower) - angled up-right -->
  <g transform="translate(400,510)">
    <line x1="0" y1="0" x2="110" y2="-60" stroke="#000" stroke-width="7" stroke-linecap="round"/>
    <rect x="85" y="-75" width="45" height="28" rx="3" fill="#F4D35E" stroke="#000" stroke-width="2" transform="rotate(-29, 108, -61)"/>
    <circle cx="0" cy="0" r="9" fill="#E76F51" stroke="#000" stroke-width="2"/>
  </g>

  <!-- Semaphore arm 6 (lower) - horizontal left -->
  <g transform="translate(400,510)">
    <line x1="0" y1="0" x2="-120" y2="0" stroke="#000" stroke-width="7" stroke-linecap="round"/>
    <rect x="-145" y="-14" width="45" height="28" rx="3" fill="#E63946" stroke="#000" stroke-width="2"/>
  </g>

  <!-- Window details on tower -->
  <rect x="380" y="260" width="15" height="20" fill="#F4D35E" stroke="#000" stroke-width="1"/>
  <rect x="405" y="260" width="15" height="20" fill="#F4D35E" stroke="#000" stroke-width="1"/>
  <rect x="365" y="360" width="18" height="25" fill="#F4D35E" stroke="#000" stroke-width="1"/>
  <rect x="417" y="360" width="18" height="25" fill="#F4D35E" stroke="#000" stroke-width="1"/>
  <rect x="355" y="500" width="20" height="25" fill="#F4D35E" stroke="#000" stroke-width="1"/>
  <rect x="425" y="500" width="20" height="25" fill="#F4D35E" stroke="#000" stroke-width="1"/>

  <!-- Ground details -->
  <circle cx="200" cy="740" r="5" fill="#1D3557"/>
  <circle cx="600" cy="730" r="7" fill="#1D3557"/>
  <rect x="100" y="710" width="40" height="25" fill="#1D3557" opacity="0.5"/>
  <rect x="650" y="715" width="50" height="20" fill="#1D3557" opacity="0.5"/>

  <!-- Decorative circles on background -->
  <circle cx="120" cy="200" r="30" fill="#E76F51" opacity="0.4"/>
  <circle cx="680" cy="300" r="25" fill="#E63946" opacity="0.3"/>
</svg>