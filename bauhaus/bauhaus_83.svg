<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Lever and Fulcrum - Multiple lever/seesaw compositions -->

  <!-- === LEVER 1: Top - balanced seesaw === -->
  <!-- Fulcrum triangle -->
  <polygon points="200,220 180,260 220,260" fill="#000000"/>
  <!-- Horizontal bar -->
  <rect x="60" y="210" width="280" height="8" fill="#1D3557"/>
  <!-- Left shape: large circle -->
  <circle cx="80" cy="195" r="25" fill="#E63946"/>
  <!-- Right shape: small square -->
  <rect x="310" y="185" width="20" height="20" fill="#F4D35E"/>

  <!-- === LEVER 2: Top right - tilted seesaw === -->
  <!-- Fulcrum triangle -->
  <polygon points="600,230 580,270 620,270" fill="#000000"/>
  <!-- Tilted horizontal bar -->
  <rect x="480" y="208" width="260" height="8" fill="#2A9D8F" transform="rotate(-8, 600, 212)"/>
  <!-- Left shape: heavy rectangle -->
  <rect x="485" y="172" width="50" height="30" fill="#1D3557"/>
  <!-- Right shape: small circle -->
  <circle cx="720" cy="210" r="15" fill="#E76F51"/>

  <!-- === LEVER 3: Middle - wide balanced seesaw === -->
  <!-- Fulcrum triangle -->
  <polygon points="400,460 370,510 430,510" fill="#000000"/>
  <!-- Horizontal bar -->
  <rect x="120" y="448" width="560" height="10" fill="#457B9D"/>
  <!-- Left shape: two stacked circles -->
  <circle cx="170" cy="425" r="22" fill="#E63946"/>
  <circle cx="170" cy="395" r="16" fill="#F4D35E"/>
  <!-- Right shape: large triangle -->
  <polygon points="630,448 600,400 660,400" fill="#2A9D8F"/>
  <!-- Small accent shapes on the bar -->
  <rect x="280" y="432" width="16" height="16" fill="#E76F51"/>
  <circle cx="500" cy="440" r="8" fill="#1D3557"/>

  <!-- === LEVER 4: Bottom - asymmetric fulcrum === -->
  <!-- Fulcrum triangle (off-center) -->
  <polygon points="300,700 275,740 325,740" fill="#000000"/>
  <!-- Horizontal bar tilted because of asymmetric load -->
  <rect x="100" y="686" width="500" height="8" fill="#E63946" transform="rotate(5, 300, 690)"/>
  <!-- Left shape: large heavy square -->
  <rect x="105" y="644" width="45" height="45" fill="#1D3557"/>
  <!-- Right shapes: three small circles -->
  <circle cx="480" cy="672" r="12" fill="#F4D35E"/>
  <circle cx="520" cy="672" r="10" fill="#2A9D8F"/>
  <circle cx="555" cy="672" r="8" fill="#E76F51"/>

  <!-- Ground lines under fulcrums -->
  <line x1="40" y1="265" x2="360" y2="265" stroke="#000000" stroke-width="2"/>
  <line x1="460" y1="275" x2="760" y2="275" stroke="#000000" stroke-width="2"/>
  <line x1="80" y1="515" x2="720" y2="515" stroke="#000000" stroke-width="2"/>
  <line x1="60" y1="745" x2="640" y2="745" stroke="#000000" stroke-width="2"/>
</svg>