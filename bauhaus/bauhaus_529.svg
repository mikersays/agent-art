<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Sky -->
  <rect width="800" height="530" fill="#FEFAE0"/>
  <!-- Ground -->
  <rect x="0" y="530" width="800" height="270" fill="#A89F91"/>
  <!-- Ground line -->
  <line x1="0" y1="530" x2="800" y2="530" stroke="#000000" stroke-width="2"/>
  <!-- Left support column -->
  <rect x="80" y="300" width="40" height="230" fill="#1D3557"/>
  <rect x="85" y="290" width="30" height="15" fill="#1D3557"/>
  <!-- Left column foundation -->
  <rect x="60" y="520" width="80" height="20" fill="#000000"/>
  <!-- Right support column -->
  <rect x="680" y="300" width="40" height="230" fill="#1D3557"/>
  <rect x="685" y="290" width="30" height="15" fill="#1D3557"/>
  <!-- Right column foundation -->
  <rect x="660" y="520" width="80" height="20" fill="#000000"/>
  <!-- Bridge deck - main horizontal -->
  <rect x="60" y="340" width="680" height="25" fill="#E63946"/>
  <rect x="60" y="365" width="680" height="8" fill="#000000" opacity="0.7"/>
  <!-- Bridge deck bottom rail -->
  <rect x="60" y="420" width="680" height="12" fill="#E63946" opacity="0.8"/>
  <!-- Truss triangles - upper -->
  <polygon points="100,340 180,340 140,290" fill="none" stroke="#1D3557" stroke-width="2.5"/>
  <polygon points="180,340 260,340 220,290" fill="none" stroke="#1D3557" stroke-width="2.5"/>
  <polygon points="260,340 340,340 300,290" fill="none" stroke="#1D3557" stroke-width="2.5"/>
  <polygon points="340,340 420,340 380,290" fill="none" stroke="#1D3557" stroke-width="2.5"/>
  <polygon points="420,340 500,340 460,290" fill="none" stroke="#1D3557" stroke-width="2.5"/>
  <polygon points="500,340 580,340 540,290" fill="none" stroke="#1D3557" stroke-width="2.5"/>
  <polygon points="580,340 660,340 620,290" fill="none" stroke="#1D3557" stroke-width="2.5"/>
  <polygon points="660,340 740,340 700,290" fill="none" stroke="#1D3557" stroke-width="2.5"/>
  <!-- Truss verticals between decks -->
  <line x1="140" y1="365" x2="140" y2="420" stroke="#457B9D" stroke-width="2"/>
  <line x1="220" y1="365" x2="220" y2="420" stroke="#457B9D" stroke-width="2"/>
  <line x1="300" y1="365" x2="300" y2="420" stroke="#457B9D" stroke-width="2"/>
  <line x1="380" y1="365" x2="380" y2="420" stroke="#457B9D" stroke-width="2"/>
  <line x1="460" y1="365" x2="460" y2="420" stroke="#457B9D" stroke-width="2"/>
  <line x1="540" y1="365" x2="540" y2="420" stroke="#457B9D" stroke-width="2"/>
  <line x1="620" y1="365" x2="620" y2="420" stroke="#457B9D" stroke-width="2"/>
  <line x1="700" y1="365" x2="700" y2="420" stroke="#457B9D" stroke-width="2"/>
  <!-- Yellow accent joints on trusses -->
  <circle cx="140" cy="290" r="6" fill="#F4D35E"/>
  <circle cx="220" cy="290" r="6" fill="#F4D35E"/>
  <circle cx="300" cy="290" r="6" fill="#F4D35E"/>
  <circle cx="380" cy="290" r="6" fill="#F4D35E"/>
  <circle cx="460" cy="290" r="6" fill="#F4D35E"/>
  <circle cx="540" cy="290" r="6" fill="#F4D35E"/>
  <circle cx="620" cy="290" r="6" fill="#F4D35E"/>
  <circle cx="700" cy="290" r="6" fill="#F4D35E"/>
  <!-- Cable lines above -->
  <line x1="100" y1="290" x2="400" y2="180" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="700" y1="290" x2="400" y2="180" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="290" x2="400" y2="200" stroke="#000000" stroke-width="0.8" opacity="0.4"/>
  <line x1="620" y1="290" x2="400" y2="200" stroke="#000000" stroke-width="0.8" opacity="0.4"/>
  <line x1="260" y1="290" x2="400" y2="220" stroke="#000000" stroke-width="0.8" opacity="0.35"/>
  <line x1="540" y1="290" x2="400" y2="220" stroke="#000000" stroke-width="0.8" opacity="0.35"/>
  <!-- Cable tower -->
  <rect x="392" y="150" width="16" height="145" fill="#000000"/>
  <circle cx="400" cy="148" r="8" fill="#E63946"/>
  <!-- Ground details -->
  <rect x="0" y="600" width="800" height="3" fill="#000000" opacity="0.1"/>
  <rect x="0" y="650" width="800" height="2" fill="#000000" opacity="0.08"/>
  <!-- Accent shapes in sky -->
  <circle cx="650" cy="100" r="20" fill="#F4D35E" opacity="0.3"/>
  <rect x="50" y="120" width="30" height="8" fill="#E76F51" opacity="0.25"/>
  <rect x="50" y="135" width="20" height="8" fill="#E76F51" opacity="0.2"/>
</svg>