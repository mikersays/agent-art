<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle background grid -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>

  <!-- Layer 1: Large blue block (back) -->
  <rect x="80" y="120" width="420" height="360" fill="#1D3557" opacity="0.4"/>
  <rect x="80" y="120" width="420" height="360" fill="none" stroke="#000000" stroke-width="2.5"/>

  <!-- Layer 2: Large red block offset -->
  <rect x="180" y="200" width="400" height="340" fill="#E63946" opacity="0.5"/>
  <rect x="180" y="200" width="400" height="340" fill="none" stroke="#000000" stroke-width="2.5"/>

  <!-- Layer 3: Yellow block offset further -->
  <rect x="280" y="280" width="380" height="320" fill="#F4D35E" opacity="0.3"/>
  <rect x="280" y="280" width="380" height="320" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Layer 4: Forest green block -->
  <rect x="150" y="350" width="350" height="300" fill="#264653" opacity="0.6"/>
  <rect x="150" y="350" width="350" height="300" fill="none" stroke="#000000" stroke-width="2.5"/>

  <!-- Layer 5: Teal block on top -->
  <rect x="340" y="150" width="300" height="250" fill="#2A9D8F" opacity="0.35"/>
  <rect x="340" y="150" width="300" height="250" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Layer 6: Burgundy narrow block -->
  <rect x="100" y="450" width="250" height="180" fill="#6D2E46" opacity="0.45"/>
  <rect x="100" y="450" width="250" height="180" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Layer 7: Steel blue small block -->
  <rect x="450" y="420" width="220" height="200" fill="#457B9D" opacity="0.4"/>
  <rect x="450" y="420" width="220" height="200" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Layer 8: Sand colored block -->
  <rect x="520" y="100" width="180" height="160" fill="#DDA15E" opacity="0.5"/>
  <rect x="520" y="100" width="180" height="160" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Scattered orange circles -->
  <circle cx="130" cy="160" r="18" fill="#E76F51" opacity="0.8"/>
  <circle cx="620" cy="700" r="14" fill="#E76F51" opacity="0.7"/>
  <circle cx="710" cy="340" r="12" fill="#E76F51" opacity="0.75"/>
  <circle cx="250" cy="710" r="16" fill="#E76F51" opacity="0.65"/>
  <circle cx="480" cy="120" r="10" fill="#E76F51" opacity="0.8"/>
  <circle cx="690" cy="560" r="20" fill="#E76F51" opacity="0.6"/>
  <circle cx="90" cy="540" r="9" fill="#E76F51" opacity="0.7"/>
  <circle cx="400" cy="680" r="13" fill="#E76F51" opacity="0.75"/>

  <!-- Small black accent squares -->
  <rect x="720" y="720" width="30" height="30" fill="#000000" opacity="0.6"/>
  <rect x="50" y="50" width="25" height="25" fill="#000000" opacity="0.5"/>
  <rect x="730" y="50" width="20" height="20" fill="#000000" opacity="0.4"/>

  <!-- Light blue accent -->
  <rect x="60" y="680" width="60" height="80" fill="#A8DADC" opacity="0.5"/>
  <rect x="60" y="680" width="60" height="80" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Coral accent -->
  <rect x="680" y="680" width="70" height="70" fill="#E9C46A" opacity="0.4"/>
  <rect x="680" y="680" width="70" height="70" fill="none" stroke="#000000" stroke-width="1.5"/>
</svg>