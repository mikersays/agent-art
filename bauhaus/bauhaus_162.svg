<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Panopticon</title>
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Outer circular structure -->
  <circle cx="400" cy="400" r="350" fill="none" stroke="#000" stroke-width="6"/>
  <circle cx="400" cy="400" r="340" fill="none" stroke="#1D3557" stroke-width="2"/>
  <circle cx="400" cy="400" r="280" fill="none" stroke="#000" stroke-width="4"/>
  <circle cx="400" cy="400" r="220" fill="none" stroke="#000" stroke-width="3"/>
  <circle cx="400" cy="400" r="160" fill="none" stroke="#000" stroke-width="3"/>
  <circle cx="400" cy="400" r="100" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Radiating cell divisions -->
  <line x1="400" y1="50" x2="400" y2="750" stroke="#000" stroke-width="3"/>
  <line x1="50" y1="400" x2="750" y2="400" stroke="#000" stroke-width="3"/>
  <line x1="153" y1="153" x2="647" y2="647" stroke="#000" stroke-width="2"/>
  <line x1="647" y1="153" x2="153" y2="647" stroke="#000" stroke-width="2"/>
  <line x1="400" y1="50" x2="270" y2="625" stroke="#1D3557" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="50" x2="530" y2="625" stroke="#1D3557" stroke-width="1.5" opacity="0.4"/>
  <line x1="50" y1="400" x2="625" y2="270" stroke="#1D3557" stroke-width="1.5" opacity="0.4"/>
  <line x1="50" y1="400" x2="625" y2="530" stroke="#1D3557" stroke-width="1.5" opacity="0.4"/>
  <!-- Cell fills - alternating colors in outer ring -->
  <path d="M400,50 A350,350 0 0,1 647,153 L400,400 Z" fill="#E63946" opacity="0.3"/>
  <path d="M750,400 A350,350 0 0,1 647,647 L400,400 Z" fill="#1D3557" opacity="0.3"/>
  <path d="M400,750 A350,350 0 0,1 153,647 L400,400 Z" fill="#F4D35E" opacity="0.3"/>
  <path d="M50,400 A350,350 0 0,1 153,153 L400,400 Z" fill="#2A9D8F" opacity="0.3"/>
  <!-- Central observation tower -->
  <circle cx="400" cy="400" r="50" fill="#000"/>
  <circle cx="400" cy="400" r="40" fill="#1D3557"/>
  <circle cx="400" cy="400" r="25" fill="#E63946"/>
  <circle cx="400" cy="400" r="12" fill="#F4D35E"/>
  <!-- Guard tower details -->
  <rect x="385" y="345" width="30" height="10" fill="#000"/>
  <rect x="385" y="445" width="30" height="10" fill="#000"/>
  <rect x="345" y="385" width="10" height="30" fill="#000"/>
  <rect x="445" y="385" width="10" height="30" fill="#000"/>
  <!-- Surveillance dots along rings -->
  <circle cx="400" cy="120" r="8" fill="#E63946"/>
  <circle cx="598" cy="200" r="8" fill="#1D3557"/>
  <circle cx="680" cy="400" r="8" fill="#2A9D8F"/>
  <circle cx="598" cy="600" r="8" fill="#F4D35E"/>
  <circle cx="400" cy="680" r="8" fill="#E63946"/>
  <circle cx="202" cy="600" r="8" fill="#457B9D"/>
  <circle cx="120" cy="400" r="8" fill="#1D3557"/>
  <circle cx="202" cy="200" r="8" fill="#2A9D8F"/>
  <!-- Inner cell markers -->
  <circle cx="400" cy="240" r="6" fill="#000"/>
  <circle cx="560" cy="400" r="6" fill="#000"/>
  <circle cx="400" cy="560" r="6" fill="#000"/>
  <circle cx="240" cy="400" r="6" fill="#000"/>
</svg>