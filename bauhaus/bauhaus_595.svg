<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Dark background -->
  <rect width="800" height="800" fill="#1D3557"/>
  <rect width="800" height="800" fill="#000000" opacity="0.5"/>

  <!-- LEFT CLUSTER - shapes rushing toward center -->
  <rect x="40" y="340" width="80" height="80" fill="#E63946" opacity="0.8"/>
  <circle cx="140" cy="400" r="35" fill="#F4D35E" opacity="0.7"/>
  <polygon points="60,300 100,260 120,310" fill="#2A9D8F" opacity="0.8"/>
  <rect x="100" y="420" width="50" height="40" fill="#457B9D" opacity="0.7"/>
  <circle cx="80" cy="450" r="20" fill="#E76F51" opacity="0.6"/>

  <!-- Left motion trail lines -->
  <line x1="20" y1="370" x2="180" y2="380" stroke="#E63946" stroke-width="1.5" opacity="0.4"/>
  <line x1="30" y1="390" x2="200" y2="395" stroke="#F4D35E" stroke-width="1" opacity="0.3"/>
  <line x1="10" y1="410" x2="190" y2="405" stroke="#2A9D8F" stroke-width="1" opacity="0.35"/>
  <line x1="40" y1="350" x2="220" y2="370" stroke="#FFFFFF" stroke-width="0.5" opacity="0.2"/>
  <line x1="50" y1="440" x2="210" y2="420" stroke="#E76F51" stroke-width="1" opacity="0.3"/>

  <!-- RIGHT CLUSTER - shapes rushing toward center -->
  <rect x="680" y="350" width="70" height="70" fill="#1D3557" opacity="0.9" stroke="#A8DADC" stroke-width="2"/>
  <circle cx="670" cy="380" r="30" fill="#E63946" opacity="0.7"/>
  <polygon points="720,300 760,280 740,330" fill="#F4D35E" opacity="0.8"/>
  <rect x="660" y="430" width="60" height="35" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="730" cy="450" r="22" fill="#DDA15E" opacity="0.6"/>

  <!-- Right motion trail lines -->
  <line x1="780" y1="375" x2="620" y2="385" stroke="#E63946" stroke-width="1.5" opacity="0.4"/>
  <line x1="770" y1="395" x2="600" y2="400" stroke="#A8DADC" stroke-width="1" opacity="0.3"/>
  <line x1="790" y1="360" x2="610" y2="375" stroke="#F4D35E" stroke-width="1" opacity="0.35"/>
  <line x1="760" y1="415" x2="590" y2="405" stroke="#FFFFFF" stroke-width="0.5" opacity="0.2"/>
  <line x1="750" y1="440" x2="610" y2="425" stroke="#2A9D8F" stroke-width="1" opacity="0.3"/>

  <!-- CENTER EXPLOSION - scattered small shapes -->
  <!-- Circles -->
  <circle cx="400" cy="400" r="8" fill="#E63946" opacity="0.9"/>
  <circle cx="370" cy="360" r="6" fill="#F4D35E" opacity="0.85"/>
  <circle cx="430" cy="370" r="7" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="390" cy="440" r="5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="420" cy="350" r="9" fill="#E76F51" opacity="0.75"/>
  <circle cx="350" cy="410" r="6" fill="#A8DADC" opacity="0.8"/>
  <circle cx="450" cy="420" r="7" fill="#E9C46A" opacity="0.7"/>
  <circle cx="380" cy="330" r="4" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="440" cy="450" r="5" fill="#E63946" opacity="0.7"/>

  <!-- Triangles -->
  <polygon points="360,380 370,365 380,380" fill="#F4D35E" opacity="0.9"/>
  <polygon points="420,410 435,395 440,415" fill="#E63946" opacity="0.8"/>
  <polygon points="385,450 395,435 405,455" fill="#2A9D8F" opacity="0.85"/>
  <polygon points="340,350 355,340 350,360" fill="#E76F51" opacity="0.7"/>
  <polygon points="450,370 465,360 460,385" fill="#DDA15E" opacity="0.75"/>

  <!-- Squares -->
  <rect x="395" y="385" width="10" height="10" fill="#FFFFFF" opacity="0.9"/>
  <rect x="355" y="395" width="8" height="8" fill="#1D3557" opacity="0.8" stroke="#A8DADC" stroke-width="1"/>
  <rect x="425" y="430" width="9" height="9" fill="#F4D35E" opacity="0.8"/>
  <rect x="370" y="420" width="7" height="7" fill="#6D2E46" opacity="0.85"/>
  <rect x="440" y="380" width="8" height="8" fill="#264653" opacity="0.7" stroke="#2A9D8F" stroke-width="1"/>
  <rect x="320" y="390" width="6" height="6" fill="#E63946" opacity="0.6"/>
  <rect x="460" y="400" width="6" height="6" fill="#F4D35E" opacity="0.6"/>

  <!-- Explosion radial lines from center -->
  <line x1="400" y1="400" x2="300" y2="300" stroke="#FFFFFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="400" x2="500" y2="280" stroke="#FFFFFF" stroke-width="0.5" opacity="0.25"/>
  <line x1="400" y1="400" x2="300" y2="500" stroke="#FFFFFF" stroke-width="0.5" opacity="0.25"/>
  <line x1="400" y1="400" x2="500" y2="520" stroke="#FFFFFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="400" x2="320" y2="250" stroke="#F4D35E" stroke-width="0.5" opacity="0.15"/>
  <line x1="400" y1="400" x2="480" y2="550" stroke="#E63946" stroke-width="0.5" opacity="0.15"/>

  <!-- Outer scattered debris -->
  <circle cx="300" cy="280" r="3" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="500" cy="260" r="3" fill="#F4D35E" opacity="0.4"/>
  <circle cx="280" cy="500" r="3" fill="#2A9D8F" opacity="0.4"/>
  <circle cx="520" cy="530" r="3" fill="#E63946" opacity="0.4"/>
  <rect x="310" y="520" width="4" height="4" fill="#E76F51" opacity="0.35"/>
  <rect x="490" y="300" width="4" height="4" fill="#A8DADC" opacity="0.35"/>
</svg>