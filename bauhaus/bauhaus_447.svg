<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background: Dark industrial -->
  <rect width="800" height="800" fill="#1a1a1a"/>

  <!-- Heavy horizontal bars -->
  <rect x="0" y="60" width="800" height="18" fill="#457B9D" opacity="0.8"/>
  <rect x="0" y="720" width="800" height="18" fill="#457B9D" opacity="0.8"/>
  <rect x="0" y="390" width="800" height="12" fill="#A89F91" opacity="0.5"/>

  <!-- Heavy vertical bars -->
  <rect x="60" y="0" width="18" height="800" fill="#457B9D" opacity="0.8"/>
  <rect x="722" y="0" width="18" height="800" fill="#457B9D" opacity="0.8"/>
  <rect x="395" y="0" width="10" height="800" fill="#A89F91" opacity="0.4"/>

  <!-- Large gear-like circles with crosshairs -->
  <!-- Gear 1: top-left quadrant -->
  <circle cx="220" cy="230" r="120" fill="#2a2a2a" stroke="#A89F91" stroke-width="6"/>
  <circle cx="220" cy="230" r="90" fill="none" stroke="#457B9D" stroke-width="3"/>
  <circle cx="220" cy="230" r="55" fill="#333333" stroke="#A89F91" stroke-width="4"/>
  <circle cx="220" cy="230" r="20" fill="#A89F91"/>
  <!-- Crosshair lines through gear 1 -->
  <line x1="100" y1="230" x2="340" y2="230" stroke="#A89F91" stroke-width="3"/>
  <line x1="220" y1="110" x2="220" y2="350" stroke="#A89F91" stroke-width="3"/>
  <!-- Gear teeth suggestions -->
  <rect x="212" y="100" width="16" height="20" fill="#457B9D"/>
  <rect x="212" y="340" width="16" height="20" fill="#457B9D"/>
  <rect x="98" y="222" width="20" height="16" fill="#457B9D"/>
  <rect x="340" y="222" width="20" height="16" fill="#457B9D"/>

  <!-- Gear 2: bottom-right quadrant -->
  <circle cx="580" cy="570" r="140" fill="#2a2a2a" stroke="#A89F91" stroke-width="6"/>
  <circle cx="580" cy="570" r="105" fill="none" stroke="#457B9D" stroke-width="3"/>
  <circle cx="580" cy="570" r="65" fill="#333333" stroke="#A89F91" stroke-width="4"/>
  <circle cx="580" cy="570" r="25" fill="#A89F91"/>
  <!-- Crosshair lines through gear 2 -->
  <line x1="438" y1="570" x2="722" y2="570" stroke="#A89F91" stroke-width="3"/>
  <line x1="580" y1="428" x2="580" y2="712" stroke="#A89F91" stroke-width="3"/>
  <!-- Gear teeth -->
  <rect x="572" y="420" width="16" height="22" fill="#457B9D"/>
  <rect x="572" y="712" width="16" height="22" fill="#457B9D"/>
  <rect x="436" y="562" width="22" height="16" fill="#457B9D"/>
  <rect x="720" y="562" width="22" height="16" fill="#457B9D"/>

  <!-- Thick rectangular bars (machine-like) -->
  <rect x="330" y="100" width="140" height="30" fill="#A89F91" opacity="0.9"/>
  <rect x="330" y="670" width="140" height="30" fill="#A89F91" opacity="0.9"/>
  <rect x="100" y="430" width="30" height="120" fill="#A89F91" opacity="0.9"/>
  <rect x="670" y="250" width="30" height="120" fill="#A89F91" opacity="0.9"/>

  <!-- Warning/accent elements: Red -->
  <rect x="330" y="60" width="140" height="22" fill="#E63946" opacity="0.9"/>
  <rect x="338" y="62" width="14" height="18" fill="#F4D35E"/>
  <rect x="360" y="62" width="14" height="18" fill="#F4D35E"/>
  <rect x="382" y="62" width="14" height="18" fill="#F4D35E"/>
  <rect x="404" y="62" width="14" height="18" fill="#F4D35E"/>
  <rect x="426" y="62" width="14" height="18" fill="#F4D35E"/>
  <rect x="448" y="62" width="14" height="18" fill="#F4D35E"/>

  <!-- Triangular brackets (structural) -->
  <polygon points="130,130 160,130 130,160" fill="#E63946"/>
  <polygon points="670,130 640,130 670,160" fill="#E63946"/>
  <polygon points="130,670 160,670 130,640" fill="#E63946"/>
  <polygon points="670,670 640,670 670,640" fill="#E63946"/>

  <!-- Small yellow warning indicators -->
  <circle cx="400" cy="400" r="18" fill="#F4D35E"/>
  <circle cx="400" cy="400" r="10" fill="#1a1a1a"/>
  <circle cx="400" cy="400" r="4" fill="#F4D35E"/>

  <!-- Connecting rods/bars -->
  <rect x="340" y="225" width="130" height="10" fill="#457B9D" opacity="0.7"/>
  <rect x="435" y="225" width="10" height="150" fill="#457B9D" opacity="0.7"/>
  <rect x="340" y="565" width="10" height="-150" fill="#457B9D" opacity="0.7"/>
</svg>
