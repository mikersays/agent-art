<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#1D3557"/>
  <!-- Stars background -->
  <circle cx="100" cy="80" r="2" fill="#FFF"/>
  <circle cx="250" cy="150" r="1.5" fill="#FFF"/>
  <circle cx="600" cy="100" r="2" fill="#FFF"/>
  <circle cx="700" cy="200" r="1.5" fill="#FFF"/>
  <circle cx="150" cy="600" r="2" fill="#FFF"/>
  <circle cx="680" cy="650" r="1.5" fill="#FFF"/>
  <circle cx="50" cy="400" r="2" fill="#FFF"/>
  <circle cx="750" cy="450" r="1.5" fill="#FFF"/>
  <!-- Outermost ring - tilted ellipse 1 -->
  <ellipse cx="400" cy="400" rx="280" ry="100" fill="none" stroke="#E63946" stroke-width="6" transform="rotate(-30,400,400)"/>
  <!-- Ring 2 -->
  <ellipse cx="400" cy="400" rx="280" ry="100" fill="none" stroke="#F4D35E" stroke-width="5" transform="rotate(30,400,400)"/>
  <!-- Ring 3 -->
  <ellipse cx="400" cy="400" rx="280" ry="100" fill="none" stroke="#2A9D8F" stroke-width="5" transform="rotate(90,400,400)"/>
  <!-- Ring 4 - equatorial -->
  <ellipse cx="400" cy="400" rx="260" ry="80" fill="none" stroke="#E76F51" stroke-width="4" transform="rotate(0,400,400)"/>
  <!-- Ring 5 -->
  <ellipse cx="400" cy="400" rx="260" ry="80" fill="none" stroke="#457B9D" stroke-width="4" transform="rotate(60,400,400)"/>
  <!-- Ring 6 -->
  <ellipse cx="400" cy="400" rx="260" ry="80" fill="none" stroke="#FFF" stroke-width="3" transform="rotate(-60,400,400)"/>
  <!-- Inner ring 7 -->
  <ellipse cx="400" cy="400" rx="200" ry="60" fill="none" stroke="#F4D35E" stroke-width="3" transform="rotate(15,400,400)"/>
  <!-- Inner ring 8 -->
  <ellipse cx="400" cy="400" rx="200" ry="60" fill="none" stroke="#E63946" stroke-width="3" transform="rotate(-75,400,400)"/>
  <!-- Central earth circle -->
  <circle cx="400" cy="400" r="55" fill="#2A9D8F"/>
  <circle cx="400" cy="400" r="55" fill="none" stroke="#000" stroke-width="3"/>
  <!-- Earth land masses (geometric) -->
  <rect x="380" y="370" width="25" height="20" fill="#F4D35E" rx="3"/>
  <rect x="410" y="390" width="15" height="25" fill="#F4D35E" rx="3"/>
  <rect x="375" y="400" width="12" height="15" fill="#F4D35E" rx="2"/>
  <!-- Polar axis line -->
  <line x1="400" y1="290" x2="400" y2="510" stroke="#000" stroke-width="3"/>
  <!-- Axis caps -->
  <circle cx="400" cy="290" r="8" fill="#000"/>
  <circle cx="400" cy="510" r="8" fill="#000"/>
  <!-- Degree markings on outer ring -->
  <line x1="400" y1="120" x2="400" y2="140" stroke="#FFF" stroke-width="2"/>
  <line x1="400" y1="660" x2="400" y2="680" stroke="#FFF" stroke-width="2"/>
  <line x1="120" y1="400" x2="140" y2="400" stroke="#FFF" stroke-width="2"/>
  <line x1="660" y1="400" x2="680" y2="400" stroke="#FFF" stroke-width="2"/>
</svg>