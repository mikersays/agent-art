<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background: Cream -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Background grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="0" x2="100" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>

  <!-- Diagonal path guide line -->
  <line x1="60" y1="720" x2="740" y2="80" stroke="#000000" stroke-width="1.5" opacity="0.3"/>

  <!-- Stepping stones: alternating rectangles and circles along diagonal -->
  <!-- Stone 1 (bottom-left) -->
  <rect x="50" y="660" width="90" height="60" fill="#1D3557" opacity="0.9"/>
  <rect x="53" y="663" width="84" height="54" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Stone 2 -->
  <circle cx="190" cy="615" r="42" fill="#E63946" opacity="0.9"/>
  <circle cx="190" cy="615" r="38" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="190" cy="615" r="10" fill="#F4D35E"/>

  <!-- Stone 3 -->
  <rect x="258" y="542" width="80" height="70" fill="#1D3557" opacity="0.85"/>
  <rect x="261" y="545" width="74" height="64" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- Yellow highlight -->
  <rect x="270" y="554" width="24" height="24" fill="#F4D35E" opacity="0.9"/>

  <!-- Stone 4 -->
  <circle cx="390" cy="478" r="44" fill="#E63946" opacity="0.88"/>
  <circle cx="390" cy="478" r="40" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Stone 5 -->
  <rect x="440" y="390" width="88" height="62" fill="#1D3557" opacity="0.9"/>
  <rect x="443" y="393" width="82" height="56" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- Yellow highlight -->
  <rect x="455" y="403" width="20" height="20" fill="#F4D35E" opacity="0.9"/>

  <!-- Stone 6 -->
  <circle cx="588" cy="318" r="40" fill="#E63946" opacity="0.9"/>
  <circle cx="588" cy="318" r="36" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="588" cy="318" r="10" fill="#F4D35E"/>

  <!-- Stone 7 (top-right) -->
  <rect x="648" y="110" width="84" height="62" fill="#1D3557" opacity="0.9"/>
  <rect x="651" y="113" width="78" height="56" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Warm gray accent shapes between stones -->
  <circle cx="130" cy="650" r="8" fill="#A89F91" opacity="0.6"/>
  <circle cx="240" cy="560" r="6" fill="#A89F91" opacity="0.6"/>
  <circle cx="340" cy="510" r="7" fill="#A89F91" opacity="0.6"/>
  <circle cx="475" cy="360" r="8" fill="#A89F91" opacity="0.6"/>
  <circle cx="630" cy="270" r="6" fill="#A89F91" opacity="0.6"/>
  <circle cx="720" cy="160" r="7" fill="#A89F91" opacity="0.6"/>

  <!-- Small yellow highlight circles -->
  <circle cx="155" cy="590" r="12" fill="#F4D35E" opacity="0.7"/>
  <circle cx="320" cy="500" r="10" fill="#F4D35E" opacity="0.7"/>
  <circle cx="540" cy="350" r="11" fill="#F4D35E" opacity="0.7"/>

  <!-- Path connection lines (short dashes between stones) -->
  <line x1="95" y1="685" x2="148" y2="635" stroke="#000000" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>
  <line x1="232" y1="600" x2="270" y2="570" stroke="#000000" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>
  <line x1="338" y1="548" x2="348" y2="510" stroke="#000000" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>
  <line x1="434" y1="478" x2="448" y2="450" stroke="#000000" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>
  <line x1="528" y1="415" x2="548" y2="358" stroke="#000000" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>
  <line x1="628" y1="300" x2="660" y2="175" stroke="#000000" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>

  <!-- Corner accents -->
  <rect x="10" y="10" width="30" height="30" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.5"/>
  <rect x="760" y="760" width="30" height="30" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.5"/>
  <circle cx="760" cy="40" r="15" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.5"/>
  <circle cx="40" cy="760" r="15" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.5"/>
</svg>
