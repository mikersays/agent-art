<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Arch Study</title>
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Large architectural arch - center -->
  <path d="M200,600 L200,350 A200,200 0 0,1 600,350 L600,600" fill="none" stroke="#000000" stroke-width="4"/>
  <path d="M200,600 L200,350 A200,200 0 0,1 600,350 L600,600" fill="#F4D35E" opacity="0.3"/>

  <!-- Inner arch -->
  <path d="M260,600 L260,380 A140,140 0 0,1 540,380 L540,600" fill="none" stroke="#1D3557" stroke-width="3"/>

  <!-- Innermost arch -->
  <path d="M320,600 L320,410 A80,80 0 0,1 480,410 L480,600" fill="#E63946" opacity="0.25"/>
  <path d="M320,600 L320,410 A80,80 0 0,1 480,410 L480,600" fill="none" stroke="#E63946" stroke-width="2"/>

  <!-- Top semicircle decorative element -->
  <path d="M300,120 A100,100 0 0,1 500,120" fill="none" stroke="#000000" stroke-width="3"/>
  <path d="M330,120 A70,70 0 0,1 470,120" fill="#1D3557"/>

  <!-- Left side arcs -->
  <path d="M50,300 A80,80 0 0,1 50,460" fill="none" stroke="#E63946" stroke-width="3"/>
  <path d="M70,320 A60,60 0 0,1 70,440" fill="none" stroke="#F4D35E" stroke-width="2"/>
  <path d="M90,340 A40,40 0 0,1 90,420" fill="#457B9D" opacity="0.4"/>

  <!-- Right side arcs -->
  <path d="M750,200 A80,80 0 0,0 750,360" fill="none" stroke="#1D3557" stroke-width="3"/>
  <path d="M730,220 A60,60 0 0,0 730,340" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Horizontal structural lines -->
  <line x1="40" y1="600" x2="760" y2="600" stroke="#000000" stroke-width="3"/>
  <line x1="40" y1="120" x2="280" y2="120" stroke="#000000" stroke-width="2"/>
  <line x1="520" y1="120" x2="760" y2="120" stroke="#000000" stroke-width="2"/>
  <line x1="150" y1="700" x2="650" y2="700" stroke="#457B9D" stroke-width="2"/>

  <!-- Vertical pillars -->
  <rect x="195" y="350" width="10" height="250" fill="#000000"/>
  <rect x="595" y="350" width="10" height="250" fill="#000000"/>

  <!-- Small column details -->
  <rect x="315" y="410" width="10" height="190" fill="#1D3557"/>
  <rect x="475" y="410" width="10" height="190" fill="#1D3557"/>

  <!-- Bottom arch row - smaller repeating arches -->
  <path d="M150,700 A50,50 0 0,1 250,700" fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M250,700 A50,50 0 0,1 350,700" fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M350,700 A50,50 0 0,1 450,700" fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M450,700 A50,50 0 0,1 550,700" fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M550,700 A50,50 0 0,1 650,700" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Fill alternating small arches -->
  <path d="M150,700 A50,50 0 0,1 250,700 Z" fill="#E63946" opacity="0.4"/>
  <path d="M350,700 A50,50 0 0,1 450,700 Z" fill="#F4D35E" opacity="0.4"/>
  <path d="M550,700 A50,50 0 0,1 650,700 Z" fill="#1D3557" opacity="0.4"/>

  <!-- Decorative circles at arch keystones -->
  <circle cx="400" cy="150" r="10" fill="#E63946"/>
  <circle cx="400" cy="275" r="8" fill="#000000"/>
  <circle cx="400" cy="330" r="6" fill="#F4D35E"/>

  <!-- Top right geometric accent -->
  <rect x="650" y="40" width="100" height="60" fill="#F4D35E"/>
  <line x1="650" y1="40" x2="750" y2="100" stroke="#000000" stroke-width="1.5"/>
  <line x1="750" y1="40" x2="650" y2="100" stroke="#000000" stroke-width="1.5"/>

  <!-- Top left geometric accent -->
  <circle cx="100" cy="70" r="35" fill="none" stroke="#000000" stroke-width="2"/>
  <circle cx="100" cy="70" r="20" fill="#A8DADC"/>

  <!-- Small accent dots -->
  <circle cx="200" cy="700" r="4" fill="#000000"/>
  <circle cx="300" cy="700" r="4" fill="#000000"/>
  <circle cx="400" cy="700" r="4" fill="#000000"/>
  <circle cx="500" cy="700" r="4" fill="#000000"/>
  <circle cx="600" cy="700" r="4" fill="#000000"/>

  <!-- Frame -->
  <rect x="20" y="20" width="760" height="760" fill="none" stroke="#000000" stroke-width="2"/>
</svg>