<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Sky area - subtle -->
  <rect x="0" y="0" width="800" height="300" fill="#A8DADC" opacity="0.1"/>

  <!-- Terraced levels - wider at bottom, narrower at top, offset to right -->
  <!-- Level 1 - bottom, widest -->
  <rect x="200" y="680" width="550" height="60" fill="#DDA15E" opacity="0.85"/>
  <rect x="210" y="685" width="530" height="50" fill="#A89F91" opacity="0.3"/>

  <!-- Level 2 -->
  <rect x="240" y="600" width="500" height="55" fill="#DDA15E" opacity="0.8"/>
  <rect x="250" y="608" width="480" height="40" fill="#FEFAE0" opacity="0.4"/>

  <!-- Level 3 -->
  <rect x="280" y="525" width="450" height="50" fill="#DDA15E" opacity="0.75"/>

  <!-- Level 4 -->
  <rect x="320" y="455" width="400" height="48" fill="#A89F91" opacity="0.7"/>

  <!-- Level 5 -->
  <rect x="360" y="390" width="350" height="45" fill="#DDA15E" opacity="0.7"/>

  <!-- Level 6 -->
  <rect x="400" y="330" width="300" height="40" fill="#A89F91" opacity="0.65"/>

  <!-- Level 7 - top, narrowest -->
  <rect x="440" y="275" width="240" height="38" fill="#DDA15E" opacity="0.6"/>

  <!-- Vegetation shapes - teal/forest colored -->
  <!-- Level 1 vegetation -->
  <circle cx="300" cy="670" r="18" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="350" cy="675" r="14" fill="#264653" opacity="0.6"/>
  <circle cx="650" cy="668" r="20" fill="#2A9D8F" opacity="0.65"/>
  <circle cx="700" cy="678" r="12" fill="#264653" opacity="0.55"/>

  <!-- Level 2 vegetation -->
  <circle cx="340" cy="595" r="15" fill="#2A9D8F" opacity="0.65"/>
  <circle cx="620" cy="590" r="17" fill="#264653" opacity="0.6"/>
  <circle cx="550" cy="598" r="12" fill="#2A9D8F" opacity="0.5"/>

  <!-- Level 3 vegetation -->
  <circle cx="380" cy="518" r="14" fill="#264653" opacity="0.6"/>
  <circle cx="600" cy="520" r="16" fill="#2A9D8F" opacity="0.55"/>

  <!-- Level 4 vegetation -->
  <circle cx="420" cy="448" r="13" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="560" cy="450" r="11" fill="#264653" opacity="0.5"/>

  <!-- Level 5 vegetation -->
  <circle cx="460" cy="383" r="12" fill="#264653" opacity="0.55"/>
  <circle cx="580" cy="388" r="10" fill="#2A9D8F" opacity="0.5"/>

  <!-- Level 6 vegetation -->
  <circle cx="500" cy="325" r="10" fill="#2A9D8F" opacity="0.5"/>

  <!-- Level 7 vegetation -->
  <circle cx="540" cy="270" r="9" fill="#264653" opacity="0.5"/>

  <!-- Small plant circles (dots) -->
  <circle cx="270" cy="672" r="4" fill="#E63946" opacity="0.6"/>
  <circle cx="500" cy="668" r="4" fill="#F4D35E" opacity="0.6"/>
  <circle cx="450" cy="592" r="3.5" fill="#E63946" opacity="0.5"/>
  <circle cx="680" cy="515" r="3" fill="#E76F51" opacity="0.45"/>
  <circle cx="480" cy="448" r="3" fill="#F4D35E" opacity="0.5"/>
  <circle cx="640" cy="385" r="3" fill="#E63946" opacity="0.45"/>
  <circle cx="530" cy="270" r="3" fill="#E76F51" opacity="0.4"/>

  <!-- Vertical side accents - structural lines -->
  <line x1="200" y1="680" x2="200" y2="740" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <line x1="750" y1="680" x2="750" y2="740" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <line x1="240" y1="600" x2="240" y2="680" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="740" y1="600" x2="740" y2="680" stroke="#000000" stroke-width="1.5" opacity="0.3"/>

  <!-- Subtle background structural lines -->
  <line x1="200" y1="740" x2="750" y2="740" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="440" y1="275" x2="680" y2="275" stroke="#000000" stroke-width="1" opacity="0.2"/>

  <!-- Sun/sky element -->
  <circle cx="150" cy="150" r="50" fill="#F4D35E" opacity="0.25"/>
  <circle cx="150" cy="150" r="30" fill="#E9C46A" opacity="0.35"/>

  <!-- Corner accents -->
  <rect x="750" y="20" width="20" height="20" fill="#264653" opacity="0.3"/>
  <rect x="20" y="750" width="15" height="15" fill="#DDA15E" opacity="0.4"/>
</svg>