<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Scaffolding framework - vertical lines -->
  <line x1="100" y1="80" x2="100" y2="720" stroke="#000000" stroke-width="2.5" opacity="0.8"/>
  <line x1="220" y1="80" x2="220" y2="720" stroke="#457B9D" stroke-width="2" opacity="0.7"/>
  <line x1="340" y1="80" x2="340" y2="720" stroke="#000000" stroke-width="2.5" opacity="0.8"/>
  <line x1="460" y1="80" x2="460" y2="720" stroke="#457B9D" stroke-width="2" opacity="0.7"/>
  <line x1="580" y1="80" x2="580" y2="720" stroke="#000000" stroke-width="2.5" opacity="0.8"/>
  <line x1="700" y1="80" x2="700" y2="720" stroke="#457B9D" stroke-width="2" opacity="0.7"/>
  <!-- Scaffolding framework - horizontal lines -->
  <line x1="80" y1="80" x2="720" y2="80" stroke="#000000" stroke-width="2.5" opacity="0.8"/>
  <line x1="80" y1="200" x2="720" y2="200" stroke="#457B9D" stroke-width="2" opacity="0.7"/>
  <line x1="80" y1="320" x2="720" y2="320" stroke="#000000" stroke-width="2.5" opacity="0.8"/>
  <line x1="80" y1="440" x2="720" y2="440" stroke="#457B9D" stroke-width="2" opacity="0.7"/>
  <line x1="80" y1="560" x2="720" y2="560" stroke="#000000" stroke-width="2.5" opacity="0.8"/>
  <line x1="80" y1="680" x2="720" y2="680" stroke="#457B9D" stroke-width="2" opacity="0.6"/>
  <!-- Joint circles -->
  <circle cx="100" cy="80" r="5" fill="#000000" opacity="0.9"/>
  <circle cx="220" cy="80" r="5" fill="#000000" opacity="0.9"/>
  <circle cx="340" cy="80" r="5" fill="#000000" opacity="0.9"/>
  <circle cx="460" cy="80" r="5" fill="#000000" opacity="0.9"/>
  <circle cx="580" cy="80" r="5" fill="#000000" opacity="0.9"/>
  <circle cx="700" cy="80" r="5" fill="#000000" opacity="0.9"/>
  <circle cx="100" cy="320" r="5" fill="#457B9D" opacity="0.8"/>
  <circle cx="340" cy="320" r="5" fill="#457B9D" opacity="0.8"/>
  <circle cx="580" cy="320" r="5" fill="#457B9D" opacity="0.8"/>
  <circle cx="100" cy="560" r="5" fill="#000000" opacity="0.9"/>
  <circle cx="340" cy="560" r="5" fill="#000000" opacity="0.9"/>
  <circle cx="580" cy="560" r="5" fill="#000000" opacity="0.9"/>
  <circle cx="700" cy="560" r="5" fill="#000000" opacity="0.9"/>
  <circle cx="220" cy="440" r="4" fill="#457B9D" opacity="0.7"/>
  <circle cx="460" cy="440" r="4" fill="#457B9D" opacity="0.7"/>
  <circle cx="700" cy="440" r="4" fill="#457B9D" opacity="0.7"/>
  <!-- Filled scaffold cells -->
  <rect x="102" y="82" width="116" height="116" fill="#E63946" opacity="0.75"/>
  <rect x="342" y="202" width="116" height="116" fill="#1D3557" opacity="0.8"/>
  <rect x="582" y="442" width="116" height="116" fill="#F4D35E" opacity="0.7"/>
  <rect x="222" y="562" width="116" height="116" fill="#E63946" opacity="0.5"/>
  <rect x="462" y="82" width="116" height="116" fill="#2A9D8F" opacity="0.45"/>
  <rect x="102" y="442" width="116" height="116" fill="#1D3557" opacity="0.35"/>
  <!-- Diagonal bracing in some cells -->
  <line x1="220" y1="200" x2="340" y2="320" stroke="#A89F91" stroke-width="1.5" opacity="0.4"/>
  <line x1="460" y1="320" x2="580" y2="440" stroke="#A89F91" stroke-width="1.5" opacity="0.4"/>
  <line x1="580" y1="200" x2="700" y2="320" stroke="#A89F91" stroke-width="1.5" opacity="0.35"/>
  <!-- Small accent circles within cells -->
  <circle cx="280" cy="380" r="20" fill="#E76F51" opacity="0.5"/>
  <circle cx="640" cy="260" r="15" fill="#DDA15E" opacity="0.45"/>
  <circle cx="160" cy="640" r="12" fill="#E9C46A" opacity="0.5"/>
  <!-- Outer frame accent -->
  <rect x="75" y="75" width="650" height="650" fill="none" stroke="#000000" stroke-width="1" opacity="0.15"/>
</svg>