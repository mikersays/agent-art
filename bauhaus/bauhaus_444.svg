<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background: Warm Gray -->
  <rect width="800" height="800" fill="#A89F91"/>

  <!-- Subtle background grid -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.07"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.07"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.07"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.07"/>

  <!-- LARGE TARGET: centered at (250, 300) -->
  <circle cx="250" cy="300" r="170" fill="#1D3557"/>
  <circle cx="250" cy="300" r="130" fill="#FEFAE0"/>
  <circle cx="250" cy="300" r="90" fill="#E63946"/>
  <circle cx="250" cy="300" r="50" fill="#F4D35E"/>
  <circle cx="250" cy="300" r="12" fill="#000000"/>

  <!-- MEDIUM TARGET 1: upper right (580, 180) -->
  <circle cx="580" cy="180" r="110" fill="#2A9D8F"/>
  <circle cx="580" cy="180" r="75" fill="#FEFAE0"/>
  <circle cx="580" cy="180" r="42" fill="#E76F51"/>
  <circle cx="580" cy="180" r="16" fill="#000000"/>

  <!-- MEDIUM TARGET 2: lower right (620, 560) -->
  <circle cx="620" cy="560" r="115" fill="#E63946"/>
  <circle cx="620" cy="560" r="80" fill="#A8DADC"/>
  <circle cx="620" cy="560" r="45" fill="#1D3557"/>
  <circle cx="620" cy="560" r="15" fill="#000000"/>

  <!-- SMALL TARGET 1: upper left area (100, 120) -->
  <circle cx="100" cy="120" r="65" fill="#F4D35E"/>
  <circle cx="100" cy="120" r="42" fill="#6D2E46"/>
  <circle cx="100" cy="120" r="20" fill="#FEFAE0"/>
  <circle cx="100" cy="120" r="7" fill="#000000"/>

  <!-- SMALL TARGET 2: right middle (730, 380) -->
  <circle cx="730" cy="380" r="58" fill="#457B9D"/>
  <circle cx="730" cy="380" r="36" fill="#F4D35E"/>
  <circle cx="730" cy="380" r="16" fill="#E63946"/>
  <circle cx="730" cy="380" r="6" fill="#000000"/>

  <!-- SMALL TARGET 3: lower left (130, 650) -->
  <circle cx="130" cy="650" r="60" fill="#E76F51"/>
  <circle cx="130" cy="650" r="38" fill="#264653"/>
  <circle cx="130" cy="650" r="18" fill="#DDA15E"/>
  <circle cx="130" cy="650" r="6" fill="#000000"/>

  <!-- Extra tiny target / accent: bottom center (400, 730) -->
  <circle cx="400" cy="730" r="35" fill="#2A9D8F"/>
  <circle cx="400" cy="730" r="20" fill="#FEFAE0"/>
  <circle cx="400" cy="730" r="8" fill="#000000"/>

  <!-- Accent dot near center to balance -->
  <circle cx="420" cy="420" r="18" fill="#1D3557" opacity="0.5"/>
  <circle cx="420" cy="420" r="7" fill="#000000" opacity="0.6"/>

  <!-- Thin lines for structural tension -->
  <line x1="250" y1="300" x2="580" y2="180" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="250" y1="300" x2="620" y2="560" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="580" y1="180" x2="620" y2="560" stroke="#000000" stroke-width="1" opacity="0.15"/>

  <!-- Corner accent marks -->
  <rect x="10" y="10" width="35" height="4" fill="#000000" opacity="0.25"/>
  <rect x="10" y="10" width="4" height="35" fill="#000000" opacity="0.25"/>
  <rect x="755" y="786" width="35" height="4" fill="#000000" opacity="0.25"/>
  <rect x="786" y="755" width="4" height="35" fill="#000000" opacity="0.25"/>
</svg>
