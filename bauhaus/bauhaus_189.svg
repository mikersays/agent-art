<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Bauhaus Sextant - Navigation instrument: arc, telescope arm, graduated scale, mirrors -->

  <!-- Background -->
  <rect width="800" height="800" fill="#F4D35E" opacity="0.15"/>
  <rect width="800" height="800" fill="#FFF"/>

  <!-- Base background circle for context -->
  <circle cx="400" cy="420" r="340" fill="#1D3557" opacity="0.08"/>

  <!-- Main arc of sextant (60-degree arc) -->
  <path d="M150 600 A 350 350 0 0 1 650 600" fill="none" stroke="#000" stroke-width="10"/>
  <path d="M170 600 A 330 330 0 0 1 630 600" fill="none" stroke="#F4D35E" stroke-width="5"/>

  <!-- Graduated scale marks on arc -->
  <line x1="165" y1="590" x2="165" y2="615" stroke="#000" stroke-width="3"/>
  <line x1="210" y1="530" x2="218" y2="552" stroke="#000" stroke-width="3"/>
  <line x1="265" y1="478" x2="276" y2="497" stroke="#000" stroke-width="3"/>
  <line x1="328" y1="438" x2="340" y2="455" stroke="#000" stroke-width="3"/>
  <line x1="400" y1="418" x2="400" y2="438" stroke="#000" stroke-width="3"/>
  <line x1="472" y1="438" x2="460" y2="455" stroke="#000" stroke-width="3"/>
  <line x1="535" y1="478" x2="524" y2="497" stroke="#000" stroke-width="3"/>
  <line x1="590" y1="530" x2="582" y2="552" stroke="#000" stroke-width="3"/>
  <line x1="635" y1="590" x2="635" y2="615" stroke="#000" stroke-width="3"/>

  <!-- Minor tick marks -->
  <line x1="187" y1="560" x2="193" y2="575" stroke="#000" stroke-width="2"/>
  <line x1="237" y1="503" x2="245" y2="517" stroke="#000" stroke-width="2"/>
  <line x1="296" y1="456" x2="306" y2="468" stroke="#000" stroke-width="2"/>
  <line x1="363" y1="425" x2="370" y2="440" stroke="#000" stroke-width="2"/>
  <line x1="437" y1="425" x2="430" y2="440" stroke="#000" stroke-width="2"/>
  <line x1="504" y1="456" x2="494" y2="468" stroke="#000" stroke-width="2"/>
  <line x1="563" y1="503" x2="555" y2="517" stroke="#000" stroke-width="2"/>
  <line x1="613" y1="560" x2="607" y2="575" stroke="#000" stroke-width="2"/>

  <!-- Frame triangle of sextant body -->
  <polygon points="400,120 150,620 650,620" fill="none" stroke="#264653" stroke-width="6"/>
  <polygon points="400,160 185,600 615,600" fill="#264653" opacity="0.1"/>

  <!-- Telescope arm - from pivot to upper right -->
  <line x1="400" y1="600" x2="620" y2="180" stroke="#E63946" stroke-width="8" stroke-linecap="round"/>

  <!-- Telescope tube at end of arm -->
  <rect x="600" y="150" width="100" height="25" rx="5" fill="#E63946" stroke="#000" stroke-width="2" transform="rotate(-62, 620, 180)"/>
  <circle cx="620" cy="180" r="8" fill="#000"/>

  <!-- Eyepiece lens -->
  <circle cx="647" cy="138" r="12" fill="#1D3557" stroke="#000" stroke-width="2"/>
  <circle cx="647" cy="138" r="5" fill="#FFF" opacity="0.4"/>

  <!-- Index arm (movable arm) -->
  <line x1="400" y1="600" x2="265" y2="478" stroke="#E76F51" stroke-width="6" stroke-linecap="round"/>

  <!-- Pivot point at bottom -->
  <circle cx="400" cy="600" r="15" fill="#000"/>
  <circle cx="400" cy="600" r="8" fill="#F4D35E"/>

  <!-- Index mirror (rectangle at pivot) -->
  <rect x="385" y="565" width="30" height="45" fill="#1D3557" stroke="#F4D35E" stroke-width="2" rx="2"/>
  <rect x="390" y="570" width="20" height="35" fill="#FFF" opacity="0.3"/>

  <!-- Horizon mirror (smaller rectangle on frame) -->
  <rect x="380" y="340" width="25" height="35" fill="#1D3557" stroke="#F4D35E" stroke-width="2" rx="2" transform="rotate(-5, 392, 357)"/>
  <rect x="385" y="345" width="15" height="25" fill="#FFF" opacity="0.3" transform="rotate(-5, 392, 357)"/>

  <!-- Handle at bottom -->
  <rect x="370" y="620" width="60" height="80" rx="8" fill="#E76F51" stroke="#000" stroke-width="3"/>
  <rect x="380" y="630" width="40" height="60" rx="4" fill="#E9C46A"/>

  <!-- Vernier scale detail -->
  <rect x="240" y="468" width="50" height="20" rx="3" fill="#F4D35E" stroke="#000" stroke-width="2"/>

  <!-- Scale numbers as dots -->
  <circle cx="170" cy="630" r="4" fill="#000"/>
  <circle cx="400" cy="410" r="4" fill="#000"/>
  <circle cx="630" cy="630" r="4" fill="#000"/>

  <!-- Decorative Bauhaus corners -->
  <rect x="20" y="20" width="60" height="8" fill="#E63946"/>
  <rect x="20" y="20" width="8" height="60" fill="#E63946"/>
  <rect x="720" y="20" width="60" height="8" fill="#1D3557"/>
  <rect x="772" y="20" width="8" height="60" fill="#1D3557"/>
</svg>