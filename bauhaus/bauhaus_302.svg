<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Horizontal bands stacked like a landscape -->
  <rect x="0" y="0" width="800" height="180" fill="#FEFAE0"/>
  <rect x="0" y="180" width="800" height="160" fill="#A8DADC"/>
  <rect x="0" y="340" width="800" height="140" fill="#457B9D"/>
  <rect x="0" y="480" width="800" height="130" fill="#264653"/>
  <rect x="0" y="610" width="800" height="190" fill="#000000"/>
  <!-- Large yellow circle breaking through bands -->
  <circle cx="320" cy="350" r="140" fill="#F4D35E" opacity="0.85"/>
  <!-- Red triangles pointing upward from bottom -->
  <polygon points="100,800 140,650 180,800" fill="#E63946" opacity="0.9"/>
  <polygon points="300,800 350,680 400,800" fill="#E63946" opacity="0.85"/>
  <polygon points="520,800 555,710 590,800" fill="#E63946" opacity="0.9"/>
  <polygon points="680,800 720,660 760,800" fill="#E63946" opacity="0.8"/>
  <polygon points="200,800 230,730 260,800" fill="#E63946" opacity="0.7"/>
  <!-- Thin white vertical lines creating rhythm -->
  <line x1="80" y1="0" x2="80" y2="800" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  <line x1="160" y1="0" x2="160" y2="800" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <line x1="250" y1="0" x2="250" y2="800" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
  <line x1="370" y1="0" x2="370" y2="800" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  <line x1="460" y1="0" x2="460" y2="800" stroke="#FFFFFF" stroke-width="1" opacity="0.45"/>
  <line x1="550" y1="0" x2="550" y2="800" stroke="#FFFFFF" stroke-width="1.5" opacity="0.55"/>
  <line x1="640" y1="0" x2="640" y2="800" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
  <line x1="730" y1="0" x2="730" y2="800" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <!-- Small burgundy squares scattered in upper portion -->
  <rect x="50" y="30" width="14" height="14" fill="#6D2E46" opacity="0.8"/>
  <rect x="180" y="60" width="10" height="10" fill="#6D2E46" opacity="0.7"/>
  <rect x="420" y="25" width="16" height="16" fill="#6D2E46" opacity="0.85"/>
  <rect x="580" y="80" width="12" height="12" fill="#6D2E46" opacity="0.75"/>
  <rect x="700" y="40" width="11" height="11" fill="#6D2E46" opacity="0.8"/>
  <rect x="130" y="120" width="13" height="13" fill="#6D2E46" opacity="0.7"/>
  <rect x="500" y="100" width="15" height="15" fill="#6D2E46" opacity="0.8"/>
  <rect x="650" y="150" width="9" height="9" fill="#6D2E46" opacity="0.65"/>
  <rect x="350" y="90" width="12" height="12" fill="#6D2E46" opacity="0.75"/>
  <!-- Additional geometric interruptions -->
  <circle cx="600" cy="300" r="35" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="150" cy="420" r="25" fill="#F4D35E" opacity="0.5"/>
  <rect x="500" y="450" width="80" height="20" fill="#2A9D8F" opacity="0.6"/>
  <rect x="50" y="520" width="120" height="15" fill="#E76F51" opacity="0.5"/>
  <!-- Small accent shapes in the bands -->
  <circle cx="720" cy="250" r="18" fill="#1D3557" opacity="0.6"/>
  <rect x="30" y="360" width="40" height="40" fill="#E63946" opacity="0.3" transform="rotate(15, 50, 380)"/>
</svg>