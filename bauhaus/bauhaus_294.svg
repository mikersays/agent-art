<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Light background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Shadow/darker planes behind main shapes -->
  <polygon points="180,320 420,280 380,520" fill="#264653" opacity="0.2"/>
  <polygon points="450,150 680,200 620,400 390,350" fill="#000000" opacity="0.12"/>
  <polygon points="100,500 350,460 300,700 60,680" fill="#000000" opacity="0.1"/>
  <polygon points="500,450 720,500 680,720 460,680" fill="#264653" opacity="0.15"/>

  <!-- Large blue plane -->
  <polygon points="160,300 400,260 360,500" fill="#1D3557" opacity="0.7"/>

  <!-- Large red parallelogram -->
  <polygon points="430,130 660,180 600,380 370,330" fill="#E63946" opacity="0.65"/>

  <!-- Cream plane overlapping -->
  <polygon points="280,200 520,240 480,440 240,400" fill="#FEFAE0" opacity="0.8"/>
  <polygon points="280,200 520,240 480,440 240,400" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.4"/>

  <!-- Warm gray plane -->
  <polygon points="80,480 330,440 280,680 40,660" fill="#A89F91" opacity="0.6"/>

  <!-- Blue-gray folded triangle -->
  <polygon points="500,420 700,480 660,700 440,660" fill="#457B9D" opacity="0.55"/>

  <!-- Red triangle -->
  <polygon points="350,500 550,530 460,700" fill="#E63946" opacity="0.5"/>

  <!-- Yellow accent plane -->
  <polygon points="560,100 700,140 670,260 530,220" fill="#F4D35E" opacity="0.75"/>

  <!-- Small cream triangle -->
  <polygon points="140,120 280,160 210,280" fill="#FEFAE0" opacity="0.7"/>
  <polygon points="140,120 280,160 210,280" fill="none" stroke="#A89F91" stroke-width="1" opacity="0.5"/>

  <!-- Light blue accent plane -->
  <polygon points="600,560 740,590 710,720" fill="#A8DADC" opacity="0.5"/>

  <!-- Fold lines - black -->
  <line x1="160" y1="300" x2="400" y2="260" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="260" x2="360" y2="500" stroke="#000000" stroke-width="1.5" opacity="0.45"/>
  <line x1="430" y1="130" x2="660" y2="180" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="660" y1="180" x2="600" y2="380" stroke="#000000" stroke-width="1.5" opacity="0.45"/>
  <line x1="600" y1="380" x2="370" y2="330" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="480" x2="330" y2="440" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="330" y1="440" x2="280" y2="680" stroke="#000000" stroke-width="1.5" opacity="0.35"/>
  <line x1="500" y1="420" x2="700" y2="480" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="700" y1="480" x2="660" y2="700" stroke="#000000" stroke-width="1.5" opacity="0.35"/>

  <!-- Circles at fold vertices -->
  <circle cx="160" cy="300" r="5" fill="#000000" opacity="0.6"/>
  <circle cx="400" cy="260" r="5" fill="#000000" opacity="0.6"/>
  <circle cx="360" cy="500" r="5" fill="#000000" opacity="0.6"/>
  <circle cx="430" cy="130" r="4" fill="#E63946" opacity="0.7"/>
  <circle cx="660" cy="180" r="4" fill="#E63946" opacity="0.7"/>
  <circle cx="600" cy="380" r="5" fill="#000000" opacity="0.6"/>
  <circle cx="370" cy="330" r="4" fill="#000000" opacity="0.55"/>
  <circle cx="80" cy="480" r="4" fill="#A89F91" opacity="0.7"/>
  <circle cx="330" cy="440" r="5" fill="#000000" opacity="0.6"/>
  <circle cx="280" cy="680" r="4" fill="#000000" opacity="0.55"/>
  <circle cx="500" cy="420" r="5" fill="#1D3557" opacity="0.7"/>
  <circle cx="700" cy="480" r="4" fill="#000000" opacity="0.6"/>
  <circle cx="660" cy="700" r="4" fill="#000000" opacity="0.55"/>
  <circle cx="560" cy="100" r="4" fill="#F4D35E" opacity="0.8"/>
  <circle cx="700" cy="140" r="4" fill="#F4D35E" opacity="0.8"/>

  <!-- Corner accents -->
  <rect x="20" y="20" width="18" height="18" fill="#E63946" opacity="0.3"/>
  <rect x="762" y="762" width="18" height="18" fill="#1D3557" opacity="0.3"/>

  <!-- Tiny accent triangle -->
  <polygon points="720,60 750,60 735,35" fill="#F4D35E" opacity="0.5"/>
  <polygon points="50,740 80,740 65,715" fill="#E63946" opacity="0.4"/>
</svg>