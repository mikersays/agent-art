<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Dark forest background -->
  <rect x="0" y="0" width="800" height="800" fill="#264653"/>
  <!-- Large white glowing circle upper portion -->
  <circle cx="320" cy="250" r="200" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="320" cy="250" r="170" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="320" cy="250" r="140" fill="#FFFFFF" opacity="0.2"/>
  <!-- Thin cream connecting lines -->
  <line x1="120" y1="150" x2="400" y2="350" stroke="#FEFAE0" stroke-width="0.8" opacity="0.3"/>
  <line x1="500" y1="200" x2="650" y2="500" stroke="#FEFAE0" stroke-width="0.8" opacity="0.25"/>
  <line x1="200" y1="600" x2="550" y2="400" stroke="#FEFAE0" stroke-width="0.8" opacity="0.3"/>
  <line x1="100" y1="400" x2="350" y2="700" stroke="#FEFAE0" stroke-width="0.8" opacity="0.25"/>
  <line x1="600" y1="100" x2="700" y2="650" stroke="#FEFAE0" stroke-width="0.8" opacity="0.2"/>
  <!-- Scattered shapes - circles -->
  <circle cx="80" cy="120" r="18" fill="#E63946" opacity="0.85"/>
  <circle cx="250" cy="80" r="12" fill="#F4D35E" opacity="0.7"/>
  <circle cx="500" cy="150" r="25" fill="#1D3557" opacity="0.6"/>
  <circle cx="680" cy="90" r="15" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="150" cy="350" r="30" fill="#E76F51" opacity="0.65"/>
  <circle cx="450" cy="400" r="10" fill="#A8DADC" opacity="0.9"/>
  <circle cx="700" cy="300" r="20" fill="#E63946" opacity="0.75"/>
  <circle cx="600" cy="550" r="28" fill="#F4D35E" opacity="0.6"/>
  <circle cx="100" cy="650" r="14" fill="#457B9D" opacity="0.8"/>
  <circle cx="350" cy="720" r="22" fill="#E9C46A" opacity="0.7"/>
  <circle cx="550" cy="700" r="16" fill="#DDA15E" opacity="0.75"/>
  <circle cx="750" cy="500" r="12" fill="#FFFFFF" opacity="0.5"/>
  <!-- Scattered squares -->
  <rect x="400" y="60" width="20" height="20" fill="#E63946" opacity="0.8" transform="rotate(15 410 70)"/>
  <rect x="620" y="200" width="35" height="35" fill="#F4D35E" opacity="0.7" transform="rotate(30 637 217)"/>
  <rect x="50" y="500" width="25" height="25" fill="#1D3557" opacity="0.9"/>
  <rect x="300" y="550" width="40" height="40" fill="#A8DADC" opacity="0.5" transform="rotate(45 320 570)"/>
  <rect x="700" y="650" width="15" height="15" fill="#2A9D8F" opacity="0.85"/>
  <rect x="180" y="200" width="50" height="50" fill="#E76F51" opacity="0.4" transform="rotate(20 205 225)"/>
  <rect x="480" y="520" width="30" height="30" fill="#6D2E46" opacity="0.7" transform="rotate(10 495 535)"/>
  <rect x="230" y="450" width="18" height="18" fill="#FFFFFF" opacity="0.6" transform="rotate(60 239 459)"/>
  <!-- Scattered triangles -->
  <polygon points="560,350 580,310 600,350" fill="#F4D35E" opacity="0.8"/>
  <polygon points="130,250 150,210 170,250" fill="#E63946" opacity="0.7"/>
  <polygon points="430,650 460,590 490,650" fill="#1D3557" opacity="0.6"/>
  <polygon points="680,420 700,380 720,420" fill="#A8DADC" opacity="0.75"/>
  <polygon points="50" fill="#DDA15E" opacity="0.8"/>
  <polygon points="250,680 270,640 290,680" fill="#2A9D8F" opacity="0.7"/>
  <polygon points="750,150 770,110 790,150" fill="#E9C46A" opacity="0.65"/>
  <polygon points="350,150 380,100 410,150" fill="#FFFFFF" opacity="0.35"/>
  <!-- More small shapes for density -->
  <circle cx="50" cy="50" r="8" fill="#A89F91" opacity="0.6"/>
  <circle cx="750" cy="750" r="10" fill="#E63946" opacity="0.5"/>
  <circle cx="400" cy="780" r="6" fill="#F4D35E" opacity="0.8"/>
  <rect x="640" y="750" width="12" height="12" fill="#457B9D" opacity="0.7"/>
  <rect x="30" y="780" width="10" height="10" fill="#FEFAE0" opacity="0.5"/>
  <circle cx="200" cy="780" r="8" fill="#E76F51" opacity="0.6"/>
  <polygon points="520,80 530,60 540,80" fill="#A89F91" opacity="0.7"/>
  <circle cx="650" cy="650" r="5" fill="#FEFAE0" opacity="0.4"/>
</svg>