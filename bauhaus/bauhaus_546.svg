<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>
  <!-- Structural grid lines at low opacity -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="100" y1="0" x2="100" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <!-- Blue rectangular accent blocks -->
  <rect x="580" y="60" width="140" height="50" fill="#1D3557" opacity="0.85"/>
  <rect x="620" y="680" width="100" height="40" fill="#1D3557" opacity="0.7"/>
  <rect x="50" y="620" width="80" height="30" fill="#457B9D" opacity="0.6"/>
  <!-- Large red circle - main echo source -->
  <circle cx="180" cy="180" r="180" fill="#E63946" opacity="0.9"/>
  <!-- Connecting lines between echoes -->
  <line x1="180" y1="180" x2="280" y2="280" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="280" y1="280" x2="380" y2="380" stroke="#000000" stroke-width="1" opacity="0.25"/>
  <line x1="380" y1="380" x2="470" y2="470" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="470" y1="470" x2="545" y2="545" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="545" y1="545" x2="610" y2="610" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="610" y1="610" x2="660" y2="660" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <!-- Echo circles - progressively smaller, color shift -->
  <circle cx="280" cy="280" r="120" fill="#E63946" opacity="0.7"/>
  <circle cx="380" cy="380" r="85" fill="#E76F51" opacity="0.65"/>
  <circle cx="470" cy="470" r="60" fill="#E76F51" opacity="0.6"/>
  <circle cx="545" cy="545" r="42" fill="#F4D35E" opacity="0.7"/>
  <circle cx="610" cy="610" r="28" fill="#E9C46A" opacity="0.75"/>
  <circle cx="660" cy="660" r="18" fill="#FEFAE0" opacity="0.9"/>
  <circle cx="698" cy="698" r="10" fill="#FEFAE0" opacity="0.8"/>
  <!-- Additional blue accents -->
  <rect x="500" y="150" width="60" height="180" fill="#1D3557" opacity="0.4"/>
  <rect x="680" y="300" width="40" height="120" fill="#457B9D" opacity="0.35"/>
  <!-- Small structural accents -->
  <circle cx="50" cy="50" r="8" fill="#000000" opacity="0.5"/>
  <circle cx="750" cy="750" r="6" fill="#000000" opacity="0.4"/>
  <rect x="30" y="740" width="20" height="20" fill="#E63946" opacity="0.3"/>
  <rect x="740" y="30" width="25" height="25" fill="#F4D35E" opacity="0.5"/>
  <!-- Diagonal accent line -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="100" y1="0" x2="800" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.06"/>
  <!-- Corner frame accents -->
  <rect x="0" y="0" width="15" height="15" fill="#000000" opacity="0.15"/>
  <rect x="785" y="785" width="15" height="15" fill="#000000" opacity="0.15"/>
</svg>