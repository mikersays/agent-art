  <rect x="300" y="200" width="14" height="14" fill="#6D2E46" opacity="0.85"/>
  <rect x="500" y="650" width="11" height="11" fill="#6D2E46" opacity="0.7"/>
  <rect x="650" y="300" width="16" height="16" fill="#6D2E46" opacity="0.75"/>
  <rect x="100" y="450" width="13" height="13" fill="#6D2E46" opacity="0.8"/>
