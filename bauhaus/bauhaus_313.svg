  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="150" y1="0" x2="150" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="250" y1="0" x2="250" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="350" y1="0" x2="350" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="450" y1="0" x2="450" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
