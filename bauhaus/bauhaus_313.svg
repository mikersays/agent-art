  <line x1="750" y1="0" x2="750" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <!-- Large forest rectangle anchoring bottom -->
  <rect x="50" y="680" width="300" height="100" fill="#264653" opacity="0.9"/>
  <!-- Sand-colored arcs in top corners -->
  <path d="M0,0 A150,150 0 0,1 150,0" fill="#DDA15E" opacity="0.6"/>
  <path d="M650,0 A150,150 0 0,1 800,0" fill="#DDA15E" opacity="0.6"/>
  <!-- Ascending circles: bottom-left to top-right along a curve -->
  <circle cx="80" cy="720" r="10" fill="#E63946" opacity="0.7"/>
  <circle cx="120" cy="680" r="14" fill="#1D3557" opacity="0.7"/>
  <circle cx="170" cy="635" r="18" fill="#F4D35E" opacity="0.7"/>
  <circle cx="225" cy="585" r="22" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="285" cy="530" r="26" fill="#E76F51" opacity="0.7"/>
  <circle cx="345" cy="470" r="30" fill="#E63946" opacity="0.7"/>
  <circle cx="405" cy="405" r="35" fill="#1D3557" opacity="0.7"/>
  <circle cx="465" cy="340" r="40" fill="#F4D35E" opacity="0.7"/>
  <circle cx="530" cy="270" r="50" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="600" cy="195" r="60" fill="#E76F51" opacity="0.7"/>
  <circle cx="680" cy="110" r="80" fill="#E63946" opacity="0.7"/>
