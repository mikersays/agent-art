<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle diagonal guide lines -->
  <line x1="800" y1="0" x2="0" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="700" y1="0" x2="0" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.04"/>
  <line x1="800" y1="100" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.04"/>

  <!-- Start circle - top right -->
  <circle cx="700" cy="80" r="30" fill="#E63946" opacity="0.7"/>
  <circle cx="700" cy="80" r="12" fill="#F4D35E" opacity="0.9"/>

  <!-- Rectangle 1 - Largest, top right -->
  <rect x="580" y="60" width="160" height="120" fill="#1D3557" opacity="0.75"/>
  <!-- Motion trail lines -->
  <line x1="580" y1="70" x2="520" y2="130" stroke="#1D3557" stroke-width="1.5" opacity="0.2"/>
  <line x1="580" y1="100" x2="530" y2="150" stroke="#1D3557" stroke-width="1" opacity="0.15"/>
  <line x1="580" y1="130" x2="540" y2="170" stroke="#1D3557" stroke-width="0.8" opacity="0.1"/>

  <!-- Rectangle 2 -->
  <rect x="490" y="170" width="140" height="105" fill="#E63946" opacity="0.7"/>
  <line x1="490" y1="180" x2="440" y2="230" stroke="#E63946" stroke-width="1.5" opacity="0.2"/>
  <line x1="490" y1="210" x2="450" y2="250" stroke="#E63946" stroke-width="1" opacity="0.15"/>
  <line x1="490" y1="240" x2="460" y2="270" stroke="#E63946" stroke-width="0.8" opacity="0.1"/>

  <!-- Rectangle 3 -->
  <rect x="380" y="300" width="125" height="95" fill="#F4D35E" opacity="0.75"/>
  <line x1="380" y1="310" x2="340" y2="350" stroke="#DDA15E" stroke-width="1.5" opacity="0.2"/>
  <line x1="380" y1="340" x2="350" y2="370" stroke="#DDA15E" stroke-width="1" opacity="0.15"/>
  <line x1="380" y1="365" x2="360" y2="385" stroke="#DDA15E" stroke-width="0.8" opacity="0.1"/>

  <!-- Rectangle 4 -->
  <rect x="280" y="415" width="110" height="85" fill="#2A9D8F" opacity="0.7"/>
  <line x1="280" y1="425" x2="245" y2="460" stroke="#2A9D8F" stroke-width="1.5" opacity="0.2"/>
  <line x1="280" y1="450" x2="255" y2="475" stroke="#2A9D8F" stroke-width="1" opacity="0.15"/>

  <!-- Rectangle 5 -->
  <rect x="190" y="520" width="95" height="70" fill="#E76F51" opacity="0.7"/>
  <line x1="190" y1="530" x2="160" y2="560" stroke="#E76F51" stroke-width="1.5" opacity="0.2"/>
  <line x1="190" y1="555" x2="170" y2="575" stroke="#E76F51" stroke-width="1" opacity="0.15"/>

  <!-- Rectangle 6 -->
  <rect x="110" y="610" width="80" height="60" fill="#457B9D" opacity="0.7"/>
  <line x1="110" y1="620" x2="85" y2="645" stroke="#457B9D" stroke-width="1.5" opacity="0.2"/>

  <!-- Rectangle 7 - Smallest -->
  <rect x="50" y="690" width="65" height="50" fill="#6D2E46" opacity="0.7"/>

  <!-- End circle - bottom left -->
  <circle cx="80" cy="760" r="22" fill="#1D3557" opacity="0.7"/>
  <circle cx="80" cy="760" r="8" fill="#FFFFFF" opacity="0.8"/>

  <!-- Accent circles at transition points -->
  <circle cx="560" cy="175" r="8" fill="#000000" opacity="0.4"/>
  <circle cx="450" cy="300" r="7" fill="#000000" opacity="0.35"/>
  <circle cx="345" cy="415" r="6" fill="#000000" opacity="0.3"/>
  <circle cx="255" cy="520" r="6" fill="#000000" opacity="0.3"/>
  <circle cx="170" cy="610" r="5" fill="#000000" opacity="0.25"/>
  <circle cx="100" cy="690" r="5" fill="#000000" opacity="0.25"/>

  <!-- Scattered small shapes for texture -->
  <rect x="650" y="250" width="10" height="10" fill="#A89F91" opacity="0.3" transform="rotate(45, 655, 255)"/>
  <rect x="300" y="150" width="8" height="8" fill="#264653" opacity="0.25"/>
  <circle cx="500" cy="600" r="5" fill="#E9C46A" opacity="0.4"/>
  <circle cx="150" cy="350" r="6" fill="#A8DADC" opacity="0.3"/>
  <polygon points="680,500 690,515 670,515" fill="#F4D35E" opacity="0.3"/>

  <!-- Diagonal emphasis line -->
  <line x1="730" y1="50" x2="50" y2="780" stroke="#000000" stroke-width="2" opacity="0.08"/>

  <!-- Corner frames -->
  <line x1="20" y1="20" x2="80" y2="20" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <line x1="20" y1="20" x2="20" y2="80" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <line x1="780" y1="780" x2="720" y2="780" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <line x1="780" y1="780" x2="780" y2="720" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
</svg>