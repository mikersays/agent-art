<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Faint background grid -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="0" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="200" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <!-- Perpendicular faint grid lines -->
  <line x1="800" y1="0" x2="0" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="0" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="800" y1="200" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <!-- Bold diagonal bars bottom-left to top-right -->
  <rect x="0" y="0" width="800" height="800" fill="none"/>
  <line x1="0" y1="700" x2="700" y2="0" stroke="#1D3557" stroke-width="80" opacity="0.85" stroke-linecap="butt"/>
  <line x1="50" y1="800" x2="800" y2="50" stroke="#E63946" stroke-width="45" opacity="0.9" stroke-linecap="butt"/>
  <line x1="0" y1="500" x2="500" y2="0" stroke="#1D3557" stroke-width="30" opacity="0.7" stroke-linecap="butt"/>
  <line x1="200" y1="800" x2="800" y2="200" stroke="#E63946" stroke-width="60" opacity="0.75" stroke-linecap="butt"/>
  <line x1="0" y1="350" x2="350" y2="0" stroke="#457B9D" stroke-width="20" opacity="0.6" stroke-linecap="butt"/>
  <line x1="400" y1="800" x2="800" y2="400" stroke="#000000" stroke-width="25" opacity="0.5" stroke-linecap="butt"/>
  <line x1="0" y1="150" x2="150" y2="0" stroke="#E63946" stroke-width="35" opacity="0.65" stroke-linecap="butt"/>
  <line x1="550" y1="800" x2="800" y2="550" stroke="#1D3557" stroke-width="22" opacity="0.6" stroke-linecap="butt"/>
  <!-- Thin black structural lines at 45 degrees -->
  <line x1="100" y1="800" x2="800" y2="100" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="0" y1="600" x2="600" y2="0" stroke="#000000" stroke-width="1" opacity="0.25"/>
  <line x1="300" y1="800" x2="800" y2="300" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="250" x2="250" y2="0" stroke="#000000" stroke-width="2" opacity="0.2"/>
  <!-- Yellow circles at intersection points -->
  <circle cx="350" cy="350" r="18" fill="#F4D35E" opacity="0.95"/>
  <circle cx="500" cy="200" r="12" fill="#F4D35E" opacity="0.9"/>
  <circle cx="200" cy="500" r="14" fill="#F4D35E" opacity="0.85"/>
  <circle cx="600" cy="100" r="10" fill="#F4D35E" opacity="0.9"/>
  <circle cx="100" cy="600" r="16" fill="#F4D35E" opacity="0.8"/>
  <circle cx="450" cy="350" r="8" fill="#F4D35E" opacity="0.95"/>
  <circle cx="300" cy="500" r="11" fill="#F4D35E" opacity="0.85"/>
  <circle cx="650" cy="250" r="9" fill="#F4D35E" opacity="0.9"/>
  <circle cx="550" cy="450" r="13" fill="#F4D35E" opacity="0.75"/>
  <circle cx="150" cy="350" r="7" fill="#F4D35E" opacity="0.9"/>
  <circle cx="700" cy="150" r="10" fill="#E9C46A" opacity="0.8"/>
  <circle cx="250" cy="650" r="15" fill="#F4D35E" opacity="0.7"/>
  <!-- Corner accent shapes -->
  <rect x="10" y="10" width="25" height="25" fill="#000000" opacity="0.4"/>
  <rect x="765" y="765" width="25" height="25" fill="#E63946" opacity="0.5"/>
  <circle cx="780" cy="20" r="12" fill="#1D3557" opacity="0.4"/>
  <circle cx="20" cy="780" r="12" fill="#2A9D8F" opacity="0.4"/>
</svg>