<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- === TOP HALF: Sparse light shapes === -->
  <!-- Light blue circles -->
  <circle cx="150" cy="120" r="45" fill="#A8DADC" opacity="0.4"/>
  <circle cx="500" cy="80" r="35" fill="#A8DADC" opacity="0.35"/>
  <circle cx="680" cy="180" r="55" fill="#A8DADC" opacity="0.25"/>
  <!-- Cream/yellow circles -->
  <circle cx="320" cy="200" r="40" fill="#F4D35E" opacity="0.35"/>
  <circle cx="600" cy="320" r="30" fill="#E9C46A" opacity="0.3"/>
  <circle cx="100" cy="350" r="25" fill="#F4D35E" opacity="0.25"/>
  <!-- Small white circles -->
  <circle cx="250" cy="100" r="15" fill="#FFFFFF" opacity="0.5" stroke="#A89F91" stroke-width="0.5"/>
  <circle cx="450" cy="250" r="20" fill="#FFFFFF" opacity="0.4" stroke="#A89F91" stroke-width="0.5"/>
  <circle cx="720" cy="80" r="12" fill="#FFFFFF" opacity="0.5"/>
  <!-- Sand accents -->
  <circle cx="380" cy="60" r="18" fill="#DDA15E" opacity="0.3"/>
  <circle cx="550" cy="180" r="22" fill="#DDA15E" opacity="0.25"/>
  <!-- Warm gray subtle shapes -->
  <circle cx="200" cy="280" r="30" fill="#A89F91" opacity="0.15"/>
  <circle cx="700" cy="400" r="28" fill="#A89F91" opacity="0.12"/>
  <!-- === HORIZON LINE - the divide === -->
  <line x1="0" y1="533" x2="800" y2="533" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <!-- === BRIDGING ELEMENTS: Red and orange shapes crossing the divide === -->
  <rect x="180" y="480" width="40" height="110" fill="#E63946" opacity="0.7"/>
  <rect x="520" y="460" width="35" height="130" fill="#E76F51" opacity="0.65"/>
  <polygon points="350,510 380,440 410,510" fill="#E63946" opacity="0.6"/>
  <polygon points="650,500 680,430 710,500" fill="#E76F51" opacity="0.55"/>
  <circle cx="120" cy="533" r="30" fill="#E63946" opacity="0.45"/>
  <circle cx="460" cy="520" r="25" fill="#E76F51" opacity="0.5"/>
  <rect x="280" y="500" width="50" height="80" fill="#E63946" opacity="0.4"/>
  <!-- === BOTTOM THIRD: Dense dark shapes === -->
  <!-- Large dark rectangles -->
  <rect x="0" y="560" width="160" height="100" fill="#264653" opacity="0.85"/>
  <rect x="170" y="580" width="120" height="80" fill="#1D3557" opacity="0.8"/>
  <rect x="300" y="560" width="140" height="110" fill="#000000" opacity="0.7"/>
  <rect x="450" y="570" width="110" height="90" fill="#264653" opacity="0.75"/>
  <rect x="570" y="555" width="130" height="100" fill="#1D3557" opacity="0.8"/>
  <rect x="710" y="565" width="90" height="95" fill="#000000" opacity="0.65"/>
  <!-- Second layer of dark rectangles -->
  <rect x="40" y="670" width="180" height="90" fill="#1D3557" opacity="0.9"/>
  <rect x="230" y="680" width="100" height="80" fill="#000000" opacity="0.8"/>
  <rect x="340" y="670" width="150" height="100" fill="#264653" opacity="0.85"/>
  <rect x="500" y="685" width="120" height="75" fill="#1D3557" opacity="0.75"/>
  <rect x="630" y="670" width="170" height="90" fill="#000000" opacity="0.7"/>
  <!-- Bottom strip -->
  <rect x="0" y="760" width="800" height="40" fill="#264653" opacity="0.9"/>
  <!-- Small Forest/Blue accent rectangles in bottom area -->
  <rect x="80" y="640" width="30" height="25" fill="#457B9D" opacity="0.6"/>
  <rect x="380" y="650" width="25" height="20" fill="#457B9D" opacity="0.5"/>
  <rect x="680" y="645" width="35" height="20" fill="#457B9D" opacity="0.55"/>
  <!-- Subtle background structural lines -->
  <line x1="0" y1="267" x2="800" y2="267" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.04"/>
</svg>