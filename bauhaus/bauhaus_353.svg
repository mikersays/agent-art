<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Large overlapping rectangles at various angles -->
  <rect x="100" y="150" width="350" height="220" fill="#1D3557" opacity="0.45" transform="rotate(-12, 275, 260)"/>
  <rect x="300" y="100" width="300" height="180" fill="#E63946" opacity="0.4" transform="rotate(8, 450, 190)"/>
  <rect x="200" y="350" width="400" height="250" fill="#F4D35E" opacity="0.5" transform="rotate(-5, 400, 475)"/>
  <rect x="450" y="250" width="280" height="300" fill="#1D3557" opacity="0.35" transform="rotate(15, 590, 400)"/>
  <rect x="50" y="400" width="250" height="200" fill="#E63946" opacity="0.45" transform="rotate(-20, 175, 500)"/>
  <rect x="350" y="500" width="320" height="180" fill="#2A9D8F" opacity="0.4" transform="rotate(6, 510, 590)"/>
  <rect x="500" y="80" width="200" height="350" fill="#F4D35E" opacity="0.3" transform="rotate(-8, 600, 255)"/>
  <rect x="80" y="50" width="180" height="280" fill="#457B9D" opacity="0.35" transform="rotate(10, 170, 190)"/>
  <rect x="550" y="500" width="200" height="250" fill="#E76F51" opacity="0.4" transform="rotate(-15, 650, 625)"/>

  <!-- Small black circles at intersection points -->
  <circle cx="300" cy="200" r="6" fill="#000000" opacity="0.8"/>
  <circle cx="450" cy="180" r="5" fill="#000000" opacity="0.75"/>
  <circle cx="350" cy="350" r="7" fill="#000000" opacity="0.85"/>
  <circle cx="500" cy="300" r="5" fill="#000000" opacity="0.7"/>
  <circle cx="250" cy="400" r="6" fill="#000000" opacity="0.8"/>
  <circle cx="550" cy="450" r="5" fill="#000000" opacity="0.75"/>
  <circle cx="400" cy="500" r="6" fill="#000000" opacity="0.8"/>
  <circle cx="200" cy="300" r="4" fill="#000000" opacity="0.7"/>
  <circle cx="600" cy="350" r="5" fill="#000000" opacity="0.75"/>
  <circle cx="150" cy="500" r="6" fill="#000000" opacity="0.8"/>
  <circle cx="650" cy="550" r="5" fill="#000000" opacity="0.7"/>
  <circle cx="480" cy="600" r="4" fill="#000000" opacity="0.75"/>
  <circle cx="320" cy="250" r="5" fill="#000000" opacity="0.7"/>
  <circle cx="550" cy="200" r="4" fill="#000000" opacity="0.65"/>

  <!-- Structural lines -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="250" x2="800" y2="250" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="550" x2="800" y2="550" stroke="#000000" stroke-width="0.5" opacity="0.1"/>

  <!-- Corner accents -->
  <rect x="10" y="10" width="25" height="25" fill="#000000" opacity="0.3"/>
  <rect x="765" y="10" width="25" height="25" fill="#000000" opacity="0.3"/>
  <rect x="10" y="765" width="25" height="25" fill="#000000" opacity="0.3"/>
  <rect x="765" y="765" width="25" height="25" fill="#000000" opacity="0.3"/>
</svg>