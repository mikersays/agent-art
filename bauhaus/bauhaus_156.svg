<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFF"/>
  <!-- Background geometric blocks -->
  <rect x="0" y="0" width="400" height="400" fill="#1D3557" opacity="0.1"/>
  <rect x="400" y="400" width="400" height="400" fill="#F4D35E" opacity="0.15"/>
  <!-- Megaphone body - large cone -->
  <polygon points="200,350 650,150 650,650 200,450" fill="#E63946" stroke="#000" stroke-width="4"/>
  <!-- Megaphone inner cone shadow -->
  <polygon points="220,365 630,175 630,625 220,435" fill="#E63946" opacity="0.7"/>
  <!-- Megaphone opening ellipse -->
  <ellipse cx="650" cy="400" rx="30" ry="250" fill="#333" stroke="#000" stroke-width="3"/>
  <ellipse cx="650" cy="400" rx="20" ry="220" fill="#1D3557"/>
  <ellipse cx="650" cy="400" rx="10" ry="180" fill="#000"/>
  <!-- Handle -->
  <rect x="160" y="370" width="60" height="60" rx="5" fill="#333" stroke="#000" stroke-width="3"/>
  <rect x="120" y="385" width="50" height="30" rx="8" fill="#DDA15E" stroke="#000" stroke-width="2"/>
  <circle cx="145" cy="400" r="8" fill="#F4D35E"/>
  <!-- Grip lines on handle -->
  <line x1="130" y1="390" x2="130" y2="410" stroke="#000" stroke-width="2"/>
  <line x1="140" y1="390" x2="140" y2="410" stroke="#000" stroke-width="2"/>
  <line x1="150" y1="390" x2="150" y2="410" stroke="#000" stroke-width="2"/>
  <!-- Sound wave arcs -->
  <path d="M 690 400 Q 730 300 690 200" fill="none" stroke="#F4D35E" stroke-width="6"/>
  <path d="M 710 400 Q 760 280 710 160" fill="none" stroke="#E76F51" stroke-width="5"/>
  <path d="M 730 400 Q 790 260 730 120" fill="none" stroke="#E63946" stroke-width="4"/>
  <path d="M 690 400 Q 730 500 690 600" fill="none" stroke="#F4D35E" stroke-width="6"/>
  <path d="M 710 400 Q 760 520 710 640" fill="none" stroke="#E76F51" stroke-width="5"/>
  <path d="M 730 400 Q 790 540 730 680" fill="none" stroke="#E63946" stroke-width="4"/>
  <!-- Decorative geometric elements -->
  <circle cx="100" cy="100" r="40" fill="#F4D35E" stroke="#000" stroke-width="3"/>
  <rect x="60" y="600" width="80" height="80" fill="#1D3557" stroke="#000" stroke-width="3"/>
  <polygon points="700,50 730,100 670,100" fill="#E76F51" stroke="#000" stroke-width="2"/>
  <!-- Megaphone ridge lines -->
  <line x1="200" y1="350" x2="650" y2="150" stroke="#000" stroke-width="2"/>
  <line x1="200" y1="450" x2="650" y2="650" stroke="#000" stroke-width="2"/>
  <line x1="200" y1="400" x2="650" y2="400" stroke="#DDA15E" stroke-width="2" stroke-dasharray="10,5"/>
  <!-- Small accent dots -->
  <circle cx="750" cy="200" r="6" fill="#E63946"/>
  <circle cx="760" cy="350" r="6" fill="#1D3557"/>
  <circle cx="760" cy="450" r="6" fill="#1D3557"/>
  <circle cx="750" cy="600" r="6" fill="#E63946"/>
</svg>