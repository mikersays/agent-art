<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Stratum 1 (bottom) - Forest -->
  <polygon points="0,700 50,690 120,705 200,695 280,710 350,698 430,708 520,692 600,705 680,695 750,710 800,700 800,800 0,800" fill="#264653" opacity="0.95"/>

  <!-- Stratum 2 - Burgundy -->
  <polygon points="0,600 60,610 140,595 220,608 300,592 380,605 460,598 540,610 620,595 700,605 780,598 800,600 800,700 750,710 680,695 600,705 520,692 430,708 350,698 280,710 200,695 120,705 50,690 0,700" fill="#6D2E46" opacity="0.9"/>

  <!-- Stratum 3 - Blue -->
  <polygon points="0,490 70,500 150,485 230,495 310,482 400,498 480,488 560,500 640,485 720,495 800,490 800,600 780,598 700,605 620,595 540,610 460,598 380,605 300,592 220,608 140,595 60,610 0,600" fill="#1D3557" opacity="0.9"/>

  <!-- Stratum 4 - Steel Blue -->
  <polygon points="0,390 80,398 160,385 250,395 330,382 420,392 500,388 580,398 660,382 740,395 800,390 800,490 720,495 640,485 560,500 480,488 400,498 310,482 230,495 150,485 70,500 0,490" fill="#457B9D" opacity="0.85"/>

  <!-- Stratum 5 - Teal -->
  <polygon points="0,300 90,308 170,295 260,305 340,290 430,302 510,298 590,310 670,292 750,305 800,300 800,390 740,395 660,382 580,398 500,388 420,392 330,382 250,395 160,385 80,398 0,390" fill="#2A9D8F" opacity="0.85"/>

  <!-- Stratum 6 - Cream/Sand transition -->
  <polygon points="0,220 85,228 165,215 255,225 335,212 425,222 505,218 585,230 665,212 745,225 800,220 800,300 750,305 670,292 590,310 510,298 430,302 340,290 260,305 170,295 90,308 0,300" fill="#DDA15E" opacity="0.8"/>

  <!-- Stratum 7 - Light Blue -->
  <polygon points="0,140 80,148 160,135 250,145 330,132 420,142 500,138 580,150 660,132 740,145 800,140 800,220 745,225 665,212 585,230 505,218 425,222 335,212 255,225 165,215 85,228 0,220" fill="#A8DADC" opacity="0.8"/>

  <!-- Stratum 8 (top) - Sand -->
  <polygon points="0,60 75,68 155,55 245,65 325,52 415,62 495,58 575,70 655,52 735,65 800,60 800,140 740,145 660,132 580,150 500,138 420,142 330,132 250,145 160,135 80,148 0,140" fill="#E9C46A" opacity="0.75"/>

  <!-- Bold black circles embedded in layers -->
  <circle cx="150" cy="650" r="40" fill="#000000" opacity="0.8"/>
  <circle cx="500" cy="550" r="35" fill="#000000" opacity="0.75"/>
  <circle cx="350" cy="440" r="45" fill="#000000" opacity="0.7"/>
  <circle cx="680" cy="350" r="30" fill="#000000" opacity="0.75"/>
  <circle cx="250" cy="260" r="32" fill="#000000" opacity="0.7"/>

  <!-- Red triangles erupting between layers -->
  <polygon points="100,500 120,450 140,500" fill="#E63946" opacity="0.9"/>
  <polygon points="600,400 625,340 650,400" fill="#E63946" opacity="0.85"/>
  <polygon points="400,600 430,540 460,600" fill="#E63946" opacity="0.8"/>
  <polygon points="720,500 745,445 770,500" fill="#E63946" opacity="0.75"/>

  <!-- Yellow triangles erupting between layers -->
  <polygon points="200,350 225,290 250,350" fill="#F4D35E" opacity="0.9"/>
  <polygon points="550,300 575,240 600,300" fill="#F4D35E" opacity="0.85"/>
  <polygon points="320,550 345,490 370,550" fill="#F4D35E" opacity="0.8"/>

  <!-- Small accent dots along strata edges -->
  <circle cx="300" cy="700" r="6" fill="#E76F51" opacity="0.7"/>
  <circle cx="650" cy="600" r="5" fill="#E76F51" opacity="0.65"/>
  <circle cx="450" cy="490" r="4" fill="#FFFFFF" opacity="0.6"/>
</svg>