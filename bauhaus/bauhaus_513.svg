<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>
  <!-- Loose structural grid lines -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="250" y1="0" x2="250" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="550" y1="0" x2="550" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="250" x2="800" y2="250" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="550" x2="800" y2="550" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <!-- Square 1 - large red, slight rotation -->
  <rect x="80" y="120" width="160" height="160" fill="#E63946" opacity="0.8" transform="rotate(12, 160, 200)"/>
  <!-- Square 2 - blue, thick border -->
  <rect x="300" y="60" width="120" height="120" fill="none" stroke="#1D3557" stroke-width="5" transform="rotate(-8, 360, 120)"/>
  <rect x="310" y="70" width="100" height="100" fill="#1D3557" opacity="0.3" transform="rotate(-8, 360, 120)"/>
  <!-- Square 3 - yellow with inscribed circle -->
  <rect x="560" y="100" width="140" height="140" fill="#F4D35E" opacity="0.85" transform="rotate(5, 630, 170)"/>
  <circle cx="630" cy="170" r="55" fill="none" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <!-- Square 4 - teal, small -->
  <rect x="450" y="280" width="80" height="80" fill="#2A9D8F" opacity="0.7" transform="rotate(-15, 490, 320)"/>
  <!-- Square 5 - orange with thick black border -->
  <rect x="100" y="350" width="130" height="130" fill="#E76F51" opacity="0.75" transform="rotate(20, 165, 415)" stroke="#000000" stroke-width="4"/>
  <!-- Square 6 - steel blue with inscribed circle -->
  <rect x="340" y="330" width="110" height="110" fill="#457B9D" opacity="0.6" transform="rotate(-5, 395, 385)"/>
  <circle cx="395" cy="385" r="42" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.7"/>
  <!-- Square 7 - large forest green -->
  <rect x="600" y="320" width="150" height="150" fill="#264653" opacity="0.7" transform="rotate(8, 675, 395)"/>
  <!-- Square 8 - sand colored, thin border -->
  <rect x="50" y="560" width="100" height="100" fill="#DDA15E" opacity="0.8" transform="rotate(-10, 100, 610)" stroke="#000000" stroke-width="1.5"/>
  <!-- Square 9 - red, medium -->
  <rect x="220" y="520" width="115" height="115" fill="#E63946" opacity="0.6" transform="rotate(15, 277, 577)"/>
  <!-- Square 10 - blue with inscribed circle -->
  <rect x="420" y="500" width="125" height="125" fill="#1D3557" opacity="0.8" transform="rotate(-12, 482, 562)"/>
  <circle cx="482" cy="562" r="48" fill="none" stroke="#F4D35E" stroke-width="2" opacity="0.6"/>
  <!-- Square 11 - yellow, small -->
  <rect x="620" y="540" width="90" height="90" fill="#F4D35E" opacity="0.7" transform="rotate(22, 665, 585)" stroke="#000000" stroke-width="3"/>
  <!-- Square 12 - burgundy -->
  <rect x="180" y="680" width="95" height="95" fill="#6D2E46" opacity="0.65" transform="rotate(-7, 227, 727)"/>
  <!-- Square 13 - light blue, large -->
  <rect x="400" y="660" width="135" height="135" fill="#A8DADC" opacity="0.5" transform="rotate(10, 467, 727)"/>
  <!-- Square 14 - coral accent -->
  <rect x="650" y="700" width="70" height="70" fill="#E9C46A" opacity="0.7" transform="rotate(-18, 685, 735)"/>
  <!-- Additional thin structural lines -->
  <line x1="50" y1="50" x2="750" y2="750" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="750" y1="50" x2="50" y2="750" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
</svg>