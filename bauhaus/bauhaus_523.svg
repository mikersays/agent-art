<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Structural vertical lines -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <!-- Red wave (top) - filled area -->
  <path d="M0,200 Q100,120 200,200 Q300,280 400,200 Q500,120 600,200 Q700,280 800,200 L800,100 Q700,180 600,100 Q500,20 400,100 Q300,180 200,100 Q100,20 0,100 Z" fill="#E63946" opacity="0.35"/>
  <!-- Red wave line -->
  <path d="M0,150 Q100,70 200,150 Q300,230 400,150 Q500,70 600,150 Q700,230 800,150" fill="none" stroke="#E63946" stroke-width="3" opacity="0.9"/>
  <!-- Blue wave (middle) - filled area -->
  <path d="M0,450 Q100,370 200,450 Q300,530 400,450 Q500,370 600,450 Q700,530 800,450 L800,350 Q700,430 600,350 Q500,270 400,350 Q300,430 200,350 Q100,270 0,350 Z" fill="#1D3557" opacity="0.3"/>
  <!-- Blue wave line -->
  <path d="M0,400 Q100,320 200,400 Q300,480 400,400 Q500,320 600,400 Q700,480 800,400" fill="none" stroke="#1D3557" stroke-width="3" opacity="0.9"/>
  <!-- Yellow wave (bottom) - filled area -->
  <path d="M0,700 Q100,620 200,700 Q300,780 400,700 Q500,620 600,700 Q700,780 800,700 L800,600 Q700,680 600,600 Q500,520 400,600 Q300,680 200,600 Q100,520 0,600 Z" fill="#F4D35E" opacity="0.4"/>
  <!-- Yellow wave line -->
  <path d="M0,650 Q100,570 200,650 Q300,730 400,650 Q500,570 600,650 Q700,730 800,650" fill="none" stroke="#DDA15E" stroke-width="3" opacity="0.9"/>
  <!-- Shapes riding red wave peaks -->
  <rect x="90" y="55" width="18" height="18" fill="#1D3557" opacity="0.7" transform="rotate(45, 99, 64)"/>
  <polygon points="500,55 512,35 488,35" fill="#2A9D8F" opacity="0.8"/>
  <rect x="290" y="215" width="16" height="16" fill="#E76F51" opacity="0.7"/>
  <circle cx="700" cy="215" r="10" fill="#F4D35E" opacity="0.8"/>
  <!-- Shapes riding blue wave peaks -->
  <polygon points="100,305 112,285 88,285" fill="#E63946" opacity="0.7"/>
  <rect x="492" y="300" width="16" height="16" fill="#F4D35E" opacity="0.7" transform="rotate(30, 500, 308)"/>
  <circle cx="300" cy="465" r="9" fill="#2A9D8F" opacity="0.75"/>
  <polygon points="700,465 714,445 686,445" fill="#E76F51" opacity="0.7"/>
  <!-- Shapes riding yellow wave peaks -->
  <rect x="91" y="555" width="18" height="18" fill="#1D3557" opacity="0.7"/>
  <circle cx="500" cy="555" r="11" fill="#E63946" opacity="0.7"/>
  <polygon points="300,715 314,695 286,695" fill="#457B9D" opacity="0.7"/>
  <rect x="691" y="715" width="16" height="16" fill="#2A9D8F" opacity="0.7" transform="rotate(45, 699, 723)"/>
  <!-- Vertical accent lines -->
  <line x1="150" y1="100" x2="150" y2="250" stroke="#E63946" stroke-width="1.5" opacity="0.2"/>
  <line x1="350" y1="350" x2="350" y2="500" stroke="#1D3557" stroke-width="1.5" opacity="0.2"/>
  <line x1="550" y1="600" x2="550" y2="750" stroke="#DDA15E" stroke-width="1.5" opacity="0.2"/>
  <line x1="650" y1="150" x2="650" y2="350" stroke="#2A9D8F" stroke-width="1" opacity="0.15"/>
  <!-- Corner accents -->
  <circle cx="25" cy="25" r="8" fill="#000000" opacity="0.3"/>
  <circle cx="775" cy="25" r="8" fill="#000000" opacity="0.3"/>
  <circle cx="25" cy="775" r="8" fill="#000000" opacity="0.3"/>
  <circle cx="775" cy="775" r="8" fill="#000000" opacity="0.3"/>
  <!-- Between-wave fill accents -->
  <rect x="380" y="260" width="40" height="6" fill="#A89F91" opacity="0.4"/>
  <rect x="180" y="510" width="40" height="6" fill="#A89F91" opacity="0.4"/>
</svg>