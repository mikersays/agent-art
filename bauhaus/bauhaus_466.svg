<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>

  <!-- Warm gray rectangles at edges for subtle weight -->
  <rect x="0" y="50" width="60" height="180" fill="#A89F91" opacity="0.3"/>
  <rect x="720" y="300" width="80" height="200" fill="#A89F91" opacity="0.25"/>
  <rect x="0" y="600" width="100" height="120" fill="#A89F91" opacity="0.2"/>
  <rect x="680" y="650" width="120" height="80" fill="#A89F91" opacity="0.35"/>

  <!-- Thin structural lines suggesting mobile/kinetic sculpture -->
  <line x1="400" y1="100" x2="400" y2="450" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="400" y1="180" x2="250" y2="120" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="180" x2="560" y2="150" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="250" y1="120" x2="180" y2="180" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="250" y1="120" x2="300" y2="80" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="560" y1="150" x2="620" y2="200" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="560" y1="150" x2="520" y2="90" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="300" x2="320" y2="260" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="300" x2="500" y2="280" stroke="#000000" stroke-width="1" opacity="0.4"/>

  <!-- Orange arc paths suggesting movement -->
  <path d="M 150 250 A 120 120 0 0 1 300 180" fill="none" stroke="#E76F51" stroke-width="2" opacity="0.4"/>
  <path d="M 500 200 A 100 100 0 0 1 650 250" fill="none" stroke="#E76F51" stroke-width="2" opacity="0.35"/>
  <path d="M 280 320 A 80 80 0 0 0 360 280" fill="none" stroke="#E76F51" stroke-width="1.5" opacity="0.3"/>
  <path d="M 470 300 A 90 90 0 0 1 560 240" fill="none" stroke="#E76F51" stroke-width="1.5" opacity="0.3"/>
  <path d="M 200 150 A 60 60 0 0 0 280 100" fill="none" stroke="#E76F51" stroke-width="1.5" opacity="0.25"/>

  <!-- Large red triangle balanced on its point at bottom-center -->
  <polygon points="400,750 220,420 580,420" fill="#E63946" opacity="0.9"/>

  <!-- Blue circles floating above -->
  <circle cx="180" cy="180" r="40" fill="#1D3557" opacity="0.85"/>
  <circle cx="300" cy="80" r="25" fill="#1D3557" opacity="0.7"/>
  <circle cx="520" cy="90" r="30" fill="#1D3557" opacity="0.75"/>
  <circle cx="320" cy="260" r="20" fill="#1D3557" opacity="0.6"/>

  <!-- Yellow circles floating above -->
  <circle cx="620" cy="200" r="35" fill="#F4D35E" opacity="0.85"/>
  <circle cx="500" cy="280" r="22" fill="#F4D35E" opacity="0.7"/>
  <circle cx="400" cy="100" r="18" fill="#F4D35E" opacity="0.8"/>
  <circle cx="150" cy="320" r="28" fill="#F4D35E" opacity="0.6"/>

  <!-- Small teal squares scattered -->
  <rect x="100" y="400" width="15" height="15" fill="#2A9D8F" opacity="0.7"/>
  <rect x="650" y="120" width="12" height="12" fill="#2A9D8F" opacity="0.6"/>
  <rect x="350" y="350" width="10" height="10" fill="#2A9D8F" opacity="0.5"/>
  <rect x="550" y="380" width="14" height="14" fill="#2A9D8F" opacity="0.65"/>
  <rect x="200" y="500" width="11" height="11" fill="#2A9D8F" opacity="0.55"/>
  <rect x="680" y="450" width="13" height="13" fill="#2A9D8F" opacity="0.5"/>
  <rect x="460" y="360" width="9" height="9" fill="#2A9D8F" opacity="0.6"/>
  <rect x="120" y="250" width="10" height="10" fill="#2A9D8F" opacity="0.45"/>

  <!-- Additional accent elements -->
  <circle cx="400" cy="450" r="6" fill="#000000" opacity="0.7"/>
  <line x1="350" y1="750" x2="450" y2="750" stroke="#000000" stroke-width="2" opacity="0.3"/>
  <circle cx="250" cy="500" r="8" fill="#E76F51" opacity="0.5"/>
  <circle cx="560" cy="480" r="10" fill="#457B9D" opacity="0.4"/>

  <!-- Delicate balance line at base -->
  <line x1="370" y1="752" x2="430" y2="752" stroke="#000000" stroke-width="3" opacity="0.5"/>
  <circle cx="400" cy="755" r="4" fill="#000000" opacity="0.6"/>
</svg>