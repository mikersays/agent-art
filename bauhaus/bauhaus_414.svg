<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle background grid -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.8" opacity="0.15"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.8" opacity="0.15"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.8" opacity="0.15"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.8" opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.8" opacity="0.15"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.8" opacity="0.15"/>

  <!-- Focal point 1: large planet at upper-left area -->
  <circle cx="250" cy="270" r="38" fill="#E63946"/>
  <circle cx="250" cy="270" r="28" fill="#F4D35E"/>

  <!-- Focal point 2: medium planet at lower-right -->
  <circle cx="580" cy="540" r="28" fill="#F4D35E"/>
  <circle cx="580" cy="540" r="18" fill="#E63946"/>

  <!-- Focal point 3: small planet upper-right -->
  <circle cx="620" cy="200" r="18" fill="#E63946"/>

  <!-- Orbital ellipses around focal point 1 (250, 270) -->
  <ellipse cx="250" cy="270" rx="130" ry="70" fill="none" stroke="#1D3557" stroke-width="2.5"/>
  <ellipse cx="250" cy="270" rx="200" ry="110" fill="none" stroke="#000000" stroke-width="1.8"/>
  <ellipse cx="250" cy="270" rx="270" ry="150" fill="none" stroke="#2A9D8F" stroke-width="2"/>
  <ellipse cx="250" cy="270" rx="340" ry="190" fill="none" stroke="#1D3557" stroke-width="1.2" opacity="0.5"/>
  <!-- Tilted orbit around focal 1 -->
  <ellipse cx="250" cy="270" rx="220" ry="80" fill="none" stroke="#000000" stroke-width="1.5" transform="rotate(-30 250 270)"/>
  <ellipse cx="250" cy="270" rx="160" ry="50" fill="none" stroke="#2A9D8F" stroke-width="1.5" transform="rotate(45 250 270)"/>

  <!-- Orbital ellipses around focal point 2 (580, 540) -->
  <ellipse cx="580" cy="540" rx="110" ry="60" fill="none" stroke="#000000" stroke-width="2.5"/>
  <ellipse cx="580" cy="540" rx="175" ry="95" fill="none" stroke="#2A9D8F" stroke-width="2"/>
  <ellipse cx="580" cy="540" rx="240" ry="130" fill="none" stroke="#1D3557" stroke-width="1.5" opacity="0.6"/>
  <!-- Tilted orbit around focal 2 -->
  <ellipse cx="580" cy="540" rx="190" ry="70" fill="none" stroke="#000000" stroke-width="1.5" transform="rotate(25 580 540)"/>
  <ellipse cx="580" cy="540" rx="130" ry="45" fill="none" stroke="#2A9D8F" stroke-width="1.2" transform="rotate(-40 580 540)"/>

  <!-- Orbital ellipses around focal point 3 (620, 200) -->
  <ellipse cx="620" cy="200" rx="80" ry="45" fill="none" stroke="#1D3557" stroke-width="2"/>
  <ellipse cx="620" cy="200" rx="140" ry="75" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="620" cy="200" rx="80" ry="35" fill="none" stroke="#000000" stroke-width="1.5" transform="rotate(35 620 200)"/>

  <!-- Small orbiting body circles on orbital paths -->
  <circle cx="380" cy="270" r="8" fill="#2A9D8F"/>
  <circle cx="180" cy="160" r="7" fill="#1D3557"/>
  <circle cx="120" cy="340" r="6" fill="#2A9D8F" opacity="0.85"/>
  <circle cx="460" cy="210" r="6" fill="#1D3557" opacity="0.8"/>
  <circle cx="310" cy="400" r="5" fill="#000000" opacity="0.6"/>
  <circle cx="50" cy="255" r="5" fill="#2A9D8F" opacity="0.6"/>

  <circle cx="755" cy="540" r="9" fill="#1D3557"/>
  <circle cx="580" cy="410" r="7" fill="#2A9D8F"/>
  <circle cx="440" cy="510" r="6" fill="#000000" opacity="0.7"/>
  <circle cx="590" cy="680" r="6" fill="#1D3557" opacity="0.75"/>
  <circle cx="720" cy="620" r="5" fill="#2A9D8F" opacity="0.6"/>

  <circle cx="700" cy="240" r="7" fill="#1D3557"/>
  <circle cx="560" cy="135" r="6" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="700" cy="155" r="5" fill="#000000" opacity="0.6"/>

  <!-- Cross-system connecting lines (faint) -->
  <line x1="250" y1="270" x2="580" y2="540" stroke="#A89F91" stroke-width="1" opacity="0.25"/>
  <line x1="250" y1="270" x2="620" y2="200" stroke="#A89F91" stroke-width="1" opacity="0.2"/>
  <line x1="580" y1="540" x2="620" y2="200" stroke="#A89F91" stroke-width="1" opacity="0.18"/>

  <!-- Border accent lines -->
  <rect x="0" y="0" width="800" height="800" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.3"/>
</svg>
