<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Row 1: Irregular checkerboard -->
  <rect x="0" y="0" width="100" height="100" fill="#E63946" opacity="0.85"/>
  <rect x="100" y="0" width="100" height="100" fill="#FEFAE0"/>
  <rect x="200" y="0" width="120" height="100" fill="#1D3557" opacity="0.8"/>
  <rect x="320" y="0" width="80" height="100" fill="#F4D35E" opacity="0.85"/>
  <circle cx="450" cy="50" r="45" fill="#2A9D8F" opacity="0.7"/>
  <rect x="500" y="0" width="100" height="100" fill="#E63946" opacity="0.75"/>
  <rect x="600" y="0" width="110" height="100" fill="#FEFAE0" stroke="#000000" stroke-width="2"/>
  <rect x="710" y="0" width="90" height="100" fill="#A89F91" opacity="0.6"/>
  <!-- Row 2 -->
  <rect x="0" y="100" width="100" height="110" fill="#FEFAE0"/>
  <rect x="100" y="100" width="100" height="110" fill="#E63946" opacity="0.8" stroke="#000000" stroke-width="2"/>
  <polygon points="200,100 320,100 320,210 200,210" fill="#F4D35E" opacity="0.7"/>
  <rect x="320" y="100" width="80" height="110" fill="#1D3557" opacity="0.85"/>
  <rect x="400" y="100" width="100" height="110" fill="#E76F51" opacity="0.75"/>
  <rect x="500" y="100" width="100" height="110" fill="#FEFAE0"/>
  <polygon points="650,105 700,210 600,210" fill="#2A9D8F" opacity="0.65"/>
  <rect x="710" y="100" width="90" height="110" fill="#F4D35E" opacity="0.8"/>
  <!-- Row 3 -->
  <rect x="0" y="210" width="100" height="90" fill="#1D3557" opacity="0.75" stroke="#000000" stroke-width="2"/>
  <circle cx="150" cy="255" r="40" fill="#E76F51" opacity="0.7"/>
  <rect x="200" y="210" width="120" height="90" fill="#FEFAE0"/>
  <rect x="320" y="210" width="80" height="90" fill="#A89F91" opacity="0.65"/>
  <rect x="400" y="210" width="100" height="90" fill="#F4D35E" opacity="0.8" stroke="#000000" stroke-width="2"/>
  <rect x="500" y="210" width="100" height="90" fill="#1D3557" opacity="0.7"/>
  <rect x="600" y="210" width="110" height="90" fill="#E63946" opacity="0.85"/>
  <rect x="710" y="210" width="90" height="90" fill="#FEFAE0"/>
  <!-- Row 4 -->
  <rect x="0" y="300" width="100" height="100" fill="#E76F51" opacity="0.7"/>
  <rect x="100" y="300" width="100" height="100" fill="#FEFAE0" stroke="#000000" stroke-width="1"/>
  <rect x="200" y="300" width="120" height="100" fill="#2A9D8F" opacity="0.75"/>
  <polygon points="360,300 400,400 320,400" fill="#E63946" opacity="0.8"/>
  <rect x="400" y="300" width="100" height="100" fill="#FEFAE0"/>
  <rect x="500" y="300" width="100" height="100" fill="#F4D35E" opacity="0.75"/>
  <rect x="600" y="300" width="110" height="100" fill="#1D3557" opacity="0.8" stroke="#000000" stroke-width="2"/>
  <circle cx="755" cy="350" r="40" fill="#A89F91" opacity="0.6"/>
  <!-- Row 5 -->
  <rect x="0" y="400" width="100" height="100" fill="#FEFAE0"/>
  <rect x="100" y="400" width="100" height="100" fill="#1D3557" opacity="0.8"/>
  <circle cx="260" cy="450" r="50" fill="#F4D35E" opacity="0.7"/>
  <rect x="320" y="400" width="80" height="100" fill="#E63946" opacity="0.75" stroke="#000000" stroke-width="2"/>
  <rect x="400" y="400" width="100" height="100" fill="#2A9D8F" opacity="0.7"/>
  <rect x="500" y="400" width="100" height="100" fill="#FEFAE0"/>
  <rect x="600" y="400" width="110" height="100" fill="#E76F51" opacity="0.8"/>
  <rect x="710" y="400" width="90" height="100" fill="#1D3557" opacity="0.7"/>
  <!-- Row 6-8: Forest green rectangles break grid in lower-left -->
  <rect x="0" y="500" width="220" height="140" fill="#264653" opacity="0.85"/>
  <rect x="0" y="640" width="180" height="160" fill="#264653" opacity="0.75"/>
  <rect x="180" y="680" width="80" height="120" fill="#264653" opacity="0.6"/>
  <!-- Remaining grid squares -->
  <rect x="220" y="500" width="100" height="100" fill="#F4D35E" opacity="0.8"/>
  <rect x="320" y="500" width="80" height="100" fill="#FEFAE0" stroke="#000000" stroke-width="1"/>
  <rect x="400" y="500" width="100" height="100" fill="#E63946" opacity="0.8"/>
  <rect x="500" y="500" width="100" height="100" fill="#A89F91" opacity="0.65"/>
  <rect x="600" y="500" width="110" height="100" fill="#FEFAE0"/>
  <rect x="710" y="500" width="90" height="100" fill="#F4D35E" opacity="0.75"/>
  <rect x="260" y="600" width="140" height="100" fill="#1D3557" opacity="0.7"/>
  <rect x="400" y="600" width="100" height="100" fill="#FEFAE0" stroke="#000000" stroke-width="2"/>
  <circle cx="550" cy="650" r="45" fill="#E76F51" opacity="0.7"/>
  <rect x="600" y="600" width="110" height="100" fill="#2A9D8F" opacity="0.75"/>
  <rect x="710" y="600" width="90" height="100" fill="#E63946" opacity="0.8"/>
  <rect x="260" y="700" width="140" height="100" fill="#A89F91" opacity="0.6"/>
  <rect x="400" y="700" width="100" height="100" fill="#F4D35E" opacity="0.7"/>
  <rect x="500" y="700" width="100" height="100" fill="#1D3557" opacity="0.75"/>
  <rect x="600" y="700" width="110" height="100" fill="#FEFAE0"/>
  <rect x="710" y="700" width="90" height="100" fill="#E76F51" opacity="0.65"/>
  <!-- Large burgundy circle overlapping upper area -->
  <circle cx="350" cy="160" r="110" fill="#6D2E46" opacity="0.7"/>
  <!-- Steel blue diagonal line cutting across -->
  <line x1="50" y1="750" x2="750" y2="50" stroke="#457B9D" stroke-width="4" opacity="0.6"/>
  <!-- Black outline accents on select squares -->
  <rect x="0" y="0" width="100" height="100" fill="none" stroke="#000000" stroke-width="3"/>
  <rect x="500" y="300" width="100" height="100" fill="none" stroke="#000000" stroke-width="2"/>
</svg>