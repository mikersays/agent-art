<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Sky background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Thin horizontal lines throughout -->
  <line x1="0" y1="80" x2="800" y2="80" stroke="#A89F91" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="#A89F91" stroke-width="0.5" opacity="0.12"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#A89F91" stroke-width="0.5" opacity="0.12"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="480" x2="800" y2="480" stroke="#A89F91" stroke-width="0.5" opacity="0.12"/>
  <line x1="0" y1="560" x2="800" y2="560" stroke="#A89F91" stroke-width="0.7" opacity="0.18"/>
  <line x1="0" y1="620" x2="800" y2="620" stroke="#A89F91" stroke-width="0.7" opacity="0.15"/>
  <line x1="0" y1="680" x2="800" y2="680" stroke="#A89F91" stroke-width="0.7" opacity="0.18"/>
  <line x1="0" y1="740" x2="800" y2="740" stroke="#A89F91" stroke-width="0.7" opacity="0.15"/>
  <!-- Bottom third: landscape blocks -->
  <rect x="0" y="580" width="800" height="220" fill="#264653" opacity="0.85"/>
  <rect x="0" y="620" width="350" height="180" fill="#2A9D8F" opacity="0.7"/>
  <rect x="300" y="650" width="500" height="150" fill="#264653" opacity="0.6"/>
  <rect x="500" y="600" width="300" height="80" fill="#2A9D8F" opacity="0.5"/>
  <rect x="0" y="700" width="200" height="100" fill="#264653" opacity="0.9"/>
  <rect x="600" y="720" width="200" height="80" fill="#2A9D8F" opacity="0.8"/>
  <!-- Red accent block in landscape -->
  <rect x="150" y="640" width="60" height="100" fill="#E63946" opacity="0.7"/>
  <!-- Orange accent block -->
  <rect x="450" y="670" width="80" height="50" fill="#E76F51" opacity="0.65"/>
  <!-- Large yellow sun circle -->
  <circle cx="520" cy="320" r="140" fill="#F4D35E" opacity="0.9"/>
  <circle cx="520" cy="320" r="110" fill="#F4D35E" opacity="0.3"/>
  <!-- Sun inner ring -->
  <circle cx="520" cy="320" r="60" fill="#E9C46A" opacity="0.5"/>
  <!-- Scattered sky shapes - light blue -->
  <circle cx="120" cy="100" r="18" fill="#A8DADC" opacity="0.5"/>
  <circle cx="250" cy="150" r="12" fill="#A8DADC" opacity="0.4"/>
  <circle cx="680" cy="120" r="15" fill="#A8DADC" opacity="0.45"/>
  <circle cx="380" cy="80" r="10" fill="#FEFAE0" opacity="0.6"/>
  <circle cx="90" cy="220" r="8" fill="#A8DADC" opacity="0.35"/>
  <circle cx="700" cy="230" r="14" fill="#A8DADC" opacity="0.4"/>
  <rect x="180" y="190" width="20" height="20" fill="#A8DADC" opacity="0.3"/>
  <rect x="600" y="80" width="15" height="15" fill="#FEFAE0" opacity="0.5"/>
  <!-- Red and orange accents in upper area -->
  <circle cx="320" cy="200" r="10" fill="#E63946" opacity="0.6"/>
  <circle cx="150" cy="300" r="7" fill="#E76F51" opacity="0.55"/>
  <rect x="650" y="190" width="25" height="8" fill="#E63946" opacity="0.5"/>
  <rect x="50" y="350" width="30" height="10" fill="#E76F51" opacity="0.45"/>
  <!-- Horizontal layering lines in middle zone -->
  <line x1="0" y1="500" x2="400" y2="500" stroke="#264653" stroke-width="2" opacity="0.4"/>
  <line x1="350" y1="530" x2="800" y2="530" stroke="#2A9D8F" stroke-width="2" opacity="0.35"/>
  <line x1="100" y1="555" x2="700" y2="555" stroke="#264653" stroke-width="1.5" opacity="0.3"/>
  <!-- Depth layers - translucent shapes -->
  <rect x="0" y="450" width="800" height="30" fill="#2A9D8F" opacity="0.1"/>
  <rect x="0" y="510" width="800" height="20" fill="#264653" opacity="0.12"/>
  <!-- Small detail shapes -->
  <polygon points="740,660 755,640 770,660" fill="#E63946" opacity="0.6"/>
  <polygon points="60,590 75,570 90,590" fill="#F4D35E" opacity="0.7"/>
  <circle cx="400" cy="750" r="5" fill="#E76F51" opacity="0.6"/>
  <circle cx="300" cy="770" r="4" fill="#F4D35E" opacity="0.5"/>
  <!-- Corner accents -->
  <rect x="15" y="15" width="30" height="30" fill="#264653" opacity="0.25"/>
  <rect x="755" y="15" width="30" height="30" fill="#E63946" opacity="0.2"/>
  <!-- Reflection of sun on landscape -->
  <ellipse cx="520" cy="610" rx="80" ry="12" fill="#F4D35E" opacity="0.25"/>
</svg>