<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>

  <!-- Subtle grid lines -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="0" x2="800" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>

  <!-- Secondary direction lines (thin) -->
  <!-- NE -->
  <line x1="400" y1="400" x2="680" y2="120" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- NW -->
  <line x1="400" y1="400" x2="120" y2="120" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- SE -->
  <line x1="400" y1="400" x2="680" y2="680" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <!-- SW -->
  <line x1="400" y1="400" x2="120" y2="680" stroke="#000000" stroke-width="1.5" opacity="0.4"/>

  <!-- Primary direction lines -->
  <!-- N -->
  <line x1="400" y1="400" x2="400" y2="50" stroke="#000000" stroke-width="2.5" opacity="0.6"/>
  <!-- S -->
  <line x1="400" y1="400" x2="400" y2="750" stroke="#000000" stroke-width="2.5" opacity="0.6"/>
  <!-- E -->
  <line x1="400" y1="400" x2="750" y2="400" stroke="#000000" stroke-width="2.5" opacity="0.6"/>
  <!-- W -->
  <line x1="400" y1="400" x2="50" y2="400" stroke="#000000" stroke-width="2.5" opacity="0.6"/>

  <!-- North triangle (Red) -->
  <polygon points="400,80 360,180 440,180" fill="#E63946" opacity="0.9"/>
  <!-- South triangle (Blue) -->
  <polygon points="400,720 360,620 440,620" fill="#1D3557" opacity="0.9"/>
  <!-- East triangle (Yellow) -->
  <polygon points="720,400 620,360 620,440" fill="#F4D35E" opacity="0.9"/>
  <!-- West triangle (Teal) -->
  <polygon points="80,400 180,360 180,440" fill="#2A9D8F" opacity="0.9"/>

  <!-- Diagonal secondary markers (smaller triangles) -->
  <!-- NE -->
  <polygon points="610,190 570,230 610,230" fill="#E76F51" opacity="0.7"/>
  <!-- NW -->
  <polygon points="190,190 190,230 230,230" fill="#457B9D" opacity="0.7"/>
  <!-- SE -->
  <polygon points="610,610 570,570 610,570" fill="#DDA15E" opacity="0.7"/>
  <!-- SW -->
  <polygon points="190,610 190,570 230,570" fill="#6D2E46" opacity="0.7"/>

  <!-- Concentric circles at center -->
  <circle cx="400" cy="400" r="90" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <circle cx="400" cy="400" r="60" fill="none" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <circle cx="400" cy="400" r="30" fill="#000000" opacity="0.15"/>
  <circle cx="400" cy="400" r="30" fill="none" stroke="#000000" stroke-width="2.5" opacity="0.7"/>

  <!-- Center dot -->
  <circle cx="400" cy="400" r="6" fill="#000000" opacity="0.9"/>

  <!-- Small accent shapes along primary axes -->
  <rect x="390" y="220" width="20" height="20" fill="#E63946" opacity="0.4" transform="rotate(45 400 230)"/>
  <rect x="390" y="560" width="20" height="20" fill="#1D3557" opacity="0.4" transform="rotate(45 400 570)"/>
  <circle cx="560" cy="400" r="8" fill="#F4D35E" opacity="0.5"/>
  <circle cx="240" cy="400" r="8" fill="#2A9D8F" opacity="0.5"/>

  <!-- Tick marks on concentric circles -->
  <line x1="400" y1="310" x2="400" y2="325" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="400" y1="475" x2="400" y2="490" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="310" y1="400" x2="325" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="475" y1="400" x2="490" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.6"/>

  <!-- Outer ring markers -->
  <circle cx="400" cy="400" r="150" fill="none" stroke="#A89F91" stroke-width="0.8" opacity="0.2"/>
  <circle cx="400" cy="400" r="250" fill="none" stroke="#A89F91" stroke-width="0.5" opacity="0.15"/>

  <!-- Small decorative elements at cardinal extremes -->
  <circle cx="400" cy="55" r="5" fill="#E63946" opacity="0.6"/>
  <circle cx="400" cy="745" r="5" fill="#1D3557" opacity="0.6"/>
  <circle cx="745" cy="400" r="5" fill="#F4D35E" opacity="0.6"/>
  <circle cx="55" cy="400" r="5" fill="#2A9D8F" opacity="0.6"/>

  <!-- Corner accents -->
  <rect x="20" y="20" width="30" height="30" fill="#000000" opacity="0.08"/>
  <rect x="750" y="20" width="30" height="30" fill="#000000" opacity="0.08"/>
  <rect x="20" y="750" width="30" height="30" fill="#000000" opacity="0.08"/>
  <rect x="750" y="750" width="30" height="30" fill="#000000" opacity="0.08"/>

  <!-- Additional radial accent lines (shorter) -->
  <line x1="400" y1="340" x2="340" y2="280" stroke="#E63946" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="340" x2="460" y2="280" stroke="#F4D35E" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="460" x2="340" y2="520" stroke="#2A9D8F" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="460" x2="460" y2="520" stroke="#1D3557" stroke-width="1" opacity="0.3"/>

  <!-- Small triangles near center ring -->
  <polygon points="400,305 395,315 405,315" fill="#000000" opacity="0.5"/>
  <polygon points="400,495 395,485 405,485" fill="#000000" opacity="0.5"/>
  <polygon points="305,400 315,395 315,405" fill="#000000" opacity="0.5"/>
  <polygon points="495,400 485,395 485,405" fill="#000000" opacity="0.5"/>
</svg>