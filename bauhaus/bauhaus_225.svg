<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#1D3557"/>

  <!-- Large central crystal -->
  <polygon points="400,120 340,350 370,500 430,500 460,350" fill="#457B9D" stroke="#FFF" stroke-width="1.5"/>
  <!-- Central crystal facet divisions -->
  <line x1="400" y1="120" x2="370" y2="500" stroke="#FEFAE0" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="120" x2="430" y2="500" stroke="#FEFAE0" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="120" x2="400" y2="500" stroke="#FEFAE0" stroke-width="1" opacity="0.4"/>
  <!-- Light facet on central crystal -->
  <polygon points="400,120 340,350 370,500 400,500" fill="#457B9D" opacity="0.8"/>
  <polygon points="400,120 460,350 430,500 400,500" fill="#2A9D8F" opacity="0.6"/>

  <!-- Left tall crystal -->
  <polygon points="250,200 210,420 230,520 270,520 290,420" fill="#2A9D8F" stroke="#FFF" stroke-width="1.5"/>
  <line x1="250" y1="200" x2="250" y2="520" stroke="#FEFAE0" stroke-width="1" opacity="0.4"/>
  <polygon points="250,200 210,420 230,520 250,520" fill="#2A9D8F" opacity="0.9"/>
  <polygon points="250,200 290,420 270,520 250,520" fill="#1D3557" opacity="0.5"/>

  <!-- Right tall crystal -->
  <polygon points="540,180 510,400 525,530 565,530 580,400" fill="#457B9D" stroke="#FFF" stroke-width="1.5"/>
  <line x1="540" y1="180" x2="545" y2="530" stroke="#FEFAE0" stroke-width="1" opacity="0.4"/>
  <polygon points="540,180 510,400 525,530 545,530" fill="#457B9D"/>
  <polygon points="540,180 580,400 565,530 545,530" fill="#2A9D8F" opacity="0.7"/>

  <!-- Small crystal left-front -->
  <polygon points="310,340 290,470 305,530 325,530 340,470" fill="#E63946" stroke="#FFF" stroke-width="1" opacity="0.8"/>
  <line x1="310" y1="340" x2="315" y2="530" stroke="#FEFAE0" stroke-width="0.8" opacity="0.4"/>

  <!-- Small crystal right-front -->
  <polygon points="480,300 460,450 472,530 498,530 510,450" fill="#F4D35E" stroke="#FFF" stroke-width="1" opacity="0.7"/>
  <line x1="480" y1="300" x2="485" y2="530" stroke="#FEFAE0" stroke-width="0.8" opacity="0.4"/>

  <!-- Tiny crystal far left -->
  <polygon points="180,360 168,480 178,530 192,530 202,480" fill="#E63946" stroke="#FFF" stroke-width="1" opacity="0.6"/>

  <!-- Tiny crystal far right -->
  <polygon points="620,320 605,460 615,530 635,530 645,460" fill="#F4D35E" stroke="#FFF" stroke-width="1" opacity="0.5"/>

  <!-- Crystal base / ground plane -->
  <polygon points="100,530 400,580 700,530 400,620" fill="#000" opacity="0.5"/>

  <!-- Light reflection beams from top-left -->
  <line x1="100" y1="50" x2="400" y2="120" stroke="#FFF" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="50" x2="250" y2="200" stroke="#FFF" stroke-width="1" opacity="0.25"/>
  <line x1="100" y1="50" x2="540" y2="180" stroke="#FFF" stroke-width="0.8" opacity="0.2"/>

  <!-- Light source -->
  <circle cx="100" cy="50" r="20" fill="#F4D35E" opacity="0.6"/>
  <circle cx="100" cy="50" r="10" fill="#FFF" opacity="0.8"/>

  <!-- Geometric light reflections / sparkles on crystals -->
  <polygon points="400,140 395,150 400,160 405,150" fill="#FFF" opacity="0.9"/>
  <polygon points="250,220 247,228 250,236 253,228" fill="#FFF" opacity="0.8"/>
  <polygon points="540,200 537,208 540,216 543,208" fill="#FFF" opacity="0.7"/>
  <polygon points="480,315 478,321 480,327 482,321" fill="#FFF" opacity="0.6"/>

  <!-- Reflected light on ground -->
  <polygon points="350,570 400,555 450,570 400,585" fill="#2A9D8F" opacity="0.2"/>
  <polygon points="280,560 320,545 360,560 320,575" fill="#E63946" opacity="0.15"/>
  <polygon points="440,560 480,545 520,560 480,575" fill="#F4D35E" opacity="0.15"/>

  <!-- Prismatic color bands cast by crystal -->
  <rect x="300" y="640" width="40" height="8" fill="#E63946" opacity="0.4"/>
  <rect x="340" y="640" width="40" height="8" fill="#F4D35E" opacity="0.4"/>
  <rect x="380" y="640" width="40" height="8" fill="#2A9D8F" opacity="0.4"/>
  <rect x="420" y="640" width="40" height="8" fill="#457B9D" opacity="0.4"/>
  <rect x="460" y="640" width="40" height="8" fill="#FFF" opacity="0.3"/>

  <!-- Shadow lines beneath crystals -->
  <line x1="200" y1="540" x2="160" y2="600" stroke="#000" stroke-width="2" opacity="0.3"/>
  <line x1="400" y1="540" x2="380" y2="620" stroke="#000" stroke-width="3" opacity="0.3"/>
  <line x1="560" y1="540" x2="590" y2="610" stroke="#000" stroke-width="2" opacity="0.3"/>

  <!-- Subtle grid overlay for Bauhaus feel -->
  <rect x="50" y="50" width="700" height="700" fill="none" stroke="#FEFAE0" stroke-width="0.5" opacity="0.15"/>
  <line x1="50" y1="400" x2="750" y2="400" stroke="#FEFAE0" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="50" x2="400" y2="750" stroke="#FEFAE0" stroke-width="0.5" opacity="0.1"/>
</svg>