<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Bauhaus Portcullis - Castle gate grid with pointed teeth and chain mechanism -->

  <!-- Background -->
  <rect width="800" height="800" fill="#1D3557"/>

  <!-- Stone wall -->
  <rect x="50" y="50" width="700" height="700" fill="#264653" stroke="#000" stroke-width="4"/>

  <!-- Gate arch - pointed top -->
  <path d="M200 650 L200 300 Q200 150 400 120 Q600 150 600 300 L600 650" fill="#000" stroke="#F4D35E" stroke-width="5"/>

  <!-- Arch keystone -->
  <polygon points="380,130 420,130 425,160 375,160" fill="#E63946"/>

  <!-- Vertical bars of portcullis -->
  <rect x="240" y="180" width="16" height="470" fill="#F4D35E" rx="3"/>
  <rect x="310" y="160" width="16" height="490" fill="#F4D35E" rx="3"/>
  <rect x="380" y="150" width="16" height="500" fill="#F4D35E" rx="3"/>
  <rect x="450" y="155" width="16" height="495" fill="#F4D35E" rx="3"/>
  <rect x="520" y="170" width="16" height="480" fill="#F4D35E" rx="3"/>

  <!-- Horizontal bars of portcullis -->
  <rect x="220" y="250" width="340" height="12" fill="#E9C46A" rx="2"/>
  <rect x="210" y="340" width="360" height="12" fill="#E9C46A" rx="2"/>
  <rect x="205" y="430" width="370" height="12" fill="#E9C46A" rx="2"/>
  <rect x="200" y="520" width="380" height="12" fill="#E9C46A" rx="2"/>

  <!-- Pointed bottom teeth -->
  <polygon points="232,650 248,690 264,650" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <polygon points="302,650 318,690 334,650" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <polygon points="372,650 388,690 404,650" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <polygon points="442,650 458,690 474,650" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <polygon points="512,650 528,690 544,650" fill="#F4D35E" stroke="#000" stroke-width="2"/>

  <!-- Chain mechanism housing above gate -->
  <rect x="250" y="60" width="280" height="70" fill="#000" stroke="#E63946" stroke-width="3"/>

  <!-- Chain sprockets -->
  <circle cx="310" cy="95" r="22" fill="none" stroke="#F4D35E" stroke-width="4"/>
  <circle cx="310" cy="95" r="8" fill="#E63946"/>
  <circle cx="470" cy="95" r="22" fill="none" stroke="#F4D35E" stroke-width="4"/>
  <circle cx="470" cy="95" r="8" fill="#E63946"/>

  <!-- Chains hanging down -->
  <line x1="310" y1="117" x2="310" y2="180" stroke="#E9C46A" stroke-width="5" stroke-dasharray="8,6"/>
  <line x1="470" y1="117" x2="470" y2="180" stroke="#E9C46A" stroke-width="5" stroke-dasharray="8,6"/>

  <!-- Wall texture blocks -->
  <rect x="60" y="80" width="120" height="50" fill="none" stroke="#E76F51" stroke-width="2" opacity="0.5"/>
  <rect x="60" y="150" width="80" height="50" fill="none" stroke="#E76F51" stroke-width="2" opacity="0.5"/>
  <rect x="620" y="80" width="120" height="50" fill="none" stroke="#E76F51" stroke-width="2" opacity="0.5"/>
  <rect x="640" y="150" width="100" height="50" fill="none" stroke="#E76F51" stroke-width="2" opacity="0.5"/>

  <!-- Decorative corner towers -->
  <rect x="50" y="50" width="40" height="80" fill="#E63946"/>
  <rect x="710" y="50" width="40" height="80" fill="#E63946"/>

  <!-- Battlements -->
  <rect x="100" y="40" width="30" height="30" fill="#264653" stroke="#000" stroke-width="2"/>
  <rect x="160" y="40" width="30" height="30" fill="#264653" stroke="#000" stroke-width="2"/>
  <rect x="610" y="40" width="30" height="30" fill="#264653" stroke="#000" stroke-width="2"/>
  <rect x="670" y="40" width="30" height="30" fill="#264653" stroke="#000" stroke-width="2"/>

  <!-- Ground line -->
  <rect x="50" y="720" width="700" height="30" fill="#000"/>
  <line x1="50" y1="720" x2="750" y2="720" stroke="#E76F51" stroke-width="3"/>
</svg>