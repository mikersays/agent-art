<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#1D3557"/>

  <!-- Source 1 - concentric rings -->
  <circle cx="280" cy="400" r="40" fill="none" stroke="#E63946" stroke-width="3" opacity="0.9"/>
  <circle cx="280" cy="400" r="80" fill="none" stroke="#E63946" stroke-width="2.5" opacity="0.75"/>
  <circle cx="280" cy="400" r="120" fill="none" stroke="#E63946" stroke-width="2" opacity="0.6"/>
  <circle cx="280" cy="400" r="160" fill="none" stroke="#E63946" stroke-width="1.8" opacity="0.5"/>
  <circle cx="280" cy="400" r="200" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.4"/>
  <circle cx="280" cy="400" r="240" fill="none" stroke="#E63946" stroke-width="1.2" opacity="0.3"/>
  <circle cx="280" cy="400" r="280" fill="none" stroke="#E63946" stroke-width="1" opacity="0.25"/>
  <circle cx="280" cy="400" r="320" fill="none" stroke="#E63946" stroke-width="0.8" opacity="0.2"/>
  <circle cx="280" cy="400" r="360" fill="none" stroke="#E63946" stroke-width="0.6" opacity="0.15"/>

  <!-- Source 2 - concentric rings -->
  <circle cx="520" cy="400" r="40" fill="none" stroke="#F4D35E" stroke-width="3" opacity="0.9"/>
  <circle cx="520" cy="400" r="80" fill="none" stroke="#F4D35E" stroke-width="2.5" opacity="0.75"/>
  <circle cx="520" cy="400" r="120" fill="none" stroke="#F4D35E" stroke-width="2" opacity="0.6"/>
  <circle cx="520" cy="400" r="160" fill="none" stroke="#F4D35E" stroke-width="1.8" opacity="0.5"/>
  <circle cx="520" cy="400" r="200" fill="none" stroke="#F4D35E" stroke-width="1.5" opacity="0.4"/>
  <circle cx="520" cy="400" r="240" fill="none" stroke="#F4D35E" stroke-width="1.2" opacity="0.3"/>
  <circle cx="520" cy="400" r="280" fill="none" stroke="#F4D35E" stroke-width="1" opacity="0.25"/>
  <circle cx="520" cy="400" r="320" fill="none" stroke="#F4D35E" stroke-width="0.8" opacity="0.2"/>
  <circle cx="520" cy="400" r="360" fill="none" stroke="#F4D35E" stroke-width="0.6" opacity="0.15"/>

  <!-- Interference pattern - constructive nodes (where waves meet) -->
  <circle cx="400" cy="400" r="8" fill="#FFF" opacity="0.9"/>
  <circle cx="400" cy="320" r="6" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="400" cy="480" r="6" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="400" cy="240" r="5" fill="#FFF" opacity="0.6"/>
  <circle cx="400" cy="560" r="5" fill="#FFF" opacity="0.6"/>
  <circle cx="400" cy="160" r="4" fill="#2A9D8F" opacity="0.5"/>
  <circle cx="400" cy="640" r="4" fill="#2A9D8F" opacity="0.5"/>

  <!-- Diagonal interference nodes -->
  <circle cx="350" cy="340" r="5" fill="#FEFAE0" opacity="0.6"/>
  <circle cx="450" cy="340" r="5" fill="#FEFAE0" opacity="0.6"/>
  <circle cx="350" cy="460" r="5" fill="#FEFAE0" opacity="0.6"/>
  <circle cx="450" cy="460" r="5" fill="#FEFAE0" opacity="0.6"/>

  <!-- Source centers -->
  <circle cx="280" cy="400" r="12" fill="#E63946"/>
  <circle cx="280" cy="400" r="5" fill="#FFF"/>
  <circle cx="520" cy="400" r="12" fill="#F4D35E"/>
  <circle cx="520" cy="400" r="5" fill="#FFF"/>

  <!-- Interference highlight arcs in overlap zone -->
  <path d="M400,200 Q420,300 400,400" stroke="#FFF" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M400,400 Q380,500 400,600" stroke="#FFF" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M400,200 Q380,300 400,400" stroke="#FFF" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M400,400 Q420,500 400,600" stroke="#FFF" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Vertical midline emphasis -->
  <line x1="400" y1="80" x2="400" y2="720" stroke="#457B9D" stroke-width="1" opacity="0.4" stroke-dasharray="4,8"/>

  <!-- Outer frame -->
  <rect x="30" y="30" width="740" height="740" fill="none" stroke="#FEFAE0" stroke-width="2" opacity="0.3"/>
  <rect x="20" y="20" width="760" height="760" fill="none" stroke="#FEFAE0" stroke-width="1" opacity="0.2"/>
</svg>