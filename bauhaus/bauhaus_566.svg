<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Ground plane -->
  <rect x="0" y="600" width="800" height="200" fill="#DDA15E" opacity="0.3"/>

  <!-- Largest arch -->
  <path d="M 100 700 L 100 350 A 300 300 0 0 1 700 350 L 700 700" fill="none" stroke="#E76F51" stroke-width="18" opacity="0.7"/>

  <!-- Left pillar - largest arch -->
  <rect x="80" y="350" width="40" height="350" fill="#E76F51" opacity="0.7"/>
  <!-- Right pillar - largest arch -->
  <rect x="680" y="350" width="40" height="350" fill="#E76F51" opacity="0.7"/>

  <!-- Second arch -->
  <path d="M 170 700 L 170 380 A 230 230 0 0 1 630 380 L 630 700" fill="none" stroke="#6D2E46" stroke-width="14" opacity="0.75"/>

  <!-- Left pillar - second arch -->
  <rect x="155" y="380" width="30" height="320" fill="#6D2E46" opacity="0.75"/>
  <!-- Right pillar - second arch -->
  <rect x="615" y="380" width="30" height="320" fill="#6D2E46" opacity="0.75"/>

  <!-- Third arch -->
  <path d="M 230 700 L 230 400 A 170 170 0 0 1 570 400 L 570 700" fill="none" stroke="#DDA15E" stroke-width="12" opacity="0.8"/>

  <!-- Left pillar - third arch -->
  <rect x="218" y="400" width="24" height="300" fill="#DDA15E" opacity="0.8"/>
  <!-- Right pillar - third arch -->
  <rect x="558" y="400" width="24" height="300" fill="#DDA15E" opacity="0.8"/>

  <!-- Fourth arch -->
  <path d="M 290 700 L 290 430 A 110 110 0 0 1 510 430 L 510 700" fill="none" stroke="#E9C46A" stroke-width="10" opacity="0.85"/>

  <!-- Left pillar - fourth -->
  <rect x="280" y="430" width="20" height="270" fill="#E9C46A" opacity="0.85"/>
  <!-- Right pillar - fourth -->
  <rect x="500" y="430" width="20" height="270" fill="#E9C46A" opacity="0.85"/>

  <!-- Innermost arch -->
  <path d="M 340 700 L 340 460 A 60 60 0 0 1 460 460 L 460 700" fill="none" stroke="#E76F51" stroke-width="8"/>

  <!-- Left pillar - innermost -->
  <rect x="332" y="460" width="16" height="240" fill="#E76F51"/>
  <!-- Right pillar - innermost -->
  <rect x="452" y="460" width="16" height="240" fill="#E76F51"/>

  <!-- Teal accent circles along largest arch -->
  <circle cx="150" cy="360" r="6" fill="#2A9D8F"/>
  <circle cx="210" cy="280" r="5" fill="#2A9D8F"/>
  <circle cx="300" cy="210" r="7" fill="#2A9D8F"/>
  <circle cx="400" cy="185" r="8" fill="#2A9D8F"/>
  <circle cx="500" cy="210" r="7" fill="#2A9D8F"/>
  <circle cx="590" cy="280" r="5" fill="#2A9D8F"/>
  <circle cx="650" cy="360" r="6" fill="#2A9D8F"/>

  <!-- Teal accent circles along second arch -->
  <circle cx="240" cy="310" r="4" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="330" cy="260" r="5" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="400" cy="248" r="5" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="470" cy="260" r="4" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="560" cy="310" r="4" fill="#2A9D8F" opacity="0.8"/>

  <!-- Teal accent circles along inner arches -->
  <circle cx="310" cy="350" r="4" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="400" cy="320" r="5" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="490" cy="350" r="4" fill="#2A9D8F" opacity="0.7"/>

  <!-- Base line -->
  <line x1="50" y1="700" x2="750" y2="700" stroke="#000000" stroke-width="3"/>

  <!-- Decorative horizontal bars at base -->
  <rect x="120" y="710" width="560" height="8" fill="#6D2E46" opacity="0.4"/>
  <rect x="180" y="725" width="440" height="5" fill="#E76F51" opacity="0.3"/>

  <!-- Corner accents -->
  <rect x="20" y="20" width="30" height="30" fill="#6D2E46" opacity="0.5"/>
  <rect x="750" y="20" width="30" height="30" fill="#E76F51" opacity="0.5"/>
  <circle cx="35" cy="765" r="12" fill="#2A9D8F" opacity="0.5"/>
  <circle cx="765" cy="765" r="12" fill="#2A9D8F" opacity="0.5"/>

  <!-- Subtle background structure lines -->
  <line x1="400" y1="50" x2="400" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.15"/>
  <line x1="50" y1="400" x2="750" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.15"/>
  <line x1="200" y1="50" x2="200" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="50" x2="600" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
</svg>