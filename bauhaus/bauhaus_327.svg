  <line x1="400" y1="400" x2="800" y2="0" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="400" y1="400" x2="800" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="400" y1="400" x2="0" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.12"/>
  <line x1="400" y1="400" x2="400" y2="0" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="0" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
