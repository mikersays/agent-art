  <circle cx="530" cy="320" r="20" fill="#2A9D8F" opacity="0.55"/>
  <!-- Inner ring: small dense bright shapes -->
  <circle cx="400" cy="380" r="8" fill="#E63946" opacity="0.9"/>
  <circle cx="385" cy="410" r="6" fill="#F4D35E" opacity="0.95"/>
  <circle cx="420" cy="395" r="7" fill="#E76F51" opacity="0.9"/>
  <rect x="392" y="415" width="10" height="10" fill="#E63946" opacity="0.85"/>
  <circle cx="410" cy="375" r="5" fill="#F4D35E" opacity="0.9"/>
  <rect x="375" y="390" width="8" height="8" fill="#E76F51" opacity="0.8"/>
  <circle cx="395" cy="365" r="9" fill="#E63946" opacity="0.85"/>
  <circle cx="425" cy="415" r="6" fill="#F4D35E" opacity="0.9"/>
  <rect x="365" y="375" width="7" height="7" fill="#E76F51" opacity="0.8"/>
  <circle cx="415" cy="430" r="5" fill="#E63946" opacity="0.85"/>
  <circle cx="370" y="420" r="7" fill="#DDA15E" opacity="0.8"/>
  <circle cx="430" cy="385" r="8" fill="#E9C46A" opacity="0.85"/>
  <rect x="405" y="360" width="9" height="9" fill="#F4D35E" opacity="0.9"/>
