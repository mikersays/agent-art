<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Dark background -->
  <rect x="0" y="0" width="800" height="800" fill="#264653"/>
  <!-- Radial lines extending from focal point (300, 350) -->
  <line x1="300" y1="350" x2="0" y2="0" stroke="#FFFFFF" stroke-width="0.8" opacity="0.1"/>
  <line x1="300" y1="350" x2="400" y2="0" stroke="#FFFFFF" stroke-width="0.8" opacity="0.1"/>
  <line x1="300" y1="350" x2="800" y2="0" stroke="#FFFFFF" stroke-width="0.8" opacity="0.1"/>
  <line x1="300" y1="350" x2="800" y2="350" stroke="#FFFFFF" stroke-width="0.8" opacity="0.1"/>
  <line x1="300" y1="350" x2="800" y2="800" stroke="#FFFFFF" stroke-width="0.8" opacity="0.1"/>
  <line x1="300" y1="350" x2="300" y2="800" stroke="#FFFFFF" stroke-width="0.8" opacity="0.1"/>
  <line x1="300" y1="350" x2="0" y2="800" stroke="#FFFFFF" stroke-width="0.8" opacity="0.1"/>
  <line x1="300" y1="350" x2="0" y2="350" stroke="#FFFFFF" stroke-width="0.8" opacity="0.1"/>
  <line x1="300" y1="350" x2="800" y2="150" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="300" y1="350" x2="800" y2="600" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="300" y1="350" x2="100" y2="800" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="300" y1="350" x2="600" y2="0" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <!-- Concentric forms outward from (300, 350) -->
  <!-- Layer 1: Red center circle -->
  <circle cx="300" cy="350" r="30" fill="#E63946" opacity="0.95"/>
  <!-- Layer 2: Blue square -->
  <rect x="250" y="300" width="100" height="100" fill="none" stroke="#1D3557" stroke-width="4" opacity="0.9"/>
  <rect x="255" y="305" width="90" height="90" fill="#1D3557" opacity="0.2"/>
  <!-- Layer 3: Yellow circle -->
  <circle cx="300" cy="350" r="80" fill="none" stroke="#F4D35E" stroke-width="4" opacity="0.85"/>
  <circle cx="300" cy="350" r="78" fill="#F4D35E" opacity="0.1"/>
  <!-- Layer 4: Teal square -->
  <rect x="185" y="235" width="230" height="230" fill="none" stroke="#2A9D8F" stroke-width="3.5" opacity="0.75"/>
  <rect x="190" y="240" width="220" height="220" fill="#2A9D8F" opacity="0.08"/>
  <!-- Layer 5: Red circle -->
  <circle cx="300" cy="350" r="150" fill="none" stroke="#E63946" stroke-width="3" opacity="0.6"/>
  <!-- Layer 6: Blue square -->
  <rect x="115" y="165" width="370" height="370" fill="none" stroke="#1D3557" stroke-width="2.5" opacity="0.5"/>
  <!-- Layer 7: Yellow circle -->
  <circle cx="300" cy="350" r="220" fill="none" stroke="#F4D35E" stroke-width="2" opacity="0.4"/>
  <!-- Layer 8: Teal square (partial, extends off-canvas slightly) -->
  <rect x="40" y="90" width="520" height="520" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.3"/>
  <!-- Accent triangles at quadrant edges -->
  <!-- Top edge -->
  <polygon points="380,30 410,30 395,60" fill="#E63946" opacity="0.7"/>
  <!-- Right edge -->
  <polygon points="750,320 750,380 720,350" fill="#F4D35E" opacity="0.7"/>
  <!-- Bottom edge -->
  <polygon points="280,750 320,750 300,720" fill="#2A9D8F" opacity="0.7"/>
  <!-- Left edge -->
  <polygon points="30,330 30,370 60,350" fill="#1D3557" opacity="0.8"/>
  <!-- Additional accent triangles at corners -->
  <polygon points="20,20 70,20 20,70" fill="#E76F51" opacity="0.5"/>
  <polygon points="780,20 780,70 730,20" fill="#457B9D" opacity="0.5"/>
  <polygon points="20,780 70,780 20,730" fill="#DDA15E" opacity="0.5"/>
  <polygon points="780,780 730,780 780,730" fill="#A8DADC" opacity="0.4"/>
  <!-- Small inner accent circle at center -->
  <circle cx="300" cy="350" r="10" fill="#FFFFFF" opacity="0.9"/>
  <!-- Thin inner cross at focal point -->
  <line x1="285" y1="350" x2="315" y2="350" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="300" y1="335" x2="300" y2="365" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
</svg>