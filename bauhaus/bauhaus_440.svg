<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Sky background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- River rectangle at bottom -->
  <rect x="0" y="620" width="800" height="180" fill="#1D3557" opacity="0.85"/>
  <!-- River surface shimmer -->
  <rect x="0" y="620" width="800" height="8" fill="#A8DADC" opacity="0.50"/>
  <line x1="0" y1="650" x2="800" y2="650" stroke="#A8DADC" stroke-width="1.5" opacity="0.25"/>
  <line x1="0" y1="680" x2="800" y2="680" stroke="#A8DADC" stroke-width="1" opacity="0.18"/>
  <line x1="0" y1="710" x2="800" y2="710" stroke="#457B9D" stroke-width="1.5" opacity="0.22"/>
  <line x1="0" y1="740" x2="800" y2="740" stroke="#A8DADC" stroke-width="1" opacity="0.15"/>

  <!-- Bridge deck horizontal bar -->
  <rect x="0" y="490" width="800" height="18" fill="#264653"/>
  <!-- Deck top highlight -->
  <rect x="0" y="490" width="800" height="3" fill="#457B9D" opacity="0.60"/>

  <!-- Main bridge arch (left span): large arc in steel blue -->
  <path d="M 60 490 Q 230 300 400 490" fill="none" stroke="#457B9D" stroke-width="8"/>
  <!-- Main bridge arch (right span) -->
  <path d="M 400 490 Q 570 300 740 490" fill="none" stroke="#457B9D" stroke-width="8"/>

  <!-- Secondary arch (left, thinner, darker) -->
  <path d="M 80 490 Q 240 330 400 490" fill="none" stroke="#264653" stroke-width="3.5" opacity="0.70"/>
  <!-- Secondary arch (right) -->
  <path d="M 400 490 Q 560 330 720 490" fill="none" stroke="#264653" stroke-width="3.5" opacity="0.70"/>

  <!-- Arch cable lines (left span) - vertical hangers from arch to deck -->
  <line x1="140" y1="430" x2="140" y2="490" stroke="#000000" stroke-width="1.5" opacity="0.60"/>
  <line x1="185" y1="385" x2="185" y2="490" stroke="#000000" stroke-width="1.5" opacity="0.60"/>
  <line x1="230" y1="352" x2="230" y2="490" stroke="#000000" stroke-width="1.5" opacity="0.60"/>
  <line x1="275" y1="332" x2="275" y2="490" stroke="#000000" stroke-width="1.5" opacity="0.60"/>
  <line x1="320" y1="322" x2="320" y2="490" stroke="#000000" stroke-width="1.5" opacity="0.60"/>
  <line x1="360" y1="323" x2="360" y2="490" stroke="#000000" stroke-width="1.5" opacity="0.60"/>

  <!-- Arch cable lines (right span) -->
  <line x1="440" y1="323" x2="440" y2="490" stroke="#000000" stroke-width="1.5" opacity="0.60"/>
  <line x1="480" y1="322" x2="480" y2="490" stroke="#000000" stroke-width="1.5" opacity="0.60"/>
  <line x1="525" y1="332" x2="525" y2="490" stroke="#000000" stroke-width="1.5" opacity="0.60"/>
  <line x1="570" y1="352" x2="570" y2="490" stroke="#000000" stroke-width="1.5" opacity="0.60"/>
  <line x1="615" y1="385" x2="615" y2="490" stroke="#000000" stroke-width="1.5" opacity="0.60"/>
  <line x1="660" y1="430" x2="660" y2="490" stroke="#000000" stroke-width="1.5" opacity="0.60"/>

  <!-- Vertical support pylons from deck down to river -->
  <rect x="55" y="490" width="22" height="135" fill="#264653"/>
  <rect x="389" y="490" width="22" height="135" fill="#264653"/>
  <rect x="723" y="490" width="22" height="135" fill="#264653"/>

  <!-- Pylon foundations in river -->
  <rect x="45" y="610" width="42" height="20" fill="#000000" opacity="0.70"/>
  <rect x="379" y="610" width="42" height="20" fill="#000000" opacity="0.70"/>
  <rect x="713" y="610" width="42" height="20" fill="#000000" opacity="0.70"/>

  <!-- Red accent shapes: tension cable anchors -->
  <polygon points="55,490 77,490 66,465" fill="#E63946"/>
  <polygon points="389,490 411,490 400,465" fill="#E63946"/>
  <polygon points="723,490 745,490 734,465" fill="#E63946"/>

  <!-- Yellow accent shapes: top of pylons / caps -->
  <rect x="52" y="455" width="28" height="12" fill="#F4D35E"/>
  <rect x="386" y="455" width="28" height="12" fill="#F4D35E"/>
  <rect x="720" y="455" width="28" height="12" fill="#F4D35E"/>

  <!-- Arch apex accent dots -->
  <circle cx="230" cy="312" r="9" fill="#E63946"/>
  <circle cx="570" cy="312" r="9" fill="#E63946"/>

  <!-- Background sky geometry: large light shapes -->
  <rect x="30" y="60" width="180" height="12" fill="#A89F91" opacity="0.30"/>
  <rect x="590" y="90" width="160" height="10" fill="#A89F91" opacity="0.30"/>
  <circle cx="680" cy="140" r="55" fill="#E9C46A" opacity="0.28"/>
  <circle cx="120" cy="180" r="40" fill="#A8DADC" opacity="0.35"/>
  <!-- Small accent shapes in sky -->
  <rect x="300" y="80" width="30" height="30" fill="#E63946" opacity="0.25"/>
  <rect x="460" y="100" width="22" height="22" fill="#457B9D" opacity="0.30"/>
  <polygon points="530,50 560,110 500,110" fill="#F4D35E" opacity="0.30"/>

  <!-- Structural grid lines above bridge (faint) -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="350" x2="800" y2="350" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="200" y1="0" x2="200" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.06"/>

  <!-- Road surface markings on deck -->
  <rect x="80" y="493" width="30" height="6" fill="#FEFAE0" opacity="0.55"/>
  <rect x="180" y="493" width="30" height="6" fill="#FEFAE0" opacity="0.55"/>
  <rect x="280" y="493" width="30" height="6" fill="#FEFAE0" opacity="0.55"/>
  <rect x="490" y="493" width="30" height="6" fill="#FEFAE0" opacity="0.55"/>
  <rect x="590" y="493" width="30" height="6" fill="#FEFAE0" opacity="0.55"/>
  <rect x="690" y="493" width="30" height="6" fill="#FEFAE0" opacity="0.55"/>

  <!-- Reflection of arches in river (inverted, faint) -->
  <path d="M 60 622 Q 230 730 400 622" fill="none" stroke="#457B9D" stroke-width="3" opacity="0.28"/>
  <path d="M 400 622 Q 570 730 740 622" fill="none" stroke="#457B9D" stroke-width="3" opacity="0.28"/>

  <!-- Corner accents -->
  <rect x="0" y="0" width="25" height="5" fill="#E63946" opacity="0.60"/>
  <rect x="0" y="0" width="5" height="25" fill="#E63946" opacity="0.60"/>
  <rect x="775" y="0" width="25" height="5" fill="#1D3557" opacity="0.60"/>
  <rect x="795" y="0" width="5" height="25" fill="#1D3557" opacity="0.60"/>
</svg>
