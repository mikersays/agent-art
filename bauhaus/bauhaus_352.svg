<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Tall narrow rectangles like a bar chart -->
  <rect x="30" y="200" width="45" height="600" fill="#1D3557" opacity="0.85"/>
  <rect x="85" y="350" width="40" height="450" fill="#E63946" opacity="0.8"/>
  <rect x="135" y="100" width="50" height="700" fill="#F4D35E" opacity="0.75"/>
  <rect x="195" y="280" width="38" height="520" fill="#264653" opacity="0.85"/>
  <rect x="243" y="450" width="48" height="350" fill="#1D3557" opacity="0.7"/>
  <rect x="301" y="150" width="42" height="650" fill="#E63946" opacity="0.8"/>
  <rect x="353" y="320" width="55" height="480" fill="#F4D35E" opacity="0.7"/>
  <rect x="418" y="80" width="35" height="720" fill="#264653" opacity="0.9"/>
  <rect x="463" y="400" width="46" height="400" fill="#1D3557" opacity="0.75"/>
  <rect x="519" y="220" width="40" height="580" fill="#E63946" opacity="0.85"/>
  <rect x="569" y="500" width="50" height="300" fill="#F4D35E" opacity="0.8"/>
  <rect x="629" y="130" width="38" height="670" fill="#264653" opacity="0.8"/>
  <rect x="677" y="350" width="45" height="450" fill="#1D3557" opacity="0.7"/>
  <rect x="732" y="250" width="42" height="550" fill="#E63946" opacity="0.75"/>

  <!-- Thin horizontal cross-rhythm lines -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="480" x2="800" y2="480" stroke="#000000" stroke-width="2" opacity="0.25"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="720" x2="800" y2="720" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <line x1="50" y1="50" x2="750" y2="50" stroke="#A89F91" stroke-width="2" opacity="0.4"/>

  <!-- Small orange circles atop some bars -->
  <circle cx="52" cy="195" r="12" fill="#E76F51" opacity="0.9"/>
  <circle cx="160" cy="95" r="14" fill="#E76F51" opacity="0.85"/>
  <circle cx="322" cy="145" r="11" fill="#E76F51" opacity="0.9"/>
  <circle cx="435" cy="75" r="13" fill="#E76F51" opacity="0.85"/>
  <circle cx="539" cy="215" r="10" fill="#E76F51" opacity="0.9"/>
  <circle cx="648" cy="125" r="12" fill="#E76F51" opacity="0.85"/>

  <!-- Accent elements -->
  <rect x="0" y="790" width="800" height="10" fill="#000000" opacity="0.6"/>
  <rect x="0" y="0" width="800" height="4" fill="#000000" opacity="0.4"/>
  <circle cx="380" cy="400" r="5" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="214" cy="275" r="6" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="594" cy="495" r="5" fill="#2A9D8F" opacity="0.65"/>

  <!-- Small square accents -->
  <rect x="105" y="340" width="8" height="8" fill="#FFFFFF" opacity="0.8"/>
  <rect x="465" y="390" width="8" height="8" fill="#FFFFFF" opacity="0.7"/>
  <rect x="695" y="340" width="8" height="8" fill="#FFFFFF" opacity="0.75"/>
</svg>