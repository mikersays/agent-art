<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>

  <!-- Large yellow rectangle behind waves -->
  <rect x="80" y="200" width="640" height="400" fill="#F4D35E" opacity="0.35"/>

  <!-- Subtle grid -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>

  <!-- Wave 1 - Blue, thick -->
  <polyline points="0,300 40,285 80,270 120,260 160,258 200,265 240,280 280,300 320,320 360,335 400,340 440,335 480,320 520,300 560,280 600,265 640,258 680,260 720,270 760,285 800,300" fill="none" stroke="#1D3557" stroke-width="3.5" opacity="0.8"/>

  <!-- Wave 2 - Blue, offset phase -->
  <polyline points="0,340 40,360 80,375 120,385 160,388 200,380 240,365 280,345 320,325 360,310 400,305 440,310 480,325 520,345 560,365 600,380 640,388 680,385 720,375 760,360 800,340" fill="none" stroke="#1D3557" stroke-width="2" opacity="0.5"/>

  <!-- Wave 3 - Red, different amplitude -->
  <polyline points="0,400 40,370 80,345 120,330 160,325 200,335 240,355 280,385 320,415 360,435 400,445 440,435 480,415 520,385 560,355 600,335 640,325 680,330 720,345 760,370 800,400" fill="none" stroke="#E63946" stroke-width="3" opacity="0.75"/>

  <!-- Wave 4 - Red, thin offset -->
  <polyline points="0,420 40,440 80,455 120,465 160,468 200,460 240,445 280,425 320,405 360,390 400,385 440,390 480,405 520,425 560,445 600,460 640,468 680,465 720,455 760,440 800,420" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.4"/>

  <!-- Wave 5 - Teal, high frequency -->
  <polyline points="0,500 30,480 60,465 90,460 120,465 150,480 180,500 210,520 240,535 270,540 300,535 330,520 360,500 390,480 420,465 450,460 480,465 510,480 540,500 570,520 600,535 630,540 660,535 690,520 720,500 750,480 780,465 800,460" fill="none" stroke="#2A9D8F" stroke-width="2.5" opacity="0.7"/>

  <!-- Wave 6 - Teal, thin complement -->
  <polyline points="0,460 30,480 60,495 90,500 120,495 150,480 180,460 210,440 240,425 270,420 300,425 330,440 360,460 390,480 420,495 450,500 480,495 510,480 540,460 570,440 600,425 630,420 660,425 690,440 720,460 750,480 780,495 800,500" fill="none" stroke="#2A9D8F" stroke-width="1" opacity="0.35"/>

  <!-- Wave 7 - Light blue, gentle -->
  <polyline points="0,250 80,235 160,225 240,230 320,245 400,260 480,265 560,255 640,240 720,230 800,235" fill="none" stroke="#457B9D" stroke-width="2" opacity="0.4"/>

  <!-- Wave 8 - Forest, low -->
  <polyline points="0,580 80,600 160,612 240,615 320,608 400,590 480,575 560,568 640,572 720,585 800,600" fill="none" stroke="#264653" stroke-width="2.5" opacity="0.45"/>

  <!-- Black circles at wave intersections -->
  <circle cx="280" cy="300" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="400" cy="340" r="6" fill="#000000" opacity="0.85"/>
  <circle cx="520" cy="300" r="5" fill="#000000" opacity="0.8"/>
  <circle cx="160" cy="325" r="4" fill="#000000" opacity="0.7"/>
  <circle cx="640" cy="325" r="4" fill="#000000" opacity="0.7"/>
  <circle cx="300" cy="400" r="5" fill="#000000" opacity="0.75"/>
  <circle cx="500" cy="400" r="5" fill="#000000" opacity="0.75"/>
  <circle cx="400" cy="445" r="6" fill="#000000" opacity="0.8"/>
  <circle cx="200" cy="460" r="4" fill="#000000" opacity="0.65"/>
  <circle cx="600" cy="460" r="4" fill="#000000" opacity="0.65"/>
  <circle cx="360" cy="500" r="5" fill="#000000" opacity="0.7"/>
  <circle cx="540" cy="500" r="5" fill="#000000" opacity="0.7"/>
  <circle cx="180" cy="500" r="4" fill="#000000" opacity="0.6"/>
  <circle cx="720" cy="500" r="4" fill="#000000" opacity="0.6"/>

  <!-- Corner accents -->
  <rect x="25" y="25" width="15" height="15" fill="#1D3557" opacity="0.2"/>
  <rect x="760" y="25" width="15" height="15" fill="#E63946" opacity="0.2"/>
  <rect x="25" y="760" width="15" height="15" fill="#2A9D8F" opacity="0.2"/>
  <rect x="760" y="760" width="15" height="15" fill="#000000" opacity="0.15"/>

  <!-- Small decorative elements at edges -->
  <circle cx="400" cy="30" r="6" fill="#F4D35E" opacity="0.4"/>
  <circle cx="400" cy="770" r="6" fill="#F4D35E" opacity="0.4"/>
  <line x1="80" y1="200" x2="80" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="720" y1="200" x2="720" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
</svg>