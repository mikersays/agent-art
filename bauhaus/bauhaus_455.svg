<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FFFFFF"/>
  <!-- 8x8 grid of light blue lines at 0.2 opacity -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#A8DADC" stroke-width="1.5" opacity="0.2"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A8DADC" stroke-width="1.5" opacity="0.2"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#A8DADC" stroke-width="1.5" opacity="0.2"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A8DADC" stroke-width="1.5" opacity="0.2"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#A8DADC" stroke-width="1.5" opacity="0.2"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A8DADC" stroke-width="1.5" opacity="0.2"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#A8DADC" stroke-width="1.5" opacity="0.2"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#A8DADC" stroke-width="1.5" opacity="0.2"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A8DADC" stroke-width="1.5" opacity="0.2"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#A8DADC" stroke-width="1.5" opacity="0.2"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A8DADC" stroke-width="1.5" opacity="0.2"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#A8DADC" stroke-width="1.5" opacity="0.2"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A8DADC" stroke-width="1.5" opacity="0.2"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#A8DADC" stroke-width="1.5" opacity="0.2"/>
  <!-- Large red triangle disrupting the grid -->
  <polygon points="150,650 450,150 550,650" fill="#E63946" opacity="0.8"/>
  <!-- Large blue rectangle disrupting the grid -->
  <rect x="450" y="200" width="280" height="350" fill="#1D3557" opacity="0.75"/>
  <!-- Large yellow circle disrupting the grid -->
  <circle cx="250" cy="300" r="150" fill="#F4D35E" opacity="0.8"/>
  <!-- Black polygons - sharp angular interruptions -->
  <polygon points="600,100 750,100 700,250" fill="#000000" opacity="0.85"/>
  <polygon points="50,400 150,350 180,500 80,520" fill="#000000" opacity="0.8"/>
  <polygon points="500,600 620,580 650,700 530,720" fill="#000000" opacity="0.75"/>
  <polygon points="350,50 420,30 400,120" fill="#000000" opacity="0.8"/>
  <!-- Sand-colored small squares filling gaps -->
  <rect x="310" y="420" width="25" height="25" fill="#DDA15E" opacity="0.8"/>
  <rect x="680" y="560" width="22" height="22" fill="#DDA15E" opacity="0.75"/>
  <rect x="120" y="200" width="20" height="20" fill="#DDA15E" opacity="0.8"/>
  <rect x="750" y="450" width="25" height="25" fill="#DDA15E" opacity="0.7"/>
  <rect x="50" y="680" width="22" height="22" fill="#DDA15E" opacity="0.8"/>
  <rect x="350" y="700" width="20" height="20" fill="#DDA15E" opacity="0.75"/>
  <rect x="250" y="550" width="18" height="18" fill="#DDA15E" opacity="0.7"/>
  <rect x="500" y="130" width="24" height="24" fill="#DDA15E" opacity="0.8"/>
  <rect x="680" y="160" width="20" height="20" fill="#DDA15E" opacity="0.75"/>
  <rect x="150" y="750" width="22" height="22" fill="#DDA15E" opacity="0.7"/>
  <!-- Single thick teal line cutting diagonally across everything -->
  <line x1="0" y1="700" x2="750" y2="50" stroke="#2A9D8F" stroke-width="6" opacity="0.85"/>
  <!-- Additional accent elements -->
  <circle cx="590" cy="380" r="30" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  <circle cx="250" cy="300" r="60" fill="none" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <rect x="460" y="210" width="260" height="330" fill="none" stroke="#F4D35E" stroke-width="2" opacity="0.4"/>
  <!-- Small accent circles -->
  <circle cx="100" cy="100" r="8" fill="#E76F51" opacity="0.7"/>
  <circle cx="700" cy="700" r="10" fill="#E76F51" opacity="0.75"/>
  <circle cx="400" cy="780" r="7" fill="#6D2E46" opacity="0.7"/>
</svg>