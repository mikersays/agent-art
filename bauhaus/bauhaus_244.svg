  <polygon points="450,420 480,520 430,580 400,520 420,440" fill="#2A9D8F" stroke="#FFF" stroke-width="1"/>
  <polygon points="540,380 580,430 560,510 520,480 530,400" fill="#E63946" opacity="0.8" stroke="#FFF" stroke-width="1"/>
  <polygon points="260,380 220,430 240,510 280,480 270,400" fill="#F4D35E" opacity="0.8" stroke="#FFF" stroke-width="1"/>
