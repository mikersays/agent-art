<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Black grid frame - outer border -->
  <rect x="60" y="60" width="680" height="680" fill="none" stroke="#000000" stroke-width="4"/>

  <!-- Grid lines - vertical -->
  <line x1="230" y1="60" x2="230" y2="740" stroke="#000000" stroke-width="3"/>
  <line x1="400" y1="60" x2="400" y2="740" stroke="#000000" stroke-width="3"/>
  <line x1="570" y1="60" x2="570" y2="740" stroke="#000000" stroke-width="3"/>

  <!-- Grid lines - horizontal -->
  <line x1="60" y1="230" x2="740" y2="230" stroke="#000000" stroke-width="3"/>
  <line x1="60" y1="400" x2="740" y2="400" stroke="#000000" stroke-width="3"/>
  <line x1="60" y1="570" x2="740" y2="570" stroke="#000000" stroke-width="3"/>

  <!-- Row 1 -->
  <!-- Window 1,1 (60-230, 60-230): Circle -->
  <circle cx="145" cy="145" r="55" fill="#E63946" opacity="0.8"/>
  <circle cx="145" cy="145" r="30" fill="#FEFAE0" opacity="0.9"/>

  <!-- Window 1,2 (230-400, 60-230): Crossing lines -->
  <line x1="250" y1="80" x2="380" y2="210" stroke="#1D3557" stroke-width="3" opacity="0.8"/>
  <line x1="380" y1="80" x2="250" y2="210" stroke="#F4D35E" stroke-width="3" opacity="0.8"/>
  <circle cx="315" cy="145" r="8" fill="#000000" opacity="0.6"/>

  <!-- Window 1,3 (400-570, 60-230): Triangle -->
  <polygon points="485,85 540,205 430,205" fill="#1D3557" opacity="0.75"/>
  <polygon points="485,120 520,190 450,190" fill="#F4D35E" opacity="0.6"/>

  <!-- Window 1,4 (570-740, 60-230): Concentric squares -->
  <rect x="600" y="90" width="110" height="110" fill="#2A9D8F" opacity="0.6"/>
  <rect x="625" y="115" width="60" height="60" fill="#FEFAE0" opacity="0.8"/>
  <rect x="640" y="130" width="30" height="30" fill="#E63946" opacity="0.7"/>

  <!-- Row 2 -->
  <!-- Window 2,1 (60-230, 230-400): Horizontal bars -->
  <rect x="80" y="260" width="130" height="18" fill="#F4D35E" opacity="0.8"/>
  <rect x="80" y="295" width="130" height="18" fill="#1D3557" opacity="0.7"/>
  <rect x="80" y="330" width="130" height="18" fill="#E63946" opacity="0.8"/>
  <rect x="80" y="365" width="130" height="18" fill="#000000" opacity="0.5"/>

  <!-- Window 2,2 (230-400, 230-400): Diamond -->
  <polygon points="315,250 385,315 315,380 245,315" fill="#E76F51" opacity="0.7"/>
  <circle cx="315" cy="315" r="20" fill="#FEFAE0" opacity="0.8"/>

  <!-- Window 2,3 (400-570, 230-400): Quarter circles / arcs -->
  <path d="M410,240 A100,100 0 0,1 510,340" fill="none" stroke="#E63946" stroke-width="3" opacity="0.7"/>
  <path d="M410,260 A80,80 0 0,1 490,340" fill="none" stroke="#1D3557" stroke-width="3" opacity="0.7"/>
  <path d="M410,280 A60,60 0 0,1 470,340" fill="none" stroke="#F4D35E" stroke-width="3" opacity="0.7"/>
  <circle cx="540" cy="370" r="12" fill="#2A9D8F" opacity="0.6"/>

  <!-- Window 2,4 (570-740, 230-400): Scattered dots -->
  <circle cx="610" cy="270" r="10" fill="#E63946" opacity="0.7"/>
  <circle cx="660" cy="300" r="14" fill="#1D3557" opacity="0.65"/>
  <circle cx="700" cy="260" r="8" fill="#F4D35E" opacity="0.8"/>
  <circle cx="630" cy="350" r="12" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="700" cy="370" r="9" fill="#E76F51" opacity="0.7"/>
  <circle cx="590" cy="320" r="7" fill="#000000" opacity="0.5"/>

  <!-- Row 3 -->
  <!-- Window 3,1 (60-230, 400-570): Overlapping rectangles -->
  <rect x="80" y="420" width="70" height="50" fill="#1D3557" opacity="0.7"/>
  <rect x="110" y="450" width="70" height="50" fill="#E63946" opacity="0.6"/>
  <rect x="140" y="480" width="70" height="50" fill="#F4D35E" opacity="0.65"/>

  <!-- Window 3,2 (230-400, 400-570): Semicircle -->
  <path d="M260,490 A55,55 0 0,1 370,490" fill="#457B9D" opacity="0.7"/>
  <line x1="260" y1="490" x2="370" y2="490" stroke="#000000" stroke-width="2" opacity="0.6"/>
  <circle cx="315" cy="470" r="8" fill="#F4D35E" opacity="0.8"/>

  <!-- Window 3,3 (400-570, 400-570): Grid of small squares -->
  <rect x="420" y="420" width="25" height="25" fill="#E63946" opacity="0.7"/>
  <rect x="455" y="420" width="25" height="25" fill="#1D3557" opacity="0.7"/>
  <rect x="490" y="420" width="25" height="25" fill="#F4D35E" opacity="0.7"/>
  <rect x="525" y="420" width="25" height="25" fill="#2A9D8F" opacity="0.7"/>
  <rect x="420" y="455" width="25" height="25" fill="#000000" opacity="0.5"/>
  <rect x="455" y="455" width="25" height="25" fill="#E76F51" opacity="0.7"/>
  <rect x="490" y="455" width="25" height="25" fill="#457B9D" opacity="0.7"/>
  <rect x="525" y="455" width="25" height="25" fill="#E63946" opacity="0.7"/>

  <!-- Window 3,4 (570-740, 400-570): Arrow / chevron -->
  <polygon points="610,485 655,430 700,485 680,485 655,455 630,485" fill="#1D3557" opacity="0.75"/>
  <polygon points="610,530 655,475 700,530 680,530 655,500 630,530" fill="#F4D35E" opacity="0.6"/>

  <!-- Row 4 -->
  <!-- Window 4,1 (60-230, 570-740): Spiral of dots -->
  <circle cx="145" cy="640" r="35" fill="none" stroke="#6D2E46" stroke-width="2" opacity="0.5"/>
  <circle cx="145" cy="640" r="20" fill="none" stroke="#E63946" stroke-width="2" opacity="0.6"/>
  <circle cx="145" cy="640" r="8" fill="#1D3557" opacity="0.8"/>
  <circle cx="105" cy="610" r="5" fill="#F4D35E" opacity="0.7"/>
  <circle cx="175" cy="680" r="5" fill="#F4D35E" opacity="0.7"/>

  <!-- Window 4,2 (230-400, 570-740): Zigzag -->
  <polyline points="250,600 280,640 310,600 340,640 370,600" fill="none" stroke="#E63946" stroke-width="3" opacity="0.8"/>
  <polyline points="250,680 280,720 310,680 340,720 370,680" fill="none" stroke="#1D3557" stroke-width="3" opacity="0.8"/>
  <rect x="295" y="645" width="40" height="30" fill="#F4D35E" opacity="0.5"/>

  <!-- Window 4,3 (400-570, 570-740): Plus sign -->
  <rect x="465" y="590" width="30" height="130" fill="#E63946" opacity="0.75"/>
  <rect x="420" y="635" width="120" height="30" fill="#E63946" opacity="0.75"/>
  <circle cx="485" cy="655" r="10" fill="#FEFAE0" opacity="0.9"/>

  <!-- Window 4,4 (570-740, 570-740): Ellipse with line -->
  <ellipse cx="655" cy="655" rx="60" ry="40" fill="#457B9D" opacity="0.6"/>
  <line x1="580" y1="655" x2="730" y2="655" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <circle cx="655" cy="655" r="12" fill="#F4D35E" opacity="0.8"/>
</svg>