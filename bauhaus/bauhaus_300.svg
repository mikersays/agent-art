<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Background grid structure -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <!-- Large background shapes -->
  <rect x="50" y="50" width="300" height="200" fill="#A8DADC" opacity="0.12"/>
  <rect x="500" y="600" width="250" height="150" fill="#DDA15E" opacity="0.1"/>
  <circle cx="650" cy="180" r="120" fill="#264653" opacity="0.08"/>
  <!-- Radiating diagonal lines from center -->
  <line x1="400" y1="400" x2="100" y2="50" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="400" y1="400" x2="700" y2="50" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="400" y1="400" x2="750" y2="750" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="400" y1="400" x2="50" y2="750" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="400" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="400" y1="400" x2="0" y2="400" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="400" y1="400" x2="400" y2="0" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="400" y1="400" x2="400" y2="800" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <!-- Large central red circle - focal point -->
  <circle cx="390" cy="380" r="140" fill="#E63946" opacity="0.75"/>
  <!-- Large blue rectangle overlapping -->
  <rect x="320" y="300" width="220" height="180" fill="#1D3557" opacity="0.7"/>
  <!-- Overlapping yellow triangle -->
  <polygon points="400,200 520,420 280,420" fill="#F4D35E" opacity="0.5"/>
  <!-- Teal circle offset -->
  <circle cx="500" cy="340" r="80" fill="#2A9D8F" opacity="0.55"/>
  <!-- Orange rectangle -->
  <rect x="250" y="350" width="120" height="80" fill="#E76F51" opacity="0.5"/>
  <!-- Steel blue large circle -->
  <circle cx="300" cy="300" r="90" fill="#457B9D" opacity="0.35"/>
  <!-- Forest rectangle bottom -->
  <rect x="350" y="480" width="180" height="100" fill="#264653" opacity="0.6"/>
  <!-- Burgundy triangle -->
  <polygon points="550,250 650,450 450,450" fill="#6D2E46" opacity="0.45"/>
  <!-- Sand rectangle -->
  <rect x="150" y="450" width="140" height="60" fill="#DDA15E" opacity="0.5"/>
  <!-- Coral circle -->
  <circle cx="550" cy="550" r="60" fill="#E9C46A" opacity="0.5"/>
  <!-- Light blue rectangle top -->
  <rect x="100" y="120" width="200" height="80" fill="#A8DADC" opacity="0.5"/>
  <!-- Warm gray shape -->
  <rect x="580" y="200" width="100" height="120" fill="#A89F91" opacity="0.45"/>
  <!-- White circle for contrast -->
  <circle cx="400" cy="380" r="50" fill="#FFFFFF" opacity="0.6"/>
  <!-- Black structural elements -->
  <rect x="380" y="100" width="4" height="600" fill="#000000" opacity="0.3"/>
  <rect x="150" y="390" width="500" height="4" fill="#000000" opacity="0.3"/>
  <!-- Concentric rings at center -->
  <circle cx="400" cy="380" r="30" fill="none" stroke="#E63946" stroke-width="2" opacity="0.7"/>
  <circle cx="400" cy="380" r="20" fill="#1D3557" opacity="0.8"/>
  <circle cx="400" cy="380" r="10" fill="#F4D35E" opacity="0.9"/>
  <!-- Small accent shapes - top area -->
  <rect x="80" y="60" width="20" height="20" fill="#E63946" opacity="0.6"/>
  <circle cx="140" cy="80" r="8" fill="#1D3557" opacity="0.5"/>
  <rect x="620" y="80" width="25" height="15" fill="#F4D35E" opacity="0.55"/>
  <polygon points="700,60 720,90 680,90" fill="#2A9D8F" opacity="0.5"/>
  <!-- Small accent shapes - right side -->
  <rect x="700" y="300" width="18" height="18" fill="#E76F51" opacity="0.5"/>
  <circle cx="720" cy="450" r="10" fill="#6D2E46" opacity="0.45"/>
  <rect x="680" y="520" width="22" height="12" fill="#457B9D" opacity="0.5"/>
  <!-- Small accent shapes - bottom area -->
  <polygon points="200,700 220,730 180,730" fill="#E63946" opacity="0.5"/>
  <circle cx="350" cy="720" r="12" fill="#264653" opacity="0.5"/>
  <rect x="500" y="700" width="20" height="20" fill="#F4D35E" opacity="0.5"/>
  <circle cx="650" cy="710" r="7" fill="#E76F51" opacity="0.45"/>
  <!-- Small accent shapes - left side -->
  <circle cx="60" cy="300" r="9" fill="#DDA15E" opacity="0.5"/>
  <rect x="40" y="450" width="15" height="25" fill="#2A9D8F" opacity="0.45"/>
  <polygon points="70,600 90,580 90,620" fill="#E9C46A" opacity="0.5"/>
  <!-- Additional layered shapes for density -->
  <ellipse cx="480" cy="250" rx="40" ry="25" fill="#A8DADC" opacity="0.35"/>
  <rect x="200" y="550" width="80" height="40" fill="#1D3557" opacity="0.35"/>
  <polygon points="600,600 650,650 550,650" fill="#E63946" opacity="0.35"/>
  <circle cx="250" cy="200" r="25" fill="#F4D35E" opacity="0.3"/>
  <rect x="550" y="150" width="60" height="30" fill="#000000" opacity="0.25"/>
  <!-- Corner frame accents -->
  <rect x="15" y="15" width="30" height="4" fill="#000000" opacity="0.4"/>
  <rect x="15" y="15" width="4" height="30" fill="#000000" opacity="0.4"/>
  <rect x="755" y="15" width="30" height="4" fill="#000000" opacity="0.4"/>
  <rect x="781" y="15" width="4" height="30" fill="#000000" opacity="0.4"/>
  <rect x="15" y="781" width="30" height="4" fill="#000000" opacity="0.4"/>
  <rect x="15" y="755" width="4" height="30" fill="#000000" opacity="0.4"/>
  <rect x="755" y="781" width="30" height="4" fill="#000000" opacity="0.4"/>
  <rect x="781" y="755" width="4" height="30" fill="#000000" opacity="0.4"/>
</svg>