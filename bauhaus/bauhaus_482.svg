<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Sky - upper bands -->
  <rect x="0" y="0" width="800" height="200" fill="#FEFAE0" opacity="1"/>
  <rect x="0" y="200" width="800" height="100" fill="#A8DADC" opacity="0.5"/>
  <rect x="0" y="140" width="800" height="80" fill="#A8DADC" opacity="0.3"/>

  <!-- Middle bands - warm gray and sand -->
  <rect x="0" y="300" width="800" height="120" fill="#A89F91" opacity="0.4"/>
  <rect x="0" y="380" width="800" height="80" fill="#DDA15E" opacity="0.5"/>
  <rect x="0" y="420" width="800" height="100" fill="#A89F91" opacity="0.35"/>
  <rect x="0" y="480" width="800" height="60" fill="#DDA15E" opacity="0.4"/>

  <!-- Lower bands - darker -->
  <rect x="0" y="540" width="800" height="80" fill="#457B9D" opacity="0.3"/>
  <rect x="0" y="600" width="800" height="200" fill="#264653" opacity="0.7"/>

  <!-- Forest rectangles at bottom -->
  <rect x="0" y="680" width="180" height="120" fill="#264653" opacity="0.9"/>
  <rect x="200" y="700" width="120" height="100" fill="#264653" opacity="0.85"/>
  <rect x="350" y="690" width="160" height="110" fill="#264653" opacity="0.95"/>
  <rect x="540" y="710" width="100" height="90" fill="#264653" opacity="0.8"/>
  <rect x="660" y="680" width="140" height="120" fill="#264653" opacity="0.9"/>

  <!-- Steel blue structural lines -->
  <line x1="0" y1="300" x2="800" y2="300" stroke="#457B9D" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="540" x2="800" y2="540" stroke="#457B9D" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#457B9D" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="0" x2="100" y2="800" stroke="#457B9D" stroke-width="0.5" opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#457B9D" stroke-width="0.5" opacity="0.15"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#457B9D" stroke-width="0.5" opacity="0.15"/>

  <!-- Large red circle - sun -->
  <circle cx="600" cy="150" r="90" fill="#E63946" opacity="0.85"/>
  <circle cx="600" cy="150" r="60" fill="#E63946" opacity="1"/>

  <!-- Black triangles - mountains -->
  <polygon points="250,600 400,350 550,600" fill="#000000" opacity="0.8"/>
  <polygon points="50,600 200,420 350,600" fill="#000000" opacity="0.65"/>
  <polygon points="500,600 620,440 740,600" fill="#000000" opacity="0.55"/>

  <!-- Yellow rectangles - buildings -->
  <rect x="430" y="480" width="35" height="120" fill="#F4D35E" opacity="0.85"/>
  <rect x="480" y="510" width="30" height="90" fill="#F4D35E" opacity="0.75"/>
  <rect x="520" y="490" width="40" height="110" fill="#F4D35E" opacity="0.8"/>
  <rect x="140" y="520" width="25" height="80" fill="#F4D35E" opacity="0.7"/>

  <!-- Teal circles scattered in middle -->
  <circle cx="120" cy="380" r="15" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="300" cy="450" r="12" fill="#2A9D8F" opacity="0.5"/>
  <circle cx="680" cy="400" r="18" fill="#2A9D8F" opacity="0.55"/>
  <circle cx="500" cy="350" r="10" fill="#2A9D8F" opacity="0.45"/>
  <circle cx="750" cy="500" r="14" fill="#2A9D8F" opacity="0.5"/>
  <circle cx="50" cy="480" r="11" fill="#2A9D8F" opacity="0.4"/>

  <!-- Additional accents -->
  <rect x="620" y="300" width="80" height="8" fill="#E76F51" opacity="0.6"/>
  <rect x="50" y="320" width="60" height="6" fill="#E76F51" opacity="0.5"/>
  <circle cx="600" cy="150" r="100" fill="none" stroke="#E9C46A" stroke-width="2" opacity="0.4"/>
  <rect x="0" y="595" width="800" height="3" fill="#1D3557" opacity="0.3"/>

  <!-- Small detail shapes -->
  <rect x="700" y="650" width="8" height="30" fill="#F4D35E" opacity="0.6"/>
  <rect x="720" y="660" width="8" height="20" fill="#F4D35E" opacity="0.5"/>
  <circle cx="400" cy="260" r="5" fill="#E63946" opacity="0.4"/>
</svg>