<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Vertical lines of varying thickness - the rhythm -->
  <line x1="45" y1="0" x2="45" y2="800" stroke="#000000" stroke-width="3" opacity="0.85"/>
  <line x1="80" y1="0" x2="80" y2="800" stroke="#1D3557" stroke-width="8" opacity="0.7"/>
  <line x1="120" y1="0" x2="120" y2="800" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="155" y1="0" x2="155" y2="800" stroke="#E63946" stroke-width="14" opacity="0.6"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="2" opacity="0.3"/>
  <line x1="230" y1="0" x2="230" y2="800" stroke="#1D3557" stroke-width="5" opacity="0.65"/>
  <line x1="280" y1="0" x2="280" y2="800" stroke="#E63946" stroke-width="3" opacity="0.5"/>
  <line x1="310" y1="0" x2="310" y2="800" stroke="#000000" stroke-width="18" opacity="0.75"/>
  <line x1="360" y1="0" x2="360" y2="800" stroke="#1D3557" stroke-width="6" opacity="0.55"/>
  <line x1="395" y1="0" x2="395" y2="800" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <line x1="430" y1="0" x2="430" y2="800" stroke="#E63946" stroke-width="10" opacity="0.65"/>
  <line x1="475" y1="0" x2="475" y2="800" stroke="#000000" stroke-width="4" opacity="0.6"/>
  <line x1="510" y1="0" x2="510" y2="800" stroke="#1D3557" stroke-width="15" opacity="0.7"/>
  <line x1="560" y1="0" x2="560" y2="800" stroke="#000000" stroke-width="2" opacity="0.35"/>
  <line x1="590" y1="0" x2="590" y2="800" stroke="#E63946" stroke-width="7" opacity="0.55"/>
  <line x1="640" y1="0" x2="640" y2="800" stroke="#1D3557" stroke-width="3" opacity="0.5"/>
  <line x1="680" y1="0" x2="680" y2="800" stroke="#000000" stroke-width="20" opacity="0.8"/>
  <line x1="730" y1="0" x2="730" y2="800" stroke="#E63946" stroke-width="4" opacity="0.45"/>
  <line x1="760" y1="0" x2="760" y2="800" stroke="#1D3557" stroke-width="9" opacity="0.6"/>

  <!-- Shapes between lines -->
  <!-- Yellow circles -->
  <circle cx="100" cy="200" r="14" fill="#F4D35E" opacity="0.8"/>
  <circle cx="250" cy="500" r="10" fill="#F4D35E" opacity="0.7"/>
  <circle cx="450" cy="150" r="18" fill="#F4D35E" opacity="0.75"/>
  <circle cx="620" cy="650" r="12" fill="#F4D35E" opacity="0.65"/>
  <circle cx="540" cy="380" r="9" fill="#F4D35E" opacity="0.7"/>

  <!-- Teal squares -->
  <rect x="170" y="350" width="22" height="22" fill="#2A9D8F" opacity="0.75"/>
  <rect x="330" y="600" width="18" height="18" fill="#2A9D8F" opacity="0.65" transform="rotate(45 339 609)"/>
  <rect x="700" y="280" width="25" height="25" fill="#2A9D8F" opacity="0.7"/>
  <rect x="550" y="720" width="16" height="16" fill="#2A9D8F" opacity="0.6"/>

  <!-- Orange triangles -->
  <polygon points="100,580 85,610 115,610" fill="#E76F51" opacity="0.75"/>
  <polygon points="450,420 435,450 465,450" fill="#E76F51" opacity="0.7"/>
  <polygon points="710,120 695,150 725,150" fill="#E76F51" opacity="0.65"/>
  <polygon points="250,750 238,775 262,775" fill="#E76F51" opacity="0.6"/>

  <!-- Small black dots for texture -->
  <circle cx="60" cy="400" r="4" fill="#000000" opacity="0.4"/>
  <circle cx="180" cy="120" r="3" fill="#000000" opacity="0.35"/>
  <circle cx="340" y="280" r="4" fill="#000000" opacity="0.3"/>
  <circle cx="580" cy="500" r="5" fill="#000000" opacity="0.4"/>
  <circle cx="750" cy="600" r="3" fill="#000000" opacity="0.35"/>

  <!-- Horizontal accent lines -->
  <line x1="80" y1="200" x2="155" y2="200" stroke="#F4D35E" stroke-width="2" opacity="0.4"/>
  <line x1="310" y1="600" x2="430" y2="600" stroke="#2A9D8F" stroke-width="1.5" opacity="0.35"/>
  <line x1="510" y1="380" x2="590" y2="380" stroke="#E76F51" stroke-width="2" opacity="0.3"/>
</svg>