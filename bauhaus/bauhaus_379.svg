<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Ground plane -->
  <rect x="0" y="650" width="800" height="150" fill="#A89F91" opacity="0.15"/>

  <!-- Main building wall - large blue rectangle (dominant shape) -->
  <rect x="180" y="180" width="380" height="470" fill="#1D3557" opacity="0.9"/>

  <!-- Roof - red triangular element -->
  <polygon points="150,180 370,60 560,180" fill="#E63946" opacity="0.85"/>
  <line x1="150" y1="180" x2="560" y2="180" stroke="#000000" stroke-width="2" opacity="0.7"/>

  <!-- Chimney -->
  <rect x="450" y="80" width="30" height="100" fill="#264653" opacity="0.8"/>

  <!-- Windows row 1 -->
  <rect x="220" y="230" width="55" height="70" fill="#F4D35E" opacity="0.85"/>
  <rect x="310" y="230" width="55" height="70" fill="#FEFAE0" opacity="0.8"/>
  <rect x="400" y="230" width="55" height="70" fill="#F4D35E" opacity="0.85"/>
  <rect x="490" y="230" width="55" height="70" fill="#FEFAE0" opacity="0.8"/>

  <!-- Window frames row 1 -->
  <line x1="247" y1="230" x2="247" y2="300" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="220" y1="265" x2="275" y2="265" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="337" y1="230" x2="337" y2="300" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="427" y1="230" x2="427" y2="300" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="517" y1="230" x2="517" y2="300" stroke="#000000" stroke-width="1" opacity="0.5"/>

  <!-- Windows row 2 -->
  <rect x="220" y="340" width="55" height="70" fill="#FEFAE0" opacity="0.8"/>
  <rect x="310" y="340" width="55" height="70" fill="#F4D35E" opacity="0.85"/>
  <rect x="400" y="340" width="55" height="70" fill="#E76F51" opacity="0.8"/>
  <rect x="490" y="340" width="55" height="70" fill="#F4D35E" opacity="0.85"/>

  <!-- Window frames row 2 -->
  <line x1="247" y1="340" x2="247" y2="410" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="337" y1="340" x2="337" y2="410" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="427" y1="340" x2="427" y2="410" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="517" y1="340" x2="517" y2="410" stroke="#000000" stroke-width="1" opacity="0.5"/>

  <!-- Windows row 3 -->
  <rect x="220" y="450" width="55" height="70" fill="#F4D35E" opacity="0.85"/>
  <rect x="310" y="450" width="55" height="70" fill="#FEFAE0" opacity="0.8"/>
  <rect x="490" y="450" width="55" height="70" fill="#FEFAE0" opacity="0.8"/>

  <!-- Door -->
  <rect x="400" y="470" width="55" height="180" fill="#264653" opacity="0.9"/>
  <circle cx="445" cy="570" r="4" fill="#DDA15E" opacity="0.9"/>

  <!-- Structural lines -->
  <line x1="180" y1="180" x2="180" y2="650" stroke="#000000" stroke-width="2.5" opacity="0.8"/>
  <line x1="560" y1="180" x2="560" y2="650" stroke="#000000" stroke-width="2.5" opacity="0.8"/>
  <line x1="180" y1="650" x2="560" y2="650" stroke="#000000" stroke-width="2.5" opacity="0.8"/>
  <line x1="180" y1="320" x2="560" y2="320" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="180" y1="430" x2="560" y2="430" stroke="#000000" stroke-width="1" opacity="0.3"/>

  <!-- Side wing - smaller structure -->
  <rect x="560" y="380" width="120" height="270" fill="#457B9D" opacity="0.7"/>
  <line x1="560" y1="380" x2="680" y2="380" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="680" y1="380" x2="680" y2="650" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <rect x="590" y="420" width="40" height="50" fill="#F4D35E" opacity="0.7"/>
  <rect x="590" y="510" width="40" height="50" fill="#FEFAE0" opacity="0.7"/>

  <!-- Flat roof on side wing -->
  <line x1="555" y1="380" x2="690" y2="380" stroke="#000000" stroke-width="3" opacity="0.5"/>

  <!-- Steps -->
  <rect x="390" y="650" width="75" height="12" fill="#A89F91" opacity="0.5"/>
  <rect x="385" y="662" width="85" height="12" fill="#A89F91" opacity="0.4"/>
  <rect x="380" y="674" width="95" height="12" fill="#A89F91" opacity="0.3"/>

  <!-- Decorative elements -->
  <circle cx="370" cy="130" r="12" fill="#F4D35E" opacity="0.4"/>
  <rect x="100" y="600" width="40" height="50" fill="#2A9D8F" opacity="0.25"/>
  <line x1="100" y1="650" x2="140" y2="650" stroke="#000000" stroke-width="1" opacity="0.3"/>

  <!-- Corner accents -->
  <rect x="30" y="30" width="12" height="12" fill="#E63946" opacity="0.2"/>
  <rect x="758" y="30" width="12" height="12" fill="#1D3557" opacity="0.2"/>
</svg>