<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>

  <!-- Outer circle outline -->
  <circle cx="400" cy="400" r="280" fill="none" stroke="#1D3557" stroke-width="2.5" opacity="0.7"/>
  <!-- Inner circle outline -->
  <circle cx="400" cy="400" r="200" fill="none" stroke="#1D3557" stroke-width="1.5" opacity="0.4"/>
  <!-- Tiny center circle -->
  <circle cx="400" cy="400" r="18" fill="#000000"/>
  <circle cx="400" cy="400" r="10" fill="#F4D35E"/>

  <!-- Pinwheel blades: 4 blades, each rotated 90 degrees -->
  <!-- Blade 1: top-right, Red -->
  <polygon points="400,400 550,220 640,370" fill="#E63946" opacity="0.92"/>
  <!-- Blade 2: bottom-right, Blue -->
  <polygon points="400,400 580,550 430,640" fill="#1D3557" opacity="0.92"/>
  <!-- Blade 3: bottom-left, Yellow -->
  <polygon points="400,400 250,580 160,430" fill="#F4D35E" opacity="0.92"/>
  <!-- Blade 4: top-left, Teal -->
  <polygon points="400,400 220,250 370,160" fill="#2A9D8F" opacity="0.92"/>

  <!-- Secondary smaller blades (offset, semi-transparent) -->
  <!-- Blade 1b: Red, rotated 45 deg -->
  <polygon points="400,400 610,310 610,490" fill="#E63946" opacity="0.30"/>
  <!-- Blade 2b: Blue, rotated 45 deg -->
  <polygon points="400,400 490,610 310,610" fill="#1D3557" opacity="0.30"/>
  <!-- Blade 3b: Yellow, rotated 45 deg -->
  <polygon points="400,400 190,490 190,310" fill="#F4D35E" opacity="0.30"/>
  <!-- Blade 4b: Teal, rotated 45 deg -->
  <polygon points="400,400 310,190 490,190" fill="#2A9D8F" opacity="0.30"/>

  <!-- Dots at blade tips (outer ring) -->
  <circle cx="595" cy="272" r="10" fill="#E63946"/>
  <circle cx="528" cy="624" r="10" fill="#1D3557"/>
  <circle cx="205" cy="528" r="10" fill="#F4D35E" stroke="#000000" stroke-width="1"/>
  <circle cx="272" cy="176" r="10" fill="#2A9D8F"/>

  <!-- Dots at secondary blade tips -->
  <circle cx="625" cy="400" r="7" fill="#E76F51"/>
  <circle cx="400" cy="625" r="7" fill="#457B9D"/>
  <circle cx="175" cy="400" r="7" fill="#DDA15E"/>
  <circle cx="400" cy="175" r="7" fill="#A8DADC"/>

  <!-- Rotating energy rings -->
  <circle cx="400" cy="400" r="130" fill="none" stroke="#E63946" stroke-width="2" opacity="0.5" stroke-dasharray="18 10"/>
  <circle cx="400" cy="400" r="90" fill="none" stroke="#F4D35E" stroke-width="2.5" opacity="0.6" stroke-dasharray="14 8"/>
  <circle cx="400" cy="400" r="55" fill="none" stroke="#2A9D8F" stroke-width="2" opacity="0.5" stroke-dasharray="10 7"/>

  <!-- Corner accent circles -->
  <circle cx="60" cy="60" r="22" fill="none" stroke="#E63946" stroke-width="2"/>
  <circle cx="740" cy="60" r="22" fill="none" stroke="#1D3557" stroke-width="2"/>
  <circle cx="60" cy="740" r="22" fill="none" stroke="#2A9D8F" stroke-width="2"/>
  <circle cx="740" cy="740" r="22" fill="none" stroke="#F4D35E" stroke-width="2" />

  <!-- Small accent dots scattered -->
  <circle cx="110" cy="400" r="5" fill="#E63946" opacity="0.7"/>
  <circle cx="690" cy="400" r="5" fill="#1D3557" opacity="0.7"/>
  <circle cx="400" cy="110" r="5" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="400" cy="690" r="5" fill="#F4D35E" stroke="#A89F91" stroke-width="1" opacity="0.9"/>

  <!-- Thin radial lines for structure -->
  <line x1="400" y1="400" x2="680" y2="120" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="400" y1="400" x2="680" y2="680" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="400" y1="400" x2="120" y2="680" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="400" y1="400" x2="120" y2="120" stroke="#000000" stroke-width="1" opacity="0.12"/>
</svg>
