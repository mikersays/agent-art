<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Maze outer border -->
  <rect x="50" y="50" width="700" height="700" fill="none" stroke="#000000" stroke-width="14"/>

  <!-- Colored pathway backgrounds -->
  <rect x="50" y="50" width="700" height="700" fill="#F4D35E" opacity="0.1"/>

  <!-- Horizontal walls -->
  <line x1="50" y1="150" x2="250" y2="150" stroke="#000000" stroke-width="10"/>
  <line x1="350" y1="150" x2="550" y2="150" stroke="#000000" stroke-width="10"/>
  <line x1="650" y1="150" x2="750" y2="150" stroke="#000000" stroke-width="10"/>

  <line x1="150" y1="250" x2="350" y2="250" stroke="#000000" stroke-width="10"/>
  <line x1="450" y1="250" x2="650" y2="250" stroke="#000000" stroke-width="10"/>

  <line x1="50" y1="350" x2="150" y2="350" stroke="#000000" stroke-width="10"/>
  <line x1="250" y1="350" x2="450" y2="350" stroke="#000000" stroke-width="10"/>
  <line x1="550" y1="350" x2="750" y2="350" stroke="#000000" stroke-width="10"/>

  <line x1="150" y1="450" x2="250" y2="450" stroke="#000000" stroke-width="10"/>
  <line x1="350" y1="450" x2="550" y2="450" stroke="#000000" stroke-width="10"/>
  <line x1="650" y1="450" x2="750" y2="450" stroke="#000000" stroke-width="10"/>

  <line x1="50" y1="550" x2="250" y2="550" stroke="#000000" stroke-width="10"/>
  <line x1="350" y1="550" x2="450" y2="550" stroke="#000000" stroke-width="10"/>
  <line x1="550" y1="550" x2="650" y2="550" stroke="#000000" stroke-width="10"/>

  <line x1="150" y1="650" x2="350" y2="650" stroke="#000000" stroke-width="10"/>
  <line x1="450" y1="650" x2="550" y2="650" stroke="#000000" stroke-width="10"/>
  <line x1="650" y1="650" x2="750" y2="650" stroke="#000000" stroke-width="10"/>

  <!-- Vertical walls -->
  <line x1="150" y1="50" x2="150" y2="150" stroke="#000000" stroke-width="10"/>
  <line x1="350" y1="50" x2="350" y2="150" stroke="#000000" stroke-width="10"/>
  <line x1="550" y1="150" x2="550" y2="250" stroke="#000000" stroke-width="10"/>
  <line x1="250" y1="150" x2="250" y2="250" stroke="#000000" stroke-width="10"/>
  <line x1="450" y1="250" x2="450" y2="350" stroke="#000000" stroke-width="10"/>
  <line x1="650" y1="250" x2="650" y2="350" stroke="#000000" stroke-width="10"/>
  <line x1="150" y1="350" x2="150" y2="450" stroke="#000000" stroke-width="10"/>
  <line x1="350" y1="350" x2="350" y2="450" stroke="#000000" stroke-width="10"/>
  <line x1="550" y1="450" x2="550" y2="550" stroke="#000000" stroke-width="10"/>
  <line x1="250" y1="450" x2="250" y2="550" stroke="#000000" stroke-width="10"/>
  <line x1="450" y1="550" x2="450" y2="650" stroke="#000000" stroke-width="10"/>
  <line x1="650" y1="550" x2="650" y2="650" stroke="#000000" stroke-width="10"/>
  <line x1="150" y1="650" x2="150" y2="750" stroke="#000000" stroke-width="10"/>
  <line x1="350" y1="650" x2="350" y2="750" stroke="#000000" stroke-width="10"/>
  <line x1="550" y1="650" x2="550" y2="750" stroke="#000000" stroke-width="10"/>

  <!-- Colored pathways (highlighted corridors) -->
  <!-- Path from entrance -->
  <rect x="255" y="55" width="90" height="90" fill="#E63946" opacity="0.25"/>
  <rect x="255" y="155" width="90" height="90" fill="#E63946" opacity="0.25"/>
  <rect x="155" y="255" width="90" height="90" fill="#1D3557" opacity="0.2"/>
  <rect x="255" y="255" width="90" height="90" fill="#1D3557" opacity="0.2"/>
  <rect x="255" y="355" width="90" height="90" fill="#2A9D8F" opacity="0.2"/>
  <rect x="255" y="455" width="90" height="90" fill="#2A9D8F" opacity="0.2"/>
  <rect x="355" y="455" width="90" height="90" fill="#F4D35E" opacity="0.25"/>
  <rect x="455" y="455" width="90" height="90" fill="#F4D35E" opacity="0.25"/>
  <rect x="455" y="355" width="90" height="90" fill="#E76F51" opacity="0.2"/>
  <rect x="555" y="355" width="90" height="90" fill="#E76F51" opacity="0.2"/>

  <!-- Geometric markers at key points -->
  <!-- Entrance marker -->
  <polygon points="300,70 315,90 285,90" fill="#E63946" stroke="#000000" stroke-width="2"/>

  <!-- Junction markers -->
  <circle cx="200" cy="200" r="12" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <rect x="390" y="190" width="20" height="20" fill="#F4D35E" stroke="#000000" stroke-width="2" transform="rotate(45 400 200)"/>
  <circle cx="500" cy="300" r="12" fill="#2A9D8F" stroke="#000000" stroke-width="2"/>
  <polygon points="300,400 312,420 288,420" fill="#E76F51" stroke="#000000" stroke-width="2"/>
  <rect x="590" y="490" width="18" height="18" fill="#E63946" stroke="#000000" stroke-width="2" transform="rotate(45 599 499)"/>
  <circle cx="400" cy="600" r="12" fill="#1D3557" stroke="#000000" stroke-width="2"/>
  <polygon points="600,600 612,620 588,620" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <circle cx="100" cy="500" r="10" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <rect x="91" y="691" width="18" height="18" fill="#2A9D8F" stroke="#000000" stroke-width="2" transform="rotate(45 100 700)"/>

  <!-- Exit marker (goal) -->
  <circle cx="700" cy="700" r="18" fill="#F4D35E" stroke="#000000" stroke-width="3"/>
  <circle cx="700" cy="700" r="8" fill="#E63946"/>

  <!-- Dead end markers -->
  <line x1="690" y1="90" x2="710" y2="110" stroke="#E63946" stroke-width="3"/>
  <line x1="710" y1="90" x2="690" y2="110" stroke="#E63946" stroke-width="3"/>
  <line x1="90" y1="690" x2="110" y2="710" stroke="#E63946" stroke-width="3"/>
  <line x1="110" y1="690" x2="90" y2="710" stroke="#E63946" stroke-width="3"/>

  <!-- Decorative corner squares -->
  <rect x="55" y="55" width="30" height="30" fill="#1D3557" opacity="0.5"/>
  <rect x="715" y="55" width="30" height="30" fill="#E76F51" opacity="0.5"/>
</svg>