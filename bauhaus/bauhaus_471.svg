<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background cream -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Warm gray horizontal lines at low opacity -->
  <line x1="0" y1="80" x2="800" y2="80" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="480" x2="800" y2="480" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="560" x2="800" y2="560" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="640" x2="800" y2="640" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="720" x2="800" y2="720" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <!-- Large yellow rectangles behind zigzags -->
  <rect x="80" y="60" width="200" height="500" fill="#F4D35E" opacity="0.6"/>
  <rect x="450" y="200" width="180" height="450" fill="#F4D35E" opacity="0.5"/>
  <rect x="300" y="100" width="120" height="300" fill="#F4D35E" opacity="0.35"/>
  <!-- Orange squares scattered in upper portion -->
  <rect x="620" y="40" width="50" height="50" fill="#E76F51" opacity="0.8"/>
  <rect x="700" y="120" width="40" height="40" fill="#E76F51" opacity="0.7"/>
  <rect x="550" y="80" width="35" height="35" fill="#E76F51" opacity="0.6"/>
  <rect x="380" y="30" width="45" height="45" fill="#E76F51" opacity="0.75"/>
  <rect x="150" y="20" width="30" height="30" fill="#E76F51" opacity="0.65"/>
  <rect x="680" y="200" width="38" height="38" fill="#E76F51" opacity="0.55"/>
  <!-- Teal triangles filling some zigzag valleys -->
  <polygon points="120,300 200,400 40,400" fill="#2A9D8F" opacity="0.7"/>
  <polygon points="350,450 430,550 270,550" fill="#2A9D8F" opacity="0.6"/>
  <polygon points="550,350 630,450 470,450" fill="#2A9D8F" opacity="0.65"/>
  <polygon points="180,550 260,650 100,650" fill="#2A9D8F" opacity="0.5"/>
  <polygon points="650,550 720,640 580,640" fill="#2A9D8F" opacity="0.55"/>
  <!-- Bold red zigzag cascade left -->
  <polyline points="100,50 180,150 100,250 180,350 100,450 180,550 100,650 180,750" fill="none" stroke="#E63946" stroke-width="8" stroke-linejoin="miter"/>
  <!-- Bold red zigzag cascade center-left -->
  <polyline points="250,100 330,200 250,300 330,400 250,500 330,600 250,700 330,800" fill="none" stroke="#E63946" stroke-width="6" stroke-linejoin="miter"/>
  <!-- Bold blue zigzag cascade center -->
  <polyline points="420,30 500,130 420,230 500,330 420,430 500,530 420,630 500,730" fill="none" stroke="#1D3557" stroke-width="7" stroke-linejoin="miter"/>
  <!-- Bold blue zigzag cascade right -->
  <polyline points="580,80 660,180 580,280 660,380 580,480 660,580 580,680 660,780" fill="none" stroke="#1D3557" stroke-width="5" stroke-linejoin="miter"/>
  <!-- Thin red zigzag far right -->
  <polyline points="720,20 770,120 720,220 770,320 720,420 770,520 720,620 770,720" fill="none" stroke="#E63946" stroke-width="3" stroke-linejoin="miter"/>
  <!-- Black circles at zigzag vertices - left cascade -->
  <circle cx="100" cy="50" r="5" fill="#000000"/>
  <circle cx="180" cy="150" r="5" fill="#000000"/>
  <circle cx="100" cy="250" r="5" fill="#000000"/>
  <circle cx="180" cy="350" r="5" fill="#000000"/>
  <circle cx="100" cy="450" r="5" fill="#000000"/>
  <circle cx="180" cy="550" r="5" fill="#000000"/>
  <circle cx="100" cy="650" r="5" fill="#000000"/>
  <!-- Black circles at zigzag vertices - center blue cascade -->
  <circle cx="420" cy="30" r="6" fill="#000000"/>
  <circle cx="500" cy="130" r="6" fill="#000000"/>
  <circle cx="420" cy="230" r="6" fill="#000000"/>
  <circle cx="500" cy="330" r="6" fill="#000000"/>
  <circle cx="420" cy="430" r="6" fill="#000000"/>
  <circle cx="500" cy="530" r="6" fill="#000000"/>
  <circle cx="420" cy="630" r="6" fill="#000000"/>
  <!-- Black circles at right blue cascade -->
  <circle cx="580" cy="80" r="4" fill="#000000"/>
  <circle cx="660" cy="180" r="4" fill="#000000"/>
  <circle cx="580" cy="280" r="4" fill="#000000"/>
  <circle cx="660" cy="380" r="4" fill="#000000"/>
  <circle cx="580" cy="480" r="4" fill="#000000"/>
  <circle cx="660" cy="580" r="4" fill="#000000"/>
  <!-- Corner accents -->
  <rect x="0" y="0" width="20" height="20" fill="#000000" opacity="0.8"/>
  <rect x="780" y="0" width="20" height="20" fill="#000000" opacity="0.8"/>
  <rect x="0" y="780" width="20" height="20" fill="#000000" opacity="0.8"/>
  <rect x="780" y="780" width="20" height="20" fill="#000000" opacity="0.8"/>
</svg>