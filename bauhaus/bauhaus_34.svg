<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Partial chess grid - not centered, abstract placement -->
  <!-- Light squares -->
  <rect x="120" y="200" width="80" height="80" fill="#FEFAE0" stroke="#000000" stroke-width="1.5"/>
  <rect x="280" y="200" width="80" height="80" fill="#FEFAE0" stroke="#000000" stroke-width="1.5"/>
  <rect x="200" y="280" width="80" height="80" fill="#FEFAE0" stroke="#000000" stroke-width="1.5"/>
  <rect x="360" y="280" width="80" height="80" fill="#FEFAE0" stroke="#000000" stroke-width="1.5"/>
  <rect x="120" y="360" width="80" height="80" fill="#FEFAE0" stroke="#000000" stroke-width="1.5"/>
  <rect x="280" y="360" width="80" height="80" fill="#FEFAE0" stroke="#000000" stroke-width="1.5"/>
  <rect x="200" y="440" width="80" height="80" fill="#FEFAE0" stroke="#000000" stroke-width="1.5"/>
  <rect x="360" y="440" width="80" height="80" fill="#FEFAE0" stroke="#000000" stroke-width="1.5"/>
  <rect x="120" y="520" width="80" height="80" fill="#FEFAE0" stroke="#000000" stroke-width="1.5"/>
  <rect x="280" y="520" width="80" height="80" fill="#FEFAE0" stroke="#000000" stroke-width="1.5"/>

  <!-- Dark squares -->
  <rect x="200" y="200" width="80" height="80" fill="#1D3557"/>
  <rect x="360" y="200" width="80" height="80" fill="#1D3557"/>
  <rect x="120" y="280" width="80" height="80" fill="#1D3557"/>
  <rect x="280" y="280" width="80" height="80" fill="#1D3557"/>
  <rect x="200" y="360" width="80" height="80" fill="#1D3557"/>
  <rect x="360" y="360" width="80" height="80" fill="#1D3557"/>
  <rect x="120" y="440" width="80" height="80" fill="#1D3557"/>
  <rect x="280" y="440" width="80" height="80" fill="#1D3557"/>
  <rect x="200" y="520" width="80" height="80" fill="#1D3557"/>
  <rect x="360" y="520" width="80" height="80" fill="#1D3557"/>

  <!-- Scattered extra squares fading out -->
  <rect x="440" y="200" width="80" height="80" fill="#FEFAE0" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <rect x="440" y="280" width="80" height="80" fill="#1D3557" opacity="0.5"/>
  <rect x="440" y="360" width="80" height="80" fill="#FEFAE0" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <rect x="440" y="440" width="80" height="80" fill="#1D3557" opacity="0.3"/>
  <rect x="520" y="200" width="80" height="80" fill="#1D3557" opacity="0.2"/>
  <rect x="520" y="280" width="80" height="80" fill="#FEFAE0" stroke="#000000" stroke-width="0.5" opacity="0.2"/>

  <!-- KING - geometric silhouette (on dark square) -->
  <g transform="translate(220, 220)">
    <rect x="15" y="50" width="30" height="10" fill="#F4D35E"/>
    <rect x="20" y="20" width="20" height="35" fill="#F4D35E"/>
    <rect x="25" y="10" width="10" height="15" fill="#F4D35E"/>
    <!-- Cross on top -->
    <rect x="27" y="2" width="6" height="14" fill="#F4D35E"/>
    <rect x="23" y="5" width="14" height="5" fill="#F4D35E"/>
  </g>

  <!-- QUEEN - geometric silhouette (on light square) -->
  <g transform="translate(300, 220)">
    <rect x="15" y="50" width="30" height="10" fill="#E63946"/>
    <rect x="18" y="25" width="24" height="30" fill="#E63946"/>
    <!-- Crown points -->
    <polygon points="18,25 22,8 26,20 30,5 34,20 38,8 42,25" fill="#E63946"/>
    <circle cx="22" cy="6" r="3" fill="#E63946"/>
    <circle cx="30" cy="3" r="3" fill="#E63946"/>
    <circle cx="38" cy="6" r="3" fill="#E63946"/>
  </g>

  <!-- BISHOP - geometric silhouette (on dark square) -->
  <g transform="translate(140, 300)">
    <rect x="18" y="52" width="24" height="8" fill="#FEFAE0"/>
    <rect x="22" y="25" width="16" height="30" fill="#FEFAE0"/>
    <!-- Mitre shape -->
    <polygon points="30,5 22,25 38,25" fill="#FEFAE0"/>
    <circle cx="30" cy="4" r="3" fill="#FEFAE0"/>
    <!-- Diagonal slit -->
    <line x1="26" y1="18" x2="34" y2="12" stroke="#1D3557" stroke-width="2"/>
  </g>

  <!-- KNIGHT - geometric horse head (on light square) -->
  <g transform="translate(300, 380)">
    <rect x="15" y="52" width="30" height="8" fill="#2A9D8F"/>
    <rect x="20" y="35" width="20" height="20" fill="#2A9D8F"/>
    <!-- Horse head shape -->
    <polygon points="20,35 15,15 25,10 35,5 40,15 40,35" fill="#2A9D8F"/>
    <!-- Eye -->
    <circle cx="33" cy="15" r="3" fill="#FEFAE0"/>
    <!-- Ear -->
    <polygon points="30,7 35,0 37,8" fill="#2A9D8F"/>
  </g>

  <!-- ROOK - geometric tower (on dark square) -->
  <g transform="translate(380, 300)">
    <rect x="15" y="50" width="30" height="10" fill="#FEFAE0"/>
    <rect x="18" y="20" width="24" height="35" fill="#FEFAE0"/>
    <!-- Battlements -->
    <rect x="18" y="10" width="6" height="14" fill="#FEFAE0"/>
    <rect x="27" y="10" width="6" height="14" fill="#FEFAE0"/>
    <rect x="36" y="10" width="6" height="14" fill="#FEFAE0"/>
  </g>

  <!-- PAWN - simple geometric (on light square, small) -->
  <g transform="translate(140, 460)">
    <rect x="20" y="52" width="20" height="8" fill="#E76F51"/>
    <polygon points="20,55 25,30 35,30 40,55" fill="#E76F51"/>
    <circle cx="30" cy="22" r="10" fill="#E76F51"/>
  </g>

  <!-- Another PAWN -->
  <g transform="translate(220, 460)">
    <rect x="20" y="52" width="20" height="8" fill="#E76F51"/>
    <polygon points="20,55 25,30 35,30 40,55" fill="#E76F51"/>
    <circle cx="30" cy="22" r="10" fill="#E76F51"/>
  </g>

  <!-- Another PAWN on right side -->
  <g transform="translate(380, 460)">
    <rect x="20" y="52" width="20" height="8" fill="#E76F51"/>
    <polygon points="20,55 25,30 35,30 40,55" fill="#E76F51"/>
    <circle cx="30" cy="22" r="10" fill="#E76F51"/>
  </g>

  <!-- Large decorative pieces floating outside the board -->

  <!-- Giant abstract bishop - top right -->
  <g transform="translate(580, 60)">
    <polygon points="60,0 20,120 100,120" fill="#E63946" opacity="0.8"/>
    <circle cx="60" cy="0" r="12" fill="#E63946"/>
    <line x1="40" y1="60" x2="80" y2="40" stroke="#FEFAE0" stroke-width="3"/>
    <rect x="30" y="120" width="60" height="15" fill="#E63946" opacity="0.8"/>
  </g>

  <!-- Giant abstract knight - bottom right -->
  <g transform="translate(550, 500)">
    <polygon points="30,180 10,80 40,30 80,10 120,40 120,100 100,180" fill="#2A9D8F" opacity="0.7"/>
    <circle cx="95" cy="45" r="10" fill="#FEFAE0"/>
    <polygon points="60,25 75,0 85,30" fill="#2A9D8F" opacity="0.7"/>
    <rect x="15" y="180" width="100" height="15" fill="#2A9D8F" opacity="0.7"/>
  </g>

  <!-- Diagonal movement lines -->
  <line x1="160" y1="320" x2="400" y2="560" stroke="#E63946" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <line x1="340" y1="240" x2="500" y2="400" stroke="#F4D35E" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <!-- L-shaped knight move -->
  <polyline points="340,420 340,340 420,340" fill="none" stroke="#2A9D8F" stroke-width="3" stroke-dasharray="6,3" opacity="0.7"/>

  <!-- Scattered geometric accents -->
  <circle cx="70" cy="100" r="30" fill="#E63946" opacity="0.3"/>
  <circle cx="70" cy="100" r="15" fill="#E63946" opacity="0.5"/>
  <rect x="680" y="380" width="50" height="50" fill="#F4D35E" opacity="0.4" transform="rotate(45, 705, 405)"/>
  <rect x="50" y="650" width="80" height="8" fill="#000000"/>
  <rect x="50" y="670" width="60" height="8" fill="#1D3557"/>
  <rect x="50" y="690" width="40" height="8" fill="#E63946"/>

  <!-- Title text -->
  <text x="650" y="750" font-family="sans-serif" font-size="30" font-weight="bold" fill="#000000" text-anchor="middle" letter-spacing="3">CHESS</text>
  <line x1="580" y1="760" x2="720" y2="760" stroke="#000000" stroke-width="2"/>

  <!-- Corner accents -->
  <polygon points="0,0 60,0 0,60" fill="#1D3557"/>
  <polygon points="800,800 740,800 800,740" fill="#1D3557"/>
</svg>