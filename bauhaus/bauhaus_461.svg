  <rect x="600" y="100" width="8" height="8" fill="#E63946" opacity="0.5"/>
  <rect x="680" y="200" width="6" height="6" fill="#F4D35E" opacity="0.5"/>
  <circle cx="200" cy="650" r="5" fill="#1D3557" opacity="0.4"/>
  <circle cx="550" cy="680" r="4" fill="#2A9D8F" opacity="0.5"/>
