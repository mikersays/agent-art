  <rect x="470" y="350" width="32" height="32" fill="#000000" opacity="0.75"/>
  <rect x="440" y="280" width="30" height="30" fill="#E63946" opacity="0.8"/>
  <rect x="370" y="260" width="28" height="28" fill="#1D3557" opacity="0.8"/>
  <rect x="300" y="290" width="26" height="26" fill="#F4D35E" opacity="0.85"/>
