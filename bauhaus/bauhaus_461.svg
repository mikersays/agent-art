  <rect x="520" y="310" width="12" height="12" fill="#1D3557" opacity="0.7"/>
  <rect x="480" y="240" width="11" height="11" fill="#F4D35E" opacity="0.75"/>
  <rect x="400" y="210" width="10" height="10" fill="#000000" opacity="0.65"/>
  <!-- Forest green triangles on outer edge -->
  <polygon points="50,700 70,670 90,700" fill="#264653" opacity="0.8"/>
  <polygon points="700,50 720,20 740,50" fill="#264653" opacity="0.8"/>
  <polygon points="750,650 770,620 790,650" fill="#264653" opacity="0.75"/>
