<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#1D3557"/>

  <!-- Spotlight beams from top -->
  <polygon points="200,0 100,500 300,500" fill="#F4D35E" opacity="0.12"/>
  <polygon points="400,0 280,550 520,550" fill="#FEFAE0" opacity="0.10"/>
  <polygon points="600,0 500,500 700,500" fill="#F4D35E" opacity="0.12"/>

  <!-- Trapeze bar 1 - left -->
  <line x1="120" y1="0" x2="200" y2="180" stroke="#FEFAE0" stroke-width="2"/>
  <line x1="320" y1="0" x2="240" y2="180" stroke="#FEFAE0" stroke-width="2"/>
  <rect x="190" y="175" width="60" height="8" rx="2" fill="#000000"/>

  <!-- Trapeze artist 1 - geometric figure hanging -->
  <circle cx="220" cy="210" r="18" fill="#E63946"/>
  <rect x="210" y="228" width="20" height="40" fill="#E63946"/>
  <line x1="210" y1="240" x2="190" y2="270" stroke="#E63946" stroke-width="5" stroke-linecap="round"/>
  <line x1="230" y1="240" x2="255" y2="260" stroke="#E63946" stroke-width="5" stroke-linecap="round"/>
  <line x1="215" y1="268" x2="200" y2="310" stroke="#E63946" stroke-width="5" stroke-linecap="round"/>
  <line x1="225" y1="268" x2="245" y2="305" stroke="#E63946" stroke-width="5" stroke-linecap="round"/>

  <!-- Swing arc 1 -->
  <path d="M 100,350 Q 220,200 340,350" fill="none" stroke="#F4D35E" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Trapeze bar 2 - center, higher -->
  <line x1="330" y1="0" x2="370" y2="120" stroke="#FEFAE0" stroke-width="2"/>
  <line x1="510" y1="0" x2="470" y2="120" stroke="#FEFAE0" stroke-width="2"/>
  <rect x="360" y="115" width="70" height="8" rx="2" fill="#000000"/>

  <!-- Trapeze artist 2 - mid-flight, stretched pose -->
  <circle cx="395" cy="148" r="20" fill="#F4D35E"/>
  <polygon points="385,168 405,168 415,220 375,220" fill="#F4D35E"/>
  <line x1="385" y1="180" x2="350" y2="160" stroke="#F4D35E" stroke-width="5" stroke-linecap="round"/>
  <line x1="405" y1="180" x2="440" y2="155" stroke="#F4D35E" stroke-width="5" stroke-linecap="round"/>
  <line x1="385" y1="220" x2="370" y2="260" stroke="#F4D35E" stroke-width="5" stroke-linecap="round"/>
  <line x1="405" y1="220" x2="420" y2="260" stroke="#F4D35E" stroke-width="5" stroke-linecap="round"/>

  <!-- Swing arc 2 -->
  <path d="M 280,300 Q 400,100 520,300" fill="none" stroke="#E63946" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Trapeze bar 3 - right -->
  <line x1="540" y1="0" x2="580" y2="200" stroke="#FEFAE0" stroke-width="2"/>
  <line x1="700" y1="0" x2="660" y2="200" stroke="#FEFAE0" stroke-width="2"/>
  <rect x="570" y="195" width="60" height="8" rx="2" fill="#000000"/>

  <!-- Trapeze artist 3 - catching pose -->
  <circle cx="600" cy="230" r="16" fill="#FFFFFF"/>
  <rect x="591" y="246" width="18" height="35" fill="#FFFFFF"/>
  <line x1="591" y1="255" x2="565" y2="235" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <line x1="609" y1="255" x2="635" y2="240" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <line x1="595" y1="281" x2="580" y2="315" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <line x1="605" y1="281" x2="620" y2="315" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>

  <!-- Swing arc 3 -->
  <path d="M 480,380 Q 600,180 720,380" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Motion lines - artist 1 -->
  <line x1="180" y1="250" x2="160" y2="260" stroke="#457B9D" stroke-width="1.5" opacity="0.7"/>
  <line x1="175" y1="270" x2="155" y2="280" stroke="#457B9D" stroke-width="1.5" opacity="0.6"/>
  <line x1="178" y1="290" x2="158" y2="300" stroke="#457B9D" stroke-width="1.5" opacity="0.5"/>

  <!-- Motion lines - artist 2 -->
  <line x1="355" y1="190" x2="335" y2="195" stroke="#E76F51" stroke-width="1.5" opacity="0.7"/>
  <line x1="350" y1="205" x2="330" y2="210" stroke="#E76F51" stroke-width="1.5" opacity="0.6"/>
  <line x1="353" y1="220" x2="333" y2="225" stroke="#E76F51" stroke-width="1.5" opacity="0.5"/>

  <!-- Motion lines - artist 3 -->
  <line x1="640" y1="260" x2="660" y2="265" stroke="#457B9D" stroke-width="1.5" opacity="0.7"/>
  <line x1="638" y1="275" x2="658" y2="280" stroke="#457B9D" stroke-width="1.5" opacity="0.6"/>
  <line x1="642" y1="290" x2="662" y2="295" stroke="#457B9D" stroke-width="1.5" opacity="0.5"/>

  <!-- Circular spotlight effects on ground -->
  <ellipse cx="200" cy="700" rx="120" ry="30" fill="#F4D35E" opacity="0.15"/>
  <ellipse cx="400" cy="680" rx="140" ry="35" fill="#FEFAE0" opacity="0.12"/>
  <ellipse cx="620" cy="710" rx="110" ry="28" fill="#F4D35E" opacity="0.15"/>

  <!-- Platform/net structure at bottom -->
  <line x1="50" y1="750" x2="750" y2="750" stroke="#E76F51" stroke-width="3"/>
  <line x1="100" y1="750" x2="100" y2="780" stroke="#E76F51" stroke-width="3"/>
  <line x1="700" y1="750" x2="700" y2="780" stroke="#E76F51" stroke-width="3"/>
  <!-- Net lines -->
  <line x1="100" y1="760" x2="700" y2="760" stroke="#E76F51" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="770" x2="700" y2="770" stroke="#E76F51" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="750" x2="200" y2="780" stroke="#E76F51" stroke-width="1" opacity="0.5"/>
  <line x1="300" y1="750" x2="300" y2="780" stroke="#E76F51" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="750" x2="400" y2="780" stroke="#E76F51" stroke-width="1" opacity="0.5"/>
  <line x1="500" y1="750" x2="500" y2="780" stroke="#E76F51" stroke-width="1" opacity="0.5"/>
  <line x1="600" y1="750" x2="600" y2="780" stroke="#E76F51" stroke-width="1" opacity="0.5"/>

  <!-- Flying geometric figure between bars - mid-air -->
  <circle cx="480" cy="320" r="14" fill="#E76F51"/>
  <polygon points="470,334 490,334 496,370 464,370" fill="#E76F51"/>
  <line x1="470" y1="345" x2="445" y2="320" stroke="#E76F51" stroke-width="4" stroke-linecap="round"/>
  <line x1="490" y1="345" x2="515" y2="325" stroke="#E76F51" stroke-width="4" stroke-linecap="round"/>
  <line x1="474" y1="370" x2="460" y2="405" stroke="#E76F51" stroke-width="4" stroke-linecap="round"/>
  <line x1="486" y1="370" x2="500" y2="405" stroke="#E76F51" stroke-width="4" stroke-linecap="round"/>

  <!-- Motion trail for flying figure -->
  <circle cx="440" cy="340" r="8" fill="none" stroke="#E76F51" stroke-width="1" opacity="0.3"/>
  <circle cx="420" cy="355" r="6" fill="none" stroke="#E76F51" stroke-width="1" opacity="0.2"/>

  <!-- Decorative geometric elements -->
  <rect x="30" y="400" width="40" height="40" fill="#E63946" opacity="0.6" transform="rotate(45,50,420)"/>
  <rect x="730" y="420" width="35" height="35" fill="#F4D35E" opacity="0.6" transform="rotate(45,747,437)"/>
  <circle cx="60" cy="600" r="25" fill="none" stroke="#457B9D" stroke-width="2" opacity="0.5"/>
  <circle cx="740" cy="580" r="20" fill="none" stroke="#457B9D" stroke-width="2" opacity="0.5"/>

  <!-- Stars / dots in background -->
  <circle cx="150" cy="50" r="3" fill="#FEFAE0" opacity="0.4"/>
  <circle cx="350" cy="30" r="2" fill="#FEFAE0" opacity="0.3"/>
  <circle cx="650" cy="60" r="3" fill="#FEFAE0" opacity="0.4"/>
  <circle cx="750" cy="100" r="2" fill="#FEFAE0" opacity="0.3"/>
  <circle cx="50" cy="120" r="2" fill="#FEFAE0" opacity="0.35"/>

  <!-- Additional arc paths showing swing trajectories -->
  <path d="M 150,450 Q 400,250 650,450" fill="none" stroke="#FEFAE0" stroke-width="1" opacity="0.2"/>
  <path d="M 180,500 Q 400,320 620,500" fill="none" stroke="#FEFAE0" stroke-width="1" opacity="0.15"/>
</svg>