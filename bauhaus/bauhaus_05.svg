<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Strong diagonal lines creating tension -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="8"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#000000" stroke-width="8"/>

  <!-- Parallel diagonal lines - top-left to bottom-right -->
  <line x1="0" y1="200" x2="600" y2="800" stroke="#000000" stroke-width="3"/>
  <line x1="200" y1="0" x2="800" y2="600" stroke="#000000" stroke-width="3"/>
  <line x1="0" y1="400" x2="400" y2="800" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="0" x2="800" y2="400" stroke="#000000" stroke-width="2"/>

  <!-- Parallel diagonal lines - top-right to bottom-left -->
  <line x1="800" y1="200" x2="200" y2="800" stroke="#000000" stroke-width="2"/>
  <line x1="600" y1="0" x2="0" y2="600" stroke="#000000" stroke-width="2"/>

  <!-- Large red rectangle along main diagonal -->
  <rect x="50" y="50" width="200" height="120" fill="#E63946" transform="rotate(45, 150, 110)"/>

  <!-- Blue rectangle along counter-diagonal -->
  <rect x="520" y="80" width="180" height="100" fill="#1D3557" transform="rotate(-45, 610, 130)"/>

  <!-- Yellow square at center intersection -->
  <rect x="350" y="350" width="100" height="100" fill="#F4D35E" transform="rotate(45, 400, 400)"/>

  <!-- Black circle at center -->
  <circle cx="400" cy="400" r="30" fill="#000000"/>

  <!-- Red circle upper diagonal -->
  <circle cx="200" cy="200" r="50" fill="#E63946" opacity="0.85"/>

  <!-- Blue circle lower diagonal -->
  <circle cx="600" cy="600" r="50" fill="#1D3557" opacity="0.85"/>

  <!-- Yellow circle on counter-diagonal -->
  <circle cx="600" cy="200" r="40" fill="#F4D35E" opacity="0.85"/>

  <!-- Red circle on counter-diagonal -->
  <circle cx="200" cy="600" r="40" fill="#E63946" opacity="0.7"/>

  <!-- Triangles along diagonals -->
  <polygon points="300,250 350,330 250,330" fill="#1D3557"/>
  <polygon points="500,470 550,550 450,550" fill="#F4D35E"/>
  <polygon points="550,300 620,300 585,240" fill="#E63946"/>
  <polygon points="250,500 320,500 285,560" fill="#000000"/>

  <!-- Small geometric accents -->
  <rect x="80" y="380" width="60" height="60" fill="#1D3557" opacity="0.7"/>
  <rect x="660" y="360" width="60" height="60" fill="#E63946" opacity="0.7"/>
  <rect x="370" y="80" width="50" height="50" fill="#000000" opacity="0.5"/>
  <rect x="380" y="670" width="50" height="50" fill="#F4D35E" opacity="0.8"/>

  <!-- Thin accent lines radiating from center -->
  <line x1="400" y1="400" x2="0" y2="400" stroke="#E63946" stroke-width="1.5"/>
  <line x1="400" y1="400" x2="800" y2="400" stroke="#1D3557" stroke-width="1.5"/>
  <line x1="400" y1="400" x2="400" y2="0" stroke="#F4D35E" stroke-width="1.5"/>
  <line x1="400" y1="400" x2="400" y2="800" stroke="#000000" stroke-width="1.5"/>

  <!-- Corner triangles for framing -->
  <polygon points="0,0 80,0 0,80" fill="#000000"/>
  <polygon points="800,0 720,0 800,80" fill="#E63946"/>
  <polygon points="0,800 80,800 0,720" fill="#1D3557"/>
  <polygon points="800,800 720,800 800,720" fill="#F4D35E"/>

  <!-- Small circles along diagonals -->
  <circle cx="100" cy="100" r="12" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="300" cy="300" r="12" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="500" cy="500" r="12" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="700" cy="700" r="12" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
</svg>