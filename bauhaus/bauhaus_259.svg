<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Fine grid lines at low opacity -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <!-- Large dominant circles -->
  <circle cx="300" cy="320" r="150" fill="#1D3557" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <circle cx="540" cy="480" r="130" fill="#E63946" stroke="#000000" stroke-width="1.5" opacity="0.65"/>
  <!-- Medium circles -->
  <circle cx="150" cy="580" r="90" fill="#F4D35E" stroke="#000000" stroke-width="1" opacity="0.7"/>
  <circle cx="620" cy="200" r="80" fill="#457B9D" stroke="#000000" stroke-width="1" opacity="0.65"/>
  <circle cx="680" cy="650" r="70" fill="#2A9D8F" stroke="#000000" stroke-width="1" opacity="0.7"/>
  <circle cx="120" cy="150" r="75" fill="#E76F51" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <!-- Smaller circles -->
  <circle cx="430" cy="150" r="50" fill="#DDA15E" stroke="#000000" stroke-width="1" opacity="0.7"/>
  <circle cx="250" cy="680" r="55" fill="#6D2E46" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <circle cx="720" cy="400" r="45" fill="#264653" stroke="#000000" stroke-width="1" opacity="0.7"/>
  <circle cx="80" cy="400" r="40" fill="#A8DADC" stroke="#000000" stroke-width="1" opacity="0.65"/>
  <circle cx="500" cy="700" r="48" fill="#E9C46A" stroke="#000000" stroke-width="1" opacity="0.65"/>
  <circle cx="350" cy="550" r="42" fill="#FFFFFF" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <!-- Small circles -->
  <circle cx="180" cy="250" r="25" fill="#E63946" stroke="#000000" stroke-width="0.8" opacity="0.7"/>
  <circle cx="480" cy="330" r="28" fill="#F4D35E" stroke="#000000" stroke-width="0.8" opacity="0.65"/>
  <circle cx="650" cy="540" r="22" fill="#1D3557" stroke="#000000" stroke-width="0.8" opacity="0.7"/>
  <circle cx="380" cy="720" r="30" fill="#457B9D" stroke="#000000" stroke-width="0.8" opacity="0.6"/>
  <circle cx="550" cy="100" r="20" fill="#E63946" stroke="#000000" stroke-width="0.8" opacity="0.65"/>
  <!-- Tiny accent circles -->
  <circle cx="60" cy="720" r="15" fill="#2A9D8F" stroke="#000000" stroke-width="0.5" opacity="0.7"/>
  <circle cx="740" cy="120" r="12" fill="#F4D35E" stroke="#000000" stroke-width="0.5" opacity="0.7"/>
  <circle cx="300" cy="90" r="14" fill="#A89F91" stroke="#000000" stroke-width="0.5" opacity="0.6"/>
  <circle cx="750" cy="760" r="18" fill="#E76F51" stroke="#000000" stroke-width="0.5" opacity="0.65"/>
  <circle cx="50" cy="50" r="10" fill="#000000" stroke="#000000" stroke-width="0.5" opacity="0.8"/>
  <circle cx="200" cy="470" r="16" fill="#DDA15E" stroke="#000000" stroke-width="0.5" opacity="0.6"/>
  <circle cx="580" cy="620" r="13" fill="#FFFFFF" stroke="#000000" stroke-width="0.5" opacity="0.55"/>
  <circle cx="420" cy="430" r="18" fill="#A8DADC" stroke="#000000" stroke-width="0.5" opacity="0.6"/>
  <!-- Very small dots for texture -->
  <circle cx="340" cy="200" r="8" fill="#000000" stroke="none" opacity="0.4"/>
  <circle cx="600" cy="350" r="8" fill="#000000" stroke="none" opacity="0.35"/>
  <circle cx="160" cy="680" r="7" fill="#000000" stroke="none" opacity="0.4"/>
  <circle cx="500" cy="580" r="7" fill="#000000" stroke="none" opacity="0.35"/>
  <circle cx="700" cy="300" r="6" fill="#000000" stroke="none" opacity="0.3"/>
</svg>