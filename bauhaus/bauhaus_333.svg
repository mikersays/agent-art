<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Sand-colored ground band at bottom -->
  <rect x="0" y="720" width="800" height="80" fill="#DDA15E" opacity="0.6"/>
  <!-- Arc path suggesting pendulum swing -->
  <path d="M 100,100 A 400,500 0 0,1 700,100" fill="none" stroke="#000000" stroke-width="2" opacity="0.3"/>
  <!-- Pivot point lines to pendulum positions along arc -->
  <line x1="400" y1="50" x2="130" y2="250" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="50" x2="200" y2="400" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="50" x2="280" y2="520" stroke="#000000" stroke-width="1.2" opacity="0.25"/>
  <line x1="400" y1="50" x2="370" y2="580" stroke="#000000" stroke-width="1.5" opacity="0.35"/>
  <line x1="400" y1="50" x2="400" y2="600" stroke="#000000" stroke-width="2" opacity="0.6"/>
  <line x1="400" y1="50" x2="430" y2="580" stroke="#000000" stroke-width="1.5" opacity="0.35"/>
  <line x1="400" y1="50" x2="520" y2="520" stroke="#000000" stroke-width="1.2" opacity="0.25"/>
  <line x1="400" y1="50" x2="600" y2="400" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="50" x2="670" y2="250" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <!-- Motion blur circles along arc, decreasing opacity -->
  <circle cx="130" cy="250" r="18" fill="#1D3557" opacity="0.1"/>
  <circle cx="200" cy="400" r="22" fill="#1D3557" opacity="0.15"/>
  <circle cx="280" cy="520" r="28" fill="#1D3557" opacity="0.2"/>
  <circle cx="370" cy="580" r="40" fill="#1D3557" opacity="0.3"/>
  <!-- Main pendulum bob -->
  <circle cx="400" cy="600" r="60" fill="#1D3557" opacity="0.85"/>
  <!-- Afterimage on right side -->
  <circle cx="430" cy="580" r="40" fill="#1D3557" opacity="0.3"/>
  <circle cx="520" cy="520" r="28" fill="#1D3557" opacity="0.2"/>
  <circle cx="600" cy="400" r="22" fill="#1D3557" opacity="0.15"/>
  <circle cx="670" cy="250" r="18" fill="#1D3557" opacity="0.1"/>
  <!-- Red and yellow shapes in upper portion -->
  <rect x="50" y="40" width="80" height="60" fill="#E63946" opacity="0.7"/>
  <circle cx="650" cy="70" r="35" fill="#F4D35E" opacity="0.75"/>
  <polygon points="200,30 240,100 160,100" fill="#E63946" opacity="0.6"/>
  <rect x="500" y="50" width="60" height="40" fill="#F4D35E" opacity="0.65"/>
  <circle cx="750" cy="180" r="20" fill="#E63946" opacity="0.5"/>
  <rect x="300" y="20" width="45" height="70" fill="#E76F51" opacity="0.55"/>
  <polygon points="700,140 730,200 670,200" fill="#F4D35E" opacity="0.5"/>
  <!-- Teal accent shapes at sides -->
  <rect x="20" y="350" width="50" height="120" fill="#2A9D8F" opacity="0.5"/>
  <rect x="730" y="400" width="50" height="100" fill="#2A9D8F" opacity="0.5"/>
  <circle cx="60" cy="550" r="22" fill="#2A9D8F" opacity="0.4"/>
  <circle cx="750" cy="580" r="18" fill="#2A9D8F" opacity="0.4"/>
  <!-- Pivot point marker -->
  <circle cx="400" cy="50" r="8" fill="#000000"/>
  <!-- Small accent on pendulum bob -->
  <circle cx="400" cy="600" r="15" fill="#F4D35E" opacity="0.6"/>
  <!-- Ground details -->
  <line x1="0" y1="720" x2="800" y2="720" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <rect x="150" y="740" width="30" height="30" fill="#264653" opacity="0.4"/>
  <rect x="500" y="745" width="40" height="25" fill="#264653" opacity="0.35"/>
</svg>