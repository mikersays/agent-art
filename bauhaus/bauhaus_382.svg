<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
<!-- Background -->
<rect width="800" height="800" fill="#FEFAE0"/>

<!-- Structural grid lines at low opacity -->
<line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
<line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
<line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
<line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>

<!-- Exploded 4x4 Grid - cells displaced outward from center -->
<!-- Row 1 (top) - most displaced upward -->
<!-- Cell (0,0) - top-left, displaced up-left -->
<rect x="50" y="40" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<circle cx="115" cy="105" r="40" fill="#E63946" opacity="0.85"/>

<!-- Cell (1,0) - displaced up-left slightly -->
<rect x="220" y="60" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<rect x="250" y="90" width="70" height="70" fill="#1D3557" opacity="0.85"/>

<!-- Cell (2,0) - displaced up-right slightly -->
<rect x="450" y="60" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<polygon points="515,80 560,170 470,170" fill="#F4D35E" opacity="0.85"/>

<!-- Cell (3,0) - top-right, displaced up-right -->
<rect x="620" y="40" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<ellipse cx="685" cy="105" rx="45" ry="30" fill="#2A9D8F" opacity="0.85"/>

<!-- Row 2 - slightly displaced -->
<!-- Cell (0,1) -->
<rect x="70" y="230" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<rect x="95" y="255" width="80" height="80" fill="#F4D35E" opacity="0.85" transform="rotate(45,135,295)"/>

<!-- Cell (1,1) - near center, minimal displacement -->
<rect x="250" y="250" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<circle cx="315" cy="315" r="35" fill="#000000" opacity="0.85"/>
<circle cx="315" cy="315" r="18" fill="#FEFAE0" opacity="1"/>

<!-- Cell (2,1) - near center -->
<rect x="420" y="250" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<line x1="440" y1="270" x2="530" y2="360" stroke="#E63946" stroke-width="4"/>
<line x1="530" y1="270" x2="440" y2="360" stroke="#1D3557" stroke-width="4"/>

<!-- Cell (3,1) -->
<rect x="600" y="230" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<polygon points="665,245 710,345 620,345" fill="#E76F51" opacity="0.85"/>

<!-- Row 3 -->
<!-- Cell (0,2) -->
<rect x="70" y="440" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<rect x="90" y="460" width="90" height="90" fill="#457B9D" opacity="0.85"/>

<!-- Cell (1,2) -->
<rect x="250" y="420" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<circle cx="315" cy="485" r="20" fill="#E63946" opacity="0.85"/>
<circle cx="315" cy="485" r="40" fill="none" stroke="#E63946" stroke-width="2" opacity="0.5"/>

<!-- Cell (2,2) -->
<rect x="420" y="420" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<rect x="445" y="445" width="40" height="80" fill="#1D3557" opacity="0.85"/>
<rect x="495" y="445" width="30" height="50" fill="#F4D35E" opacity="0.85"/>

<!-- Cell (3,2) -->
<rect x="600" y="440" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<path d="M620,460 Q665,480 665,530 Q665,555 620,555" fill="none" stroke="#000000" stroke-width="3"/>
<circle cx="680" cy="505" r="25" fill="#F4D35E" opacity="0.85"/>

<!-- Row 4 (bottom) - most displaced downward -->
<!-- Cell (0,3) -->
<rect x="50" y="630" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<polygon points="85,645 145,645 145,745 85,745" fill="#6D2E46" opacity="0.85"/>
<circle cx="115" cy="695" r="20" fill="#FEFAE0" opacity="0.9"/>

<!-- Cell (1,3) -->
<rect x="220" y="610" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<line x1="240" y1="675" x2="330" y2="675" stroke="#000000" stroke-width="3"/>
<circle cx="285" cy="650" r="18" fill="#E63946" opacity="0.85"/>
<circle cx="285" cy="700" r="12" fill="#1D3557" opacity="0.85"/>

<!-- Cell (2,3) -->
<rect x="450" y="610" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<rect x="470" y="625" width="90" height="45" fill="#F4D35E" opacity="0.85"/>
<rect x="470" y="680" width="90" height="45" fill="#1D3557" opacity="0.85"/>

<!-- Cell (3,3) -->
<rect x="620" y="630" width="130" height="130" fill="none" stroke="#000000" stroke-width="2"/>
<path d="M685,645 A40,40 0 1,1 685,745" fill="#2A9D8F" opacity="0.85"/>

<!-- Corner accent shapes -->
<circle cx="25" cy="25" r="8" fill="#E63946" opacity="0.4"/>
<circle cx="775" cy="25" r="8" fill="#1D3557" opacity="0.4"/>
<circle cx="25" cy="775" r="8" fill="#F4D35E" opacity="0.4"/>
<circle cx="775" cy="775" r="8" fill="#000000" opacity="0.4"/>
</svg>