  <rect x="290" y="335" width="190" height="65" fill="#E63946" opacity="0.85"/>
  <!-- Tower block 6 -->
  <rect x="310" y="265" width="155" height="60" fill="#E76F51" opacity="0.8"/>
  <!-- Tower block 7 -->
  <rect x="330" y="200" width="120" height="55" fill="#1D3557" opacity="0.85"/>
  <!-- Tower block 8 - narrow top -->
  <rect x="350" y="145" width="85" height="48" fill="#E63946" opacity="0.9"/>
  <!-- Yellow triangle at top -->
  <polygon points="392,60 350,145 435,145" fill="#F4D35E" opacity="0.95"/>
  <!-- Small circles at block corners -->
  <circle cx="180" cy="650" r="6" fill="#F4D35E" opacity="0.9"/>
  <circle cx="560" cy="650" r="6" fill="#F4D35E" opacity="0.9"/>
  <circle cx="210" cy="570" r="5" fill="#2A9D8F" opacity="0.85"/>
  <circle cx="530" cy="570" r="5" fill="#2A9D8F" opacity="0.85"/>
  <circle cx="240" cy="490" r="5" fill="#F4D35E" opacity="0.8"/>
  <circle cx="510" cy="490" r="5" fill="#F4D35E" opacity="0.8"/>
  <circle cx="265" cy="410" r="4" fill="#E9C46A" opacity="0.85"/>
  <circle cx="495" cy="410" r="4" fill="#E9C46A" opacity="0.85"/>
  <circle cx="290" cy="335" r="4" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="480" cy="335" r="4" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="310" cy="265" r="3.5" fill="#F4D35E" opacity="0.85"/>
  <circle cx="465" cy="265" r="3.5" fill="#F4D35E" opacity="0.85"/>
  <circle cx="330" cy="200" r="3" fill="#E9C46A" opacity="0.8"/>
  <circle cx="450" cy="200" r="3" fill="#E9C46A" opacity="0.8"/>
  <circle cx="350" cy="145" r="3" fill="#2A9D8F" opacity="0.85"/>
  <circle cx="435" cy="145" r="3" fill="#2A9D8F" opacity="0.85"/>
  <!-- Ground line -->
  <line x1="100" y1="720" x2="650" y2="720" stroke="#000000" stroke-width="2.5" opacity="0.6"/>
  <!-- Side structural elements -->
  <line x1="370" y1="60" x2="370" y2="750" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <rect x="60" y="680" width="50" height="30" fill="#457B9D" opacity="0.5"/>
  <rect x="640" y="660" width="70" height="50" fill="#457B9D" opacity="0.4"/>
  <!-- Floating accent shapes -->
  <circle cx="100" cy="300" r="20" fill="#E63946" opacity="0.3"/>
