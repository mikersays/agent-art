<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Steel blue background -->
  <rect x="0" y="0" width="800" height="800" fill="#457B9D"/>

  <!-- Multiple arc paths sweeping across the canvas -->
  <!-- Red arcs -->
  <path d="M 50 400 A 350 350 0 0 1 750 400" fill="none" stroke="#E63946" stroke-width="5" opacity="0.85"/>
  <path d="M 100 500 A 300 300 0 0 1 700 500" fill="none" stroke="#E63946" stroke-width="4" opacity="0.7"/>
  <path d="M 200 200 A 250 250 0 0 0 200 600" fill="none" stroke="#E63946" stroke-width="3.5" opacity="0.6"/>
  <path d="M 400 100 A 150 150 0 0 1 550 250" fill="none" stroke="#E63946" stroke-width="3" opacity="0.75"/>

  <!-- Blue arcs -->
  <path d="M 0 300 A 300 300 0 0 1 600 300" fill="none" stroke="#1D3557" stroke-width="5" opacity="0.8"/>
  <path d="M 150 700 A 280 280 0 0 1 700 350" fill="none" stroke="#1D3557" stroke-width="4" opacity="0.65"/>
  <path d="M 500 50 A 200 200 0 0 1 700 250" fill="none" stroke="#1D3557" stroke-width="3.5" opacity="0.7"/>
  <path d="M 300 600 A 180 180 0 0 0 600 750" fill="none" stroke="#1D3557" stroke-width="3" opacity="0.6"/>

  <!-- Yellow arcs -->
  <path d="M 100 100 A 350 350 0 0 1 750 200" fill="none" stroke="#F4D35E" stroke-width="4.5" opacity="0.8"/>
  <path d="M 50 600 A 320 320 0 0 1 750 600" fill="none" stroke="#F4D35E" stroke-width="4" opacity="0.7"/>
  <path d="M 600 100 A 250 250 0 0 1 600 700" fill="none" stroke="#F4D35E" stroke-width="3" opacity="0.65"/>
  <path d="M 100 450 A 150 150 0 0 0 350 350" fill="none" stroke="#F4D35E" stroke-width="3.5" opacity="0.75"/>

  <!-- Small rectangles scattered along arc paths -->
  <rect x="390" y="45" width="14" height="10" fill="#FEFAE0" opacity="0.8"/>
  <rect x="200" y="190" width="12" height="8" fill="#FEFAE0" opacity="0.7"/>
  <rect x="600" y="290" width="10" height="14" fill="#FEFAE0" opacity="0.75"/>
  <rect x="350" y="390" width="12" height="12" fill="#FEFAE0" opacity="0.8"/>
  <rect x="150" y="495" width="14" height="10" fill="#FEFAE0" opacity="0.7"/>
  <rect x="500" y="495" width="10" height="12" fill="#FEFAE0" opacity="0.75"/>
  <rect x="680" y="195" width="12" height="10" fill="#FEFAE0" opacity="0.7"/>
  <rect x="250" y="595" width="14" height="14" fill="#FEFAE0" opacity="0.8"/>
  <rect x="550" y="595" width="10" height="10" fill="#FEFAE0" opacity="0.7"/>
  <rect x="100" y="295" width="12" height="8" fill="#FEFAE0" opacity="0.65"/>
  <rect x="450" y="695" width="10" height="12" fill="#E76F51" opacity="0.8"/>
  <rect x="700" y="395" width="12" height="10" fill="#E76F51" opacity="0.75"/>
  <rect x="300" y="150" width="8" height="14" fill="#E76F51" opacity="0.7"/>

  <!-- Corner accent circles -->
  <circle cx="40" cy="40" r="15" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="760" cy="760" r="15" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="760" cy="40" r="10" fill="#000000" opacity="0.4"/>
  <circle cx="40" cy="760" r="10" fill="#000000" opacity="0.4"/>

  <!-- Central focal point -->
  <circle cx="400" cy="400" r="12" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="400" cy="400" r="6" fill="#E63946" opacity="0.9"/>
</svg>