<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Bold red horizontal bar at top -->
  <rect x="0" y="30" width="800" height="40" fill="#E63946" opacity="0.9"/>

  <!-- Subtle arc paths suggesting swing trajectories -->
  <path d="M 60 70 A 300 400 0 0 1 180 600" fill="none" stroke="#264653" stroke-width="1" opacity="0.2"/>
  <path d="M 160 70 A 250 350 0 0 1 250 550" fill="none" stroke="#264653" stroke-width="1" opacity="0.18"/>
  <path d="M 280 70 A 200 300 0 0 0 350 500" fill="none" stroke="#264653" stroke-width="1" opacity="0.15"/>
  <path d="M 400 70 A 180 280 0 0 1 480 480" fill="none" stroke="#264653" stroke-width="1" opacity="0.2"/>
  <path d="M 500 70 A 220 320 0 0 0 560 520" fill="none" stroke="#264653" stroke-width="1" opacity="0.17"/>
  <path d="M 600 70 A 280 380 0 0 1 680 580" fill="none" stroke="#264653" stroke-width="1" opacity="0.2"/>
  <path d="M 720 70 A 250 350 0 0 0 760 560" fill="none" stroke="#264653" stroke-width="1" opacity="0.15"/>

  <!-- Pendulum strings (vertical lines from top bar) -->
  <line x1="80" y1="70" x2="120" y2="450" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="180" y1="70" x2="200" y2="350" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="300" y1="70" x2="310" y2="520" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="400" y1="70" x2="400" y2="300" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="500" y1="70" x2="480" y2="580" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="600" y1="70" x2="620" y2="420" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="720" y1="70" x2="700" y2="500" stroke="#000000" stroke-width="1.5" opacity="0.7"/>

  <!-- Pendulum circles at ends of strings -->
  <circle cx="120" cy="450" r="45" fill="#1D3557" opacity="0.85"/>
  <circle cx="200" cy="350" r="30" fill="#F4D35E" opacity="0.9"/>
  <circle cx="310" cy="520" r="55" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="400" cy="300" r="25" fill="#000000" opacity="0.85"/>
  <circle cx="480" cy="580" r="50" fill="#E76F51" opacity="0.85"/>
  <circle cx="620" cy="420" r="38" fill="#1D3557" opacity="0.75"/>
  <circle cx="700" cy="500" r="42" fill="#F4D35E" opacity="0.85"/>

  <!-- Small burgundy rectangles at base -->
  <rect x="50" y="720" width="40" height="20" fill="#6D2E46" opacity="0.7"/>
  <rect x="180" y="730" width="35" height="18" fill="#6D2E46" opacity="0.6"/>
  <rect x="320" y="715" width="50" height="22" fill="#6D2E46" opacity="0.75"/>
  <rect x="450" y="740" width="30" height="16" fill="#6D2E46" opacity="0.65"/>
  <rect x="570" y="725" width="45" height="20" fill="#6D2E46" opacity="0.7"/>
  <rect x="700" y="735" width="38" height="18" fill="#6D2E46" opacity="0.6"/>

  <!-- Additional structural elements -->
  <line x1="0" y1="700" x2="800" y2="700" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="760" x2="800" y2="760" stroke="#000000" stroke-width="1" opacity="0.1"/>

  <!-- Small accent dots on the bar -->
  <circle cx="80" cy="50" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="180" cy="50" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="300" cy="50" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="400" cy="50" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="500" cy="50" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="600" cy="50" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="720" cy="50" r="5" fill="#FFFFFF" opacity="0.8"/>

  <!-- Secondary shorter pendulums for depth -->
  <line x1="140" y1="70" x2="150" y2="200" stroke="#000000" stroke-width="0.8" opacity="0.35"/>
  <circle cx="150" cy="200" r="12" fill="#A89F91" opacity="0.5"/>
  <line x1="350" y1="70" x2="340" y2="180" stroke="#000000" stroke-width="0.8" opacity="0.35"/>
  <circle cx="340" cy="180" r="10" fill="#A89F91" opacity="0.45"/>
  <line x1="550" y1="70" x2="560" y2="220" stroke="#000000" stroke-width="0.8" opacity="0.35"/>
  <circle cx="560" cy="220" r="14" fill="#A89F91" opacity="0.5"/>
  <line x1="660" y1="70" x2="650" y2="240" stroke="#000000" stroke-width="0.8" opacity="0.35"/>
  <circle cx="650" cy="240" r="11" fill="#457B9D" opacity="0.5"/>

  <!-- Shadow circles beneath main pendulums -->
  <ellipse cx="125" cy="680" rx="35" ry="8" fill="#000000" opacity="0.08"/>
  <ellipse cx="205" cy="680" rx="25" ry="6" fill="#000000" opacity="0.06"/>
  <ellipse cx="315" cy="680" rx="42" ry="9" fill="#000000" opacity="0.08"/>
  <ellipse cx="485" cy="680" rx="38" ry="8" fill="#000000" opacity="0.08"/>
  <ellipse cx="625" cy="680" rx="30" ry="7" fill="#000000" opacity="0.07"/>
  <ellipse cx="705" cy="680" rx="33" ry="7" fill="#000000" opacity="0.07"/>
</svg>