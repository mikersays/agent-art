  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="4" opacity="0.7"/>
  <line x1="200" y1="0" x2="800" y2="600" stroke="#E63946" stroke-width="3" opacity="0.75"/>
