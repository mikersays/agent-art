<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Sky background -->
  <rect width="800" height="800" fill="#FEFAE0"/>
  <rect width="800" height="500" fill="#A8DADC" opacity="0.15"/>

  <!-- Subtle horizontal atmosphere lines -->
  <line x1="0" y1="80" x2="800" y2="80" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>

  <!-- Island 1 - Large, upper left -->
  <line x1="180" y1="310" x2="180" y2="520" stroke="#A89F91" stroke-width="1.5" opacity="0.3"/>
  <line x1="220" y1="310" x2="220" y2="560" stroke="#A89F91" stroke-width="1" opacity="0.25"/>
  <line x1="260" y1="310" x2="260" y2="490" stroke="#A89F91" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="220" cy="290" rx="110" ry="40" fill="#1D3557" opacity="0.7"/>
  <rect x="170" y="260" width="30" height="30" fill="#E63946" opacity="0.8"/>
  <polygon points="230,250 245,270 215,270" fill="#F4D35E" opacity="0.85"/>
  <rect x="255" y="265" width="18" height="18" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="200" cy="275" r="8" fill="#FFFFFF" opacity="0.6"/>

  <!-- Island 2 - Medium, center right -->
  <line x1="540" y1="230" x2="540" y2="430" stroke="#A89F91" stroke-width="1" opacity="0.25"/>
  <line x1="580" y1="230" x2="580" y2="470" stroke="#A89F91" stroke-width="1.5" opacity="0.3"/>
  <line x1="620" y1="230" x2="620" y2="400" stroke="#A89F91" stroke-width="1" opacity="0.25"/>
  <ellipse cx="580" cy="210" rx="90" ry="35" fill="#457B9D" opacity="0.7"/>
  <polygon points="560,180 575,195 545,195" fill="#E63946" opacity="0.75"/>
  <rect x="585" y="185" width="25" height="20" fill="#F4D35E" opacity="0.8"/>
  <circle cx="620" cy="195" r="7" fill="#FFFFFF" opacity="0.5"/>

  <!-- Island 3 - Small, upper right -->
  <line x1="680" y1="160" x2="680" y2="300" stroke="#A89F91" stroke-width="1" opacity="0.2"/>
  <line x1="710" y1="160" x2="710" y2="330" stroke="#A89F91" stroke-width="1" opacity="0.2"/>
  <ellipse cx="700" cy="140" rx="55" ry="25" fill="#264653" opacity="0.7"/>
  <rect x="685" y="118" width="14" height="14" fill="#E76F51" opacity="0.8"/>
  <polygon points="710,115 720,130 700,130" fill="#A8DADC" opacity="0.7"/>

  <!-- Island 4 - Large, lower center -->
  <line x1="340" y1="520" x2="340" y2="720" stroke="#A89F91" stroke-width="1.5" opacity="0.3"/>
  <line x1="390" y1="520" x2="390" y2="750" stroke="#A89F91" stroke-width="2" opacity="0.3"/>
  <line x1="440" y1="520" x2="440" y2="700" stroke="#A89F91" stroke-width="1.5" opacity="0.3"/>
  <line x1="490" y1="520" x2="490" y2="680" stroke="#A89F91" stroke-width="1" opacity="0.25"/>
  <ellipse cx="410" cy="500" rx="120" ry="38" fill="#E63946" opacity="0.6"/>
  <rect x="350" y="470" width="35" height="28" fill="#1D3557" opacity="0.8"/>
  <polygon points="420,462 440,488 400,488" fill="#F4D35E" opacity="0.85"/>
  <rect x="455" y="478" width="20" height="20" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="500" cy="485" r="10" fill="#E76F51" opacity="0.6"/>
  <rect x="370" y="482" width="12" height="12" fill="#FFFFFF" opacity="0.5" transform="rotate(45, 376, 488)"/>

  <!-- Island 5 - Tiny, far left -->
  <line x1="70" y1="480" x2="70" y2="600" stroke="#A89F91" stroke-width="1" opacity="0.2"/>
  <ellipse cx="70" cy="465" rx="40" ry="18" fill="#DDA15E" opacity="0.7"/>
  <polygon points="60,450 68,438 76,450" fill="#1D3557" opacity="0.7"/>

  <!-- Floating accent shapes in sky -->
  <circle cx="450" cy="100" r="12" fill="#E9C46A" opacity="0.4"/>
  <circle cx="320" cy="60" r="8" fill="#E63946" opacity="0.3"/>
  <rect x="100" y="150" width="10" height="10" fill="#457B9D" opacity="0.3" transform="rotate(45, 105, 155)"/>
  <circle cx="650" cy="70" r="6" fill="#2A9D8F" opacity="0.35"/>

  <!-- Bottom ground hint -->
  <line x1="0" y1="780" x2="800" y2="780" stroke="#264653" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="790" x2="800" y2="790" stroke="#264653" stroke-width="2" opacity="0.1"/>
</svg>