<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#DDA15E"/>
  <!-- Sky -->
  <rect x="0" y="0" width="800" height="350" fill="#1D3557"/>
  <!-- Ground -->
  <rect x="0" y="650" width="800" height="150" fill="#264653"/>
  <!-- Main wall body -->
  <rect x="50" y="350" width="700" height="300" fill="#6D2E46"/>
  <!-- Stone pattern on wall - horizontal lines -->
  <line x1="50" y1="400" x2="750" y2="400" stroke="#000" stroke-width="2"/>
  <line x1="50" y1="450" x2="750" y2="450" stroke="#000" stroke-width="2"/>
  <line x1="50" y1="500" x2="750" y2="500" stroke="#000" stroke-width="2"/>
  <line x1="50" y1="550" x2="750" y2="550" stroke="#000" stroke-width="2"/>
  <line x1="50" y1="600" x2="750" y2="600" stroke="#000" stroke-width="2"/>
  <!-- Stone pattern - vertical offsets -->
  <line x1="150" y1="350" x2="150" y2="400" stroke="#000" stroke-width="2"/>
  <line x1="300" y1="350" x2="300" y2="400" stroke="#000" stroke-width="2"/>
  <line x1="500" y1="350" x2="500" y2="400" stroke="#000" stroke-width="2"/>
  <line x1="650" y1="350" x2="650" y2="400" stroke="#000" stroke-width="2"/>
  <line x1="100" y1="400" x2="100" y2="450" stroke="#000" stroke-width="2"/>
  <line x1="250" y1="400" x2="250" y2="450" stroke="#000" stroke-width="2"/>
  <line x1="400" y1="400" x2="400" y2="450" stroke="#000" stroke-width="2"/>
  <line x1="550" y1="400" x2="550" y2="450" stroke="#000" stroke-width="2"/>
  <line x1="700" y1="400" x2="700" y2="450" stroke="#000" stroke-width="2"/>
  <!-- Crenellations (merlons) along top -->
  <rect x="50" y="310" width="50" height="40" fill="#6D2E46" stroke="#000" stroke-width="2"/>
  <rect x="150" y="310" width="50" height="40" fill="#6D2E46" stroke="#000" stroke-width="2"/>
  <rect x="250" y="310" width="50" height="40" fill="#6D2E46" stroke="#000" stroke-width="2"/>
  <rect x="350" y="310" width="50" height="40" fill="#6D2E46" stroke="#000" stroke-width="2"/>
  <rect x="450" y="310" width="50" height="40" fill="#6D2E46" stroke="#000" stroke-width="2"/>
  <rect x="550" y="310" width="50" height="40" fill="#6D2E46" stroke="#000" stroke-width="2"/>
  <rect x="650" y="310" width="50" height="40" fill="#6D2E46" stroke="#000" stroke-width="2"/>
  <!-- Left tower -->
  <rect x="20" y="200" width="100" height="450" fill="#264653" stroke="#000" stroke-width="3"/>
  <rect x="20" y="165" width="30" height="35" fill="#264653" stroke="#000" stroke-width="2"/>
  <rect x="55" y="165" width="30" height="35" fill="#264653" stroke="#000" stroke-width="2"/>
  <rect x="90" y="165" width="30" height="35" fill="#264653" stroke="#000" stroke-width="2"/>
  <!-- Left tower window -->
  <rect x="50" y="280" width="40" height="60" fill="#F4D35E"/>
  <line x1="70" y1="280" x2="70" y2="340" stroke="#000" stroke-width="2"/>
  <!-- Right tower -->
  <rect x="680" y="200" width="100" height="450" fill="#264653" stroke="#000" stroke-width="3"/>
  <rect x="680" y="165" width="30" height="35" fill="#264653" stroke="#000" stroke-width="2"/>
  <rect x="715" y="165" width="30" height="35" fill="#264653" stroke="#000" stroke-width="2"/>
  <rect x="750" y="165" width="30" height="35" fill="#264653" stroke="#000" stroke-width="2"/>
  <!-- Right tower window -->
  <rect x="710" y="280" width="40" height="60" fill="#F4D35E"/>
  <line x1="730" y1="280" x2="730" y2="340" stroke="#000" stroke-width="2"/>
  <!-- Arched gateway -->
  <rect x="330" y="480" width="140" height="170" fill="#000"/>
  <path d="M330,480 Q400,380 470,480" fill="#000"/>
  <!-- Gateway keystone -->
  <polygon points="395,400 405,400 405,420 395,420" fill="#F4D35E"/>
  <!-- Gateway door details -->
  <line x1="400" y1="420" x2="400" y2="650" stroke="#6D2E46" stroke-width="3"/>
  <circle cx="380" cy="560" r="5" fill="#F4D35E"/>
  <circle cx="420" cy="560" r="5" fill="#F4D35E"/>
  <!-- Flag on left tower -->
  <line x1="70" y1="100" x2="70" y2="165" stroke="#000" stroke-width="3"/>
  <polygon points="70,100 120,120 70,140" fill="#E63946"/>
  <!-- Flag on right tower -->
  <line x1="730" y1="100" x2="730" y2="165" stroke="#000" stroke-width="3"/>
  <polygon points="730,100 780,120 730,140" fill="#E63946"/>
  <!-- Decorative band above gateway -->
  <rect x="200" y="460" width="400" height="10" fill="#F4D35E"/>
</svg>