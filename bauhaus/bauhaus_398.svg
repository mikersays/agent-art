<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Forest green ground -->
  <rect x="0" y="530" width="800" height="270" fill="#264653"/>

  <!-- Vertical posts -->
  <rect x="100" y="150" width="12" height="400" fill="#000000"/>
  <rect x="250" y="120" width="12" height="430" fill="#000000"/>
  <rect x="400" y="100" width="12" height="450" fill="#000000"/>
  <rect x="550" y="120" width="12" height="430" fill="#000000"/>
  <rect x="700" y="150" width="12" height="400" fill="#000000"/>

  <!-- Post caps -->
  <rect x="93" y="145" width="26" height="10" fill="#000000"/>
  <rect x="243" y="115" width="26" height="10" fill="#000000"/>
  <rect x="393" y="95" width="26" height="10" fill="#000000"/>
  <rect x="543" y="115" width="26" height="10" fill="#000000"/>
  <rect x="693" y="145" width="26" height="10" fill="#000000"/>

  <!-- Red catenary curves - highest sag -->
  <path d="M 106 180 Q 175 280 256 180" fill="none" stroke="#E63946" stroke-width="3"/>
  <path d="M 256 150 Q 328 260 406 150" fill="none" stroke="#E63946" stroke-width="3"/>
  <path d="M 406 150 Q 478 260 556 150" fill="none" stroke="#E63946" stroke-width="3"/>
  <path d="M 556 180 Q 628 280 706 180" fill="none" stroke="#E63946" stroke-width="3"/>

  <!-- Blue catenary curves - medium sag -->
  <path d="M 106 220 Q 175 350 256 220" fill="none" stroke="#1D3557" stroke-width="2.5"/>
  <path d="M 256 190 Q 328 330 406 190" fill="none" stroke="#1D3557" stroke-width="2.5"/>
  <path d="M 406 190 Q 478 330 556 190" fill="none" stroke="#1D3557" stroke-width="2.5"/>
  <path d="M 556 220 Q 628 350 706 220" fill="none" stroke="#1D3557" stroke-width="2.5"/>

  <!-- Yellow catenary curves - lowest sag -->
  <path d="M 106 260 Q 175 430 256 260" fill="none" stroke="#F4D35E" stroke-width="2"/>
  <path d="M 256 230 Q 328 410 406 230" fill="none" stroke="#F4D35E" stroke-width="2"/>
  <path d="M 406 230 Q 478 410 556 230" fill="none" stroke="#F4D35E" stroke-width="2"/>
  <path d="M 556 260 Q 628 430 706 260" fill="none" stroke="#F4D35E" stroke-width="2"/>

  <!-- Hanging circles from red curves -->
  <circle cx="175" cy="275" r="6" fill="#E63946"/>
  <circle cx="328" cy="255" r="6" fill="#E63946"/>
  <circle cx="478" cy="255" r="6" fill="#E63946"/>
  <circle cx="628" cy="275" r="6" fill="#E63946"/>

  <!-- Hanging circles from blue curves -->
  <circle cx="175" cy="345" r="5" fill="#1D3557"/>
  <circle cx="328" cy="325" r="5" fill="#1D3557"/>
  <circle cx="478" cy="325" r="5" fill="#1D3557"/>
  <circle cx="628" cy="345" r="5" fill="#1D3557"/>

  <!-- Hanging circles from yellow curves -->
  <circle cx="175" cy="425" r="4" fill="#F4D35E"/>
  <circle cx="328" cy="405" r="4" fill="#F4D35E"/>
  <circle cx="478" cy="405" r="4" fill="#F4D35E"/>
  <circle cx="628" cy="425" r="4" fill="#F4D35E"/>

  <!-- Platform rectangles -->
  <rect x="80" y="530" width="640" height="15" fill="#A89F91"/>
  <rect x="60" y="545" width="680" height="8" fill="#000000" opacity="0.6"/>

  <!-- Small accent elements -->
  <circle cx="106" cy="540" r="4" fill="#E76F51"/>
  <circle cx="256" cy="540" r="4" fill="#E76F51"/>
  <circle cx="406" cy="540" r="4" fill="#E76F51"/>
  <circle cx="556" cy="540" r="4" fill="#E76F51"/>
  <circle cx="706" cy="540" r="4" fill="#E76F51"/>

  <!-- Subtle ground details -->
  <rect x="150" y="600" width="100" height="3" fill="#2A9D8F" opacity="0.4"/>
  <rect x="400" y="650" width="150" height="3" fill="#2A9D8F" opacity="0.3"/>
  <rect x="550" y="700" width="80" height="3" fill="#2A9D8F" opacity="0.3"/>
</svg>