<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Structural grid lines -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <!-- Spiral arcs - outermost ring -->
  <path d="M400,400 m0,-300 a300,300 0 0,1 300,300" fill="none" stroke="#E63946" stroke-width="12" opacity="0.8"/>
  <path d="M400,400 m300,0 a300,300 0 0,1 -300,300" fill="none" stroke="#1D3557" stroke-width="12" opacity="0.8"/>
  <path d="M400,400 m0,300 a300,300 0 0,1 -300,-300" fill="none" stroke="#F4D35E" stroke-width="12" opacity="0.85"/>
  <path d="M400,400 m-300,0 a300,300 0 0,1 300,-300" fill="none" stroke="#E63946" stroke-width="12" opacity="0.7"/>
  <!-- Second ring -->
  <path d="M400,400 m0,-220 a220,220 0 0,1 220,220" fill="none" stroke="#F4D35E" stroke-width="10" opacity="0.75"/>
  <path d="M400,400 m220,0 a220,220 0 0,1 -220,220" fill="none" stroke="#E63946" stroke-width="10" opacity="0.75"/>
  <path d="M400,400 m0,220 a220,220 0 0,1 -220,-220" fill="none" stroke="#1D3557" stroke-width="10" opacity="0.8"/>
  <path d="M400,400 m-220,0 a220,220 0 0,1 220,-220" fill="none" stroke="#F4D35E" stroke-width="10" opacity="0.7"/>
  <!-- Third ring -->
  <path d="M400,400 m0,-150 a150,150 0 0,1 150,150" fill="none" stroke="#1D3557" stroke-width="8" opacity="0.85"/>
  <path d="M400,400 m150,0 a150,150 0 0,1 -150,150" fill="none" stroke="#F4D35E" stroke-width="8" opacity="0.8"/>
  <path d="M400,400 m0,150 a150,150 0 0,1 -150,-150" fill="none" stroke="#E63946" stroke-width="8" opacity="0.8"/>
  <path d="M400,400 m-150,0 a150,150 0 0,1 150,-150" fill="none" stroke="#1D3557" stroke-width="8" opacity="0.75"/>
  <!-- Inner ring -->
  <path d="M400,400 m0,-80 a80,80 0 0,1 80,80" fill="none" stroke="#E63946" stroke-width="6" opacity="0.9"/>
  <path d="M400,400 m80,0 a80,80 0 0,1 -80,80" fill="none" stroke="#1D3557" stroke-width="6" opacity="0.9"/>
  <path d="M400,400 m0,80 a80,80 0 0,1 -80,-80" fill="none" stroke="#F4D35E" stroke-width="6" opacity="0.9"/>
  <path d="M400,400 m-80,0 a80,80 0 0,1 80,-80" fill="none" stroke="#E63946" stroke-width="6" opacity="0.85"/>
  <!-- Small squares along spiral path -->
  <rect x="388" y="92" width="16" height="16" fill="#E63946" opacity="0.9" transform="rotate(15,396,100)"/>
  <rect x="688" y="388" width="16" height="16" fill="#1D3557" opacity="0.9" transform="rotate(30,696,396)"/>
  <rect x="388" y="692" width="16" height="16" fill="#F4D35E" opacity="0.9" transform="rotate(45,396,700)"/>
  <rect x="92" y="388" width="16" height="16" fill="#E63946" opacity="0.85" transform="rotate(60,100,396)"/>
  <rect x="540" y="145" width="14" height="14" fill="#F4D35E" opacity="0.85" transform="rotate(20,547,152)"/>
  <rect x="620" y="540" width="14" height="14" fill="#1D3557" opacity="0.85" transform="rotate(35,627,547)"/>
  <rect x="230" y="620" width="14" height="14" fill="#E63946" opacity="0.8" transform="rotate(50,237,627)"/>
  <rect x="172" y="230" width="14" height="14" fill="#F4D35E" opacity="0.8" transform="rotate(10,179,237)"/>
  <rect x="490" y="230" width="12" height="12" fill="#000000" opacity="0.7" transform="rotate(25,496,236)"/>
  <rect x="540" y="490" width="12" height="12" fill="#000000" opacity="0.7" transform="rotate(40,546,496)"/>
  <rect x="280" y="540" width="12" height="12" fill="#000000" opacity="0.65" transform="rotate(55,286,546)"/>
  <rect x="248" y="280" width="12" height="12" fill="#000000" opacity="0.65" transform="rotate(15,254,286)"/>
  <!-- Black structural lines radiating from center -->
  <line x1="400" y1="400" x2="400" y2="80" stroke="#000000" stroke-width="2" opacity="0.25"/>
  <line x1="400" y1="400" x2="710" y2="400" stroke="#000000" stroke-width="2" opacity="0.25"/>
  <line x1="400" y1="400" x2="400" y2="720" stroke="#000000" stroke-width="2" opacity="0.25"/>
  <line x1="400" y1="400" x2="90" y2="400" stroke="#000000" stroke-width="2" opacity="0.25"/>
  <line x1="400" y1="400" x2="620" y2="180" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <line x1="400" y1="400" x2="180" y2="620" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <!-- Teal accent circles -->
  <circle cx="400" cy="100" r="8" fill="#2A9D8F" opacity="0.85"/>
  <circle cx="700" cy="400" r="10" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="400" cy="700" r="9" fill="#2A9D8F" opacity="0.85"/>
  <circle cx="100" cy="400" r="7" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="560" cy="170" r="6" fill="#2A9D8F" opacity="0.75"/>
  <circle cx="630" cy="560" r="7" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="240" cy="630" r="6" fill="#2A9D8F" opacity="0.75"/>
  <circle cx="170" cy="240" r="5" fill="#2A9D8F" opacity="0.7"/>
  <!-- Center focal point -->
  <circle cx="400" cy="400" r="20" fill="#000000" opacity="0.9"/>
  <circle cx="400" cy="400" r="12" fill="#E63946" opacity="0.95"/>
  <!-- Corner accents -->
  <rect x="20" y="20" width="24" height="24" fill="#1D3557" opacity="0.6"/>
  <rect x="756" y="20" width="24" height="24" fill="#F4D35E" opacity="0.6"/>
  <rect x="756" y="756" width="24" height="24" fill="#E63946" opacity="0.6"/>
  <rect x="20" y="756" width="24" height="24" fill="#2A9D8F" opacity="0.6"/>
</svg>