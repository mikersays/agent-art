<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#F4D35E"/>

  <!-- Sky gradient effect with rectangles -->
  <rect x="0" y="0" width="800" height="200" fill="#1D3557" opacity="0.8"/>
  <rect x="0" y="200" width="800" height="100" fill="#1D3557" opacity="0.5"/>
  <rect x="0" y="300" width="800" height="80" fill="#1D3557" opacity="0.2"/>

  <!-- Sun -->
  <circle cx="650" cy="120" r="60" fill="#E63946"/>
  <circle cx="650" cy="120" r="45" fill="#F4D35E"/>
  <circle cx="650" cy="120" r="30" fill="#E63946" opacity="0.5"/>

  <!-- Sun rays -->
  <line x1="650" y1="50" x2="650" y2="30" stroke="#E63946" stroke-width="3"/>
  <line x1="700" y1="70" x2="715" y2="55" stroke="#E63946" stroke-width="3"/>
  <line x1="720" y1="120" x2="740" y2="120" stroke="#E63946" stroke-width="3"/>
  <line x1="580" y1="120" x2="560" y2="120" stroke="#E63946" stroke-width="3"/>
  <line x1="600" y1="70" x2="585" y2="55" stroke="#E63946" stroke-width="3"/>

  <!-- Windmill tower -->
  <polygon points="370,380 430,380 415,700 385,700" fill="#264653"/>
  <rect x="380" y="500" width="40" height="3" fill="#2A9D8F"/>
  <rect x="378" y="550" width="44" height="3" fill="#2A9D8F"/>
  <rect x="376" y="600" width="48" height="3" fill="#2A9D8F"/>
  <rect x="374" y="650" width="52" height="3" fill="#2A9D8F"/>

  <!-- Door -->
  <rect x="390" y="660" width="20" height="40" rx="10" fill="#000000"/>

  <!-- Windmill hub -->
  <circle cx="400" cy="350" r="25" fill="#000000"/>
  <circle cx="400" cy="350" r="18" fill="#264653"/>
  <circle cx="400" cy="350" r="8" fill="#E63946"/>

  <!-- Blade 1 - top right (trapezoid) -->
  <polygon points="415,340 530,200 560,220 425,345" fill="#E63946" opacity="0.85"/>
  <line x1="420" y1="340" x2="545" y2="210" stroke="#000000" stroke-width="1.5"/>

  <!-- Blade 2 - bottom right -->
  <polygon points="420,365 560,480 540,510 410,375" fill="#1D3557" opacity="0.85"/>
  <line x1="415" y1="370" x2="550" y2="495" stroke="#000000" stroke-width="1.5"/>

  <!-- Blade 3 - bottom left -->
  <polygon points="385,365 270,500 240,480 375,360" fill="#E63946" opacity="0.85"/>
  <line x1="380" y1="362" x2="255" y2="490" stroke="#000000" stroke-width="1.5"/>

  <!-- Blade 4 - top left -->
  <polygon points="380,340 240,220 270,200 390,335" fill="#1D3557" opacity="0.85"/>
  <line x1="385" y1="337" x2="255" y2="210" stroke="#000000" stroke-width="1.5"/>

  <!-- Ground / landscape -->
  <rect x="0" y="700" width="800" height="100" fill="#264653"/>

  <!-- Rolling hills -->
  <ellipse cx="200" cy="700" rx="250" ry="40" fill="#2A9D8F"/>
  <ellipse cx="600" cy="700" rx="300" ry="50" fill="#2A9D8F" opacity="0.7"/>

  <!-- Field lines -->
  <line x1="0" y1="720" x2="350" y2="720" stroke="#264653" stroke-width="2"/>
  <line x1="0" y1="735" x2="300" y2="735" stroke="#264653" stroke-width="2"/>
  <line x1="450" y1="725" x2="800" y2="725" stroke="#264653" stroke-width="2"/>
  <line x1="500" y1="740" x2="800" y2="740" stroke="#264653" stroke-width="2"/>

  <!-- Trees as geometric shapes -->
  <polygon points="100,700 115,650 130,700" fill="#264653"/>
  <polygon points="90,700 115,630 140,700" fill="#264653" opacity="0.6"/>
  <rect x="111" y="700" width="8" height="20" fill="#000000"/>

  <polygon points="680,700 700,640 720,700" fill="#264653"/>
  <polygon points="670,700 700,620 730,700" fill="#264653" opacity="0.6"/>
  <rect x="696" y="700" width="8" height="20" fill="#000000"/>

  <!-- Small house -->
  <rect x="550" y="660" width="50" height="40" fill="#E9C46A"/>
  <polygon points="545,660 575,635 605,660" fill="#E63946"/>
  <rect x="565" y="675" width="12" height="25" fill="#000000"/>
  <rect x="555" y="668" width="8" height="8" fill="#1D3557"/>

  <!-- Fence posts -->
  <line x1="460" y1="695" x2="460" y2="680" stroke="#000000" stroke-width="2"/>
  <line x1="480" y1="695" x2="480" y2="680" stroke="#000000" stroke-width="2"/>
  <line x1="500" y1="695" x2="500" y2="680" stroke="#000000" stroke-width="2"/>
  <line x1="520" y1="695" x2="520" y2="680" stroke="#000000" stroke-width="2"/>
  <line x1="458" y1="687" x2="522" y2="687" stroke="#000000" stroke-width="2"/>

  <!-- Clouds -->
  <circle cx="150" cy="100" r="25" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="180" cy="95" r="30" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="210" cy="100" r="25" fill="#FFFFFF" opacity="0.7"/>

  <circle cx="350" cy="70" r="20" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="375" cy="65" r="25" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="400" cy="72" r="18" fill="#FFFFFF" opacity="0.5"/>

  <!-- Birds -->
  <path d="M480,150 Q490,140 500,150" fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M510,140 Q520,130 530,140" fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M470,170 Q478,162 486,170" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Bauhaus decorative border -->
  <rect x="20" y="20" width="760" height="760" fill="none" stroke="#000000" stroke-width="3"/>
  <rect x="10" y="10" width="20" height="20" fill="#E63946"/>
  <rect x="770" y="10" width="20" height="20" fill="#1D3557"/>
  <rect x="10" y="770" width="20" height="20" fill="#F4D35E"/>
  <rect x="770" y="770" width="20" height="20" fill="#2A9D8F"/>
</svg>