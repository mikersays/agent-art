<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <title>Woven Basket</title>
  <!-- Background -->
  <rect width="800" height="800" fill="#FFF"/>
  <!-- Outer circle boundary -->
  <circle cx="400" cy="400" r="300" fill="none" stroke="#000" stroke-width="4"/>
  <!-- Inner background circle -->
  <circle cx="400" cy="400" r="296" fill="#F4D35E" opacity="0.15"/>
  <!-- Clip path for weave -->
  <defs>
    <clipPath id="basket">
      <circle cx="400" cy="400" r="296"/>
    </clipPath>
  </defs>
  <g clip-path="url(#basket)">
    <!-- Horizontal woven strips -->
    <path d="M100,200 Q250,180 400,200 Q550,220 700,200" stroke="#E63946" stroke-width="28" fill="none"/>
    <path d="M100,260 Q250,240 400,260 Q550,280 700,260" stroke="#1D3557" stroke-width="28" fill="none"/>
    <path d="M100,320 Q250,300 400,320 Q550,340 700,320" stroke="#E63946" stroke-width="28" fill="none"/>
    <path d="M100,380 Q250,360 400,380 Q550,400 700,380" stroke="#2A9D8F" stroke-width="28" fill="none"/>
    <path d="M100,440 Q250,420 400,440 Q550,460 700,440" stroke="#6D2E46" stroke-width="28" fill="none"/>
    <path d="M100,500 Q250,480 400,500 Q550,520 700,500" stroke="#E63946" stroke-width="28" fill="none"/>
    <path d="M100,560 Q250,540 400,560 Q550,580 700,560" stroke="#1D3557" stroke-width="28" fill="none"/>
    <path d="M100,620 Q250,600 400,620 Q550,640 700,620" stroke="#2A9D8F" stroke-width="28" fill="none"/>
    <!-- Vertical woven strips (over-under effect) -->
    <path d="M200,100 Q180,250 200,400 Q220,550 200,700" stroke="#F4D35E" stroke-width="26" fill="none" opacity="0.85"/>
    <path d="M280,100 Q300,250 280,400 Q260,550 280,700" stroke="#457B9D" stroke-width="26" fill="none" opacity="0.85"/>
    <path d="M360,100 Q340,250 360,400 Q380,550 360,700" stroke="#F4D35E" stroke-width="26" fill="none" opacity="0.85"/>
    <path d="M440,100 Q460,250 440,400 Q420,550 440,700" stroke="#000" stroke-width="26" fill="none" opacity="0.7"/>
    <path d="M520,100 Q500,250 520,400 Q540,550 520,700" stroke="#F4D35E" stroke-width="26" fill="none" opacity="0.85"/>
    <path d="M600,100 Q620,250 600,400 Q580,550 600,700" stroke="#457B9D" stroke-width="26" fill="none" opacity="0.85"/>
  </g>
  <!-- Rim of basket - top arc -->
  <circle cx="400" cy="400" r="300" fill="none" stroke="#6D2E46" stroke-width="8"/>
  <circle cx="400" cy="400" r="292" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Handle -->
  <path d="M280,110 Q400,-30 520,110" stroke="#000" stroke-width="10" fill="none"/>
  <path d="M280,110 Q400,-20 520,110" stroke="#6D2E46" stroke-width="6" fill="none"/>
  <!-- Center decorative motif -->
  <circle cx="400" cy="400" r="30" fill="#E63946" opacity="0.7"/>
  <circle cx="400" cy="400" r="15" fill="#F4D35E"/>
  <!-- Corner Bauhaus accents -->
  <rect x="20" y="20" width="60" height="60" fill="#1D3557"/>
  <rect x="720" y="720" width="60" height="60" fill="#E63946"/>
  <circle cx="750" cy="50" r="30" fill="#2A9D8F"/>
  <circle cx="50" cy="750" r="30" fill="#F4D35E"/>
</svg>