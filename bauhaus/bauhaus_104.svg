  <!-- Colored highlight overlays breaking the pattern -->
  <!-- Red block -->
  <rect x="120" y="200" width="30" height="120" fill="#E63946" opacity="0.9"/>
  <!-- Blue block -->
  <rect x="260" y="350" width="40" height="150" fill="#1D3557" opacity="0.85"/>
  <!-- Yellow block -->
  <rect x="390" y="150" width="35" height="100" fill="#F4D35E" opacity="0.9"/>
  <!-- Steel blue block -->
  <rect x="520" y="400" width="45" height="130" fill="#457B9D" opacity="0.85"/>
  <!-- Sand block -->
  <rect x="650" y="250" width="30" height="90" fill="#DDA15E" opacity="0.9"/>
  <!-- Forest block -->
  <rect x="180" y="500" width="38" height="100" fill="#264653" opacity="0.85"/>

  <!-- Geometric accents breaking the barcode -->
  <!-- Red circle -->
  <circle cx="140" cy="460" r="25" fill="#E63946"/>
  <circle cx="140" cy="460" r="25" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Yellow triangle -->
  <polygon points="410,580 440,640 380,640" fill="#F4D35E"/>
  <polygon points="410,580 440,640 380,640" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Blue diamond -->
  <polygon points="550,200 575,235 550,270 525,235" fill="#1D3557"/>
  <polygon points="550,200 575,235 550,270 525,235" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- White rectangle cutout -->
  <rect x="680" y="450" width="40" height="60" fill="#FFFFFF" stroke="#E63946" stroke-width="3"/>

  <!-- Top and bottom boundary lines -->
  <line x1="20" y1="95" x2="775" y2="95" stroke="#000000" stroke-width="2"/>
  <line x1="20" y1="705" x2="775" y2="705" stroke="#000000" stroke-width="2"/>

  <!-- Small decorative dots -->
  <circle cx="50" cy="750" r="4" fill="#E63946"/>
  <circle cx="200" cy="750" r="4" fill="#1D3557"/>
  <circle cx="350" cy="750" r="4" fill="#F4D35E"/>
  <circle cx="500" cy="750" r="4" fill="#264653"/>
  <circle cx="650" cy="750" r="4" fill="#457B9D"/>
