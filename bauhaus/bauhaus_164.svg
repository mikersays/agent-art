<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Tuning Fork</title>
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Handle -->
  <rect x="370" y="500" width="60" height="250" rx="8" fill="#000"/>
  <rect x="380" y="510" width="40" height="240" rx="4" fill="#1D3557"/>
  <!-- Base knob -->
  <circle cx="400" cy="750" r="35" fill="#000"/>
  <circle cx="400" cy="750" r="25" fill="#1D3557"/>
  <!-- Left prong -->
  <rect x="250" y="120" width="50" height="400" rx="6" fill="#000"/>
  <rect x="260" y="130" width="30" height="380" rx="4" fill="#1D3557"/>
  <!-- Right prong -->
  <rect x="500" y="120" width="50" height="400" rx="6" fill="#000"/>
  <rect x="510" y="130" width="30" height="380" rx="4" fill="#1D3557"/>
  <!-- Curved connection at base of prongs -->
  <path d="M275,520 Q275,480 370,500" fill="none" stroke="#000" stroke-width="50" stroke-linecap="round"/>
  <path d="M525,520 Q525,480 430,500" fill="none" stroke="#000" stroke-width="50" stroke-linecap="round"/>
  <path d="M285,510 Q290,490 375,505" fill="none" stroke="#1D3557" stroke-width="30" stroke-linecap="round"/>
  <path d="M515,510 Q510,490 425,505" fill="none" stroke="#1D3557" stroke-width="30" stroke-linecap="round"/>
  <!-- Sound waves from left prong tip -->
  <circle cx="275" cy="100" r="20" fill="none" stroke="#E63946" stroke-width="3" opacity="0.9"/>
  <circle cx="275" cy="100" r="40" fill="none" stroke="#E63946" stroke-width="2.5" opacity="0.7"/>
  <circle cx="275" cy="100" r="60" fill="none" stroke="#F4D35E" stroke-width="2" opacity="0.55"/>
  <circle cx="275" cy="100" r="80" fill="none" stroke="#F4D35E" stroke-width="1.8" opacity="0.4"/>
  <circle cx="275" cy="100" r="100" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.3"/>
  <circle cx="275" cy="100" r="120" fill="none" stroke="#2A9D8F" stroke-width="1.2" opacity="0.2"/>
  <!-- Sound waves from right prong tip -->
  <circle cx="525" cy="100" r="20" fill="none" stroke="#E63946" stroke-width="3" opacity="0.9"/>
  <circle cx="525" cy="100" r="40" fill="none" stroke="#E63946" stroke-width="2.5" opacity="0.7"/>
  <circle cx="525" cy="100" r="60" fill="none" stroke="#F4D35E" stroke-width="2" opacity="0.55"/>
  <circle cx="525" cy="100" r="80" fill="none" stroke="#F4D35E" stroke-width="1.8" opacity="0.4"/>
  <circle cx="525" cy="100" r="100" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.3"/>
  <circle cx="525" cy="100" r="120" fill="none" stroke="#2A9D8F" stroke-width="1.2" opacity="0.2"/>
  <!-- Vibration lines on prongs -->
  <line x1="240" y1="200" x2="235" y2="200" stroke="#E63946" stroke-width="2" opacity="0.6"/>
  <line x1="310" y1="250" x2="315" y2="250" stroke="#E63946" stroke-width="2" opacity="0.6"/>
  <line x1="240" y1="300" x2="233" y2="300" stroke="#F4D35E" stroke-width="2" opacity="0.5"/>
  <line x1="490" y1="200" x2="485" y2="200" stroke="#E63946" stroke-width="2" opacity="0.6"/>
  <line x1="560" y1="250" x2="565" y2="250" stroke="#E63946" stroke-width="2" opacity="0.6"/>
  <line x1="560" y1="300" x2="567" y2="300" stroke="#F4D35E" stroke-width="2" opacity="0.5"/>
  <!-- Musical note accents -->
  <circle cx="130" cy="60" r="12" fill="#E63946" opacity="0.5"/>
  <circle cx="670" cy="60" r="12" fill="#E63946" opacity="0.5"/>
  <rect x="142" y="20" width="3" height="45" fill="#E63946" opacity="0.5"/>
  <rect x="655" y="20" width="3" height="45" fill="#E63946" opacity="0.5"/>
</svg>