<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Sky background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Subtle sky gradient effect using layered rects -->
  <rect x="0" y="0" width="800" height="300" fill="#A8DADC" opacity="0.15"/>
  <!-- Sun -->
  <circle cx="650" cy="120" r="60" fill="#F4D35E" opacity="0.8"/>
  <circle cx="650" cy="120" r="45" fill="#E9C46A" opacity="0.5"/>
  <!-- Moon (smaller, other side) -->
  <circle cx="150" cy="80" r="25" fill="#A89F91" opacity="0.4"/>
  <!-- Horizon line -->
  <line x1="0" y1="540" x2="800" y2="540" stroke="#000000" stroke-width="2" opacity="0.3"/>
  <!-- Sky diagonal accent lines -->
  <line x1="300" y1="100" x2="450" y2="300" stroke="#E63946" stroke-width="1" opacity="0.15"/>
  <line x1="500" y1="80" x2="600" y2="280" stroke="#1D3557" stroke-width="1" opacity="0.12"/>
  <line x1="100" y1="200" x2="250" y2="400" stroke="#2A9D8F" stroke-width="0.8" opacity="0.1"/>
  <!-- Scattered sky shapes -->
  <polygon points="350,180 360,165 370,180" fill="#E63946" opacity="0.3"/>
  <circle cx="480" cy="250" r="6" fill="#1D3557" opacity="0.25"/>
  <rect x="220" y="300" width="12" height="12" fill="#2A9D8F" opacity="0.2" transform="rotate(45, 226, 306)"/>
  <!-- Building 1 - tall, left -->
  <rect x="30" y="340" width="90" height="460" fill="#1D3557" opacity="0.9"/>
  <rect x="45" y="370" width="12" height="14" fill="#F4D35E" opacity="0.8"/>
  <rect x="65" y="370" width="12" height="14" fill="#FFFFFF" opacity="0.7"/>
  <rect x="45" y="400" width="12" height="14" fill="#FFFFFF" opacity="0.6"/>
  <rect x="65" y="400" width="12" height="14" fill="#F4D35E" opacity="0.8"/>
  <rect x="45" y="430" width="12" height="14" fill="#F4D35E" opacity="0.7"/>
  <rect x="65" y="460" width="12" height="14" fill="#FFFFFF" opacity="0.7"/>
  <!-- Building 2 - medium, blue-gray -->
  <rect x="140" y="420" width="110" height="380" fill="#457B9D" opacity="0.85"/>
  <rect x="160" y="450" width="10" height="12" fill="#F4D35E" opacity="0.75"/>
  <rect x="185" y="450" width="10" height="12" fill="#FFFFFF" opacity="0.65"/>
  <rect x="210" y="450" width="10" height="12" fill="#F4D35E" opacity="0.8"/>
  <rect x="160" y="480" width="10" height="12" fill="#FFFFFF" opacity="0.6"/>
  <rect x="185" y="480" width="10" height="12" fill="#F4D35E" opacity="0.7"/>
  <rect x="210" y="510" width="10" height="12" fill="#FFFFFF" opacity="0.7"/>
  <!-- Building 3 - short, burgundy -->
  <rect x="270" y="500" width="80" height="300" fill="#6D2E46" opacity="0.85"/>
  <rect x="290" y="530" width="10" height="12" fill="#F4D35E" opacity="0.7"/>
  <rect x="310" y="530" width="10" height="12" fill="#FFFFFF" opacity="0.65"/>
  <rect x="290" y="560" width="10" height="12" fill="#FFFFFF" opacity="0.6"/>
  <!-- Building 4 - tallest, forest -->
  <rect x="370" y="280" width="100" height="520" fill="#264653" opacity="0.9"/>
  <rect x="390" y="310" width="12" height="14" fill="#F4D35E" opacity="0.8"/>
  <rect x="415" y="310" width="12" height="14" fill="#FFFFFF" opacity="0.7"/>
  <rect x="440" y="310" width="12" height="14" fill="#F4D35E" opacity="0.75"/>
  <rect x="390" y="345" width="12" height="14" fill="#FFFFFF" opacity="0.65"/>
  <rect x="415" y="345" width="12" height="14" fill="#F4D35E" opacity="0.8"/>
  <rect x="440" y="380" width="12" height="14" fill="#FFFFFF" opacity="0.7"/>
  <rect x="390" y="380" width="12" height="14" fill="#F4D35E" opacity="0.7"/>
  <!-- Building 5 - medium, steel blue -->
  <rect x="490" y="440" width="85" height="360" fill="#457B9D" opacity="0.8"/>
  <rect x="510" y="470" width="10" height="12" fill="#F4D35E" opacity="0.75"/>
  <rect x="535" y="470" width="10" height="12" fill="#FFFFFF" opacity="0.7"/>
  <rect x="510" y="500" width="10" height="12" fill="#FFFFFF" opacity="0.6"/>
  <!-- Building 6 - short, blue -->
  <rect x="595" y="510" width="75" height="290" fill="#1D3557" opacity="0.85"/>
  <rect x="610" y="540" width="10" height="12" fill="#F4D35E" opacity="0.8"/>
  <rect x="635" y="540" width="10" height="12" fill="#FFFFFF" opacity="0.65"/>
  <!-- Building 7 - medium, burgundy -->
  <rect x="690" y="390" width="90" height="410" fill="#6D2E46" opacity="0.8"/>
  <rect x="710" y="420" width="12" height="14" fill="#F4D35E" opacity="0.75"/>
  <rect x="735" y="420" width="12" height="14" fill="#FFFFFF" opacity="0.7"/>
  <rect x="710" y="455" width="12" height="14" fill="#FFFFFF" opacity="0.65"/>
  <rect x="735" y="455" width="12" height="14" fill="#F4D35E" opacity="0.8"/>
  <!-- Ground line accent -->
  <line x1="0" y1="798" x2="800" y2="798" stroke="#000000" stroke-width="3" opacity="0.2"/>
</svg>