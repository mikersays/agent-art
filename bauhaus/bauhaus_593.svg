<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Quadrant dividing lines -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="3"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="3"/>

  <!-- ===== QUADRANT 1: Top-Left (0 degrees) ===== -->
  <!-- Large triangle -->
  <polygon points="100,100 300,100 200,280" fill="#E63946" opacity="0.7"/>
  <!-- Circle -->
  <circle cx="280" cy="200" r="50" fill="#1D3557" opacity="0.6"/>
  <!-- Small triangle -->
  <polygon points="120,300 160,300 140,260" fill="#2A9D8F" opacity="0.8"/>
  <!-- Lines -->
  <line x1="80" y1="150" x2="350" y2="150" stroke="#F4D35E" stroke-width="2" opacity="0.6"/>
  <line x1="200" y1="80" x2="200" y2="370" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <!-- Small circle -->
  <circle cx="150" cy="350" r="20" fill="#F4D35E" opacity="0.7"/>
  <!-- Accent rect -->
  <rect x="300" y="300" width="30" height="30" fill="#E63946" opacity="0.5"/>

  <!-- ===== QUADRANT 2: Top-Right (90 degrees rotation of pattern) ===== -->
  <!-- Large triangle rotated 90deg -->
  <polygon points="700,100 700,300 520,200" fill="#E63946" opacity="0.7"/>
  <!-- Circle -->
  <circle cx="600" cy="280" r="50" fill="#1D3557" opacity="0.6"/>
  <!-- Small triangle -->
  <polygon points="500,120 500,160 540,140" fill="#2A9D8F" opacity="0.8"/>
  <!-- Lines -->
  <line x1="650" y1="80" x2="650" y2="350" stroke="#F4D35E" stroke-width="2" opacity="0.6"/>
  <line x1="430" y1="200" x2="720" y2="200" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <!-- Small circle -->
  <circle cx="450" cy="150" r="20" fill="#F4D35E" opacity="0.7"/>
  <!-- Accent rect -->
  <rect x="470" y="300" width="30" height="30" fill="#E63946" opacity="0.5"/>

  <!-- ===== QUADRANT 3: Bottom-Left (270 degrees rotation) ===== -->
  <!-- Large triangle rotated 270deg -->
  <polygon points="100,500 100,700 280,600" fill="#E63946" opacity="0.7"/>
  <!-- Circle -->
  <circle cx="200" cy="520" r="50" fill="#1D3557" opacity="0.6"/>
  <!-- Small triangle -->
  <polygon points="300,680 300,640 260,660" fill="#2A9D8F" opacity="0.8"/>
  <!-- Lines -->
  <line x1="150" y1="450" x2="150" y2="720" stroke="#F4D35E" stroke-width="2" opacity="0.6"/>
  <line x1="80" y1="600" x2="370" y2="600" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <!-- Small circle -->
  <circle cx="350" cy="650" r="20" fill="#F4D35E" opacity="0.7"/>
  <!-- Accent rect -->
  <rect x="300" y="470" width="30" height="30" fill="#E63946" opacity="0.5"/>

  <!-- ===== QUADRANT 4: Bottom-Right (180 degrees rotation) ===== -->
  <!-- Large triangle rotated 180deg -->
  <polygon points="700,700 500,700 600,520" fill="#E63946" opacity="0.7"/>
  <!-- Circle -->
  <circle cx="520" cy="600" r="50" fill="#1D3557" opacity="0.6"/>
  <!-- Small triangle -->
  <polygon points="680,500 640,500 660,540" fill="#2A9D8F" opacity="0.8"/>
  <!-- Lines -->
  <line x1="450" y1="650" x2="720" y2="650" stroke="#F4D35E" stroke-width="2" opacity="0.6"/>
  <line x1="600" y1="430" x2="600" y2="720" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <!-- Small circle -->
  <circle cx="650" cy="450" r="20" fill="#F4D35E" opacity="0.7"/>
  <!-- Accent rect -->
  <rect x="470" y="470" width="30" height="30" fill="#E63946" opacity="0.5"/>

  <!-- Center focal point -->
  <circle cx="400" cy="400" r="12" fill="#000000" opacity="0.9"/>
  <circle cx="400" cy="400" r="25" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.5"/>

  <!-- Corner accents -->
  <rect x="10" y="10" width="20" height="20" fill="#2A9D8F" opacity="0.4"/>
  <rect x="770" y="10" width="20" height="20" fill="#F4D35E" opacity="0.4"/>
  <rect x="10" y="770" width="20" height="20" fill="#F4D35E" opacity="0.4"/>
  <rect x="770" y="770" width="20" height="20" fill="#2A9D8F" opacity="0.4"/>
</svg>