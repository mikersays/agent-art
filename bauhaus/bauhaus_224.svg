<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Ground -->
  <rect x="0" y="620" width="800" height="180" fill="#2A9D8F" opacity="0.2"/>
  <line x1="0" y1="620" x2="800" y2="620" stroke="#000" stroke-width="2"/>

  <!-- Trebuchet base frame -->
  <polygon points="200,620 350,620 275,520" fill="#1D3557" stroke="#000" stroke-width="3"/>
  <!-- Base crossbar -->
  <rect x="180" y="610" width="190" height="15" fill="#000"/>
  <!-- Support legs -->
  <line x1="220" y1="620" x2="275" y2="520" stroke="#000" stroke-width="5"/>
  <line x1="330" y1="620" x2="275" y2="520" stroke="#000" stroke-width="5"/>

  <!-- Axle point -->
  <circle cx="275" cy="520" r="8" fill="#457B9D" stroke="#000" stroke-width="2"/>

  <!-- Throwing arm - long side (released position, angled up-left) -->
  <line x1="275" y1="520" x2="120" y2="340" stroke="#000" stroke-width="6"/>
  <!-- Throwing arm - short side (counterweight side, angled down-right) -->
  <line x1="275" y1="520" x2="340" y2="600" stroke="#000" stroke-width="6"/>

  <!-- Counterweight (dropped position) -->
  <rect x="320" y="590" width="50" height="40" fill="#1D3557" stroke="#000" stroke-width="2"/>
  <rect x="325" y="595" width="40" height="30" fill="#457B9D"/>
  <!-- Weight hanger -->
  <line x1="345" y1="600" x2="340" y2="590" stroke="#000" stroke-width="3"/>

  <!-- Sling at release point -->
  <path d="M120,340 Q100,360 110,370" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M120,340 Q130,355 125,370" stroke="#000" stroke-width="2" fill="none"/>

  <!-- Projectile (just released) -->
  <circle cx="115" cy="310" r="12" fill="#E63946" stroke="#000" stroke-width="2"/>

  <!-- Projectile arc trajectory -->
  <path d="M115,310 Q200,100 450,180 Q600,230 700,400" stroke="#E63946" stroke-width="2.5" fill="none" stroke-dasharray="8,6"/>

  <!-- Arc trajectory dots showing projectile positions -->
  <circle cx="170" cy="190" r="6" fill="#E63946" opacity="0.7"/>
  <circle cx="250" cy="130" r="6" fill="#E63946" opacity="0.6"/>
  <circle cx="350" cy="120" r="6" fill="#E63946" opacity="0.5"/>
  <circle cx="450" cy="165" r="6" fill="#E63946" opacity="0.4"/>
  <circle cx="540" cy="230" r="6" fill="#E63946" opacity="0.35"/>
  <circle cx="620" cy="310" r="6" fill="#E63946" opacity="0.3"/>
  <circle cx="680" cy="380" r="6" fill="#E63946" opacity="0.25"/>

  <!-- Motion lines from release -->
  <line x1="110" y1="320" x2="90" y2="340" stroke="#F4D35E" stroke-width="1.5" opacity="0.6"/>
  <line x1="105" y1="315" x2="80" y2="325" stroke="#F4D35E" stroke-width="1.5" opacity="0.6"/>
  <line x1="125" y1="325" x2="115" y2="345" stroke="#F4D35E" stroke-width="1.5" opacity="0.6"/>

  <!-- Frame cross-bracing -->
  <line x1="230" y1="570" x2="320" y2="570" stroke="#000" stroke-width="2"/>
  <line x1="240" y1="590" x2="310" y2="590" stroke="#000" stroke-width="2"/>
  <line x1="250" y1="570" x2="300" y2="590" stroke="#457B9D" stroke-width="2"/>
  <line x1="300" y1="570" x2="250" y2="590" stroke="#457B9D" stroke-width="2"/>

  <!-- Guide trough -->
  <rect x="160" y="605" width="80" height="10" rx="2" fill="#457B9D" stroke="#000" stroke-width="1.5"/>

  <!-- Target area -->
  <rect x="680" y="540" width="60" height="80" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <line x1="710" y1="540" x2="710" y2="620" stroke="#E63946" stroke-width="2"/>
  <line x1="680" y1="580" x2="740" y2="580" stroke="#E63946" stroke-width="2"/>

  <!-- Impact burst indicator -->
  <polygon points="700,410 695,430 710,425 715,440 720,420 730,435 725,410" fill="#F4D35E" opacity="0.5"/>

  <!-- Arm motion arc indicator -->
  <path d="M340,600 Q360,520 275,420 Q200,350 120,340" stroke="#2A9D8F" stroke-width="1.5" fill="none" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Distance markers on ground -->
  <line x1="400" y1="615" x2="400" y2="625" stroke="#000" stroke-width="1.5"/>
  <line x1="500" y1="615" x2="500" y2="625" stroke="#000" stroke-width="1.5"/>
  <line x1="600" y1="615" x2="600" y2="625" stroke="#000" stroke-width="1.5"/>
  <line x1="700" y1="615" x2="700" y2="625" stroke="#000" stroke-width="1.5"/>

  <!-- Title block -->
  <rect x="30" y="710" width="200" height="50" fill="#1D3557" opacity="0.1"/>
  <rect x="30" y="710" width="5" height="50" fill="#E63946"/>
</svg>