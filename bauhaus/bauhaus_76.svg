<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Background grid lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A8DADC" stroke-width="0.5"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A8DADC" stroke-width="0.5"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A8DADC" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A8DADC" stroke-width="0.5"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A8DADC" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A8DADC" stroke-width="0.5"/>

  <!-- Large central pinwheel -->
  <g transform="translate(400,400)">
    <polygon points="0,0 -60,-120 0,-20" fill="#E63946"/>
    <polygon points="0,0 0,-20 60,-120" fill="#1D3557"/>
    <polygon points="0,0 120,-60 20,0" fill="#F4D35E"/>
    <polygon points="0,0 20,0 120,60" fill="#2A9D8F"/>
    <polygon points="0,0 60,120 0,20" fill="#E63946"/>
    <polygon points="0,0 0,20 -60,120" fill="#000000"/>
    <polygon points="0,0 -120,60 -20,0" fill="#F4D35E"/>
    <polygon points="0,0 -20,0 -120,-60" fill="#2A9D8F"/>
    <circle cx="0" cy="0" r="12" fill="#333333"/>
  </g>

  <!-- Top-left pinwheel -->
  <g transform="translate(150,150)">
    <polygon points="0,0 -40,-80 0,-14" fill="#1D3557"/>
    <polygon points="0,0 0,-14 40,-80" fill="#F4D35E"/>
    <polygon points="0,0 80,-40 14,0" fill="#E63946"/>
    <polygon points="0,0 14,0 80,40" fill="#000000"/>
    <polygon points="0,0 40,80 0,14" fill="#1D3557"/>
    <polygon points="0,0 0,14 -40,80" fill="#2A9D8F"/>
    <polygon points="0,0 -80,40 -14,0" fill="#E63946"/>
    <polygon points="0,0 -14,0 -80,-40" fill="#F4D35E"/>
    <circle cx="0" cy="0" r="8" fill="#333333"/>
  </g>

  <!-- Top-right pinwheel -->
  <g transform="translate(650,150)">
    <polygon points="0,0 -35,-70 0,-12" fill="#2A9D8F"/>
    <polygon points="0,0 0,-12 35,-70" fill="#E63946"/>
    <polygon points="0,0 70,-35 12,0" fill="#F4D35E"/>
    <polygon points="0,0 12,0 70,35" fill="#1D3557"/>
    <polygon points="0,0 35,70 0,12" fill="#2A9D8F"/>
    <polygon points="0,0 0,12 -35,70" fill="#E63946"/>
    <polygon points="0,0 -70,35 -12,0" fill="#000000"/>
    <polygon points="0,0 -12,0 -70,-35" fill="#1D3557"/>
    <circle cx="0" cy="0" r="7" fill="#F4D35E"/>
  </g>

  <!-- Bottom-left pinwheel -->
  <g transform="translate(150,650)">
    <polygon points="0,0 -45,-90 0,-15" fill="#F4D35E"/>
    <polygon points="0,0 0,-15 45,-90" fill="#000000"/>
    <polygon points="0,0 90,-45 15,0" fill="#2A9D8F"/>
    <polygon points="0,0 15,0 90,45" fill="#E63946"/>
    <polygon points="0,0 45,90 0,15" fill="#F4D35E"/>
    <polygon points="0,0 0,15 -45,90" fill="#1D3557"/>
    <polygon points="0,0 -90,45 -15,0" fill="#2A9D8F"/>
    <polygon points="0,0 -15,0 -90,-45" fill="#E63946"/>
    <circle cx="0" cy="0" r="9" fill="#1D3557"/>
  </g>

  <!-- Bottom-right pinwheel -->
  <g transform="translate(650,650)">
    <polygon points="0,0 -50,-100 0,-16" fill="#000000"/>
    <polygon points="0,0 0,-16 50,-100" fill="#2A9D8F"/>
    <polygon points="0,0 100,-50 16,0" fill="#1D3557"/>
    <polygon points="0,0 16,0 100,50" fill="#F4D35E"/>
    <polygon points="0,0 50,100 0,16" fill="#E63946"/>
    <polygon points="0,0 0,16 -50,100" fill="#2A9D8F"/>
    <polygon points="0,0 -100,50 -16,0" fill="#1D3557"/>
    <polygon points="0,0 -16,0 -100,-50" fill="#F4D35E"/>
    <circle cx="0" cy="0" r="10" fill="#E63946"/>
  </g>

  <!-- Small accent pinwheel top-center -->
  <g transform="translate(400,120)">
    <polygon points="0,0 -20,-40 0,-7" fill="#E63946"/>
    <polygon points="0,0 0,-7 20,-40" fill="#1D3557"/>
    <polygon points="0,0 40,-20 7,0" fill="#F4D35E"/>
    <polygon points="0,0 7,0 40,20" fill="#2A9D8F"/>
    <polygon points="0,0 20,40 0,7" fill="#E63946"/>
    <polygon points="0,0 0,7 -20,40" fill="#000000"/>
    <polygon points="0,0 -40,20 -7,0" fill="#F4D35E"/>
    <polygon points="0,0 -7,0 -40,-20" fill="#2A9D8F"/>
    <circle cx="0" cy="0" r="5" fill="#333333"/>
  </g>

  <!-- Small accent pinwheel bottom-center -->
  <g transform="translate(400,680)">
    <polygon points="0,0 -25,-50 0,-8" fill="#2A9D8F"/>
    <polygon points="0,0 0,-8 25,-50" fill="#F4D35E"/>
    <polygon points="0,0 50,-25 8,0" fill="#000000"/>
    <polygon points="0,0 8,0 50,25" fill="#E63946"/>
    <polygon points="0,0 25,50 0,8" fill="#1D3557"/>
    <polygon points="0,0 0,8 -25,50" fill="#F4D35E"/>
    <polygon points="0,0 -50,25 -8,0" fill="#E63946"/>
    <polygon points="0,0 -8,0 -50,-25" fill="#1D3557"/>
    <circle cx="0" cy="0" r="6" fill="#2A9D8F"/>
  </g>

  <!-- Decorative corner squares -->
  <rect x="10" y="10" width="40" height="40" fill="#1D3557"/>
  <rect x="750" y="10" width="40" height="40" fill="#E63946"/>
  <rect x="10" y="750" width="40" height="40" fill="#F4D35E"/>
  <rect x="750" y="750" width="40" height="40" fill="#2A9D8F"/>

  <!-- Border frame -->
  <rect x="5" y="5" width="790" height="790" fill="none" stroke="#000000" stroke-width="3"/>
</svg>