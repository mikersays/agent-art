<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Huge blue circle - dominant anchor -->
  <circle cx="400" cy="400" r="300" fill="#1D3557" opacity="0.9"/>

  <!-- Structural lines connecting small shapes -->
  <line x1="80" y1="120" x2="130" y2="200" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <line x1="130" y1="200" x2="100" y2="320" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <line x1="720" y1="150" x2="680" y2="250" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <line x1="680" y1="250" x2="710" y2="370" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <line x1="150" y1="680" x2="200" y2="620" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="620" x2="110" y2="540" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <line x1="640" y1="680" x2="690" y2="610" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <line x1="690" y1="610" x2="730" y2="520" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="120" x2="720" y2="150" stroke="#000000" stroke-width="0.8" opacity="0.2"/>
  <line x1="150" y1="680" x2="640" y2="680" stroke="#000000" stroke-width="0.8" opacity="0.2"/>

  <!-- Many tiny shapes scattered around the big circle -->
  <!-- Top area -->
  <circle cx="80" cy="120" r="12" fill="#E63946"/>
  <circle cx="200" cy="60" r="8" fill="#F4D35E"/>
  <circle cx="340" cy="40" r="10" fill="#E76F51"/>
  <circle cx="460" cy="35" r="7" fill="#E63946"/>
  <circle cx="590" cy="55" r="11" fill="#F4D35E"/>
  <circle cx="720" cy="150" r="9" fill="#E76F51"/>

  <!-- Left area -->
  <circle cx="40" cy="280" r="14" fill="#F4D35E"/>
  <circle cx="60" cy="400" r="8" fill="#E63946"/>
  <circle cx="35" cy="510" r="10" fill="#E76F51"/>
  <circle cx="130" cy="200" r="6" fill="#E63946"/>
  <circle cx="100" cy="320" r="13" fill="#F4D35E"/>
  <circle cx="110" cy="540" r="7" fill="#E76F51"/>

  <!-- Right area -->
  <circle cx="760" cy="280" r="11" fill="#E63946"/>
  <circle cx="750" cy="400" r="9" fill="#F4D35E"/>
  <circle cx="740" cy="510" r="14" fill="#E76F51"/>
  <circle cx="680" cy="250" r="6" fill="#F4D35E"/>
  <circle cx="710" cy="370" r="12" fill="#E63946"/>
  <circle cx="730" cy="520" r="8" fill="#E76F51"/>

  <!-- Bottom area -->
  <circle cx="110" cy="670" r="9" fill="#F4D35E"/>
  <circle cx="230" cy="750" r="11" fill="#E63946"/>
  <circle cx="370" cy="770" r="8" fill="#E76F51"/>
  <circle cx="500" cy="760" r="13" fill="#F4D35E"/>
  <circle cx="630" cy="740" r="7" fill="#E63946"/>
  <circle cx="730" cy="660" r="10" fill="#E76F51"/>
  <circle cx="150" cy="680" r="6" fill="#E63946"/>
  <circle cx="640" cy="680" r="9" fill="#F4D35E"/>
  <circle cx="690" cy="610" r="7" fill="#E76F51"/>
  <circle cx="200" cy="620" r="11" fill="#E63946"/>

  <!-- Tiny rect accents -->
  <rect x="300" y="20" width="10" height="10" fill="#E63946" opacity="0.8"/>
  <rect x="480" y="15" width="8" height="8" fill="#F4D35E" opacity="0.8"/>
  <rect x="25" y="380" width="12" height="12" fill="#E76F51" opacity="0.8"/>
  <rect x="765" y="460" width="9" height="9" fill="#E63946" opacity="0.8"/>
  <rect x="390" y="775" width="11" height="11" fill="#F4D35E" opacity="0.8"/>

  <!-- Inner circle highlight on big circle -->
  <circle cx="400" cy="400" r="200" fill="none" stroke="#457B9D" stroke-width="1.5" opacity="0.3"/>
  <circle cx="400" cy="400" r="100" fill="none" stroke="#A8DADC" stroke-width="1" opacity="0.3"/>
</svg>
