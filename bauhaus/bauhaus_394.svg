<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>

  <!-- Subtle grid -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>

  <!-- Outside scattered elements (behind main shapes) -->
  <!-- Warm gray elements - upper left -->
  <rect x="60" y="80" width="18" height="18" fill="#A89F91" opacity="0.5" transform="rotate(15 69 89)"/>
  <circle cx="120" cy="50" r="7" fill="#A89F91" opacity="0.4"/>
  <rect x="30" y="200" width="14" height="14" fill="#A89F91" opacity="0.45"/>
  <!-- Warm gray - lower area -->
  <circle cx="80" cy="650" r="8" fill="#A89F91" opacity="0.4"/>
  <rect x="150" y="720" width="16" height="16" fill="#A89F91" opacity="0.35" transform="rotate(30 158 728)"/>

  <!-- Orange elements - scattered outside -->
  <polygon points="700,80 712,55 724,80" fill="#E76F51" opacity="0.55"/>
  <circle cx="740" cy="150" r="6" fill="#E76F51" opacity="0.45"/>
  <rect x="680" y="700" width="15" height="15" fill="#E76F51" opacity="0.5" transform="rotate(20 687 707)"/>
  <polygon points="60,450 72,425 84,450" fill="#E76F51" opacity="0.4"/>
  <circle cx="750" cy="500" r="5" fill="#E76F51" opacity="0.35"/>

  <!-- The massive blue rectangle -->
  <rect x="280" y="150" width="400" height="500" fill="#1D3557" opacity="0.8"/>

  <!-- The massive red circle -->
  <circle cx="350" cy="400" r="250" fill="#E63946" opacity="0.75"/>

  <!-- Overlap area (approximately where circle and rect intersect) -->
  <!-- Small geometric shapes in yellow and teal within the overlap -->
  <rect x="310" y="240" width="20" height="20" fill="#F4D35E" opacity="0.85"/>
  <circle cx="380" cy="280" r="10" fill="#2A9D8F" opacity="0.8"/>
  <rect x="420" y="300" width="15" height="15" fill="#F4D35E" opacity="0.75" transform="rotate(45 427 307)"/>
  <circle cx="340" cy="350" r="8" fill="#2A9D8F" opacity="0.7"/>
  <polygon points="450,360 462,340 474,360" fill="#F4D35E" opacity="0.8"/>
  <rect x="360" y="400" width="18" height="18" fill="#2A9D8F" opacity="0.75"/>
  <circle cx="420" cy="430" r="12" fill="#F4D35E" opacity="0.7"/>
  <rect x="310" y="450" width="14" height="14" fill="#2A9D8F" opacity="0.65" transform="rotate(30 317 457)"/>
  <polygon points="440,480 452,460 464,480" fill="#F4D35E" opacity="0.7"/>
  <circle cx="370" cy="510" r="9" fill="#2A9D8F" opacity="0.65"/>
  <rect x="400" y="530" width="16" height="16" fill="#F4D35E" opacity="0.6"/>
  <circle cx="340" cy="300" r="6" fill="#F4D35E" opacity="0.6"/>
  <polygon points="470,410 478,395 486,410" fill="#2A9D8F" opacity="0.7"/>

  <!-- More outside scattered elements -->
  <circle cx="200" cy="300" r="9" fill="#A89F91" opacity="0.45"/>
  <rect x="170" y="500" width="12" height="12" fill="#E76F51" opacity="0.4" transform="rotate(45 176 506)"/>
  <circle cx="130" cy="400" r="5" fill="#A89F91" opacity="0.35"/>
  <polygon points="720,620 730,600 740,620" fill="#E76F51" opacity="0.4"/>
  <rect x="710" y="300" width="10" height="10" fill="#A89F91" opacity="0.3"/>

  <!-- Corner accents -->
  <rect x="15" y="15" width="12" height="12" fill="#000000" opacity="0.2"/>
  <rect x="773" y="15" width="12" height="12" fill="#000000" opacity="0.2"/>
  <rect x="15" y="773" width="12" height="12" fill="#000000" opacity="0.2"/>
  <rect x="773" y="773" width="12" height="12" fill="#000000" opacity="0.2"/>

  <!-- Thin structural lines -->
  <line x1="280" y1="145" x2="280" y2="655" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="680" y1="145" x2="680" y2="655" stroke="#000000" stroke-width="1" opacity="0.12"/>
</svg>