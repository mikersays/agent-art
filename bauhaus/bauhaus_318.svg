  <circle cx="240" cy="730" r="5" fill="#FEFAE0" opacity="0.7"/>
  <circle cx="320" cy="730" r="5" fill="#FEFAE0" opacity="0.7"/>
  <circle cx="400" cy="730" r="5" fill="#FEFAE0" opacity="0.7"/>
  <circle cx="480" cy="730" r="5" fill="#FEFAE0" opacity="0.7"/>
  <circle cx="560" cy="730" r="5" fill="#FEFAE0" opacity="0.7"/>
  <circle cx="640" cy="730" r="5" fill="#FEFAE0" opacity="0.7"/>
  <circle cx="720" cy="730" r="5" fill="#FEFAE0" opacity="0.7"/>
