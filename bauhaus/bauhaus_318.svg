  <circle cx="190" cy="460" r="8" fill="#2A9D8F"/>
  <circle cx="250" cy="460" r="8" fill="#2A9D8F" opacity="0.9"/>
  <circle cx="310" cy="460" r="8" fill="#2A9D8F"/>
  <circle cx="370" cy="460" r="8" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="430" cy="460" r="8" fill="#2A9D8F"/>
  <circle cx="490" cy="460" r="8" fill="#2A9D8F" opacity="0.9"/>
  <circle cx="550" cy="460" r="8" fill="#2A9D8F"/>
  <circle cx="610" cy="460" r="8" fill="#2A9D8F" opacity="0.8"/>
