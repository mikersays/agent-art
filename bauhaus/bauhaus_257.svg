  <line x1="0" y1="650" x2="800" y2="650" stroke="#A89F91" stroke-width="1" opacity="0.18"/>
  <!-- Ground plane -->
  <rect x="0" y="680" width="800" height="120" fill="#264653" opacity="0.15"/>
  <!-- Tall rectangles - cityscape bar chart -->
  <rect x="40" y="220" width="45" height="460" fill="#1D3557" opacity="0.85"/>
  <rect x="95" y="340" width="40" height="340" fill="#264653" opacity="0.8"/>
