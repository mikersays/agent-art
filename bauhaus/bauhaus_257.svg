  <line x1="30" y1="580" x2="770" y2="580" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="150" y1="130" x2="650" y2="130" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <!-- Yellow circle accents floating above -->
  <circle cx="120" cy="180" r="18" fill="#F4D35E" opacity="0.85"/>
  <circle cx="330" cy="120" r="22" fill="#F4D35E" opacity="0.9"/>
  <circle cx="510" cy="150" r="15" fill="#F4D35E" opacity="0.8"/>
  <circle cx="670" cy="110" r="20" fill="#F4D35E" opacity="0.85"/>
