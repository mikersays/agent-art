  <circle cx="80" cy="100" r="14" fill="#E76F51" opacity="0.8"/>
  <circle cx="260" cy="70" r="16" fill="#E76F51" opacity="0.85"/>
  <circle cx="450" cy="55" r="20" fill="#E76F51" opacity="0.9"/>
  <circle cx="620" cy="85" r="12" fill="#E76F51" opacity="0.75"/>
  <circle cx="395" cy="160" r="10" fill="#E76F51" opacity="0.7"/>
