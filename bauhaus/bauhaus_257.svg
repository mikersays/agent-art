  <rect x="370" y="80" width="48" height="600" fill="#457B9D" opacity="0.85"/>
  <rect x="428" y="250" width="40" height="430" fill="#264653" opacity="0.75"/>
  <rect x="478" y="190" width="52" height="490" fill="#1D3557" opacity="0.8"/>
  <rect x="540" y="310" width="44" height="370" fill="#457B9D" opacity="0.7"/>
  <rect x="594" y="140" width="46" height="540" fill="#264653" opacity="0.8"/>
