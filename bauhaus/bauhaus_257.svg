  <rect x="55" y="210" width="10" height="10" fill="#E63946" opacity="0.7"/>
  <rect x="320" y="150" width="10" height="10" fill="#E63946" opacity="0.7"/>
  <rect x="490" y="180" width="10" height="10" fill="#E63946" opacity="0.65"/>
  <rect x="710" y="240" width="10" height="10" fill="#E63946" opacity="0.7"/>
