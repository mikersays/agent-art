<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Subtle grid -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <!-- Zigzag 1 - Red, upper zone -->
  <polyline points="0,180 100,100 200,180 300,100 400,180 500,100 600,180 700,100 800,180" fill="none" stroke="#E63946" stroke-width="5" opacity="0.9"/>
  <!-- Parallel thin line following zigzag 1 -->
  <polyline points="0,195 100,115 200,195 300,115 400,195 500,115 600,195 700,115 800,195" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.4"/>
  <!-- Triangles at peaks of zigzag 1 -->
  <polygon points="100,100 120,70 80,70" fill="#E63946" opacity="0.8"/>
  <polygon points="300,100 320,70 280,70" fill="#E63946" opacity="0.7"/>
  <polygon points="500,100 520,70 480,70" fill="#E63946" opacity="0.8"/>
  <polygon points="700,100 720,70 680,70" fill="#E63946" opacity="0.7"/>
  <!-- Circles at valleys of zigzag 1 -->
  <circle cx="200" cy="180" r="8" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="400" cy="180" r="8" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="600" cy="180" r="8" fill="#2A9D8F" opacity="0.7"/>
  <!-- Zigzag 2 - Blue, middle zone -->
  <polyline points="0,420 120,320 240,420 360,320 480,420 600,320 720,420 800,350" fill="none" stroke="#1D3557" stroke-width="6" opacity="0.85"/>
  <!-- Parallel thin line following zigzag 2 -->
  <polyline points="0,438 120,338 240,438 360,338 480,438 600,338 720,438 800,368" fill="none" stroke="#1D3557" stroke-width="1.5" opacity="0.35"/>
  <!-- Triangles at peaks of zigzag 2 -->
  <polygon points="120,320 145,285 95,285" fill="#1D3557" opacity="0.75"/>
  <polygon points="360,320 385,285 335,285" fill="#1D3557" opacity="0.8"/>
  <polygon points="600,320 625,285 575,285" fill="#1D3557" opacity="0.75"/>
  <!-- Circles at valleys of zigzag 2 -->
  <circle cx="240" cy="420" r="10" fill="#E76F51" opacity="0.7"/>
  <circle cx="480" cy="420" r="10" fill="#E76F51" opacity="0.7"/>
  <circle cx="720" cy="420" r="10" fill="#E76F51" opacity="0.7"/>
  <!-- Zigzag 3 - Yellow, lower zone -->
  <polyline points="0,620 80,540 160,620 240,540 320,620 400,540 480,620 560,540 640,620 720,540 800,620" fill="none" stroke="#F4D35E" stroke-width="7" opacity="0.9"/>
  <!-- Parallel thin line following zigzag 3 -->
  <polyline points="0,640 80,560 160,640 240,560 320,640 400,560 480,640 560,560 640,640 720,560 800,640" fill="none" stroke="#F4D35E" stroke-width="2" opacity="0.4"/>
  <!-- Triangles at peaks of zigzag 3 -->
  <polygon points="80,540 105,505 55,505" fill="#F4D35E" opacity="0.85"/>
  <polygon points="240,540 265,505 215,505" fill="#F4D35E" opacity="0.8"/>
  <polygon points="400,540 425,505 375,505" fill="#F4D35E" opacity="0.85"/>
  <polygon points="560,540 585,505 535,505" fill="#F4D35E" opacity="0.8"/>
  <polygon points="720,540 745,505 695,505" fill="#F4D35E" opacity="0.85"/>
  <!-- Circles at valleys of zigzag 3 -->
  <circle cx="160" cy="620" r="9" fill="#2A9D8F" opacity="0.65"/>
  <circle cx="320" cy="620" r="9" fill="#E76F51" opacity="0.65"/>
  <circle cx="480" cy="620" r="9" fill="#2A9D8F" opacity="0.65"/>
  <circle cx="640" cy="620" r="9" fill="#E76F51" opacity="0.65"/>
  <!-- Corner accent shapes -->
  <rect x="20" y="20" width="30" height="30" fill="#000000" opacity="0.15"/>
  <rect x="750" y="750" width="30" height="30" fill="#000000" opacity="0.15"/>
  <circle cx="770" cy="35" r="12" fill="#E63946" opacity="0.3"/>
  <circle cx="35" cy="765" r="12" fill="#1D3557" opacity="0.3"/>
  <!-- Accent between zigzags -->
  <rect x="340" y="240" width="120" height="4" fill="#000000" opacity="0.2"/>
  <rect x="250" y="470" width="100" height="4" fill="#000000" opacity="0.2"/>
</svg>