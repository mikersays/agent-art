<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#DDA15E"/>
  <!-- Amphora body - main silhouette -->
  <path d="M400,120 Q340,120 330,160 Q310,160 300,180 L310,200 Q320,190 340,185 Q330,250 310,350 Q280,450 270,500 Q260,580 280,650 Q300,700 340,720 L460,720 Q500,700 520,650 Q540,580 530,500 Q520,450 490,350 Q470,250 460,185 Q480,190 490,200 L500,180 Q490,160 470,160 Q460,120 400,120Z" fill="#000"/>
  <!-- Amphora inner decorative band top -->
  <rect x="345" y="170" width="110" height="15" rx="3" fill="#E63946"/>
  <!-- Neck pattern stripes -->
  <rect x="360" y="195" width="80" height="6" fill="#F4D35E"/>
  <rect x="355" y="210" width="90" height="6" fill="#F4D35E"/>
  <rect x="350" y="225" width="100" height="6" fill="#F4D35E"/>
  <!-- Body geometric: triangle pattern band -->
  <polygon points="310,380 330,340 350,380" fill="#E63946"/>
  <polygon points="350,380 370,340 390,380" fill="#1D3557"/>
  <polygon points="390,380 410,340 430,380" fill="#E63946"/>
  <polygon points="430,380 450,340 470,380" fill="#1D3557"/>
  <polygon points="470,380 490,340 510,380" fill="#E63946"/>
  <!-- Mid-body horizontal band -->
  <rect x="285" y="440" width="230" height="12" fill="#F4D35E"/>
  <rect x="280" y="460" width="240" height="12" fill="#E63946"/>
  <!-- Circle pattern on lower body -->
  <circle cx="340" cy="530" r="25" fill="none" stroke="#F4D35E" stroke-width="4"/>
  <circle cx="400" cy="530" r="25" fill="none" stroke="#F4D35E" stroke-width="4"/>
  <circle cx="460" cy="530" r="25" fill="none" stroke="#F4D35E" stroke-width="4"/>
  <circle cx="340" cy="530" r="12" fill="#E63946"/>
  <circle cx="400" cy="530" r="12" fill="#1D3557"/>
  <circle cx="460" cy="530" r="12" fill="#E63946"/>
  <!-- Lower decorative meander/key band -->
  <path d="M300,600 h200" stroke="#F4D35E" stroke-width="5" fill="none"/>
  <path d="M300,615 h200" stroke="#F4D35E" stroke-width="5" fill="none"/>
  <!-- Zigzag between bands -->
  <path d="M300,605 l10,8 10,-8 10,8 10,-8 10,8 10,-8 10,8 10,-8 10,8 10,-8 10,8 10,-8 10,8 10,-8 10,8 10,-8 10,8 10,-8 10,8 10,-8" stroke="#FFF" stroke-width="2" fill="none"/>
  <!-- Base band -->
  <rect x="320" y="680" width="160" height="10" fill="#6D2E46"/>
  <!-- Handle left -->
  <path d="M310,200 Q240,250 250,320 Q260,370 310,350" stroke="#000" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Handle right -->
  <path d="M490,200 Q560,250 550,320 Q540,370 490,350" stroke="#000" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Small diamond accents on neck -->
  <polygon points="380,250 390,265 400,250 390,235" fill="#FFF"/>
  <polygon points="410,250 420,265 430,250 420,235" fill="#FFF"/>
  <!-- Rim highlight -->
  <ellipse cx="400" cy="125" rx="55" ry="8" fill="#264653"/>
</svg>