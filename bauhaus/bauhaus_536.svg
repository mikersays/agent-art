<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>
  <!-- Background grid lines -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <!-- Radiating thin lines from center -->
  <line x1="400" y1="400" x2="400" y2="80" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="677" y2="240" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="720" y2="400" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="677" y2="560" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="400" y2="720" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="123" y2="560" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="80" y2="400" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="123" y2="240" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <!-- Rotated rectangles at 0 degrees -->
  <rect x="370" y="200" width="60" height="140" fill="#E63946" opacity="0.85" transform="rotate(0,400,400)"/>
  <!-- Rotated rectangles at 30 degrees -->
  <rect x="370" y="200" width="60" height="140" fill="#1D3557" opacity="0.6" transform="rotate(30,400,400)"/>
  <!-- Rotated rectangles at 60 degrees -->
  <rect x="370" y="200" width="60" height="140" fill="#F4D35E" opacity="0.7" transform="rotate(60,400,400)"/>
  <!-- Rotated rectangles at 90 degrees -->
  <rect x="370" y="200" width="60" height="140" fill="#E63946" opacity="0.5" transform="rotate(90,400,400)"/>
  <!-- Rotated rectangles at 120 degrees -->
  <rect x="370" y="200" width="60" height="140" fill="#1D3557" opacity="0.45" transform="rotate(120,400,400)"/>
  <!-- Rotated rectangles at 150 degrees -->
  <rect x="370" y="200" width="60" height="140" fill="#F4D35E" opacity="0.55" transform="rotate(150,400,400)"/>
  <!-- Rotated triangles - pinwheel effect -->
  <polygon points="400,160 430,230 370,230" fill="#F4D35E" opacity="0.9" transform="rotate(0,400,400)"/>
  <polygon points="400,160 430,230 370,230" fill="#E63946" opacity="0.7" transform="rotate(60,400,400)"/>
  <polygon points="400,160 430,230 370,230" fill="#1D3557" opacity="0.7" transform="rotate(120,400,400)"/>
  <polygon points="400,160 430,230 370,230" fill="#F4D35E" opacity="0.6" transform="rotate(180,400,400)"/>
  <polygon points="400,160 430,230 370,230" fill="#E63946" opacity="0.5" transform="rotate(240,400,400)"/>
  <polygon points="400,160 430,230 370,230" fill="#1D3557" opacity="0.5" transform="rotate(300,400,400)"/>
  <!-- Central anchor circle -->
  <circle cx="400" cy="400" r="45" fill="#000000" opacity="1"/>
  <circle cx="400" cy="400" r="28" fill="#FFFFFF" opacity="0.3"/>
  <!-- Accent circles at rotation endpoints -->
  <circle cx="400" cy="140" r="8" fill="#E63946" opacity="0.9" transform="rotate(0,400,400)"/>
  <circle cx="400" cy="140" r="8" fill="#1D3557" opacity="0.9" transform="rotate(60,400,400)"/>
  <circle cx="400" cy="140" r="8" fill="#F4D35E" opacity="0.9" transform="rotate(120,400,400)"/>
  <circle cx="400" cy="140" r="8" fill="#E63946" opacity="0.9" transform="rotate(180,400,400)"/>
  <circle cx="400" cy="140" r="8" fill="#1D3557" opacity="0.9" transform="rotate(240,400,400)"/>
  <circle cx="400" cy="140" r="8" fill="#F4D35E" opacity="0.9" transform="rotate(300,400,400)"/>
  <!-- Outer accent circles -->
  <circle cx="400" cy="100" r="5" fill="#2A9D8F" opacity="0.7" transform="rotate(30,400,400)"/>
  <circle cx="400" cy="100" r="5" fill="#E76F51" opacity="0.7" transform="rotate(90,400,400)"/>
  <circle cx="400" cy="100" r="5" fill="#2A9D8F" opacity="0.7" transform="rotate(150,400,400)"/>
  <circle cx="400" cy="100" r="5" fill="#E76F51" opacity="0.7" transform="rotate(210,400,400)"/>
  <circle cx="400" cy="100" r="5" fill="#2A9D8F" opacity="0.7" transform="rotate(270,400,400)"/>
  <circle cx="400" cy="100" r="5" fill="#E76F51" opacity="0.7" transform="rotate(330,400,400)"/>
  <!-- Corner accents -->
  <rect x="30" y="30" width="25" height="25" fill="#000000" opacity="0.2"/>
  <rect x="745" y="30" width="25" height="25" fill="#000000" opacity="0.2"/>
  <rect x="30" y="745" width="25" height="25" fill="#000000" opacity="0.2"/>
  <rect x="745" y="745" width="25" height="25" fill="#000000" opacity="0.2"/>
  <!-- Small rotated squares near center -->
  <rect x="385" y="340" width="30" height="30" fill="#2A9D8F" opacity="0.4" transform="rotate(45,400,355)"/>
</svg>