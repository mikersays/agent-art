<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background: Cream -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Background structural grid lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.7" opacity="0.12"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.7" opacity="0.12"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.7" opacity="0.12"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.7" opacity="0.12"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.7" opacity="0.12"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.7" opacity="0.12"/>
  <!-- Diagonal structural lines -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="1" opacity="0.08"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#000000" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="0" stroke="#000000" stroke-width="1" opacity="0.06"/>
  <line x1="0" y1="400" x2="800" y2="800" stroke="#000000" stroke-width="1" opacity="0.06"/>

  <!-- === THREE ANCHORS === -->

  <!-- ANCHOR 1: Large Blue Circle (top-left) -->
  <circle cx="240" cy="240" r="180" fill="#1D3557" opacity="0.92"/>
  <!-- Inner ring -->
  <circle cx="240" cy="240" r="130" fill="none" stroke="#457B9D" stroke-width="4" opacity="0.8"/>
  <circle cx="240" cy="240" r="70" fill="#457B9D" opacity="0.6"/>
  <circle cx="240" cy="240" r="30" fill="#A8DADC" opacity="0.9"/>

  <!-- ANCHOR 2: Large Red Rectangle (right) -->
  <rect x="430" y="80" width="310" height="220" fill="#E63946" opacity="0.93"/>
  <!-- Inner accent -->
  <rect x="448" y="98" width="274" height="184" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  <rect x="466" y="116" width="238" height="148" fill="#6D2E46" opacity="0.5"/>

  <!-- ANCHOR 3: Large Yellow Triangle (bottom) -->
  <polygon points="400,780 100,520 700,520" fill="#F4D35E" opacity="0.93"/>
  <!-- Inner triangle -->
  <polygon points="400,720 155,530 645,530" fill="none" stroke="#000000" stroke-width="2.5" opacity="0.5"/>
  <polygon points="400,660 215,540 585,540" fill="#DDA15E" opacity="0.5"/>
  <polygon points="400,600 275,548 525,548" fill="#E76F51" opacity="0.6"/>

  <!-- === SUPPORTING SHAPES === -->

  <!-- Teal bar bridging circle and rectangle -->
  <rect x="400" y="190" width="50" height="12" fill="#2A9D8F" opacity="0.9"/>
  <rect x="380" y="330" width="80" height="10" fill="#2A9D8F" opacity="0.7"/>

  <!-- Orange circle: bottom-right -->
  <circle cx="660" cy="680" r="65" fill="#E76F51" opacity="0.85"/>
  <circle cx="660" cy="680" r="42" fill="#DDA15E" opacity="0.8"/>
  <circle cx="660" cy="680" r="20" fill="#FEFAE0"/>

  <!-- Forest rectangle: bottom-left corner -->
  <rect x="30" y="560" width="100" height="130" fill="#264653" opacity="0.85"/>
  <rect x="44" y="574" width="72" height="102" fill="none" stroke="#2A9D8F" stroke-width="2" opacity="0.7"/>

  <!-- Steel blue bar: vertical left -->
  <rect x="30" y="120" width="16" height="220" fill="#457B9D" opacity="0.9"/>
  <rect x="60" y="160" width="10" height="140" fill="#A8DADC" opacity="0.8"/>

  <!-- Burgundy square: top-right corner -->
  <rect x="680" y="20" width="80" height="80" fill="#6D2E46" opacity="0.85"/>
  <rect x="692" y="32" width="56" height="56" fill="none" stroke="#E63946" stroke-width="2" opacity="0.7"/>

  <!-- Sand rectangle: top-center -->
  <rect x="340" y="20" width="70" height="45" fill="#DDA15E" opacity="0.85"/>

  <!-- Warm gray band: horizontal mid-right -->
  <rect x="500" y="360" width="260" height="14" fill="#A89F91" opacity="0.8"/>
  <rect x="530" y="380" width="200" height="8" fill="#A89F91" opacity="0.5"/>

  <!-- Light blue arc: top area -->
  <path d="M 440 60 A 120 120 0 0 1 680 60" fill="none" stroke="#A8DADC" stroke-width="5" opacity="0.8"/>
  <path d="M 460 70 A 100 100 0 0 1 660 70" fill="none" stroke="#A8DADC" stroke-width="3" opacity="0.6"/>

  <!-- Coral small square: inside yellow triangle -->
  <rect x="366" y="580" width="68" height="44" fill="#E9C46A" opacity="0.8"/>

  <!-- Red small circle: left of triangle -->
  <circle cx="148" cy="580" r="28" fill="#E63946" opacity="0.75"/>

  <!-- Black structural frame lines -->
  <line x1="0" y1="510" x2="150" y2="510" stroke="#000000" stroke-width="2.5" opacity="0.7"/>
  <line x1="650" y1="510" x2="800" y2="510" stroke="#000000" stroke-width="2.5" opacity="0.7"/>
  <line x1="420" y1="300" x2="420" y2="520" stroke="#000000" stroke-width="2.5" opacity="0.6"/>
  <line x1="80" y1="420" x2="80" y2="560" stroke="#000000" stroke-width="2" opacity="0.6"/>
  <line x1="740" y1="300" x2="740" y2="510" stroke="#000000" stroke-width="2" opacity="0.6"/>

  <!-- Small accent shapes scattered for texture -->
  <rect x="140" y="450" width="22" height="22" fill="#F4D35E" opacity="0.85"/>
  <circle cx="350" cy="460" r="12" fill="#E63946" opacity="0.7"/>
  <circle cx="510" cy="460" r="10" fill="#1D3557" opacity="0.7"/>
  <rect x="620" y="430" width="18" height="18" fill="#2A9D8F" opacity="0.8"/>
  <polygon points="200,490 215,515 185,515" fill="#6D2E46" opacity="0.8"/>
  <polygon points="580,485 595,510 565,510" fill="#264653" opacity="0.8"/>

  <!-- Top-left and bottom-right corner accents -->
  <rect x="8" y="8" width="40" height="4" fill="#000000" opacity="0.5"/>
  <rect x="8" y="8" width="4" height="40" fill="#000000" opacity="0.5"/>
  <rect x="752" y="788" width="40" height="4" fill="#000000" opacity="0.5"/>
  <rect x="788" y="752" width="4" height="40" fill="#000000" opacity="0.5"/>

  <!-- Warm gray diamond: center -->
  <polygon points="400,380 422,400 400,420 378,400" fill="#A89F91" opacity="0.7" stroke="#000000" stroke-width="1"/>

  <!-- Forest small squares along right edge -->
  <rect x="760" y="200" width="28" height="28" fill="#264653" opacity="0.7"/>
  <rect x="760" y="260" width="28" height="14" fill="#2A9D8F" opacity="0.7"/>

  <!-- Sand horizontal band: bottom-left -->
  <rect x="30" y="700" width="200" height="12" fill="#DDA15E" opacity="0.8"/>
  <rect x="30" y="720" width="140" height="8" fill="#DDA15E" opacity="0.5"/>

  <!-- Teal circle: mid-left -->
  <circle cx="70" cy="350" r="32" fill="#2A9D8F" opacity="0.75"/>
  <circle cx="70" cy="350" r="18" fill="none" stroke="#FEFAE0" stroke-width="2" opacity="0.7"/>
</svg>
