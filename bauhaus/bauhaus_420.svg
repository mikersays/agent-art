<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background: cream -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Background grid underlay -->
  <line x1="0" y1="80" x2="800" y2="80" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="0" y1="480" x2="800" y2="480" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="0" y1="560" x2="800" y2="560" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="0" y1="640" x2="800" y2="640" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="0" y1="720" x2="800" y2="720" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="80" y1="0" x2="80" y2="800" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="160" y1="0" x2="160" y2="800" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="240" y1="0" x2="240" y2="800" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="320" y1="0" x2="320" y2="800" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="480" y1="0" x2="480" y2="800" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="560" y1="0" x2="560" y2="800" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="640" y1="0" x2="640" y2="800" stroke="#000000" stroke-width="0.4" opacity="0.08"/>
  <line x1="720" y1="0" x2="720" y2="800" stroke="#000000" stroke-width="0.4" opacity="0.08"/>

  <!-- Vertical columns -->
  <!-- Column 1: Blue, tall, left -->
  <rect x="80" y="120" width="55" height="580" fill="#1D3557" opacity="0.9"/>

  <!-- Column 2: Forest, medium-tall, slightly right -->
  <rect x="195" y="180" width="48" height="500" fill="#264653" opacity="0.88"/>

  <!-- Column 3: Steel Blue, medium, center-left -->
  <rect x="310" y="100" width="52" height="620" fill="#457B9D" opacity="0.85"/>

  <!-- Column 4: Blue again, narrow, center-right -->
  <rect x="440" y="200" width="40" height="480" fill="#1D3557" opacity="0.8"/>

  <!-- Column 5: Forest, right area -->
  <rect x="560" y="140" width="50" height="540" fill="#264653" opacity="0.85"/>

  <!-- Column 6: Steel Blue, far right -->
  <rect x="670" y="220" width="44" height="420" fill="#457B9D" opacity="0.8"/>

  <!-- Horizontal beams -->
  <!-- Beam 1: Red, wide, upper -->
  <rect x="60" y="155" width="700" height="45" fill="#E63946" opacity="0.88"/>

  <!-- Beam 2: Sand, medium, upper-mid -->
  <rect x="70" y="290" width="620" height="38" fill="#DDA15E" opacity="0.85"/>

  <!-- Beam 3: Red, thin accent, mid -->
  <rect x="80" y="400" width="580" height="28" fill="#E63946" opacity="0.75"/>

  <!-- Beam 4: Sand, lower-mid -->
  <rect x="60" y="510" width="650" height="40" fill="#DDA15E" opacity="0.85"/>

  <!-- Beam 5: Red, lower, wide -->
  <rect x="70" y="630" width="680" height="45" fill="#E63946" opacity="0.88"/>

  <!-- Circular joints at column/beam intersections -->
  <!-- Beam 1 intersections -->
  <circle cx="107" cy="177" r="14" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="219" cy="177" r="12" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="336" cy="177" r="13" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="460" cy="177" r="11" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="585" cy="177" r="13" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="692" cy="177" r="11" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>

  <!-- Beam 2 intersections -->
  <circle cx="107" cy="309" r="12" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <circle cx="219" cy="309" r="10" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <circle cx="336" cy="309" r="11" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <circle cx="460" cy="309" r="10" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <circle cx="585" cy="309" r="11" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <circle cx="692" cy="309" r="10" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>

  <!-- Beam 3 intersections -->
  <circle cx="107" cy="414" r="10" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="336" cy="414" r="10" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="460" cy="414" r="9" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="585" cy="414" r="10" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>

  <!-- Beam 4 intersections -->
  <circle cx="107" cy="530" r="12" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <circle cx="219" cy="530" r="10" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <circle cx="336" cy="530" r="11" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <circle cx="460" cy="530" r="10" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <circle cx="585" cy="530" r="11" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <circle cx="692" cy="530" r="10" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>

  <!-- Beam 5 intersections -->
  <circle cx="107" cy="652" r="13" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="219" cy="652" r="11" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="336" cy="652" r="12" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="460" cy="652" r="11" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="585" cy="652" r="12" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="692" cy="652" r="10" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>

  <!-- Top and bottom accent bars -->
  <rect x="60" y="60" width="700" height="18" fill="#000000" opacity="0.7"/>
  <rect x="60" y="722" width="700" height="18" fill="#000000" opacity="0.7"/>

  <!-- Side accent bars -->
  <rect x="30" y="120" width="18" height="580" fill="#000000" opacity="0.5"/>
  <rect x="752" y="140" width="18" height="520" fill="#000000" opacity="0.5"/>

  <!-- Corner accents -->
  <rect x="18" y="18" width="28" height="28" fill="#E63946" opacity="0.8"/>
  <rect x="754" y="18" width="28" height="28" fill="#E63946" opacity="0.8"/>
  <rect x="18" y="754" width="28" height="28" fill="#E63946" opacity="0.8"/>
  <rect x="754" y="754" width="28" height="28" fill="#E63946" opacity="0.8"/>

  <!-- Outer border -->
  <rect x="0" y="0" width="800" height="800" fill="none" stroke="#000000" stroke-width="3"/>
</svg>
