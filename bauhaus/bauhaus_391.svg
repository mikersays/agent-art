<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>

  <!-- Connecting lines between target centers -->
  <line x1="380" y1="350" x2="160" y2="180" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="380" y1="350" x2="620" y2="220" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="380" y1="350" x2="550" y2="620" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="160" y1="180" x2="620" y2="220" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="620" y1="220" x2="550" y2="620" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="160" y1="180" x2="550" y2="620" stroke="#000000" stroke-width="1" opacity="0.15"/>

  <!-- Target 1 (main, center-ish) - Red/White/Blue -->
  <circle cx="380" cy="350" r="140" fill="#1D3557" opacity="0.85"/>
  <circle cx="380" cy="350" r="105" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="380" cy="350" r="70" fill="#E63946" opacity="0.9"/>
  <circle cx="380" cy="350" r="35" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="380" cy="350" r="10" fill="#1D3557"/>

  <!-- Target 2 (upper left) - Teal/Yellow/Forest -->
  <circle cx="160" cy="180" r="85" fill="#264653" opacity="0.8"/>
  <circle cx="160" cy="180" r="60" fill="#2A9D8F" opacity="0.85"/>
  <circle cx="160" cy="180" r="35" fill="#F4D35E" opacity="0.9"/>
  <circle cx="160" cy="180" r="12" fill="#264653"/>

  <!-- Target 3 (upper right) - Orange/Cream/Burgundy -->
  <circle cx="620" cy="220" r="95" fill="#6D2E46" opacity="0.8"/>
  <circle cx="620" cy="220" r="68" fill="#FEFAE0" opacity="0.85"/>
  <circle cx="620" cy="220" r="40" fill="#E76F51" opacity="0.9"/>
  <circle cx="620" cy="220" r="15" fill="#6D2E46"/>

  <!-- Target 4 (lower right) - Steel Blue/Light Blue/Blue -->
  <circle cx="550" cy="620" r="100" fill="#1D3557" opacity="0.75"/>
  <circle cx="550" cy="620" r="72" fill="#A8DADC" opacity="0.85"/>
  <circle cx="550" cy="620" r="45" fill="#457B9D" opacity="0.9"/>
  <circle cx="550" cy="620" r="18" fill="#1D3557"/>

  <!-- Yellow accent squares -->
  <rect x="90" y="500" width="30" height="30" fill="#F4D35E" opacity="0.8" transform="rotate(15 105 515)"/>
  <rect x="700" y="420" width="25" height="25" fill="#F4D35E" opacity="0.7" transform="rotate(30 712 432)"/>
  <rect x="270" y="650" width="22" height="22" fill="#F4D35E" opacity="0.75"/>
  <rect x="680" y="680" width="28" height="28" fill="#F4D35E" opacity="0.6" transform="rotate(45 694 694)"/>
  <rect x="50" y="380" width="18" height="18" fill="#F4D35E" opacity="0.65"/>
  <rect x="450" y="80" width="20" height="20" fill="#F4D35E" opacity="0.7" transform="rotate(20 460 90)"/>

  <!-- Small corner accents -->
  <circle cx="30" cy="30" r="8" fill="#E63946" opacity="0.5"/>
  <circle cx="770" cy="30" r="8" fill="#1D3557" opacity="0.5"/>
  <circle cx="30" cy="770" r="8" fill="#2A9D8F" opacity="0.5"/>
  <circle cx="770" cy="770" r="8" fill="#E76F51" opacity="0.5"/>

  <!-- Crosshair lines on main target -->
  <line x1="380" y1="200" x2="380" y2="500" stroke="#000000" stroke-width="0.8" opacity="0.2"/>
  <line x1="230" y1="350" x2="530" y2="350" stroke="#000000" stroke-width="0.8" opacity="0.2"/>

  <!-- Extra small geometric accents -->
  <rect x="140" y="700" width="12" height="12" fill="#E63946" opacity="0.4"/>
  <circle cx="720" cy="130" r="6" fill="#2A9D8F" opacity="0.5"/>
  <rect x="320" y="120" width="15" height="15" fill="#000000" opacity="0.15" transform="rotate(45 327 127)"/>
</svg>