<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <title>Silo Cluster</title>
  <!-- Sky background -->
  <rect width="800" height="800" fill="#A8DADC"/>
  <!-- Ground -->
  <rect x="0" y="620" width="800" height="180" fill="#1D3557"/>
  <rect x="0" y="620" width="800" height="8" fill="#000"/>
  <!-- Silo 1 (far left, medium) -->
  <rect x="60" y="280" width="100" height="340" fill="#6D2E46"/>
  <ellipse cx="110" cy="280" rx="50" ry="30" fill="#E63946"/>
  <line x1="60" y1="350" x2="160" y2="350" stroke="#000" stroke-width="2"/>
  <line x1="60" y1="420" x2="160" y2="420" stroke="#000" stroke-width="2"/>
  <line x1="60" y1="490" x2="160" y2="490" stroke="#000" stroke-width="2"/>
  <rect x="90" y="560" width="40" height="60" fill="#000"/>
  <!-- Silo 2 (left-center, tall) -->
  <rect x="190" y="180" width="120" height="440" fill="#FFF"/>
  <ellipse cx="250" cy="180" rx="60" ry="35" fill="#F4D35E"/>
  <line x1="190" y1="260" x2="310" y2="260" stroke="#000" stroke-width="2"/>
  <line x1="190" y1="340" x2="310" y2="340" stroke="#000" stroke-width="2"/>
  <line x1="190" y1="420" x2="310" y2="420" stroke="#000" stroke-width="2"/>
  <line x1="190" y1="500" x2="310" y2="500" stroke="#000" stroke-width="2"/>
  <rect x="225" y="560" width="50" height="60" fill="#000"/>
  <!-- Silo 3 (center, tallest) -->
  <rect x="340" y="120" width="140" height="500" fill="#2A9D8F"/>
  <ellipse cx="410" cy="120" rx="70" ry="40" fill="#F4D35E"/>
  <line x1="340" y1="200" x2="480" y2="200" stroke="#000" stroke-width="2"/>
  <line x1="340" y1="280" x2="480" y2="280" stroke="#000" stroke-width="2"/>
  <line x1="340" y1="360" x2="480" y2="360" stroke="#000" stroke-width="2"/>
  <line x1="340" y1="440" x2="480" y2="440" stroke="#000" stroke-width="2"/>
  <line x1="340" y1="520" x2="480" y2="520" stroke="#000" stroke-width="2"/>
  <rect x="380" y="560" width="60" height="60" fill="#000"/>
  <!-- Silo 4 (right-center, medium) -->
  <rect x="510" y="250" width="110" height="370" fill="#E63946"/>
  <ellipse cx="565" cy="250" rx="55" ry="32" fill="#FFF"/>
  <line x1="510" y1="320" x2="620" y2="320" stroke="#000" stroke-width="2"/>
  <line x1="510" y1="390" x2="620" y2="390" stroke="#000" stroke-width="2"/>
  <line x1="510" y1="460" x2="620" y2="460" stroke="#000" stroke-width="2"/>
  <rect x="540" y="560" width="50" height="60" fill="#000"/>
  <!-- Silo 5 (far right, short) -->
  <rect x="650" y="350" width="90" height="270" fill="#F4D35E"/>
  <ellipse cx="695" cy="350" rx="45" ry="28" fill="#E63946"/>
  <line x1="650" y1="410" x2="740" y2="410" stroke="#000" stroke-width="2"/>
  <line x1="650" y1="470" x2="740" y2="470" stroke="#000" stroke-width="2"/>
  <rect x="670" y="560" width="50" height="60" fill="#000"/>
  <!-- Connecting walkways -->
  <rect x="160" y="380" width="30" height="12" fill="#000"/>
  <rect x="310" y="340" width="30" height="12" fill="#000"/>
  <rect x="480" y="360" width="30" height="12" fill="#000"/>
  <rect x="620" y="410" width="30" height="12" fill="#000"/>
  <!-- Walkway railings -->
  <line x1="160" y1="378" x2="190" y2="378" stroke="#F4D35E" stroke-width="2"/>
  <line x1="310" y1="338" x2="340" y2="338" stroke="#F4D35E" stroke-width="2"/>
  <line x1="480" y1="358" x2="510" y2="358" stroke="#F4D35E" stroke-width="2"/>
  <line x1="620" y1="408" x2="650" y2="408" stroke="#F4D35E" stroke-width="2"/>
  <!-- Pipes along ground -->
  <line x1="110" y1="640" x2="695" y2="640" stroke="#000" stroke-width="6"/>
  <circle cx="110" cy="640" r="8" fill="#FFF" stroke="#000" stroke-width="2"/>
  <circle cx="250" cy="640" r="8" fill="#FFF" stroke="#000" stroke-width="2"/>
  <circle cx="410" cy="640" r="8" fill="#FFF" stroke="#000" stroke-width="2"/>
  <circle cx="565" cy="640" r="8" fill="#FFF" stroke="#000" stroke-width="2"/>
  <circle cx="695" cy="640" r="8" fill="#FFF" stroke="#000" stroke-width="2"/>
</svg>