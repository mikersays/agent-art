<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFF"/>
  <!-- Sky -->
  <rect width="800" height="400" fill="#A8DADC" opacity="0.15"/>
  <!-- Tower base -->
  <rect x="280" y="350" width="240" height="400" fill="#333"/>
  <!-- Tower narrowing middle section -->
  <polygon points="300,350 500,350 480,200 320,200" fill="#1D3557"/>
  <!-- Tower top spire section -->
  <polygon points="330,200 470,200 450,100 350,100" fill="#1D3557"/>
  <!-- Pointed roof -->
  <polygon points="350,100 450,100 400,20" fill="#E63946"/>
  <!-- Cross on top -->
  <line x1="400" y1="0" x2="400" y2="55" stroke="#F4D35E" stroke-width="6"/>
  <line x1="380" y1="20" x2="420" y2="20" stroke="#F4D35E" stroke-width="6"/>
  <!-- Circle detail on cross -->
  <circle cx="400" cy="20" r="8" fill="none" stroke="#F4D35E" stroke-width="2"/>
  <!-- Large arched opening - main -->
  <rect x="350" y="500" width="100" height="150" fill="#000"/>
  <path d="M350,500 A50,50 0 0,1 450,500" fill="#000"/>
  <!-- Inner arch glow -->
  <path d="M360,500 A40,40 0 0,1 440,500" fill="#1D3557" opacity="0.3"/>
  <!-- Bell inside main arch -->
  <path d="M380,480 Q400,460 420,480 L425,510 Q400,520 375,510 Z" fill="#F4D35E"/>
  <line x1="400" y1="460" x2="400" y2="440" stroke="#333" stroke-width="2"/>
  <circle cx="400" cy="505" r="4" fill="#E76F51"/>
  <!-- Bell clapper -->
  <line x1="400" y1="495" x2="400" y2="515" stroke="#333" stroke-width="2"/>
  <circle cx="400" cy="518" r="5" fill="#333"/>
  <!-- Upper arched windows - left -->
  <rect x="340" y="240" width="45" height="60" fill="#000"/>
  <path d="M340,240 A22.5,22.5 0 0,1 385,240" fill="#000"/>
  <rect x="355" y="245" width="15" height="50" fill="#F4D35E" opacity="0.5"/>
  <!-- Upper arched windows - right -->
  <rect x="415" y="240" width="45" height="60" fill="#000"/>
  <path d="M415,240 A22.5,22.5 0 0,1 460,240" fill="#000"/>
  <rect x="430" y="245" width="15" height="50" fill="#F4D35E" opacity="0.5"/>
  <!-- Small round window -->
  <circle cx="400" cy="150" r="20" fill="#000"/>
  <circle cx="400" cy="150" r="16" fill="#E63946" opacity="0.4"/>
  <!-- Rose window details -->
  <line x1="400" y1="134" x2="400" y2="166" stroke="#F4D35E" stroke-width="1.5"/>
  <line x1="384" y1="150" x2="416" y2="150" stroke="#F4D35E" stroke-width="1.5"/>
  <line x1="389" y1="139" x2="411" y2="161" stroke="#F4D35E" stroke-width="1"/>
  <line x1="411" y1="139" x2="389" y2="161" stroke="#F4D35E" stroke-width="1"/>
  <!-- Side arched openings - left -->
  <rect x="295" y="400" width="40" height="55" fill="#000"/>
  <path d="M295,400 A20,20 0 0,1 335,400" fill="#000"/>
  <!-- Side arched openings - right -->
  <rect x="465" y="400" width="40" height="55" fill="#000"/>
  <path d="M465,400 A20,20 0 0,1 505,400" fill="#000"/>
  <!-- Small bells in side arches -->
  <path d="M306,410 Q315,400 324,410 L326,425 Q315,430 304,425 Z" fill="#F4D35E" opacity="0.7"/>
  <path d="M476,410 Q485,400 494,410 L496,425 Q485,430 474,425 Z" fill="#F4D35E" opacity="0.7"/>
  <!-- Horizontal stone lines on tower -->
  <line x1="280" y1="450" x2="520" y2="450" stroke="#000" stroke-width="1" opacity="0.3"/>
  <line x1="280" y1="550" x2="520" y2="550" stroke="#000" stroke-width="1" opacity="0.3"/>
  <line x1="280" y1="650" x2="520" y2="650" stroke="#000" stroke-width="1" opacity="0.3"/>
  <line x1="300" y1="320" x2="500" y2="320" stroke="#000" stroke-width="1" opacity="0.3"/>
  <!-- Sound waves from bell -->
  <path d="M460,490 Q490,470 460,450" fill="none" stroke="#E76F51" stroke-width="2" opacity="0.5"/>
  <path d="M475,500 Q515,470 475,440" fill="none" stroke="#E76F51" stroke-width="1.5" opacity="0.35"/>
  <path d="M490,510 Q540,470 490,430" fill="none" stroke="#E76F51" stroke-width="1" opacity="0.2"/>
  <path d="M340,490 Q310,470 340,450" fill="none" stroke="#E76F51" stroke-width="2" opacity="0.5"/>
  <path d="M325,500 Q285,470 325,440" fill="none" stroke="#E76F51" stroke-width="1.5" opacity="0.35"/>
  <!-- Ground line -->
  <line x1="100" y1="750" x2="700" y2="750" stroke="#333" stroke-width="3"/>
  <!-- Decorative geometric cross element bottom-left -->
  <rect x="80" y="680" width="30" height="30" fill="#E63946" opacity="0.4"/>
  <line x1="95" y1="670" x2="95" y2="720" stroke="#F4D35E" stroke-width="2"/>
  <line x1="70" y1="695" x2="120" y2="695" stroke="#F4D35E" stroke-width="2"/>
  <!-- Border -->
  <rect x="6" y="6" width="788" height="788" fill="none" stroke="#000" stroke-width="4"/>
</svg>