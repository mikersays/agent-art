<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Radiating lines from upper-left focal point (150, 150) -->
  <line x1="150" y1="150" x2="800" y2="0" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="800" y2="80" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="800" y2="160" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="800" y2="250" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="800" y2="350" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="800" y2="460" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="800" y2="580" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="800" y2="700" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="800" y2="800" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="700" y2="800" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="550" y2="800" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="400" y2="800" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="250" y2="800" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="100" y2="800" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="0" y2="800" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="0" y2="600" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="0" y2="400" stroke="#000000" stroke-width="1" opacity="0.15"/>

  <!-- Radiating lines from lower-right focal point (650, 650) -->
  <line x1="650" y1="650" x2="0" y2="800" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="650" x2="0" y2="700" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="650" x2="0" y2="580" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="650" x2="0" y2="450" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="650" x2="0" y2="320" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="650" x2="0" y2="180" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="650" x2="0" y2="50" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="650" x2="0" y2="0" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="650" x2="100" y2="0" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="650" x2="250" y2="0" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="650" x2="400" y2="0" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="650" x2="550" y2="0" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="650" x2="700" y2="0" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="650" x2="800" y2="0" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="650" x2="800" y2="200" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="650" x2="800" y2="400" stroke="#000000" stroke-width="1" opacity="0.15"/>

  <!-- Large red circle near upper-left focal point -->
  <circle cx="180" cy="180" r="110" fill="#E63946" opacity="0.75"/>
  <circle cx="180" cy="180" r="110" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Large blue rectangle near lower-right focal point -->
  <rect x="540" y="540" width="220" height="220" fill="#1D3557" opacity="0.75"/>
  <rect x="540" y="540" width="220" height="220" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Yellow triangles at edges -->
  <polygon points="0,0 80,0 0,80" fill="#F4D35E" opacity="0.8"/>
  <polygon points="800,800 720,800 800,720" fill="#F4D35E" opacity="0.8"/>
  <polygon points="800,0 800,70 730,0" fill="#F4D35E" opacity="0.6"/>
  <polygon points="0,800 0,730 70,800" fill="#F4D35E" opacity="0.6"/>
  <polygon points="400,0 440,0 420,50" fill="#F4D35E" opacity="0.5"/>
  <polygon points="0,400 0,440 50,420" fill="#F4D35E" opacity="0.5"/>
  <polygon points="800,400 800,440 750,420" fill="#F4D35E" opacity="0.5"/>
  <polygon points="400,800 440,800 420,750" fill="#F4D35E" opacity="0.5"/>

  <!-- Connecting line between focal points -->
  <line x1="150" y1="150" x2="650" y2="650" stroke="#000000" stroke-width="3" opacity="0.3"/>

  <!-- Small accent shapes at intersections -->
  <circle cx="400" cy="400" r="15" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="400" cy="400" r="6" fill="#000000"/>
  <rect x="280" y="280" width="20" height="20" fill="#E76F51" opacity="0.7"/>
  <rect x="500" y="500" width="20" height="20" fill="#E76F51" opacity="0.7"/>

  <!-- Additional tension elements -->
  <circle cx="150" cy="150" r="5" fill="#000000"/>
  <circle cx="650" cy="650" r="5" fill="#000000"/>
  <circle cx="150" cy="150" r="20" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <circle cx="650" cy="650" r="20" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.4"/>

  <!-- Steel blue accent arcs -->
  <path d="M 100 300 A 180 180 0 0 0 300 100" fill="none" stroke="#457B9D" stroke-width="2" opacity="0.4"/>
  <path d="M 500 700 A 180 180 0 0 0 700 500" fill="none" stroke="#457B9D" stroke-width="2" opacity="0.4"/>
</svg>