<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Suspension - Geometric mobile sculpture like a Calder mobile -->
  <!-- Top mounting point -->
  <circle cx="400" cy="30" r="6" fill="#000000"/>
  <!-- Main top horizontal bar -->
  <line x1="400" y1="30" x2="400" y2="80" stroke="#000000" stroke-width="2"/>
  <rect x="200" y="78" width="400" height="6" fill="#000000"/>
  <!-- Left branch from top bar -->
  <line x1="250" y1="84" x2="250" y2="160" stroke="#000000" stroke-width="2"/>
  <!-- Left sub-bar (tier 2 left) -->
  <rect x="130" y="158" width="240" height="5" fill="#000000"/>
  <!-- Hanging from left sub-bar -->
  <line x1="160" y1="163" x2="160" y2="230" stroke="#000000" stroke-width="1.5"/>
  <circle cx="160" cy="260" r="30" fill="#E63946"/>
  <line x1="330" y1="163" x2="330" y2="210" stroke="#000000" stroke-width="1.5"/>
  <rect x="310" y="210" width="40" height="40" fill="#1D3557"/>
  <!-- Right branch from top bar -->
  <line x1="550" y1="84" x2="550" y2="140" stroke="#000000" stroke-width="2"/>
  <!-- Right sub-bar (tier 2 right) -->
  <rect x="460" y="138" width="200" height="5" fill="#000000"/>
  <!-- Hanging from right sub-bar -->
  <line x1="490" y1="143" x2="490" y2="200" stroke="#000000" stroke-width="1.5"/>
  <polygon points="490,200 465,250 515,250" fill="#F4D35E"/>
  <line x1="630" y1="143" x2="630" y2="190" stroke="#000000" stroke-width="1.5"/>
  <circle cx="630" cy="220" r="25" fill="#2A9D8F"/>
  <!-- Tier 3: sub-branch from left circle -->
  <line x1="160" y1="290" x2="160" y2="340" stroke="#000000" stroke-width="1.5"/>
  <rect x="80" y="338" width="160" height="4" fill="#000000"/>
  <line x1="100" y1="342" x2="100" y2="400" stroke="#000000" stroke-width="1.5"/>
  <rect x="80" y="400" width="40" height="40" fill="#E76F51"/>
  <line x1="220" y1="342" x2="220" y2="390" stroke="#000000" stroke-width="1.5"/>
  <polygon points="220,390 200,430 240,430" fill="#1D3557"/>
  <!-- Tier 3: sub-branch from right triangle -->
  <line x1="490" y1="250" x2="490" y2="310" stroke="#000000" stroke-width="1.5"/>
  <rect x="420" y="308" width="160" height="4" fill="#000000"/>
  <line x1="440" y1="312" x2="440" y2="380" stroke="#000000" stroke-width="1.5"/>
  <circle cx="440" cy="405" r="22" fill="#457B9D"/>
  <line x1="560" y1="312" x2="560" y2="360" stroke="#000000" stroke-width="1.5"/>
  <rect x="540" y="360" width="40" height="40" fill="#E63946" transform="rotate(45, 560, 380)"/>
  <!-- Tier 4: deeper elements -->
  <line x1="100" y1="440" x2="100" y2="500" stroke="#000000" stroke-width="1.5"/>
  <circle cx="100" cy="525" r="18" fill="#F4D35E"/>
  <line x1="440" y1="427" x2="440" y2="490" stroke="#000000" stroke-width="1.5"/>
  <rect x="410" y="488" width="60" height="4" fill="#000000"/>
  <line x1="420" y1="492" x2="420" y2="540" stroke="#000000" stroke-width="1"/>
  <polygon points="420,540 405,575 435,575" fill="#2A9D8F"/>
  <line x1="460" y1="492" x2="460" y2="550" stroke="#000000" stroke-width="1"/>
  <circle cx="460" cy="570" r="15" fill="#E76F51"/>
  <!-- Bottom decorative elements -->
  <line x1="630" y1="245" x2="630" y2="310" stroke="#000000" stroke-width="1.5"/>
  <rect x="600" y="308" width="60" height="4" fill="#000000"/>
  <line x1="610" y1="312" x2="610" y2="370" stroke="#000000" stroke-width="1"/>
  <circle cx="610" cy="390" r="16" fill="#F4D35E"/>
  <line x1="650" y1="312" x2="650" y2="355" stroke="#000000" stroke-width="1"/>
  <rect x="636" y="355" width="28" height="28" fill="#000000"/>
</svg>