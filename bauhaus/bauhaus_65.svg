<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Suspension - Geometric mobile/kinetic sculpture hanging from top -->

  <!-- Top mounting bar -->
  <rect x="100" y="30" width="600" height="12" fill="#000000"/>

  <!-- Main suspension wire from center -->
  <line x1="400" y1="42" x2="400" y2="160" stroke="#000000" stroke-width="2"/>

  <!-- Primary horizontal bar -->
  <rect x="200" y="158" width="400" height="8" fill="#000000"/>

  <!-- Left branch from primary bar -->
  <line x1="250" y1="166" x2="250" y2="280" stroke="#000000" stroke-width="1.5"/>
  <!-- Red circle hanging -->
  <circle cx="250" cy="310" r="40" fill="#E63946"/>

  <!-- Left sub-bar -->
  <line x1="250" y1="350" x2="250" y2="400" stroke="#000000" stroke-width="1"/>
  <rect x="210" y="398" width="80" height="5" fill="#000000"/>
  <!-- Small shapes hanging from sub-bar -->
  <line x1="225" y1="403" x2="225" y2="470" stroke="#000000" stroke-width="1"/>
  <rect x="205" y="470" width="40" height="40" fill="#F4D35E"/>
  <line x1="275" y1="403" x2="275" y2="490" stroke="#000000" stroke-width="1"/>
  <polygon points="260,490 290,490 275,530" fill="#2A9D8F"/>

  <!-- Right branch from primary bar -->
  <line x1="550" y1="166" x2="550" y2="240" stroke="#000000" stroke-width="1.5"/>
  <!-- Secondary horizontal bar on right -->
  <rect x="470" y="238" width="160" height="6" fill="#000000"/>

  <!-- Right-left hanging -->
  <line x1="500" y1="244" x2="500" y2="340" stroke="#000000" stroke-width="1"/>
  <rect x="470" y="340" width="60" height="60" fill="#1D3557"/>

  <!-- Right-right hanging -->
  <line x1="600" y1="244" x2="600" y2="310" stroke="#000000" stroke-width="1"/>
  <!-- Tertiary bar -->
  <rect x="555" y="308" width="90" height="5" fill="#000000"/>

  <line x1="570" y1="313" x2="570" y2="400" stroke="#000000" stroke-width="1"/>
  <circle cx="570" cy="420" r="25" fill="#E76F51"/>

  <line x1="630" y1="313" x2="630" y2="380" stroke="#000000" stroke-width="1"/>
  <polygon points="610,380 650,380 630,420" fill="#F4D35E"/>

  <!-- Center hanging from primary bar -->
  <line x1="400" y1="166" x2="400" y2="300" stroke="#000000" stroke-width="1.5"/>
  <polygon points="370,300 430,300 400,370" fill="#000000"/>

  <!-- Additional hanging from center triangle -->
  <line x1="400" y1="370" x2="400" y2="430" stroke="#000000" stroke-width="1"/>
  <circle cx="400" cy="450" r="25" fill="#2A9D8F"/>

  <!-- Far left wire from top bar -->
  <line x1="130" y1="42" x2="130" y2="200" stroke="#000000" stroke-width="1.5"/>
  <rect x="110" y="198" width="40" height="5" fill="#000000"/>
  <line x1="120" y1="203" x2="120" y2="300" stroke="#000000" stroke-width="1"/>
  <circle cx="120" cy="320" r="22" fill="#F4D35E"/>
  <line x1="145" y1="203" x2="145" y2="270" stroke="#000000" stroke-width="1"/>
  <rect x="130" y="270" width="30" height="30" fill="#E63946" transform="rotate(45, 145, 285)"/>

  <!-- Far right wire from top bar -->
  <line x1="670" y1="42" x2="670" y2="180" stroke="#000000" stroke-width="1.5"/>
  <polygon points="650,180 690,180 670,240" fill="#1D3557"/>
  <line x1="670" y1="240" x2="670" y2="290" stroke="#000000" stroke-width="1"/>
  <circle cx="670" cy="310" r="18" fill="#E63946" opacity="0.8"/>

  <!-- Subtle shadow/ground line -->
  <ellipse cx="400" cy="750" rx="300" ry="8" fill="#000000" opacity="0.1"/>

  <!-- Small decorative dots along top bar -->
  <circle cx="150" cy="36" r="4" fill="#E63946"/>
  <circle cx="300" cy="36" r="4" fill="#F4D35E"/>
  <circle cx="400" cy="36" r="4" fill="#2A9D8F"/>
  <circle cx="500" cy="36" r="4" fill="#1D3557"/>
  <circle cx="650" cy="36" r="4" fill="#E76F51"/>
