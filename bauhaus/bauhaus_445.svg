<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background: Cream -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle diagonal grid lines suggesting flow direction -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#264653" stroke-width="0.5" opacity="0.08"/>
  <line x1="-200" y1="0" x2="600" y2="800" stroke="#264653" stroke-width="0.5" opacity="0.06"/>
  <line x1="200" y1="0" x2="800" y2="600" stroke="#264653" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="200" x2="600" y2="800" stroke="#264653" stroke-width="0.5" opacity="0.05"/>
  <line x1="400" y1="0" x2="800" y2="400" stroke="#264653" stroke-width="0.5" opacity="0.05"/>

  <!-- FLOW: upper-left to lower-right -->

  <!-- Large leading hexagon - upper left, Blue -->
  <polygon points="80,60 200,60 260,160 200,260 80,260 20,160" fill="#1D3557" stroke="#000000" stroke-width="2"/>

  <!-- Pentagon next in stream - Teal -->
  <polygon points="220,100 340,80 400,180 330,260 210,240" fill="#2A9D8F" stroke="#000000" stroke-width="1.5" opacity="0.95"/>

  <!-- Irregular quad - Steel Blue -->
  <polygon points="330,50 470,70 450,180 300,160" fill="#457B9D" stroke="#000000" stroke-width="1.5" opacity="0.9"/>

  <!-- Hexagon mid-upper - Teal lighter -->
  <polygon points="450,30 560,30 615,120 560,210 450,210 395,120" fill="#2A9D8F" stroke="#000000" stroke-width="2" opacity="0.85"/>

  <!-- Pentagon - Orange accent -->
  <polygon points="560,80 670,100 700,210 610,270 530,200" fill="#E76F51" stroke="#000000" stroke-width="1.5"/>

  <!-- Large irregular quad - Blue, center-left -->
  <polygon points="100,280 280,250 320,400 130,430" fill="#1D3557" stroke="#000000" stroke-width="2" opacity="0.9"/>

  <!-- Pentagon - Red accent -->
  <polygon points="260,310 400,280 450,370 390,450 250,440" fill="#E63946" stroke="#000000" stroke-width="1.5"/>

  <!-- Hexagon center - Teal -->
  <polygon points="390,260 510,260 570,360 510,460 390,460 330,360" fill="#2A9D8F" stroke="#000000" stroke-width="2" opacity="0.88"/>

  <!-- Irregular quad - Steel Blue -->
  <polygon points="530,290 670,270 700,380 560,420" fill="#457B9D" stroke="#000000" stroke-width="1.5" opacity="0.9"/>

  <!-- Pentagon upper-right -->
  <polygon points="660,160 770,190 790,310 700,360 630,280" fill="#1D3557" stroke="#000000" stroke-width="2" opacity="0.85"/>

  <!-- Smaller orange pentagon -->
  <polygon points="700,400 780,420 790,510 720,550 660,490" fill="#E76F51" stroke="#000000" stroke-width="1.5" opacity="0.9"/>

  <!-- Irregular quad - Blue, lower center-right -->
  <polygon points="530,460 680,440 710,570 560,600" fill="#1D3557" stroke="#000000" stroke-width="2" opacity="0.88"/>

  <!-- Pentagon - Teal, lower -->
  <polygon points="380,500 510,480 550,590 470,660 360,620" fill="#2A9D8F" stroke="#000000" stroke-width="1.5" opacity="0.9"/>

  <!-- Hexagon - Steel Blue lower right -->
  <polygon points="620,620 720,620 770,710 720,800 620,800 570,710" fill="#457B9D" stroke="#000000" stroke-width="2"/>

  <!-- Irregular quad - lower left area -->
  <polygon points="140,480 290,460 310,580 150,610" fill="#2A9D8F" stroke="#000000" stroke-width="1.5" opacity="0.85"/>

  <!-- Red pentagon lower left -->
  <polygon points="60,560 190,540 220,650 150,720 50,680" fill="#E63946" stroke="#000000" stroke-width="1.5"/>

  <!-- Pentagon lower center -->
  <polygon points="280,660 420,640 450,750 380,800 260,780" fill="#1D3557" stroke="#000000" stroke-width="2" opacity="0.9"/>

  <!-- Small orange accent quad -->
  <polygon points="460,700 560,690 570,760 470,770" fill="#E76F51" stroke="#000000" stroke-width="1" opacity="0.85"/>

  <!-- Small teal pentagon top area -->
  <polygon points="155,140 235,130 260,200 210,250 145,220" fill="#2A9D8F" stroke="#000000" stroke-width="1" opacity="0.7"/>

  <!-- Accent: small red quad -->
  <polygon points="680,60 740,70 750,130 685,120" fill="#E63946" stroke="#000000" stroke-width="1" opacity="0.8"/>

  <!-- Thin black outline lines tracing the flow direction -->
  <line x1="80" y1="160" x2="750" y2="710" stroke="#000000" stroke-width="1.5" opacity="0.12"/>
  <line x1="140" y1="60" x2="780" y2="650" stroke="#000000" stroke-width="1" opacity="0.08"/>

  <!-- Small corner accent -->
  <rect x="10" y="10" width="28" height="5" fill="#1D3557" opacity="0.4"/>
  <rect x="10" y="10" width="5" height="28" fill="#1D3557" opacity="0.4"/>
  <rect x="762" y="785" width="28" height="5" fill="#1D3557" opacity="0.4"/>
  <rect x="785" y="762" width="5" height="28" fill="#1D3557" opacity="0.4"/>
</svg>
