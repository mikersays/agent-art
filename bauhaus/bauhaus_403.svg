<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle background horizontal grid lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.07"/>

  <!-- Tall narrow rectangles - varying heights, like a bar chart -->
  <!-- Bar 1: Blue, x=50, bottom at y=720 -->
  <rect x="50" y="220" width="60" height="500" fill="#1D3557" opacity="0.9"/>
  <!-- Bar 2: Red, x=130, shorter -->
  <rect x="130" y="350" width="60" height="370" fill="#E63946" opacity="0.9"/>
  <!-- Bar 3: Yellow, x=210, tall -->
  <rect x="210" y="160" width="60" height="560" fill="#F4D35E" opacity="0.9"/>
  <!-- Bar 4: Teal, x=290, medium -->
  <rect x="290" y="280" width="60" height="440" fill="#2A9D8F" opacity="0.9"/>
  <!-- Bar 5: Blue, x=370, shorter -->
  <rect x="370" y="400" width="60" height="320" fill="#1D3557" opacity="0.85"/>
  <!-- Bar 6: Red, x=450, tall -->
  <rect x="450" y="130" width="60" height="590" fill="#E63946" opacity="0.85"/>
  <!-- Bar 7: Yellow, x=530, medium -->
  <rect x="530" y="310" width="60" height="410" fill="#F4D35E" opacity="0.9"/>
  <!-- Bar 8: Teal, x=610, taller -->
  <rect x="610" y="200" width="60" height="520" fill="#2A9D8F" opacity="0.9"/>
  <!-- Bar 9: Blue, x=690, medium-short -->
  <rect x="690" y="360" width="60" height="360" fill="#1D3557" opacity="0.85"/>

  <!-- Thin horizontal lines connecting tops of bars -->
  <line x1="50" y1="220" x2="110" y2="220" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="350" x2="190" y2="350" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="210" y1="160" x2="270" y2="160" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="290" y1="280" x2="350" y2="280" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="370" y1="400" x2="430" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="450" y1="130" x2="510" y2="130" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="530" y1="310" x2="590" y2="310" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="610" y1="200" x2="670" y2="200" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="690" y1="360" x2="750" y2="360" stroke="#000000" stroke-width="1.5" opacity="0.5"/>

  <!-- Connecting skyline line across bar tops -->
  <polyline points="80,220 160,350 240,160 320,280 400,400 480,130 560,310 640,200 720,360" fill="none" stroke="#000000" stroke-width="2" opacity="0.35"/>

  <!-- Ground line -->
  <line x1="30" y1="720" x2="770" y2="720" stroke="#000000" stroke-width="2.5" opacity="0.6"/>

  <!-- Small circles floating above each bar -->
  <circle cx="80" cy="195" r="11" fill="#F4D35E" stroke="#000000" stroke-width="1.5" opacity="0.95"/>
  <circle cx="160" cy="325" r="9" fill="#2A9D8F" stroke="#000000" stroke-width="1.5" opacity="0.9"/>
  <circle cx="240" cy="135" r="13" fill="#E63946" stroke="#000000" stroke-width="1.5" opacity="0.95"/>
  <circle cx="320" cy="255" r="10" fill="#F4D35E" stroke="#000000" stroke-width="1.5" opacity="0.9"/>
  <circle cx="400" cy="375" r="8" fill="#1D3557" stroke="#000000" stroke-width="1" opacity="0.9"/>
  <circle cx="480" cy="105" r="14" fill="#2A9D8F" stroke="#000000" stroke-width="1.5" opacity="0.95"/>
  <circle cx="560" cy="285" r="10" fill="#E63946" stroke="#000000" stroke-width="1.5" opacity="0.9"/>
  <circle cx="640" cy="175" r="12" fill="#F4D35E" stroke="#000000" stroke-width="1.5" opacity="0.95"/>
  <circle cx="720" cy="335" r="9" fill="#2A9D8F" stroke="#000000" stroke-width="1.5" opacity="0.9"/>

  <!-- Thin vertical accent lines between bars -->
  <line x1="120" y1="200" x2="120" y2="720" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="200" x2="200" y2="720" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <line x1="280" y1="200" x2="280" y2="720" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <line x1="360" y1="200" x2="360" y2="720" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <line x1="440" y1="200" x2="440" y2="720" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <line x1="520" y1="200" x2="520" y2="720" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="200" x2="600" y2="720" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <line x1="680" y1="200" x2="680" y2="720" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
</svg>
