<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Surface / sky area -->
  <rect x="0" y="0" width="800" height="80" fill="#457B9D" opacity="0.3"/>
  <line x1="0" y1="80" x2="800" y2="80" stroke="#000000" stroke-width="3"/>

  <!-- Strata Layer 1: Topsoil - warm gray -->
  <rect x="0" y="80" width="800" height="60" fill="#A89F91"/>
  <rect x="0" y="100" width="800" height="15" fill="#A89F91" opacity="0.7"/>
  <!-- Pebbles -->
  <circle cx="100" cy="100" r="5" fill="#000000" opacity="0.3"/>
  <circle cx="300" cy="110" r="4" fill="#000000" opacity="0.25"/>
  <circle cx="550" cy="95" r="6" fill="#000000" opacity="0.2"/>
  <circle cx="700" cy="115" r="3" fill="#000000" opacity="0.3"/>

  <!-- Strata Layer 2: Sandy layer - yellow -->
  <rect x="0" y="140" width="800" height="70" fill="#F4D35E"/>
  <rect x="0" y="155" width="800" height="8" fill="#F4D35E" opacity="0.6"/>
  <!-- Subtle grain lines -->
  <line x1="0" y1="160" x2="800" y2="162" stroke="#000000" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="180" x2="800" y2="178" stroke="#000000" stroke-width="0.5" opacity="0.15"/>

  <!-- Strata Layer 3: Red clay -->
  <rect x="0" y="210" width="800" height="80" fill="#E63946"/>
  <line x1="0" y1="230" x2="800" y2="232" stroke="#6D2E46" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="250" x2="800" y2="248" stroke="#6D2E46" stroke-width="1.5" opacity="0.3"/>
  <line x1="0" y1="270" x2="800" y2="272" stroke="#6D2E46" stroke-width="1" opacity="0.4"/>

  <!-- Fossil 1: Trilobite-like geometric form in red clay -->
  <g transform="translate(180, 245)">
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="#000000" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="25" ry="14" fill="#A89F91" opacity="0.5"/>
    <line x1="-20" y1="-5" x2="-20" y2="5" stroke="#000000" stroke-width="1.5"/>
    <line x1="-10" y1="-10" x2="-10" y2="10" stroke="#000000" stroke-width="1.5"/>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#000000" stroke-width="1.5"/>
    <line x1="10" y1="-10" x2="10" y2="10" stroke="#000000" stroke-width="1.5"/>
    <line x1="20" y1="-5" x2="20" y2="5" stroke="#000000" stroke-width="1.5"/>
  </g>

  <!-- Strata Layer 4: Dark blue dense rock -->
  <rect x="0" y="290" width="800" height="90" fill="#1D3557"/>
  <line x1="0" y1="310" x2="800" y2="312" stroke="#457B9D" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="340" x2="800" y2="338" stroke="#457B9D" stroke-width="1.5" opacity="0.25"/>
  <line x1="0" y1="360" x2="800" y2="362" stroke="#457B9D" stroke-width="1" opacity="0.3"/>

  <!-- Fossil 2: Ammonite spiral in blue layer -->
  <g transform="translate(550, 335)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="5" fill="#FFFFFF" opacity="0.3"/>
    <path d="M0,-22 Q25,-10 22,0" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Strata Layer 5: Thin white chalk line -->
  <rect x="0" y="380" width="800" height="15" fill="#FFFFFF"/>
  <line x1="0" y1="380" x2="800" y2="380" stroke="#A89F91" stroke-width="1"/>
  <line x1="0" y1="395" x2="800" y2="395" stroke="#A89F91" stroke-width="1"/>

  <!-- Strata Layer 6: Burgundy -->
  <rect x="0" y="395" width="800" height="75" fill="#6D2E46"/>
  <line x1="0" y1="415" x2="800" y2="417" stroke="#000000" stroke-width="0.8" opacity="0.3"/>
  <line x1="0" y1="440" x2="800" y2="438" stroke="#000000" stroke-width="1" opacity="0.25"/>

  <!-- Fossil 3: Geometric fish skeleton -->
  <g transform="translate(350, 430)">
    <polygon points="-30,0 0,-12 30,0 0,12" fill="#FFFFFF" opacity="0.4"/>
    <line x1="-25" y1="0" x2="25" y2="0" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="-15" y1="-8" x2="-15" y2="8" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <line x1="-5" y1="-10" x2="-5" y2="10" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <line x1="5" y1="-10" x2="5" y2="10" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <line x1="15" y1="-8" x2="15" y2="8" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <circle cx="-22" cy="-4" r="2" fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- Strata Layer 7: Steel blue -->
  <rect x="0" y="470" width="800" height="70" fill="#457B9D"/>
  <line x1="0" y1="490" x2="800" y2="492" stroke="#1D3557" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="510" x2="800" y2="508" stroke="#1D3557" stroke-width="1.5" opacity="0.25"/>

  <!-- Strata Layer 8: Yellow-gray mix -->
  <rect x="0" y="540" width="800" height="50" fill="#F4D35E" opacity="0.7"/>
  <rect x="0" y="540" width="800" height="50" fill="#A89F91" opacity="0.3"/>

  <!-- Fossil 4: Geometric leaf/fern -->
  <g transform="translate(650, 560)">
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#000000" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-12" x2="12" y2="-18" stroke="#000000" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="-6" x2="14" y2="-10" stroke="#000000" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="0" x2="15" y2="-2" stroke="#000000" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="6" x2="12" y2="4" stroke="#000000" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="-9" x2="-10" y2="-15" stroke="#000000" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="-3" x2="-12" y2="-7" stroke="#000000" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="3" x2="-13" y2="1" stroke="#000000" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="9" x2="-10" y2="7" stroke="#000000" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Strata Layer 9: Red again, deeper -->
  <rect x="0" y="590" width="800" height="60" fill="#E63946" opacity="0.8"/>
  <line x1="0" y1="610" x2="800" y2="612" stroke="#6D2E46" stroke-width="1" opacity="0.3"/>

  <!-- Strata Layer 10: Deep black/dark -->
  <rect x="0" y="650" width="800" height="60" fill="#000000" opacity="0.8"/>
  <line x1="0" y1="670" x2="800" y2="668" stroke="#1D3557" stroke-width="1" opacity="0.4"/>

  <!-- Strata Layer 11: Deep blue bedrock -->
  <rect x="0" y="710" width="800" height="90" fill="#1D3557"/>

  <!-- === FAULT LINE 1: Major diagonal fault === -->
  <line x1="300" y1="80" x2="340" y2="800" stroke="#000000" stroke-width="4"/>
  <!-- Offset indicators -->
  <line x1="295" y1="200" x2="275" y2="200" stroke="#000000" stroke-width="2"/>
  <line x1="310" y1="210" x2="330" y2="210" stroke="#000000" stroke-width="2"/>
  <!-- Displacement fill along fault -->
  <polygon points="300,80 340,800 345,800 305,80" fill="#000000" opacity="0.3"/>

  <!-- === FAULT LINE 2: Secondary fault === -->
  <line x1="600" y1="290" x2="630" y2="800" stroke="#000000" stroke-width="3"/>
  <polygon points="600,290 630,800 634,800 604,290" fill="#A89F91" opacity="0.2"/>

  <!-- === FAULT LINE 3: Small fracture === -->
  <line x1="480" y1="395" x2="500" y2="650" stroke="#000000" stroke-width="2" opacity="0.7"/>

  <!-- Fossil 5: Geometric crystal/diamond in dark layer -->
  <g transform="translate(150, 675)">
    <polygon points="0,-15 12,0 0,15 -12,0" fill="none" stroke="#F4D35E" stroke-width="2" opacity="0.6"/>
    <polygon points="0,-8 6,0 0,8 -6,0" fill="#F4D35E" opacity="0.3"/>
  </g>

  <!-- Fossil 6: Circle fossil in deep blue -->
  <g transform="translate(450, 740)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.25"/>
    <circle cx="0" cy="0" r="6" fill="#FFFFFF" opacity="0.15"/>
  </g>

  <!-- Surface features -->
  <!-- Tree/plant geometric symbols -->
  <polygon points="50,80 55,50 60,80" fill="#000000" opacity="0.5"/>
  <rect x="53" y="60" width="4" height="20" fill="#000000" opacity="0.5"/>
  <polygon points="720,80 728,45 736,80" fill="#000000" opacity="0.4"/>

  <!-- Scale bar at bottom-right -->
  <line x1="600" y1="780" x2="750" y2="780" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="600" y1="775" x2="600" y2="785" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="675" y1="775" x2="675" y2="785" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="750" y1="775" x2="750" y2="785" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Border frame -->
  <rect x="0" y="0" width="800" height="800" fill="none" stroke="#000000" stroke-width="4"/>
</svg>