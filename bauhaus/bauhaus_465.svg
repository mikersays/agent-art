<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background white -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>
  <!-- Underlying square grid in steel blue at 0.1 opacity -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>
  <!-- Large forest green rectangle anchoring bottom -->
  <rect x="100" y="620" width="600" height="140" fill="#264653" opacity="0.85"/>
  <!-- Diamond matrix - rotated squares at various positions and sizes -->
  <!-- Large red diamond -->
  <rect x="-60" y="-60" width="120" height="120" fill="#E63946" opacity="0.8" transform="translate(200, 200) rotate(45)"/>
  <!-- Large blue diamond -->
  <rect x="-70" y="-70" width="140" height="140" fill="#1D3557" opacity="0.75" transform="translate(500, 300) rotate(45)"/>
  <!-- Medium yellow diamond -->
  <rect x="-50" y="-50" width="100" height="100" fill="#F4D35E" opacity="0.85" transform="translate(350, 450) rotate(45)"/>
  <!-- Medium black diamond -->
  <rect x="-45" y="-45" width="90" height="90" fill="#000000" opacity="0.7" transform="translate(600, 150) rotate(45)"/>
  <!-- Teal diamond -->
  <rect x="-40" y="-40" width="80" height="80" fill="#2A9D8F" opacity="0.8" transform="translate(150, 450) rotate(45)"/>
  <!-- Orange diamond -->
  <rect x="-35" y="-35" width="70" height="70" fill="#E76F51" opacity="0.8" transform="translate(650, 500) rotate(45)"/>
  <!-- Small red diamond -->
  <rect x="-25" y="-25" width="50" height="50" fill="#E63946" opacity="0.75" transform="translate(400, 150) rotate(45)"/>
  <!-- Small blue diamond -->
  <rect x="-22" y="-22" width="44" height="44" fill="#1D3557" opacity="0.8" transform="translate(300, 300) rotate(45)"/>
  <!-- Small yellow diamond -->
  <rect x="-20" y="-20" width="40" height="40" fill="#F4D35E" opacity="0.85" transform="translate(550, 450) rotate(45)"/>
  <!-- Tiny black diamond -->
  <rect x="-15" y="-15" width="30" height="30" fill="#000000" opacity="0.65" transform="translate(200, 550) rotate(45)"/>
  <!-- Tiny teal diamond -->
  <rect x="-12" y="-12" width="24" height="24" fill="#2A9D8F" opacity="0.75" transform="translate(700, 300) rotate(45)"/>
  <!-- Tiny orange diamond -->
  <rect x="-14" y="-14" width="28" height="28" fill="#E76F51" opacity="0.7" transform="translate(100, 300) rotate(45)"/>
  <!-- More scattered small diamonds -->
  <rect x="-10" y="-10" width="20" height="20" fill="#E63946" opacity="0.6" transform="translate(450, 550) rotate(45)"/>
  <rect x="-10" y="-10" width="20" height="20" fill="#1D3557" opacity="0.6" transform="translate(250, 100) rotate(45)"/>
  <rect x="-8" y="-8" width="16" height="16" fill="#F4D35E" opacity="0.7" transform="translate(650, 650) rotate(45)"/>
  <rect x="-10" y="-10" width="20" height="20" fill="#000000" opacity="0.5" transform="translate(500, 100) rotate(45)"/>
  <!-- Burgundy circles at grid intersections -->
  <circle cx="100" cy="100" r="6" fill="#6D2E46" opacity="0.8"/>
  <circle cx="200" cy="300" r="5" fill="#6D2E46" opacity="0.75"/>
  <circle cx="300" cy="500" r="6" fill="#6D2E46" opacity="0.8"/>
  <circle cx="400" cy="300" r="5" fill="#6D2E46" opacity="0.7"/>
  <circle cx="500" cy="500" r="6" fill="#6D2E46" opacity="0.75"/>
  <circle cx="600" cy="300" r="5" fill="#6D2E46" opacity="0.8"/>
  <circle cx="700" cy="100" r="6" fill="#6D2E46" opacity="0.7"/>
  <circle cx="100" cy="500" r="5" fill="#6D2E46" opacity="0.75"/>
  <circle cx="700" cy="500" r="6" fill="#6D2E46" opacity="0.8"/>
  <circle cx="400" cy="600" r="5" fill="#6D2E46" opacity="0.7"/>
  <!-- Accent elements on the forest rectangle -->
  <rect x="-12" y="-12" width="24" height="24" fill="#F4D35E" opacity="0.8" transform="translate(300, 680) rotate(45)"/>
  <rect x="-10" y="-10" width="20" height="20" fill="#E63946" opacity="0.75" transform="translate(500, 700) rotate(45)"/>
  <circle cx="400" cy="690" r="8" fill="#FFFFFF" opacity="0.6"/>
</svg>