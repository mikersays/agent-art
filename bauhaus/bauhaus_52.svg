<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#1D3557"/>

  <!-- Background color strips visible through blinds -->
  <rect x="0" y="0" width="800" height="200" fill="#E63946" opacity="0.6"/>
  <rect x="0" y="200" width="800" height="200" fill="#F4D35E" opacity="0.5"/>
  <rect x="0" y="400" width="800" height="200" fill="#457B9D" opacity="0.6"/>
  <rect x="0" y="600" width="800" height="200" fill="#A8DADC" opacity="0.4"/>

  <!-- Diagonal color blocks behind blinds -->
  <polygon points="100,0 400,0 200,800 0,800" fill="#F4D35E" opacity="0.3"/>
  <polygon points="500,0 700,0 600,800 400,800" fill="#E63946" opacity="0.25"/>

  <!-- Venetian blind slats - angled horizontal bars -->
  <!-- Slat 1 -->
  <polygon points="0,30 800,50 800,70 0,50" fill="#A89F91" stroke="#000000" stroke-width="1"/>
  <polygon points="0,50 800,70 800,75 0,55" fill="#000000" opacity="0.3"/>

  <!-- Slat 2 -->
  <polygon points="0,80 800,95 800,115 0,100" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <polygon points="0,100 800,115 800,120 0,105" fill="#000000" opacity="0.3"/>

  <!-- Slat 3 -->
  <polygon points="0,125 800,140 800,165 0,150" fill="#A89F91" stroke="#000000" stroke-width="1"/>
  <polygon points="0,150 800,165 800,170 0,155" fill="#000000" opacity="0.3"/>

  <!-- Slat 4 - wider gap here, more color shows -->
  <polygon points="0,185 800,195 800,220 0,210" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <polygon points="0,210 800,220 800,225 0,215" fill="#000000" opacity="0.3"/>

  <!-- Slat 5 -->
  <polygon points="0,240 800,255 800,275 0,260" fill="#A89F91" stroke="#000000" stroke-width="1"/>
  <polygon points="0,260 800,275 800,280 0,265" fill="#000000" opacity="0.3"/>

  <!-- Slat 6 -->
  <polygon points="0,285 800,298 800,320 0,307" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <polygon points="0,307 800,320 800,325 0,312" fill="#000000" opacity="0.3"/>

  <!-- Slat 7 - slightly more tilted -->
  <polygon points="0,340 800,360 800,385 0,365" fill="#A89F91" stroke="#000000" stroke-width="1"/>
  <polygon points="0,365 800,385 800,390 0,370" fill="#000000" opacity="0.3"/>

  <!-- Slat 8 -->
  <polygon points="0,395 800,408 800,430 0,417" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <polygon points="0,417 800,430 800,435 0,422" fill="#000000" opacity="0.3"/>

  <!-- Slat 9 -->
  <polygon points="0,445 800,455 800,480 0,470" fill="#A89F91" stroke="#000000" stroke-width="1"/>
  <polygon points="0,470 800,480 800,485 0,475" fill="#000000" opacity="0.3"/>

  <!-- Slat 10 -->
  <polygon points="0,495 800,510 800,535 0,520" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <polygon points="0,520 800,535 800,540 0,525" fill="#000000" opacity="0.3"/>

  <!-- Slat 11 -->
  <polygon points="0,548 800,558 800,580 0,570" fill="#A89F91" stroke="#000000" stroke-width="1"/>
  <polygon points="0,570 800,580 800,585 0,575" fill="#000000" opacity="0.3"/>

  <!-- Slat 12 -->
  <polygon points="0,598 800,612 800,635 0,621" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <polygon points="0,621 800,635 800,640 0,626" fill="#000000" opacity="0.3"/>

  <!-- Slat 13 -->
  <polygon points="0,650 800,660 800,685 0,675" fill="#A89F91" stroke="#000000" stroke-width="1"/>
  <polygon points="0,675 800,685 800,690 0,680" fill="#000000" opacity="0.3"/>

  <!-- Slat 14 -->
  <polygon points="0,700 800,715 800,738 0,723" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <polygon points="0,723 800,738 800,743 0,728" fill="#000000" opacity="0.3"/>

  <!-- Slat 15 -->
  <polygon points="0,752 800,760 800,785 0,777" fill="#A89F91" stroke="#000000" stroke-width="1"/>
  <polygon points="0,777 800,785 800,790 0,782" fill="#000000" opacity="0.3"/>

  <!-- Vertical cord strings -->
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="2"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="2"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="2"/>

  <!-- Cord knots at each slat intersection -->
  <g fill="#000000">
    <circle cx="200" cy="40" r="3"/>
    <circle cx="200" cy="90" r="3"/>
    <circle cx="200" cy="138" r="3"/>
    <circle cx="200" cy="198" r="3"/>
    <circle cx="200" cy="250" r="3"/>
    <circle cx="200" cy="296" r="3"/>
    <circle cx="200" cy="353" r="3"/>
    <circle cx="200" cy="406" r="3"/>
    <circle cx="200" cy="458" r="3"/>
    <circle cx="200" cy="508" r="3"/>
    <circle cx="200" cy="559" r="3"/>
    <circle cx="200" cy="610" r="3"/>
    <circle cx="200" cy="663" r="3"/>
    <circle cx="200" cy="712" r="3"/>
    <circle cx="200" cy="765" r="3"/>
    <circle cx="400" cy="45" r="3"/>
    <circle cx="400" cy="95" r="3"/>
    <circle cx="400" cy="142" r="3"/>
    <circle cx="400" cy="202" r="3"/>
    <circle cx="400" cy="254" r="3"/>
    <circle cx="400" cy="302" r="3"/>
    <circle cx="400" cy="360" r="3"/>
    <circle cx="400" cy="412" r="3"/>
    <circle cx="400" cy="462" r="3"/>
    <circle cx="400" cy="515" r="3"/>
    <circle cx="400" cy="563" r="3"/>
    <circle cx="400" cy="618" r="3"/>
    <circle cx="400" cy="668" r="3"/>
    <circle cx="400" cy="720" r="3"/>
    <circle cx="400" cy="770" r="3"/>
    <circle cx="600" cy="50" r="3"/>
    <circle cx="600" cy="100" r="3"/>
    <circle cx="600" cy="147" r="3"/>
    <circle cx="600" cy="207" r="3"/>
    <circle cx="600" cy="258" r="3"/>
    <circle cx="600" cy="308" r="3"/>
    <circle cx="600" cy="367" r="3"/>
    <circle cx="600" cy="418" r="3"/>
    <circle cx="600" cy="467" r="3"/>
    <circle cx="600" cy="520" r="3"/>
    <circle cx="600" cy="568" r="3"/>
    <circle cx="600" cy="625" r="3"/>
    <circle cx="600" cy="673" r="3"/>
    <circle cx="600" cy="727" r="3"/>
    <circle cx="600" cy="775" r="3"/>
  </g>

  <!-- Valance bar at top -->
  <rect x="0" y="0" width="800" height="25" fill="#000000"/>
  <rect x="0" y="0" width="800" height="20" fill="#A89F91"/>
  <rect x="0" y="0" width="800" height="5" fill="#FFFFFF" opacity="0.3"/>

  <!-- Light glow effects showing through gaps -->
  <rect x="50" y="160" width="700" height="18" fill="#F4D35E" opacity="0.25" rx="2"/>
  <rect x="50" y="225" width="700" height="12" fill="#E63946" opacity="0.2" rx="2"/>
  <rect x="50" y="325" width="700" height="12" fill="#F4D35E" opacity="0.2" rx="2"/>
  <rect x="50" y="435" width="700" height="8" fill="#A8DADC" opacity="0.25" rx="2"/>
  <rect x="50" y="538" width="700" height="8" fill="#F4D35E" opacity="0.2" rx="2"/>
  <rect x="50" y="638" width="700" height="8" fill="#E63946" opacity="0.2" rx="2"/>
  <rect x="50" y="740" width="700" height="8" fill="#457B9D" opacity="0.25" rx="2"/>

  <!-- Silhouette visible through blinds - geometric Bauhaus circle -->
  <circle cx="400" cy="400" r="120" fill="none" stroke="#000000" stroke-width="6" opacity="0.15"/>
  <circle cx="400" cy="400" r="80" fill="none" stroke="#E63946" stroke-width="4" opacity="0.12"/>
  <rect x="360" y="360" width="80" height="80" fill="none" stroke="#000000" stroke-width="4" opacity="0.1" transform="rotate(45 400 400)"/>
</svg>