<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Radiating lines from center -->
  <line x1="400" y1="400" x2="0" y2="0" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="800" y2="0" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="800" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="0" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="400" y2="0" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="0" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <!-- Outer large rectangles (edges) -->
  <rect x="10" y="10" width="180" height="120" fill="#1D3557" opacity="0.7"/>
  <rect x="610" y="10" width="180" height="120" fill="#E63946" opacity="0.7"/>
  <rect x="10" y="670" width="180" height="120" fill="#E63946" opacity="0.7"/>
  <rect x="610" y="670" width="180" height="120" fill="#1D3557" opacity="0.7"/>
  <!-- Mid rectangles (compressing inward) -->
  <rect x="130" y="160" width="120" height="80" fill="#1D3557" opacity="0.55"/>
  <rect x="550" y="160" width="120" height="80" fill="#E63946" opacity="0.55"/>
  <rect x="130" y="560" width="120" height="80" fill="#E63946" opacity="0.55"/>
  <rect x="550" y="560" width="120" height="80" fill="#1D3557" opacity="0.55"/>
  <!-- Smaller rectangles closer to center -->
  <rect x="240" y="270" width="80" height="55" fill="#1D3557" opacity="0.45"/>
  <rect x="480" y="270" width="80" height="55" fill="#E63946" opacity="0.45"/>
  <rect x="240" y="475" width="80" height="55" fill="#E63946" opacity="0.45"/>
  <rect x="480" y="475" width="80" height="55" fill="#1D3557" opacity="0.45"/>
  <!-- Inward pointing arrows (triangles) -->
  <polygon points="60,400 120,375 120,425" fill="#F4D35E" opacity="0.9"/>
  <polygon points="740,400 680,375 680,425" fill="#F4D35E" opacity="0.9"/>
  <polygon points="400,60 375,120 425,120" fill="#F4D35E" opacity="0.9"/>
  <polygon points="400,740 375,680 425,680" fill="#F4D35E" opacity="0.9"/>
  <!-- Diagonal arrows -->
  <polygon points="150,150 190,170 170,190" fill="#000000" opacity="0.6"/>
  <polygon points="650,150 610,170 630,190" fill="#000000" opacity="0.6"/>
  <polygon points="150,650 190,630 170,610" fill="#000000" opacity="0.6"/>
  <polygon points="650,650 610,630 630,610" fill="#000000" opacity="0.6"/>
  <!-- Central dense cluster -->
  <rect x="370" y="370" width="60" height="60" fill="#1D3557" opacity="0.8"/>
  <rect x="380" y="380" width="40" height="40" fill="#E63946" opacity="0.85"/>
  <circle cx="400" cy="400" r="25" fill="#F4D35E" opacity="0.9"/>
  <circle cx="400" cy="400" r="12" fill="#000000" opacity="0.8"/>
  <rect x="360" y="395" width="80" height="10" fill="#000000" opacity="0.3"/>
  <rect x="395" y="360" width="10" height="80" fill="#000000" opacity="0.3"/>
  <!-- Small shapes in cluster area -->
  <circle cx="355" cy="355" r="6" fill="#E63946"/>
  <circle cx="445" cy="355" r="6" fill="#1D3557"/>
  <circle cx="355" cy="445" r="6" fill="#1D3557"/>
  <circle cx="445" cy="445" r="6" fill="#E63946"/>
  <rect x="388" y="345" width="8" height="8" fill="#F4D35E"/>
  <rect x="388" y="447" width="8" height="8" fill="#F4D35E"/>
  <rect x="345" y="392" width="8" height="8" fill="#F4D35E"/>
  <rect x="447" y="392" width="8" height="8" fill="#F4D35E"/>
  <!-- Pressure lines -->
  <line x1="200" y1="350" x2="340" y2="390" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="200" y1="450" x2="340" y2="410" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="600" y1="350" x2="460" y2="390" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="600" y1="450" x2="460" y2="410" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
</svg>