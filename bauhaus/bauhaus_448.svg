<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background: White -->
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Lead-line grid (black borders for the "glass" sections) -->
  <!-- Vertical lead lines -->
  <line x1="160" y1="0" x2="160" y2="800" stroke="#000000" stroke-width="3"/>
  <line x1="340" y1="0" x2="340" y2="800" stroke="#000000" stroke-width="3"/>
  <line x1="520" y1="0" x2="520" y2="800" stroke="#000000" stroke-width="3"/>
  <line x1="680" y1="0" x2="680" y2="800" stroke="#000000" stroke-width="3"/>
  <!-- Horizontal lead lines -->
  <line x1="0" y1="140" x2="800" y2="140" stroke="#000000" stroke-width="3"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#000000" stroke-width="3"/>
  <line x1="0" y1="480" x2="800" y2="480" stroke="#000000" stroke-width="3"/>
  <line x1="0" y1="650" x2="800" y2="650" stroke="#000000" stroke-width="3"/>
  <!-- Diagonal lead lines -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="2.5"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#000000" stroke-width="2.5"/>
  <line x1="0" y1="400" x2="400" y2="0" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="800" x2="800" y2="400" stroke="#000000" stroke-width="2"/>

  <!-- Stained glass panels: large overlapping translucent rectangles -->
  <!-- Blue panes -->
  <rect x="0" y="0" width="360" height="320" fill="#1D3557" opacity="0.25"/>
  <rect x="160" y="140" width="380" height="340" fill="#1D3557" opacity="0.2"/>
  <rect x="440" y="460" width="360" height="340" fill="#1D3557" opacity="0.28"/>
  <rect x="0" y="480" width="200" height="320" fill="#457B9D" opacity="0.3"/>
  <rect x="520" y="0" width="280" height="300" fill="#457B9D" opacity="0.22"/>

  <!-- Red panes -->
  <rect x="160" y="0" width="360" height="300" fill="#E63946" opacity="0.22"/>
  <rect x="0" y="300" width="340" height="360" fill="#E63946" opacity="0.2"/>
  <rect x="500" y="140" width="300" height="340" fill="#E63946" opacity="0.25"/>
  <rect x="340" y="480" width="340" height="320" fill="#E63946" opacity="0.18"/>

  <!-- Yellow panes -->
  <rect x="0" y="140" width="340" height="340" fill="#F4D35E" opacity="0.3"/>
  <rect x="340" y="300" width="360" height="360" fill="#F4D35E" opacity="0.25"/>
  <rect x="520" y="0" width="280" height="480" fill="#F4D35E" opacity="0.18"/>
  <rect x="160" y="480" width="360" height="320" fill="#F4D35E" opacity="0.22"/>

  <!-- Teal accents -->
  <rect x="340" y="0" width="180" height="300" fill="#2A9D8F" opacity="0.28"/>
  <rect x="0" y="480" width="340" height="170" fill="#2A9D8F" opacity="0.2"/>
  <rect x="680" y="300" width="120" height="350" fill="#2A9D8F" opacity="0.3"/>

  <!-- Light blue accents -->
  <rect x="520" y="480" width="280" height="170" fill="#A8DADC" opacity="0.35"/>
  <rect x="0" y="650" width="160" height="150" fill="#A8DADC" opacity="0.4"/>

  <!-- Smaller pane highlights for richness -->
  <rect x="340" y="650" width="180" height="150" fill="#E63946" opacity="0.35"/>
  <rect x="160" y="300" width="180" height="180" fill="#F4D35E" opacity="0.4"/>
  <rect x="520" y="300" width="160" height="180" fill="#1D3557" opacity="0.35"/>

  <!-- Bold lead-line border frame -->
  <rect x="0" y="0" width="800" height="800" fill="none" stroke="#000000" stroke-width="5"/>

  <!-- Additional inner lead lines for complexity -->
  <line x1="80" y1="0" x2="80" y2="140" stroke="#000000" stroke-width="2"/>
  <line x1="0" y1="70" x2="160" y2="70" stroke="#000000" stroke-width="2"/>
  <line x1="600" y1="650" x2="600" y2="800" stroke="#000000" stroke-width="2"/>
  <line x1="520" y1="730" x2="680" y2="730" stroke="#000000" stroke-width="2"/>
  <line x1="430" y1="0" x2="430" y2="140" stroke="#000000" stroke-width="2"/>
  <line x1="700" y1="0" x2="800" y2="100" stroke="#000000" stroke-width="2"/>
</svg>
