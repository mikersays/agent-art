<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background cream rectangle -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Massive off-center deep blue circle upper-left -->
  <circle cx="250" cy="230" r="250" fill="#1D3557" opacity="0.8"/>
  <!-- Teal quarter-circle arcs in corners -->
  <path d="M0,0 A120,120 0 0,1 120,0" fill="none" stroke="#2A9D8F" stroke-width="3"/>
  <path d="M0,0 A80,80 0 0,1 80,0" fill="none" stroke="#2A9D8F" stroke-width="2"/>
  <path d="M800,0 A120,120 0 0,0 680,0" fill="none" stroke="#2A9D8F" stroke-width="3" transform="translate(0,0)"/>
  <path d="M0,800 Q0,680 120,800" fill="none" stroke="#2A9D8F" stroke-width="3"/>
  <path d="M800,800 Q800,680 680,800" fill="none" stroke="#2A9D8F" stroke-width="3"/>
  <path d="M0,800 Q0,720 80,800" fill="none" stroke="#2A9D8F" stroke-width="2"/>
  <!-- Thin red lines radiating from (550, 600) -->
  <line x1="550" y1="600" x2="0" y2="0" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>
  <line x1="550" y1="600" x2="200" y2="0" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>
  <line x1="550" y1="600" x2="400" y2="0" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>
  <line x1="550" y1="600" x2="600" y2="0" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>
  <line x1="550" y1="600" x2="800" y2="0" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>
  <line x1="550" y1="600" x2="800" y2="200" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>
  <line x1="550" y1="600" x2="800" y2="450" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>
  <line x1="550" y1="600" x2="800" y2="700" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>
  <line x1="550" y1="600" x2="700" y2="800" stroke="#E63946" stroke-width="1.5" opacity="0.6"/>
  <line x1="550" y1="600" x2="400" y2="800" stroke="#E63946" stroke-width="1.5" opacity="0.6"/>
  <line x1="550" y1="600" x2="150" y2="800" stroke="#E63946" stroke-width="1.5" opacity="0.6"/>
  <line x1="550" y1="600" x2="0" y2="800" stroke="#E63946" stroke-width="1.5" opacity="0.6"/>
  <line x1="550" y1="600" x2="0" y2="500" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>
  <line x1="550" y1="600" x2="0" y2="300" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>
  <!-- Black horizontal bars at the bottom third -->
  <rect x="50" y="560" width="300" height="8" fill="#000000" opacity="0.85"/>
  <rect x="20" y="590" width="200" height="12" fill="#000000" opacity="0.9"/>
  <rect x="100" y="620" width="450" height="6" fill="#000000" opacity="0.75"/>
  <rect x="0" y="660" width="350" height="10" fill="#000000" opacity="0.8"/>
  <rect x="60" y="700" width="500" height="5" fill="#000000" opacity="0.7"/>
  <rect x="30" y="740" width="250" height="14" fill="#000000" opacity="0.85"/>
  <rect x="150" y="770" width="400" height="7" fill="#000000" opacity="0.75"/>
  <!-- Small yellow circles scattered diagonally top-right to bottom-left -->
  <circle cx="700" cy="80" r="10" fill="#F4D35E" opacity="0.9"/>
  <circle cx="650" cy="140" r="8" fill="#F4D35E" opacity="0.85"/>
  <circle cx="580" cy="220" r="12" fill="#F4D35E" opacity="0.9"/>
  <circle cx="520" cy="280" r="9" fill="#F4D35E" opacity="0.8"/>
  <circle cx="450" cy="370" r="15" fill="#F4D35E" opacity="0.9"/>
  <circle cx="380" cy="430" r="11" fill="#F4D35E" opacity="0.85"/>
  <circle cx="300" cy="510" r="8" fill="#F4D35E" opacity="0.8"/>
  <circle cx="220" cy="580" r="13" fill="#F4D35E" opacity="0.9"/>
  <circle cx="150" cy="650" r="10" fill="#F4D35E" opacity="0.85"/>
  <circle cx="90" cy="720" r="14" fill="#F4D35E" opacity="0.9"/>
  <circle cx="740" cy="50" r="9" fill="#F4D35E" opacity="0.75"/>
  <circle cx="480" cy="330" r="10" fill="#F4D35E" opacity="0.7"/>
</svg>