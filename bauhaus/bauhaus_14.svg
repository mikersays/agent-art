<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Golden Section - Composition based on golden ratio rectangles and spirals -->
  <!-- phi = 1.618, subdividing the canvas -->

  <!-- Main golden rectangle subdivisions -->
  <!-- Large rectangle A: 800x494 (top) -->
  <rect x="0" y="0" width="800" height="494" fill="#1D3557"/>

  <!-- Square within A: 494x494 (top-left) -->
  <rect x="0" y="0" width="494" height="494" fill="#E63946"/>

  <!-- Remaining rectangle subdivided: 306x494 -> square 306x306 (top-right) -->
  <rect x="494" y="0" width="306" height="306" fill="#F4D35E"/>

  <!-- Next subdivision: 306x188 -> square 188x188 -->
  <rect x="494" y="306" width="188" height="188" fill="#457B9D"/>

  <!-- Next: 118x188 -> square 118x118 -->
  <rect x="682" y="306" width="118" height="118" fill="#E76F51"/>

  <!-- Next: 118x70 -> square 70x70 -->
  <rect x="682" y="424" width="70" height="70" fill="#A89F91"/>

  <!-- Next tiny: 48x70 -> square 48x48 -->
  <rect x="752" y="424" width="48" height="48" fill="#000000"/>

  <!-- Bottom section: 800x306 -->
  <rect x="0" y="494" width="800" height="306" fill="#F4D35E" opacity="0.3"/>

  <!-- Bottom-left square: 306x306 -->
  <rect x="0" y="494" width="306" height="306" fill="#A89F91"/>

  <!-- Bottom-middle: 188x306 -->
  <rect x="306" y="494" width="188" height="306" fill="#E76F51" opacity="0.6"/>

  <!-- Bottom subdivisions -->
  <rect x="494" y="494" width="306" height="188" fill="#1D3557" opacity="0.5"/>
  <rect x="494" y="682" width="306" height="118" fill="#457B9D" opacity="0.7"/>

  <!-- Golden spiral approximation using quarter-circle arcs -->
  <path d="M 494 494 A 494 494 0 0 0 0 0" fill="none" stroke="#000000" stroke-width="4"/>
  <path d="M 494 0 A 306 306 0 0 1 800 306" fill="none" stroke="#000000" stroke-width="4" opacity="0.8"/>
  <path d="M 800 306 A 188 188 0 0 1 682 494" fill="none" stroke="#000000" stroke-width="3.5" opacity="0.7"/>
  <path d="M 682 494 A 118 118 0 0 0 682 306" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <path d="M 682 306 A 70 70 0 0 0 752 424" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.8"/>

  <!-- Second spiral from bottom -->
  <path d="M 0 494 A 306 306 0 0 0 306 800" fill="none" stroke="#000000" stroke-width="3"/>
  <path d="M 306 800 A 188 188 0 0 0 494 682" fill="none" stroke="#000000" stroke-width="2.5"/>

  <!-- Accent circles at golden ratio intersections -->
  <circle cx="494" cy="494" r="20" fill="#F4D35E" stroke="#000000" stroke-width="3"/>
  <circle cx="494" cy="306" r="12" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="682" cy="306" r="10" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <circle cx="682" cy="424" r="8" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="752" cy="424" r="6" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="306" cy="494" r="15" fill="#000000"/>
  <circle cx="494" cy="682" r="10" fill="#E63946"/>

  <!-- Grid overlay lines showing golden proportions -->
  <line x1="494" y1="0" x2="494" y2="800" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="494" x2="800" y2="494" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="306" y1="0" x2="306" y2="800" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="682" y1="0" x2="682" y2="800" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="306" x2="800" y2="306" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="682" x2="800" y2="682" stroke="#000000" stroke-width="1" opacity="0.3"/>

  <!-- Diagonal golden ratio lines -->
  <line x1="0" y1="0" x2="800" y2="494" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="0" x2="494" y2="800" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>

  <!-- Small geometric accents -->
  <rect x="200" y="200" width="40" height="40" fill="none" stroke="#FFFFFF" stroke-width="2" transform="rotate(45, 220, 220)"/>
  <rect x="580" y="120" width="30" height="30" fill="#FFFFFF" opacity="0.5"/>
  <polygon points="150,700 180,650 210,700" fill="#1D3557"/>
  <polygon points="350,600 380,550 410,600" fill="#E63946" opacity="0.7"/>

  <!-- Border -->
  <rect x="0" y="0" width="800" height="800" fill="none" stroke="#000000" stroke-width="4"/>
</svg>