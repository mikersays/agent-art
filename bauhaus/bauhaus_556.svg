<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle radial lines from center -->
  <line x1="400" y1="400" x2="800" y2="0" stroke="#264653" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="800" y2="200" stroke="#264653" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="800" y2="400" stroke="#264653" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="800" y2="600" stroke="#264653" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="800" y2="800" stroke="#264653" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="0" y2="0" stroke="#264653" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="0" y2="200" stroke="#264653" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="0" y2="400" stroke="#264653" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="0" y2="600" stroke="#264653" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="0" y2="800" stroke="#264653" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="200" y2="0" stroke="#264653" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="600" y2="0" stroke="#264653" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="200" y2="800" stroke="#264653" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="400" x2="600" y2="800" stroke="#264653" stroke-width="0.5" opacity="0.1"/>

  <!-- Spiral staircase rectangles - ascending spiral from center -->
  <rect x="370" y="370" width="60" height="20" fill="#1D3557" opacity="0.9" transform="rotate(0, 400, 400)"/>
  <rect x="365" y="355" width="70" height="22" fill="#264653" opacity="0.85" transform="rotate(25, 400, 400)"/>
  <rect x="358" y="338" width="80" height="24" fill="#1D3557" opacity="0.8" transform="rotate(50, 400, 400)"/>
  <rect x="350" y="318" width="90" height="26" fill="#457B9D" opacity="0.75" transform="rotate(75, 400, 400)"/>
  <rect x="340" y="295" width="100" height="28" fill="#264653" opacity="0.7" transform="rotate(100, 400, 400)"/>
  <rect x="328" y="270" width="115" height="30" fill="#1D3557" opacity="0.65" transform="rotate(125, 400, 400)"/>
  <rect x="315" y="242" width="130" height="32" fill="#457B9D" opacity="0.6" transform="rotate(150, 400, 400)"/>
  <rect x="300" y="212" width="148" height="34" fill="#264653" opacity="0.55" transform="rotate(175, 400, 400)"/>
  <rect x="282" y="178" width="168" height="36" fill="#1D3557" opacity="0.5" transform="rotate(200, 400, 400)"/>
  <rect x="262" y="142" width="190" height="38" fill="#457B9D" opacity="0.45" transform="rotate(225, 400, 400)"/>
  <rect x="240" y="102" width="215" height="40" fill="#264653" opacity="0.4" transform="rotate(250, 400, 400)"/>
  <rect x="215" y="58" width="242" height="42" fill="#1D3557" opacity="0.35" transform="rotate(275, 400, 400)"/>
  <rect x="188" y="10" width="270" height="44" fill="#457B9D" opacity="0.3" transform="rotate(300, 400, 400)"/>
  <rect x="158" y="-40" width="300" height="46" fill="#264653" opacity="0.25" transform="rotate(325, 400, 400)"/>
  <rect x="125" y="-95" width="335" height="48" fill="#1D3557" opacity="0.2" transform="rotate(350, 400, 400)"/>

  <!-- Center focal point -->
  <circle cx="400" cy="400" r="15" fill="#E63946" opacity="0.9"/>
  <circle cx="400" cy="400" r="8" fill="#F4D35E" opacity="1"/>

  <!-- Corner accent circles -->
  <circle cx="50" cy="50" r="18" fill="#264653" opacity="0.6"/>
  <circle cx="750" cy="50" r="12" fill="#1D3557" opacity="0.5"/>
  <circle cx="50" cy="750" r="14" fill="#457B9D" opacity="0.5"/>
  <circle cx="750" cy="750" r="20" fill="#264653" opacity="0.6"/>

  <!-- Additional corner small circles -->
  <circle cx="50" cy="50" r="6" fill="#F4D35E" opacity="0.8"/>
  <circle cx="750" cy="750" r="8" fill="#E63946" opacity="0.7"/>

  <!-- Accent rectangles near edges -->
  <rect x="20" y="380" width="60" height="4" fill="#1D3557" opacity="0.4"/>
  <rect x="720" y="395" width="60" height="4" fill="#264653" opacity="0.4"/>
  <rect x="390" y="20" width="4" height="50" fill="#457B9D" opacity="0.4"/>
  <rect x="405" y="740" width="4" height="40" fill="#1D3557" opacity="0.4"/>
</svg>