<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Horizontal connecting lines spanning the canvas -->
  <line x1="30" y1="200" x2="770" y2="200" stroke="#A89F91" stroke-width="1" opacity="0.2"/>
  <line x1="30" y1="400" x2="770" y2="400" stroke="#A89F91" stroke-width="1.5" opacity="0.25"/>
  <line x1="30" y1="600" x2="770" y2="600" stroke="#A89F91" stroke-width="1" opacity="0.2"/>
  <line x1="30" y1="300" x2="770" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="30" y1="500" x2="770" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.1"/>

  <!-- Left section: small dots, light colors (crescendo beginning) -->
  <circle cx="50" cy="350" r="3" fill="#A8DADC" opacity="0.5"/>
  <circle cx="70" cy="420" r="3" fill="#FEFAE0" stroke="#A8DADC" stroke-width="1" opacity="0.6"/>
  <circle cx="40" cy="480" r="2" fill="#A8DADC" opacity="0.45"/>
  <circle cx="80" cy="280" r="4" fill="#A8DADC" opacity="0.5"/>
  <circle cx="55" cy="550" r="3" fill="#E9C46A" opacity="0.4"/>
  <circle cx="90" cy="200" r="3" fill="#A8DADC" opacity="0.45"/>
  <circle cx="65" cy="150" r="2" fill="#FEFAE0" stroke="#A89F91" stroke-width="0.5" opacity="0.5"/>
  <circle cx="45" cy="650" r="3" fill="#A8DADC" opacity="0.4"/>

  <!-- Slightly larger, still light -->
  <circle cx="120" cy="320" r="6" fill="#A8DADC" opacity="0.55"/>
  <circle cx="140" cy="450" r="7" fill="#E9C46A" opacity="0.45"/>
  <circle cx="110" cy="550" r="5" fill="#A8DADC" opacity="0.5"/>
  <circle cx="150" cy="220" r="6" fill="#DDA15E" opacity="0.35"/>
  <rect x="125" y="620" width="10" height="10" fill="#A8DADC" opacity="0.4"/>

  <!-- Center-left: medium shapes, warming colors -->
  <circle cx="220" cy="380" r="14" fill="#DDA15E" opacity="0.5"/>
  <circle cx="250" cy="280" r="12" fill="#E9C46A" opacity="0.55"/>
  <rect x="210" y="480" width="25" height="20" fill="#A89F91" opacity="0.45"/>
  <circle cx="270" cy="550" r="16" fill="#DDA15E" opacity="0.5"/>
  <rect x="230" y="160" width="20" height="18" fill="#E9C46A" opacity="0.45"/>

  <!-- Center: medium-large shapes, transitional colors -->
  <circle cx="340" cy="350" r="25" fill="#E76F51" opacity="0.55"/>
  <rect x="320" y="450" width="45" height="35" fill="#457B9D" opacity="0.5"/>
  <circle cx="370" cy="240" r="22" fill="#2A9D8F" opacity="0.5"/>
  <rect x="350" y="550" width="40" height="30" fill="#E76F51" opacity="0.45"/>
  <circle cx="380" cy="150" r="18" fill="#457B9D" opacity="0.45"/>
  <circle cx="350" cy="650" r="20" fill="#2A9D8F" opacity="0.5"/>

  <!-- Center-right: large shapes, bold colors emerging -->
  <circle cx="480" cy="380" r="38" fill="#E63946" opacity="0.6"/>
  <rect x="450" y="240" width="65" height="50" fill="#1D3557" opacity="0.6"/>
  <circle cx="500" cy="550" r="35" fill="#1D3557" opacity="0.55"/>
  <rect x="460" y="130" width="55" height="45" fill="#E63946" opacity="0.5"/>
  <polygon points="490,640 520,690 460,690" fill="#F4D35E" opacity="0.6"/>

  <!-- Right section: largest shapes, boldest colors (crescendo peak) -->
  <rect x="580" y="300" width="100" height="80" fill="#1D3557" opacity="0.8"/>
  <circle cx="660" cy="500" r="55" fill="#E63946" opacity="0.75"/>
  <rect x="620" y="150" width="90" height="70" fill="#000000" opacity="0.65"/>
  <rect x="600" y="600" width="110" height="85" fill="#1D3557" opacity="0.7"/>
  <circle cx="720" cy="280" r="45" fill="#E63946" opacity="0.7"/>
  <rect x="700" y="420" width="70" height="60" fill="#000000" opacity="0.6"/>

  <!-- Yellow accent at the peak -->
  <rect x="730" y="600" width="50" height="40" fill="#F4D35E" opacity="0.8"/>
  <circle cx="750" cy="170" r="20" fill="#F4D35E" opacity="0.75"/>

  <!-- Connecting horizontal lines with increasing weight -->
  <line x1="50" y1="400" x2="200" y2="400" stroke="#A8DADC" stroke-width="0.5" opacity="0.4"/>
  <line x1="200" y1="400" x2="350" y2="400" stroke="#DDA15E" stroke-width="1" opacity="0.4"/>
  <line x1="350" y1="400" x2="500" y2="400" stroke="#E76F51" stroke-width="2" opacity="0.5"/>
  <line x1="500" y1="400" x2="700" y2="400" stroke="#000000" stroke-width="3" opacity="0.6"/>

  <!-- Corner accents -->
  <circle cx="20" cy="20" r="4" fill="#A8DADC" opacity="0.3"/>
  <rect x="770" y="770" width="20" height="20" fill="#000000" opacity="0.5"/>
</svg>