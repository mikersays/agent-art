<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background: Cream -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle grid -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>

  <!-- Original square outline (ghost) -->
  <rect x="220" y="220" width="360" height="360" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.15"/>

  <!-- Fragment 1: Top-left piece (Red) - drifting upper-left -->
  <polygon points="220,220 400,220 400,310 310,310 310,400 220,400" fill="#E63946" opacity="0.92"/>
  <circle cx="220" cy="220" r="6" fill="#000000"/>
  <circle cx="400" cy="220" r="5" fill="#000000"/>
  <circle cx="220" cy="400" r="5" fill="#000000"/>

  <!-- Fragment 2: Top-right piece (Blue) - drifting upper-right -->
  <polygon points="430,190 620,190 620,380 530,380 530,300 430,300" fill="#1D3557" opacity="0.92"/>
  <circle cx="430" cy="190" r="6" fill="#000000"/>
  <circle cx="620" cy="190" r="5" fill="#000000"/>
  <circle cx="620" cy="380" r="5" fill="#000000"/>

  <!-- Fragment 3: Bottom-right piece (Yellow) - drifting lower-right -->
  <polygon points="440,440 610,440 610,610 440,610" fill="#F4D35E" opacity="0.92"/>
  <circle cx="440" cy="440" r="6" fill="#000000"/>
  <circle cx="610" cy="440" r="5" fill="#000000"/>
  <circle cx="610" cy="610" r="5" fill="#000000"/>
  <circle cx="440" cy="610" r="5" fill="#000000"/>

  <!-- Fragment 4: Bottom-left piece (Teal) - drifting lower-left -->
  <polygon points="170,430 330,430 330,600 170,600" fill="#2A9D8F" opacity="0.92"/>
  <circle cx="170" cy="430" r="6" fill="#000000"/>
  <circle cx="330" cy="430" r="5" fill="#000000"/>
  <circle cx="330" cy="600" r="5" fill="#000000"/>
  <circle cx="170" cy="600" r="5" fill="#000000"/>

  <!-- Fragment 5: Center top-sliver (Orange) -->
  <polygon points="350,180 450,150 480,220 360,240" fill="#E76F51" opacity="0.9"/>
  <circle cx="350" cy="180" r="5" fill="#000000"/>
  <circle cx="480" cy="220" r="4" fill="#000000"/>

  <!-- Fragment 6: Center small (Steel Blue) -->
  <polygon points="360,350 440,330 460,400 380,420" fill="#457B9D" opacity="0.85"/>
  <circle cx="360" cy="350" r="4" fill="#000000"/>
  <circle cx="460" cy="400" r="4" fill="#000000"/>

  <!-- Break lines radiating from center -->
  <line x1="400" y1="400" x2="160" y2="160" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="400" x2="640" y2="160" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="400" x2="640" y2="640" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="400" x2="160" y2="640" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="400" x2="400" y2="100" stroke="#000000" stroke-width="1.5" opacity="0.35"/>
  <line x1="400" y1="400" x2="700" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.35"/>
  <line x1="400" y1="400" x2="400" y2="700" stroke="#000000" stroke-width="1.5" opacity="0.35"/>
  <line x1="400" y1="400" x2="100" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.35"/>

  <!-- Center explosion point -->
  <circle cx="400" cy="400" r="12" fill="#000000"/>
  <circle cx="400" cy="400" r="6" fill="#FEFAE0"/>

  <!-- Small scattered debris circles -->
  <circle cx="130" cy="130" r="8" fill="#E63946" opacity="0.7"/>
  <circle cx="680" cy="100" r="7" fill="#1D3557" opacity="0.7"/>
  <circle cx="700" cy="680" r="9" fill="#F4D35E" opacity="0.7"/>
  <circle cx="100" cy="700" r="8" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="750" cy="400" r="5" fill="#E76F51" opacity="0.6"/>
  <circle cx="400" cy="750" r="6" fill="#457B9D" opacity="0.6"/>
  <circle cx="60" cy="400" r="5" fill="#6D2E46" opacity="0.6"/>

  <!-- Corner accent marks -->
  <rect x="15" y="15" width="20" height="4" fill="#000000" opacity="0.3"/>
  <rect x="15" y="15" width="4" height="20" fill="#000000" opacity="0.3"/>
  <rect x="765" y="781" width="20" height="4" fill="#000000" opacity="0.3"/>
  <rect x="781" y="765" width="4" height="20" fill="#000000" opacity="0.3"/>
</svg>
