<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background: cream -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Subtle grid structure -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <!-- Forest green base platform -->
  <rect x="50" y="650" width="700" height="60" fill="#264653"/>
  <rect x="80" y="640" width="640" height="15" fill="#264653" opacity="0.5"/>
  <!-- Large gear 1: steel blue -->
  <circle cx="250" cy="350" r="120" fill="#457B9D" opacity="0.3"/>
  <circle cx="250" cy="350" r="120" fill="none" stroke="#457B9D" stroke-width="3"/>
  <circle cx="250" cy="350" r="90" fill="none" stroke="#457B9D" stroke-width="2" opacity="0.7"/>
  <circle cx="250" cy="350" r="60" fill="none" stroke="#A89F91" stroke-width="2"/>
  <circle cx="250" cy="350" r="20" fill="#A89F91"/>
  <circle cx="250" cy="350" r="8" fill="#000000"/>
  <!-- Gear teeth suggestions (small rects around gear 1) -->
  <rect x="240" y="225" width="20" height="15" fill="#457B9D"/>
  <rect x="240" y="460" width="20" height="15" fill="#457B9D"/>
  <rect x="125" y="340" width="15" height="20" fill="#457B9D"/>
  <rect x="360" y="340" width="15" height="20" fill="#457B9D"/>
  <rect x="165" y="258" width="18" height="14" fill="#457B9D" transform="rotate(-45, 174, 265)"/>
  <rect x="320" y="435" width="18" height="14" fill="#457B9D" transform="rotate(-45, 329, 442)"/>
  <!-- Large gear 2: warm gray -->
  <circle cx="550" cy="300" r="100" fill="#A89F91" opacity="0.25"/>
  <circle cx="550" cy="300" r="100" fill="none" stroke="#A89F91" stroke-width="3"/>
  <circle cx="550" cy="300" r="70" fill="none" stroke="#A89F91" stroke-width="2" opacity="0.6"/>
  <circle cx="550" cy="300" r="35" fill="none" stroke="#457B9D" stroke-width="2"/>
  <circle cx="550" cy="300" r="12" fill="#457B9D"/>
  <circle cx="550" cy="300" r="5" fill="#000000"/>
  <!-- Gear teeth for gear 2 -->
  <rect x="540" y="195" width="20" height="15" fill="#A89F91"/>
  <rect x="540" y="390" width="20" height="15" fill="#A89F91"/>
  <rect x="445" y="290" width="15" height="20" fill="#A89F91"/>
  <rect x="640" y="290" width="15" height="20" fill="#A89F91"/>
  <!-- Piston bars: red and black -->
  <rect x="100" y="520" width="300" height="30" fill="#E63946"/>
  <rect x="100" y="520" width="300" height="30" fill="none" stroke="#000000" stroke-width="2"/>
  <rect x="400" y="480" width="250" height="25" fill="#000000"/>
  <rect x="450" y="560" width="200" height="22" fill="#E63946" opacity="0.8"/>
  <rect x="450" y="560" width="200" height="22" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- Connecting lines in yellow -->
  <line x1="250" y1="350" x2="250" y2="520" stroke="#F4D35E" stroke-width="4"/>
  <line x1="550" y1="300" x2="550" y2="480" stroke="#F4D35E" stroke-width="4"/>
  <line x1="400" y1="535" x2="450" y2="493" stroke="#F4D35E" stroke-width="3"/>
  <line x1="550" y1="505" x2="550" y2="560" stroke="#F4D35E" stroke-width="3"/>
  <!-- Teal directional triangles -->
  <polygon points="380,530 400,520 400,540" fill="#2A9D8F"/>
  <polygon points="430,485 450,475 450,495" fill="#2A9D8F"/>
  <polygon points="630,565 650,555 650,575" fill="#2A9D8F"/>
  <polygon points="240,455 260,445 260,465" fill="#2A9D8F"/>
  <!-- Orange bolt/rivet circles -->
  <circle cx="100" cy="535" r="7" fill="#E76F51"/>
  <circle cx="400" cy="535" r="7" fill="#E76F51"/>
  <circle cx="400" cy="493" r="6" fill="#E76F51"/>
  <circle cx="650" cy="493" r="6" fill="#E76F51"/>
  <circle cx="450" cy="571" r="5.5" fill="#E76F51"/>
  <circle cx="650" cy="571" r="5.5" fill="#E76F51"/>
  <!-- Small mechanical details -->
  <rect x="180" y="200" width="8" height="40" fill="#000000" opacity="0.4"/>
  <rect x="580" y="160" width="8" height="35" fill="#000000" opacity="0.35"/>
  <circle cx="700" cy="450" r="15" fill="#457B9D" opacity="0.3"/>
  <circle cx="700" cy="450" r="6" fill="#000000" opacity="0.5"/>
  <!-- Small accent gear -->
  <circle cx="130" cy="200" r="30" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.5"/>
  <circle cx="130" cy="200" r="15" fill="none" stroke="#457B9D" stroke-width="1" opacity="0.5"/>
  <circle cx="130" cy="200" r="5" fill="#000000" opacity="0.4"/>
</svg>