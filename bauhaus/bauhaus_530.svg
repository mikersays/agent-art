<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FFFFFF"/>
  <!-- Quadrant fills - subtle background tones -->
  <rect x="0" y="0" width="350" height="450" fill="#FEFAE0" opacity="0.5"/>
  <rect x="350" y="0" width="450" height="450" fill="#A8DADC" opacity="0.15"/>
  <rect x="0" y="450" width="350" height="350" fill="#F4D35E" opacity="0.1"/>
  <rect x="350" y="450" width="450" height="350" fill="#2A9D8F" opacity="0.08"/>
  <!-- Bold dividing lines (off-center cross at 350,450) -->
  <line x1="350" y1="0" x2="350" y2="800" stroke="#000000" stroke-width="6"/>
  <line x1="0" y1="450" x2="800" y2="450" stroke="#000000" stroke-width="6"/>
  <!-- TOP-LEFT QUADRANT: Circles (red) -->
  <circle cx="100" cy="150" r="70" fill="#E63946" opacity="0.7"/>
  <circle cx="220" cy="100" r="40" fill="#E63946" opacity="0.5"/>
  <circle cx="180" cy="280" r="55" fill="#E63946" opacity="0.6"/>
  <circle cx="60" cy="350" r="35" fill="#E63946" opacity="0.45"/>
  <circle cx="280" cy="200" r="25" fill="#E63946" opacity="0.8"/>
  <circle cx="150" cy="400" r="20" fill="#E63946" opacity="0.55"/>
  <circle cx="300" cy="380" r="45" fill="#E63946" opacity="0.35"/>
  <!-- Circle bleeding into top-right -->
  <circle cx="370" cy="120" r="30" fill="#E63946" opacity="0.3"/>
  <!-- TOP-RIGHT QUADRANT: Rectangles (blue) -->
  <rect x="400" y="40" width="120" height="60" fill="#1D3557" opacity="0.8"/>
  <rect x="560" y="100" width="80" height="100" fill="#1D3557" opacity="0.6"/>
  <rect x="420" y="160" width="100" height="40" fill="#1D3557" opacity="0.7"/>
  <rect x="680" y="30" width="60" height="150" fill="#1D3557" opacity="0.5"/>
  <rect x="500" y="250" width="70" height="80" fill="#1D3557" opacity="0.65"/>
  <rect x="620" y="300" width="130" height="50" fill="#1D3557" opacity="0.45"/>
  <rect x="380" y="350" width="90" height="60" fill="#1D3557" opacity="0.55"/>
  <!-- Rectangle bleeding into bottom-right -->
  <rect x="600" y="430" width="100" height="50" fill="#1D3557" opacity="0.3"/>
  <!-- BOTTOM-LEFT QUADRANT: Triangles (yellow) -->
  <polygon points="80,550 160,480 160,620" fill="#F4D35E" opacity="0.8"/>
  <polygon points="200,520 280,620 120,620" fill="#F4D35E" opacity="0.6"/>
  <polygon points="50,700 120,640 120,760" fill="#F4D35E" opacity="0.7"/>
  <polygon points="220,680 300,760 140,760" fill="#F4D35E" opacity="0.55"/>
  <polygon points="260,480 310,560 210,560" fill="#F4D35E" opacity="0.75"/>
  <polygon points="160,720 200,780 120,780" fill="#F4D35E" opacity="0.5"/>
  <!-- Triangle bleeding into bottom-right -->
  <polygon points="340,700 400,640 400,760" fill="#F4D35E" opacity="0.3"/>
  <!-- BOTTOM-RIGHT QUADRANT: Mixed (teal) -->
  <circle cx="500" cy="580" r="50" fill="#2A9D8F" opacity="0.6"/>
  <rect x="580" y="520" width="80" height="60" fill="#2A9D8F" opacity="0.7"/>
  <polygon points="700,550 750,640 650,640" fill="#2A9D8F" opacity="0.65"/>
  <circle cx="450" cy="700" r="35" fill="#2A9D8F" opacity="0.5"/>
  <rect x="530" y="660" width="60" height="90" fill="#2A9D8F" opacity="0.55"/>
  <polygon points="680,700 730,780 630,780" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="620" cy="740" r="25" fill="#2A9D8F" opacity="0.4"/>
  <!-- Small accent shapes bleeding across boundaries -->
  <circle cx="355" cy="455" r="12" fill="#E76F51" opacity="0.8"/>
  <rect x="340" y="220" width="20" height="20" fill="#DDA15E" opacity="0.6"/>
  <circle cx="180" cy="455" r="8" fill="#6D2E46" opacity="0.6"/>
  <polygon points="350,650 365,630 380,650" fill="#E76F51" opacity="0.5"/>
  <rect x="345" y="100" width="10" height="30" fill="#000000" opacity="0.4"/>
</svg>