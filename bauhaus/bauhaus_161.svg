<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Waterfall</title>
  <rect width="800" height="800" fill="#1D3557"/>
  <!-- Cascading rectangles stepping down like a waterfall -->
  <rect x="300" y="60" width="200" height="40" fill="#457B9D"/>
  <rect x="310" y="110" width="200" height="40" fill="#2A9D8F"/>
  <rect x="320" y="160" width="200" height="40" fill="#457B9D"/>
  <rect x="330" y="210" width="200" height="40" fill="#2A9D8F"/>
  <rect x="340" y="260" width="200" height="40" fill="#457B9D"/>
  <rect x="350" y="310" width="200" height="40" fill="#F4D35E"/>
  <rect x="360" y="360" width="200" height="40" fill="#2A9D8F"/>
  <rect x="370" y="410" width="200" height="40" fill="#457B9D"/>
  <rect x="360" y="460" width="200" height="40" fill="#2A9D8F"/>
  <rect x="350" y="510" width="200" height="40" fill="#E63946"/>
  <rect x="340" y="560" width="200" height="40" fill="#457B9D"/>
  <rect x="330" y="610" width="200" height="40" fill="#2A9D8F"/>
  <!-- Left cascade arm -->
  <rect x="200" y="310" width="140" height="30" fill="#E63946"/>
  <rect x="180" y="360" width="140" height="30" fill="#F4D35E"/>
  <rect x="160" y="410" width="140" height="30" fill="#457B9D"/>
  <rect x="150" y="460" width="140" height="30" fill="#2A9D8F"/>
  <rect x="145" y="510" width="140" height="30" fill="#E63946"/>
  <rect x="150" y="560" width="140" height="30" fill="#F4D35E"/>
  <!-- Splash circles at bottom -->
  <circle cx="250" cy="680" r="40" fill="#FEFAE0" opacity="0.7"/>
  <circle cx="400" cy="700" r="55" fill="#FFF" opacity="0.5"/>
  <circle cx="500" cy="690" r="35" fill="#FEFAE0" opacity="0.6"/>
  <circle cx="320" cy="720" r="25" fill="#FFF" opacity="0.4"/>
  <circle cx="450" cy="730" r="30" fill="#FEFAE0" opacity="0.5"/>
  <circle cx="550" cy="720" r="20" fill="#FFF" opacity="0.6"/>
  <circle cx="180" cy="710" r="28" fill="#2A9D8F" opacity="0.5"/>
  <circle cx="600" cy="710" r="22" fill="#457B9D" opacity="0.5"/>
  <!-- Small spray droplets -->
  <circle cx="350" cy="660" r="8" fill="#FFF" opacity="0.8"/>
  <circle cx="420" cy="650" r="6" fill="#FFF" opacity="0.7"/>
  <circle cx="480" cy="665" r="10" fill="#FEFAE0" opacity="0.6"/>
  <circle cx="280" cy="655" r="7" fill="#FFF" opacity="0.5"/>
  <circle cx="530" cy="670" r="9" fill="#FEFAE0" opacity="0.7"/>
  <!-- Cliff walls -->
  <rect x="100" y="60" width="60" height="600" fill="#000" opacity="0.6"/>
  <rect x="640" y="200" width="60" height="500" fill="#000" opacity="0.6"/>
  <!-- Mist lines -->
  <line x1="150" y1="690" x2="650" y2="690" stroke="#FFF" stroke-width="2" opacity="0.3"/>
  <line x1="180" y1="740" x2="620" y2="740" stroke="#FFF" stroke-width="1.5" opacity="0.2"/>
</svg>