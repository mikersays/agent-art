<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Sky background -->
  <rect x="0" y="0" width="800" height="350" fill="#A8DADC" opacity="0.2"/>

  <!-- Ground -->
  <rect x="0" y="600" width="800" height="200" fill="#2A9D8F" opacity="0.15"/>
  <rect x="0" y="620" width="800" height="180" fill="#2A9D8F" opacity="0.1"/>

  <!-- Garden path -->
  <rect x="360" y="500" width="80" height="300" fill="#333333" opacity="0.3"/>
  <rect x="370" y="500" width="60" height="300" fill="#F4D35E" opacity="0.15"/>
  <!-- Path stones -->
  <rect x="375" y="520" width="50" height="20" rx="3" fill="#333333" opacity="0.3"/>
  <rect x="375" y="560" width="50" height="20" rx="3" fill="#333333" opacity="0.3"/>
  <rect x="375" y="600" width="50" height="20" rx="3" fill="#333333" opacity="0.3"/>
  <rect x="375" y="640" width="50" height="20" rx="3" fill="#333333" opacity="0.3"/>
  <rect x="375" y="680" width="50" height="20" rx="3" fill="#333333" opacity="0.3"/>

  <!-- Rectangular Planter 1 (left) -->
  <rect x="50" y="520" width="180" height="70" fill="#333333"/>
  <rect x="55" y="510" width="170" height="15" fill="#1D3557"/>

  <!-- Flowers in planter 1 -->
  <!-- Flower 1 -->
  <line x1="90" y1="510" x2="90" y2="430" stroke="#2A9D8F" stroke-width="3"/>
  <circle cx="90" cy="420" r="18" fill="#E63946"/>
  <circle cx="90" cy="420" r="8" fill="#F4D35E"/>
  <!-- Leaf -->
  <ellipse cx="78" cy="470" rx="10" ry="5" fill="#2A9D8F" transform="rotate(-30,78,470)"/>

  <!-- Flower 2 -->
  <line x1="140" y1="510" x2="140" y2="400" stroke="#2A9D8F" stroke-width="3"/>
  <circle cx="140" cy="390" r="22" fill="#F4D35E"/>
  <circle cx="140" cy="390" r="10" fill="#E63946"/>
  <ellipse cx="152" cy="455" rx="10" ry="5" fill="#2A9D8F" transform="rotate(25,152,455)"/>

  <!-- Flower 3 -->
  <line x1="190" y1="510" x2="190" y2="440" stroke="#2A9D8F" stroke-width="3"/>
  <circle cx="190" cy="430" r="16" fill="#1D3557"/>
  <circle cx="190" cy="430" r="7" fill="#A8DADC"/>

  <!-- Rectangular Planter 2 (right) -->
  <rect x="530" y="500" width="220" height="80" fill="#333333"/>
  <rect x="535" y="490" width="210" height="15" fill="#1D3557"/>

  <!-- Flowers in planter 2 -->
  <!-- Flower 4 -->
  <line x1="570" y1="490" x2="570" y2="380" stroke="#2A9D8F" stroke-width="3"/>
  <circle cx="570" cy="370" r="20" fill="#E63946"/>
  <circle cx="570" cy="370" r="9" fill="#FFFFFF"/>
  <ellipse cx="558" cy="435" rx="10" ry="5" fill="#2A9D8F" transform="rotate(-20,558,435)"/>

  <!-- Flower 5 -->
  <line x1="640" y1="490" x2="640" y2="360" stroke="#2A9D8F" stroke-width="3"/>
  <circle cx="640" cy="350" r="24" fill="#F4D35E"/>
  <circle cx="640" cy="350" r="11" fill="#1D3557"/>
  <ellipse cx="652" cy="420" rx="12" ry="5" fill="#2A9D8F" transform="rotate(30,652,420)"/>
  <ellipse cx="628" cy="440" rx="10" ry="5" fill="#2A9D8F" transform="rotate(-25,628,440)"/>

  <!-- Flower 6 -->
  <line x1="710" y1="490" x2="710" y2="400" stroke="#2A9D8F" stroke-width="3"/>
  <circle cx="710" cy="390" r="17" fill="#A8DADC"/>
  <circle cx="710" cy="390" r="7" fill="#E63946"/>

  <!-- Triangular tree 1 (large, left-center) -->
  <rect x="285" y="480" width="14" height="120" fill="#333333"/>
  <polygon points="292,250 240,480 344,480" fill="#1D3557"/>
  <polygon points="292,300 255,440 329,440" fill="#2A9D8F"/>

  <!-- Triangular tree 2 (right) -->
  <rect x="475" y="460" width="12" height="140" fill="#333333"/>
  <polygon points="481,220 430,460 532,460" fill="#1D3557"/>
  <polygon points="481,280 445,420 517,420" fill="#2A9D8F"/>

  <!-- Triangular tree 3 (small, far left) -->
  <rect x="30" y="460" width="10" height="80" fill="#333333"/>
  <polygon points="35,370 10,460 60,460" fill="#2A9D8F"/>
  <polygon points="35,390 18,445 52,445" fill="#1D3557"/>

  <!-- Triangular tree 4 (small, far right) -->
  <rect x="760" y="470" width="10" height="70" fill="#333333"/>
  <polygon points="765,380 740,470 790,470" fill="#2A9D8F"/>

  <!-- Sun -->
  <circle cx="680" cy="80" r="45" fill="#F4D35E"/>
  <circle cx="680" cy="80" r="30" fill="#F4D35E"/>
  <!-- Sun rays -->
  <line x1="680" y1="20" x2="680" y2="5" stroke="#F4D35E" stroke-width="3"/>
  <line x1="680" y1="140" x2="680" y2="155" stroke="#F4D35E" stroke-width="3"/>
  <line x1="620" y1="80" x2="605" y2="80" stroke="#F4D35E" stroke-width="3"/>
  <line x1="740" y1="80" x2="755" y2="80" stroke="#F4D35E" stroke-width="3"/>
  <line x1="638" y1="38" x2="628" y2="28" stroke="#F4D35E" stroke-width="3"/>
  <line x1="722" y1="122" x2="732" y2="132" stroke="#F4D35E" stroke-width="3"/>
  <line x1="722" y1="38" x2="732" y2="28" stroke="#F4D35E" stroke-width="3"/>
  <line x1="638" y1="122" x2="628" y2="132" stroke="#F4D35E" stroke-width="3"/>

  <!-- Floating geometric flower (standalone, mid-left) -->
  <line x1="80" y1="400" x2="80" y2="320" stroke="#333333" stroke-width="2"/>
  <circle cx="80" cy="310" r="14" fill="#E63946"/>
  <circle cx="80" cy="310" r="6" fill="#F4D35E"/>

  <!-- Small planter box (center foreground) -->
  <rect x="340" y="720" width="120" height="50" fill="#1D3557"/>
  <rect x="345" y="712" width="110" height="12" fill="#333333"/>
  <line x1="370" y1="712" x2="370" y2="670" stroke="#2A9D8F" stroke-width="3"/>
  <circle cx="370" cy="660" r="15" fill="#F4D35E"/>
  <circle cx="370" cy="660" r="6" fill="#E63946"/>
  <line x1="430" y1="712" x2="430" y2="680" stroke="#2A9D8F" stroke-width="3"/>
  <circle cx="430" cy="670" r="12" fill="#A8DADC"/>
  <circle cx="430" cy="670" r="5" fill="#1D3557"/>

  <!-- Fence/trellis -->
  <line x1="50" y1="600" x2="50" y2="540" stroke="#333333" stroke-width="2"/>
  <line x1="75" y1="600" x2="75" y2="540" stroke="#333333" stroke-width="2"/>
  <line x1="100" y1="600" x2="100" y2="540" stroke="#333333" stroke-width="2"/>
  <line x1="40" y1="560" x2="110" y2="560" stroke="#333333" stroke-width="2"/>
  <line x1="40" y1="580" x2="110" y2="580" stroke="#333333" stroke-width="2"/>

  <!-- Bauhaus-style clouds -->
  <rect x="100" y="60" width="80" height="30" rx="15" fill="#A8DADC" opacity="0.5"/>
  <rect x="300" y="40" width="100" height="35" rx="17" fill="#A8DADC" opacity="0.4"/>
  <rect x="480" y="70" width="70" height="25" rx="12" fill="#A8DADC" opacity="0.4"/>

  <!-- Butterfly (geometric) -->
  <polygon points="260,300 250,280 270,280" fill="#F4D35E"/>
  <polygon points="260,300 250,320 270,320" fill="#E63946"/>
  <line x1="258" y1="290" x2="254" y2="275" stroke="#000000" stroke-width="1"/>
  <line x1="262" y1="290" x2="266" y2="275" stroke="#000000" stroke-width="1"/>

  <!-- Border -->
  <rect x="5" y="5" width="790" height="790" fill="none" stroke="#000000" stroke-width="3"/>
</svg>