<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Corner triangles - forest and burgundy -->
  <polygon points="0,0 80,0 0,80" fill="#264653" opacity="0.9"/>
  <polygon points="800,0 720,0 800,80" fill="#6D2E46" opacity="0.9"/>
  <polygon points="0,800 80,800 0,720" fill="#6D2E46" opacity="0.85"/>
  <polygon points="800,800 720,800 800,720" fill="#264653" opacity="0.9"/>

  <!-- Additional corner triangles -->
  <polygon points="0,0 120,0 0,120" fill="#264653" opacity="0.4"/>
  <polygon points="800,800 680,800 800,680" fill="#264653" opacity="0.4"/>

  <!-- Nested circles, centered slightly off-center at (380, 420) -->
  <circle cx="380" cy="420" r="310" fill="#1D3557" opacity="0.15"/>
  <circle cx="380" cy="420" r="275" fill="#E63946" opacity="0.18"/>
  <circle cx="380" cy="420" r="240" fill="#F4D35E" opacity="0.22"/>
  <circle cx="380" cy="420" r="205" fill="#1D3557" opacity="0.55"/>
  <circle cx="380" cy="420" r="170" fill="#E63946" opacity="0.7"/>
  <circle cx="380" cy="420" r="135" fill="#F4D35E" opacity="0.85"/>
  <circle cx="380" cy="420" r="100" fill="#1D3557" opacity="0.9"/>
  <circle cx="380" cy="420" r="65" fill="#E63946" opacity="0.95"/>
  <circle cx="380" cy="420" r="32" fill="#F4D35E" opacity="1.0"/>
  <circle cx="380" cy="420" r="12" fill="#1D3557" opacity="1.0"/>

  <!-- Horizontal bars crossing through the composition -->
  <rect x="0" y="195" width="800" height="18" fill="#000000" opacity="0.12"/>
  <rect x="0" y="295" width="800" height="10" fill="#1D3557" opacity="0.2"/>
  <rect x="0" y="390" width="800" height="22" fill="#000000" opacity="0.1"/>
  <rect x="0" y="490" width="800" height="10" fill="#1D3557" opacity="0.2"/>
  <rect x="0" y="590" width="800" height="16" fill="#000000" opacity="0.12"/>

  <!-- Thin accent bars -->
  <rect x="0" y="150" width="800" height="3" fill="#6D2E46" opacity="0.4"/>
  <rect x="0" y="655" width="800" height="3" fill="#6D2E46" opacity="0.4"/>

  <!-- Small accent circles near edges -->
  <circle cx="700" cy="100" r="20" fill="#6D2E46" opacity="0.8"/>
  <circle cx="80" cy="700" r="16" fill="#264653" opacity="0.8"/>
  <circle cx="720" cy="680" r="12" fill="#F4D35E" opacity="0.9"/>
  <circle cx="90" cy="120" r="14" fill="#E63946" opacity="0.75"/>

  <!-- Vertical accent lines -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#264653" stroke-width="2" opacity="0.15"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#264653" stroke-width="2" opacity="0.15"/>
  <line x1="380" y1="0" x2="380" y2="800" stroke="#000000" stroke-width="1" opacity="0.08"/>

  <!-- Small squares in corners -->
  <rect x="20" y="20" width="35" height="35" fill="#6D2E46" opacity="0.7"/>
  <rect x="745" y="20" width="35" height="35" fill="#264653" opacity="0.7"/>
  <rect x="20" y="745" width="35" height="35" fill="#264653" opacity="0.7"/>
  <rect x="745" y="745" width="35" height="35" fill="#6D2E46" opacity="0.7"/>

  <!-- Outermost ring stroke for definition -->
  <circle cx="380" cy="420" r="310" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
</svg>
