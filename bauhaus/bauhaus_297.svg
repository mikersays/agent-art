  <rect x="710" y="280" width="65" height="440" fill="#000000" opacity="0.8"/>
  <rect x="725" y="310" width="10" height="12" fill="#F4D35E" opacity="0.9"/>
  <rect x="745" y="380" width="10" height="12" fill="#E76F51" opacity="0.8"/>
  <rect x="725" y="460" width="10" height="12" fill="#F4D35E" opacity="0.7"/>
  <!-- Red accent shapes -->
  <polygon points="245,120 280,80 315,120" fill="#E63946" opacity="0.8"/>
  <rect x="530" y="168" width="60" height="12" fill="#E63946" opacity="0.7"/>
  <circle cx="160" cy="330" r="8" fill="#E63946" opacity="0.6"/>
  <!-- Antenna lines -->
  <line x1="280" y1="120" x2="280" y2="60" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="560" y1="180" x2="560" y2="130" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <line x1="80" y1="200" x2="80" y2="160" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <!-- Corner accents -->
  <rect x="20" y="20" width="14" height="14" fill="#E63946" opacity="0.3"/>
  <rect x="766" y="20" width="14" height="14" fill="#1D3557" opacity="0.3"/>
