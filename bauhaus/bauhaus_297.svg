<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Sky background -->
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Sky horizontal layers -->
  <rect x="0" y="0" width="800" height="120" fill="#A8DADC" opacity="0.15"/>
  <rect x="0" y="120" width="800" height="100" fill="#457B9D" opacity="0.08"/>
  <rect x="0" y="220" width="800" height="80" fill="#A8DADC" opacity="0.1"/>
  <line x1="0" y1="150" x2="800" y2="150" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="250" x2="800" y2="250" stroke="#A89F91" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="350" x2="800" y2="350" stroke="#A89F91" stroke-width="0.5" opacity="0.15"/>
  <!-- Ground line -->
  <rect x="0" y="620" width="800" height="180" fill="#264653" opacity="0.08"/>
  <!-- Building 1 - tall dark blue -->
  <rect x="40" y="200" width="80" height="520" fill="#1D3557" opacity="0.9"/>
  <rect x="55" y="230" width="12" height="14" fill="#F4D35E" opacity="0.8"/>
  <rect x="55" y="270" width="12" height="14" fill="#E76F51" opacity="0.7"/>
  <rect x="80" y="310" width="12" height="14" fill="#F4D35E" opacity="0.8"/>
  <rect x="55" y="400" width="12" height="14" fill="#F4D35E" opacity="0.6"/>
  <rect x="80" y="440" width="12" height="14" fill="#E76F51" opacity="0.7"/>
  <!-- Building 2 - forest medium -->
  <rect x="130" y="340" width="100" height="380" fill="#264653" opacity="0.85"/>
  <rect x="150" y="370" width="14" height="16" fill="#F4D35E" opacity="0.8"/>
  <rect x="195" y="370" width="14" height="16" fill="#F4D35E" opacity="0.7"/>
  <rect x="150" y="420" width="14" height="16" fill="#E76F51" opacity="0.6"/>
  <rect x="195" y="460" width="14" height="16" fill="#F4D35E" opacity="0.8"/>
  <!-- Building 3 - tallest steel blue -->
  <rect x="245" y="120" width="70" height="600" fill="#457B9D" opacity="0.9"/>
  <rect x="260" y="150" width="10" height="12" fill="#F4D35E" opacity="0.9"/>
  <rect x="285" y="190" width="10" height="12" fill="#F4D35E" opacity="0.7"/>
  <rect x="260" y="280" width="10" height="12" fill="#E76F51" opacity="0.8"/>
  <rect x="285" y="350" width="10" height="12" fill="#F4D35E" opacity="0.7"/>
  <rect x="260" y="450" width="10" height="12" fill="#F4D35E" opacity="0.6"/>
  <!-- Building 4 - black narrow -->
  <rect x="325" y="260" width="55" height="460" fill="#000000" opacity="0.85"/>
  <rect x="340" y="290" width="8" height="10" fill="#F4D35E" opacity="0.9"/>
  <rect x="355" y="340" width="8" height="10" fill="#E76F51" opacity="0.8"/>
  <rect x="340" y="420" width="8" height="10" fill="#F4D35E" opacity="0.7"/>
