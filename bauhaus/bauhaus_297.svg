  <rect x="530" y="180" width="60" height="540" fill="#264653" opacity="0.9"/>
  <rect x="545" y="210" width="10" height="12" fill="#F4D35E" opacity="0.8"/>
  <rect x="545" y="290" width="10" height="12" fill="#E76F51" opacity="0.7"/>
  <rect x="565" y="370" width="10" height="12" fill="#F4D35E" opacity="0.6"/>
