  <rect x="395" y="300" width="120" height="420" fill="#1D3557" opacity="0.8"/>
  <rect x="415" y="330" width="14" height="16" fill="#F4D35E" opacity="0.8"/>
  <rect x="470" y="330" width="14" height="16" fill="#F4D35E" opacity="0.7"/>
  <rect x="415" y="390" width="14" height="16" fill="#E76F51" opacity="0.7"/>
  <rect x="470" y="430" width="14" height="16" fill="#F4D35E" opacity="0.8"/>
  <rect x="440" y="500" width="14" height="16" fill="#F4D35E" opacity="0.5"/>
