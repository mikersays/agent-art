<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Background geometric accents -->
  <circle cx="100" cy="100" r="80" fill="#F4D35E" opacity="0.1"/>
  <circle cx="700" cy="700" r="80" fill="#2A9D8F" opacity="0.1"/>
  <circle cx="700" cy="100" r="60" fill="#E63946" opacity="0.1"/>
  <circle cx="100" cy="700" r="60" fill="#1D3557" opacity="0.1"/>

  <!-- Outer frame -->
  <rect x="60" y="40" width="680" height="720" fill="none" stroke="#000000" stroke-width="4"/>

  <!-- Frame decorative corners -->
  <rect x="55" y="35" width="30" height="30" fill="#E63946"/>
  <rect x="715" y="35" width="30" height="30" fill="#1D3557"/>
  <rect x="55" y="735" width="30" height="30" fill="#F4D35E"/>
  <rect x="715" y="735" width="30" height="30" fill="#2A9D8F"/>

  <!-- Vertical frame pillars -->
  <rect x="140" y="60" width="12" height="680" fill="#000000"/>
  <rect x="648" y="60" width="12" height="680" fill="#000000"/>

  <!-- Top horizontal bar -->
  <rect x="140" y="60" width="520" height="12" fill="#000000"/>

  <!-- Bottom horizontal bar -->
  <rect x="140" y="728" width="520" height="12" fill="#000000"/>

  <!-- Cross bars at neck -->
  <rect x="340" y="385" width="120" height="8" fill="#264653"/>
  <rect x="360" y="375" width="80" height="6" fill="#E9C46A"/>

  <!-- Top triangle (upper bulb) -->
  <polygon points="400,100 560,380 240,380" fill="none" stroke="#E63946" stroke-width="4"/>
  <polygon points="400,120 540,370 260,370" fill="#E63946" opacity="0.15"/>

  <!-- Bottom triangle (lower bulb) -->
  <polygon points="400,700 240,400 560,400" fill="none" stroke="#1D3557" stroke-width="4"/>
  <polygon points="400,680 260,410 540,410" fill="#1D3557" opacity="0.15"/>

  <!-- Neck / meeting point accent -->
  <circle cx="400" cy="390" r="15" fill="#000000"/>
  <circle cx="400" cy="390" r="8" fill="#F4D35E"/>

  <!-- FALLING PARTICLES in upper triangle (sand falling) -->
  <!-- Layer 1: near top -->
  <rect x="392" y="160" width="8" height="8" fill="#F4D35E" transform="rotate(30,396,164)"/>
  <circle cx="410" cy="185" r="4" fill="#E63946"/>
  <polygon points="385,180 390,170 395,180" fill="#2A9D8F"/>
  <rect x="415" y="195" width="6" height="6" fill="#E9C46A"/>

  <!-- Layer 2: mid-upper -->
  <circle cx="370" cy="230" r="5" fill="#F4D35E"/>
  <rect x="400" y="225" width="7" height="7" fill="#E63946" transform="rotate(45,403,228)"/>
  <circle cx="425" cy="240" r="3" fill="#264653"/>
  <polygon points="355,250 360,240 365,250" fill="#1D3557"/>
  <rect x="430" y="245" width="5" height="5" fill="#2A9D8F"/>
  <circle cx="390" cy="255" r="4" fill="#E9C46A"/>

  <!-- Layer 3: mid -->
  <circle cx="350" cy="280" r="4" fill="#E63946"/>
  <rect x="375" y="285" width="6" height="6" fill="#F4D35E"/>
  <polygon points="410,275 415,285 405,285" fill="#2A9D8F"/>
  <circle cx="440" cy="290" r="3" fill="#000000"/>
  <rect x="330" y="295" width="5" height="5" fill="#1D3557" transform="rotate(20,332,297)"/>
  <circle cx="460" cy="285" r="4" fill="#E9C46A"/>
  <polygon points="395,300 400,290 405,300" fill="#E63946"/>

  <!-- Layer 4: approaching neck -->
  <circle cx="320" cy="320" r="5" fill="#F4D35E"/>
  <rect x="350" y="325" width="7" height="7" fill="#2A9D8F"/>
  <circle cx="380" cy="330" r="3" fill="#E63946"/>
  <rect x="405" y="320" width="5" height="5" fill="#E9C46A" transform="rotate(45,407,322)"/>
  <circle cx="435" cy="335" r="4" fill="#1D3557"/>
  <polygon points="470,325 475,335 465,335" fill="#F4D35E"/>
  <circle cx="300" cy="340" r="3" fill="#264653"/>
  <rect x="490" y="330" width="4" height="4" fill="#E63946"/>

  <!-- Dense layer near neck -->
  <circle cx="360" cy="360" r="3" fill="#F4D35E"/>
  <circle cx="380" cy="365" r="4" fill="#E63946"/>
  <circle cx="400" cy="368" r="3" fill="#E9C46A"/>
  <circle cx="420" cy="362" r="4" fill="#2A9D8F"/>
  <circle cx="440" cy="366" r="3" fill="#F4D35E"/>
  <rect x="345" y="358" width="4" height="4" fill="#1D3557"/>
  <rect x="450" y="360" width="4" height="4" fill="#264653"/>

  <!-- ACCUMULATED PARTICLES in lower triangle -->
  <!-- Dense bottom layer -->
  <circle cx="340" cy="560" r="5" fill="#F4D35E"/>
  <circle cx="360" cy="555" r="6" fill="#E63946"/>
  <circle cx="380" cy="560" r="5" fill="#2A9D8F"/>
  <circle cx="400" cy="558" r="6" fill="#E9C46A"/>
  <circle cx="420" cy="555" r="5" fill="#F4D35E"/>
  <circle cx="440" cy="560" r="6" fill="#1D3557"/>
  <circle cx="460" cy="558" r="5" fill="#E63946"/>

  <rect x="300" y="575" width="200" height="12" fill="#F4D35E" opacity="0.3" rx="2"/>
  <circle cx="325" cy="590" r="5" fill="#2A9D8F"/>
  <circle cx="350" cy="595" r="6" fill="#E63946"/>
  <circle cx="375" cy="590" r="5" fill="#F4D35E"/>
  <circle cx="400" cy="593" r="6" fill="#264653"/>
  <circle cx="425" cy="590" r="5" fill="#E9C46A"/>
  <circle cx="450" cy="595" r="6" fill="#1D3557"/>
  <circle cx="475" cy="592" r="5" fill="#E63946"/>

  <rect x="280" y="608" width="240" height="14" fill="#E9C46A" opacity="0.2" rx="2"/>
  <circle cx="310" cy="620" r="5" fill="#F4D35E"/>
  <circle cx="340" cy="625" r="6" fill="#2A9D8F"/>
  <circle cx="370" cy="622" r="5" fill="#E63946"/>
  <circle cx="400" cy="625" r="6" fill="#F4D35E"/>
  <circle cx="430" cy="620" r="5" fill="#1D3557"/>
  <circle cx="460" cy="624" r="6" fill="#E9C46A"/>
  <circle cx="490" cy="622" r="5" fill="#264653"/>

  <!-- Final dense bottom -->
  <rect x="265" y="640" width="270" height="40" fill="#F4D35E" opacity="0.15" rx="3"/>

  <!-- Stream of particles through neck -->
  <circle cx="400" cy="410" r="3" fill="#F4D35E"/>
  <rect x="397" y="420" width="5" height="5" fill="#E63946" transform="rotate(30,399,422)"/>
  <circle cx="400" cy="435" r="3" fill="#2A9D8F"/>
  <polygon points="397,448 400,442 403,448" fill="#E9C46A"/>
  <circle cx="400" cy="460" r="2" fill="#F4D35E"/>
  <rect x="398" y="470" width="4" height="4" fill="#1D3557"/>
  <circle cx="400" cy="485" r="3" fill="#E63946"/>

  <!-- Decorative side elements -->
  <line x1="80" y1="390" x2="130" y2="390" stroke="#E63946" stroke-width="3"/>
  <line x1="670" y1="390" x2="720" y2="390" stroke="#1D3557" stroke-width="3"/>

  <polygon points="80,300 95,280 110,300" fill="#2A9D8F"/>
  <polygon points="690,500 705,480 720,500" fill="#E9C46A"/>

  <circle cx="95" cy="500" r="12" fill="none" stroke="#F4D35E" stroke-width="2"/>
  <circle cx="705" cy="300" r="12" fill="none" stroke="#E63946" stroke-width="2"/>
</svg>