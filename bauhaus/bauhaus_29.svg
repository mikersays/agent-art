<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Eye of the Bauhaus</title>
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Radiating geometric patterns - outer ring -->
  <!-- Triangles radiating outward -->
  <polygon points="400,50 370,130 430,130" fill="#E63946" opacity="0.6"/>
  <polygon points="400,750 370,670 430,670" fill="#E63946" opacity="0.6"/>
  <polygon points="50,400 130,370 130,430" fill="#1D3557" opacity="0.6"/>
  <polygon points="750,400 670,370 670,430" fill="#1D3557" opacity="0.6"/>

  <!-- Diagonal radiating triangles -->
  <polygon points="150,150 200,190 170,220" fill="#F4D35E" opacity="0.5"/>
  <polygon points="650,150 600,190 630,220" fill="#F4D35E" opacity="0.5"/>
  <polygon points="150,650 200,610 170,580" fill="#2A9D8F" opacity="0.5"/>
  <polygon points="650,650 600,610 630,580" fill="#2A9D8F" opacity="0.5"/>

  <!-- Radiating lines from center -->
  <line x1="400" y1="400" x2="400" y2="30" stroke="#333333" stroke-width="2" opacity="0.3"/>
  <line x1="400" y1="400" x2="400" y2="770" stroke="#333333" stroke-width="2" opacity="0.3"/>
  <line x1="400" y1="400" x2="30" y2="400" stroke="#333333" stroke-width="2" opacity="0.3"/>
  <line x1="400" y1="400" x2="770" y2="400" stroke="#333333" stroke-width="2" opacity="0.3"/>
  <line x1="400" y1="400" x2="140" y2="140" stroke="#333333" stroke-width="1.5" opacity="0.2"/>
  <line x1="400" y1="400" x2="660" y2="140" stroke="#333333" stroke-width="1.5" opacity="0.2"/>
  <line x1="400" y1="400" x2="140" y2="660" stroke="#333333" stroke-width="1.5" opacity="0.2"/>
  <line x1="400" y1="400" x2="660" y2="660" stroke="#333333" stroke-width="1.5" opacity="0.2"/>
  <line x1="400" y1="400" x2="200" y2="60" stroke="#333333" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="600" y2="60" stroke="#333333" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="200" y2="740" stroke="#333333" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="600" y2="740" stroke="#333333" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="60" y2="200" stroke="#333333" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="740" y2="200" stroke="#333333" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="60" y2="600" stroke="#333333" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="740" y2="600" stroke="#333333" stroke-width="1" opacity="0.15"/>

  <!-- Concentric geometric rings -->
  <circle cx="400" cy="400" r="320" fill="none" stroke="#333333" stroke-width="1.5" opacity="0.2"/>
  <rect x="130" y="130" width="540" height="540" fill="none" stroke="#333333" stroke-width="1" opacity="0.15" transform="rotate(45 400 400)"/>
  <circle cx="400" cy="400" r="260" fill="none" stroke="#1D3557" stroke-width="2" opacity="0.25"/>
  <rect x="180" y="180" width="440" height="440" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.2"/>

  <!-- Corner geometric accents -->
  <rect x="40" y="40" width="80" height="80" fill="#E63946" opacity="0.4"/>
  <rect x="680" y="40" width="80" height="80" fill="#1D3557" opacity="0.4"/>
  <rect x="40" y="680" width="80" height="80" fill="#F4D35E" opacity="0.4"/>
  <rect x="680" y="680" width="80" height="80" fill="#2A9D8F" opacity="0.4"/>

  <!-- Small squares along edges -->
  <rect x="250" y="50" width="30" height="30" fill="#333333" opacity="0.3"/>
  <rect x="520" y="50" width="30" height="30" fill="#333333" opacity="0.3"/>
  <rect x="250" y="720" width="30" height="30" fill="#333333" opacity="0.3"/>
  <rect x="520" y="720" width="30" height="30" fill="#333333" opacity="0.3"/>
  <rect x="50" y="250" width="30" height="30" fill="#333333" opacity="0.3"/>
  <rect x="50" y="520" width="30" height="30" fill="#333333" opacity="0.3"/>
  <rect x="720" y="250" width="30" height="30" fill="#333333" opacity="0.3"/>
  <rect x="720" y="520" width="30" height="30" fill="#333333" opacity="0.3"/>

  <!-- THE EYE - Almond/vesica piscis shape -->
  <path d="M150,400 Q400,200 650,400 Q400,600 150,400 Z" fill="#F4D35E" opacity="0.35" stroke="#000000" stroke-width="3"/>

  <!-- Upper eyelid line -->
  <path d="M150,400 Q400,200 650,400" fill="none" stroke="#000000" stroke-width="4"/>
  <!-- Lower eyelid line -->
  <path d="M150,400 Q400,600 650,400" fill="none" stroke="#000000" stroke-width="4"/>

  <!-- Outer iris -->
  <circle cx="400" cy="400" r="120" fill="#1D3557" opacity="0.8"/>
  <!-- Inner iris ring -->
  <circle cx="400" cy="400" r="90" fill="#2A9D8F" opacity="0.7"/>
  <!-- Pupil -->
  <circle cx="400" cy="400" r="50" fill="#000000"/>
  <!-- Highlight -->
  <circle cx="380" cy="380" r="18" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="415" cy="370" r="8" fill="#FFFFFF" opacity="0.4"/>

  <!-- Iris detail lines -->
  <line x1="400" y1="280" x2="400" y2="350" stroke="#E9C46A" stroke-width="1.5" opacity="0.5"/>
  <line x1="400" y1="450" x2="400" y2="520" stroke="#E9C46A" stroke-width="1.5" opacity="0.5"/>
  <line x1="280" y1="400" x2="350" y2="400" stroke="#E9C46A" stroke-width="1.5" opacity="0.5"/>
  <line x1="450" y1="400" x2="520" y2="400" stroke="#E9C46A" stroke-width="1.5" opacity="0.5"/>

  <!-- Eyelash-like geometric dashes on top -->
  <line x1="250" y1="320" x2="240" y2="280" stroke="#000000" stroke-width="2.5" opacity="0.6"/>
  <line x1="310" y1="290" x2="295" y2="250" stroke="#000000" stroke-width="2.5" opacity="0.6"/>
  <line x1="370" y1="270" x2="360" y2="230" stroke="#000000" stroke-width="2.5" opacity="0.6"/>
  <line x1="430" y1="270" x2="440" y2="230" stroke="#000000" stroke-width="2.5" opacity="0.6"/>
  <line x1="490" y1="290" x2="505" y2="250" stroke="#000000" stroke-width="2.5" opacity="0.6"/>
  <line x1="550" y1="320" x2="560" y2="280" stroke="#000000" stroke-width="2.5" opacity="0.6"/>

  <!-- Red accent arcs around eye -->
  <path d="M180,350 Q400,150 620,350" fill="none" stroke="#E63946" stroke-width="2" opacity="0.4"/>
  <path d="M180,450 Q400,650 620,450" fill="none" stroke="#E63946" stroke-width="2" opacity="0.4"/>
</svg>