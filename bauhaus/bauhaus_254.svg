<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Grid lines -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <!-- Connecting diagonal lines through center -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <line x1="200" y1="200" x2="600" y2="600" stroke="#A89F91" stroke-width="1" opacity="0.25"/>
  <line x1="600" y1="200" x2="200" y2="600" stroke="#A89F91" stroke-width="1" opacity="0.25"/>
  <!-- TOP-LEFT: Nested red squares -->
  <rect x="30" y="30" width="280" height="280" fill="none" stroke="#E63946" stroke-width="4" opacity="0.85"/>
  <rect x="60" y="60" width="220" height="220" fill="#E63946" opacity="0.15"/>
  <rect x="60" y="60" width="220" height="220" fill="none" stroke="#E63946" stroke-width="3" opacity="0.75"/>
  <rect x="95" y="95" width="150" height="150" fill="#E63946" opacity="0.3"/>
  <rect x="95" y="95" width="150" height="150" fill="none" stroke="#E63946" stroke-width="2.5" opacity="0.7"/>
  <rect x="130" y="130" width="80" height="80" fill="#E63946" opacity="0.65"/>
  <rect x="150" y="150" width="40" height="40" fill="#FFFFFF" opacity="0.8"/>
  <!-- TOP-RIGHT: Overlapping blue circles -->
  <circle cx="600" cy="120" r="100" fill="#1D3557" opacity="0.3"/>
  <circle cx="660" cy="160" r="85" fill="#1D3557" opacity="0.4"/>
  <circle cx="630" cy="200" r="65" fill="#1D3557" opacity="0.55"/>
  <circle cx="690" cy="100" r="55" fill="#457B9D" opacity="0.5"/>
  <circle cx="650" cy="150" r="35" fill="#A8DADC" opacity="0.7"/>
  <circle cx="580" cy="80" r="40" fill="#1D3557" opacity="0.45"/>
  <!-- BOTTOM-LEFT: Yellow triangles -->
  <polygon points="170,600 50,780 290,780" fill="#F4D35E" opacity="0.7"/>
  <polygon points="170,640 90,760 250,760" fill="#E9C46A" opacity="0.6"/>
  <polygon points="120,680 60,780 180,780" fill="#F4D35E" opacity="0.8"/>
  <polygon points="220,650 180,730 260,730" fill="#DDA15E" opacity="0.55"/>
  <polygon points="80,620 40,700 120,700" fill="#F4D35E" opacity="0.45"/>
  <polygon points="170,700 140,760 200,760" fill="#FFFFFF" opacity="0.6"/>
  <!-- BOTTOM-RIGHT: Teal rectangles -->
  <rect x="540" y="560" width="120" height="60" fill="#2A9D8F" opacity="0.6"/>
  <rect x="580" y="620" width="100" height="80" fill="#2A9D8F" opacity="0.5"/>
  <rect x="620" y="540" width="80" height="110" fill="#264653" opacity="0.55"/>
  <rect x="680" y="600" width="90" height="70" fill="#2A9D8F" opacity="0.7"/>
  <rect x="560" y="700" width="130" height="50" fill="#264653" opacity="0.45"/>
  <rect x="700" y="700" width="70" height="70" fill="#2A9D8F" opacity="0.65"/>
  <!-- Center accent -->
  <circle cx="400" cy="400" r="25" fill="#000000" opacity="0.5"/>
  <circle cx="400" cy="400" r="12" fill="#FFFFFF" opacity="0.8"/>
  <!-- Small linking accents along diagonals -->
  <circle cx="300" cy="300" r="8" fill="#E63946" opacity="0.5"/>
  <circle cx="500" cy="300" r="8" fill="#1D3557" opacity="0.5"/>
  <circle cx="300" cy="500" r="8" fill="#F4D35E" opacity="0.5"/>
  <circle cx="500" cy="500" r="8" fill="#2A9D8F" opacity="0.5"/>
</svg>