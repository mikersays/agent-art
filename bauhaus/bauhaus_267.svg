<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Background grid of thin black lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.1"/>

  <!-- Cross - vertical bar -->
  <rect x="320" y="80" width="160" height="640" fill="#E63946" opacity="0.85"/>
  <!-- Cross - horizontal bar -->
  <rect x="120" y="320" width="560" height="160" fill="#E63946" opacity="0.75"/>
  <!-- Overlap center darker -->
  <rect x="320" y="320" width="160" height="160" fill="#6D2E46" opacity="0.3"/>

  <!-- Blue circles at each arm's end -->
  <circle cx="400" cy="80" r="45" fill="#1D3557" opacity="0.8"/>
  <circle cx="400" cy="720" r="45" fill="#1D3557" opacity="0.8"/>
  <circle cx="120" cy="400" r="45" fill="#1D3557" opacity="0.8"/>
  <circle cx="680" cy="400" r="45" fill="#1D3557" opacity="0.8"/>

  <!-- Yellow triangles pointing outward from the cross -->
  <!-- Top triangle pointing up -->
  <polygon points="400,20 360,80 440,80" fill="#F4D35E" opacity="0.9"/>
  <!-- Bottom triangle pointing down -->
  <polygon points="400,780 360,720 440,720" fill="#F4D35E" opacity="0.9"/>
  <!-- Left triangle pointing left -->
  <polygon points="60,400 120,360 120,440" fill="#F4D35E" opacity="0.9"/>
  <!-- Right triangle pointing right -->
  <polygon points="740,400 680,360 680,440" fill="#F4D35E" opacity="0.9"/>

  <!-- Teal small accent shapes -->
  <circle cx="200" cy="180" r="14" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="620" cy="200" r="10" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="180" cy="620" r="12" fill="#2A9D8F" opacity="0.65"/>
  <circle cx="650" cy="600" r="11" fill="#2A9D8F" opacity="0.7"/>
  <rect x="240" y="170" width="16" height="16" fill="#2A9D8F" opacity="0.5"/>

  <!-- Orange small accent shapes -->
  <circle cx="580" cy="160" r="8" fill="#E76F51" opacity="0.75"/>
  <circle cx="220" cy="580" r="9" fill="#E76F51" opacity="0.7"/>
  <rect x="600" y="580" width="14" height="14" fill="#E76F51" opacity="0.6"/>
  <circle cx="150" cy="250" r="7" fill="#E76F51" opacity="0.65"/>
  <rect x="640" y="250" width="12" height="12" fill="#E76F51" opacity="0.55"/>

  <!-- Scattered small black squares -->
  <rect x="260" y="140" width="8" height="8" fill="#000000" opacity="0.4"/>
  <rect x="530" y="130" width="8" height="8" fill="#000000" opacity="0.4"/>
  <rect x="160" y="530" width="8" height="8" fill="#000000" opacity="0.4"/>
  <rect x="630" y="520" width="8" height="8" fill="#000000" opacity="0.4"/>
  <rect x="550" y="680" width="8" height="8" fill="#000000" opacity="0.3"/>
  <rect x="240" y="680" width="8" height="8" fill="#000000" opacity="0.3"/>

  <!-- Additional accent - diagonal lines in corners -->
  <line x1="50" y1="50" x2="150" y2="150" stroke="#457B9D" stroke-width="1.5" opacity="0.3"/>
  <line x1="650" y1="50" x2="750" y2="150" stroke="#457B9D" stroke-width="1.5" opacity="0.3"/>
  <line x1="50" y1="750" x2="150" y2="650" stroke="#457B9D" stroke-width="1.5" opacity="0.3"/>
  <line x1="750" y1="750" x2="650" y2="650" stroke="#457B9D" stroke-width="1.5" opacity="0.3"/>

  <!-- Corner accents -->
  <circle cx="50" cy="50" r="6" fill="#DDA15E" opacity="0.5"/>
  <circle cx="750" cy="50" r="6" fill="#DDA15E" opacity="0.5"/>
  <circle cx="50" cy="750" r="6" fill="#DDA15E" opacity="0.5"/>
  <circle cx="750" cy="750" r="6" fill="#DDA15E" opacity="0.5"/>
</svg>