<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Faint background grid -->
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>

  <!-- Connecting lines between nearby dots -->
  <line x1="120" y1="150" x2="210" y2="200" stroke="#1D3557" stroke-width="0.8" opacity="0.25"/>
  <line x1="210" y1="200" x2="310" y2="170" stroke="#1D3557" stroke-width="0.8" opacity="0.25"/>
  <line x1="310" y1="170" x2="380" y2="260" stroke="#000000" stroke-width="0.8" opacity="0.2"/>
  <line x1="500" y1="120" x2="580" y2="190" stroke="#1D3557" stroke-width="0.8" opacity="0.25"/>
  <line x1="580" y1="190" x2="650" y2="140" stroke="#000000" stroke-width="0.8" opacity="0.2"/>
  <line x1="150" y1="420" x2="250" y2="380" stroke="#457B9D" stroke-width="0.8" opacity="0.2"/>
  <line x1="250" y1="380" x2="350" y2="450" stroke="#1D3557" stroke-width="0.8" opacity="0.25"/>
  <line x1="500" y1="400" x2="600" y2="350" stroke="#000000" stroke-width="0.8" opacity="0.2"/>
  <line x1="600" y1="350" x2="690" y2="420" stroke="#1D3557" stroke-width="0.8" opacity="0.25"/>
  <line x1="200" y1="600" x2="300" y2="560" stroke="#457B9D" stroke-width="0.8" opacity="0.2"/>
  <line x1="300" y1="560" x2="400" y2="620" stroke="#1D3557" stroke-width="0.8" opacity="0.25"/>
  <line x1="550" y1="580" x2="650" y2="630" stroke="#000000" stroke-width="0.8" opacity="0.2"/>
  <line x1="650" y1="630" x2="720" y2="570" stroke="#1D3557" stroke-width="0.8" opacity="0.25"/>
  <line x1="100" y1="700" x2="200" y2="600" stroke="#457B9D" stroke-width="0.8" opacity="0.15"/>

  <!-- Large focal point dots - Red -->
  <circle cx="350" cy="450" r="18" fill="#E63946" opacity="0.9"/>
  <circle cx="600" cy="350" r="15" fill="#E63946" opacity="0.85"/>

  <!-- Large focal point dots - Yellow -->
  <circle cx="250" cy="380" r="16" fill="#F4D35E" opacity="0.9"/>
  <circle cx="500" cy="400" r="14" fill="#F4D35E" opacity="0.85"/>

  <!-- Medium blue dots -->
  <circle cx="120" cy="150" r="8" fill="#1D3557" opacity="0.7"/>
  <circle cx="310" cy="170" r="7" fill="#1D3557" opacity="0.65"/>
  <circle cx="580" cy="190" r="9" fill="#1D3557" opacity="0.7"/>
  <circle cx="300" cy="560" r="8" fill="#1D3557" opacity="0.65"/>
  <circle cx="650" cy="630" r="7" fill="#1D3557" opacity="0.7"/>

  <!-- Medium black dots -->
  <circle cx="210" cy="200" r="6" fill="#000000" opacity="0.6"/>
  <circle cx="380" cy="260" r="7" fill="#000000" opacity="0.55"/>
  <circle cx="690" cy="420" r="6" fill="#000000" opacity="0.6"/>
  <circle cx="550" cy="580" r="7" fill="#000000" opacity="0.55"/>

  <!-- Small scattered dots -->
  <circle cx="500" cy="120" r="5" fill="#1D3557" opacity="0.5"/>
  <circle cx="650" cy="140" r="5" fill="#000000" opacity="0.5"/>
  <circle cx="150" cy="420" r="5" fill="#1D3557" opacity="0.5"/>
  <circle cx="200" cy="600" r="5" fill="#457B9D" opacity="0.5"/>
  <circle cx="400" cy="620" r="5" fill="#1D3557" opacity="0.5"/>
  <circle cx="720" cy="570" r="5" fill="#000000" opacity="0.5"/>
  <circle cx="100" cy="700" r="5" fill="#1D3557" opacity="0.45"/>

  <!-- Tiny scattered dots for texture -->
  <circle cx="70" cy="300" r="3" fill="#000000" opacity="0.3"/>
  <circle cx="450" cy="80" r="3" fill="#1D3557" opacity="0.3"/>
  <circle cx="740" cy="300" r="3" fill="#000000" opacity="0.3"/>
  <circle cx="430" cy="730" r="3" fill="#1D3557" opacity="0.3"/>
  <circle cx="80" cy="550" r="3" fill="#457B9D" opacity="0.25"/>
  <circle cx="750" cy="700" r="3" fill="#000000" opacity="0.3"/>
  <circle cx="620" cy="500" r="3" fill="#1D3557" opacity="0.25"/>
  <circle cx="170" cy="310" r="4" fill="#264653" opacity="0.3"/>
  <circle cx="530" cy="270" r="3" fill="#000000" opacity="0.25"/>
  <circle cx="340" cy="700" r="4" fill="#457B9D" opacity="0.3"/>

  <!-- Corner accent -->
  <rect x="740" y="740" width="30" height="30" fill="#E63946" opacity="0.25"/>
  <rect x="30" y="30" width="25" height="25" fill="#1D3557" opacity="0.2"/>
</svg>