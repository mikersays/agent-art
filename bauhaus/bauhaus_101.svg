<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Ground plane -->
  <rect x="0" y="620" width="800" height="180" fill="#264653"/>
  <line x1="0" y1="620" x2="800" y2="620" stroke="#000000" stroke-width="2"/>

  <!-- Ziggurat - Tier 1 (base, widest) -->
  <rect x="150" y="480" width="500" height="140" fill="#1D3557"/>
  <rect x="150" y="480" width="250" height="140" fill="#457B9D" opacity="0.6"/>
  <rect x="150" y="480" width="500" height="140" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Tier 1 ornaments -->
  <rect x="200" y="520" width="30" height="30" fill="#F4D35E"/>
  <rect x="270" y="520" width="30" height="30" fill="#E63946"/>
  <rect x="340" y="520" width="30" height="30" fill="#F4D35E"/>
  <rect x="410" y="520" width="30" height="30" fill="#E63946"/>
  <rect x="480" y="520" width="30" height="30" fill="#F4D35E"/>
  <rect x="550" y="520" width="30" height="30" fill="#E63946"/>
  <line x1="170" y1="560" x2="630" y2="560" stroke="#DDA15E" stroke-width="3"/>

  <!-- Ziggurat - Tier 2 -->
  <rect x="210" y="360" width="380" height="120" fill="#E63946"/>
  <rect x="210" y="360" width="190" height="120" fill="#000000" opacity="0.15"/>
  <rect x="210" y="360" width="380" height="120" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Tier 2 ornaments -->
  <circle cx="270" cy="420" r="15" fill="#F4D35E"/>
  <circle cx="340" cy="420" r="15" fill="#FFFFFF"/>
  <circle cx="410" cy="420" r="15" fill="#F4D35E"/>
  <circle cx="480" cy="420" r="15" fill="#FFFFFF"/>
  <line x1="230" y1="450" x2="570" y2="450" stroke="#DDA15E" stroke-width="3"/>

  <!-- Ziggurat - Tier 3 -->
  <rect x="270" y="260" width="260" height="100" fill="#F4D35E"/>
  <rect x="270" y="260" width="130" height="100" fill="#DDA15E" opacity="0.5"/>
  <rect x="270" y="260" width="260" height="100" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Tier 3 ornaments -->
  <polygon points="320,280 335,310 305,310" fill="#1D3557"/>
  <polygon points="400,280 415,310 385,310" fill="#E63946"/>
  <polygon points="480,280 495,310 465,310" fill="#1D3557"/>
  <line x1="290" y1="340" x2="510" y2="340" stroke="#000000" stroke-width="2"/>

  <!-- Ziggurat - Tier 4 -->
  <rect x="330" y="180" width="140" height="80" fill="#457B9D"/>
  <rect x="330" y="180" width="70" height="80" fill="#1D3557" opacity="0.3"/>
  <rect x="330" y="180" width="140" height="80" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Tier 4 ornaments -->
  <rect x="355" y="200" width="20" height="20" fill="#F4D35E" transform="rotate(45,365,210)"/>
  <rect x="425" y="200" width="20" height="20" fill="#F4D35E" transform="rotate(45,435,210)"/>

  <!-- Ziggurat - Tier 5 (top) -->
  <rect x="370" y="120" width="60" height="60" fill="#000000"/>
  <rect x="370" y="120" width="60" height="60" fill="none" stroke="#F4D35E" stroke-width="2"/>

  <!-- Capstone ornament -->
  <circle cx="400" cy="150" r="12" fill="#E63946"/>
  <circle cx="400" cy="150" r="6" fill="#F4D35E"/>

  <!-- Pinnacle -->
  <polygon points="400,80 390,120 410,120" fill="#000000"/>
  <line x1="400" y1="70" x2="400" y2="80" stroke="#E63946" stroke-width="3"/>

  <!-- Shadow/base detail -->
  <line x1="150" y1="620" x2="650" y2="620" stroke="#000000" stroke-width="3"/>

  <!-- Decorative side elements -->
  <line x1="100" y1="620" x2="150" y2="480" stroke="#DDA15E" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="700" y1="620" x2="650" y2="480" stroke="#DDA15E" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Ground ornaments -->
  <circle cx="100" cy="680" r="20" fill="#E63946" opacity="0.7"/>
  <circle cx="700" cy="680" r="20" fill="#F4D35E" opacity="0.7"/>
  <rect x="60" y="700" width="40" height="40" fill="#1D3557" opacity="0.5"/>
  <rect x="680" y="700" width="40" height="40" fill="#457B9D" opacity="0.5"/>
</svg>