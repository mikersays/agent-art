<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Counterweight</title>
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Grid lines for Bauhaus structure -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- LEFT SIDE: Heavy shapes -->
  <!-- Large red circle - dominant weight -->
  <circle cx="180" cy="350" r="160" fill="#E63946"/>
  <!-- Large dark blue rectangle -->
  <rect x="40" y="520" width="280" height="200" fill="#1D3557"/>
  <!-- Overlapping black square -->
  <rect x="120" y="180" width="140" height="140" fill="#000000" opacity="0.85"/>
  <!-- Yellow accent on heavy side -->
  <rect x="60" y="140" width="80" height="80" fill="#F4D35E"/>
  <!-- Steel blue triangle -->
  <polygon points="300,520 40,520 170,380" fill="#457B9D" opacity="0.7"/>

  <!-- Central fulcrum / balance point -->
  <polygon points="400,350 380,420 420,420" fill="#000000"/>
  <line x1="100" y1="420" x2="700" y2="420" stroke="#000000" stroke-width="3"/>
  <circle cx="400" cy="420" r="6" fill="#E63946"/>

  <!-- RIGHT SIDE: Many small shapes creating equivalent visual weight -->
  <!-- Row 1 of small elements -->
  <circle cx="480" cy="160" r="12" fill="#E63946"/>
  <circle cx="520" cy="140" r="8" fill="#1D3557"/>
  <circle cx="555" cy="155" r="10" fill="#F4D35E"/>
  <circle cx="590" cy="145" r="6" fill="#000000"/>
  <circle cx="620" cy="160" r="9" fill="#457B9D"/>
  <circle cx="660" cy="148" r="11" fill="#E9C46A"/>
  <circle cx="700" cy="155" r="7" fill="#E63946"/>
  <circle cx="730" cy="142" r="10" fill="#1D3557"/>

  <!-- Row 2 -->
  <rect x="470" y="190" width="18" height="18" fill="#1D3557"/>
  <rect x="505" y="195" width="14" height="14" fill="#E63946"/>
  <rect x="535" y="188" width="20" height="20" fill="#F4D35E"/>
  <rect x="572" y="192" width="12" height="12" fill="#000000"/>
  <rect x="600" y="186" width="16" height="16" fill="#457B9D"/>
  <rect x="635" y="193" width="15" height="15" fill="#A89F91"/>
  <rect x="668" y="188" width="18" height="18" fill="#E9C46A"/>
  <rect x="705" y="192" width="13" height="13" fill="#E63946"/>

  <!-- Row 3 - triangles -->
  <polygon points="480,240 490,260 470,260" fill="#F4D35E"/>
  <polygon points="520,235 532,258 508,258" fill="#E63946"/>
  <polygon points="558,238 570,260 546,260" fill="#1D3557"/>
  <polygon points="598,240 608,258 588,258" fill="#000000"/>
  <polygon points="635,236 648,260 622,260" fill="#457B9D"/>
  <polygon points="672,238 684,260 660,260" fill="#E9C46A"/>
  <polygon points="712,240 722,258 702,258" fill="#A89F91"/>

  <!-- Row 4 - mixed small shapes -->
  <circle cx="485" cy="290" r="10" fill="#457B9D"/>
  <rect x="510" y="280" width="16" height="16" fill="#E63946"/>
  <circle cx="555" cy="288" r="8" fill="#F4D35E"/>
  <rect x="578" y="282" width="12" height="12" fill="#1D3557"/>
  <circle cx="615" cy="290" r="11" fill="#000000"/>
  <rect x="640" y="278" width="18" height="18" fill="#E9C46A"/>
  <circle cx="685" cy="285" r="9" fill="#E63946"/>
  <rect x="710" y="281" width="14" height="14" fill="#457B9D"/>

  <!-- Row 5 -->
  <circle cx="490" cy="330" r="7" fill="#E9C46A"/>
  <circle cx="525" cy="325" r="11" fill="#1D3557"/>
  <circle cx="562" cy="332" r="9" fill="#E63946"/>
  <rect x="588" y="322" width="15" height="15" fill="#F4D35E"/>
  <rect x="622" y="326" width="11" height="11" fill="#000000"/>
  <circle cx="660" cy="330" r="13" fill="#457B9D"/>
  <rect x="690" y="320" width="17" height="17" fill="#A89F91"/>
  <circle cx="735" cy="328" r="8" fill="#E63946"/>

  <!-- Row 6 - below the fulcrum line -->
  <rect x="470" y="445" width="10" height="10" fill="#E63946"/>
  <rect x="498" y="450" width="8" height="8" fill="#1D3557"/>
  <rect x="522" y="443" width="12" height="12" fill="#F4D35E"/>
  <rect x="550" y="448" width="9" height="9" fill="#000000"/>
  <rect x="576" y="444" width="11" height="11" fill="#457B9D"/>
  <rect x="604" y="449" width="7" height="7" fill="#E9C46A"/>
  <rect x="628" y="442" width="13" height="13" fill="#A89F91"/>
  <rect x="658" y="447" width="10" height="10" fill="#E63946"/>
  <rect x="685" y="444" width="8" height="8" fill="#1D3557"/>
  <rect x="710" y="450" width="11" height="11" fill="#F4D35E"/>

  <!-- Scattered small dots - right side lower -->
  <circle cx="500" cy="500" r="5" fill="#E63946"/>
  <circle cx="540" cy="520" r="4" fill="#1D3557"/>
  <circle cx="580" cy="490" r="6" fill="#F4D35E"/>
  <circle cx="620" cy="510" r="3" fill="#000000"/>
  <circle cx="660" cy="495" r="5" fill="#457B9D"/>
  <circle cx="700" cy="515" r="4" fill="#E9C46A"/>
  <circle cx="520" cy="560" r="6" fill="#A89F91"/>
  <circle cx="570" cy="550" r="3" fill="#E63946"/>
  <circle cx="630" cy="545" r="5" fill="#1D3557"/>
  <circle cx="680" cy="555" r="4" fill="#F4D35E"/>
  <circle cx="720" cy="540" r="6" fill="#000000"/>

  <!-- Tiny line accents on right -->
  <line x1="480" y1="370" x2="510" y2="370" stroke="#E63946" stroke-width="2"/>
  <line x1="530" y1="375" x2="560" y2="375" stroke="#1D3557" stroke-width="2"/>
  <line x1="580" y1="368" x2="610" y2="368" stroke="#F4D35E" stroke-width="2"/>
  <line x1="630" y1="373" x2="660" y2="373" stroke="#000000" stroke-width="2"/>
  <line x1="680" y1="370" x2="710" y2="370" stroke="#457B9D" stroke-width="2"/>

  <!-- Bottom decorative bar -->
  <rect x="0" y="760" width="800" height="40" fill="#000000"/>
  <rect x="0" y="760" width="200" height="40" fill="#E63946"/>
  <rect x="600" y="760" width="200" height="40" fill="#1D3557"/>

  <!-- Top decorative bar -->
  <rect x="0" y="0" width="800" height="30" fill="#000000"/>
  <rect x="0" y="0" width="120" height="30" fill="#F4D35E"/>
  <rect x="680" y="0" width="120" height="30" fill="#457B9D"/>

  <!-- Title text area -->
  <text x="400" y="740" font-family="sans-serif" font-size="14" fill="#A89F91" text-anchor="middle" letter-spacing="4">COUNTERWEIGHT</text>
</svg>