<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Sundial - Circular face with radiating hour lines, gnomon shadow, concentric rings -->

  <!-- Outermost decorative ring -->
  <circle cx="400" cy="400" r="340" fill="none" stroke="#000000" stroke-width="6"/>
  <circle cx="400" cy="400" r="330" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>

  <!-- Concentric time rings -->
  <circle cx="400" cy="400" r="300" fill="none" stroke="#1D3557" stroke-width="3"/>
  <circle cx="400" cy="400" r="260" fill="none" stroke="#2A9D8F" stroke-width="2"/>
  <circle cx="400" cy="400" r="220" fill="none" stroke="#E76F51" stroke-width="2"/>
  <circle cx="400" cy="400" r="180" fill="none" stroke="#1D3557" stroke-width="1.5"/>
  <circle cx="400" cy="400" r="140" fill="none" stroke="#000000" stroke-width="1"/>

  <!-- Colored ring bands -->
  <circle cx="400" cy="400" r="320" fill="none" stroke="#F4D35E" stroke-width="10" opacity="0.4"/>
  <circle cx="400" cy="400" r="240" fill="none" stroke="#E63946" stroke-width="6" opacity="0.3"/>
  <circle cx="400" cy="400" r="160" fill="none" stroke="#2A9D8F" stroke-width="4" opacity="0.3"/>

  <!-- Hour lines - 12 radiating lines -->
  <line x1="400" y1="70" x2="400" y2="160" stroke="#000000" stroke-width="4"/>
  <line x1="400" y1="640" x2="400" y2="730" stroke="#000000" stroke-width="4"/>
  <line x1="70" y1="400" x2="160" y2="400" stroke="#000000" stroke-width="4"/>
  <line x1="640" y1="400" x2="730" y2="400" stroke="#000000" stroke-width="4"/>

  <!-- Diagonal hour lines -->
  <line x1="167" y1="167" x2="230" y2="230" stroke="#000000" stroke-width="3"/>
  <line x1="633" y1="167" x2="570" y2="230" stroke="#000000" stroke-width="3"/>
  <line x1="167" y1="633" x2="230" y2="570" stroke="#000000" stroke-width="3"/>
  <line x1="633" y1="633" x2="570" y2="570" stroke="#000000" stroke-width="3"/>

  <!-- Minor hour lines -->
  <line x1="230" y1="103" x2="260" y2="155" stroke="#000000" stroke-width="2"/>
  <line x1="570" y1="103" x2="540" y2="155" stroke="#000000" stroke-width="2"/>
  <line x1="103" y1="230" x2="155" y2="260" stroke="#000000" stroke-width="2"/>
  <line x1="697" y1="230" x2="645" y2="260" stroke="#000000" stroke-width="2"/>
  <line x1="103" y1="570" x2="155" y2="540" stroke="#000000" stroke-width="2"/>
  <line x1="697" y1="570" x2="645" y2="540" stroke="#000000" stroke-width="2"/>
  <line x1="230" y1="697" x2="260" y2="645" stroke="#000000" stroke-width="2"/>
  <line x1="570" y1="697" x2="540" y2="645" stroke="#000000" stroke-width="2"/>

  <!-- Hour markers - small shapes at the ends of lines -->
  <circle cx="400" cy="85" r="8" fill="#E63946"/>
  <circle cx="400" cy="715" r="8" fill="#1D3557"/>
  <circle cx="85" cy="400" r="8" fill="#2A9D8F"/>
  <circle cx="715" cy="400" r="8" fill="#E76F51"/>
  <rect x="155" y="155" width="14" height="14" fill="#F4D35E" transform="rotate(45, 162, 162)"/>
  <rect x="625" y="155" width="14" height="14" fill="#F4D35E" transform="rotate(45, 632, 162)"/>
  <rect x="155" y="625" width="14" height="14" fill="#F4D35E" transform="rotate(45, 162, 632)"/>
  <rect x="625" y="625" width="14" height="14" fill="#F4D35E" transform="rotate(45, 632, 632)"/>

  <!-- Triangular gnomon shadow -->
  <polygon points="400,400 340,140 400,140" fill="#000000" opacity="0.85"/>
  <polygon points="400,400 400,140 430,200" fill="#1D3557" opacity="0.5"/>

  <!-- Shadow cast by gnomon -->
  <polygon points="400,400 500,650 420,650" fill="#000000" opacity="0.2"/>

  <!-- Center hub -->
  <circle cx="400" cy="400" r="20" fill="#E63946"/>
  <circle cx="400" cy="400" r="12" fill="#000000"/>
  <circle cx="400" cy="400" r="5" fill="#F4D35E"/>

  <!-- Decorative corner elements -->
  <rect x="30" y="30" width="50" height="50" fill="#1D3557"/>
  <rect x="720" y="30" width="50" height="50" fill="#E63946"/>
  <rect x="30" y="720" width="50" height="50" fill="#F4D35E"/>
  <rect x="720" y="720" width="50" height="50" fill="#2A9D8F"/>
