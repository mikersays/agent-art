<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Sundial - Circular face with radiating lines and concentric rings -->
  <!-- Outer concentric rings -->
  <circle cx="400" cy="400" r="340" fill="none" stroke="#1D3557" stroke-width="4"/>
  <circle cx="400" cy="400" r="310" fill="none" stroke="#457B9D" stroke-width="2"/>
  <circle cx="400" cy="400" r="280" fill="none" stroke="#2A9D8F" stroke-width="3"/>
  <circle cx="400" cy="400" r="240" fill="none" stroke="#E76F51" stroke-width="2"/>
  <circle cx="400" cy="400" r="200" fill="none" stroke="#1D3557" stroke-width="2"/>
  <!-- Filled inner circle -->
  <circle cx="400" cy="400" r="30" fill="#1D3557"/>
  <!-- Radiating hour lines (12 hours) -->
  <line x1="400" y1="400" x2="400" y2="70" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="400" x2="570" y2="105" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="400" x2="695" y2="230" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="400" x2="730" y2="400" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="400" x2="695" y2="570" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="400" x2="570" y2="695" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="400" x2="400" y2="730" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="400" x2="230" y2="695" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="400" x2="105" y2="570" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="400" x2="70" y2="400" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="400" x2="105" y2="230" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="400" x2="230" y2="105" stroke="#000000" stroke-width="2"/>
  <!-- Bold black triangular gnomon shadow -->
  <polygon points="400,400 380,80 420,80" fill="#000000" opacity="0.85"/>
  <polygon points="400,400 420,80 500,300" fill="#000000" opacity="0.45"/>
  <!-- Small circle markers at hour positions -->
  <circle cx="400" cy="70" r="8" fill="#E63946"/>
  <circle cx="570" cy="105" r="8" fill="#F4D35E"/>
  <circle cx="695" cy="230" r="8" fill="#1D3557"/>
  <circle cx="730" cy="400" r="8" fill="#E63946"/>
  <circle cx="695" cy="570" r="8" fill="#2A9D8F"/>
  <circle cx="570" cy="695" r="8" fill="#F4D35E"/>
  <circle cx="400" cy="730" r="8" fill="#1D3557"/>
  <circle cx="230" cy="695" r="8" fill="#E76F51"/>
  <circle cx="105" cy="570" r="8" fill="#E63946"/>
  <circle cx="70" cy="400" r="8" fill="#2A9D8F"/>
  <circle cx="105" cy="230" r="8" fill="#F4D35E"/>
  <circle cx="230" cy="105" r="8" fill="#E76F51"/>
  <!-- Decorative arcs -->
  <path d="M260,400 A140,140 0 0,1 400,260" fill="none" stroke="#E63946" stroke-width="3"/>
  <path d="M540,400 A140,140 0 0,1 400,540" fill="none" stroke="#F4D35E" stroke-width="3"/>
</svg>