<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Sky elements -->
  <circle cx="680" cy="120" r="50" fill="#F4D35E" opacity="0.6"/>
  <rect x="50" y="600" width="700" height="200" fill="#2A9D8F" opacity="0.15"/>

  <!-- Balloon envelope - main shape -->
  <ellipse cx="400" cy="250" rx="140" ry="180" fill="#E63946"/>

  <!-- Panel divisions on balloon -->
  <path d="M400,70 Q360,250 400,430" stroke="#000" stroke-width="2.5" fill="none"/>
  <path d="M400,70 Q440,250 400,430" stroke="#000" stroke-width="2.5" fill="none"/>
  <path d="M400,70 Q310,200 340,430" stroke="#000" stroke-width="2.5" fill="none"/>
  <path d="M400,70 Q490,200 460,430" stroke="#000" stroke-width="2.5" fill="none"/>

  <!-- Panel color overlays -->
  <path d="M400,70 Q360,250 400,430 Q310,200 340,430 Z" fill="#1D3557" opacity="0.5"/>
  <path d="M400,70 Q440,250 400,430 Q490,200 460,430 Z" fill="#F4D35E" opacity="0.4"/>

  <!-- Balloon top cap -->
  <ellipse cx="400" cy="78" rx="22" ry="12" fill="#000"/>

  <!-- Balloon bottom opening -->
  <ellipse cx="400" cy="425" rx="45" ry="15" fill="#1D3557"/>
  <ellipse cx="400" cy="425" rx="30" ry="10" fill="#E63946" opacity="0.7"/>

  <!-- Flame -->
  <polygon points="400,410 390,385 400,370 410,385" fill="#F4D35E"/>
  <polygon points="400,405 395,390 400,380 405,390" fill="#E63946"/>

  <!-- Ropes - left side -->
  <line x1="365" y1="430" x2="340" y2="540" stroke="#000" stroke-width="2"/>
  <line x1="380" y1="432" x2="345" y2="540" stroke="#000" stroke-width="2"/>

  <!-- Ropes - right side -->
  <line x1="435" y1="430" x2="460" y2="540" stroke="#000" stroke-width="2"/>
  <line x1="420" y1="432" x2="455" y2="540" stroke="#000" stroke-width="2"/>

  <!-- Rope cross supports -->
  <line x1="355" y1="480" x2="445" y2="480" stroke="#000" stroke-width="1.5"/>
  <line x1="348" y1="510" x2="458" y2="510" stroke="#000" stroke-width="1.5"/>

  <!-- Basket -->
  <rect x="330" y="540" width="140" height="80" rx="5" fill="#457B9D"/>
  <rect x="330" y="540" width="140" height="15" fill="#1D3557"/>

  <!-- Basket weave pattern -->
  <line x1="360" y1="555" x2="360" y2="620" stroke="#000" stroke-width="1.5"/>
  <line x1="400" y1="555" x2="400" y2="620" stroke="#000" stroke-width="1.5"/>
  <line x1="440" y1="555" x2="440" y2="620" stroke="#000" stroke-width="1.5"/>
  <line x1="330" y1="575" x2="470" y2="575" stroke="#000" stroke-width="1.5"/>
  <line x1="330" y1="595" x2="470" y2="595" stroke="#000" stroke-width="1.5"/>

  <!-- Basket rim -->
  <rect x="325" y="536" width="150" height="8" rx="3" fill="#000"/>

  <!-- Horizontal balloon bands -->
  <ellipse cx="400" cy="160" rx="110" ry="8" fill="none" stroke="#000" stroke-width="2"/>
  <ellipse cx="400" cy="250" rx="140" ry="8" fill="none" stroke="#000" stroke-width="2"/>
  <ellipse cx="400" cy="340" rx="110" ry="8" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Decorative geometric band on balloon -->
  <rect x="310" y="240" width="30" height="20" fill="#F4D35E"/>
  <rect x="340" y="240" width="30" height="20" fill="#000"/>
  <rect x="370" y="240" width="30" height="20" fill="#FFF"/>
  <rect x="400" y="240" width="30" height="20" fill="#000"/>
  <rect x="430" y="240" width="30" height="20" fill="#F4D35E"/>
  <rect x="460" y="240" width="30" height="20" fill="#000"/>

  <!-- Clouds -->
  <ellipse cx="150" cy="200" rx="60" ry="25" fill="#FFF" opacity="0.7"/>
  <ellipse cx="650" cy="300" rx="70" ry="20" fill="#FFF" opacity="0.6"/>
  <ellipse cx="100" cy="350" rx="45" ry="18" fill="#FFF" opacity="0.5"/>

  <!-- Ground landscape -->
  <rect x="0" y="700" width="800" height="100" fill="#2A9D8F" opacity="0.3"/>
  <polygon points="100,700 160,650 220,700" fill="#1D3557" opacity="0.4"/>
  <polygon points="500,700 580,640 660,700" fill="#1D3557" opacity="0.3"/>

  <!-- Birds -->
  <path d="M200,150 Q210,140 220,150" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M230,145 Q240,135 250,145" stroke="#000" stroke-width="2" fill="none"/>
</svg>