<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#000000"/>

  <!-- Radiating lines from behind eclipse -->
  <line x1="400" y1="380" x2="50" y2="50" stroke="#457B9D" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="380" x2="200" y2="10" stroke="#457B9D" stroke-width="1" opacity="0.25"/>
  <line x1="400" y1="380" x2="400" y2="10" stroke="#457B9D" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="380" x2="600" y2="10" stroke="#457B9D" stroke-width="1" opacity="0.25"/>
  <line x1="400" y1="380" x2="750" y2="50" stroke="#457B9D" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="380" x2="790" y2="250" stroke="#457B9D" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="380" x2="10" y2="250" stroke="#457B9D" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="380" x2="790" y2="400" stroke="#457B9D" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="380" x2="10" y2="400" stroke="#457B9D" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="380" x2="100" y2="750" stroke="#457B9D" stroke-width="1" opacity="0.1"/>
  <line x1="400" y1="380" x2="700" y2="750" stroke="#457B9D" stroke-width="1" opacity="0.1"/>
  <line x1="400" y1="380" x2="750" y2="700" stroke="#457B9D" stroke-width="1.5" opacity="0.2"/>
  <line x1="400" y1="380" x2="50" y2="700" stroke="#457B9D" stroke-width="1.5" opacity="0.2"/>

  <!-- Glow ring behind eclipse -->
  <circle cx="400" cy="380" r="230" fill="none" stroke="#F4D35E" stroke-width="3" opacity="0.15"/>
  <circle cx="400" cy="380" r="245" fill="none" stroke="#E9C46A" stroke-width="1.5" opacity="0.1"/>

  <!-- Dark blue main circle (the sun/body) -->
  <circle cx="400" cy="380" r="200" fill="#1D3557" opacity="1"/>

  <!-- Cream/white eclipsing circle offset -->
  <circle cx="440" cy="350" r="190" fill="#FEFAE0" opacity="0.92"/>

  <!-- Corona effect - thin arcs -->
  <path d="M 200 380 A 200 200 0 0 1 400 180" fill="none" stroke="#F4D35E" stroke-width="2" opacity="0.5"/>
  <path d="M 600 380 A 200 200 0 0 1 400 580" fill="none" stroke="#E9C46A" stroke-width="1.5" opacity="0.35"/>

  <!-- Scattered star shapes - small colored elements -->
  <circle cx="120" cy="100" r="4" fill="#E63946" opacity="0.9"/>
  <circle cx="680" cy="150" r="3" fill="#F4D35E" opacity="0.85"/>
  <circle cx="90" cy="500" r="3.5" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="710" cy="600" r="4" fill="#E63946" opacity="0.7"/>
  <circle cx="300" cy="700" r="3" fill="#F4D35E" opacity="0.9"/>
  <circle cx="550" cy="80" r="5" fill="#2A9D8F" opacity="0.75"/>
  <circle cx="750" cy="350" r="3" fill="#F4D35E" opacity="0.8"/>
  <circle cx="50" cy="300" r="4" fill="#E63946" opacity="0.6"/>
  <rect x="150" y="650" width="5" height="5" fill="#F4D35E" opacity="0.7" transform="rotate(45 152.5 652.5)"/>
  <rect x="650" y="90" width="4" height="4" fill="#2A9D8F" opacity="0.65" transform="rotate(45 652 92)"/>
  <rect x="500" y="720" width="6" height="6" fill="#E63946" opacity="0.6" transform="rotate(45 503 723)"/>
  <circle cx="200" cy="200" r="2.5" fill="#A8DADC" opacity="0.5"/>
  <circle cx="620" cy="470" r="2" fill="#A8DADC" opacity="0.45"/>
  <circle cx="170" cy="450" r="2" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="700" cy="250" r="2.5" fill="#FFFFFF" opacity="0.35"/>

  <!-- Small accent shapes -->
  <polygon points="60,680 70,660 80,680" fill="#E76F51" opacity="0.5"/>
  <polygon points="730,480 740,465 750,480" fill="#F4D35E" opacity="0.45"/>
  <rect x="30" y="750" width="8" height="8" fill="#1D3557" opacity="0.6"/>
  <rect x="760" y="30" width="10" height="10" fill="#6D2E46" opacity="0.5"/>
</svg>