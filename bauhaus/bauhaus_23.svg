<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Dance Notation - Bauhaus Style</title>
  <rect width="800" height="800" fill="#FFFFFF"/>

  <defs>
    <!-- Arrow marker -->
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E63946"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1D3557"/>
    </marker>
    <marker id="arrowBlack" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000000"/>
    </marker>
    <marker id="arrowBurgundy" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6D2E46"/>
    </marker>
  </defs>

  <!-- Staff lines - horizontal notation lines -->
  <line x1="50" y1="100" x2="750" y2="100" stroke="#000000" stroke-width="0.5" opacity="0.2"/>
  <line x1="50" y1="200" x2="750" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.2"/>
  <line x1="50" y1="300" x2="750" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.2"/>
  <line x1="50" y1="400" x2="750" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.2"/>
  <line x1="50" y1="500" x2="750" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.2"/>
  <line x1="50" y1="600" x2="750" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.2"/>
  <line x1="50" y1="700" x2="750" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.2"/>

  <!-- Vertical beat markers -->
  <line x1="200" y1="50" x2="200" y2="750" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="50" x2="400" y2="750" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="50" x2="600" y2="750" stroke="#000000" stroke-width="0.5" opacity="0.1"/>

  <!-- Dancer 1 - Red path: sweeping arc movement -->
  <path d="M 80,150 Q 150,80 250,120" fill="none" stroke="#E63946" stroke-width="3" marker-end="url(#arrowRed)"/>
  <circle cx="80" cy="150" r="8" fill="#E63946"/>
  <circle cx="250" cy="120" r="5" fill="#E63946" opacity="0.6"/>
  <path d="M 260,120 Q 350,60 420,140" fill="none" stroke="#E63946" stroke-width="3" marker-end="url(#arrowRed)"/>
  <path d="M 430,145 Q 520,200 580,110" fill="none" stroke="#E63946" stroke-width="3" marker-end="url(#arrowRed)"/>
  <circle cx="580" cy="110" r="5" fill="#E63946" opacity="0.6"/>
  <path d="M 590,115 Q 650,80 720,130" fill="none" stroke="#E63946" stroke-width="2" stroke-dasharray="8,4"/>
  <circle cx="720" cy="130" r="8" fill="#E63946" opacity="0.4"/>

  <!-- Dancer 1 - Position dots -->
  <circle cx="150" cy="100" r="3" fill="#E63946" opacity="0.3"/>
  <circle cx="320" cy="85" r="3" fill="#E63946" opacity="0.3"/>
  <circle cx="490" cy="170" r="3" fill="#E63946" opacity="0.3"/>

  <!-- Dancer 2 - Blue path: angular geometric movement -->
  <path d="M 100,280 L 180,220 L 280,300" fill="none" stroke="#1D3557" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <circle cx="100" cy="280" r="8" fill="#1D3557"/>
  <rect x="175" y="215" width="10" height="10" fill="#1D3557" opacity="0.5"/>
  <path d="M 290,300 L 380,250 L 450,320 L 530,260" fill="none" stroke="#1D3557" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <rect x="375" y="245" width="10" height="10" fill="#1D3557" opacity="0.5"/>
  <rect x="445" y="315" width="10" height="10" fill="#1D3557" opacity="0.5"/>
  <path d="M 540,265 L 620,310 L 710,250" fill="none" stroke="#1D3557" stroke-width="2" stroke-dasharray="8,4"/>
  <circle cx="710" cy="250" r="8" fill="#1D3557" opacity="0.4"/>

  <!-- Dancer 3 - Burgundy: spiral/rotation notation -->
  <circle cx="130" cy="420" r="30" fill="none" stroke="#6D2E46" stroke-width="2"/>
  <circle cx="130" cy="420" r="18" fill="none" stroke="#6D2E46" stroke-width="2"/>
  <circle cx="130" cy="420" r="6" fill="#6D2E46"/>
  <path d="M 160,420 Q 200,380 240,430" fill="none" stroke="#6D2E46" stroke-width="3" marker-end="url(#arrowBurgundy)"/>

  <circle cx="310" cy="400" r="25" fill="none" stroke="#6D2E46" stroke-width="2"/>
  <circle cx="310" cy="400" r="12" fill="none" stroke="#6D2E46" stroke-width="2"/>
  <circle cx="310" cy="400" r="5" fill="#6D2E46"/>
  <path d="M 335,400 Q 380,360 430,410" fill="none" stroke="#6D2E46" stroke-width="3" marker-end="url(#arrowBurgundy)"/>

  <circle cx="500" cy="430" r="35" fill="none" stroke="#6D2E46" stroke-width="2"/>
  <circle cx="500" cy="430" r="22" fill="none" stroke="#6D2E46" stroke-width="2"/>
  <circle cx="500" cy="430" r="10" fill="none" stroke="#6D2E46" stroke-width="2"/>
  <circle cx="500" cy="430" r="4" fill="#6D2E46"/>
  <path d="M 535,430 Q 590,390 650,440" fill="none" stroke="#6D2E46" stroke-width="2" stroke-dasharray="8,4"/>
  <circle cx="650" cy="440" r="6" fill="#6D2E46" opacity="0.4"/>

  <!-- Dancer 4 - Black/Sand: leaping arcs -->
  <path d="M 80,580 Q 140,490 200,560" fill="none" stroke="#000000" stroke-width="3" marker-end="url(#arrowBlack)"/>
  <circle cx="80" cy="580" r="8" fill="#000000"/>
  <!-- Leap height indicator -->
  <line x1="140" y1="490" x2="140" y2="570" stroke="#DDA15E" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="135,495 140,480 145,495" fill="#DDA15E"/>

  <path d="M 210,565 Q 290,470 370,555" fill="none" stroke="#000000" stroke-width="3" marker-end="url(#arrowBlack)"/>
  <line x1="290" y1="470" x2="290" y2="560" stroke="#DDA15E" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="285,475 290,460 295,475" fill="#DDA15E"/>

  <path d="M 380,560 Q 470,500 560,570" fill="none" stroke="#000000" stroke-width="3" marker-end="url(#arrowBlack)"/>
  <line x1="470" y1="500" x2="470" y2="565" stroke="#DDA15E" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="465,505 470,490 475,505" fill="#DDA15E"/>

  <path d="M 570,575 Q 640,520 720,580" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="8,4"/>
  <circle cx="720" cy="580" r="8" fill="#000000" opacity="0.4"/>

  <!-- Floor pattern - Yellow: weight shifts -->
  <path d="M 100,700 Q 200,660 300,710 Q 400,750 500,690 Q 600,640 700,700" fill="none" stroke="#F4D35E" stroke-width="4"/>
  <circle cx="100" cy="700" r="10" fill="#F4D35E"/>
  <circle cx="300" cy="710" r="7" fill="#F4D35E" opacity="0.8"/>
  <circle cx="500" cy="690" r="7" fill="#F4D35E" opacity="0.6"/>
  <circle cx="700" cy="700" r="10" fill="#F4D35E" opacity="0.4"/>

  <!-- Weight emphasis marks -->
  <line x1="95" y1="715" x2="105" y2="715" stroke="#F4D35E" stroke-width="2"/>
  <line x1="100" y1="710" x2="100" y2="720" stroke="#F4D35E" stroke-width="2"/>
  <line x1="295" y1="725" x2="305" y2="725" stroke="#F4D35E" stroke-width="2"/>
  <line x1="300" y1="720" x2="300" y2="730" stroke="#F4D35E" stroke-width="2"/>

  <!-- Timing marks along top -->
  <rect x="80" y="40" width="4" height="20" fill="#000000"/>
  <rect x="180" y="40" width="4" height="20" fill="#000000"/>
  <rect x="280" y="40" width="4" height="20" fill="#E63946"/>
  <rect x="380" y="40" width="4" height="20" fill="#000000"/>
  <rect x="480" y="40" width="4" height="20" fill="#000000"/>
  <rect x="580" y="40" width="4" height="20" fill="#E63946"/>
  <rect x="680" y="40" width="4" height="20" fill="#000000"/>

  <!-- Accent marks - emphasis in movement -->
  <polygon points="280,35 283,25 286,35" fill="#E63946"/>
  <polygon points="580,35 583,25 586,35" fill="#E63946"/>

  <!-- Body position symbols scattered -->
  <!-- Standing figure abstraction -->
  <line x1="85" y1="140" x2="85" y2="165" stroke="#E63946" stroke-width="2"/>
  <circle cx="85" cy="136" r="4" fill="none" stroke="#E63946" stroke-width="1.5"/>

  <line x1="105" y1="270" x2="105" y2="295" stroke="#1D3557" stroke-width="2"/>
  <circle cx="105" cy="266" r="4" fill="none" stroke="#1D3557" stroke-width="1.5"/>

  <line x1="135" y1="410" x2="135" y2="435" stroke="#6D2E46" stroke-width="2"/>
  <circle cx="135" cy="406" r="4" fill="none" stroke="#6D2E46" stroke-width="1.5"/>

  <!-- Direction compass rose -->
  <circle cx="720" cy="720" r="30" fill="none" stroke="#000000" stroke-width="1.5"/>
  <line x1="720" y1="688" x2="720" y2="752" stroke="#000000" stroke-width="1"/>
  <line x1="688" y1="720" x2="752" y2="720" stroke="#000000" stroke-width="1"/>
  <polygon points="717,692 720,682 723,692" fill="#E63946"/>
  <polygon points="717,748 720,758 723,748" fill="#1D3557"/>
  <circle cx="720" cy="720" r="3" fill="#000000"/>

  <!-- Forest green accent curves -->
  <path d="M 50,760 Q 200,730 350,770" fill="none" stroke="#264653" stroke-width="2" opacity="0.5"/>
  <path d="M 450,750 Q 550,720 700,760" fill="none" stroke="#264653" stroke-width="2" opacity="0.5"/>
</svg>