<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <!-- Background -->
  <rect width="800" height="800" fill="#DDA15E"/>

  <!-- Ground -->
  <rect x="0" y="620" width="800" height="180" fill="#264653"/>

  <!-- Base frame - horizontal beam -->
  <rect x="150" y="550" width="500" height="40" rx="4" fill="#000"/>
  <!-- Base frame vertical supports -->
  <rect x="160" y="400" width="35" height="190" fill="#000"/>
  <rect x="600" y="400" width="35" height="190" fill="#000"/>

  <!-- Frame cross braces -->
  <line x1="195" y1="400" x2="600" y2="550" stroke="#6D2E46" stroke-width="8"/>
  <line x1="195" y1="550" x2="600" y2="400" stroke="#6D2E46" stroke-width="8"/>

  <!-- Axle/pivot point -->
  <circle cx="400" cy="420" r="20" fill="#E63946"/>
  <circle cx="400" cy="420" r="10" fill="#000"/>

  <!-- Throwing arm -->
  <rect x="200" y="410" width="400" height="20" rx="5" fill="#6D2E46" transform="rotate(-15, 400, 420)"/>

  <!-- Counterweight (heavy end - right side when tilted) -->
  <rect x="530" y="440" width="80" height="80" rx="5" fill="#000" transform="rotate(-15, 400, 420)"/>
  <rect x="540" y="450" width="60" height="60" rx="3" fill="#1D3557" transform="rotate(-15, 400, 420)"/>

  <!-- Sling arm (left side - projectile end) -->
  <line x1="230" y1="395" x2="180" y2="300" stroke="#000" stroke-width="6"/>
  <line x1="230" y1="395" x2="220" y2="300" stroke="#000" stroke-width="6"/>

  <!-- Projectile (boulder) -->
  <circle cx="200" cy="280" r="30" fill="#E63946"/>
  <circle cx="200" cy="280" r="20" fill="#F4D35E"/>

  <!-- Sling basket -->
  <path d="M170 300 Q200 330 230 300" stroke="#000" stroke-width="5" fill="none"/>

  <!-- Wheels on base -->
  <circle cx="200" cy="590" r="35" fill="#000"/>
  <circle cx="200" cy="590" r="25" fill="#6D2E46"/>
  <circle cx="200" cy="590" r="10" fill="#000"/>
  <circle cx="600" cy="590" r="35" fill="#000"/>
  <circle cx="600" cy="590" r="25" fill="#6D2E46"/>
  <circle cx="600" cy="590" r="10" fill="#000"/>

  <!-- Wheel spokes -->
  <line x1="200" y1="555" x2="200" y2="625" stroke="#000" stroke-width="4"/>
  <line x1="165" y1="590" x2="235" y2="590" stroke="#000" stroke-width="4"/>
  <line x1="600" y1="555" x2="600" y2="625" stroke="#000" stroke-width="4"/>
  <line x1="565" y1="590" x2="635" y2="590" stroke="#000" stroke-width="4"/>

  <!-- Guide channel -->
  <rect x="250" y="470" width="120" height="15" rx="3" fill="#DDA15E" transform="rotate(-15, 400, 420)"/>

  <!-- Decorative trajectory arc -->
  <path d="M200 280 Q100 100 50 150" stroke="#F4D35E" stroke-width="3" fill="none" stroke-dasharray="8,6"/>
  <circle cx="50" cy="150" r="8" fill="#F4D35E"/>

  <!-- Motion lines -->
  <line x1="140" y1="260" x2="100" y2="220" stroke="#E63946" stroke-width="3" opacity="0.6"/>
  <line x1="150" y1="245" x2="115" y2="200" stroke="#E63946" stroke-width="3" opacity="0.6"/>
  <line x1="165" y1="250" x2="130" y2="210" stroke="#E63946" stroke-width="3" opacity="0.6"/>

  <!-- Title block -->
  <rect x="550" y="50" width="200" height="60" fill="#000"/>
  <rect x="555" y="55" width="190" height="50" fill="#E63946"/>
</svg>