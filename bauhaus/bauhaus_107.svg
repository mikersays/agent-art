  <ellipse cx="400" cy="400" rx="110" ry="30" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.7" transform="rotate(60,400,400)"/>
  <ellipse cx="400" cy="400" rx="110" ry="30" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.7" transform="rotate(72,400,400)"/>
  <ellipse cx="400" cy="400" rx="110" ry="30" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.7" transform="rotate(84,400,400)"/>
  <ellipse cx="400" cy="400" rx="110" ry="30" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.7" transform="rotate(96,400,400)"/>
  <ellipse cx="400" cy="400" rx="110" ry="30" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.7" transform="rotate(108,400,400)"/>
  <ellipse cx="400" cy="400" rx="110" ry="30" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.7" transform="rotate(120,400,400)"/>
  <ellipse cx="400" cy="400" rx="110" ry="30" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.7" transform="rotate(132,400,400)"/>
  <ellipse cx="400" cy="400" rx="110" ry="30" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.7" transform="rotate(144,400,400)"/>
  <ellipse cx="400" cy="400" rx="110" ry="30" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.7" transform="rotate(156,400,400)"/>
