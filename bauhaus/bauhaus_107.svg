      <ellipse cx="400" cy="400" rx="250" ry="80" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.7" transform="rotate(60,400,400)"/>
      <ellipse cx="400" cy="400" rx="250" ry="80" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.7" transform="rotate(75,400,400)"/>
      <ellipse cx="400" cy="400" rx="250" ry="80" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.7" transform="rotate(90,400,400)"/>
