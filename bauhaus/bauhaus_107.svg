  <!-- Corner accents - burgundy -->
  <circle cx="50" cy="50" r="15" fill="#6D2E46"/>
  <circle cx="750" cy="50" r="15" fill="#6D2E46"/>
  <circle cx="50" cy="750" r="15" fill="#6D2E46"/>
  <circle cx="750" cy="750" r="15" fill="#6D2E46"/>

  <!-- Outer concentric guide circles -->
  <circle cx="400" cy="400" r="280" fill="none" stroke="#000000" stroke-width="0.5" opacity="0.3"/>
  <circle cx="400" cy="400" r="200" fill="none" stroke="#000000" stroke-width="0.5" opacity="0.3"/>
  <circle cx="400" cy="400" r="130" fill="none" stroke="#000000" stroke-width="0.5" opacity="0.3"/>
  <circle cx="400" cy="400" r="60" fill="none" stroke="#000000" stroke-width="0.5" opacity="0.3"/>
