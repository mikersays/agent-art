  <ellipse cx="400" cy="400" rx="50" ry="15" fill="none" stroke="#E76F51" stroke-width="2" opacity="0.8" transform="rotate(67.5,400,400)"/>
  <ellipse cx="400" cy="400" rx="50" ry="15" fill="none" stroke="#F4D35E" stroke-width="2" opacity="0.8" transform="rotate(90,400,400)"/>
  <ellipse cx="400" cy="400" rx="50" ry="15" fill="none" stroke="#E76F51" stroke-width="2" opacity="0.8" transform="rotate(112.5,400,400)"/>
  <ellipse cx="400" cy="400" rx="50" ry="15" fill="none" stroke="#F4D35E" stroke-width="2" opacity="0.8" transform="rotate(135,400,400)"/>
