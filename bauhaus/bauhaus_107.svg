      <ellipse cx="400" cy="400" rx="250" ry="80" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.7" transform="rotate(135,400,400)"/>
      <ellipse cx="400" cy="400" rx="250" ry="80" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.7" transform="rotate(150,400,400)"/>
      <ellipse cx="400" cy="400" rx="250" ry="80" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.7" transform="rotate(165,400,400)"/>
    </g>
  </defs>

  <!-- Background decorative border -->
