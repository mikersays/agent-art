  <ellipse cx="400" cy="400" rx="180" ry="55" fill="none" stroke="#1D3557" stroke-width="1.5" opacity="0.6" transform="rotate(40,400,400)"/>
  <ellipse cx="400" cy="400" rx="180" ry="55" fill="none" stroke="#1D3557" stroke-width="1.5" opacity="0.6" transform="rotate(60,400,400)"/>
