<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>
  <!-- Lattice: Diamond/rhombus grid with alternating colored fills -->
  <defs>
    <clipPath id="canvas">
      <rect width="800" height="800"/>
    </clipPath>
  </defs>
  <g clip-path="url(#canvas)">
    <!-- Row 1 -->
    <polygon points="100,0 200,100 100,200 0,100" fill="#E63946" stroke="#000000" stroke-width="2"/>
    <polygon points="300,0 400,100 300,200 200,100" fill="#1D3557" stroke="#000000" stroke-width="2"/>
    <polygon points="500,0 600,100 500,200 400,100" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
    <polygon points="700,0 800,100 700,200 600,100" fill="#264653" stroke="#000000" stroke-width="2"/>
    <!-- Row 1 offset -->
    <polygon points="200,100 300,200 200,300 100,200" fill="#DDA15E" stroke="#000000" stroke-width="2"/>
    <polygon points="400,100 500,200 400,300 300,200" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <polygon points="600,100 700,200 600,300 500,200" fill="#E9C46A" stroke="#000000" stroke-width="2"/>
    <polygon points="800,100 900,200 800,300 700,200" fill="#E63946" stroke="#000000" stroke-width="2"/>
    <!-- Row 2 -->
    <polygon points="100,200 200,300 100,400 0,300" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
    <polygon points="300,200 400,300 300,400 200,300" fill="#264653" stroke="#000000" stroke-width="2"/>
    <polygon points="500,200 600,300 500,400 400,300" fill="#E63946" stroke="#000000" stroke-width="2"/>
    <polygon points="700,200 800,300 700,400 600,300" fill="#DDA15E" stroke="#000000" stroke-width="2"/>
    <!-- Row 2 offset -->
    <polygon points="200,300 300,400 200,500 100,400" fill="#1D3557" stroke="#000000" stroke-width="2"/>
    <polygon points="400,300 500,400 400,500 300,400" fill="#E9C46A" stroke="#000000" stroke-width="2"/>
    <polygon points="600,300 700,400 600,500 500,400" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <polygon points="800,300 900,400 800,500 700,400" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
    <!-- Row 3 -->
    <polygon points="100,400 200,500 100,600 0,500" fill="#E9C46A" stroke="#000000" stroke-width="2"/>
    <polygon points="300,400 400,500 300,600 200,500" fill="#E63946" stroke="#000000" stroke-width="2"/>
    <polygon points="500,400 600,500 500,600 400,500" fill="#1D3557" stroke="#000000" stroke-width="2"/>
    <polygon points="700,400 800,500 700,600 600,500" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
    <!-- Row 3 offset -->
    <polygon points="200,500 300,600 200,700 100,600" fill="#264653" stroke="#000000" stroke-width="2"/>
    <polygon points="400,500 500,600 400,700 300,600" fill="#DDA15E" stroke="#000000" stroke-width="2"/>
    <polygon points="600,500 700,600 600,700 500,600" fill="#E63946" stroke="#000000" stroke-width="2"/>
    <polygon points="800,500 900,600 800,700 700,600" fill="#1D3557" stroke="#000000" stroke-width="2"/>
    <!-- Row 4 -->
    <polygon points="100,600 200,700 100,800 0,700" fill="#DDA15E" stroke="#000000" stroke-width="2"/>
    <polygon points="300,600 400,700 300,800 200,700" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <polygon points="500,600 600,700 500,800 400,700" fill="#264653" stroke="#000000" stroke-width="2"/>
    <polygon points="700,600 800,700 700,800 600,700" fill="#E9C46A" stroke="#000000" stroke-width="2"/>
    <!-- Row 4 offset -->
    <polygon points="200,700 300,800 200,900 100,800" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
    <polygon points="400,700 500,800 400,900 300,800" fill="#1D3557" stroke="#000000" stroke-width="2"/>
    <polygon points="600,700 700,800 600,900 500,800" fill="#DDA15E" stroke="#000000" stroke-width="2"/>
    <polygon points="800,700 900,800 800,900 700,800" fill="#264653" stroke="#000000" stroke-width="2"/>
    <!-- Edge diamonds left -->
    <polygon points="-100,100 0,200 -100,300 -200,200" fill="#264653" stroke="#000000" stroke-width="2"/>
    <polygon points="-100,300 0,400 -100,500 -200,400" fill="#DDA15E" stroke="#000000" stroke-width="2"/>
    <polygon points="-100,500 0,600 -100,700 -200,600" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
    <polygon points="-100,700 0,800 -100,900 -200,800" fill="#E63946" stroke="#000000" stroke-width="2"/>
  </g>
  <!-- Decorative Bauhaus accent circles at select intersections -->
  <circle cx="400" cy="400" r="18" fill="#000000"/>
  <circle cx="200" cy="200" r="12" fill="#E63946"/>
  <circle cx="600" cy="200" r="12" fill="#1D3557"/>
  <circle cx="200" cy="600" r="12" fill="#F4D35E"/>
  <circle cx="600" cy="600" r="12" fill="#264653"/>
</svg>