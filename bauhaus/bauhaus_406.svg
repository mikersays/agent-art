<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Grid Collapse -->
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Structural grid lines -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>

  <!-- Row 0 (top) - regular grid, blue squares -->
  <rect x="20"  y="20"  width="80" height="80" fill="#1D3557" stroke="#000000" stroke-width="1"/>
  <rect x="120" y="20"  width="80" height="80" fill="#1D3557" stroke="#000000" stroke-width="1"/>
  <rect x="220" y="20"  width="80" height="80" fill="#1D3557" stroke="#000000" stroke-width="1"/>
  <rect x="320" y="20"  width="80" height="80" fill="#457B9D" stroke="#000000" stroke-width="1"/>
  <rect x="420" y="20"  width="80" height="80" fill="#457B9D" stroke="#000000" stroke-width="1"/>
  <rect x="520" y="20"  width="80" height="80" fill="#457B9D" stroke="#000000" stroke-width="1"/>
  <rect x="620" y="20"  width="80" height="80" fill="#A8DADC" stroke="#000000" stroke-width="1"/>
  <rect x="720" y="20"  width="60" height="80" fill="#A8DADC" stroke="#000000" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="20"  y="120" width="80" height="80" fill="#1D3557" stroke="#000000" stroke-width="1"/>
  <rect x="120" y="120" width="80" height="80" fill="#1D3557" stroke="#000000" stroke-width="1"/>
  <rect x="220" y="120" width="80" height="80" fill="#457B9D" stroke="#000000" stroke-width="1"/>
  <!-- circle accent -->
  <circle cx="360" cy="160" r="32" fill="#A8DADC" stroke="#000000" stroke-width="1"/>
  <rect x="420" y="125" width="78" height="78" fill="#A8DADC" stroke="#000000" stroke-width="1" transform="rotate(4,459,164)"/>
  <rect x="525" y="122" width="76" height="76" fill="#E9C46A" stroke="#000000" stroke-width="1" transform="rotate(6,563,160)"/>
  <rect x="628" y="118" width="74" height="78" fill="#E76F51" stroke="#000000" stroke-width="1" transform="rotate(9,665,157)"/>
  <rect x="728" y="115" width="56" height="78" fill="#E63946" stroke="#000000" stroke-width="1" transform="rotate(11,756,154)"/>

  <!-- Row 2 -->
  <rect x="20"  y="220" width="80" height="80" fill="#1D3557" stroke="#000000" stroke-width="1"/>
  <rect x="122" y="223" width="79" height="79" fill="#457B9D" stroke="#000000" stroke-width="1" transform="rotate(3,161,262)"/>
  <rect x="226" y="228" width="78" height="78" fill="#A8DADC" stroke="#000000" stroke-width="1" transform="rotate(6,265,267)"/>
  <!-- circle accent -->
  <circle cx="365" cy="265" r="34" fill="#E9C46A" stroke="#000000" stroke-width="1"/>
  <rect x="432" y="232" width="76" height="76" fill="#E76F51" stroke="#000000" stroke-width="1" transform="rotate(10,470,270)"/>
  <rect x="538" y="238" width="74" height="74" fill="#E63946" stroke="#000000" stroke-width="1" transform="rotate(14,575,275)"/>
  <rect x="644" y="243" width="70" height="72" fill="#E63946" stroke="#000000" stroke-width="1" transform="rotate(18,679,279)"/>
  <rect x="742" y="248" width="50" height="70" fill="#6D2E46" stroke="#000000" stroke-width="1" transform="rotate(22,767,283)"/>

  <!-- Row 3 -->
  <rect x="20"  y="320" width="80" height="80" fill="#457B9D" stroke="#000000" stroke-width="1"/>
  <rect x="125" y="328" width="78" height="78" fill="#A8DADC" stroke="#000000" stroke-width="1" transform="rotate(5,164,367)"/>
  <!-- circle accent -->
  <circle cx="268" cy="372" r="33" fill="#E9C46A" stroke="#000000" stroke-width="1"/>
  <rect x="342" y="338" width="76" height="76" fill="#E76F51" stroke="#000000" stroke-width="1" transform="rotate(10,380,376)"/>
  <rect x="452" y="346" width="74" height="74" fill="#E63946" stroke="#000000" stroke-width="1" transform="rotate(16,489,383)"/>
  <rect x="562" y="354" width="70" height="70" fill="#E63946" stroke="#000000" stroke-width="1" transform="rotate(22,597,389)"/>
  <rect x="668" y="362" width="66" height="68" fill="#6D2E46" stroke="#000000" stroke-width="1" transform="rotate(28,701,396)"/>
  <rect x="755" y="368" width="42" height="66" fill="#6D2E46" stroke="#000000" stroke-width="1" transform="rotate(34,776,401)"/>

  <!-- Row 4 -->
  <rect x="20"  y="425" width="79" height="79" fill="#A8DADC" stroke="#000000" stroke-width="1" transform="rotate(3,59,464)"/>
  <!-- circle accent -->
  <circle cx="170" cy="474" r="32" fill="#E76F51" stroke="#000000" stroke-width="1"/>
  <rect x="248" y="442" width="76" height="76" fill="#E63946" stroke="#000000" stroke-width="1" transform="rotate(12,286,480)"/>
  <rect x="362" y="454" width="74" height="74" fill="#E63946" stroke="#000000" stroke-width="1" transform="rotate(20,399,491)"/>
  <rect x="474" y="465" width="70" height="70" fill="#6D2E46" stroke="#000000" stroke-width="1" transform="rotate(28,509,500)"/>
  <rect x="584" y="476" width="64" height="66" fill="#6D2E46" stroke="#000000" stroke-width="1" transform="rotate(36,616,509)"/>
  <rect x="688" y="486" width="58" height="62" fill="#6D2E46" stroke="#000000" stroke-width="1" transform="rotate(44,717,517)"/>

  <!-- Row 5 - heavy distortion, red -->
  <!-- circle accent -->
  <circle cx="75"  cy="580" r="34" fill="#E63946" stroke="#000000" stroke-width="1"/>
  <rect x="155" y="553" width="74" height="74" fill="#E63946" stroke="#000000" stroke-width="1" transform="rotate(18,192,590)"/>
  <rect x="268" y="566" width="70" height="70" fill="#6D2E46" stroke="#000000" stroke-width="1" transform="rotate(28,303,601)"/>
  <rect x="380" y="578" width="64" height="66" fill="#6D2E46" stroke="#000000" stroke-width="1" transform="rotate(38,412,611)"/>
  <rect x="488" y="590" width="58" height="62" fill="#6D2E46" stroke="#000000" stroke-width="1" transform="rotate(48,517,621)"/>
  <rect x="592" y="600" width="52" height="58" fill="#000000" stroke="#000000" stroke-width="1" transform="rotate(56,618,629)"/>
  <rect x="692" y="610" width="44" height="54" fill="#000000" stroke="#000000" stroke-width="1" transform="rotate(64,714,637)"/>

  <!-- Row 6 - bottom, most distorted -->
  <rect x="20"  y="668" width="70" height="70" fill="#E63946" stroke="#000000" stroke-width="1" transform="rotate(14,55,703)"/>
  <rect x="130" y="678" width="64" height="66" fill="#6D2E46" stroke="#000000" stroke-width="1" transform="rotate(26,162,711)"/>
  <rect x="242" y="690" width="58" height="62" fill="#6D2E46" stroke="#000000" stroke-width="1" transform="rotate(40,271,721)"/>
  <rect x="352" y="700" width="52" height="58" fill="#000000" stroke="#000000" stroke-width="1" transform="rotate(54,378,729)"/>
  <rect x="460" y="708" width="46" height="54" fill="#000000" stroke="#000000" stroke-width="1" transform="rotate(68,483,735)"/>
  <rect x="566" y="716" width="40" height="50" fill="#000000" stroke="#000000" stroke-width="1" transform="rotate(80,586,741)"/>
  <!-- circle accent bottom-right -->
  <circle cx="700" cy="748" r="28" fill="#000000" stroke="#000000" stroke-width="1"/>

  <!-- Structural axis lines -->
  <line x1="0"   y1="100" x2="800" y2="100" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="0"   y1="200" x2="800" y2="200" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="0"   y1="300" x2="800" y2="300" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="100" y1="0"   x2="100" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="200" y1="0"   x2="200" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="300" y1="0"   x2="300" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="400" y1="0"   x2="400" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="500" y1="0"   x2="500" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="600" y1="0"   x2="600" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="700" y1="0"   x2="700" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
</svg>
