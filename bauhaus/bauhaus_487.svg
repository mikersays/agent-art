<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background: Cream -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Steel blue diagonal lines crossing composition -->
  <line x1="0" y1="200" x2="800" y2="600" stroke="#457B9D" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="400" x2="600" y2="800" stroke="#457B9D" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="0" x2="800" y2="500" stroke="#457B9D" stroke-width="2" opacity="0.35"/>
  <line x1="100" y1="0" x2="700" y2="800" stroke="#457B9D" stroke-width="1" opacity="0.25"/>
  <line x1="400" y1="0" x2="800" y2="300" stroke="#457B9D" stroke-width="1.5" opacity="0.3"/>
  <!-- Outermost frame: Black, stroke-width 6 -->
  <rect x="40" y="50" width="720" height="700" fill="none" stroke="#000000" stroke-width="6"/>
  <!-- Sand squares at outermost frame corners -->
  <rect x="30" y="40" width="18" height="18" fill="#DDA15E"/>
  <rect x="752" y="40" width="18" height="18" fill="#DDA15E"/>
  <rect x="30" y="732" width="18" height="18" fill="#DDA15E"/>
  <rect x="752" y="732" width="18" height="18" fill="#DDA15E"/>
  <!-- Second frame: Blue, offset right and down, stroke-width 5 -->
  <rect x="90" y="110" width="630" height="600" fill="none" stroke="#1D3557" stroke-width="5"/>
  <!-- Sand squares at second frame corners -->
  <rect x="82" y="102" width="14" height="14" fill="#DDA15E" opacity="0.8"/>
  <rect x="714" y="102" width="14" height="14" fill="#DDA15E" opacity="0.8"/>
  <rect x="82" y="704" width="14" height="14" fill="#DDA15E" opacity="0.8"/>
  <rect x="714" y="704" width="14" height="14" fill="#DDA15E" opacity="0.8"/>
  <!-- Third frame: Red, offset left and down, stroke-width 4 -->
  <rect x="130" y="160" width="560" height="510" fill="none" stroke="#E63946" stroke-width="4"/>
  <!-- Sand squares at third frame corners -->
  <rect x="124" y="154" width="12" height="12" fill="#DDA15E" opacity="0.7"/>
  <rect x="684" y="154" width="12" height="12" fill="#DDA15E" opacity="0.7"/>
  <rect x="124" y="664" width="12" height="12" fill="#DDA15E" opacity="0.7"/>
  <rect x="684" y="664" width="12" height="12" fill="#DDA15E" opacity="0.7"/>
  <!-- Fourth frame: Yellow, offset right, stroke-width 3 -->
  <rect x="185" y="210" width="470" height="420" fill="none" stroke="#F4D35E" stroke-width="3"/>
  <!-- Sand squares at fourth frame corners -->
  <rect x="180" y="205" width="10" height="10" fill="#DDA15E" opacity="0.6"/>
  <rect x="650" y="205" width="10" height="10" fill="#DDA15E" opacity="0.6"/>
  <rect x="180" y="625" width="10" height="10" fill="#DDA15E" opacity="0.6"/>
  <rect x="650" y="625" width="10" height="10" fill="#DDA15E" opacity="0.6"/>
  <!-- Fifth frame: Teal, offset slightly, stroke-width 2 -->
  <rect x="240" y="265" width="370" height="330" fill="none" stroke="#2A9D8F" stroke-width="2"/>
  <!-- Sand squares at fifth frame corners -->
  <rect x="236" y="261" width="8" height="8" fill="#DDA15E" opacity="0.5"/>
  <rect x="606" y="261" width="8" height="8" fill="#DDA15E" opacity="0.5"/>
  <rect x="236" y="591" width="8" height="8" fill="#DDA15E" opacity="0.5"/>
  <rect x="606" y="591" width="8" height="8" fill="#DDA15E" opacity="0.5"/>
  <!-- Inside innermost frame: Bold orange circle -->
  <circle cx="380" cy="430" r="70" fill="#E76F51" opacity="0.9"/>
  <!-- Inside innermost frame: Burgundy triangle -->
  <polygon points="480,340 540,460 420,460" fill="#6D2E46" opacity="0.85"/>
  <!-- Extra accents inside -->
  <circle cx="340" cy="380" r="15" fill="#F4D35E" opacity="0.4"/>
  <rect x="450" y="490" width="30" height="30" fill="#1D3557" opacity="0.3"/>
  <circle cx="500" cy="350" r="8" fill="#E63946" opacity="0.5"/>
  <!-- Additional steel blue diagonals in foreground -->
  <line x1="240" y1="595" x2="610" y2="265" stroke="#457B9D" stroke-width="1" opacity="0.5"/>
  <!-- Subtle frame shadows -->
  <rect x="44" y="54" width="720" height="700" fill="none" stroke="#000000" stroke-width="1" opacity="0.1"/>
</svg>