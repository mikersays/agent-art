<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Subtle structural grid -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <!-- Spiral path trace (thin connecting lines) -->
  <path d="M50,50 L750,50 L750,750 L50,750 L50,150 L650,150 L650,650 L150,650 L150,250 L550,250 L550,550 L250,550 L250,350 L450,350 L450,450 L350,450" fill="none" stroke="#000000" stroke-width="1.2" opacity="0.15"/>
  <!-- Spiral rectangle 1 - top edge, red -->
  <rect x="50" y="30" width="180" height="55" fill="#E63946" opacity="0.85"/>
  <!-- Spiral rectangle 2 - right side top, blue -->
  <rect x="720" y="50" width="55" height="160" fill="#1D3557" opacity="0.85"/>
  <!-- Spiral rectangle 3 - bottom right, yellow -->
  <rect x="570" y="720" width="180" height="55" fill="#F4D35E" opacity="0.85"/>
  <!-- Spiral rectangle 4 - left side bottom, teal -->
  <rect x="30" y="580" width="55" height="170" fill="#2A9D8F" opacity="0.85"/>
  <!-- Spiral rectangle 5 - inner top left, red -->
  <rect x="50" y="130" width="150" height="48" fill="#E63946" opacity="0.75"/>
  <!-- Spiral rectangle 6 - inner right, blue -->
  <rect x="625" y="150" width="48" height="140" fill="#1D3557" opacity="0.75"/>
  <!-- Spiral rectangle 7 - inner bottom, yellow -->
  <rect x="310" y="625" width="150" height="48" fill="#F4D35E" opacity="0.75"/>
  <!-- Spiral rectangle 8 - inner left, teal -->
  <rect x="130" y="430" width="48" height="140" fill="#2A9D8F" opacity="0.75"/>
  <!-- Spiral rectangle 9 - deeper top, red -->
  <rect x="150" y="230" width="120" height="42" fill="#E63946" opacity="0.65"/>
  <!-- Spiral rectangle 10 - deeper right, blue -->
  <rect x="530" y="250" width="42" height="120" fill="#1D3557" opacity="0.65"/>
  <!-- Spiral rectangle 11 - deeper bottom, yellow -->
  <rect x="330" y="530" width="120" height="42" fill="#F4D35E" opacity="0.65"/>
  <!-- Spiral rectangle 12 - deeper left, teal -->
  <rect x="230" y="380" width="42" height="100" fill="#2A9D8F" opacity="0.65"/>
  <!-- Spiral rectangle 13 - near center top, red -->
  <rect x="280" y="335" width="90" height="35" fill="#E63946" opacity="0.55"/>
  <!-- Spiral rectangle 14 - near center right, blue -->
  <rect x="440" y="350" width="35" height="80" fill="#1D3557" opacity="0.55"/>
  <!-- Central focal point - black circle -->
  <circle cx="390" cy="410" r="35" fill="#000000" opacity="0.9"/>
  <circle cx="390" cy="410" r="22" fill="#000000" opacity="1"/>
  <circle cx="390" cy="410" r="10" fill="#FFFFFF" opacity="0.3"/>
  <!-- Corner accent shapes at rectangle corners -->
  <circle cx="50" cy="30" r="6" fill="#000000" opacity="0.5"/>
  <circle cx="230" cy="85" r="5" fill="#F4D35E" opacity="0.7"/>
  <circle cx="775" cy="50" r="6" fill="#E63946" opacity="0.5"/>
  <circle cx="775" cy="210" r="5" fill="#F4D35E" opacity="0.6"/>
  <circle cx="750" cy="775" r="6" fill="#1D3557" opacity="0.5"/>
  <circle cx="570" cy="720" r="5" fill="#E63946" opacity="0.6"/>
  <circle cx="30" cy="750" r="6" fill="#F4D35E" opacity="0.5"/>
  <circle cx="85" cy="580" r="5" fill="#1D3557" opacity="0.6"/>
  <!-- Inner corner accents -->
  <rect x="47" y="127" width="8" height="8" fill="#000000" opacity="0.4"/>
  <rect x="670" y="147" width="8" height="8" fill="#E63946" opacity="0.4"/>
  <rect x="457" y="622" width="8" height="8" fill="#1D3557" opacity="0.4"/>
  <rect x="127" y="567" width="8" height="8" fill="#F4D35E" opacity="0.4"/>
  <!-- Additional depth circles around center -->
  <circle cx="390" cy="410" r="60" fill="none" stroke="#A89F91" stroke-width="1" opacity="0.25"/>
  <circle cx="390" cy="410" r="90" fill="none" stroke="#A89F91" stroke-width="0.8" opacity="0.15"/>
  <!-- Diagonal energy lines from center -->
  <line x1="390" y1="410" x2="50" y2="50" stroke="#E63946" stroke-width="0.7" opacity="0.1"/>
  <line x1="390" y1="410" x2="750" y2="750" stroke="#1D3557" stroke-width="0.7" opacity="0.1"/>
</svg>