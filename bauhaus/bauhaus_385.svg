<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
<!-- Background - Forest green -->
<rect width="800" height="800" fill="#264653"/>

<!-- Row 1 - rope line -->
<line x1="40" y1="120" x2="760" y2="120" stroke="#000000" stroke-width="2.5"/>

<!-- Flag 1.1 - Red rectangle -->
<rect x="60" y="55" width="70" height="65" fill="#E63946" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 1.2 - Blue/Yellow split diagonal -->
<polygon points="170,55 240,55 240,120" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
<polygon points="170,55 170,120 240,120" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 1.3 - White quartered -->
<rect x="280" y="55" width="80" height="65" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
<rect x="280" y="55" width="40" height="32.5" fill="#E63946"/>
<rect x="320" y="87.5" width="40" height="32.5" fill="#1D3557"/>

<!-- Flag 1.4 - Yellow triangle pennant -->
<polygon points="400,55 470,87.5 400,120" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 1.5 - Orange rectangle -->
<rect x="510" y="60" width="65" height="60" fill="#E76F51" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 1.6 - Teal/White diagonal -->
<polygon points="620,55 700,55 700,120" fill="#2A9D8F" stroke="#000000" stroke-width="1.5"/>
<polygon points="620,55 620,120 700,120" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>

<!-- Row 2 - rope line -->
<line x1="40" y1="280" x2="760" y2="280" stroke="#000000" stroke-width="2.5"/>

<!-- Flag 2.1 - Triangle pennant, red -->
<polygon points="70,210 140,245 70,280" fill="#E63946" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 2.2 - Blue rectangle -->
<rect x="180" y="215" width="80" height="65" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 2.3 - Quartered: yellow, black, yellow, black -->
<rect x="300" y="210" width="75" height="70" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
<rect x="300" y="210" width="37.5" height="35" fill="#000000"/>
<rect x="337.5" y="245" width="37.5" height="35" fill="#000000"/>

<!-- Flag 2.4 - White/Red horizontal split -->
<rect x="420" y="215" width="70" height="32.5" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
<rect x="420" y="247.5" width="70" height="32.5" fill="#E63946" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 2.5 - Steel blue triangle -->
<polygon points="540" y="210" fill="#457B9D"/>
<polygon points="540,210 610,245 540,280" fill="#457B9D" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 2.6 - Coral rectangle -->
<rect x="650" y="210" width="85" height="70" fill="#E9C46A" stroke="#000000" stroke-width="1.5"/>

<!-- Row 3 - rope line -->
<line x1="40" y1="440" x2="760" y2="440" stroke="#000000" stroke-width="2.5"/>

<!-- Flag 3.1 - Blue/White quartered -->
<rect x="55" y="370" width="80" height="70" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
<rect x="55" y="370" width="40" height="35" fill="#FFFFFF"/>
<rect x="95" y="405" width="40" height="35" fill="#FFFFFF"/>

<!-- Flag 3.2 - Yellow rectangle -->
<rect x="175" y="375" width="75" height="65" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 3.3 - Red/Blue diagonal split -->
<polygon points="295,370 375,370 375,440" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
<polygon points="295,370 295,440 375,440" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 3.4 - Triangle pennant, teal -->
<polygon points="420,370 500,405 420,440" fill="#2A9D8F" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 3.5 - Orange/Black horizontal -->
<rect x="545" y="373" width="70" height="33" fill="#E76F51" stroke="#000000" stroke-width="1.5"/>
<rect x="545" y="406" width="70" height="34" fill="#000000" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 3.6 - White rectangle with red circle center -->
<rect x="660" y="370" width="80" height="70" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
<circle cx="700" cy="405" r="18" fill="#E63946"/>

<!-- Row 4 - rope line -->
<line x1="40" y1="600" x2="760" y2="600" stroke="#000000" stroke-width="2.5"/>

<!-- Flag 4.1 - Yellow/Blue split diagonal -->
<polygon points="80,530 155,530 155,600" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
<polygon points="80,530 80,600 155,600" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 4.2 - Red triangle pennant -->
<polygon points="200,530 275,565 200,600" fill="#E63946" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 4.3 - Steel blue rectangle -->
<rect x="320" y="535" width="75" height="65" fill="#457B9D" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 4.4 - Quartered: white/yellow/red/white -->
<rect x="440" y="530" width="80" height="70" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
<rect x="440" y="530" width="40" height="35" fill="#F4D35E"/>
<rect x="480" y="565" width="40" height="35" fill="#E63946"/>

<!-- Flag 4.5 - Black rectangle -->
<rect x="565" y="535" width="65" height="65" fill="#000000" stroke="#000000" stroke-width="1.5"/>
<rect x="580" y="550" width="35" height="35" fill="#F4D35E"/>

<!-- Flag 4.6 - Orange triangle -->
<polygon points="680,530 750,565 680,600" fill="#E76F51" stroke="#000000" stroke-width="1.5"/>

<!-- Row 5 - rope line -->
<line x1="40" y1="760" x2="760" y2="760" stroke="#000000" stroke-width="2.5"/>

<!-- Flag 5.1 - Burgundy rectangle -->
<rect x="65" y="695" width="70" height="65" fill="#6D2E46" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 5.2 - White/Teal diagonal -->
<polygon points="180,695 250,695 250,760" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
<polygon points="180,695 180,760 250,760" fill="#2A9D8F" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 5.3 - Red rectangle -->
<rect x="295" y="700" width="80" height="60" fill="#E63946" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 5.4 - Yellow triangle pennant -->
<polygon points="420,695 495,727.5 420,760" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>

<!-- Flag 5.5 - Blue/White quartered -->
<rect x="540" y="695" width="75" height="65" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
<rect x="540" y="695" width="37.5" height="32.5" fill="#FFFFFF"/>
<rect x="577.5" y="727.5" width="37.5" height="32.5" fill="#FFFFFF"/>

<!-- Flag 5.6 - Light blue rectangle -->
<rect x="665" y="695" width="70" height="65" fill="#A8DADC" stroke="#000000" stroke-width="1.5"/>

<!-- Rope end knots (small circles) -->
<circle cx="40" cy="120" r="5" fill="#000000"/>
<circle cx="760" cy="120" r="5" fill="#000000"/>
<circle cx="40" cy="280" r="5" fill="#000000"/>
<circle cx="760" cy="280" r="5" fill="#000000"/>
<circle cx="40" cy="440" r="5" fill="#000000"/>
<circle cx="760" cy="440" r="5" fill="#000000"/>
<circle cx="40" cy="600" r="5" fill="#000000"/>
<circle cx="760" cy="600" r="5" fill="#000000"/>
<circle cx="40" cy="760" r="5" fill="#000000"/>
<circle cx="760" cy="760" r="5" fill="#000000"/>
</svg>