<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Lines extending to canvas edges - cardinal directions -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="1" opacity="0.15"/>

  <!-- Lines extending to edges - ordinal directions -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="0.8" opacity="0.1"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#000000" stroke-width="0.8" opacity="0.1"/>

  <!-- Outer concentric circles -->
  <circle cx="400" cy="400" r="280" fill="none" stroke="#A89F91" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="400" r="200" fill="none" stroke="#A89F91" stroke-width="0.8" opacity="0.2"/>

  <!-- Eight triangular points - N -->
  <polygon points="400,120 370,340 430,340" fill="#E63946" opacity="0.85"/>
  <!-- NE -->
  <polygon points="598,202 440,360 480,400" fill="#1D3557" opacity="0.8"/>
  <!-- E -->
  <polygon points="680,400 460,370 460,430" fill="#F4D35E" opacity="0.85"/>
  <!-- SE -->
  <polygon points="598,598 480,400 440,440" fill="#2A9D8F" opacity="0.8"/>
  <!-- S -->
  <polygon points="400,680 430,460 370,460" fill="#E76F51" opacity="0.85"/>
  <!-- SW -->
  <polygon points="202,598 360,440 320,400" fill="#457B9D" opacity="0.8"/>
  <!-- W -->
  <polygon points="120,400 340,430 340,370" fill="#E63946" opacity="0.75"/>
  <!-- NW -->
  <polygon points="202,202 320,400 360,360" fill="#F4D35E" opacity="0.8"/>

  <!-- Center concentric circles -->
  <circle cx="400" cy="400" r="80" fill="#000000" opacity="0.8"/>
  <circle cx="400" cy="400" r="60" fill="#1D3557" opacity="0.9"/>
  <circle cx="400" cy="400" r="42" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="400" cy="400" r="28" fill="#E63946" opacity="0.9"/>
  <circle cx="400" cy="400" r="14" fill="#F4D35E" opacity="0.95"/>
  <circle cx="400" cy="400" r="5" fill="#000000"/>

  <!-- Small squares at the tips of each point -->
  <!-- N -->
  <rect x="392" y="112" width="16" height="16" fill="#000000" opacity="0.7" transform="rotate(0, 400, 120)"/>
  <!-- NE -->
  <rect x="590" y="194" width="16" height="16" fill="#E63946" opacity="0.7" transform="rotate(45, 598, 202)"/>
  <!-- E -->
  <rect x="672" y="392" width="16" height="16" fill="#000000" opacity="0.7"/>
  <!-- SE -->
  <rect x="590" y="590" width="16" height="16" fill="#E76F51" opacity="0.7" transform="rotate(45, 598, 598)"/>
  <!-- S -->
  <rect x="392" y="672" width="16" height="16" fill="#000000" opacity="0.7"/>
  <!-- SW -->
  <rect x="194" y="590" width="16" height="16" fill="#F4D35E" opacity="0.7" transform="rotate(45, 202, 598)"/>
  <!-- W -->
  <rect x="112" y="392" width="16" height="16" fill="#000000" opacity="0.7"/>
  <!-- NW -->
  <rect x="194" y="194" width="16" height="16" fill="#2A9D8F" opacity="0.7" transform="rotate(45, 202, 202)"/>

  <!-- Corner accent shapes -->
  <circle cx="60" cy="60" r="10" fill="#1D3557" opacity="0.3"/>
  <circle cx="740" cy="60" r="10" fill="#E63946" opacity="0.3"/>
  <circle cx="60" cy="740" r="10" fill="#F4D35E" opacity="0.3"/>
  <circle cx="740" cy="740" r="10" fill="#2A9D8F" opacity="0.3"/>

  <!-- Fine detail rings -->
  <circle cx="400" cy="400" r="120" fill="none" stroke="#000000" stroke-width="0.5" opacity="0.2"/>
  <circle cx="400" cy="400" r="150" fill="none" stroke="#E63946" stroke-width="0.5" opacity="0.15"/>
</svg>