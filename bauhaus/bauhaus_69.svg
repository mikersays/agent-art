<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#A89F91"/>

  <!-- Ground -->
  <rect x="0" y="680" width="800" height="120" fill="#000000" opacity="0.15"/>
  <line x1="0" y1="680" x2="800" y2="680" stroke="#000000" stroke-width="2"/>

  <!-- === Flagpole 1 === -->
  <rect x="80" y="100" width="6" height="580" fill="#000000"/>
  <circle cx="83" cy="98" r="8" fill="#000000"/>
  <!-- Flag 1: Red with white circle -->
  <polygon points="86,120 220,140 220,220 86,240" fill="#E63946"/>
  <circle cx="153" cy="180" r="28" fill="#FFFFFF"/>
  <rect x="140" y="167" width="26" height="26" fill="#E63946"/>

  <!-- === Flagpole 2 === -->
  <rect x="220" y="140" width="6" height="540" fill="#000000"/>
  <rect x="218" y="134" width="10" height="10" fill="#000000"/>
  <!-- Flag 2: Blue with yellow diagonal stripes -->
  <polygon points="226,160 370,175 370,265 226,280" fill="#1D3557"/>
  <line x1="226" y1="200" x2="370" y2="185" stroke="#F4D35E" stroke-width="10"/>
  <line x1="226" y1="240" x2="370" y2="225" stroke="#F4D35E" stroke-width="10"/>
  <line x1="226" y1="270" x2="370" y2="255" stroke="#F4D35E" stroke-width="5"/>

  <!-- === Flagpole 3 === -->
  <rect x="370" y="80" width="6" height="600" fill="#000000"/>
  <polygon points="367,74 376,60 385,74" fill="#000000"/>
  <!-- Flag 3: Yellow with black geometric pattern -->
  <polygon points="376,100 530,115 530,210 376,225" fill="#F4D35E"/>
  <rect x="410" y="125" width="50" height="50" fill="#000000" transform="rotate(45,435,150)"/>
  <rect x="470" y="140" width="40" height="40" fill="#000000"/>
  <line x1="376" y1="160" x2="530" y2="160" stroke="#000000" stroke-width="3"/>

  <!-- === Flagpole 4 === -->
  <rect x="510" y="120" width="6" height="560" fill="#000000"/>
  <circle cx="513" cy="118" r="6" fill="#E63946"/>
  <!-- Flag 4: Burgundy with white and steel blue horizontal bars -->
  <polygon points="516,140 660,152 660,252 516,264" fill="#6D2E46"/>
  <rect x="516" y="155" width="144" height="18" fill="#FFFFFF"/>
  <rect x="516" y="190" width="144" height="18" fill="#457B9D"/>
  <rect x="516" y="225" width="144" height="18" fill="#FFFFFF"/>
  <!-- Triangle overlay -->
  <polygon points="516,140 570,197 516,264" fill="#000000" opacity="0.3"/>

  <!-- === Flagpole 5 === -->
  <rect x="660" y="90" width="6" height="590" fill="#000000"/>
  <rect x="655" y="84" width="16" height="8" fill="#000000"/>
  <!-- Flag 5: White with red cross -->
  <polygon points="666,110 780,120 780,210 666,220" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="710" y="110" width="16" height="110" fill="#E63946"/>
  <rect x="666" y="152" width="114" height="16" fill="#E63946"/>

  <!-- Lower flags / pennants -->
  <!-- Pennant on pole 1 -->
  <polygon points="86,320 170,335 86,380" fill="#457B9D"/>
  <line x1="86" y1="345" x2="170" y2="345" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Pennant on pole 3 -->
  <polygon points="376,300 480,310 376,360" fill="#E63946"/>
  <circle cx="410" cy="330" r="12" fill="#F4D35E"/>

  <!-- Pennant on pole 5 -->
  <polygon points="666,290 750,300 666,340" fill="#000000"/>
  <polygon points="666,295 740,303 666,335" fill="#1D3557"/>
  <rect x="680" y="305" width="30" height="15" fill="#F4D35E"/>

  <!-- Small banner on pole 2 -->
  <rect x="226" y="360" width="80" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="266" cy="385" r="15" fill="#E63946"/>
  <circle cx="266" cy="385" r="8" fill="#FFFFFF"/>

  <!-- Small banner on pole 4 -->
  <rect x="516" y="340" width="90" height="55" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <rect x="530" y="350" width="25" height="35" fill="#1D3557"/>
  <rect x="565" y="350" width="25" height="35" fill="#E63946"/>

  <!-- Wind lines -->
  <line x1="190" y1="170" x2="240" y2="168" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="190" y1="180" x2="250" y2="177" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="530" y1="195" x2="590" y2="192" stroke="#000000" stroke-width="1" opacity="0.3"/>

  <!-- Ground shadows -->
  <ellipse cx="83" cy="685" rx="30" ry="5" fill="#000000" opacity="0.2"/>
  <ellipse cx="223" cy="685" rx="30" ry="5" fill="#000000" opacity="0.2"/>
  <ellipse cx="373" cy="685" rx="30" ry="5" fill="#000000" opacity="0.2"/>
  <ellipse cx="513" cy="685" rx="30" ry="5" fill="#000000" opacity="0.2"/>
  <ellipse cx="663" cy="685" rx="30" ry="5" fill="#000000" opacity="0.2"/>

  <!-- Decorative base plates -->
  <rect x="68" y="670" width="30" height="15" fill="#000000"/>
  <rect x="208" y="670" width="30" height="15" fill="#000000"/>
  <rect x="358" y="670" width="30" height="15" fill="#000000"/>
  <rect x="498" y="670" width="30" height="15" fill="#000000"/>
  <rect x="648" y="670" width="30" height="15" fill="#000000"/>

  <!-- Sky decorative elements -->
  <circle cx="700" cy="50" r="25" fill="#F4D35E" opacity="0.4"/>
  <circle cx="700" cy="50" r="18" fill="#F4D35E" opacity="0.6"/>
</svg>