<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFF"/>
  <!-- Background geometric sections -->
  <rect x="0" y="0" width="400" height="400" fill="#A8DADC" opacity="0.3"/>
  <rect x="400" y="400" width="400" height="400" fill="#F4D35E" opacity="0.3"/>
  <!-- Bold zigzag path -->
  <polyline points="0,700 100,200 200,600 300,100 400,500 500,150 600,550 700,100 800,650"
    fill="none" stroke="#000" stroke-width="18" stroke-linejoin="miter"/>
  <!-- Shadow zigzag -->
  <polyline points="10,710 110,210 210,610 310,110 410,510 510,160 610,560 710,110 810,660"
    fill="none" stroke="#1D3557" stroke-width="8" stroke-linejoin="miter" opacity="0.4"/>
  <!-- Geometric shapes at each turn -->
  <!-- Turn 1 -->
  <circle cx="100" cy="200" r="30" fill="#E63946"/>
  <circle cx="100" cy="200" r="15" fill="#FFF"/>
  <!-- Turn 2 -->
  <rect x="175" y="575" width="50" height="50" fill="#1D3557"/>
  <rect x="185" y="585" width="30" height="30" fill="#F4D35E"/>
  <!-- Turn 3 -->
  <polygon points="300,60 330,130 270,130" fill="#2A9D8F"/>
  <circle cx="300" cy="100" r="12" fill="#FFF"/>
  <!-- Turn 4 -->
  <circle cx="400" cy="500" r="35" fill="#F4D35E"/>
  <circle cx="400" cy="500" r="18" fill="#6D2E46"/>
  <!-- Turn 5 -->
  <rect x="475" y="125" width="50" height="50" fill="#E63946" transform="rotate(45 500 150)"/>
  <!-- Turn 6 -->
  <polygon points="600,510 640,590 560,590" fill="#1D3557"/>
  <polygon points="600,530 625,575 575,575" fill="#A8DADC"/>
  <!-- Turn 7 -->
  <circle cx="700" cy="100" r="30" fill="#6D2E46"/>
  <circle cx="700" cy="100" r="15" fill="#F4D35E"/>
  <!-- Start point -->
  <rect x="-10" y="680" width="40" height="40" fill="#000"/>
  <!-- End point -->
  <polygon points="800,620 770,680 800,680" fill="#E63946"/>
  <!-- Decorative floating elements -->
  <circle cx="50" cy="450" r="12" fill="#2A9D8F"/>
  <circle cx="750" cy="350" r="12" fill="#E63946"/>
  <rect x="340" y="300" width="20" height="20" fill="#000" transform="rotate(45 350 310)"/>
  <rect x="550" y="380" width="15" height="15" fill="#1D3557"/>
  <line x1="0" y1="790" x2="800" y2="790" stroke="#000" stroke-width="6"/>
  <line x1="0" y1="10" x2="800" y2="10" stroke="#000" stroke-width="6"/>
</svg>