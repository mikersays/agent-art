<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Stratum 1 - top, cream/sand -->
  <rect x="0" y="0" width="800" height="60" fill="#DDA15E" opacity="0.5"/>
  <line x1="0" y1="60" x2="800" y2="60" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <!-- Stratum 2 - warm gray -->
  <rect x="0" y="60" width="800" height="45" fill="#A89F91" opacity="0.7"/>
  <line x1="0" y1="105" x2="800" y2="105" stroke="#000000" stroke-width="0.8" opacity="0.25"/>
  <!-- Stratum 3 - cream thin -->
  <rect x="0" y="105" width="800" height="25" fill="#FEFAE0" opacity="0.9"/>
  <line x1="0" y1="130" x2="800" y2="130" stroke="#000000" stroke-width="0.5" opacity="0.2"/>
  <!-- Stratum 4 - steel blue, thick -->
  <rect x="0" y="130" width="800" height="80" fill="#457B9D" opacity="0.75"/>
  <!-- Circular cutout in steel blue -->
  <circle cx="300" cy="170" r="22" fill="#FEFAE0" opacity="0.9"/>
  <circle cx="550" cy="165" r="15" fill="#FEFAE0" opacity="0.85"/>
  <line x1="0" y1="210" x2="800" y2="210" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <!-- Stratum 5 - forest -->
  <rect x="0" y="210" width="800" height="70" fill="#264653" opacity="0.85"/>
  <!-- Triangle cutout -->
  <polygon points="600,220 630,270 570,270" fill="#FEFAE0" opacity="0.8"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <!-- Stratum 6 - sand -->
  <rect x="0" y="280" width="800" height="50" fill="#DDA15E" opacity="0.7"/>
  <line x1="0" y1="330" x2="800" y2="330" stroke="#000000" stroke-width="0.8" opacity="0.25"/>
  <!-- Stratum 7 - warm gray, thin -->
  <rect x="0" y="330" width="800" height="30" fill="#A89F91" opacity="0.6"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="#000000" stroke-width="0.5" opacity="0.2"/>
  <!-- Stratum 8 - cream -->
  <rect x="0" y="360" width="800" height="40" fill="#FEFAE0" opacity="0.95"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <!-- Stratum 9 - forest, thick dominant band -->
  <rect x="0" y="400" width="800" height="100" fill="#264653" opacity="0.9"/>
  <!-- Cutouts in dominant band -->
  <circle cx="150" cy="450" r="28" fill="#FEFAE0" opacity="0.85"/>
  <circle cx="400" cy="445" r="18" fill="#DDA15E" opacity="0.8"/>
  <polygon points="680,420 710,480 650,480" fill="#FEFAE0" opacity="0.75"/>
  <rect x="500" y="430" width="20" height="20" fill="#FEFAE0" opacity="0.7" transform="rotate(45,510,440)"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#000000" stroke-width="1.2" opacity="0.35"/>
  <!-- Stratum 10 - steel blue -->
  <rect x="0" y="500" width="800" height="55" fill="#457B9D" opacity="0.7"/>
  <circle cx="700" cy="527" r="16" fill="#FEFAE0" opacity="0.8"/>
  <line x1="0" y1="555" x2="800" y2="555" stroke="#000000" stroke-width="0.8" opacity="0.25"/>
  <!-- Stratum 11 - sand, thin -->
  <rect x="0" y="555" width="800" height="35" fill="#DDA15E" opacity="0.65"/>
  <line x1="0" y1="590" x2="800" y2="590" stroke="#000000" stroke-width="0.5" opacity="0.2"/>
  <!-- Stratum 12 - warm gray, thick -->
  <rect x="0" y="590" width="800" height="75" fill="#A89F91" opacity="0.75"/>
  <!-- Cutouts -->
  <polygon points="200,600 220,655 180,655" fill="#FEFAE0" opacity="0.7"/>
  <circle cx="500" cy="628" r="20" fill="#FEFAE0" opacity="0.8"/>
  <line x1="0" y1="665" x2="800" y2="665" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <!-- Stratum 13 - cream -->
  <rect x="0" y="665" width="800" height="40" fill="#FEFAE0" opacity="0.9"/>
  <line x1="0" y1="705" x2="800" y2="705" stroke="#000000" stroke-width="0.8" opacity="0.25"/>
  <!-- Stratum 14 - forest bottom -->
  <rect x="0" y="705" width="800" height="50" fill="#264653" opacity="0.8"/>
  <circle cx="100" cy="730" r="14" fill="#FEFAE0" opacity="0.75"/>
  <line x1="0" y1="755" x2="800" y2="755" stroke="#000000" stroke-width="0.8" opacity="0.25"/>
  <!-- Stratum 15 - steel blue bottom -->
  <rect x="0" y="755" width="800" height="45" fill="#457B9D" opacity="0.65"/>
  <!-- Corner markers -->
  <rect x="0" y="0" width="8" height="800" fill="#000000" opacity="0.08"/>
  <rect x="792" y="0" width="8" height="800" fill="#000000" opacity="0.08"/>
</svg>