<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#1D3557"/>

  <!-- Outermost ring - Layer 1 -->
  <path d="M 400 50 L 700 200 L 750 550 L 500 750 L 150 700 L 50 350 Z" fill="#E63946" stroke="#000000" stroke-width="3"/>
  <!-- Step shadow -->
  <path d="M 400 50 L 700 200 L 750 550 L 500 750" fill="#000000" opacity="0.15"/>

  <!-- Layer 2 -->
  <path d="M 400 100 L 650 230 L 690 520 L 480 690 L 180 650 L 100 360 Z" fill="#F4D35E" stroke="#000000" stroke-width="3"/>
  <path d="M 400 100 L 650 230 L 690 520 L 480 690" fill="#000000" opacity="0.12"/>

  <!-- Layer 3 -->
  <path d="M 400 150 L 600 260 L 635 490 L 465 635 L 210 600 L 150 370 Z" fill="#2A9D8F" stroke="#000000" stroke-width="2.5"/>
  <path d="M 400 150 L 600 260 L 635 490 L 465 635" fill="#000000" opacity="0.12"/>

  <!-- Layer 4 -->
  <path d="M 400 200 L 555 290 L 580 465 L 450 580 L 240 550 L 195 375 Z" fill="#E76F51" stroke="#000000" stroke-width="2.5"/>
  <path d="M 400 200 L 555 290 L 580 465 L 450 580" fill="#000000" opacity="0.12"/>

  <!-- Layer 5 -->
  <path d="M 400 245 L 515 315 L 530 440 L 435 530 L 270 505 L 240 380 Z" fill="#FEFAE0" stroke="#000000" stroke-width="2"/>
  <path d="M 400 245 L 515 315 L 530 440 L 435 530" fill="#000000" opacity="0.1"/>

  <!-- Layer 6 -->
  <path d="M 400 285 L 478 338 L 488 420 L 425 485 L 300 465 L 280 385 Z" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <path d="M 400 285 L 478 338 L 488 420 L 425 485" fill="#000000" opacity="0.1"/>

  <!-- Layer 7 -->
  <path d="M 400 320 L 445 358 L 450 400 L 418 440 L 330 428 L 318 388 Z" fill="#1D3557" stroke="#FEFAE0" stroke-width="2"/>
  <path d="M 400 320 L 445 358 L 450 400 L 418 440" fill="#000000" opacity="0.1"/>

  <!-- Center point (vanishing point) -->
  <circle cx="390" cy="395" r="15" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <circle cx="390" cy="395" r="6" fill="#000000"/>

  <!-- Railing lines radiating from center -->
  <line x1="390" y1="395" x2="400" y2="50" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="390" y1="395" x2="700" y2="200" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="390" y1="395" x2="750" y2="550" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="390" y1="395" x2="500" y2="750" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="390" y1="395" x2="150" y2="700" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="390" y1="395" x2="50" y2="350" stroke="#000000" stroke-width="1.5" opacity="0.5"/>

  <!-- Handrail dots at vertices -->
  <circle cx="400" cy="50" r="6" fill="#F4D35E"/>
  <circle cx="700" cy="200" r="6" fill="#F4D35E"/>
  <circle cx="750" cy="550" r="6" fill="#F4D35E"/>
  <circle cx="500" cy="750" r="6" fill="#F4D35E"/>
  <circle cx="150" cy="700" r="6" fill="#F4D35E"/>
  <circle cx="50" cy="350" r="6" fill="#F4D35E"/>

  <circle cx="400" cy="100" r="5" fill="#FEFAE0"/>
  <circle cx="650" cy="230" r="5" fill="#FEFAE0"/>
  <circle cx="690" cy="520" r="5" fill="#FEFAE0"/>
  <circle cx="480" cy="690" r="5" fill="#FEFAE0"/>
  <circle cx="180" cy="650" r="5" fill="#FEFAE0"/>
  <circle cx="100" cy="360" r="5" fill="#FEFAE0"/>

  <circle cx="400" cy="150" r="4" fill="#E63946"/>
  <circle cx="600" cy="260" r="4" fill="#E63946"/>
  <circle cx="635" cy="490" r="4" fill="#E63946"/>
  <circle cx="465" cy="635" r="4" fill="#E63946"/>
  <circle cx="210" cy="600" r="4" fill="#E63946"/>
  <circle cx="150" cy="370" r="4" fill="#E63946"/>

  <!-- Corner geometric accents -->
  <rect x="20" y="20" width="60" height="60" fill="none" stroke="#F4D35E" stroke-width="2"/>
  <rect x="30" y="30" width="40" height="40" fill="none" stroke="#F4D35E" stroke-width="1"/>
  <rect x="720" y="20" width="60" height="60" fill="none" stroke="#F4D35E" stroke-width="2"/>
  <rect x="730" y="30" width="40" height="40" fill="none" stroke="#F4D35E" stroke-width="1"/>
  <rect x="20" y="720" width="60" height="60" fill="none" stroke="#F4D35E" stroke-width="2"/>
  <rect x="720" y="720" width="60" height="60" fill="none" stroke="#F4D35E" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="790" font-family="sans-serif" font-size="16" font-weight="bold" fill="#FEFAE0" text-anchor="middle" letter-spacing="4">SPIRAL STAIRCASE</text>
</svg>