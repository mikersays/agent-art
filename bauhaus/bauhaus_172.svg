<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#F4D35E"/>

  <!-- Background geometric accents -->
  <circle cx="100" cy="100" r="60" fill="#A89F91" opacity="0.3"/>
  <circle cx="700" cy="700" r="80" fill="#A89F91" opacity="0.3"/>
  <rect x="650" y="50" width="100" height="100" fill="#1D3557" opacity="0.15"/>
  <rect x="50" y="650" width="80" height="80" fill="#E63946" opacity="0.15"/>

  <!-- Under-crossing segments (drawn first, behind) -->
  <!-- Strand A going under at crossing 1 -->
  <path d="M200 250 Q280 350 350 350" fill="none" stroke="#1D3557" stroke-width="28" stroke-linecap="round"/>
  <!-- Strand B going under at crossing 2 -->
  <path d="M450 300 Q500 400 480 480" fill="none" stroke="#E63946" stroke-width="28" stroke-linecap="round"/>
  <!-- Strand C going under at crossing 3 -->
  <path d="M320 500 Q250 450 250 380" fill="none" stroke="#2A9D8F" stroke-width="28" stroke-linecap="round"/>

  <!-- Main rope strand A - red, flowing left to right -->
  <path d="M100 350 Q200 200 350 350 Q500 500 650 350 Q750 280 700 200" fill="none" stroke="#E63946" stroke-width="30" stroke-linecap="round"/>
  <path d="M100 350 Q200 200 350 350 Q500 500 650 350 Q750 280 700 200" fill="none" stroke="#E63946" stroke-width="22" stroke-linecap="round" opacity="0.8"/>

  <!-- Crossing mask: white gap for over-under effect at crossing 1 -->
  <path d="M290 290 Q320 330 340 360" fill="none" stroke="#F4D35E" stroke-width="34" stroke-linecap="round"/>

  <!-- Main rope strand B - blue, flowing top to bottom -->
  <path d="M400 100 Q250 300 400 400 Q550 500 400 650 Q350 720 300 700" fill="none" stroke="#1D3557" stroke-width="30" stroke-linecap="round"/>
  <path d="M400 100 Q250 300 400 400 Q550 500 400 650 Q350 720 300 700" fill="none" stroke="#1D3557" stroke-width="22" stroke-linecap="round" opacity="0.8"/>

  <!-- Crossing mask for over-under effect at crossing 2 -->
  <path d="M470 380 Q490 420 485 460" fill="none" stroke="#F4D35E" stroke-width="34" stroke-linecap="round"/>

  <!-- Main rope strand C - teal, diagonal -->
  <path d="M150 550 Q300 400 400 450 Q500 500 550 350 Q600 200 700 250" fill="none" stroke="#2A9D8F" stroke-width="30" stroke-linecap="round"/>
  <path d="M150 550 Q300 400 400 450 Q500 500 550 350 Q600 200 700 250" fill="none" stroke="#2A9D8F" stroke-width="22" stroke-linecap="round" opacity="0.8"/>

  <!-- Crossing highlight lines on strands for rope texture -->
  <path d="M100 350 Q200 200 350 350 Q500 500 650 350 Q750 280 700 200" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <path d="M400 100 Q250 300 400 400 Q550 500 400 650 Q350 720 300 700" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <path d="M150 550 Q300 400 400 450 Q500 500 550 350 Q600 200 700 250" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

  <!-- Rope end details -->
  <circle cx="100" cy="350" r="10" fill="#E63946" stroke="#000" stroke-width="2"/>
  <circle cx="700" cy="200" r="10" fill="#E63946" stroke="#000" stroke-width="2"/>
  <circle cx="400" cy="100" r="10" fill="#1D3557" stroke="#000" stroke-width="2"/>
  <circle cx="300" cy="700" r="10" fill="#1D3557" stroke="#000" stroke-width="2"/>
  <circle cx="150" cy="550" r="10" fill="#2A9D8F" stroke="#000" stroke-width="2"/>
  <circle cx="700" cy="250" r="10" fill="#2A9D8F" stroke="#000" stroke-width="2"/>

  <!-- Knot center emphasis -->
  <circle cx="400" cy="400" r="50" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="6,4"/>
  <circle cx="400" cy="400" r="8" fill="#E76F51"/>

  <!-- Shadow strands for depth -->
  <path d="M110 360 Q210 210 360 360 Q510 510 660 360" fill="none" stroke="#000" stroke-width="32" stroke-linecap="round" opacity="0.1"/>
  <path d="M410 110 Q260 310 410 410 Q560 510 410 660" fill="none" stroke="#000" stroke-width="32" stroke-linecap="round" opacity="0.1"/>

  <!-- Small decorative knot detail circles -->
  <circle cx="350" cy="350" r="5" fill="#E76F51"/>
  <circle cx="450" cy="450" r="5" fill="#E76F51"/>
  <circle cx="380" cy="420" r="4" fill="#000"/>
</svg>