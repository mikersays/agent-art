<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Background grid -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="100" y1="0" x2="100" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>

  <!-- Propeller blade 1 - Red (pointing up-right, 0 degrees) -->
  <ellipse cx="400" cy="400" rx="30" ry="220" fill="#E63946" opacity="0.8" transform="rotate(0 400 400)"/>

  <!-- Propeller blade 2 - Blue (120 degrees) -->
  <ellipse cx="400" cy="400" rx="30" ry="220" fill="#1D3557" opacity="0.8" transform="rotate(120 400 400)"/>

  <!-- Propeller blade 3 - Yellow (240 degrees) -->
  <ellipse cx="400" cy="400" rx="30" ry="220" fill="#F4D35E" opacity="0.8" transform="rotate(240 400 400)"/>

  <!-- Concentric circles at center -->
  <circle cx="400" cy="400" r="60" fill="#000000" opacity="0.9"/>
  <circle cx="400" cy="400" r="45" fill="#A89F91" opacity="0.8"/>
  <circle cx="400" cy="400" r="30" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="400" cy="400" r="15" fill="#000000" opacity="0.85"/>
  <circle cx="400" cy="400" r="6" fill="#E63946" opacity="1"/>

  <!-- Motion arc lines around blade tips -->
  <!-- Tip of blade 1 (top) -->
  <path d="M 360 185 A 45 45 0 0 1 440 185" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <path d="M 355 170 A 55 55 0 0 1 445 170" fill="none" stroke="#000000" stroke-width="1" opacity="0.2"/>

  <!-- Tip of blade 1 (bottom) -->
  <path d="M 440 615 A 45 45 0 0 1 360 615" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.3"/>

  <!-- Tip of blade 2 -->
  <path d="M 575 690 A 45 45 0 0 1 590 610" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <path d="M 210 190 A 45 45 0 0 1 225 110" fill="none" stroke="#000000" stroke-width="1" opacity="0.2"/>

  <!-- Tip of blade 3 -->
  <path d="M 210 610 A 45 45 0 0 1 225 690" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <path d="M 575 110 A 45 45 0 0 1 590 190" fill="none" stroke="#000000" stroke-width="1" opacity="0.2"/>

  <!-- Outer motion ring -->
  <circle cx="400" cy="400" r="250" fill="none" stroke="#A89F91" stroke-width="1" opacity="0.2" stroke-dasharray="8 12"/>
  <circle cx="400" cy="400" r="270" fill="none" stroke="#A89F91" stroke-width="0.5" opacity="0.15" stroke-dasharray="4 16"/>

  <!-- Corner accent shapes -->
  <rect x="20" y="20" width="25" height="25" fill="#1D3557" opacity="0.3"/>
  <rect x="755" y="20" width="25" height="25" fill="#E63946" opacity="0.3"/>
  <rect x="20" y="755" width="25" height="25" fill="#F4D35E" opacity="0.3"/>
  <rect x="755" y="755" width="25" height="25" fill="#2A9D8F" opacity="0.3"/>

  <!-- Small scattered accent elements -->
  <circle cx="100" cy="700" r="5" fill="#E76F51" opacity="0.4"/>
  <circle cx="700" cy="100" r="5" fill="#2A9D8F" opacity="0.4"/>
  <rect x="95" y="95" width="8" height="8" fill="#F4D35E" opacity="0.25" transform="rotate(45 99 99)"/>
  <rect x="695" y="695" width="8" height="8" fill="#E63946" opacity="0.25" transform="rotate(45 699 699)"/>
</svg>