<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <!-- Background -->
  <rect width="800" height="800" fill="#F4D35E"/>

  <!-- Control bar at top -->
  <rect x="250" y="60" width="300" height="20" rx="4" fill="#000"/>
  <!-- Handle -->
  <rect x="385" y="20" width="30" height="50" rx="4" fill="#6D2E46"/>
  <circle cx="400" cy="20" r="12" fill="#6D2E46"/>

  <!-- Strings from control bar to puppet -->
  <!-- Left hand string -->
  <line x1="280" y1="70" x2="240" y2="420" stroke="#000" stroke-width="2"/>
  <!-- Right hand string -->
  <line x1="520" y1="70" x2="560" y2="420" stroke="#000" stroke-width="2"/>
  <!-- Head string left -->
  <line x1="350" y1="70" x2="380" y2="180" stroke="#000" stroke-width="2"/>
  <!-- Head string right -->
  <line x1="450" y1="70" x2="420" y2="180" stroke="#000" stroke-width="2"/>
  <!-- Left leg string -->
  <line x1="310" y1="70" x2="350" y2="620" stroke="#000" stroke-width="2"/>
  <!-- Right leg string -->
  <line x1="490" y1="70" x2="450" y2="620" stroke="#000" stroke-width="2"/>

  <!-- HEAD - circle -->
  <circle cx="400" cy="220" r="50" fill="#E63946"/>
  <!-- Face features -->
  <circle cx="380" cy="210" r="8" fill="#000"/>
  <circle cx="420" cy="210" r="8" fill="#000"/>
  <circle cx="380" cy="210" r="3" fill="#FFF"/>
  <circle cx="420" cy="210" r="3" fill="#FFF"/>
  <!-- Mouth -->
  <rect x="385" y="240" width="30" height="8" rx="4" fill="#000"/>
  <!-- Hat - triangle -->
  <polygon points="400,150 360,185 440,185" fill="#1D3557"/>
  <rect x="350" y="182" width="100" height="10" fill="#1D3557"/>

  <!-- NECK -->
  <rect x="390" y="270" width="20" height="30" fill="#DDA15E"/>

  <!-- TORSO - rectangle -->
  <rect x="340" y="300" width="120" height="120" rx="6" fill="#1D3557"/>
  <!-- Torso decoration -->
  <circle cx="400" cy="340" r="15" fill="#F4D35E"/>
  <rect x="370" y="370" width="60" height="15" fill="#E63946"/>
  <!-- Buttons -->
  <circle cx="400" cy="365" r="5" fill="#FFF"/>
  <circle cx="400" cy="395" r="5" fill="#FFF"/>

  <!-- LEFT ARM - upper -->
  <rect x="280" y="310" width="60" height="20" rx="5" fill="#DDA15E"/>
  <!-- LEFT ARM - lower -->
  <rect x="240" y="330" width="55" height="18" rx="5" fill="#DDA15E" transform="rotate(70, 270, 340)"/>
  <!-- LEFT HAND -->
  <circle cx="240" cy="420" r="15" fill="#E63946"/>

  <!-- RIGHT ARM - upper -->
  <rect x="460" y="310" width="60" height="20" rx="5" fill="#DDA15E"/>
  <!-- RIGHT ARM - lower -->
  <rect x="505" y="330" width="55" height="18" rx="5" fill="#DDA15E" transform="rotate(-70, 530, 340)"/>
  <!-- RIGHT HAND -->
  <circle cx="560" cy="420" r="15" fill="#E63946"/>

  <!-- PELVIS / hip joint -->
  <polygon points="360,420 440,420 460,460 340,460" fill="#6D2E46"/>

  <!-- LEFT LEG upper -->
  <rect x="345" y="460" width="35" height="80" rx="5" fill="#264653"/>
  <!-- LEFT LEG lower -->
  <rect x="340" y="540" width="35" height="80" rx="5" fill="#264653"/>
  <!-- Left knee joint -->
  <circle cx="362" cy="540" r="10" fill="#000"/>
  <!-- LEFT FOOT -->
  <rect x="325" y="620" width="55" height="20" rx="8" fill="#000"/>

  <!-- RIGHT LEG upper -->
  <rect x="420" y="460" width="35" height="80" rx="5" fill="#264653"/>
  <!-- RIGHT LEG lower -->
  <rect x="425" y="540" width="35" height="80" rx="5" fill="#264653"/>
  <!-- Right knee joint -->
  <circle cx="442" cy="540" r="10" fill="#000"/>
  <!-- RIGHT FOOT -->
  <rect x="420" y="620" width="55" height="20" rx="8" fill="#000"/>

  <!-- Joint circles -->
  <circle cx="340" cy="320" r="8" fill="#000"/>
  <circle cx="460" cy="320" r="8" fill="#000"/>
  <circle cx="362" cy="460" r="8" fill="#DDA15E"/>
  <circle cx="442" cy="460" r="8" fill="#DDA15E"/>

  <!-- Stage floor -->
  <rect x="0" y="700" width="800" height="100" fill="#6D2E46"/>
  <rect x="0" y="700" width="800" height="8" fill="#000"/>

  <!-- Decorative side curtains -->
  <rect x="0" y="0" width="60" height="700" fill="#E63946" opacity="0.4"/>
  <rect x="740" y="0" width="60" height="700" fill="#E63946" opacity="0.4"/>
  <polygon points="0,0 60,0 60,80 0,120" fill="#E63946" opacity="0.6"/>
  <polygon points="740,0 800,0 800,120 740,80" fill="#E63946" opacity="0.6"/>
</svg>