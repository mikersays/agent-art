<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#1D3557"/>

  <!-- Background grid at low opacity -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="100" y1="0" x2="100" y2="800" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#FFFFFF" stroke-width="0.5" opacity="0.07"/>

  <!-- Spiral arrangement of rectangles: outer (blue tones) to inner (red tones) -->
  <!-- Outermost ring - steel blue / light blue -->
  <g transform="rotate(0, 400, 400)"><rect x="310" y="60" width="180" height="55" fill="#457B9D" opacity="0.9"/></g>
  <g transform="rotate(45, 400, 400)"><rect x="310" y="60" width="180" height="55" fill="#457B9D" opacity="0.85"/></g>
  <g transform="rotate(90, 400, 400)"><rect x="310" y="60" width="180" height="55" fill="#A8DADC" opacity="0.8"/></g>
  <g transform="rotate(135, 400, 400)"><rect x="310" y="60" width="180" height="55" fill="#A8DADC" opacity="0.8"/></g>
  <g transform="rotate(180, 400, 400)"><rect x="310" y="60" width="180" height="55" fill="#457B9D" opacity="0.85"/></g>
  <g transform="rotate(225, 400, 400)"><rect x="310" y="60" width="180" height="55" fill="#457B9D" opacity="0.8"/></g>
  <g transform="rotate(270, 400, 400)"><rect x="310" y="60" width="180" height="55" fill="#A8DADC" opacity="0.75"/></g>
  <g transform="rotate(315, 400, 400)"><rect x="310" y="60" width="180" height="55" fill="#A8DADC" opacity="0.75"/></g>

  <!-- Second ring - transitioning to teal -->
  <g transform="rotate(22, 400, 400)"><rect x="330" y="130" width="140" height="48" fill="#2A9D8F" opacity="0.9"/></g>
  <g transform="rotate(67, 400, 400)"><rect x="330" y="130" width="140" height="48" fill="#2A9D8F" opacity="0.85"/></g>
  <g transform="rotate(112, 400, 400)"><rect x="330" y="130" width="140" height="48" fill="#2A9D8F" opacity="0.85"/></g>
  <g transform="rotate(157, 400, 400)"><rect x="330" y="130" width="140" height="48" fill="#264653" opacity="0.9"/></g>
  <g transform="rotate(202, 400, 400)"><rect x="330" y="130" width="140" height="48" fill="#264653" opacity="0.9"/></g>
  <g transform="rotate(247, 400, 400)"><rect x="330" y="130" width="140" height="48" fill="#2A9D8F" opacity="0.85"/></g>
  <g transform="rotate(292, 400, 400)"><rect x="330" y="130" width="140" height="48" fill="#264653" opacity="0.8"/></g>
  <g transform="rotate(337, 400, 400)"><rect x="330" y="130" width="140" height="48" fill="#2A9D8F" opacity="0.8"/></g>

  <!-- Third ring - orange/yellow transition -->
  <g transform="rotate(11, 400, 400)"><rect x="352" y="200" width="96" height="40" fill="#E76F51" opacity="0.9"/></g>
  <g transform="rotate(56, 400, 400)"><rect x="352" y="200" width="96" height="40" fill="#F4D35E" opacity="0.9"/></g>
  <g transform="rotate(101, 400, 400)"><rect x="352" y="200" width="96" height="40" fill="#E76F51" opacity="0.85"/></g>
  <g transform="rotate(146, 400, 400)"><rect x="352" y="200" width="96" height="40" fill="#F4D35E" opacity="0.85"/></g>
  <g transform="rotate(191, 400, 400)"><rect x="352" y="200" width="96" height="40" fill="#E76F51" opacity="0.9"/></g>
  <g transform="rotate(236, 400, 400)"><rect x="352" y="200" width="96" height="40" fill="#F4D35E" opacity="0.9"/></g>
  <g transform="rotate(281, 400, 400)"><rect x="352" y="200" width="96" height="40" fill="#E76F51" opacity="0.85"/></g>
  <g transform="rotate(326, 400, 400)"><rect x="352" y="200" width="96" height="40" fill="#F4D35E" opacity="0.85"/></g>

  <!-- Innermost core - red -->
  <g transform="rotate(0, 400, 400)"><rect x="368" y="268" width="64" height="32" fill="#E63946" opacity="0.95"/></g>
  <g transform="rotate(60, 400, 400)"><rect x="368" y="268" width="64" height="32" fill="#E63946" opacity="0.95"/></g>
  <g transform="rotate(120, 400, 400)"><rect x="368" y="268" width="64" height="32" fill="#E63946" opacity="0.95"/></g>
  <g transform="rotate(180, 400, 400)"><rect x="368" y="268" width="64" height="32" fill="#E63946" opacity="0.95"/></g>
  <g transform="rotate(240, 400, 400)"><rect x="368" y="268" width="64" height="32" fill="#E63946" opacity="0.95"/></g>
  <g transform="rotate(300, 400, 400)"><rect x="368" y="268" width="64" height="32" fill="#E63946" opacity="0.95"/></g>

  <!-- Center circle -->
  <circle cx="400" cy="400" r="22" fill="#F4D35E"/>
  <circle cx="400" cy="400" r="12" fill="#E63946"/>

  <!-- Corner accent shapes -->
  <circle cx="40" cy="40" r="18" fill="#F4D35E" opacity="0.7"/>
  <circle cx="760" cy="40" r="18" fill="#F4D35E" opacity="0.7"/>
  <circle cx="40" cy="760" r="18" fill="#F4D35E" opacity="0.7"/>
  <circle cx="760" cy="760" r="18" fill="#F4D35E" opacity="0.7"/>

  <!-- Corner accent squares -->
  <rect x="20" y="20" width="12" height="12" fill="#E63946"/>
  <rect x="768" y="20" width="12" height="12" fill="#E63946"/>
  <rect x="20" y="768" width="12" height="12" fill="#E63946"/>
  <rect x="768" y="768" width="12" height="12" fill="#E63946"/>
</svg>
