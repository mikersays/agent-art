<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Forest-colored large rect behind everything -->
  <rect x="50" y="50" width="700" height="700" fill="#264653" opacity="0.2"/>
  <!-- Faint diagonal lines -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="200" y1="0" x2="800" y2="600" stroke="#A89F91" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="200" x2="600" y2="800" stroke="#A89F91" stroke-width="1" opacity="0.08"/>
  <line x1="400" y1="0" x2="800" y2="400" stroke="#A89F91" stroke-width="1" opacity="0.07"/>
  <line x1="0" y1="400" x2="400" y2="800" stroke="#A89F91" stroke-width="1" opacity="0.07"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <line x1="600" y1="0" x2="0" y2="600" stroke="#A89F91" stroke-width="1" opacity="0.08"/>
  <line x1="800" y1="200" x2="200" y2="800" stroke="#A89F91" stroke-width="1" opacity="0.08"/>
  <!-- Window frame 1: Red, large -->
  <rect x="80" y="100" width="250" height="300" fill="none" stroke="#E63946" stroke-width="5"/>
  <!-- Circle inside frame 1 -->
  <circle cx="205" cy="250" r="50" fill="#E63946" opacity="0.3"/>
  <!-- Window frame 2: Blue, overlapping -->
  <rect x="220" y="200" width="200" height="350" fill="none" stroke="#1D3557" stroke-width="4"/>
  <!-- Triangle inside frame 2 -->
  <polygon points="320,280 370,380 270,380" fill="#1D3557" opacity="0.3"/>
  <!-- Window frame 3: Yellow -->
  <rect x="480" y="80" width="230" height="260" fill="none" stroke="#F4D35E" stroke-width="5"/>
  <!-- Small rect inside frame 3 -->
  <rect x="550" y="150" width="80" height="80" fill="#F4D35E" opacity="0.35"/>
  <!-- Window frame 4: Teal, bottom area -->
  <rect x="100" y="500" width="280" height="220" fill="none" stroke="#2A9D8F" stroke-width="4"/>
  <!-- Circle inside frame 4 -->
  <circle cx="240" cy="610" r="40" fill="#2A9D8F" opacity="0.25"/>
  <!-- Window frame 5: Orange, overlapping several -->
  <rect x="350" y="420" width="220" height="300" fill="none" stroke="#E76F51" stroke-width="3"/>
  <!-- Window frame 6: Steel Blue, small -->
  <rect x="550" y="400" width="180" height="180" fill="none" stroke="#457B9D" stroke-width="4"/>
  <!-- Polygon inside frame 6 -->
  <polygon points="640,440 690,540 590,540" fill="#457B9D" opacity="0.25"/>
  <!-- Window frame 7: Burgundy, small overlay -->
  <rect x="600" y="600" width="150" height="160" fill="none" stroke="#6D2E46" stroke-width="3"/>
  <!-- Black filled squares at select corners -->
  <rect x="80" y="100" width="18" height="18" fill="#000000"/>
  <rect x="312" y="382" width="18" height="18" fill="#000000"/>
  <rect x="692" y="80" width="18" height="18" fill="#000000"/>
  <rect x="100" y="702" width="18" height="18" fill="#000000"/>
  <rect x="552" y="400" width="18" height="18" fill="#000000"/>
  <rect x="732" y="742" width="18" height="18" fill="#000000"/>
  <rect x="480" y="322" width="18" height="18" fill="#000000"/>
  <!-- Extra small geometric accents -->
  <circle cx="460" cy="150" r="12" fill="#E76F51" opacity="0.5"/>
  <circle cx="150" cy="460" r="10" fill="#F4D35E" opacity="0.5"/>
  <rect x="680" y="300" width="25" height="25" fill="#264653" opacity="0.4"/>
  <circle cx="420" cy="760" r="14" fill="#E63946" opacity="0.4"/>
</svg>