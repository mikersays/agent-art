<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>
  <!-- Structural grid lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <!-- Cross - Red vertical bar -->
  <rect x="280" y="80" width="140" height="680" fill="#E63946" opacity="0.9"/>
  <!-- Cross - Blue horizontal bar -->
  <rect x="100" y="300" width="580" height="130" fill="#1D3557" opacity="0.85"/>
  <!-- Overlap zone darkened -->
  <rect x="280" y="300" width="140" height="130" fill="#000000" opacity="0.25"/>
  <!-- Top-left quadrant shapes -->
  <circle cx="120" cy="150" r="35" fill="#F4D35E" opacity="0.8"/>
  <rect x="50" y="200" width="40" height="40" fill="#2A9D8F" opacity="0.7"/>
  <polygon points="200,100 220,140 180,140" fill="#E76F51" opacity="0.75"/>
  <circle cx="180" cy="240" r="15" fill="#1D3557" opacity="0.5"/>
  <rect x="80" y="50" width="25" height="25" fill="#000000" opacity="0.6"/>
  <!-- Top-right quadrant shapes -->
  <circle cx="580" cy="120" r="45" fill="#2A9D8F" opacity="0.7"/>
  <rect x="500" y="180" width="50" height="30" fill="#F4D35E" opacity="0.8"/>
  <polygon points="700,80 730,130 670,130" fill="#E63946" opacity="0.6"/>
  <circle cx="650" cy="220" r="20" fill="#457B9D" opacity="0.65"/>
  <rect x="720" y="50" width="30" height="30" fill="#000000" opacity="0.5"/>
  <!-- Bottom-left quadrant shapes -->
  <rect x="60" y="500" width="60" height="40" fill="#F4D35E" opacity="0.75"/>
  <circle cx="150" cy="600" r="28" fill="#E63946" opacity="0.6"/>
  <polygon points="100,700 130,740 70,740" fill="#1D3557" opacity="0.7"/>
  <circle cx="200" cy="520" r="12" fill="#2A9D8F" opacity="0.8"/>
  <rect x="30" y="650" width="35" height="35" fill="#E76F51" opacity="0.65"/>
  <!-- Bottom-right quadrant shapes -->
  <circle cx="600" cy="550" r="40" fill="#F4D35E" opacity="0.7"/>
  <rect x="520" y="620" width="55" height="35" fill="#2A9D8F" opacity="0.75"/>
  <polygon points="700,500 740,560 660,560" fill="#1D3557" opacity="0.6"/>
  <circle cx="720" cy="680" r="22" fill="#E63946" opacity="0.7"/>
  <rect x="650" y="720" width="28" height="28" fill="#000000" opacity="0.5"/>
  <!-- Edge structural lines -->
  <line x1="20" y1="20" x2="780" y2="20" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <line x1="20" y1="780" x2="780" y2="780" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <line x1="20" y1="20" x2="20" y2="780" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <line x1="780" y1="20" x2="780" y2="780" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <!-- Corner accents -->
  <rect x="10" y="10" width="12" height="12" fill="#000000" opacity="0.4"/>
  <rect x="778" y="10" width="12" height="12" fill="#000000" opacity="0.4"/>
  <rect x="10" y="778" width="12" height="12" fill="#000000" opacity="0.4"/>
  <rect x="778" y="778" width="12" height="12" fill="#000000" opacity="0.4"/>
  <!-- Additional accent shapes -->
  <circle cx="350" cy="50" r="8" fill="#E76F51" opacity="0.6"/>
  <circle cx="350" cy="750" r="8" fill="#2A9D8F" opacity="0.6"/>
  <line x1="450" y1="460" x2="680" y2="460" stroke="#E63946" stroke-width="2" opacity="0.3"/>
  <line x1="450" y1="480" x2="620" y2="480" stroke="#F4D35E" stroke-width="1.5" opacity="0.3"/>
</svg>