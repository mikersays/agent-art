<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Radiating lines from bottom-right convergence point (750, 750) -->
  <line x1="750" y1="750" x2="0" y2="600" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="750" y1="750" x2="0" y2="400" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="750" y1="750" x2="0" y2="200" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="750" y1="750" x2="0" y2="0" stroke="#000000" stroke-width="1" opacity="0.08"/>
  <line x1="750" y1="750" x2="200" y2="0" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="750" y1="750" x2="400" y2="0" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="750" y1="750" x2="600" y2="0" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="750" y1="750" x2="0" y2="750" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="750" y1="750" x2="750" y2="0" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <!-- Cool accents in upper-left corner -->
  <circle cx="80" cy="80" r="50" fill="#2A9D8F" opacity="0.5"/>
  <circle cx="150" cy="40" r="25" fill="#A8DADC" opacity="0.6"/>
  <rect x="20" y="140" width="80" height="30" fill="#457B9D" opacity="0.5"/>
  <circle cx="50" cy="220" r="18" fill="#A8DADC" opacity="0.4"/>
  <rect x="120" y="100" width="40" height="40" fill="#264653" opacity="0.35"/>
  <!-- Large warm rectangles converging toward bottom-right -->
  <rect x="300" y="350" width="200" height="120" fill="#E63946" opacity="0.8" transform="rotate(-15 400 410)"/>
  <rect x="450" y="500" width="180" height="100" fill="#6D2E46" opacity="0.75" transform="rotate(-10 540 550)"/>
  <rect x="550" y="600" width="160" height="90" fill="#E76F51" opacity="0.8" transform="rotate(-8 630 645)"/>
  <rect x="620" y="680" width="120" height="70" fill="#E63946" opacity="0.9"/>
  <!-- Triangles pointing inward toward convergence -->
  <polygon points="200,300 350,350 250,420" fill="#E76F51" opacity="0.7"/>
  <polygon points="400,200 520,280 380,320" fill="#6D2E46" opacity="0.65"/>
  <polygon points="550,350 680,400 600,480" fill="#E63946" opacity="0.6"/>
  <polygon points="650,500 760,540 700,600" fill="#DDA15E" opacity="0.7"/>
  <polygon points="100,500 250,550 150,620" fill="#E76F51" opacity="0.5"/>
  <!-- Medium rectangles -->
  <rect x="180" y="450" width="100" height="60" fill="#6D2E46" opacity="0.6" transform="rotate(-20 230 480)"/>
  <rect x="500" y="150" width="120" height="50" fill="#E63946" opacity="0.4" transform="rotate(-25 560 175)"/>
  <rect x="350" y="550" width="90" height="50" fill="#DDA15E" opacity="0.65"/>
  <!-- Small accent shapes -->
  <circle cx="680" cy="700" r="15" fill="#000000" opacity="0.8"/>
  <circle cx="720" cy="650" r="10" fill="#E63946"/>
  <circle cx="600" cy="550" r="8" fill="#000000" opacity="0.6"/>
  <rect x="740" y="740" width="30" height="30" fill="#000000" opacity="0.9"/>
  <!-- Bold convergence point marker -->
  <circle cx="750" cy="750" r="20" fill="#E63946" opacity="0.9"/>
  <circle cx="750" cy="750" r="8" fill="#000000"/>
  <!-- Structural black lines -->
  <line x1="300" y1="800" x2="750" y2="750" stroke="#000000" stroke-width="2.5" opacity="0.6"/>
  <line x1="800" y1="300" x2="750" y2="750" stroke="#000000" stroke-width="2.5" opacity="0.6"/>
  <line x1="500" y1="0" x2="750" y2="750" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
</svg>