<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Fibonacci spiral approximation using rectangles -->
  <!-- Largest rectangle (bottom-right area) -->
  <rect x="400" y="400" width="380" height="380" fill="#1D3557" opacity="0.25" stroke="#000000" stroke-width="2"/>
  <!-- Second largest (top-right) -->
  <rect x="400" y="20" width="380" height="380" fill="#E63946" opacity="0.2" stroke="#000000" stroke-width="2"/>
  <!-- Third (top-left large) -->
  <rect x="165" y="20" width="235" height="235" fill="#F4D35E" opacity="0.3" stroke="#000000" stroke-width="2"/>
  <!-- Fourth -->
  <rect x="165" y="255" width="235" height="145" fill="#2A9D8F" opacity="0.35" stroke="#000000" stroke-width="2"/>
  <!-- Fifth -->
  <rect x="310" y="255" width="90" height="145" fill="#E76F51" opacity="0.4" stroke="#000000" stroke-width="2"/>
  <!-- Sixth -->
  <rect x="310" y="255" width="90" height="90" fill="#457B9D" opacity="0.4" stroke="#000000" stroke-width="2"/>
  <!-- Seventh -->
  <rect x="310" y="345" width="55" height="55" fill="#E63946" opacity="0.5" stroke="#000000" stroke-width="2"/>
  <!-- Eighth -->
  <rect x="365" y="345" width="35" height="55" fill="#F4D35E" opacity="0.5" stroke="#000000" stroke-width="2"/>
  <!-- Ninth -->
  <rect x="365" y="370" width="35" height="30" fill="#1D3557" opacity="0.5" stroke="#000000" stroke-width="2"/>
  <!-- Tenth -->
  <rect x="365" y="345" width="20" height="25" fill="#2A9D8F" opacity="0.6" stroke="#000000" stroke-width="2"/>

  <!-- Spiral path traced with thin lines -->
  <path d="M 400 400 Q 400 20, 400 20" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <path d="M 400 20 Q 165 20, 165 20" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <path d="M 165 255 Q 165 255, 310 255" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.3"/>

  <!-- Quarter-arc spiral path -->
  <path d="M 400 780 A 380 380 0 0 1 780 400" fill="none" stroke="#000000" stroke-width="2" opacity="0.15"/>
  <path d="M 780 400 A 380 380 0 0 1 400 20" fill="none" stroke="#000000" stroke-width="2" opacity="0.15"/>
  <path d="M 400 20 A 235 235 0 0 1 165 255" fill="none" stroke="#000000" stroke-width="2" opacity="0.15"/>
  <path d="M 165 255 A 145 145 0 0 1 310 400" fill="none" stroke="#000000" stroke-width="2" opacity="0.15"/>
  <path d="M 310 400 A 90 90 0 0 1 400 310" fill="none" stroke="#000000" stroke-width="2" opacity="0.15"/>
  <path d="M 400 310 A 55 55 0 0 1 345 255" fill="none" stroke="#000000" stroke-width="2" opacity="0.15"/>
  <path d="M 345 255 A 35 35 0 0 1 310 290" fill="none" stroke="#000000" stroke-width="2" opacity="0.15"/>

  <!-- Central focal point - small black circle -->
  <circle cx="355" cy="355" r="8" fill="#000000"/>
  <circle cx="355" cy="355" r="14" fill="none" stroke="#000000" stroke-width="1" opacity="0.3"/>

  <!-- Additional rectangles along spiral for visual richness -->
  <rect x="20" y="20" width="145" height="380" fill="#264653" opacity="0.15" stroke="#000000" stroke-width="1"/>
  <rect x="20" y="400" width="380" height="380" fill="#DDA15E" opacity="0.12" stroke="#000000" stroke-width="1"/>
  <rect x="20" y="400" width="145" height="235" fill="#6D2E46" opacity="0.15" stroke="#000000" stroke-width="1"/>
  <rect x="20" y="635" width="145" height="145" fill="#A8DADC" opacity="0.25" stroke="#000000" stroke-width="1"/>
  <rect x="165" y="540" width="90" height="90" fill="#E9C46A" opacity="0.3" stroke="#000000" stroke-width="1"/>
  <rect x="255" y="540" width="55" height="90" fill="#E63946" opacity="0.2" stroke="#000000" stroke-width="1"/>
  <rect x="255" y="490" width="55" height="50" fill="#457B9D" opacity="0.3" stroke="#000000" stroke-width="1"/>

  <!-- Corner accent shapes -->
  <circle cx="30" cy="30" r="10" fill="#E63946" opacity="0.6"/>
  <circle cx="770" cy="30" r="10" fill="#1D3557" opacity="0.6"/>
  <circle cx="770" cy="770" r="10" fill="#F4D35E" opacity="0.6"/>
  <circle cx="30" cy="770" r="10" fill="#2A9D8F" opacity="0.6"/>

  <!-- Subtle grid lines for structure -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="165" y1="0" x2="165" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="255" x2="800" y2="255" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="310" y1="0" x2="310" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="540" x2="800" y2="540" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
</svg>