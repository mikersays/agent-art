<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Horizontal strata layers from top to bottom -->
  <rect x="0" y="0" width="800" height="60" fill="#A8DADC" opacity="0.5"/>
  <rect x="0" y="60" width="800" height="40" fill="#FEFAE0" opacity="0.8"/>
  <rect x="0" y="100" width="800" height="80" fill="#457B9D" opacity="0.45"/>
  <rect x="0" y="180" width="800" height="30" fill="#DDA15E" opacity="0.6"/>
  <rect x="0" y="210" width="800" height="70" fill="#A89F91" opacity="0.4"/>
  <rect x="0" y="280" width="800" height="50" fill="#A8DADC" opacity="0.55"/>
  <rect x="0" y="330" width="800" height="90" fill="#457B9D" opacity="0.5"/>
  <rect x="0" y="420" width="800" height="35" fill="#DDA15E" opacity="0.65"/>
  <rect x="0" y="455" width="800" height="60" fill="#FEFAE0" opacity="0.7"/>
  <rect x="0" y="515" width="800" height="75" fill="#A89F91" opacity="0.5"/>
  <rect x="0" y="590" width="800" height="45" fill="#A8DADC" opacity="0.4"/>
  <rect x="0" y="635" width="800" height="55" fill="#457B9D" opacity="0.55"/>
  <rect x="0" y="690" width="800" height="40" fill="#DDA15E" opacity="0.6"/>
  <rect x="0" y="730" width="800" height="70" fill="#A89F91" opacity="0.45"/>
  <!-- Bold red rectangular intrusions breaking through layers -->
  <rect x="80" y="150" width="60" height="250" fill="#E63946" opacity="0.85"/>
  <rect x="520" y="300" width="45" height="200" fill="#E63946" opacity="0.8"/>
  <rect x="680" y="100" width="35" height="180" fill="#E63946" opacity="0.7"/>
  <!-- Bold blue rectangular intrusions -->
  <rect x="300" y="200" width="55" height="300" fill="#1D3557" opacity="0.8"/>
  <rect x="600" y="450" width="50" height="220" fill="#1D3557" opacity="0.75"/>
  <rect x="170" y="500" width="40" height="180" fill="#1D3557" opacity="0.7"/>
  <!-- Large yellow triangle piercing upward from bottom -->
  <polygon points="350,800 500,800 425,300" fill="#F4D35E" opacity="0.8"/>
  <polygon points="370,800 480,800 425,400" fill="#F4D35E" opacity="0.3"/>
  <!-- Black circles punctuating composition -->
  <circle cx="150" cy="100" r="25" fill="#000000" opacity="0.8"/>
  <circle cx="450" cy="200" r="18" fill="#000000" opacity="0.7"/>
  <circle cx="700" cy="350" r="35" fill="#000000" opacity="0.75"/>
  <circle cx="250" cy="450" r="15" fill="#000000" opacity="0.65"/>
  <circle cx="550" cy="600" r="28" fill="#000000" opacity="0.8"/>
  <circle cx="100" cy="700" r="20" fill="#000000" opacity="0.7"/>
  <circle cx="650" cy="720" r="12" fill="#000000" opacity="0.6"/>
  <circle cx="400" cy="550" r="22" fill="#000000" opacity="0.75"/>
  <!-- Subtle horizontal structural lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="590" x2="800" y2="590" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="730" x2="800" y2="730" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <!-- Corner accents -->
  <rect x="10" y="10" width="12" height="12" fill="#E63946" opacity="0.6"/>
  <rect x="778" y="10" width="12" height="12" fill="#1D3557" opacity="0.6"/>
</svg>