<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>

  <!-- Subtle grid lines -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="0" x2="800" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>

  <!-- Four large pinwheel triangles meeting at center -->
  <!-- Top triangle - Red -->
  <polygon points="400,400 250,120 550,120" fill="#E63946" opacity="0.9"/>
  <!-- Right triangle - Blue -->
  <polygon points="400,400 680,250 680,550" fill="#1D3557" opacity="0.9"/>
  <!-- Bottom triangle - Yellow -->
  <polygon points="400,400 550,680 250,680" fill="#F4D35E" opacity="0.9"/>
  <!-- Left triangle - Black -->
  <polygon points="400,400 120,550 120,250" fill="#000000" opacity="0.9"/>

  <!-- Center circle -->
  <circle cx="400" cy="400" r="18" fill="#FFFFFF" opacity="1"/>
  <circle cx="400" cy="400" r="10" fill="#000000" opacity="0.8"/>

  <!-- Radial lines from center -->
  <line x1="400" y1="400" x2="400" y2="60" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="740" y2="400" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="400" y2="740" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="60" y2="400" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="400" x2="640" y2="160" stroke="#000000" stroke-width="0.7" opacity="0.1"/>
  <line x1="400" y1="400" x2="640" y2="640" stroke="#000000" stroke-width="0.7" opacity="0.1"/>
  <line x1="400" y1="400" x2="160" y2="640" stroke="#000000" stroke-width="0.7" opacity="0.1"/>
  <line x1="400" y1="400" x2="160" y2="160" stroke="#000000" stroke-width="0.7" opacity="0.1"/>

  <!-- Surrounding small circles - teal -->
  <circle cx="200" cy="90" r="12" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="600" cy="90" r="8" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="720" cy="200" r="14" fill="#2A9D8F" opacity="0.75"/>
  <circle cx="720" cy="620" r="10" fill="#2A9D8F" opacity="0.65"/>
  <circle cx="600" cy="720" r="12" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="80" cy="620" r="9" fill="#2A9D8F" opacity="0.7"/>

  <!-- Surrounding small circles - orange -->
  <circle cx="400" cy="60" r="10" fill="#E76F51" opacity="0.75"/>
  <circle cx="740" cy="400" r="11" fill="#E76F51" opacity="0.8"/>
  <circle cx="200" cy="720" r="13" fill="#E76F51" opacity="0.7"/>
  <circle cx="80" cy="200" r="8" fill="#E76F51" opacity="0.75"/>
  <circle cx="80" cy="400" r="10" fill="#E76F51" opacity="0.65"/>

  <!-- Additional accent circles -->
  <circle cx="300" cy="60" r="6" fill="#F4D35E" opacity="0.5"/>
  <circle cx="740" cy="300" r="7" fill="#E63946" opacity="0.4"/>
  <circle cx="500" cy="740" r="6" fill="#1D3557" opacity="0.5"/>
  <circle cx="60" cy="500" r="7" fill="#F4D35E" opacity="0.4"/>

  <!-- Corner accent squares -->
  <rect x="30" y="30" width="20" height="20" fill="#000000" opacity="0.15"/>
  <rect x="750" y="30" width="20" height="20" fill="#E63946" opacity="0.15"/>
  <rect x="750" y="750" width="20" height="20" fill="#1D3557" opacity="0.15"/>
  <rect x="30" y="750" width="20" height="20" fill="#F4D35E" opacity="0.15"/>

  <!-- Small decorative triangles near edges -->
  <polygon points="140,50 160,50 150,35" fill="#E63946" opacity="0.3"/>
  <polygon points="650,750 670,750 660,765" fill="#1D3557" opacity="0.3"/>
  <polygon points="750,140 750,160 765,150" fill="#2A9D8F" opacity="0.3"/>
  <polygon points="35,650 50,640 50,660" fill="#E76F51" opacity="0.3"/>
</svg>