<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFF"/>
  <!-- Background subtle grid -->
  <rect x="0" y="0" width="800" height="800" fill="#A8DADC" opacity="0.08"/>
  <!-- Left strand of DNA helix (sinusoidal path) -->
  <path d="M300,50 C350,90 450,130 400,170 C350,210 250,250 300,290 C350,330 450,370 400,410 C350,450 250,490 300,530 C350,570 450,610 400,650 C350,690 250,730 300,770"
        fill="none" stroke="#E63946" stroke-width="6" stroke-linecap="round"/>
  <!-- Right strand of DNA helix (opposite sinusoidal path) -->
  <path d="M500,50 C450,90 350,130 400,170 C450,210 550,250 500,290 C450,330 350,370 400,410 C450,450 550,490 500,530 C450,570 350,610 400,650 C450,690 550,730 500,770"
        fill="none" stroke="#1D3557" stroke-width="6" stroke-linecap="round"/>
  <!-- Connecting rungs (base pairs) - colored differently -->
  <!-- Rung 1 - top -->
  <line x1="310" y1="70" x2="490" y2="70" stroke="#F4D35E" stroke-width="4" stroke-linecap="round"/>
  <circle cx="310" cy="70" r="6" fill="#F4D35E"/>
  <circle cx="490" cy="70" r="6" fill="#E76F51"/>
  <!-- Rung 2 -->
  <line x1="370" y1="110" x2="430" y2="110" stroke="#E76F51" stroke-width="4" stroke-linecap="round"/>
  <circle cx="370" cy="110" r="5" fill="#E76F51"/>
  <circle cx="430" cy="110" r="5" fill="#F4D35E"/>
  <!-- Rung 3 - at crossing -->
  <line x1="395" y1="150" x2="405" y2="150" stroke="#333" stroke-width="4"/>
  <!-- Rung 4 -->
  <line x1="370" y1="190" x2="430" y2="190" stroke="#F4D35E" stroke-width="4" stroke-linecap="round"/>
  <circle cx="370" cy="190" r="5" fill="#A8DADC"/>
  <circle cx="430" cy="190" r="5" fill="#E63946"/>
  <!-- Rung 5 -->
  <line x1="310" y1="230" x2="490" y2="230" stroke="#A8DADC" stroke-width="4" stroke-linecap="round"/>
  <circle cx="310" cy="230" r="6" fill="#1D3557"/>
  <circle cx="490" cy="230" r="6" fill="#F4D35E"/>
  <!-- Rung 6 -->
  <line x1="340" y1="270" x2="460" y2="270" stroke="#E63946" stroke-width="4" stroke-linecap="round"/>
  <circle cx="340" cy="270" r="5" fill="#E63946"/>
  <circle cx="460" cy="270" r="5" fill="#1D3557"/>
  <!-- Rung 7 - at crossing -->
  <line x1="395" y1="310" x2="405" y2="310" stroke="#333" stroke-width="4"/>
  <!-- Rung 8 -->
  <line x1="370" y1="350" x2="430" y2="350" stroke="#1D3557" stroke-width="4" stroke-linecap="round"/>
  <circle cx="370" cy="350" r="5" fill="#F4D35E"/>
  <circle cx="430" cy="350" r="5" fill="#A8DADC"/>
  <!-- Rung 9 -->
  <line x1="340" y1="390" x2="460" y2="390" stroke="#F4D35E" stroke-width="4" stroke-linecap="round"/>
  <circle cx="340" cy="390" r="5" fill="#E76F51"/>
  <circle cx="460" cy="390" r="5" fill="#E63946"/>
  <!-- Rung 10 - at crossing -->
  <line x1="395" y1="430" x2="405" y2="430" stroke="#333" stroke-width="4"/>
  <!-- Rung 11 -->
  <line x1="370" y1="470" x2="430" y2="470" stroke="#E76F51" stroke-width="4" stroke-linecap="round"/>
  <circle cx="370" cy="470" r="5" fill="#1D3557"/>
  <circle cx="430" cy="470" r="5" fill="#F4D35E"/>
  <!-- Rung 12 -->
  <line x1="310" y1="510" x2="490" y2="510" stroke="#A8DADC" stroke-width="4" stroke-linecap="round"/>
  <circle cx="310" cy="510" r="6" fill="#E63946"/>
  <circle cx="490" cy="510" r="6" fill="#1D3557"/>
  <!-- Rung 13 -->
  <line x1="340" y1="550" x2="460" y2="550" stroke="#E63946" stroke-width="4" stroke-linecap="round"/>
  <circle cx="340" cy="550" r="5" fill="#F4D35E"/>
  <circle cx="460" cy="550" r="5" fill="#E76F51"/>
  <!-- Rung 14 - at crossing -->
  <line x1="395" y1="590" x2="405" y2="590" stroke="#333" stroke-width="4"/>
  <!-- Rung 15 -->
  <line x1="370" y1="630" x2="430" y2="630" stroke="#1D3557" stroke-width="4" stroke-linecap="round"/>
  <circle cx="370" cy="630" r="5" fill="#A8DADC"/>
  <circle cx="430" cy="630" r="5" fill="#E63946"/>
  <!-- Rung 16 -->
  <line x1="310" y1="670" x2="490" y2="670" stroke="#F4D35E" stroke-width="4" stroke-linecap="round"/>
  <circle cx="310" cy="670" r="6" fill="#E76F51"/>
  <circle cx="490" cy="670" r="6" fill="#F4D35E"/>
  <!-- Rung 17 -->
  <line x1="340" y1="710" x2="460" y2="710" stroke="#E76F51" stroke-width="4" stroke-linecap="round"/>
  <circle cx="340" cy="710" r="5" fill="#1D3557"/>
  <circle cx="460" cy="710" r="5" fill="#A8DADC"/>
  <!-- Rung 18 -->
  <line x1="380" y1="750" x2="420" y2="750" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <!-- Decorative side elements -->
  <rect x="60" y="350" width="60" height="60" fill="#E63946" opacity="0.2" transform="rotate(45,90,380)"/>
  <rect x="680" y="350" width="60" height="60" fill="#1D3557" opacity="0.2" transform="rotate(45,710,380)"/>
  <circle cx="90" cy="200" r="25" fill="#F4D35E" opacity="0.2"/>
  <circle cx="710" cy="600" r="25" fill="#E76F51" opacity="0.2"/>
  <!-- Border -->
  <rect x="6" y="6" width="788" height="788" fill="none" stroke="#000" stroke-width="4"/>
</svg>