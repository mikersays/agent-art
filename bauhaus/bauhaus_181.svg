<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <title>Drawers Open</title>
  <!-- Background -->
  <rect width="800" height="800" fill="#FFF"/>
  <!-- Cabinet body -->
  <rect x="200" y="80" width="400" height="640" fill="#000" stroke="#000" stroke-width="3"/>
  <!-- Cabinet inner face -->
  <rect x="210" y="90" width="380" height="620" fill="#457B9D"/>
  <!-- Top decorative bar -->
  <rect x="200" y="70" width="400" height="20" fill="#6D2E46"/>
  <!-- Bottom base -->
  <rect x="190" y="720" width="420" height="30" fill="#000"/>
  <!-- Left leg -->
  <rect x="210" y="740" width="30" height="40" fill="#000"/>
  <!-- Right leg -->
  <rect x="560" y="740" width="30" height="40" fill="#000"/>
  <!-- Drawer 1 - pulled out far left -->
  <rect x="80" y="100" width="380" height="100" fill="#E63946" stroke="#000" stroke-width="3"/>
  <rect x="90" y="110" width="360" height="80" fill="#F4D35E" opacity="0.5"/>
  <!-- Drawer 1 handle -->
  <circle cx="270" cy="150" r="12" fill="#000"/>
  <!-- Drawer 1 contents: geometric shapes -->
  <circle cx="130" cy="145" r="20" fill="#1D3557"/>
  <rect x="170" y="130" width="30" height="30" fill="#2A9D8F"/>
  <!-- Drawer 2 - pulled out slightly -->
  <rect x="180" y="210" width="420" height="100" fill="#F4D35E" stroke="#000" stroke-width="3"/>
  <rect x="190" y="220" width="400" height="80" fill="#FFF" opacity="0.3"/>
  <!-- Drawer 2 handle -->
  <circle cx="390" cy="260" r="12" fill="#000"/>
  <!-- Drawer 2 contents -->
  <polygon points="520,230 550,280 490,280" fill="#E63946"/>
  <rect x="555" y="235" width="25" height="40" fill="#6D2E46"/>
  <!-- Drawer 3 - pulled out far right -->
  <rect x="320" y="320" width="400" height="100" fill="#2A9D8F" stroke="#000" stroke-width="3"/>
  <rect x="330" y="330" width="380" height="80" fill="#FFF" opacity="0.3"/>
  <!-- Drawer 3 handle -->
  <circle cx="520" cy="370" r="12" fill="#000"/>
  <!-- Drawer 3 contents -->
  <circle cx="620" cy="365" r="18" fill="#F4D35E"/>
  <rect x="655" y="345" width="40" height="40" fill="#1D3557"/>
  <!-- Drawer 4 - closed -->
  <rect x="210" y="430" width="380" height="100" fill="#1D3557" stroke="#000" stroke-width="3"/>
  <!-- Drawer 4 handle -->
  <circle cx="400" cy="480" r="12" fill="#F4D35E"/>
  <!-- Drawer 5 - slightly open -->
  <rect x="190" y="540" width="400" height="100" fill="#6D2E46" stroke="#000" stroke-width="3"/>
  <rect x="200" y="550" width="380" height="80" fill="#FFF" opacity="0.2"/>
  <!-- Drawer 5 handle -->
  <circle cx="390" cy="590" r="12" fill="#F4D35E"/>
  <!-- Drawer 5 contents peeking -->
  <circle cx="230" cy="585" r="15" fill="#2A9D8F"/>
  <!-- Shadow under drawer 1 -->
  <rect x="80" y="195" width="380" height="8" fill="#000" opacity="0.3"/>
  <!-- Shadow under drawer 3 -->
  <rect x="320" y="415" width="400" height="8" fill="#000" opacity="0.3"/>
  <!-- Decorative circles on cabinet top -->
  <circle cx="300" cy="78" r="6" fill="#F4D35E"/>
  <circle cx="400" cy="78" r="6" fill="#F4D35E"/>
  <circle cx="500" cy="78" r="6" fill="#F4D35E"/>
  <!-- Floor line -->
  <line x1="0" y1="780" x2="800" y2="780" stroke="#000" stroke-width="2"/>
  <!-- Scattered geometric contents on floor -->
  <circle cx="120" cy="760" r="10" fill="#E63946"/>
  <rect x="680" y="750" width="20" height="20" fill="#2A9D8F"/>
  <polygon points="150,770 165,745 180,770" fill="#1D3557"/>
</svg>