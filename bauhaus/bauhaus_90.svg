<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#DDA15E"/>

  <!-- Sky -->
  <rect x="0" y="0" width="800" height="300" fill="#1D3557"/>
  <circle cx="650" cy="100" r="40" fill="#F4D35E" opacity="0.8"/>

  <!-- Distant eroded mesa -->
  <polygon points="500,300 520,220 600,200 680,230 700,300" fill="#264653"/>
  <polygon points="530,260 550,230 600,210 650,235 660,260" fill="#6D2E46" opacity="0.5"/>

  <!-- Main cliff face - sharp angular -->
  <polygon points="0,300 0,700 200,700 200,500 250,450 250,380 220,350 180,300" fill="#6D2E46"/>
  <polygon points="180,300 220,350 250,380 300,360 350,300" fill="#264653"/>

  <!-- Terraced steps carved into cliff -->
  <rect x="200" y="500" width="120" height="40" fill="#E63946"/>
  <rect x="220" y="460" width="100" height="40" fill="#E63946" opacity="0.85"/>
  <rect x="250" y="420" width="80" height="40" fill="#6D2E46"/>
  <rect x="250" y="380" width="60" height="40" fill="#264653"/>

  <!-- Second cliff structure -->
  <polygon points="400,300 380,350 380,600 500,700 550,700 550,500 520,400 480,340 450,300" fill="#000000"/>
  <polygon points="450,300 480,340 520,400 550,380 530,320 490,300" fill="#264653"/>

  <!-- Eroded layers visible in cliff face -->
  <rect x="380" y="400" width="170" height="15" fill="#DDA15E" opacity="0.4"/>
  <rect x="380" y="450" width="170" height="10" fill="#F4D35E" opacity="0.3"/>
  <rect x="380" y="500" width="140" height="12" fill="#DDA15E" opacity="0.35"/>

  <!-- Right side eroded formation -->
  <polygon points="620,300 600,380 610,500 650,600 700,700 800,700 800,300" fill="#6D2E46"/>
  <polygon points="620,300 650,330 700,310 750,300" fill="#264653" opacity="0.7"/>

  <!-- Terraced steps right side -->
  <rect x="640" y="420" width="160" height="30" fill="#E63946" opacity="0.7"/>
  <rect x="660" y="460" width="140" height="25" fill="#000000" opacity="0.5"/>
  <rect x="650" y="500" width="150" height="20" fill="#264653" opacity="0.6"/>

  <!-- Scattered debris - fallen rock shapes -->
  <polygon points="300,650 320,630 340,650 330,670 310,670" fill="#000000"/>
  <polygon points="360,680 375,660 395,675 385,695 365,690" fill="#264653"/>
  <rect x="420" y="670" width="25" height="20" fill="#6D2E46" transform="rotate(15,432,680)"/>
  <polygon points="550,660 565,640 580,655 570,675" fill="#000000"/>
  <rect x="270" y="690" width="15" height="12" fill="#000000" transform="rotate(-10,277,696)"/>

  <!-- Small debris particles -->
  <rect x="330" y="700" width="8" height="8" fill="#000000" transform="rotate(30,334,704)"/>
  <rect x="460" y="690" width="10" height="7" fill="#264653" transform="rotate(-20,465,693)"/>
  <rect x="510" y="710" width="6" height="6" fill="#6D2E46"/>
  <rect x="240" y="680" width="12" height="8" fill="#000000" transform="rotate(45,246,684)"/>

  <!-- Ground plane with erosion lines -->
  <line x1="0" y1="700" x2="800" y2="700" stroke="#000000" stroke-width="2"/>
  <line x1="200" y1="710" x2="600" y2="715" stroke="#264653" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="730" x2="700" y2="735" stroke="#000000" stroke-width="1" opacity="0.3"/>

  <!-- Erosion crack lines on cliffs -->
  <line x1="100" y1="350" x2="120" y2="500" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="150" y1="320" x2="160" y2="480" stroke="#DDA15E" stroke-width="1" opacity="0.3"/>
  <line x1="450" y1="340" x2="440" y2="520" stroke="#DDA15E" stroke-width="1" opacity="0.3"/>
  <line x1="700" y1="350" x2="690" y2="500" stroke="#000000" stroke-width="1" opacity="0.3"/>

  <!-- Geometric accent - Bauhaus style -->
  <circle cx="650" cy="100" r="25" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <rect x="30" y="750" width="740" height="4" fill="#000000" opacity="0.2"/>
</svg>