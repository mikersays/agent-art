<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background - dark -->
  <rect width="800" height="800" fill="#1D3557"/>

  <!-- Ground plane subtle lines -->
  <line x1="100" y1="700" x2="700" y2="700" stroke="#457B9D" stroke-width="0.5" opacity="0.15"/>
  <line x1="150" y1="650" x2="650" y2="650" stroke="#457B9D" stroke-width="0.5" opacity="0.1"/>

  <!-- Outer fortress walls -->
  <!-- North wall -->
  <rect x="180" y="180" width="440" height="45" fill="#264653" opacity="0.9"/>
  <!-- South wall -->
  <rect x="180" y="575" width="440" height="45" fill="#264653" opacity="0.9"/>
  <!-- West wall -->
  <rect x="180" y="180" width="45" height="440" fill="#264653" opacity="0.85"/>
  <!-- East wall -->
  <rect x="575" y="180" width="45" height="440" fill="#264653" opacity="0.85"/>

  <!-- Inner wall shadows / depth -->
  <rect x="225" y="225" width="350" height="8" fill="#000000" opacity="0.4"/>
  <rect x="225" y="567" width="350" height="8" fill="#000000" opacity="0.4"/>
  <rect x="225" y="225" width="8" height="350" fill="#000000" opacity="0.4"/>
  <rect x="567" y="225" width="8" height="350" fill="#000000" opacity="0.4"/>

  <!-- Corner towers -->
  <circle cx="195" cy="195" r="40" fill="#000000" opacity="0.8"/>
  <circle cx="195" cy="195" r="32" fill="#264653" opacity="0.9"/>
  <circle cx="195" cy="195" r="12" fill="#457B9D" opacity="0.6"/>

  <circle cx="605" cy="195" r="40" fill="#000000" opacity="0.8"/>
  <circle cx="605" cy="195" r="32" fill="#264653" opacity="0.9"/>
  <circle cx="605" cy="195" r="12" fill="#457B9D" opacity="0.6"/>

  <circle cx="195" cy="605" r="40" fill="#000000" opacity="0.8"/>
  <circle cx="195" cy="605" r="32" fill="#264653" opacity="0.9"/>
  <circle cx="195" cy="605" r="12" fill="#457B9D" opacity="0.6"/>

  <circle cx="605" cy="605" r="40" fill="#000000" opacity="0.8"/>
  <circle cx="605" cy="605" r="32" fill="#264653" opacity="0.9"/>
  <circle cx="605" cy="605" r="12" fill="#457B9D" opacity="0.6"/>

  <!-- Courtyard floor -->
  <rect x="233" y="233" width="334" height="334" fill="#1D3557" opacity="0.5"/>

  <!-- Interior elements - central structure -->
  <rect x="350" y="310" width="100" height="100" fill="#E63946" opacity="0.7"/>
  <rect x="360" y="320" width="80" height="80" fill="#F4D35E" opacity="0.6"/>

  <!-- Inner courtyard shapes -->
  <circle cx="310" cy="320" r="18" fill="#F4D35E" opacity="0.5"/>
  <circle cx="490" cy="480" r="15" fill="#E63946" opacity="0.55"/>
  <rect x="270" y="440" width="35" height="35" fill="#E76F51" opacity="0.4"/>
  <rect x="480" y="290" width="30" height="30" fill="#F4D35E" opacity="0.45"/>

  <!-- Courtyard pathways -->
  <rect x="390" y="233" width="20" height="77" fill="#A89F91" opacity="0.3"/>
  <rect x="390" y="490" width="20" height="85" fill="#A89F91" opacity="0.3"/>
  <rect x="233" y="390" width="117" height="20" fill="#A89F91" opacity="0.3"/>
  <rect x="450" y="390" width="117" height="20" fill="#A89F91" opacity="0.3"/>

  <!-- Gate opening - south wall -->
  <rect x="380" y="575" width="40" height="45" fill="#1D3557" opacity="0.9"/>
  <rect x="385" y="580" width="30" height="40" fill="#000000" opacity="0.5"/>

  <!-- Battlements on north wall -->
  <rect x="240" y="170" width="15" height="15" fill="#264653" opacity="0.7"/>
  <rect x="280" y="170" width="15" height="15" fill="#264653" opacity="0.7"/>
  <rect x="320" y="170" width="15" height="15" fill="#264653" opacity="0.7"/>
  <rect x="360" y="170" width="15" height="15" fill="#264653" opacity="0.7"/>
  <rect x="430" y="170" width="15" height="15" fill="#264653" opacity="0.7"/>
  <rect x="470" y="170" width="15" height="15" fill="#264653" opacity="0.7"/>
  <rect x="510" y="170" width="15" height="15" fill="#264653" opacity="0.7"/>
  <rect x="550" y="170" width="15" height="15" fill="#264653" opacity="0.7"/>

  <!-- Small accent: torches/lights inside -->
  <circle cx="280" cy="300" r="4" fill="#F4D35E" opacity="0.7"/>
  <circle cx="520" cy="500" r="4" fill="#F4D35E" opacity="0.7"/>
  <circle cx="520" cy="300" r="4" fill="#E76F51" opacity="0.6"/>
  <circle cx="280" cy="500" r="4" fill="#E76F51" opacity="0.6"/>
