<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#000000"/>

  <!-- Incoming white beam (left side) -->
  <polygon points="50,370 50,430 300,410 300,390" fill="#FFFFFF"/>
  <!-- Beam glow -->
  <polygon points="50,355 50,445 300,420 300,380" fill="#FFFFFF" opacity="0.15"/>

  <!-- The prism (triangle) -->
  <polygon points="300,200 300,600 520,400" fill="#1D3557" stroke="#FFFFFF" stroke-width="3"/>
  <!-- Prism inner facet highlight -->
  <polygon points="310,230 310,570 500,400" fill="#1D3557" opacity="0.5"/>
  <line x1="300" y1="200" x2="520" y2="400" stroke="#2A9D8F" stroke-width="2" opacity="0.5"/>
  <line x1="300" y1="600" x2="520" y2="400" stroke="#2A9D8F" stroke-width="2" opacity="0.5"/>
  <!-- Prism surface shading -->
  <polygon points="300,250 300,550 380,400" fill="#FFFFFF" opacity="0.08"/>

  <!-- Spectral bands emerging from prism (right side, fanning out) -->
  <!-- Band 1: Red (top) -->
  <polygon points="520,385 750,180 750,210" fill="#E63946"/>
  <!-- Band 2: Orange -->
  <polygon points="520,390 750,215 750,260" fill="#E76F51"/>
  <!-- Band 3: Yellow -->
  <polygon points="520,395 750,265 750,320" fill="#F4D35E"/>
  <!-- Band 4: Teal/Green -->
  <polygon points="520,400 750,325 750,390" fill="#2A9D8F"/>
  <!-- Band 5: Blue -->
  <polygon points="520,405 750,395 750,460" fill="#1D3557"/>
  <!-- Band 6: Deep Blue -->
  <polygon points="520,410 750,465 750,530" fill="#333333"/>
  <!-- Band 7: Red-violet (bottom) -->
  <polygon points="520,415 750,535 750,580" fill="#E63946" opacity="0.7"/>

  <!-- Band glow effects -->
  <polygon points="520,383 750,170 750,185" fill="#E63946" opacity="0.3"/>
  <polygon points="520,417 750,575 750,600" fill="#E63946" opacity="0.2"/>

  <!-- Geometric Bauhaus accents -->
  <!-- Small circles along the beam path -->
  <circle cx="120" cy="400" r="5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="180" cy="400" r="4" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="240" cy="400" r="3" fill="#FFFFFF" opacity="0.4"/>

  <!-- Geometric markers on spectral bands -->
  <circle cx="680" cy="200" r="8" fill="#E63946" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="672" y="240" width="16" height="16" fill="#E76F51" stroke="#FFFFFF" stroke-width="1.5"/>
  <polygon points="680,285 688,300 672,300" fill="#F4D35E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="680" cy="360" r="8" fill="#2A9D8F" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="672" y="425" width="16" height="16" fill="#1D3557" stroke="#FFFFFF" stroke-width="1.5"/>
  <polygon points="680,490 688,505 672,505" fill="#333333" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="680" cy="555" r="8" fill="#E63946" opacity="0.7" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Decorative geometric frame elements -->
  <!-- Top left corner piece -->
  <rect x="30" y="30" width="60" height="4" fill="#E63946"/>
  <rect x="30" y="30" width="4" height="60" fill="#E63946"/>
  <!-- Top right corner piece -->
  <rect x="710" y="30" width="60" height="4" fill="#F4D35E"/>
  <rect x="766" y="30" width="4" height="60" fill="#F4D35E"/>
  <!-- Bottom left corner piece -->
  <rect x="30" y="766" width="60" height="4" fill="#2A9D8F"/>
  <rect x="30" y="710" width="4" height="60" fill="#2A9D8F"/>
  <!-- Bottom right corner piece -->
  <rect x="710" y="766" width="60" height="4" fill="#E76F51"/>
  <rect x="766" y="710" width="4" height="60" fill="#E76F51"/>

  <!-- Additional geometric accents -->
  <!-- Light source circle (left) -->
  <circle cx="50" cy="400" r="18" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="50" cy="400" r="10" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="50" cy="400" r="4" fill="#FFFFFF"/>

  <!-- Bauhaus-style horizontal lines (subtle) -->
  <line x1="30" y1="130" x2="120" y2="130" stroke="#333333" stroke-width="2"/>
  <line x1="30" y1="670" x2="120" y2="670" stroke="#333333" stroke-width="2"/>
  <line x1="680" y1="130" x2="770" y2="130" stroke="#333333" stroke-width="2"/>
  <line x1="680" y1="650" x2="770" y2="650" stroke="#333333" stroke-width="2"/>

  <!-- Small scattered geometric shapes for visual richness -->
  <rect x="100" y="150" width="12" height="12" fill="#F4D35E" opacity="0.4" transform="rotate(45 106 156)"/>
  <rect x="100" y="620" width="12" height="12" fill="#E63946" opacity="0.4" transform="rotate(45 106 626)"/>
  <circle cx="700" cy="700" r="6" fill="#2A9D8F" opacity="0.5"/>
  <circle cx="700" cy="100" r="6" fill="#E76F51" opacity="0.5"/>

  <!-- Prism label line -->
  <line x1="380" y1="620" x2="380" y2="680" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <circle cx="380" cy="690" r="4" fill="#FFFFFF" opacity="0.3"/>

  <!-- Thin spectral lines (extended glow) -->
  <line x1="520" y1="387" x2="760" y2="195" stroke="#E63946" stroke-width="1" opacity="0.4"/>
  <line x1="520" y1="392" x2="760" y2="240" stroke="#E76F51" stroke-width="1" opacity="0.4"/>
  <line x1="520" y1="397" x2="760" y2="295" stroke="#F4D35E" stroke-width="1" opacity="0.4"/>
  <line x1="520" y1="402" x2="760" y2="360" stroke="#2A9D8F" stroke-width="1" opacity="0.4"/>
  <line x1="520" y1="407" x2="760" y2="430" stroke="#1D3557" stroke-width="1" opacity="0.4"/>
  <line x1="520" y1="412" x2="760" y2="500" stroke="#333333" stroke-width="1" opacity="0.4"/>
  <line x1="520" y1="417" x2="760" y2="560" stroke="#E63946" stroke-width="1" opacity="0.3"/>
</svg>