<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Steel blue background -->
  <rect width="800" height="800" fill="#457B9D"/>

  <!-- Subtle radial grid lines from center -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#FFFFFF" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#FFFFFF" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="0" x2="800" y2="800" stroke="#FFFFFF" stroke-width="0.5" opacity="0.06"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#FFFFFF" stroke-width="0.5" opacity="0.06"/>

  <!-- Orbital ellipse 1 - wide red orbit -->
  <ellipse cx="400" cy="400" rx="340" ry="160" fill="none" stroke="#E63946" stroke-width="2" opacity="0.6" transform="rotate(-20, 400, 400)"/>

  <!-- Orbital ellipse 2 - tall blue orbit -->
  <ellipse cx="400" cy="400" rx="140" ry="320" fill="none" stroke="#1D3557" stroke-width="2" opacity="0.55" transform="rotate(15, 400, 400)"/>

  <!-- Orbital ellipse 3 - yellow orbit, medium -->
  <ellipse cx="400" cy="400" rx="280" ry="200" fill="none" stroke="#F4D35E" stroke-width="2.5" opacity="0.65" transform="rotate(50, 400, 400)"/>

  <!-- Orbital ellipse 4 - teal, tight -->
  <ellipse cx="400" cy="400" rx="220" ry="100" fill="none" stroke="#2A9D8F" stroke-width="1.5" opacity="0.5" transform="rotate(-55, 400, 400)"/>

  <!-- Orbital ellipse 5 - cream, wide and flat -->
  <ellipse cx="400" cy="400" rx="360" ry="90" fill="none" stroke="#FEFAE0" stroke-width="1.5" opacity="0.35" transform="rotate(80, 400, 400)"/>

  <!-- Orbital ellipse 6 - orange, medium eccentricity -->
  <ellipse cx="400" cy="400" rx="260" ry="170" fill="none" stroke="#E76F51" stroke-width="1.5" opacity="0.45" transform="rotate(-75, 400, 400)"/>

  <!-- Central black circle (sun) -->
  <circle cx="400" cy="400" r="60" fill="#000000" opacity="0.95"/>
  <circle cx="400" cy="400" r="62" fill="none" stroke="#F4D35E" stroke-width="1.5" opacity="0.5"/>

  <!-- Planets along red orbit (rotation -20) -->
  <circle cx="740" cy="400" r="12" fill="#E63946" opacity="0.85" transform="rotate(-20, 400, 400)"/>
  <circle cx="60" cy="400" r="9" fill="#E63946" opacity="0.7" transform="rotate(-20, 400, 400)"/>
  <circle cx="540" cy="253" r="7" fill="#FEFAE0" opacity="0.8" transform="rotate(-20, 400, 400)"/>

  <!-- Planets along blue orbit (rotation 15) -->
  <circle cx="400" cy="80" r="14" fill="#1D3557" opacity="0.85" transform="rotate(15, 400, 400)"/>
  <circle cx="400" cy="720" r="10" fill="#A8DADC" opacity="0.75" transform="rotate(15, 400, 400)"/>
  <circle cx="327" cy="160" r="6" fill="#FFFFFF" opacity="0.7" transform="rotate(15, 400, 400)"/>

  <!-- Planets along yellow orbit (rotation 50) -->
  <circle cx="680" cy="400" r="11" fill="#F4D35E" opacity="0.8" transform="rotate(50, 400, 400)"/>
  <circle cx="120" cy="400" r="8" fill="#E9C46A" opacity="0.7" transform="rotate(50, 400, 400)"/>
  <circle cx="520" cy="220" r="6" fill="#F4D35E" opacity="0.65" transform="rotate(50, 400, 400)"/>

  <!-- Planets along teal orbit (rotation -55) -->
  <circle cx="620" cy="400" r="9" fill="#2A9D8F" opacity="0.8" transform="rotate(-55, 400, 400)"/>
  <circle cx="180" cy="400" r="7" fill="#2A9D8F" opacity="0.65" transform="rotate(-55, 400, 400)"/>

  <!-- Planets along orange orbit (rotation -75) -->
  <circle cx="660" cy="400" r="8" fill="#E76F51" opacity="0.75" transform="rotate(-75, 400, 400)"/>
  <circle cx="260" cy="320" r="5" fill="#DDA15E" opacity="0.6" transform="rotate(-75, 400, 400)"/>

  <!-- Small distant stars/dots -->
  <circle cx="80" cy="80" r="3" fill="#FEFAE0" opacity="0.4"/>
  <circle cx="720" cy="120" r="2" fill="#FEFAE0" opacity="0.35"/>
  <circle cx="150" cy="680" r="2.5" fill="#FEFAE0" opacity="0.3"/>
  <circle cx="700" cy="700" r="3" fill="#FEFAE0" opacity="0.4"/>
  <circle cx="50" cy="400" r="2" fill="#FEFAE0" opacity="0.25"/>
  <circle cx="750" cy="500" r="2" fill="#FEFAE0" opacity="0.3"/>
  <circle cx="300" cy="50" r="2" fill="#FEFAE0" opacity="0.3"/>
  <circle cx="600" cy="750" r="2.5" fill="#FEFAE0" opacity="0.35"/>

  <!-- Corner accent rectangles -->
  <rect x="20" y="20" width="40" height="4" fill="#E63946" opacity="0.5"/>
  <rect x="20" y="30" width="25" height="4" fill="#F4D35E" opacity="0.4"/>
  <rect x="740" y="770" width="40" height="4" fill="#2A9D8F" opacity="0.5"/>
  <rect x="755" y="760" width="25" height="4" fill="#E76F51" opacity="0.4"/>
</svg>