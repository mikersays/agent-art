<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Background grid structure -->
  <line x1="0" y1="160" x2="800" y2="160" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="480" x2="800" y2="480" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="640" x2="800" y2="640" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="160" y1="0" x2="160" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="320" y1="0" x2="320" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="480" y1="0" x2="480" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="640" y1="0" x2="640" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>

  <!-- Large diagonal lines for dynamic tension -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="2" opacity="0.12"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#000000" stroke-width="2" opacity="0.12"/>
  <line x1="0" y1="400" x2="800" y2="200" stroke="#1D3557" stroke-width="1.5" opacity="0.15"/>
  <line x1="0" y1="600" x2="800" y2="400" stroke="#264653" stroke-width="1" opacity="0.1"/>

  <!-- Overlapping rectangles - background layer -->
  <rect x="50" y="100" width="250" height="180" fill="#1D3557" opacity="0.25"/>
  <rect x="500" y="80" width="220" height="160" fill="#264653" opacity="0.2"/>
  <rect x="100" y="500" width="200" height="250" fill="#457B9D" opacity="0.15"/>
  <rect x="550" y="520" width="200" height="230" fill="#6D2E46" opacity="0.2"/>

  <!-- Concentric circles - focal point off-center (slightly right and up) -->
  <circle cx="460" cy="340" r="180" fill="#1D3557" opacity="0.12"/>
  <circle cx="460" cy="340" r="150" fill="#E63946" opacity="0.15"/>
  <circle cx="460" cy="340" r="120" fill="#F4D35E" opacity="0.18"/>
  <circle cx="460" cy="340" r="90" fill="#2A9D8F" opacity="0.22"/>
  <circle cx="460" cy="340" r="60" fill="#E63946" opacity="0.35"/>
  <circle cx="460" cy="340" r="35" fill="#1D3557" opacity="0.6"/>
  <circle cx="460" cy="340" r="15" fill="#F4D35E" opacity="0.8"/>

  <!-- Concentric circle outlines -->
  <circle cx="460" cy="340" r="180" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <circle cx="460" cy="340" r="120" fill="none" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <circle cx="460" cy="340" r="60" fill="none" stroke="#000000" stroke-width="1" opacity="0.2"/>

  <!-- Bold overlapping rectangles - mid layer -->
  <rect x="150" y="250" width="160" height="90" fill="#E63946" opacity="0.6"/>
  <rect x="200" y="200" width="120" height="70" fill="#F4D35E" opacity="0.5"/>
  <rect x="580" y="300" width="140" height="100" fill="#E76F51" opacity="0.45"/>
  <rect x="80" y="420" width="180" height="60" fill="#2A9D8F" opacity="0.4"/>
  <rect x="350" y="550" width="160" height="80" fill="#1D3557" opacity="0.55"/>

  <!-- Arc paths -->
  <path d="M 100 400 A 150 150 0 0 1 250 250" fill="none" stroke="#E63946" stroke-width="3" opacity="0.5"/>
  <path d="M 600 200 A 120 120 0 0 1 720 320" fill="none" stroke="#F4D35E" stroke-width="2.5" opacity="0.45"/>
  <path d="M 200 700 A 200 200 0 0 1 400 500" fill="none" stroke="#2A9D8F" stroke-width="2" opacity="0.4"/>
  <path d="M 500 600 A 100 100 0 0 0 700 600" fill="none" stroke="#6D2E46" stroke-width="2.5" opacity="0.5"/>

  <!-- Horizontal and vertical bars for rhythm -->
  <rect x="0" y="150" width="120" height="8" fill="#E63946" opacity="0.7"/>
  <rect x="680" y="450" width="120" height="8" fill="#F4D35E" opacity="0.65"/>
  <rect x="320" y="0" width="8" height="100" fill="#2A9D8F" opacity="0.6"/>
  <rect x="600" y="700" width="8" height="100" fill="#E76F51" opacity="0.55"/>
  <rect x="0" y="620" width="80" height="6" fill="#457B9D" opacity="0.5"/>
  <rect x="720" y="180" width="80" height="6" fill="#DDA15E" opacity="0.5"/>

  <!-- Scattered triangles -->
  <polygon points="120,600 150,550 180,600" fill="#F4D35E" opacity="0.6"/>
  <polygon points="650,150 680,100 710,150" fill="#E63946" opacity="0.55"/>
  <polygon points="350,700 370,660 390,700" fill="#2A9D8F" opacity="0.5"/>
  <polygon points="70,300 90,260 110,300" fill="#E76F51" opacity="0.45"/>
  <polygon points="700,500 730,460 760,500" fill="#1D3557" opacity="0.5"/>
  <polygon points="500,100 520,65 540,100" fill="#6D2E46" opacity="0.5"/>
  <polygon points="250,480 265,450 280,480" fill="#DDA15E" opacity="0.45"/>

  <!-- Small scattered shapes for visual texture -->
  <circle cx="100" cy="180" r="8" fill="#E63946" opacity="0.5"/>
  <circle cx="700" cy="650" r="10" fill="#F4D35E" opacity="0.55"/>
  <circle cx="300" cy="650" r="6" fill="#2A9D8F" opacity="0.45"/>
  <circle cx="650" cy="400" r="7" fill="#E76F51" opacity="0.4"/>
  <rect x="720" y="250" width="12" height="12" fill="#A8DADC" opacity="0.5"/>
  <rect x="60" y="500" width="15" height="15" fill="#E9C46A" opacity="0.45"/>
  <rect x="400" y="130" width="10" height="10" fill="#DDA15E" opacity="0.4"/>
  <circle cx="180" cy="750" r="5" fill="#6D2E46" opacity="0.4"/>
  <circle cx="550" cy="680" r="9" fill="#A89F91" opacity="0.5"/>

  <!-- Accent lines for structure -->
  <line x1="300" y1="340" x2="380" y2="340" stroke="#000000" stroke-width="2" opacity="0.3"/>
  <line x1="540" y1="340" x2="620" y2="340" stroke="#000000" stroke-width="2" opacity="0.3"/>
  <line x1="460" y1="180" x2="460" y2="260" stroke="#000000" stroke-width="1.5" opacity="0.25"/>
  <line x1="460" y1="420" x2="460" y2="500" stroke="#000000" stroke-width="1.5" opacity="0.25"/>

  <!-- Corner accent shapes -->
  <rect x="15" y="15" width="22" height="22" fill="#000000" opacity="0.3"/>
  <rect x="763" y="15" width="22" height="22" fill="#E63946" opacity="0.3"/>
  <circle cx="26" cy="774" r="11" fill="#1D3557" opacity="0.3"/>
  <circle cx="774" cy="774" r="11" fill="#F4D35E" opacity="0.3"/>

  <!-- Final bold accent - large semi-transparent overlay rectangle -->
  <rect x="380" y="280" width="160" height="120" fill="none" stroke="#000000" stroke-width="2.5" opacity="0.35"/>
</svg>