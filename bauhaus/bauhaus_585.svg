<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle background grid -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>

  <!-- Main vertical support column -->
  <rect x="100" y="60" width="40" height="700" fill="#1D3557" opacity="0.9"/>
  <!-- Column base -->
  <rect x="70" y="730" width="100" height="30" fill="#000000" opacity="0.85"/>
  <!-- Column cap -->
  <rect x="80" y="45" width="80" height="20" fill="#000000" opacity="0.75"/>

  <!-- Beam 1 - top, longest -->
  <rect x="140" y="120" width="520" height="22" fill="#457B9D" opacity="0.9"/>
  <!-- Diagonal support -->
  <line x1="140" y1="142" x2="200" y2="200" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <!-- Hanging circle -->
  <line x1="650" y1="142" x2="650" y2="195" stroke="#000000" stroke-width="1.5"/>
  <circle cx="650" cy="215" r="22" fill="#E63946" opacity="0.9"/>

  <!-- Beam 2 -->
  <rect x="140" y="230" width="400" height="20" fill="#457B9D" opacity="0.85"/>
  <line x1="140" y1="250" x2="190" y2="300" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="530" y1="250" x2="530" y2="300" stroke="#000000" stroke-width="1.5"/>
  <circle cx="530" cy="320" r="20" fill="#F4D35E" opacity="0.9"/>

  <!-- Beam 3 - shorter -->
  <rect x="140" y="340" width="300" height="18" fill="#457B9D" opacity="0.8"/>
  <line x1="140" y1="358" x2="185" y2="405" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="430" y1="358" x2="430" y2="400" stroke="#000000" stroke-width="1.5"/>
  <circle cx="430" cy="420" r="18" fill="#E63946" opacity="0.85"/>

  <!-- Beam 4 - medium -->
  <rect x="140" y="440" width="450" height="20" fill="#457B9D" opacity="0.85"/>
  <line x1="140" y1="460" x2="195" y2="510" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="580" y1="460" x2="580" y2="510" stroke="#000000" stroke-width="1.5"/>
  <circle cx="580" cy="530" r="20" fill="#F4D35E" opacity="0.85"/>

  <!-- Beam 5 - shortest -->
  <rect x="140" y="550" width="220" height="16" fill="#457B9D" opacity="0.75"/>
  <line x1="140" y1="566" x2="180" y2="610" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="350" y1="566" x2="350" y2="605" stroke="#000000" stroke-width="1.5"/>
  <circle cx="350" cy="622" r="16" fill="#E63946" opacity="0.8"/>

  <!-- Beam 6 - low, medium-long -->
  <rect x="140" y="660" width="380" height="18" fill="#457B9D" opacity="0.8"/>
  <line x1="140" y1="678" x2="180" y2="720" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="510" y1="678" x2="510" y2="715" stroke="#000000" stroke-width="1.5"/>
  <circle cx="510" cy="732" r="18" fill="#F4D35E" opacity="0.85"/>

  <!-- Additional counterweight circles on top of beams -->
  <circle cx="300" cy="120" r="10" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="400" cy="230" r="8" fill="#E76F51" opacity="0.5"/>
  <circle cx="250" cy="440" r="9" fill="#E9C46A" opacity="0.5"/>

  <!-- Small accent shapes -->
  <rect x="680" y="100" width="14" height="14" fill="#E63946" opacity="0.25" transform="rotate(45 687 107)"/>
  <rect x="480" y="540" width="12" height="12" fill="#1D3557" opacity="0.2" transform="rotate(45 486 546)"/>
  <circle cx="700" cy="400" r="5" fill="#A89F91" opacity="0.3"/>
  <circle cx="250" cy="700" r="4" fill="#E76F51" opacity="0.3"/>

  <!-- Shadow/ground line -->
  <line x1="60" y1="760" x2="700" y2="760" stroke="#000000" stroke-width="1" opacity="0.2"/>

  <!-- Corner accents -->
  <rect x="740" y="40" width="20" height="20" fill="#000000" opacity="0.08"/>
  <rect x="740" y="740" width="20" height="20" fill="#000000" opacity="0.08"/>
</svg>