<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#000"/>
  <!-- Prism Rainbow - White beam entering triangle, splitting into colored beams -->
  <!-- Background subtle grid -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#FFF" stroke-width="0.3" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#FFF" stroke-width="0.3" opacity="0.1"/>
  <!-- Incoming white beam (from the left) -->
  <polygon points="30,385 30,415 350,405 350,395" fill="#FFF" opacity="0.95"/>
  <!-- Beam glow -->
  <polygon points="30,378 30,422 350,410 350,390" fill="#FFF" opacity="0.15"/>
  <!-- The Prism - large triangle -->
  <polygon points="400,180 280,580 520,580" fill="none" stroke="#FFF" stroke-width="3"/>
  <polygon points="400,180 280,580 520,580" fill="#1D3557" opacity="0.6"/>
  <!-- Prism internal refraction hint -->
  <line x1="350" y1="395" x2="460" y2="340" stroke="#FFF" stroke-width="1" opacity="0.2"/>
  <line x1="350" y1="405" x2="460" y2="480" stroke="#FFF" stroke-width="1" opacity="0.2"/>
  <!-- Prism highlight edge -->
  <line x1="400" y1="185" x2="283" y2="575" stroke="#FFF" stroke-width="1" opacity="0.3"/>
  <!-- 7 diverging colored beams from right face of prism -->
  <!-- Beam 1 - Red (top) -->
  <polygon points="460,320 770,80 770,110 460,330" fill="#E63946" opacity="0.9"/>
  <!-- Beam 2 - Orange -->
  <polygon points="465,345 770,140 770,170 465,355" fill="#E9C46A" opacity="0.85"/>
  <!-- Beam 3 - Yellow -->
  <polygon points="470,370 770,210 770,240 470,380" fill="#F4D35E" opacity="0.9"/>
  <!-- Beam 4 - Green -->
  <polygon points="475,395 770,290 770,320 475,405" fill="#264653" opacity="0.9"/>
  <!-- Beam 5 - Blue -->
  <polygon points="478,420 770,380 770,410 478,430" fill="#1D3557" opacity="0.9"/>
  <!-- Beam 6 - Indigo -->
  <polygon points="480,445 770,470 770,500 480,455" fill="#1D3557" opacity="0.7"/>
  <!-- Beam 7 - Violet -->
  <polygon points="482,468 770,570 770,600 482,478" fill="#E63946" opacity="0.5"/>
  <!-- Beam edge glow effects -->
  <line x1="460" y1="325" x2="770" y2="95" stroke="#E63946" stroke-width="1" opacity="0.5"/>
  <line x1="470" y1="375" x2="770" y2="225" stroke="#F4D35E" stroke-width="1" opacity="0.5"/>
  <line x1="475" y1="400" x2="770" y2="305" stroke="#264653" stroke-width="1" opacity="0.4"/>
  <line x1="480" y1="450" x2="770" y2="485" stroke="#1D3557" stroke-width="1" opacity="0.4"/>
  <!-- Prism face shading -->
  <polygon points="400,180 520,580 280,580" fill="#FFF" opacity="0.03"/>
  <polygon points="400,185 515,575 405,575" fill="#FFF" opacity="0.04"/>
  <!-- Entry point marker on prism -->
  <circle cx="350" cy="400" r="3" fill="#FFF" opacity="0.6"/>
  <!-- Exit point marker on prism -->
  <circle cx="472" cy="400" r="3" fill="#FFF" opacity="0.6"/>
  <!-- Text label - Bauhaus style -->
  <text x="400" y="760" font-family="sans-serif" font-size="16" fill="#A89F91" text-anchor="middle" letter-spacing="8">PRISM</text>
  <!-- Corner decorations -->
  <rect x="20" y="20" width="30" height="3" fill="#A89F91" opacity="0.5"/>
  <rect x="20" y="20" width="3" height="30" fill="#A89F91" opacity="0.5"/>
  <rect x="750" y="20" width="30" height="3" fill="#A89F91" opacity="0.5"/>
  <rect x="777" y="20" width="3" height="30" fill="#A89F91" opacity="0.5"/>
  <rect x="20" y="777" width="30" height="3" fill="#A89F91" opacity="0.5"/>
  <rect x="20" y="750" width="3" height="30" fill="#A89F91" opacity="0.5"/>
  <rect x="750" y="777" width="30" height="3" fill="#A89F91" opacity="0.5"/>
  <rect x="777" y="750" width="3" height="30" fill="#A89F91" opacity="0.5"/>
</svg>