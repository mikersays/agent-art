<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background: White -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>
  <!-- Peripheral warm gray shapes -->
  <rect x="10" y="10" width="60" height="25" fill="#A89F91" opacity="0.3" transform="rotate(-15,40,22)"/>
  <rect x="730" y="20" width="50" height="20" fill="#A89F91" opacity="0.25" transform="rotate(20,755,30)"/>
  <rect x="5" y="750" width="55" height="22" fill="#A89F91" opacity="0.28"/>
  <rect x="740" y="760" width="45" height="18" fill="#A89F91" opacity="0.3" transform="rotate(-10,762,769)"/>
  <circle cx="50" cy="400" r="20" fill="#A89F91" opacity="0.2"/>
  <circle cx="750" cy="400" r="18" fill="#A89F91" opacity="0.22"/>
  <!-- Radiating lines from center point (380, 440) -->
  <line x1="380" y1="440" x2="780" y2="100" stroke="#E63946" stroke-width="2" opacity="0.5"/>
  <line x1="380" y1="440" x2="750" y2="300" stroke="#F4D35E" stroke-width="1.5" opacity="0.45"/>
  <line x1="380" y1="440" x2="700" y2="440" stroke="#E76F51" stroke-width="2.5" opacity="0.55"/>
  <line x1="380" y1="440" x2="750" y2="600" stroke="#E63946" stroke-width="1" opacity="0.35"/>
  <line x1="380" y1="440" x2="600" y2="100" stroke="#F4D35E" stroke-width="1.5" opacity="0.4"/>
  <line x1="380" y1="440" x2="20" y2="700" stroke="#1D3557" stroke-width="2" opacity="0.5"/>
  <line x1="380" y1="440" x2="100" y2="750" stroke="#2A9D8F" stroke-width="1.5" opacity="0.45"/>
  <line x1="380" y1="440" x2="50" y2="500" stroke="#264653" stroke-width="2" opacity="0.5"/>
  <line x1="380" y1="440" x2="100" y2="200" stroke="#1D3557" stroke-width="1.5" opacity="0.4"/>
  <line x1="380" y1="440" x2="200" y2="50" stroke="#264653" stroke-width="1" opacity="0.35"/>
  <!-- Shapes radiating RIGHT/UP: Red, Yellow, Orange -->
  <!-- Near center (strong opacity) -->
  <polygon points="420,410 460,390 445,430" fill="#E63946" opacity="0.9"/>
  <rect x="440" y="380" width="35" height="20" fill="#F4D35E" opacity="0.85" transform="rotate(-25,457,390)"/>
  <polygon points="410,400 430,360 450,400" fill="#E76F51" opacity="0.88"/>
  <rect x="430" y="430" width="30" height="18" fill="#E63946" opacity="0.82" transform="rotate(15,445,439)"/>
  <!-- Mid distance -->
  <polygon points="520,320 560,290 550,340" fill="#F4D35E" opacity="0.7"/>
  <rect x="540" y="350" width="40" height="22" fill="#E63946" opacity="0.65" transform="rotate(-35,560,361)"/>
  <circle cx="580" cy="280" r="18" fill="#E76F51" opacity="0.6"/>
  <polygon points="500,250 530,220 540,260" fill="#F4D35E" opacity="0.55"/>
  <rect x="560" y="400" width="35" height="20" fill="#E63946" opacity="0.5" transform="rotate(20,577,410)"/>
  <!-- Far distance -->
  <polygon points="650,200 680,170 675,215" fill="#E63946" opacity="0.35"/>
  <rect x="660" y="300" width="30" height="15" fill="#F4D35E" opacity="0.3" transform="rotate(-40,675,307)"/>
  <circle cx="700" cy="220" r="12" fill="#E76F51" opacity="0.28"/>
  <polygon points="620,140 645,110 650,150" fill="#F4D35E" opacity="0.25"/>
  <!-- Shapes radiating LEFT/DOWN: Blue, Teal, Forest -->
  <!-- Near center -->
  <polygon points="340,470 300,490 315,450" fill="#1D3557" opacity="0.9"/>
  <rect x="300" y="460" width="35" height="20" fill="#2A9D8F" opacity="0.85" transform="rotate(25,317,470)"/>
  <polygon points="350,480 330,520 310,480" fill="#264653" opacity="0.88"/>
  <rect x="320" y="420" width="28" height="18" fill="#1D3557" opacity="0.82" transform="rotate(-15,334,429)"/>
  <!-- Mid distance -->
  <polygon points="240,550 200,580 215,540" fill="#2A9D8F" opacity="0.65"/>
  <rect x="220" y="520" width="38" height="22" fill="#1D3557" opacity="0.6" transform="rotate(30,239,531)"/>
  <circle cx="180" cy="580" r="20" fill="#264653" opacity="0.55"/>
  <polygon points="260,580 240,620 280,620" fill="#2A9D8F" opacity="0.5"/>
  <rect x="250" y="490" width="30" height="18" fill="#264653" opacity="0.5" transform="rotate(-20,265,499)"/>
  <!-- Far distance -->
  <polygon points="120,660 90,690 105,650" fill="#1D3557" opacity="0.35"/>
  <rect x="100" y="620" width="28" height="14" fill="#2A9D8F" opacity="0.3" transform="rotate(35,114,627)"/>
  <circle cx="80" cy="680" r="14" fill="#264653" opacity="0.28"/>
  <polygon points="150,710 125,740 140,700" fill="#1D3557" opacity="0.25"/>
  <!-- Black center point -->
  <circle cx="380" cy="440" r="12" fill="#000000"/>
  <circle cx="380" cy="440" r="6" fill="#000000"/>
  <circle cx="380" cy="440" r="20" fill="none" stroke="#000000" stroke-width="2" opacity="0.5"/>
</svg>