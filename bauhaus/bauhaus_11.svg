<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Weaving Pattern - Interlocking rectangular strips inspired by Bauhaus textile design -->

  <!-- Horizontal strips (weft) -->
  <rect x="0" y="0" width="800" height="80" fill="#E63946" opacity="0.9"/>
  <rect x="0" y="160" width="800" height="80" fill="#1D3557" opacity="0.9"/>
  <rect x="0" y="320" width="800" height="80" fill="#F4D35E" opacity="0.9"/>
  <rect x="0" y="480" width="800" height="80" fill="#E76F51" opacity="0.9"/>
  <rect x="0" y="640" width="800" height="80" fill="#457B9D" opacity="0.9"/>

  <!-- Vertical strips (warp) - these weave over and under -->
  <!-- Column 1 - over row1, under row2, over row3, under row4, over row5 -->
  <rect x="0" y="0" width="80" height="80" fill="#000000"/>
  <rect x="0" y="240" width="80" height="80" fill="#A89F91"/>
  <rect x="0" y="320" width="80" height="80" fill="#000000"/>
  <rect x="0" y="560" width="80" height="80" fill="#A89F91"/>
  <rect x="0" y="640" width="80" height="80" fill="#000000"/>
  <rect x="0" y="80" width="80" height="80" fill="#A89F91"/>
  <rect x="0" y="400" width="80" height="80" fill="#000000"/>
  <rect x="0" y="720" width="80" height="80" fill="#A89F91"/>

  <!-- Column 2 - under row1, over row2, under row3, over row4, under row5 -->
  <rect x="160" y="80" width="80" height="80" fill="#F4D35E"/>
  <rect x="160" y="160" width="80" height="80" fill="#E63946"/>
  <rect x="160" y="240" width="80" height="80" fill="#F4D35E"/>
  <rect x="160" y="400" width="80" height="80" fill="#E63946"/>
  <rect x="160" y="480" width="80" height="80" fill="#F4D35E"/>
  <rect x="160" y="560" width="80" height="80" fill="#E63946"/>
  <rect x="160" y="720" width="80" height="80" fill="#F4D35E"/>

  <!-- Column 3 - same as column 1 pattern -->
  <rect x="320" y="0" width="80" height="80" fill="#457B9D"/>
  <rect x="320" y="80" width="80" height="80" fill="#1D3557"/>
  <rect x="320" y="240" width="80" height="80" fill="#1D3557"/>
  <rect x="320" y="320" width="80" height="80" fill="#457B9D"/>
  <rect x="320" y="400" width="80" height="80" fill="#1D3557"/>
  <rect x="320" y="560" width="80" height="80" fill="#1D3557"/>
  <rect x="320" y="640" width="80" height="80" fill="#457B9D"/>
  <rect x="320" y="720" width="80" height="80" fill="#1D3557"/>

  <!-- Column 4 - same as column 2 pattern -->
  <rect x="480" y="80" width="80" height="80" fill="#E76F51"/>
  <rect x="480" y="160" width="80" height="80" fill="#000000"/>
  <rect x="480" y="240" width="80" height="80" fill="#E76F51"/>
  <rect x="480" y="400" width="80" height="80" fill="#000000"/>
  <rect x="480" y="480" width="80" height="80" fill="#E76F51"/>
  <rect x="480" y="560" width="80" height="80" fill="#000000"/>
  <rect x="480" y="720" width="80" height="80" fill="#E76F51"/>

  <!-- Column 5 - same as column 1 pattern -->
  <rect x="640" y="0" width="80" height="80" fill="#E63946"/>
  <rect x="640" y="80" width="80" height="80" fill="#F4D35E"/>
  <rect x="640" y="240" width="80" height="80" fill="#F4D35E"/>
  <rect x="640" y="320" width="80" height="80" fill="#E63946"/>
  <rect x="640" y="400" width="80" height="80" fill="#F4D35E"/>
  <rect x="640" y="560" width="80" height="80" fill="#F4D35E"/>
  <rect x="640" y="640" width="80" height="80" fill="#E63946"/>
  <rect x="640" y="720" width="80" height="80" fill="#F4D35E"/>

  <!-- Thin accent lines to define weave structure -->
  <line x1="80" y1="0" x2="80" y2="800" stroke="#000000" stroke-width="2"/>
  <line x1="160" y1="0" x2="160" y2="800" stroke="#000000" stroke-width="2"/>
  <line x1="240" y1="0" x2="240" y2="800" stroke="#000000" stroke-width="2"/>
  <line x1="320" y1="0" x2="320" y2="800" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="2"/>
  <line x1="480" y1="0" x2="480" y2="800" stroke="#000000" stroke-width="2"/>
  <line x1="560" y1="0" x2="560" y2="800" stroke="#000000" stroke-width="2"/>
  <line x1="640" y1="0" x2="640" y2="800" stroke="#000000" stroke-width="2"/>
  <line x1="720" y1="0" x2="720" y2="800" stroke="#000000" stroke-width="2"/>

  <line x1="0" y1="80" x2="800" y2="80" stroke="#000000" stroke-width="2"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="#000000" stroke-width="2"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="#000000" stroke-width="2"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#000000" stroke-width="2"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="2"/>
  <line x1="0" y1="480" x2="800" y2="480" stroke="#000000" stroke-width="2"/>
  <line x1="0" y1="560" x2="800" y2="560" stroke="#000000" stroke-width="2"/>
  <line x1="0" y1="640" x2="800" y2="640" stroke="#000000" stroke-width="2"/>
  <line x1="0" y1="720" x2="800" y2="720" stroke="#000000" stroke-width="2"/>

  <!-- Additional weave texture squares for richness -->
  <rect x="80" y="80" width="80" height="80" fill="#FFFFFF" opacity="0.3"/>
  <rect x="240" y="0" width="80" height="80" fill="#A89F91" opacity="0.5"/>
  <rect x="400" y="160" width="80" height="80" fill="#F4D35E" opacity="0.4"/>
  <rect x="560" y="320" width="80" height="80" fill="#E63946" opacity="0.4"/>
  <rect x="720" y="480" width="80" height="80" fill="#1D3557" opacity="0.5"/>
  <rect x="400" y="640" width="80" height="80" fill="#E76F51" opacity="0.4"/>
  <rect x="240" y="480" width="80" height="80" fill="#457B9D" opacity="0.5"/>
  <rect x="560" y="80" width="80" height="80" fill="#000000" opacity="0.3"/>
  <rect x="720" y="240" width="80" height="80" fill="#A89F91" opacity="0.6"/>
  <rect x="720" y="720" width="80" height="80" fill="#F4D35E" opacity="0.5"/>
</svg>