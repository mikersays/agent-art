<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Photomontage Abstract</title>
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Background subtle grid -->
  <line x1="200" y1="0" x2="200" y2="800" stroke="#333333" stroke-width="0.5" opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#333333" stroke-width="0.5" opacity="0.15"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#333333" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#333333" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#333333" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#333333" stroke-width="0.5" opacity="0.15"/>

  <!-- Layer 1: Large background shapes -->
  <rect x="50" y="80" width="350" height="280" fill="#1D3557" opacity="0.35" transform="rotate(5 225 220)"/>
  <circle cx="580" cy="200" r="170" fill="#E63946" opacity="0.3"/>
  <rect x="400" y="350" width="320" height="250" fill="#F4D35E" opacity="0.4" transform="rotate(-8 560 475)"/>
  <polygon points="100,500 300,400 250,650" fill="#2A9D8F" opacity="0.35"/>

  <!-- Layer 2: Mid-ground overlapping shapes -->
  <rect x="180" y="150" width="250" height="200" fill="#E63946" opacity="0.45" transform="rotate(-12 305 250)"/>
  <circle cx="350" cy="450" r="130" fill="#1D3557" opacity="0.4"/>
  <rect x="450" y="120" width="200" height="320" fill="#2A9D8F" opacity="0.3" transform="rotate(15 550 280)"/>
  <polygon points="500,500 700,420 650,650 480,600" fill="#000000" opacity="0.25"/>
  <ellipse cx="250" cy="600" rx="180" ry="100" fill="#E9C46A" opacity="0.45" transform="rotate(20 250 600)"/>

  <!-- Layer 3: Foreground sharp elements -->
  <rect x="300" y="280" width="180" height="180" fill="#F4D35E" opacity="0.55" transform="rotate(22 390 370)"/>
  <circle cx="200" cy="300" r="80" fill="#E9C46A" opacity="0.5"/>
  <polygon points="550,300 680,350 620,500 510,450" fill="#E63946" opacity="0.5" transform="rotate(-5 590 400)"/>
  <rect x="100" y="400" width="150" height="250" fill="#333333" opacity="0.3" transform="rotate(10 175 525)"/>
  <circle cx="600" cy="600" r="100" fill="#F4D35E" opacity="0.45"/>

  <!-- Layer 4: Small accent shapes -->
  <circle cx="450" cy="200" r="40" fill="#000000" opacity="0.6"/>
  <rect x="320" y="550" width="80" height="80" fill="#E63946" opacity="0.65" transform="rotate(30 360 590)"/>
  <polygon points="150,150 200,100 220,180" fill="#000000" opacity="0.5"/>
  <circle cx="680" cy="150" r="35" fill="#1D3557" opacity="0.7"/>
  <rect x="550" y="550" width="60" height="120" fill="#2A9D8F" opacity="0.55" transform="rotate(-20 580 610)"/>
  <circle cx="400" cy="700" r="50" fill="#1D3557" opacity="0.5"/>

  <!-- Layer 5: Fine detail lines and tiny shapes -->
  <line x1="100" y1="100" x2="700" y2="300" stroke="#000000" stroke-width="2" opacity="0.3"/>
  <line x1="200" y1="700" x2="650" y2="200" stroke="#E63946" stroke-width="3" opacity="0.35"/>
  <line x1="50" y1="500" x2="750" y2="450" stroke="#1D3557" stroke-width="2" opacity="0.25"/>
  <circle cx="350" cy="350" r="15" fill="#FFFFFF" opacity="0.7" stroke="#000000" stroke-width="2"/>
  <rect x="620" y="680" width="40" height="40" fill="#E63946" opacity="0.7" transform="rotate(45 640 700)"/>
  <polygon points="700,700 750,680 730,740" fill="#000000" opacity="0.6"/>
</svg>