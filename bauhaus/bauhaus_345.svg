<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background for all quadrants -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Quadrant boundary lines -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="2"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="2"/>
  <!-- TOP-LEFT: One large red circle dominating -->
  <circle cx="200" cy="200" r="120" fill="#E63946" opacity="0.75"/>
  <circle cx="200" cy="200" r="80" fill="#E63946" opacity="0.3"/>
  <circle cx="200" cy="200" r="40" fill="#F4D35E" opacity="0.5"/>
  <line x1="50" y1="50" x2="350" y2="50" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <line x1="50" y1="350" x2="350" y2="350" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <rect x="30" y="30" width="20" height="20" fill="#264653" opacity="0.4"/>
  <rect x="340" y="340" width="15" height="15" fill="#1D3557" opacity="0.5"/>
  <!-- TOP-RIGHT: Many small blue rectangles in a cluster -->
  <rect x="450" y="80" width="30" height="20" fill="#1D3557" opacity="0.7"/>
  <rect x="490" y="110" width="25" height="30" fill="#1D3557" opacity="0.6"/>
  <rect x="530" y="70" width="35" height="25" fill="#1D3557" opacity="0.8"/>
  <rect x="580" y="120" width="20" height="35" fill="#1D3557" opacity="0.5"/>
  <rect x="460" y="150" width="40" height="20" fill="#1D3557" opacity="0.65"/>
  <rect x="520" y="160" width="25" height="40" fill="#1D3557" opacity="0.55"/>
  <rect x="570" y="180" width="30" height="25" fill="#1D3557" opacity="0.7"/>
  <rect x="620" y="90" width="20" height="30" fill="#1D3557" opacity="0.6"/>
  <rect x="650" y="150" width="35" height="20" fill="#1D3557" opacity="0.75"/>
  <rect x="500" y="200" width="28" height="28" fill="#1D3557" opacity="0.5"/>
  <rect x="560" y="240" width="22" height="35" fill="#1D3557" opacity="0.6"/>
  <rect x="470" y="260" width="30" height="22" fill="#1D3557" opacity="0.45"/>
  <rect x="620" y="250" width="25" height="25" fill="#457B9D" opacity="0.5"/>
  <rect x="700" y="200" width="20" height="40" fill="#457B9D" opacity="0.4"/>
  <!-- BOTTOM-LEFT: Diagonal yellow lines creating a pattern -->
  <line x1="30" y1="430" x2="180" y2="580" stroke="#F4D35E" stroke-width="3" opacity="0.8"/>
  <line x1="70" y1="430" x2="220" y2="580" stroke="#F4D35E" stroke-width="2.5" opacity="0.7"/>
  <line x1="110" y1="430" x2="260" y2="580" stroke="#F4D35E" stroke-width="3" opacity="0.6"/>
  <line x1="150" y1="430" x2="300" y2="580" stroke="#F4D35E" stroke-width="2" opacity="0.8"/>
  <line x1="190" y1="430" x2="340" y2="580" stroke="#F4D35E" stroke-width="3" opacity="0.65"/>
  <line x1="230" y1="430" x2="380" y2="580" stroke="#F4D35E" stroke-width="2.5" opacity="0.75"/>
  <line x1="30" y1="530" x2="130" y2="630" stroke="#F4D35E" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="600" x2="200" y2="750" stroke="#F4D35E" stroke-width="3" opacity="0.6"/>
  <line x1="120" y1="620" x2="270" y2="770" stroke="#F4D35E" stroke-width="2" opacity="0.7"/>
  <line x1="200" y1="600" x2="350" y2="750" stroke="#F4D35E" stroke-width="2.5" opacity="0.55"/>
  <line x1="270" y1="580" x2="390" y2="700" stroke="#F4D35E" stroke-width="3" opacity="0.65"/>
  <rect x="300" y="700" width="30" height="30" fill="#DDA15E" opacity="0.5"/>
  <!-- BOTTOM-RIGHT: Scattered mixed shapes -->
  <circle cx="500" cy="500" r="25" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="620" cy="550" r="18" fill="#E76F51" opacity="0.7"/>
  <circle cx="700" cy="650" r="30" fill="#264653" opacity="0.5"/>
  <rect x="550" y="600" width="40" height="40" fill="#2A9D8F" opacity="0.5"/>
  <rect x="450" y="700" width="50" height="30" fill="#E76F51" opacity="0.6"/>
  <polygon points="650,450 680,510 620,510" fill="#264653" opacity="0.6"/>
  <polygon points="750,550 780,600 720,600" fill="#2A9D8F" opacity="0.5"/>
  <rect x="500" y="750" width="35" height="25" fill="#E76F51" opacity="0.4"/>
  <circle cx="580" cy="480" r="12" fill="#264653" opacity="0.7"/>
  <polygon points="470,620 500,580 530,620" fill="#2A9D8F" opacity="0.55"/>
  <!-- Accent shapes crossing quadrant boundaries to unify -->
  <circle cx="400" cy="400" r="15" fill="#E63946" opacity="0.6"/>
  <rect x="385" y="180" width="30" height="40" fill="#E76F51" opacity="0.5"/>
  <circle cx="200" cy="400" r="10" fill="#2A9D8F" opacity="0.7"/>
  <rect x="390" y="580" width="20" height="40" fill="#F4D35E" opacity="0.6"/>
  <circle cx="400" cy="100" r="8" fill="#6D2E46" opacity="0.6"/>
  <circle cx="400" cy="700" r="8" fill="#6D2E46" opacity="0.6"/>
</svg>