<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFF"/>

  <!-- Flight path dashed lines -->
  <line x1="50" y1="700" x2="300" y2="350" stroke="#457B9D" stroke-width="2" stroke-dasharray="10,6" opacity="0.6"/>
  <line x1="100" y1="750" x2="450" y2="200" stroke="#2A9D8F" stroke-width="2" stroke-dasharray="10,6" opacity="0.6"/>
  <line x1="500" y1="700" x2="650" y2="150" stroke="#E63946" stroke-width="2" stroke-dasharray="10,6" opacity="0.6"/>
  <line x1="200" y1="600" x2="550" y2="100" stroke="#1D3557" stroke-width="2" stroke-dasharray="8,5" opacity="0.5"/>
  <line x1="600" y1="650" x2="750" y2="250" stroke="#E76F51" stroke-width="2" stroke-dasharray="8,5" opacity="0.5"/>

  <!-- Paper Airplane 1 - Large, heading upper-right -->
  <g transform="translate(300,350) rotate(-40)">
    <polygon points="0,-60 -30,30 0,15 30,30" fill="#E63946" stroke="#000" stroke-width="1.5"/>
    <line x1="0" y1="-60" x2="0" y2="15" stroke="#000" stroke-width="1"/>
    <polygon points="0,-60 -30,30 0,15" fill="#E63946" opacity="0.7"/>
    <polygon points="0,-60 30,30 0,15" fill="#E63946" opacity="1"/>
  </g>

  <!-- Paper Airplane 2 - Medium, heading up -->
  <g transform="translate(450,200) rotate(-25)">
    <polygon points="0,-50 -25,25 0,10 25,25" fill="#1D3557" stroke="#000" stroke-width="1.5"/>
    <line x1="0" y1="-50" x2="0" y2="10" stroke="#FFF" stroke-width="0.8"/>
    <polygon points="0,-50 -25,25 0,10" fill="#1D3557" opacity="0.7"/>
    <polygon points="0,-50 25,25 0,10" fill="#1D3557" opacity="1"/>
  </g>

  <!-- Paper Airplane 3 - Large, heading upper-left -->
  <g transform="translate(650,150) rotate(-55)">
    <polygon points="0,-55 -28,28 0,12 28,28" fill="#F4D35E" stroke="#000" stroke-width="1.5"/>
    <line x1="0" y1="-55" x2="0" y2="12" stroke="#000" stroke-width="1"/>
    <polygon points="0,-55 -28,28 0,12" fill="#F4D35E" opacity="0.75"/>
    <polygon points="0,-55 28,28 0,12" fill="#F4D35E"/>
  </g>

  <!-- Paper Airplane 4 - Small, far away feel -->
  <g transform="translate(550,100) rotate(-30)">
    <polygon points="0,-30 -15,15 0,7 15,15" fill="#2A9D8F" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="-30" x2="0" y2="7" stroke="#000" stroke-width="0.7"/>
  </g>

  <!-- Paper Airplane 5 - Medium, different angle -->
  <g transform="translate(750,250) rotate(-70)">
    <polygon points="0,-45 -22,22 0,10 22,22" fill="#E76F51" stroke="#000" stroke-width="1.5"/>
    <line x1="0" y1="-45" x2="0" y2="10" stroke="#FFF" stroke-width="0.8"/>
    <polygon points="0,-45 -22,22 0,10" fill="#E76F51" opacity="0.7"/>
    <polygon points="0,-45 22,22 0,10" fill="#E76F51"/>
  </g>

  <!-- Paper Airplane 6 - Tiny, background -->
  <g transform="translate(180,250) rotate(-15)">
    <polygon points="0,-20 -10,10 0,5 10,10" fill="#457B9D" stroke="#000" stroke-width="0.8"/>
  </g>

  <!-- Paper Airplane 7 - Tiny background -->
  <g transform="translate(380,450) rotate(-50)">
    <polygon points="0,-22 -11,11 0,5 11,11" fill="#000" stroke="#000" stroke-width="0.8"/>
  </g>

  <!-- Geometric background elements -->
  <circle cx="100" cy="100" r="40" fill="none" stroke="#F4D35E" stroke-width="2"/>
  <circle cx="700" cy="600" r="50" fill="none" stroke="#E63946" stroke-width="2"/>
  <rect x="50" y="500" width="60" height="60" fill="none" stroke="#1D3557" stroke-width="2" transform="rotate(15,80,530)"/>
  <polygon points="680,700 720,640 760,700" fill="none" stroke="#2A9D8F" stroke-width="2"/>

  <!-- Cloud-like geometric shapes -->
  <g opacity="0.15">
    <circle cx="300" cy="120" r="30" fill="#457B9D"/>
    <circle cx="330" cy="110" r="35" fill="#457B9D"/>
    <circle cx="360" cy="120" r="28" fill="#457B9D"/>
  </g>
  <g opacity="0.12">
    <circle cx="550" cy="350" r="25" fill="#457B9D"/>
    <circle cx="575" cy="340" r="30" fill="#457B9D"/>
    <circle cx="600" cy="350" r="22" fill="#457B9D"/>
  </g>

  <!-- Title block -->
  <rect x="220" y="720" width="360" height="45" fill="#1D3557"/>
  <text x="400" y="750" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#FFF">PAPER AIRPLANE</text>
</svg>