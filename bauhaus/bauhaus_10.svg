<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Point and Line to Plane</title>
  <rect width="800" height="800" fill="#F5F0E8"/>

  <!-- Structured plane - grid lines (subtle) -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.15"/>

  <!-- Diagonal structural line -->
  <line x1="80" y1="720" x2="720" y2="80" stroke="#000000" stroke-width="1.5" opacity="0.2"/>

  <!-- Connecting lines between dots - network structure -->
  <line x1="150" y1="200" x2="320" y2="150" stroke="#000000" stroke-width="1.5"/>
  <line x1="320" y1="150" x2="500" y2="250" stroke="#000000" stroke-width="1"/>
  <line x1="500" y1="250" x2="650" y2="180" stroke="#000000" stroke-width="1.5"/>
  <line x1="150" y1="200" x2="200" y2="400" stroke="#1D3557" stroke-width="1"/>
  <line x1="200" y1="400" x2="380" y2="350" stroke="#000000" stroke-width="1"/>
  <line x1="380" y1="350" x2="500" y2="250" stroke="#E63946" stroke-width="1"/>
  <line x1="380" y1="350" x2="300" y2="520" stroke="#000000" stroke-width="1.5"/>
  <line x1="300" y1="520" x2="480" y2="560" stroke="#457B9D" stroke-width="1"/>
  <line x1="480" y1="560" x2="620" y2="450" stroke="#000000" stroke-width="1"/>
  <line x1="620" y1="450" x2="650" y2="180" stroke="#000000" stroke-width="1"/>
  <line x1="620" y1="450" x2="700" y2="600" stroke="#E63946" stroke-width="1"/>
  <line x1="700" y1="600" x2="580" y2="700" stroke="#000000" stroke-width="1.5"/>
  <line x1="580" y1="700" x2="400" y2="680" stroke="#1D3557" stroke-width="1"/>
  <line x1="400" y1="680" x2="300" y2="520" stroke="#000000" stroke-width="1"/>
  <line x1="200" y1="400" x2="120" y2="550" stroke="#000000" stroke-width="1"/>
  <line x1="120" y1="550" x2="180" y2="680" stroke="#F4D35E" stroke-width="1.5"/>
  <line x1="180" y1="680" x2="400" y2="680" stroke="#000000" stroke-width="1"/>
  <line x1="480" y1="560" x2="580" y2="700" stroke="#000000" stroke-width="0.8"/>
  <line x1="650" y1="180" x2="720" y2="300" stroke="#000000" stroke-width="1"/>
  <line x1="720" y1="300" x2="620" y2="450" stroke="#F4D35E" stroke-width="1"/>

  <!-- Dots of varying sizes - the "points" -->
  <!-- Large points -->
  <circle cx="150" cy="200" r="18" fill="#E63946"/>
  <circle cx="500" cy="250" r="22" fill="#1D3557"/>
  <circle cx="300" cy="520" r="20" fill="#F4D35E"/>
  <circle cx="620" cy="450" r="16" fill="#E63946"/>

  <!-- Medium points -->
  <circle cx="320" cy="150" r="12" fill="#000000"/>
  <circle cx="200" cy="400" r="14" fill="#457B9D"/>
  <circle cx="380" cy="350" r="10" fill="#000000"/>
  <circle cx="650" cy="180" r="13" fill="#F4D35E"/>
  <circle cx="480" cy="560" r="12" fill="#1D3557"/>
  <circle cx="700" cy="600" r="11" fill="#000000"/>
  <circle cx="400" cy="680" r="14" fill="#457B9D"/>

  <!-- Small points -->
  <circle cx="580" cy="700" r="8" fill="#E63946"/>
  <circle cx="180" cy="680" r="9" fill="#1D3557"/>
  <circle cx="120" cy="550" r="7" fill="#A8DADC"/>
  <circle cx="720" cy="300" r="8" fill="#000000"/>

  <!-- Tiny accent dots -->
  <circle cx="235" cy="300" r="4" fill="#000000"/>
  <circle cx="410" cy="200" r="3" fill="#E63946"/>
  <circle cx="550" cy="350" r="4" fill="#000000"/>
  <circle cx="340" cy="440" r="3" fill="#F4D35E"/>
  <circle cx="540" cy="500" r="3" fill="#000000"/>
  <circle cx="250" cy="620" r="4" fill="#E63946"/>
  <circle cx="660" cy="550" r="3" fill="#457B9D"/>

  <!-- Geometric accent shapes - Kandinsky-inspired -->
  <!-- Small triangle near top -->
  <polygon points="90,100 110,60 130,100" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Tiny square -->
  <rect x="680" y="80" width="20" height="20" fill="none" stroke="#E63946" stroke-width="1.5" transform="rotate(15,690,90)"/>

  <!-- Arc element -->
  <path d="M60,350 A30,30 0 0,1 60,410" fill="none" stroke="#F4D35E" stroke-width="2"/>

  <!-- Checkerboard accent bottom-right -->
  <rect x="720" y="720" width="15" height="15" fill="#000000"/>
  <rect x="735" y="735" width="15" height="15" fill="#000000"/>
  <rect x="720" y="735" width="15" height="15" fill="#FFFFFF" stroke="#000000" stroke-width="0.5"/>
  <rect x="735" y="720" width="15" height="15" fill="#FFFFFF" stroke="#000000" stroke-width="0.5"/>

  <!-- Frame -->
  <rect x="20" y="20" width="760" height="760" fill="none" stroke="#000000" stroke-width="2"/>
</svg>