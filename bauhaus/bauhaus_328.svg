<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Subtle grid -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <!-- LEFT HALF: Warm palette, organic shapes -->
  <!-- Large red circle -->
  <circle cx="150" cy="300" r="80" fill="#E63946" opacity="0.75"/>
  <!-- Orange arcs -->
  <path d="M 60 500 A 80 80 0 0 1 220 500" fill="none" stroke="#E76F51" stroke-width="4" opacity="0.7"/>
  <path d="M 100 550 A 60 60 0 0 1 220 550" fill="none" stroke="#E76F51" stroke-width="2.5" opacity="0.5"/>
  <!-- Yellow circles -->
  <circle cx="280" cy="180" r="45" fill="#F4D35E" opacity="0.8"/>
  <circle cx="100" cy="150" r="30" fill="#F4D35E" opacity="0.5"/>
  <circle cx="320" cy="450" r="35" fill="#E9C46A" opacity="0.65"/>
  <!-- Sand shapes -->
  <circle cx="200" cy="650" r="50" fill="#DDA15E" opacity="0.6"/>
  <circle cx="80" cy="450" r="25" fill="#DDA15E" opacity="0.7"/>
  <!-- Coral ellipse -->
  <ellipse cx="250" cy="550" rx="60" ry="35" fill="#E9C46A" opacity="0.5"/>
  <!-- Small warm accents -->
  <circle cx="350" cy="100" r="15" fill="#E63946" opacity="0.6"/>
  <circle cx="50" cy="700" r="20" fill="#E76F51" opacity="0.55"/>
  <!-- Warm arc -->
  <path d="M 30 250 A 120 120 0 0 1 170 120" fill="none" stroke="#E63946" stroke-width="3" opacity="0.4"/>
  <!-- Burgundy accents left -->
  <circle cx="300" cy="700" r="18" fill="#6D2E46" opacity="0.7"/>
  <circle cx="130" cy="500" r="12" fill="#6D2E46" opacity="0.6"/>
  <!-- RIGHT HALF: Cool palette, angular shapes -->
  <!-- Large blue rectangle -->
  <rect x="500" y="150" width="120" height="180" fill="#1D3557" opacity="0.7"/>
  <!-- Teal triangles -->
  <polygon points="600,500 680,400 760,500" fill="#2A9D8F" opacity="0.7"/>
  <polygon points="450,650 510,580 570,650" fill="#2A9D8F" opacity="0.55"/>
  <!-- Steel blue rectangles -->
  <rect x="650" y="550" width="100" height="60" fill="#457B9D" opacity="0.65"/>
  <rect x="480" y="300" width="60" height="100" fill="#457B9D" opacity="0.5"/>
  <!-- Forest triangles -->
  <polygon points="700,150 750,80 780,170" fill="#264653" opacity="0.6"/>
  <polygon points="550,750 600,680 650,750" fill="#264653" opacity="0.55"/>
  <!-- Light blue shapes -->
  <rect x="680" y="280" width="70" height="50" fill="#A8DADC" opacity="0.6"/>
  <polygon points="460,480 500,430 540,480" fill="#A8DADC" opacity="0.5"/>
  <!-- Small cool accents -->
  <rect x="580" y="650" width="30" height="30" fill="#1D3557" opacity="0.5"/>
  <polygon points="720,700 740,660 760,700" fill="#457B9D" opacity="0.6"/>
  <!-- Burgundy accents right -->
  <rect x="500" y="100" width="22" height="22" fill="#6D2E46" opacity="0.65"/>
  <rect x="700" y="450" width="16" height="16" fill="#6D2E46" opacity="0.7"/>
  <!-- Shapes crossing the dividing line -->
  <circle cx="400" cy="250" r="40" fill="#E63946" opacity="0.5"/>
  <rect x="380" y="550" width="50" height="70" fill="#1D3557" opacity="0.45"/>
  <polygon points="370,400 420,350 450,410" fill="#F4D35E" opacity="0.5"/>
  <!-- Thick black dividing line (on top) -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="6"/>
  <!-- Corner accents -->
  <rect x="8" y="8" width="10" height="10" fill="#E76F51" opacity="0.4"/>
  <rect x="782" y="8" width="10" height="10" fill="#457B9D" opacity="0.4"/>
  <rect x="8" y="782" width="10" height="10" fill="#DDA15E" opacity="0.4"/>
  <rect x="782" y="782" width="10" height="10" fill="#264653" opacity="0.4"/>
</svg>