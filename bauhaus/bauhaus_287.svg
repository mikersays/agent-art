<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Ground shapes - Teal -->
  <rect x="0" y="680" width="800" height="120" fill="#2A9D8F" opacity="0.4"/>
  <rect x="50" y="700" width="200" height="40" fill="#264653" opacity="0.6"/>
  <rect x="350" y="710" width="150" height="30" fill="#2A9D8F" opacity="0.7"/>
  <rect x="580" y="695" width="180" height="50" fill="#264653" opacity="0.5"/>
  <!-- Tower base -->
  <rect x="340" y="620" width="120" height="80" fill="#1D3557" opacity="0.9"/>
  <!-- Tower middle sections - stacked rectangles -->
  <rect x="350" y="520" width="100" height="100" fill="#000000" opacity="0.85"/>
  <rect x="355" y="430" width="90" height="90" fill="#1D3557" opacity="0.9"/>
  <rect x="360" y="350" width="80" height="80" fill="#000000" opacity="0.8"/>
  <rect x="365" y="280" width="70" height="70" fill="#1D3557" opacity="0.85"/>
  <rect x="370" y="220" width="60" height="60" fill="#000000" opacity="0.75"/>
  <!-- Tower top - triangle -->
  <polygon points="400,140 370,220 430,220" fill="#1D3557" opacity="0.9"/>
  <polygon points="400,160 380,220 420,220" fill="#457B9D" opacity="0.5"/>
  <!-- Signal arcs emanating from top -->
  <path d="M400,140 A30,30 0 0,1 430,140" fill="none" stroke="#E63946" stroke-width="3" opacity="0.9"/>
  <path d="M400,140 A30,30 0 0,0 370,140" fill="none" stroke="#E63946" stroke-width="3" opacity="0.9"/>
  <path d="M400,130 A60,60 0 0,1 460,130" fill="none" stroke="#F4D35E" stroke-width="2.5" opacity="0.8"/>
  <path d="M400,130 A60,60 0 0,0 340,130" fill="none" stroke="#F4D35E" stroke-width="2.5" opacity="0.8"/>
  <path d="M400,120 A100,100 0 0,1 500,120" fill="none" stroke="#E63946" stroke-width="2" opacity="0.65"/>
  <path d="M400,120 A100,100 0 0,0 300,120" fill="none" stroke="#E63946" stroke-width="2" opacity="0.65"/>
  <path d="M400,110 A150,150 0 0,1 550,110" fill="none" stroke="#F4D35E" stroke-width="1.8" opacity="0.5"/>
  <path d="M400,110 A150,150 0 0,0 250,110" fill="none" stroke="#F4D35E" stroke-width="1.8" opacity="0.5"/>
  <path d="M400,100 A210,210 0 0,1 610,100" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.35"/>
  <path d="M400,100 A210,210 0 0,0 190,100" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.35"/>
  <path d="M400,90 A280,280 0 0,1 680,90" fill="none" stroke="#F4D35E" stroke-width="1.2" opacity="0.25"/>
  <path d="M400,90 A280,280 0 0,0 120,90" fill="none" stroke="#F4D35E" stroke-width="1.2" opacity="0.25"/>
  <!-- Orange accent dots along arcs -->
  <circle cx="430" cy="138" r="4" fill="#E76F51" opacity="0.9"/>
  <circle cx="370" cy="138" r="4" fill="#E76F51" opacity="0.9"/>
  <circle cx="460" cy="125" r="5" fill="#E76F51" opacity="0.8"/>
  <circle cx="340" cy="125" r="5" fill="#E76F51" opacity="0.8"/>
  <circle cx="500" cy="115" r="5" fill="#E76F51" opacity="0.7"/>
  <circle cx="300" cy="115" r="5" fill="#E76F51" opacity="0.7"/>
  <circle cx="550" cy="105" r="4" fill="#E76F51" opacity="0.55"/>
  <circle cx="250" cy="105" r="4" fill="#E76F51" opacity="0.55"/>
  <circle cx="610" cy="96" r="4" fill="#E76F51" opacity="0.4"/>
  <circle cx="190" cy="96" r="4" fill="#E76F51" opacity="0.4"/>
  <!-- Tower structural details -->
  <line x1="400" y1="140" x2="400" y2="700" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <line x1="350" y1="520" x2="450" y2="520" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="355" y1="430" x2="445" y2="430" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="360" y1="350" x2="440" y2="350" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <!-- Small window-like squares on tower -->
  <rect x="385" y="545" width="12" height="12" fill="#F4D35E" opacity="0.7"/>
  <rect x="403" y="545" width="12" height="12" fill="#E63946" opacity="0.6"/>
  <rect x="388" y="455" width="10" height="10" fill="#F4D35E" opacity="0.7"/>
  <rect x="402" y="455" width="10" height="10" fill="#FFFFFF" opacity="0.6"/>
  <rect x="390" y="370" width="8" height="8" fill="#E63946" opacity="0.6"/>
  <!-- Subtle background grid -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
</svg>