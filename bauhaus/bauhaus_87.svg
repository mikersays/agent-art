<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Pixel grid background structure -->
  <g opacity="0.15">
    <line x1="100" y1="100" x2="100" y2="700" stroke="#000000" stroke-width="0.5"/>
    <line x1="140" y1="100" x2="140" y2="700" stroke="#000000" stroke-width="0.5"/>
    <line x1="180" y1="100" x2="180" y2="700" stroke="#000000" stroke-width="0.5"/>
    <line x1="220" y1="100" x2="220" y2="700" stroke="#000000" stroke-width="0.5"/>
    <line x1="260" y1="100" x2="260" y2="700" stroke="#000000" stroke-width="0.5"/>
    <line x1="300" y1="100" x2="300" y2="700" stroke="#000000" stroke-width="0.5"/>
    <line x1="340" y1="100" x2="340" y2="700" stroke="#000000" stroke-width="0.5"/>
    <line x1="380" y1="100" x2="380" y2="700" stroke="#000000" stroke-width="0.5"/>
    <line x1="420" y1="100" x2="420" y2="700" stroke="#000000" stroke-width="0.5"/>
    <line x1="460" y1="100" x2="460" y2="700" stroke="#000000" stroke-width="0.5"/>
    <line x1="500" y1="100" x2="500" y2="700" stroke="#000000" stroke-width="0.5"/>
    <line x1="540" y1="100" x2="540" y2="700" stroke="#000000" stroke-width="0.5"/>
    <line x1="580" y1="100" x2="580" y2="700" stroke="#000000" stroke-width="0.5"/>
    <line x1="620" y1="100" x2="620" y2="700" stroke="#000000" stroke-width="0.5"/>
    <line x1="660" y1="100" x2="660" y2="700" stroke="#000000" stroke-width="0.5"/>
    <line x1="700" y1="100" x2="700" y2="700" stroke="#000000" stroke-width="0.5"/>
  </g>

  <!-- Red diagonal cluster (top-left) -->
  <rect x="140" y="140" width="36" height="36" fill="#E63946"/>
  <rect x="180" y="140" width="36" height="36" fill="#E63946"/>
  <rect x="220" y="140" width="36" height="36" fill="#E63946"/>
  <rect x="180" y="180" width="36" height="36" fill="#E63946"/>
  <rect x="220" y="180" width="36" height="36" fill="#E63946"/>
  <rect x="260" y="180" width="36" height="36" fill="#E63946"/>
  <rect x="220" y="220" width="36" height="36" fill="#E63946"/>
  <rect x="260" y="220" width="36" height="36" fill="#E63946"/>
  <rect x="300" y="220" width="36" height="36" fill="#6D2E46"/>

  <!-- Blue block cluster (center-right) -->
  <rect x="460" y="300" width="36" height="36" fill="#1D3557"/>
  <rect x="500" y="300" width="36" height="36" fill="#1D3557"/>
  <rect x="540" y="300" width="36" height="36" fill="#1D3557"/>
  <rect x="580" y="300" width="36" height="36" fill="#264653"/>
  <rect x="460" y="340" width="36" height="36" fill="#1D3557"/>
  <rect x="500" y="340" width="36" height="36" fill="#264653"/>
  <rect x="540" y="340" width="36" height="36" fill="#1D3557"/>
  <rect x="460" y="380" width="36" height="36" fill="#264653"/>
  <rect x="500" y="380" width="36" height="36" fill="#1D3557"/>

  <!-- Yellow scattered cluster (center) -->
  <rect x="300" y="340" width="36" height="36" fill="#F4D35E"/>
  <rect x="340" y="340" width="36" height="36" fill="#F4D35E"/>
  <rect x="340" y="380" width="36" height="36" fill="#DDA15E"/>
  <rect x="380" y="380" width="36" height="36" fill="#F4D35E"/>
  <rect x="380" y="340" width="36" height="36" fill="#DDA15E"/>
  <rect x="300" y="380" width="36" height="36" fill="#F4D35E"/>

  <!-- Black L-shape (bottom-left) -->
  <rect x="140" y="460" width="36" height="36" fill="#000000"/>
  <rect x="140" y="500" width="36" height="36" fill="#000000"/>
  <rect x="140" y="540" width="36" height="36" fill="#000000"/>
  <rect x="140" y="580" width="36" height="36" fill="#000000"/>
  <rect x="180" y="580" width="36" height="36" fill="#000000"/>
  <rect x="220" y="580" width="36" height="36" fill="#000000"/>
  <rect x="260" y="580" width="36" height="36" fill="#000000"/>

  <!-- Burgundy cross (bottom-right) -->
  <rect x="540" y="500" width="36" height="36" fill="#6D2E46"/>
  <rect x="580" y="460" width="36" height="36" fill="#6D2E46"/>
  <rect x="580" y="500" width="36" height="36" fill="#6D2E46"/>
  <rect x="580" y="540" width="36" height="36" fill="#6D2E46"/>
  <rect x="620" y="500" width="36" height="36" fill="#6D2E46"/>

  <!-- Sand accent pixels -->
  <rect x="420" y="180" width="36" height="36" fill="#DDA15E"/>
  <rect x="460" y="180" width="36" height="36" fill="#DDA15E"/>
  <rect x="340" y="500" width="36" height="36" fill="#DDA15E"/>
  <rect x="380" y="540" width="36" height="36" fill="#DDA15E"/>

  <!-- Forest accent pixels -->
  <rect x="300" y="460" width="36" height="36" fill="#264653"/>
  <rect x="580" y="180" width="36" height="36" fill="#264653"/>
  <rect x="620" y="220" width="36" height="36" fill="#264653"/>

  <!-- Single red accent pixels scattered -->
  <rect x="500" y="540" width="36" height="36" fill="#E63946"/>
  <rect x="660" y="380" width="36" height="36" fill="#E63946"/>
  <rect x="140" y="300" width="36" height="36" fill="#E63946"/>

  <!-- Border frame -->
  <rect x="100" y="100" width="620" height="620" fill="none" stroke="#000000" stroke-width="3"/>
</svg>