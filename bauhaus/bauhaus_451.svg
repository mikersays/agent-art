<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Faint grid lines at 0.08 opacity -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <!-- Corner squares in black -->
  <rect x="0" y="0" width="45" height="45" fill="#000000" opacity="0.9"/>
  <rect x="755" y="0" width="45" height="45" fill="#000000" opacity="0.9"/>
  <rect x="0" y="755" width="45" height="45" fill="#000000" opacity="0.9"/>
  <rect x="755" y="755" width="45" height="45" fill="#000000" opacity="0.9"/>
  <!-- Massive off-center circle in deep blue -->
  <circle cx="250" cy="400" r="280" fill="#1D3557" opacity="0.85"/>
  <!-- Radiating lines from circle edge in red and yellow -->
  <line x1="530" y1="400" x2="800" y2="200" stroke="#E63946" stroke-width="3" opacity="0.8"/>
  <line x1="530" y1="400" x2="800" y2="320" stroke="#F4D35E" stroke-width="2.5" opacity="0.75"/>
  <line x1="530" y1="400" x2="800" y2="440" stroke="#E63946" stroke-width="2" opacity="0.8"/>
  <line x1="530" y1="400" x2="800" y2="560" stroke="#F4D35E" stroke-width="3" opacity="0.75"/>
  <line x1="530" y1="400" x2="800" y2="680" stroke="#E63946" stroke-width="2" opacity="0.8"/>
  <line x1="500" y1="200" x2="750" y2="50" stroke="#F4D35E" stroke-width="2" opacity="0.7"/>
  <line x1="500" y1="180" x2="780" y2="100" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>
  <line x1="480" y1="600" x2="750" y2="780" stroke="#F4D35E" stroke-width="2.5" opacity="0.7"/>
  <line x1="490" y1="620" x2="780" y2="720" stroke="#E63946" stroke-width="1.5" opacity="0.75"/>
  <line x1="530" y1="380" x2="800" y2="130" stroke="#F4D35E" stroke-width="1.5" opacity="0.65"/>
  <line x1="530" y1="420" x2="800" y2="750" stroke="#E63946" stroke-width="2" opacity="0.7"/>
  <!-- Small teal circles scattered on the right -->
  <circle cx="620" cy="150" r="18" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="700" cy="250" r="12" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="660" cy="480" r="22" fill="#2A9D8F" opacity="0.75"/>
  <circle cx="730" cy="380" r="10" fill="#2A9D8F" opacity="0.65"/>
  <circle cx="580" cy="300" r="15" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="690" cy="600" r="20" fill="#2A9D8F" opacity="0.8"/>
  <circle cx="750" cy="500" r="8" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="610" cy="700" r="14" fill="#2A9D8F" opacity="0.75"/>
  <circle cx="560" cy="550" r="11" fill="#2A9D8F" opacity="0.65"/>
  <circle cx="740" cy="150" r="9" fill="#2A9D8F" opacity="0.7"/>
  <!-- Accent elements on the blue circle -->
  <circle cx="250" cy="400" r="120" fill="none" stroke="#F4D35E" stroke-width="2" opacity="0.4"/>
  <circle cx="250" cy="400" r="60" fill="#E63946" opacity="0.3"/>
  <!-- Small white accent dots on blue -->
  <circle cx="180" cy="320" r="6" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="300" cy="500" r="5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="150" cy="450" r="4" fill="#FFFFFF" opacity="0.45"/>
</svg>