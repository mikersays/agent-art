<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#1D3557"/>

  <!-- Grid pattern background -->
  <g stroke="#264653" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/><line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="550" x2="800" y2="550"/><line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="650" x2="800" y2="650"/><line x1="0" y1="700" x2="800" y2="700"/>
    <line x1="0" y1="750" x2="800" y2="750"/>
    <line x1="50" y1="0" x2="50" y2="800"/><line x1="100" y1="0" x2="100" y2="800"/>
    <line x1="150" y1="0" x2="150" y2="800"/><line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="250" y1="0" x2="250" y2="800"/><line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="350" y1="0" x2="350" y2="800"/><line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="450" y1="0" x2="450" y2="800"/><line x1="500" y1="0" x2="500" y2="800"/>
    <line x1="550" y1="0" x2="550" y2="800"/><line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="650" y1="0" x2="650" y2="800"/><line x1="700" y1="0" x2="700" y2="800"/>
    <line x1="750" y1="0" x2="750" y2="800"/>
  </g>

  <!-- Trace Route 1: Red horizontal/vertical path -->
  <path d="M50,150 H200 V300 H350 V150 H500" fill="none" stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
  <!-- Trace Route 2: Yellow path -->
  <path d="M100,400 H250 V550 H400 V400 H600 V250" fill="none" stroke="#F4D35E" stroke-width="4" stroke-linecap="square"/>
  <!-- Trace Route 3: Teal path -->
  <path d="M650,100 V300 H500 V500 H650 V700" fill="none" stroke="#2A9D8F" stroke-width="4" stroke-linecap="square"/>
  <!-- Trace Route 4: Coral path -->
  <path d="M100,650 H300 V500 H150 V700 H400" fill="none" stroke="#E9C46A" stroke-width="3" stroke-linecap="square"/>
  <!-- Trace Route 5: White thin path -->
  <path d="M700,150 H750 V400 H600 V600 H750 V750" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="square" opacity="0.6"/>
  <!-- Trace Route 6: red vertical -->
  <path d="M300,50 V150 H150 V250" fill="none" stroke="#E63946" stroke-width="3" opacity="0.7"/>

  <!-- Node: Large circle at intersection -->
  <circle cx="200" cy="150" r="18" fill="#1D3557" stroke="#E63946" stroke-width="3"/>
  <circle cx="200" cy="150" r="8" fill="#E63946"/>

  <!-- Node: Square -->
  <rect x="338" y="138" width="24" height="24" fill="#1D3557" stroke="#E63946" stroke-width="3"/>
  <rect x="344" y="144" width="12" height="12" fill="#F4D35E"/>

  <!-- Node: Circle -->
  <circle cx="350" cy="300" r="18" fill="#1D3557" stroke="#E63946" stroke-width="3"/>
  <circle cx="350" cy="300" r="6" fill="#FFFFFF"/>

  <!-- Node: Square on yellow trace -->
  <rect x="238" y="388" width="24" height="24" fill="#1D3557" stroke="#F4D35E" stroke-width="3"/>
  <rect x="244" y="394" width="12" height="12" fill="#F4D35E"/>

  <!-- Node: Circle on yellow -->
  <circle cx="250" cy="550" r="18" fill="#1D3557" stroke="#F4D35E" stroke-width="3"/>
  <circle cx="250" cy="550" r="7" fill="#E63946"/>

  <circle cx="400" cy="550" r="15" fill="#1D3557" stroke="#F4D35E" stroke-width="3"/>
  <circle cx="400" cy="550" r="5" fill="#F4D35E"/>

  <circle cx="400" cy="400" r="18" fill="#1D3557" stroke="#F4D35E" stroke-width="3"/>
  <rect x="393" y="393" width="14" height="14" fill="#2A9D8F"/>

  <circle cx="600" cy="400" r="15" fill="#1D3557" stroke="#F4D35E" stroke-width="3"/>
  <circle cx="600" cy="400" r="5" fill="#E9C46A"/>

  <circle cx="600" cy="250" r="20" fill="#1D3557" stroke="#F4D35E" stroke-width="3"/>
  <polygon points="600,238 610,256 590,256" fill="#F4D35E"/>

  <!-- Node: Teal trace nodes -->
  <circle cx="650" cy="100" r="18" fill="#1D3557" stroke="#2A9D8F" stroke-width="3"/>
  <circle cx="650" cy="100" r="8" fill="#2A9D8F"/>

  <rect x="638" y="288" width="24" height="24" fill="#1D3557" stroke="#2A9D8F" stroke-width="3"/>
  <circle cx="650" cy="300" r="7" fill="#E63946"/>

  <circle cx="500" cy="500" r="20" fill="#1D3557" stroke="#2A9D8F" stroke-width="3"/>
  <rect x="493" y="493" width="14" height="14" fill="#F4D35E"/>

  <circle cx="500" cy="300" r="15" fill="#1D3557" stroke="#2A9D8F" stroke-width="3"/>
  <circle cx="500" cy="300" r="5" fill="#FFFFFF"/>

  <circle cx="650" cy="500" r="18" fill="#1D3557" stroke="#2A9D8F" stroke-width="3"/>
  <polygon points="640,506 650,490 660,506" fill="#2A9D8F"/>

  <circle cx="650" cy="700" r="22" fill="#1D3557" stroke="#2A9D8F" stroke-width="3"/>
  <circle cx="650" cy="700" r="12" fill="#264653" stroke="#F4D35E" stroke-width="2"/>
  <circle cx="650" cy="700" r="4" fill="#F4D35E"/>

  <!-- Coral trace nodes -->
  <rect x="88" y="638" width="24" height="24" fill="#1D3557" stroke="#E9C46A" stroke-width="3"/>
  <circle cx="100" cy="650" r="7" fill="#E9C46A"/>

  <circle cx="300" cy="650" r="15" fill="#1D3557" stroke="#E9C46A" stroke-width="3"/>
  <rect x="294" y="644" width="12" height="12" fill="#E63946"/>

  <circle cx="300" cy="500" r="18" fill="#1D3557" stroke="#E9C46A" stroke-width="3"/>
  <circle cx="300" cy="500" r="8" fill="#2A9D8F"/>

  <circle cx="150" cy="500" r="15" fill="#1D3557" stroke="#E9C46A" stroke-width="3"/>
  <polygon points="143,506 150,492 157,506" fill="#E9C46A"/>

  <rect x="388" y="638" width="24" height="24" fill="#1D3557" stroke="#E9C46A" stroke-width="3"/>
  <rect x="394" y="644" width="12" height="12" fill="#F4D35E"/>

  <!-- Extra IC chip shapes -->
  <rect x="80" y="220" width="50" height="70" fill="#264653" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="80" y1="235" x2="65" y2="235" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="80" y1="250" x2="65" y2="250" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="80" y1="265" x2="65" y2="265" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="80" y1="275" x2="65" y2="275" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="130" y1="235" x2="145" y2="235" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="130" y1="250" x2="145" y2="250" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="130" y1="265" x2="145" y2="265" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="130" y1="275" x2="145" y2="275" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="92" y="232" r="3" fill="#E63946"/>

  <!-- Capacitor shapes -->
  <rect x="720" y="280" width="30" height="50" fill="#264653" stroke="#E9C46A" stroke-width="1.5"/>
  <line x1="735" y1="280" x2="735" y2="265" stroke="#E9C46A" stroke-width="2"/>
  <line x1="735" y1="330" x2="735" y2="345" stroke="#E9C46A" stroke-width="2"/>

  <!-- Resistor zigzag -->
  <path d="M50,50 H80 L90,35 L110,65 L130,35 L150,65 L160,50 H190" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>

  <!-- LED indicator dots -->
  <circle cx="50" cy="750" r="6" fill="#E63946"/>
  <circle cx="70" cy="750" r="6" fill="#F4D35E"/>
  <circle cx="90" cy="750" r="6" fill="#2A9D8F"/>
  <circle cx="110" cy="750" r="6" fill="#FFFFFF" opacity="0.4"/>

  <!-- Border -->
  <rect x="5" y="5" width="790" height="790" fill="none" stroke="#2A9D8F" stroke-width="2"/>
</svg>