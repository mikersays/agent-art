<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Background grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <!-- Staircase steps - diagonal from top-left to bottom-right -->
  <!-- Step 1 - Blue -->
  <rect x="40" y="60" width="120" height="60" fill="#1D3557" opacity="0.85" stroke="#000000" stroke-width="2"/>
  <!-- Step 2 - Red -->
  <rect x="130" y="120" width="120" height="60" fill="#E63946" opacity="0.85" stroke="#000000" stroke-width="2"/>
  <!-- Step 3 - Yellow -->
  <rect x="220" y="180" width="120" height="60" fill="#F4D35E" opacity="0.85" stroke="#000000" stroke-width="2"/>
  <!-- Step 4 - Teal -->
  <rect x="310" y="240" width="120" height="60" fill="#2A9D8F" opacity="0.85" stroke="#000000" stroke-width="2"/>
  <!-- Step 5 - Blue -->
  <rect x="400" y="300" width="120" height="60" fill="#1D3557" opacity="0.85" stroke="#000000" stroke-width="2"/>
  <!-- Step 6 - Red -->
  <rect x="490" y="360" width="120" height="60" fill="#E63946" opacity="0.85" stroke="#000000" stroke-width="2"/>
  <!-- Step 7 - Yellow -->
  <rect x="580" y="420" width="120" height="60" fill="#F4D35E" opacity="0.85" stroke="#000000" stroke-width="2"/>
  <!-- Step 8 - Teal -->
  <rect x="670" y="480" width="120" height="60" fill="#2A9D8F" opacity="0.85" stroke="#000000" stroke-width="2"/>
  <!-- Vertical risers connecting steps -->
  <rect x="130" y="60" width="10" height="60" fill="#000000" opacity="0.6"/>
  <rect x="220" y="120" width="10" height="60" fill="#000000" opacity="0.6"/>
  <rect x="310" y="180" width="10" height="60" fill="#000000" opacity="0.6"/>
  <rect x="400" y="240" width="10" height="60" fill="#000000" opacity="0.6"/>
  <rect x="490" y="300" width="10" height="60" fill="#000000" opacity="0.6"/>
  <rect x="580" y="360" width="10" height="60" fill="#000000" opacity="0.6"/>
  <rect x="670" y="420" width="10" height="60" fill="#000000" opacity="0.6"/>
  <!-- Triangular shadows under each step -->
  <polygon points="40,120 160,120 40,160" fill="#000000" opacity="0.15"/>
  <polygon points="130,180 250,180 130,220" fill="#000000" opacity="0.15"/>
  <polygon points="220,240 340,240 220,280" fill="#000000" opacity="0.15"/>
  <polygon points="310,300 430,300 310,340" fill="#000000" opacity="0.15"/>
  <polygon points="400,360 520,360 400,400" fill="#000000" opacity="0.15"/>
  <polygon points="490,420 610,420 490,460" fill="#000000" opacity="0.15"/>
  <polygon points="580,480 700,480 580,520" fill="#000000" opacity="0.15"/>
  <polygon points="670,540 790,540 670,580" fill="#000000" opacity="0.15"/>
  <!-- Circles rolling down the stairs -->
  <circle cx="100" cy="45" r="22" fill="#E63946" opacity="0.8" stroke="#000000" stroke-width="1.5"/>
  <circle cx="280" cy="165" r="18" fill="#F4D35E" opacity="0.8" stroke="#000000" stroke-width="1.5"/>
  <circle cx="460" cy="285" r="25" fill="#1D3557" opacity="0.8" stroke="#000000" stroke-width="1.5"/>
  <circle cx="640" cy="405" r="20" fill="#2A9D8F" opacity="0.8" stroke="#000000" stroke-width="1.5"/>
  <circle cx="750" cy="465" r="15" fill="#E63946" opacity="0.7" stroke="#000000" stroke-width="1.5"/>
  <!-- Orange accent elements -->
  <rect x="50" y="680" width="80" height="40" fill="#E76F51" opacity="0.7"/>
  <rect x="700" y="100" width="60" height="30" fill="#E76F51" opacity="0.65"/>
  <circle cx="680" cy="650" r="30" fill="#E76F51" opacity="0.55"/>
  <!-- Additional stair-like forms below main staircase -->
  <rect x="100" y="600" width="80" height="30" fill="#1D3557" opacity="0.35"/>
  <rect x="160" y="630" width="80" height="30" fill="#E63946" opacity="0.35"/>
  <rect x="220" y="660" width="80" height="30" fill="#F4D35E" opacity="0.35"/>
  <rect x="280" y="690" width="80" height="30" fill="#2A9D8F" opacity="0.35"/>
  <!-- Corner accents -->
  <rect x="15" y="750" width="30" height="30" fill="#000000" opacity="0.25"/>
  <rect x="755" y="15" width="30" height="30" fill="#000000" opacity="0.25"/>
  <!-- Small detail shapes -->
  <circle cx="370" cy="165" r="5" fill="#E76F51" opacity="0.8"/>
  <circle cx="550" cy="345" r="5" fill="#E76F51" opacity="0.8"/>
  <circle cx="190" cy="105" r="4" fill="#F4D35E" opacity="0.9"/>
</svg>