<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Bauhaus Poster - Bold abstract poster layout -->
  <!-- Strong vertical black accent bar -->
  <rect x="90" y="60" width="40" height="680" fill="#000000"/>
  <!-- Large geometric circle -->
  <circle cx="420" cy="300" r="210" fill="#1D3557"/>
  <circle cx="420" cy="300" r="160" fill="none" stroke="#F4D35E" stroke-width="5"/>
  <circle cx="420" cy="300" r="110" fill="#E63946"/>
  <circle cx="420" cy="300" r="55" fill="#FFFFFF"/>
  <!-- Triangular element -->
  <polygon points="560,130 720,430 400,430" fill="#F4D35E" opacity="0.65"/>
  <!-- Thick horizontal bars in red/blue/yellow -->
  <rect x="70" y="560" width="660" height="42" fill="#E63946"/>
  <rect x="70" y="616" width="660" height="34" fill="#1D3557"/>
  <rect x="70" y="664" width="660" height="28" fill="#F4D35E"/>
  <rect x="70" y="706" width="660" height="22" fill="#2A9D8F"/>
  <!-- Scattered small shapes -->
  <rect x="620" y="90" width="28" height="28" fill="#E63946"/>
  <rect x="665" y="120" width="20" height="20" fill="#000000"/>
  <circle cx="710" cy="100" r="14" fill="#2A9D8F"/>
  <circle cx="180" cy="140" r="11" fill="#F4D35E"/>
  <rect x="200" y="190" width="16" height="16" fill="#E76F51" transform="rotate(45, 208, 198)"/>
  <circle cx="660" cy="490" r="9" fill="#E63946"/>
  <rect x="590" y="510" width="14" height="14" fill="#1D3557"/>
  <polygon points="170,500 186,472 202,500" fill="#E76F51"/>
  <circle cx="260" cy="520" r="7" fill="#000000"/>
  <!-- Thin vertical decorative lines -->
  <line x1="145" y1="60" x2="145" y2="540" stroke="#457B9D" stroke-width="2"/>
  <line x1="730" y1="60" x2="730" y2="540" stroke="#457B9D" stroke-width="2"/>
  <!-- Bottom accent line -->
  <line x1="70" y1="745" x2="730" y2="745" stroke="#000000" stroke-width="3"/>
  <!-- Inner circle detail -->
  <rect x="395" y="275" width="50" height="50" fill="none" stroke="#000000" stroke-width="2" transform="rotate(45, 420, 300)"/>
</svg>