<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Background decorative ring -->
  <circle cx="400" cy="400" r="380" fill="none" stroke="#A8DADC" stroke-width="2" opacity="0.3"/>

  <!-- Outer carousel ring -->
  <circle cx="400" cy="400" r="300" fill="#F4D35E" opacity="0.2"/>
  <circle cx="400" cy="400" r="300" fill="none" stroke="#000000" stroke-width="4"/>

  <!-- Inner ring -->
  <circle cx="400" cy="400" r="200" fill="#A8DADC" opacity="0.25"/>
  <circle cx="400" cy="400" r="200" fill="none" stroke="#333333" stroke-width="3"/>

  <!-- Center hub -->
  <circle cx="400" cy="400" r="60" fill="#E63946"/>
  <circle cx="400" cy="400" r="60" fill="none" stroke="#000000" stroke-width="3"/>
  <circle cx="400" cy="400" r="30" fill="#000000"/>
  <circle cx="400" cy="400" r="10" fill="#F4D35E"/>

  <!-- Radiating division lines (8 sections) -->
  <line x1="400" y1="100" x2="400" y2="700" stroke="#000000" stroke-width="2"/>
  <line x1="100" y1="400" x2="700" y2="400" stroke="#000000" stroke-width="2"/>
  <line x1="188" y1="188" x2="612" y2="612" stroke="#000000" stroke-width="2"/>
  <line x1="612" y1="188" x2="188" y2="612" stroke="#000000" stroke-width="2"/>

  <!-- Colored section fills (alternating in outer ring) -->
  <path d="M 400 100 A 300 300 0 0 1 612 188 L 541 259 A 200 200 0 0 0 400 200 Z" fill="#E63946" opacity="0.4"/>
  <path d="M 612 188 A 300 300 0 0 1 700 400 L 600 400 A 200 200 0 0 0 541 259 Z" fill="#1D3557" opacity="0.4"/>
  <path d="M 700 400 A 300 300 0 0 1 612 612 L 541 541 A 200 200 0 0 0 600 400 Z" fill="#F4D35E" opacity="0.4"/>
  <path d="M 612 612 A 300 300 0 0 1 400 700 L 400 600 A 200 200 0 0 0 541 541 Z" fill="#E76F51" opacity="0.4"/>
  <path d="M 400 700 A 300 300 0 0 1 188 612 L 259 541 A 200 200 0 0 0 400 600 Z" fill="#E63946" opacity="0.3"/>
  <path d="M 188 612 A 300 300 0 0 1 100 400 L 200 400 A 200 200 0 0 0 259 541 Z" fill="#1D3557" opacity="0.3"/>
  <path d="M 100 400 A 300 300 0 0 1 188 188 L 259 259 A 200 200 0 0 0 200 400 Z" fill="#A8DADC" opacity="0.5"/>
  <path d="M 188 188 A 300 300 0 0 1 400 100 L 400 200 A 200 200 0 0 0 259 259 Z" fill="#E76F51" opacity="0.3"/>

  <!-- Geometric horses/animals on poles (simplified shapes) -->
  <!-- Horse 1 - top (triangle body + rectangle head) -->
  <g transform="translate(400, 150)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#333333" stroke-width="3"/>
    <polygon points="-15,-5 15,-5 0,-25" fill="#E63946"/>
    <rect x="-4" y="-30" width="8" height="10" fill="#000000"/>
  </g>

  <!-- Horse 2 - top right -->
  <g transform="translate(570, 210)">
    <line x1="0" y1="0" x2="0" y2="45" stroke="#333333" stroke-width="3"/>
    <rect x="-12" y="-20" width="24" height="16" fill="#1D3557"/>
    <polygon points="12,-20 24,-12 12,-4" fill="#1D3557"/>
  </g>

  <!-- Horse 3 - right -->
  <g transform="translate(650, 400)">
    <line x1="0" y1="0" x2="-50" y2="0" stroke="#333333" stroke-width="3"/>
    <circle cx="0" cy="-12" r="10" fill="#F4D35E"/>
    <rect x="-5" y="-25" width="10" height="8" fill="#000000"/>
  </g>

  <!-- Horse 4 - bottom right -->
  <g transform="translate(570, 575)">
    <line x1="0" y1="0" x2="0" y2="-40" stroke="#333333" stroke-width="3"/>
    <polygon points="-14,5 14,5 0,25" fill="#E76F51"/>
    <rect x="-3" y="25" width="6" height="8" fill="#000000"/>
  </g>

  <!-- Horse 5 - bottom -->
  <g transform="translate(400, 650)">
    <line x1="0" y1="0" x2="0" y2="-50" stroke="#333333" stroke-width="3"/>
    <rect x="-12" y="5" width="24" height="18" fill="#E63946"/>
    <rect x="8" y="0" width="12" height="8" fill="#E63946"/>
  </g>

  <!-- Horse 6 - bottom left -->
  <g transform="translate(230, 575)">
    <line x1="0" y1="0" x2="0" y2="-40" stroke="#333333" stroke-width="3"/>
    <circle cx="0" cy="12" r="12" fill="#1D3557"/>
    <rect x="-14" y="6" width="6" height="10" fill="#000000"/>
  </g>

  <!-- Horse 7 - left -->
  <g transform="translate(150, 400)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#333333" stroke-width="3"/>
    <polygon points="-15,-12 15,-12 0,12" fill="#F4D35E"/>
    <rect x="-18" y="-8" width="6" height="8" fill="#000000"/>
  </g>

  <!-- Horse 8 - top left -->
  <g transform="translate(230, 210)">
    <line x1="0" y1="0" x2="0" y2="45" stroke="#333333" stroke-width="3"/>
    <rect x="-10" y="-18" width="20" height="14" fill="#E76F51"/>
    <polygon points="-10,-18 -20,-10 -10,-4" fill="#E76F51"/>
  </g>

  <!-- Decorative outer dots -->
  <circle cx="400" cy="60" r="8" fill="#000000"/>
  <circle cx="640" cy="120" r="6" fill="#E63946"/>
  <circle cx="740" cy="400" r="8" fill="#1D3557"/>
  <circle cx="640" cy="670" r="6" fill="#F4D35E"/>
  <circle cx="400" cy="740" r="8" fill="#000000"/>
  <circle cx="160" cy="670" r="6" fill="#E76F51"/>
  <circle cx="60" cy="400" r="8" fill="#E63946"/>
  <circle cx="160" cy="120" r="6" fill="#A8DADC"/>

  <!-- Canopy top indicator -->
  <polygon points="390,370 410,370 400,340" fill="#FFFFFF"/>
</svg>