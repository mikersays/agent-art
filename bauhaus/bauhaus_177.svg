<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Zodiac Wheel</title>
  <rect width="800" height="800" fill="#FFF"/>

  <!-- Outer decorative ring -->
  <circle cx="400" cy="400" r="370" fill="none" stroke="#000" stroke-width="6"/>
  <circle cx="400" cy="400" r="350" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Main wheel circle -->
  <circle cx="400" cy="400" r="320" fill="#A8DADC" opacity="0.2" stroke="#000" stroke-width="4"/>

  <!-- Inner circle -->
  <circle cx="400" cy="400" r="150" fill="#F4D35E" opacity="0.3" stroke="#000" stroke-width="3"/>

  <!-- Center circle -->
  <circle cx="400" cy="400" r="50" fill="#E63946" stroke="#000" stroke-width="3"/>
  <circle cx="400" cy="400" r="20" fill="#000"/>

  <!-- 12 division lines (30 degrees each) -->
  <line x1="400" y1="80" x2="400" y2="250" stroke="#000" stroke-width="2"/>
  <line x1="560" y1="124" x2="478" y2="270" stroke="#000" stroke-width="2"/>
  <line x1="676" y1="240" x2="538" y2="325" stroke="#000" stroke-width="2"/>
  <line x1="720" y1="400" x2="550" y2="400" stroke="#000" stroke-width="2"/>
  <line x1="676" y1="560" x2="538" y2="475" stroke="#000" stroke-width="2"/>
  <line x1="560" y1="676" x2="478" y2="530" stroke="#000" stroke-width="2"/>
  <line x1="400" y1="720" x2="400" y2="550" stroke="#000" stroke-width="2"/>
  <line x1="240" y1="676" x2="322" y2="530" stroke="#000" stroke-width="2"/>
  <line x1="124" y1="560" x2="262" y2="475" stroke="#000" stroke-width="2"/>
  <line x1="80" y1="400" x2="250" y2="400" stroke="#000" stroke-width="2"/>
  <line x1="124" y1="240" x2="262" y2="325" stroke="#000" stroke-width="2"/>
  <line x1="240" y1="124" x2="322" y2="270" stroke="#000" stroke-width="2"/>

  <!-- Segment 1 (Aries) - Triangle pointing up -->
  <polygon points="400,110 385,155 415,155" fill="#E63946" stroke="#000" stroke-width="2"/>

  <!-- Segment 2 (Taurus) - Circle -->
  <circle cx="510" cy="150" r="20" fill="#1D3557" stroke="#000" stroke-width="2"/>

  <!-- Segment 3 (Gemini) - Two parallel rectangles -->
  <rect x="600" y="260" width="8" height="35" fill="#F4D35E" stroke="#000" stroke-width="1"/>
  <rect x="618" y="260" width="8" height="35" fill="#F4D35E" stroke="#000" stroke-width="1"/>

  <!-- Segment 4 (Cancer) - Crescent (two overlapping circles) -->
  <circle cx="630" cy="400" r="18" fill="#DDA15E" stroke="#000" stroke-width="2"/>
  <circle cx="640" cy="400" r="14" fill="#FFF" stroke="none"/>

  <!-- Segment 5 (Leo) - Diamond -->
  <polygon points="610,530 595,550 610,570 625,550" fill="#E63946" stroke="#000" stroke-width="2"/>

  <!-- Segment 6 (Virgo) - Cross -->
  <line x1="500" y1="625" x2="500" y2="665" stroke="#1D3557" stroke-width="5"/>
  <line x1="482" y1="645" x2="518" y2="645" stroke="#1D3557" stroke-width="5"/>

  <!-- Segment 7 (Libra) - Horizontal line with triangle -->
  <line x1="380" y1="660" x2="420" y2="660" stroke="#000" stroke-width="3"/>
  <polygon points="400,640 390,655 410,655" fill="#333" stroke="#000" stroke-width="1"/>

  <!-- Segment 8 (Scorpio) - Arrow -->
  <line x1="270" y1="620" x2="310" y2="650" stroke="#E63946" stroke-width="4"/>
  <polygon points="310,650 295,645 305,635" fill="#E63946"/>

  <!-- Segment 9 (Sagittarius) - Chevron -->
  <polyline points="155,520 175,540 155,560" fill="none" stroke="#F4D35E" stroke-width="5"/>

  <!-- Segment 10 (Capricorn) - Square -->
  <rect x="140" y="380" width="30" height="30" fill="#1D3557" stroke="#000" stroke-width="2"/>

  <!-- Segment 11 (Aquarius) - Wavy lines -->
  <path d="M155,270 Q165,260 175,270 Q185,280 195,270" fill="none" stroke="#A8DADC" stroke-width="4"/>
  <path d="M155,285 Q165,275 175,285 Q185,295 195,285" fill="none" stroke="#A8DADC" stroke-width="4"/>

  <!-- Segment 12 (Pisces) - Two arcs -->
  <path d="M290,140 Q275,160 290,180" fill="none" stroke="#DDA15E" stroke-width="4"/>
  <path d="M310,140 Q325,160 310,180" fill="none" stroke="#DDA15E" stroke-width="4"/>
  <line x1="280" y1="160" x2="320" y2="160" stroke="#DDA15E" stroke-width="3"/>

  <!-- Decorative dots on outer ring -->
  <circle cx="400" cy="45" r="8" fill="#000"/>
  <circle cx="577" cy="93" r="8" fill="#E63946"/>
  <circle cx="707" cy="223" r="8" fill="#1D3557"/>
  <circle cx="755" cy="400" r="8" fill="#F4D35E"/>
  <circle cx="707" cy="577" r="8" fill="#DDA15E"/>
  <circle cx="577" cy="707" r="8" fill="#333"/>
  <circle cx="400" cy="755" r="8" fill="#000"/>
  <circle cx="223" cy="707" r="8" fill="#E63946"/>
  <circle cx="93" cy="577" r="8" fill="#1D3557"/>
  <circle cx="45" cy="400" r="8" fill="#F4D35E"/>
  <circle cx="93" cy="223" r="8" fill="#DDA15E"/>
  <circle cx="223" cy="93" r="8" fill="#333"/>

  <!-- Corner accents -->
  <rect x="20" y="20" width="50" height="50" fill="#E63946" opacity="0.6"/>
  <rect x="730" y="20" width="50" height="50" fill="#1D3557" opacity="0.6"/>
  <rect x="20" y="730" width="50" height="50" fill="#F4D35E" opacity="0.6"/>
  <rect x="730" y="730" width="50" height="50" fill="#333" opacity="0.6"/>
</svg>