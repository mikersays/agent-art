<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Background rhythm lines -->
  <g stroke="#A8DADC" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="700" x2="800" y2="700"/>
    <line x1="0" y1="650" x2="800" y2="650"/>
    <line x1="0" y1="600" x2="800" y2="600"/>
  </g>

  <!-- Ground/shelf line -->
  <rect x="0" y="700" width="800" height="100" fill="#A89F91" opacity="0.3"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#000000" stroke-width="2"/>

  <!-- ========== METRONOME 1 - Large, center ========== -->
  <!-- Body (trapezoid/triangle) -->
  <polygon points="350,300 450,300 480,700 320,700" fill="#1D3557" stroke="#000000" stroke-width="2.5"/>
  <!-- Front face highlight -->
  <polygon points="360,320 440,320 465,690 335,690" fill="#457B9D" stroke="none" opacity="0.4"/>
  <!-- Scale plate -->
  <rect x="370" y="400" width="60" height="200" rx="3" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <!-- Tick marks on scale -->
  <line x1="375" y1="420" x2="395" y2="420" stroke="#000000" stroke-width="1.5"/>
  <line x1="375" y1="445" x2="390" y2="445" stroke="#000000" stroke-width="1"/>
  <line x1="375" y1="470" x2="395" y2="470" stroke="#000000" stroke-width="1.5"/>
  <line x1="375" y1="495" x2="390" y2="495" stroke="#000000" stroke-width="1"/>
  <line x1="375" y1="520" x2="395" y2="520" stroke="#000000" stroke-width="1.5"/>
  <line x1="375" y1="545" x2="390" y2="545" stroke="#000000" stroke-width="1"/>
  <line x1="375" y1="570" x2="395" y2="570" stroke="#000000" stroke-width="1.5"/>
  <!-- BPM labels -->
  <text x="398" y="424" font-family="sans-serif" font-size="9" fill="#000000">208</text>
  <text x="398" y="474" font-family="sans-serif" font-size="9" fill="#000000">160</text>
  <text x="398" y="524" font-family="sans-serif" font-size="9" fill="#000000">108</text>
  <text x="398" y="574" font-family="sans-serif" font-size="9" fill="#000000">60</text>
  <!-- Pendulum arm - tilted right -->
  <line x1="400" y1="580" x2="440" y2="320" stroke="#000000" stroke-width="3"/>
  <!-- Pendulum weight -->
  <rect x="425" y="380" width="30" height="18" rx="2" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <!-- Pivot point -->
  <circle cx="400" cy="580" r="5" fill="#000000"/>
  <!-- Winding key -->
  <rect x="390" y="660" width="20" height="30" rx="2" fill="#A89F91" stroke="#000000" stroke-width="1"/>
  <!-- Top finial -->
  <polygon points="390,300 410,300 400,280" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <circle cx="400" cy="278" r="6" fill="#E63946" stroke="#000000" stroke-width="1"/>

  <!-- ========== METRONOME 2 - Left side, smaller ========== -->
  <polygon points="100,450 180,450 200,700 80,700" fill="#E63946" stroke="#000000" stroke-width="2"/>
  <polygon points="108,462 172,462 190,690 90,690" fill="#FFFFFF" stroke="none" opacity="0.2"/>
  <!-- Scale -->
  <rect x="120" y="520" width="40" height="130" rx="2" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <!-- Ticks -->
  <line x1="125" y1="540" x2="140" y2="540" stroke="#000000" stroke-width="1"/>
  <line x1="125" y1="560" x2="135" y2="560" stroke="#000000" stroke-width="0.8"/>
  <line x1="125" y1="580" x2="140" y2="580" stroke="#000000" stroke-width="1"/>
  <line x1="125" y1="600" x2="135" y2="600" stroke="#000000" stroke-width="0.8"/>
  <line x1="125" y1="620" x2="140" y2="620" stroke="#000000" stroke-width="1"/>
  <line x1="125" y1="640" x2="135" y2="640" stroke="#000000" stroke-width="0.8"/>
  <!-- Pendulum - tilted far left -->
  <line x1="140" y1="640" x2="85" y2="470" stroke="#000000" stroke-width="2.5"/>
  <rect x="75" y="510" width="22" height="14" rx="2" fill="#F4D35E" stroke="#000000" stroke-width="1"/>
  <circle cx="140" cy="640" r="4" fill="#000000"/>
  <!-- Top -->
  <polygon points="130,450 150,450 140,435" fill="#1D3557" stroke="#000000" stroke-width="1"/>

  <!-- ========== METRONOME 3 - Right side ========== -->
  <polygon points="600,420 700,420 730,700 570,700" fill="#F4D35E" stroke="#000000" stroke-width="2"/>
  <polygon points="610,435 690,435 718,690 582,690" fill="#000000" stroke="none" opacity="0.1"/>
  <!-- Scale -->
  <rect x="625" y="490" width="50" height="150" rx="2" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <!-- Ticks -->
  <line x1="630" y1="510" x2="648" y2="510" stroke="#000000" stroke-width="1.2"/>
  <line x1="630" y1="535" x2="642" y2="535" stroke="#000000" stroke-width="0.8"/>
  <line x1="630" y1="560" x2="648" y2="560" stroke="#000000" stroke-width="1.2"/>
  <line x1="630" y1="585" x2="642" y2="585" stroke="#000000" stroke-width="0.8"/>
  <line x1="630" y1="610" x2="648" y2="610" stroke="#000000" stroke-width="1.2"/>
  <!-- Pendulum - tilted slightly right -->
  <line x1="650" y1="630" x2="670" y2="440" stroke="#000000" stroke-width="2.5"/>
  <rect x="660" y="490" width="25" height="15" rx="2" fill="#1D3557" stroke="#000000" stroke-width="1"/>
  <circle cx="650" cy="630" r="4" fill="#000000"/>
  <!-- Top -->
  <polygon points="640,420 660,420 650,400" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <circle cx="650" cy="398" r="5" fill="#457B9D" stroke="#000000" stroke-width="1"/>

  <!-- ========== METRONOME 4 - Small, far left ========== -->
  <polygon points="20,550 70,550 85,700 5,700" fill="#457B9D" stroke="#000000" stroke-width="1.5"/>
  <!-- Scale -->
  <rect x="30" y="590" width="30" height="80" rx="1" fill="#F4D35E" stroke="#000000" stroke-width="1"/>
  <!-- Ticks -->
  <line x1="34" y1="605" x2="44" y2="605" stroke="#000000" stroke-width="1"/>
  <line x1="34" y1="625" x2="44" y2="625" stroke="#000000" stroke-width="1"/>
  <line x1="34" y1="645" x2="44" y2="645" stroke="#000000" stroke-width="1"/>
  <!-- Pendulum - center -->
  <line x1="45" y1="660" x2="45" y2="560" stroke="#000000" stroke-width="2"/>
  <rect x="36" y="585" width="18" height="10" rx="1" fill="#E63946" stroke="#000000" stroke-width="1"/>
  <circle cx="45" cy="660" r="3" fill="#000000"/>

  <!-- ========== METRONOME 5 - Small, far right ========== -->
  <polygon points="740,520 790,520 800,700 730,700" fill="#A8DADC" stroke="#000000" stroke-width="1.5"/>
  <rect x="750" y="570" width="25" height="90" rx="1" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <!-- Ticks -->
  <line x1="754" y1="585" x2="764" y2="585" stroke="#000000" stroke-width="1"/>
  <line x1="754" y1="605" x2="764" y2="605" stroke="#000000" stroke-width="1"/>
  <line x1="754" y1="625" x2="764" y2="625" stroke="#000000" stroke-width="1"/>
  <line x1="754" y1="645" x2="764" y2="645" stroke="#000000" stroke-width="1"/>
  <!-- Pendulum - tilted left -->
  <line x1="765" y1="650" x2="745" y2="530" stroke="#000000" stroke-width="2"/>
  <rect x="738" y="565" width="16" height="10" rx="1" fill="#F4D35E" stroke="#000000" stroke-width="1"/>
  <circle cx="765" cy="650" r="3" fill="#000000"/>

  <!-- Motion blur arcs for pendulums -->
  <path d="M 440,320 Q 400,290 360,320" fill="none" stroke="#A89F91" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M 85,470 Q 140,450 195,470" fill="none" stroke="#A89F91" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M 630,440 Q 650,420 670,440" fill="none" stroke="#A89F91" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Ghost pendulum positions (motion indication) -->
  <line x1="400" y1="580" x2="360" y2="320" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <line x1="140" y1="640" x2="195" y2="470" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <line x1="650" y1="630" x2="630" y2="440" stroke="#A89F91" stroke-width="1" opacity="0.3"/>

  <!-- Tempo text -->
  <text x="400" y="760" font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000" text-anchor="middle" letter-spacing="8">TEMPO</text>

  <!-- Decorative musical note fragments -->
  <circle cx="300" cy="200" r="8" fill="#000000"/>
  <line x1="308" y1="200" x2="308" y2="160" stroke="#000000" stroke-width="2"/>
  <line x1="308" y1="160" x2="328" y2="165" stroke="#000000" stroke-width="2"/>

  <circle cx="550" cy="180" r="8" fill="#000000"/>
  <line x1="558" y1="180" x2="558" y2="140" stroke="#000000" stroke-width="2"/>
  <line x1="558" y1="140" x2="578" y2="145" stroke="#000000" stroke-width="2"/>

  <!-- Rhythm dots -->
  <circle cx="200" cy="150" r="5" fill="#E63946"/>
  <circle cx="230" cy="150" r="5" fill="#E63946"/>
  <circle cx="260" cy="150" r="5" fill="#E63946" opacity="0.5"/>
  <circle cx="290" cy="150" r="5" fill="#E63946" opacity="0.5"/>

  <circle cx="500" cy="120" r="5" fill="#1D3557"/>
  <circle cx="530" cy="120" r="5" fill="#1D3557" opacity="0.5"/>
  <circle cx="560" cy="120" r="5" fill="#1D3557"/>
  <circle cx="590" cy="120" r="5" fill="#1D3557" opacity="0.5"/>

  <!-- Time signature -->
  <text x="50" y="120" font-family="serif" font-size="40" font-weight="bold" fill="#000000">4</text>
  <text x="50" y="160" font-family="serif" font-size="40" font-weight="bold" fill="#000000">4</text>
  <line x1="45" y1="125" x2="75" y2="125" stroke="#000000" stroke-width="2"/>

  <!-- Beat markers along bottom -->
  <g fill="#000000">
    <rect x="100" y="720" width="3" height="15"/>
    <rect x="200" y="720" width="3" height="15"/>
    <rect x="300" y="720" width="3" height="15"/>
    <rect x="400" y="720" width="3" height="20"/>
    <rect x="500" y="720" width="3" height="15"/>
    <rect x="600" y="720" width="3" height="15"/>
    <rect x="700" y="720" width="3" height="15"/>
  </g>
</svg>