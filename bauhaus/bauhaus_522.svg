<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#A8DADC" opacity="0.35"/>
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>
  <rect x="0" y="0" width="800" height="800" fill="#A8DADC" opacity="0.3"/>
  <!-- Frame 1 - outermost, blue -->
  <rect x="40" y="50" width="720" height="700" fill="none" stroke="#1D3557" stroke-width="4" transform="rotate(1, 400, 400)"/>
  <!-- Frame 2 - red -->
  <rect x="90" y="95" width="630" height="620" fill="none" stroke="#E63946" stroke-width="3.5" transform="rotate(-1.5, 400, 400)"/>
  <!-- Frame 3 - yellow -->
  <rect x="140" y="140" width="540" height="540" fill="#F4D35E" opacity="0.1" stroke="#F4D35E" stroke-width="3" transform="rotate(2, 410, 405)"/>
  <!-- Frame 4 - teal -->
  <rect x="195" y="190" width="440" height="450" fill="none" stroke="#2A9D8F" stroke-width="3" transform="rotate(-2.5, 400, 400)"/>
  <!-- Frame 5 - cream filled -->
  <rect x="250" y="240" width="340" height="360" fill="#FEFAE0" opacity="0.5" stroke="#000000" stroke-width="2" transform="rotate(1.8, 420, 410)"/>
  <!-- Frame 6 - blue -->
  <rect x="305" y="290" width="240" height="270" fill="none" stroke="#1D3557" stroke-width="2.5" transform="rotate(-3, 420, 415)"/>
  <!-- Frame 7 - red -->
  <rect x="350" y="335" width="160" height="180" fill="none" stroke="#E63946" stroke-width="2" transform="rotate(2.2, 430, 420)"/>
  <!-- Innermost bold red circle -->
  <circle cx="430" cy="420" r="55" fill="#E63946" opacity="0.9"/>
  <circle cx="430" cy="420" r="55" fill="none" stroke="#000000" stroke-width="2"/>
  <!-- Corner circles on Frame 1 -->
  <circle cx="40" cy="50" r="10" fill="#1D3557" opacity="0.7"/>
  <circle cx="760" cy="50" r="10" fill="#1D3557" opacity="0.7"/>
  <circle cx="760" cy="750" r="10" fill="#1D3557" opacity="0.7"/>
  <circle cx="40" cy="750" r="10" fill="#1D3557" opacity="0.7"/>
  <!-- Corner circles on Frame 3 -->
  <circle cx="140" cy="140" r="7" fill="#F4D35E" opacity="0.8"/>
  <circle cx="680" cy="140" r="7" fill="#F4D35E" opacity="0.8"/>
  <circle cx="680" cy="680" r="7" fill="#F4D35E" opacity="0.8"/>
  <circle cx="140" cy="680" r="7" fill="#F4D35E" opacity="0.8"/>
  <!-- Corner circles on Frame 5 -->
  <circle cx="250" cy="240" r="6" fill="#000000" opacity="0.6"/>
  <circle cx="590" cy="240" r="6" fill="#000000" opacity="0.6"/>
  <circle cx="590" cy="600" r="6" fill="#000000" opacity="0.6"/>
  <circle cx="250" cy="600" r="6" fill="#000000" opacity="0.6"/>
  <!-- Accent shapes scattered -->
  <polygon points="70,400 90,380 90,420" fill="#E76F51" opacity="0.7"/>
  <polygon points="730,400 710,380 710,420" fill="#2A9D8F" opacity="0.7"/>
  <rect x="390" y="100" width="20" height="20" fill="#E63946" opacity="0.5" transform="rotate(45, 400, 110)"/>
  <rect x="390" y="700" width="20" height="20" fill="#1D3557" opacity="0.5" transform="rotate(45, 400, 710)"/>
  <!-- Small inner circle highlight -->
  <circle cx="430" cy="420" r="20" fill="#FFFFFF" opacity="0.4"/>
  <!-- Diagonal accent lines -->
  <line x1="40" y1="50" x2="350" y2="335" stroke="#000000" stroke-width="0.8" opacity="0.12"/>
  <line x1="760" y1="750" x2="510" y2="515" stroke="#000000" stroke-width="0.8" opacity="0.12"/>
  <!-- Additional structural elements -->
  <line x1="0" y1="400" x2="250" y2="400" stroke="#A89F91" stroke-width="1" opacity="0.25"/>
  <line x1="590" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="1" opacity="0.25"/>
  <circle cx="430" cy="420" r="80" fill="none" stroke="#E63946" stroke-width="0.8" opacity="0.25"/>
</svg>