<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFF"/>
  <!-- Background quadrants -->
  <rect x="0" y="0" width="400" height="400" fill="#F4D35E" opacity="0.08"/>
  <rect x="400" y="0" width="400" height="400" fill="#1D3557" opacity="0.06"/>
  <rect x="0" y="400" width="400" height="400" fill="#1D3557" opacity="0.06"/>
  <rect x="400" y="400" width="400" height="400" fill="#F4D35E" opacity="0.08"/>
  <!-- Orbital paths -->
  <ellipse cx="400" cy="400" rx="300" ry="120" fill="none" stroke="#1D3557" stroke-width="3" transform="rotate(0 400 400)"/>
  <ellipse cx="400" cy="400" rx="300" ry="120" fill="none" stroke="#E63946" stroke-width="3" transform="rotate(60 400 400)"/>
  <ellipse cx="400" cy="400" rx="300" ry="120" fill="none" stroke="#E76F51" stroke-width="3" transform="rotate(120 400 400)"/>
  <!-- Nucleus - clustered circles -->
  <circle cx="400" cy="400" r="50" fill="#E63946" stroke="#000" stroke-width="3"/>
  <circle cx="380" cy="380" r="25" fill="#1D3557" stroke="#000" stroke-width="2"/>
  <circle cx="420" cy="380" r="25" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <circle cx="400" cy="415" r="25" fill="#E76F51" stroke="#000" stroke-width="2"/>
  <circle cx="385" cy="405" r="15" fill="#DDA15E" stroke="#000" stroke-width="2"/>
  <circle cx="415" cy="395" r="15" fill="#333" stroke="#000" stroke-width="1"/>
  <circle cx="400" cy="380" r="12" fill="#E63946" opacity="0.7"/>
  <!-- Electrons on orbit 1 (horizontal) -->
  <circle cx="700" cy="400" r="14" fill="#1D3557" stroke="#000" stroke-width="2"/>
  <circle cx="100" cy="400" r="14" fill="#1D3557" stroke="#000" stroke-width="2"/>
  <!-- Electrons on orbit 2 (60 degrees) -->
  <circle cx="550" cy="140" r="14" fill="#E63946" stroke="#000" stroke-width="2"/>
  <circle cx="250" cy="660" r="14" fill="#E63946" stroke="#000" stroke-width="2"/>
  <!-- Electrons on orbit 3 (120 degrees) -->
  <circle cx="250" cy="140" r="14" fill="#E76F51" stroke="#000" stroke-width="2"/>
  <circle cx="550" cy="660" r="14" fill="#E76F51" stroke="#000" stroke-width="2"/>
  <!-- Energy rings around nucleus -->
  <circle cx="400" cy="400" r="60" fill="none" stroke="#F4D35E" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="400" cy="400" r="75" fill="none" stroke="#DDA15E" stroke-width="1.5" stroke-dasharray="3,7"/>
  <!-- Corner geometric accents -->
  <rect x="20" y="20" width="60" height="60" fill="#E63946" stroke="#000" stroke-width="2"/>
  <rect x="720" y="20" width="60" height="60" fill="#1D3557" stroke="#000" stroke-width="2"/>
  <rect x="20" y="720" width="60" height="60" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <rect x="720" y="720" width="60" height="60" fill="#E76F51" stroke="#000" stroke-width="2"/>
  <!-- Speed lines on electrons -->
  <line x1="680" y1="395" x2="660" y2="390" stroke="#1D3557" stroke-width="2"/>
  <line x1="120" y1="405" x2="140" y2="410" stroke="#1D3557" stroke-width="2"/>
</svg>