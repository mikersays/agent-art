<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- River band in teal -->
  <rect x="0" y="580" width="800" height="120" fill="#2A9D8F" opacity="0.7"/>
  <rect x="0" y="600" width="800" height="30" fill="#2A9D8F" opacity="0.4"/>
  <rect x="0" y="650" width="800" height="15" fill="#264653" opacity="0.3"/>

  <!-- Support pillars - tall thin rectangles -->
  <rect x="80" y="300" width="30" height="300" fill="#000000"/>
  <rect x="250" y="250" width="30" height="350" fill="#1D3557"/>
  <rect x="520" y="250" width="30" height="350" fill="#1D3557"/>
  <rect x="690" y="300" width="30" height="300" fill="#000000"/>

  <!-- Pillar bases -->
  <rect x="65" y="570" width="60" height="30" fill="#000000"/>
  <rect x="235" y="570" width="60" height="30" fill="#1D3557"/>
  <rect x="505" y="570" width="60" height="30" fill="#1D3557"/>
  <rect x="675" y="570" width="60" height="30" fill="#000000"/>

  <!-- Main arch / bridge span -->
  <path d="M 60 320 Q 400 180 740 320" fill="none" stroke="#1D3557" stroke-width="18"/>
  <path d="M 60 340 Q 400 200 740 340" fill="none" stroke="#000000" stroke-width="8"/>

  <!-- Bridge deck - horizontal span -->
  <rect x="60" y="340" width="680" height="25" fill="#1D3557"/>
  <rect x="60" y="365" width="680" height="8" fill="#000000"/>

  <!-- Arch support triangles -->
  <polygon points="150,340 180,280 210,340" fill="#1D3557" opacity="0.8"/>
  <polygon points="300,340 340,250 380,340" fill="#1D3557" opacity="0.7"/>
  <polygon points="420,340 460,250 500,340" fill="#1D3557" opacity="0.7"/>
  <polygon points="590,340 620,280 650,340" fill="#1D3557" opacity="0.8"/>

  <!-- Red decorative elements along span -->
  <rect x="120" y="345" width="40" height="15" fill="#E63946"/>
  <rect x="280" y="345" width="40" height="15" fill="#E63946"/>
  <rect x="480" y="345" width="40" height="15" fill="#E63946"/>
  <rect x="640" y="345" width="40" height="15" fill="#E63946"/>
  <circle cx="400" cy="352" r="12" fill="#E63946"/>

  <!-- Yellow decorative elements -->
  <circle cx="180" cy="330" r="8" fill="#F4D35E"/>
  <circle cx="340" cy="310" r="10" fill="#F4D35E"/>
  <circle cx="460" cy="310" r="10" fill="#F4D35E"/>
  <circle cx="620" cy="330" r="8" fill="#F4D35E"/>
  <rect x="385" y="295" width="30" height="30" fill="#F4D35E" opacity="0.8"/>

  <!-- Vertical struts between pillars and deck -->
  <line x1="150" y1="340" x2="150" y2="570" stroke="#000000" stroke-width="2"/>
  <line x1="350" y1="340" x2="350" y2="570" stroke="#000000" stroke-width="2"/>
  <line x1="450" y1="340" x2="450" y2="570" stroke="#000000" stroke-width="2"/>
  <line x1="650" y1="340" x2="650" y2="570" stroke="#000000" stroke-width="2"/>

  <!-- Cross bracing -->
  <line x1="80" y1="380" x2="250" y2="540" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="250" y1="380" x2="80" y2="540" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="520" y1="380" x2="690" y2="540" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <line x1="690" y1="380" x2="520" y2="540" stroke="#000000" stroke-width="1.5" opacity="0.5"/>

  <!-- Orange accent on pillar tops -->
  <rect x="75" y="295" width="40" height="10" fill="#E76F51"/>
  <rect x="245" y="245" width="40" height="10" fill="#E76F51"/>
  <rect x="515" y="245" width="40" height="10" fill="#E76F51"/>
  <rect x="685" y="295" width="40" height="10" fill="#E76F51"/>

  <!-- Water ripple lines -->
  <line x1="50" y1="620" x2="200" y2="620" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="300" y1="640" x2="500" y2="640" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="550" y1="660" x2="750" y2="660" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
</svg>