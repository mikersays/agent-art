<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Grid lines -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <!-- Horizontal bands -->
  <rect x="0" y="0" width="800" height="120" fill="#1D3557" opacity="0.85"/>
  <rect x="0" y="120" width="800" height="80" fill="#2A9D8F" opacity="0.6"/>
  <rect x="0" y="200" width="800" height="140" fill="#FEFAE0" opacity="0.5"/>
  <rect x="0" y="340" width="800" height="100" fill="#A89F91" opacity="0.55"/>
  <rect x="0" y="440" width="800" height="130" fill="#1D3557" opacity="0.45"/>
  <rect x="0" y="570" width="800" height="70" fill="#2A9D8F" opacity="0.7"/>
  <rect x="0" y="640" width="800" height="90" fill="#A89F91" opacity="0.4"/>
  <rect x="0" y="730" width="800" height="70" fill="#1D3557" opacity="0.65"/>
  <!-- Thin vertical rhythm lines -->
  <line x1="150" y1="0" x2="150" y2="800" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <line x1="310" y1="0" x2="310" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="460" y1="0" x2="460" y2="800" stroke="#000000" stroke-width="2" opacity="0.18"/>
  <line x1="580" y1="0" x2="580" y2="800" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="690" y1="0" x2="690" y2="800" stroke="#000000" stroke-width="1.5" opacity="0.14"/>
  <!-- Large overlapping circles -->
  <circle cx="250" cy="280" r="110" fill="#E76F51" opacity="0.6"/>
  <circle cx="550" cy="180" r="80" fill="#E9C46A" opacity="0.55"/>
  <circle cx="400" cy="500" r="130" fill="#E63946" opacity="0.35"/>
  <circle cx="650" cy="600" r="95" fill="#E76F51" opacity="0.5"/>
  <circle cx="120" cy="620" r="70" fill="#E9C46A" opacity="0.6"/>
  <!-- Medium circles -->
  <circle cx="700" cy="350" r="55" fill="#F4D35E" opacity="0.65"/>
  <circle cx="80" cy="150" r="45" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="480" cy="700" r="50" fill="#2A9D8F" opacity="0.45"/>
  <!-- Small accent circles -->
  <circle cx="350" cy="100" r="18" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="200" cy="450" r="22" fill="#000000" opacity="0.3"/>
  <circle cx="620" cy="440" r="15" fill="#F4D35E" opacity="0.7"/>
  <circle cx="150" cy="760" r="12" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="750" cy="130" r="20" fill="#E63946" opacity="0.5"/>
  <circle cx="500" cy="370" r="25" fill="#E9C46A" opacity="0.55"/>
  <!-- Horizontal accent bars -->
  <rect x="50" y="395" width="200" height="6" fill="#E63946" opacity="0.7"/>
  <rect x="400" y="255" width="300" height="4" fill="#E76F51" opacity="0.5"/>
  <rect x="300" y="625" width="180" height="5" fill="#000000" opacity="0.25"/>
  <!-- Corner accents -->
  <rect x="760" y="15" width="22" height="22" fill="#E63946" opacity="0.6"/>
  <rect x="15" y="15" width="18" height="18" fill="#F4D35E" opacity="0.7"/>
  <rect x="15" y="765" width="20" height="20" fill="#2A9D8F" opacity="0.55"/>
  <rect x="762" y="762" width="24" height="24" fill="#E76F51" opacity="0.6"/>
</svg>