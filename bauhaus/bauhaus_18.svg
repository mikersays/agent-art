<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Gear 1 - large, left -->
  <circle cx="200" cy="300" r="100" fill="none" stroke="#1D3557" stroke-width="6"/>
  <circle cx="200" cy="300" r="80" fill="none" stroke="#1D3557" stroke-width="3"/>
  <circle cx="200" cy="300" r="30" fill="#1D3557"/>
  <circle cx="200" cy="300" r="15" fill="#FEFAE0"/>
  <!-- Gear teeth -->
  <rect x="185" y="195" width="30" height="20" fill="#1D3557"/>
  <rect x="185" y="385" width="30" height="20" fill="#1D3557"/>
  <rect x="95" y="285" width="20" height="30" fill="#1D3557"/>
  <rect x="285" y="285" width="20" height="30" fill="#1D3557"/>
  <rect x="125" y="215" width="25" height="20" fill="#1D3557" transform="rotate(-45,137,225)"/>
  <rect x="255" y="215" width="25" height="20" fill="#1D3557" transform="rotate(45,267,225)"/>
  <rect x="125" y="365" width="25" height="20" fill="#1D3557" transform="rotate(45,137,375)"/>
  <rect x="255" y="365" width="25" height="20" fill="#1D3557" transform="rotate(-45,267,375)"/>

  <!-- Gear 2 - medium, interlocking -->
  <circle cx="360" cy="220" r="70" fill="none" stroke="#E63946" stroke-width="5"/>
  <circle cx="360" cy="220" r="55" fill="none" stroke="#E63946" stroke-width="2"/>
  <circle cx="360" cy="220" r="22" fill="#E63946"/>
  <circle cx="360" cy="220" r="10" fill="#FEFAE0"/>
  <!-- Teeth -->
  <rect x="348" y="146" width="24" height="16" fill="#E63946"/>
  <rect x="348" y="278" width="24" height="16" fill="#E63946"/>
  <rect x="284" y="208" width="16" height="24" fill="#E63946"/>
  <rect x="420" y="208" width="16" height="24" fill="#E63946"/>
  <rect x="300" y="162" width="20" height="16" fill="#E63946" transform="rotate(-45,310,170)"/>
  <rect x="400" y="162" width="20" height="16" fill="#E63946" transform="rotate(45,410,170)"/>

  <!-- Gear 3 - small, right side -->
  <circle cx="600" cy="350" r="55" fill="none" stroke="#2A9D8F" stroke-width="4"/>
  <circle cx="600" cy="350" r="40" fill="none" stroke="#2A9D8F" stroke-width="2"/>
  <circle cx="600" cy="350" r="18" fill="#2A9D8F"/>
  <circle cx="600" cy="350" r="8" fill="#FEFAE0"/>
  <rect x="590" y="291" width="20" height="14" fill="#2A9D8F"/>
  <rect x="590" y="395" width="20" height="14" fill="#2A9D8F"/>
  <rect x="541" y="340" width="14" height="20" fill="#2A9D8F"/>
  <rect x="645" y="340" width="14" height="20" fill="#2A9D8F"/>

  <!-- Piston 1 - vertical -->
  <rect x="460" y="100" width="40" height="180" fill="#000000"/>
  <rect x="450" y="90" width="60" height="25" fill="#000000"/>
  <rect x="450" y="270" width="60" height="25" fill="#E76F51"/>
  <circle cx="480" cy="102" r="12" fill="#F4D35E"/>

  <!-- Piston 2 - horizontal -->
  <rect x="500" y="480" width="200" height="35" fill="#000000"/>
  <rect x="490" y="470" width="25" height="55" fill="#000000"/>
  <rect x="690" y="470" width="25" height="55" fill="#E63946"/>
  <circle cx="502" cy="497" r="10" fill="#F4D35E"/>

  <!-- Connecting rods -->
  <line x1="200" y1="300" x2="360" y2="220" stroke="#000000" stroke-width="4"/>
  <line x1="360" y1="220" x2="480" y2="270" stroke="#000000" stroke-width="4"/>
  <line x1="480" y1="280" x2="600" y2="350" stroke="#000000" stroke-width="3"/>
  <line x1="600" y1="400" x2="600" y2="480" stroke="#000000" stroke-width="3"/>

  <!-- Belt/chain representation -->
  <path d="M200,400 Q200,500 300,550 Q400,600 500,470" fill="none" stroke="#000000" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- Repeating small mechanical elements - row of rivets -->
  <circle cx="100" cy="600" r="8" fill="#000000"/>
  <circle cx="140" cy="600" r="8" fill="#000000"/>
  <circle cx="180" cy="600" r="8" fill="#000000"/>
  <circle cx="220" cy="600" r="8" fill="#000000"/>
  <circle cx="260" cy="600" r="8" fill="#000000"/>
  <circle cx="300" cy="600" r="8" fill="#000000"/>
  <circle cx="340" cy="600" r="8" fill="#000000"/>

  <!-- Structural beam -->
  <rect x="80" y="580" width="280" height="8" fill="#1D3557"/>
  <rect x="80" y="612" width="280" height="8" fill="#1D3557"/>

  <!-- Gear 4 - bottom right -->
  <circle cx="650" cy="650" r="90" fill="none" stroke="#F4D35E" stroke-width="5"/>
  <circle cx="650" cy="650" r="70" fill="none" stroke="#F4D35E" stroke-width="3"/>
  <circle cx="650" cy="650" r="25" fill="#F4D35E"/>
  <circle cx="650" cy="650" r="12" fill="#FEFAE0"/>
  <rect x="638" y="555" width="24" height="18" fill="#F4D35E"/>
  <rect x="638" y="727" width="24" height="18" fill="#F4D35E"/>
  <rect x="555" y="638" width="18" height="24" fill="#F4D35E"/>
  <rect x="727" y="638" width="18" height="24" fill="#F4D35E"/>

  <!-- Pressure gauge -->
  <circle cx="150" cy="720" r="50" fill="#FFFFFF" stroke="#000000" stroke-width="4"/>
  <circle cx="150" cy="720" r="5" fill="#000000"/>
  <line x1="150" y1="720" x2="175" y2="690" stroke="#E63946" stroke-width="3"/>
  <path d="M110,690 A50,50 0 0,1 190,690" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Steam/smoke lines -->
  <path d="M480,60 Q490,40 500,60 Q510,40 520,60" fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <path d="M475,45 Q485,25 495,45 Q505,25 515,45" fill="none" stroke="#000000" stroke-width="2" opacity="0.3"/>

  <!-- Foundation line -->
  <rect x="0" y="770" width="800" height="30" fill="#000000"/>
</svg>