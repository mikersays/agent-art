  <path d="M500,100 Q570,70 650,100 Q710,140 720,220 Q710,290 660,310 Q600,325 550,290 Q510,240 500,170 Q495,130 500,100Z" fill="none" stroke="#000000" stroke-width="1"/>
  <path d="M530,125 Q585,100 640,120 Q680,150 688,210 Q680,265 645,280 Q600,290 565,265 Q535,230 530,175 Q527,145 530,125Z" fill="none" stroke="#000000" stroke-width="0.8"/>
  <path d="M555,148 Q595,130 630,145 Q658,168 662,205 Q656,242 635,255 Q605,262 578,245 Q556,220 555,180 Q553,160 555,148Z" fill="none" stroke="#000000" stroke-width="0.6"/>

  <!-- Contour lines - water body (bottom left) -->
  <path d="M60,580 Q110,555 190,570 Q260,590 310,620 Q330,660 310,710 Q260,750 180,760 Q100,750 70,710 Q50,670 60,580Z" fill="none" stroke="#1D3557" stroke-width="1"/>
  <path d="M80,600 Q120,580 185,590 Q240,605 280,630 Q295,660 280,695 Q245,730 180,735 Q115,725 90,695 Q72,660 80,600Z" fill="none" stroke="#1D3557" stroke-width="0.8"/>

  <!-- Elevation markers / spot heights -->
  <circle cx="405" cy="320" r="3" fill="#E63946"/>
  <text x="415" y="318" font-family="monospace" font-size="9" fill="#E63946">847</text>
  <circle cx="608" cy="185" r="3" fill="#E63946"/>
  <text x="618" y="183" font-family="monospace" font-size="9" fill="#E63946">612</text>

  <!-- River/stream path -->
  <path d="M420,510 Q400,560 380,590 Q350,630 340,680 Q335,720 340,750" fill="none" stroke="#1D3557" stroke-width="2" stroke-linecap="round"/>

  <!-- Small tributary -->
  <path d="M460,540 Q440,555 420,555 Q405,558 390,575" fill="none" stroke="#1D3557" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Path/road -->
  <path d="M50,400 Q150,390 250,370 Q350,350 450,380 Q550,420 650,380 Q700,360 750,350" fill="none" stroke="#E63946" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Map border frame -->
  <rect x="50" y="50" width="700" height="700" fill="none" stroke="#000000" stroke-width="2.5"/>

  <!-- Corner markers -->
  <line x1="40" y1="50" x2="50" y2="50" stroke="#000000" stroke-width="2"/>
  <line x1="50" y1="40" x2="50" y2="50" stroke="#000000" stroke-width="2"/>
  <line x1="750" y1="40" x2="750" y2="50" stroke="#000000" stroke-width="2"/>
  <line x1="750" y1="50" x2="760" y2="50" stroke="#000000" stroke-width="2"/>
  <line x1="40" y1="750" x2="50" y2="750" stroke="#000000" stroke-width="2"/>
  <line x1="50" y1="750" x2="50" y2="760" stroke="#000000" stroke-width="2"/>
  <line x1="750" y1="750" x2="760" y2="750" stroke="#000000" stroke-width="2"/>
  <line x1="750" y1="750" x2="750" y2="760" stroke="#000000" stroke-width="2"/>

  <!-- Legend box -->
  <rect x="560" y="600" width="170" height="130" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <text x="645" y="618" font-family="monospace" font-size="9" fill="#000000" text-anchor="middle">ELEVATION (m)</text>
  <rect x="572" y="626" width="14" height="10" fill="#1D3557" opacity="0.3"/>
  <text x="594" y="635" font-family="monospace" font-size="8" fill="#000000">0 - 100</text>
  <rect x="572" y="642" width="14" height="10" fill="#457B9D" opacity="0.35"/>
  <text x="594" y="651" font-family="monospace" font-size="8" fill="#000000">100 - 300</text>
  <rect x="572" y="658" width="14" height="10" fill="#F4D35E" opacity="0.4"/>
  <text x="594" y="667" font-family="monospace" font-size="8" fill="#000000">300 - 600</text>
  <rect x="572" y="674" width="14" height="10" fill="#E9C46A" opacity="0.5"/>
  <text x="594" y="683" font-family="monospace" font-size="8" fill="#000000">600 - 800</text>
  <rect x="572" y="690" width="14" height="10" fill="#E63946" opacity="0.6"/>
  <text x="594" y="699" font-family="monospace" font-size="8" fill="#000000">800+</text>
  <line x1="572" y1="710" x2="586" y2="710" stroke="#E63946" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="594" y="714" font-family="monospace" font-size="8" fill="#000000">Road</text>

  <!-- Title block -->
  <text x="400" y="785" font-family="sans-serif" font-size="14" fill="#000000" text-anchor="middle" letter-spacing="4">MAP FRAGMENT</text>
  <text x="400" y="16" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="middle">SECTOR D4 // BAUHAUS TOPOGRAPHIC SURVEY</text>
</svg>