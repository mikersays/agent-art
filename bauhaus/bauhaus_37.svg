  <line x1="550" y1="50" x2="550" y2="750" stroke="#A89F91" stroke-width="0.5"/>
  <line x1="650" y1="50" x2="650" y2="750" stroke="#A89F91" stroke-width="0.5"/>
  <line x1="750" y1="50" x2="750" y2="750" stroke="#A89F91" stroke-width="0.5"/>
  <!-- Horizontal grid lines -->
