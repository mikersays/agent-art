  <path d="M250,220 Q320,160 420,190 Q530,230 550,370 Q540,480 470,510 Q370,530 290,490 Q210,430 200,340 Q195,270 250,220Z" fill="none" stroke="#000000" stroke-width="1.2"/>
  <path d="M280,250 Q340,200 430,220 Q510,260 525,370 Q515,460 455,490 Q370,505 305,470 Q240,420 230,340 Q228,285 280,250Z" fill="none" stroke="#000000" stroke-width="1"/>
  <path d="M310,275 Q365,235 435,255 Q490,290 500,370 Q492,440 445,465 Q375,478 325,450 Q275,410 265,345 Q262,300 310,275Z" fill="none" stroke="#000000" stroke-width="0.8"/>
  <path d="M340,300 Q385,270 435,285 Q470,310 478,365 Q472,420 440,440 Q390,452 350,430 Q315,400 308,350 Q305,320 340,300Z" fill="none" stroke="#000000" stroke-width="0.7"/>
  <path d="M365,315 Q395,295 428,308 Q452,330 456,360 Q452,400 432,415 Q400,425 375,412 Q348,390 345,355 Q343,330 365,315Z" fill="none" stroke="#000000" stroke-width="0.6"/>

