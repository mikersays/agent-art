  <line x1="50" y1="450" x2="750" y2="450" stroke="#A89F91" stroke-width="0.5"/>
  <line x1="50" y1="550" x2="750" y2="550" stroke="#A89F91" stroke-width="0.5"/>
  <line x1="50" y1="650" x2="750" y2="650" stroke="#A89F91" stroke-width="0.5"/>
  <line x1="50" y1="750" x2="750" y2="750" stroke="#A89F91" stroke-width="0.5"/>

  <!-- Grid coordinate labels -->
  <text x="50" y="40" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="middle">A</text>
  <text x="150" y="40" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="middle">B</text>
  <text x="250" y="40" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="middle">C</text>
  <text x="350" y="40" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="middle">D</text>
  <text x="450" y="40" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="middle">E</text>
  <text x="550" y="40" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="middle">F</text>
  <text x="650" y="40" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="middle">G</text>
  <text x="750" y="40" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="middle">H</text>
  <text x="35" y="54" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="end">1</text>
  <text x="35" y="154" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="end">2</text>
  <text x="35" y="254" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="end">3</text>
  <text x="35" y="354" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="end">4</text>
  <text x="35" y="454" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="end">5</text>
  <text x="35" y="554" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="end">6</text>
  <text x="35" y="654" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="end">7</text>
  <text x="35" y="754" font-family="monospace" font-size="10" fill="#A89F91" text-anchor="end">8</text>

