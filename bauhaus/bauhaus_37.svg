  <path d="M520,120 Q580,90 640,110 Q690,140 700,200 Q690,260 650,280 Q600,290 560,260 Q530,220 520,170 Q515,140 520,120Z" fill="#457B9D" opacity="0.3"/>
  <path d="M560,140 Q600,120 635,140 Q660,170 655,210 Q640,240 610,248 Q580,245 560,220 Q545,190 560,140Z" fill="#F4D35E" opacity="0.4"/>
  <path d="M585,165 Q610,150 628,168 Q638,190 630,210 Q615,222 600,215 Q585,200 585,165Z" fill="#E63946" opacity="0.5"/>

