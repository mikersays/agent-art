<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- 5x5 Grid lines - vertical -->
  <line x1="160" y1="80" x2="160" y2="720" stroke="#000000" stroke-width="2" opacity="0.7"/>
  <line x1="288" y1="80" x2="288" y2="720" stroke="#000000" stroke-width="2" opacity="0.7"/>
  <line x1="416" y1="80" x2="416" y2="720" stroke="#000000" stroke-width="2" opacity="0.7"/>
  <line x1="544" y1="80" x2="544" y2="720" stroke="#000000" stroke-width="2" opacity="0.7"/>
  <line x1="672" y1="80" x2="672" y2="720" stroke="#000000" stroke-width="2" opacity="0.7"/>
  <!-- 5x5 Grid lines - horizontal -->
  <line x1="80" y1="80" x2="752" y2="80" stroke="#000000" stroke-width="2" opacity="0.7"/>
  <line x1="80" y1="208" x2="752" y2="208" stroke="#000000" stroke-width="2" opacity="0.7"/>
  <line x1="80" y1="336" x2="752" y2="336" stroke="#000000" stroke-width="2" opacity="0.7"/>
  <line x1="80" y1="464" x2="752" y2="464" stroke="#000000" stroke-width="2" opacity="0.7"/>
  <line x1="80" y1="592" x2="752" y2="592" stroke="#000000" stroke-width="2" opacity="0.7"/>
  <line x1="80" y1="720" x2="752" y2="720" stroke="#000000" stroke-width="2" opacity="0.7"/>
  <!-- Left and right border lines -->
  <line x1="80" y1="80" x2="80" y2="720" stroke="#000000" stroke-width="2" opacity="0.7"/>
  <line x1="752" y1="80" x2="752" y2="720" stroke="#000000" stroke-width="2" opacity="0.7"/>
  <!-- Filled cells - sparse top-left, dense bottom-right -->
  <!-- Row 1 (y=80-208): mostly empty -->
  <rect x="544" y="80" width="128" height="128" fill="#1D3557" opacity="0.8"/>
  <!-- Row 2 (y=208-336) -->
  <rect x="416" y="208" width="128" height="128" fill="#F4D35E" opacity="0.85"/>
  <rect x="672" y="208" width="80" height="128" fill="#2A9D8F" opacity="0.6"/>
  <!-- Row 3 (y=336-464) -->
  <rect x="288" y="336" width="128" height="128" fill="#E63946" opacity="0.8"/>
  <rect x="544" y="336" width="128" height="128" fill="#F4D35E" opacity="0.7"/>
  <!-- Row 4 (y=464-592) -->
  <rect x="288" y="464" width="128" height="128" fill="#2A9D8F" opacity="0.75"/>
  <rect x="416" y="464" width="128" height="128" fill="#1D3557" opacity="0.85"/>
  <rect x="672" y="464" width="80" height="128" fill="#E63946" opacity="0.7"/>
  <!-- Row 5 (y=592-720) -->
  <rect x="160" y="592" width="128" height="128" fill="#E76F51" opacity="0.7"/>
  <rect x="416" y="592" width="128" height="128" fill="#E63946" opacity="0.9"/>
  <rect x="544" y="592" width="128" height="128" fill="#1D3557" opacity="0.85"/>
  <rect x="672" y="592" width="80" height="128" fill="#F4D35E" opacity="0.8"/>
  <!-- Inscribed circles in some cells -->
  <circle cx="144" cy="144" r="50" fill="none" stroke="#457B9D" stroke-width="2" opacity="0.5"/>
  <circle cx="480" cy="144" r="50" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.4"/>
  <circle cx="608" cy="272" r="50" fill="none" stroke="#FEFAE0" stroke-width="2" opacity="0.6"/>
  <circle cx="352" cy="528" r="50" fill="none" stroke="#FEFAE0" stroke-width="2" opacity="0.5"/>
  <circle cx="608" cy="656" r="50" fill="none" stroke="#FEFAE0" stroke-width="2" opacity="0.5"/>
  <circle cx="224" cy="400" r="50" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.4"/>
  <!-- Diagonal lines in some cells -->
  <line x1="80" y1="208" x2="160" y2="336" stroke="#000000" stroke-width="1.5" opacity="0.35"/>
  <line x1="160" y1="336" x2="288" y2="464" stroke="#000000" stroke-width="1.5" opacity="0.35"/>
  <line x1="544" y1="464" x2="672" y2="592" stroke="#FEFAE0" stroke-width="1.5" opacity="0.4"/>
  <line x1="672" y1="80" x2="752" y2="208" stroke="#FEFAE0" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="592" x2="160" y2="720" stroke="#DDA15E" stroke-width="1.5" opacity="0.5"/>
  <line x1="288" y1="208" x2="416" y2="336" stroke="#6D2E46" stroke-width="1.5" opacity="0.3"/>
  <!-- Small corner accent dots -->
  <circle cx="160" cy="208" r="5" fill="#000000" opacity="0.6"/>
  <circle cx="416" cy="336" r="5" fill="#000000" opacity="0.6"/>
  <circle cx="544" cy="592" r="5" fill="#FEFAE0" opacity="0.7"/>
  <circle cx="288" cy="464" r="5" fill="#000000" opacity="0.6"/>
  <circle cx="672" cy="720" r="5" fill="#000000" opacity="0.6"/>
</svg>