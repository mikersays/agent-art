<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Dark background -->
  <rect x="0" y="0" width="800" height="800" fill="#1D3557"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#264653" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#264653" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#264653" stroke-width="0.5" opacity="0.15"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#264653" stroke-width="0.5" opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#264653" stroke-width="0.5" opacity="0.15"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#264653" stroke-width="0.5" opacity="0.15"/>

  <!-- Incoming light lines from left -->
  <line x1="0" y1="370" x2="220" y2="400" stroke="#FEFAE0" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="380" x2="220" y2="400" stroke="#FEFAE0" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="390" x2="220" y2="400" stroke="#FEFAE0" stroke-width="2" opacity="0.7"/>
  <line x1="0" y1="400" x2="220" y2="400" stroke="#FFFFFF" stroke-width="3" opacity="0.9"/>
  <line x1="0" y1="410" x2="220" y2="400" stroke="#FEFAE0" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="420" x2="220" y2="400" stroke="#FEFAE0" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="430" x2="220" y2="400" stroke="#FEFAE0" stroke-width="2" opacity="0.4"/>

  <!-- Central prism triangle -->
  <polygon points="220,250 220,550 400,400" fill="#000000" stroke="#FFFFFF" stroke-width="2" opacity="0.85"/>
  <!-- Prism inner highlight -->
  <polygon points="240,290 240,510 370,400" fill="#264653" opacity="0.4"/>
  <!-- Prism edge accent -->
  <line x1="220" y1="250" x2="400" y2="400" stroke="#A8DADC" stroke-width="1" opacity="0.6"/>
  <line x1="220" y1="550" x2="400" y2="400" stroke="#A8DADC" stroke-width="1" opacity="0.6"/>

  <!-- Fanning colored bands from prism right side -->
  <!-- Band 1 - Red -->
  <line x1="400" y1="400" x2="720" y2="200" stroke="#E63946" stroke-width="4" opacity="0.9"/>
  <circle cx="720" cy="200" r="18" fill="#E63946" opacity="0.85"/>

  <!-- Band 2 - Orange -->
  <line x1="400" y1="400" x2="730" y2="270" stroke="#E76F51" stroke-width="4" opacity="0.85"/>
  <circle cx="730" cy="270" r="15" fill="#E76F51" opacity="0.8"/>

  <!-- Band 3 - Yellow -->
  <line x1="400" y1="400" x2="740" y2="340" stroke="#F4D35E" stroke-width="4" opacity="0.9"/>
  <circle cx="740" cy="340" r="16" fill="#F4D35E" opacity="0.85"/>

  <!-- Band 4 - Coral -->
  <line x1="400" y1="400" x2="735" y2="400" stroke="#E9C46A" stroke-width="3.5" opacity="0.8"/>
  <circle cx="735" cy="400" r="14" fill="#E9C46A" opacity="0.8"/>

  <!-- Band 5 - Teal -->
  <line x1="400" y1="400" x2="740" y2="460" stroke="#2A9D8F" stroke-width="4" opacity="0.85"/>
  <circle cx="740" cy="460" r="15" fill="#2A9D8F" opacity="0.85"/>

  <!-- Band 6 - Steel Blue -->
  <line x1="400" y1="400" x2="730" y2="530" stroke="#457B9D" stroke-width="4" opacity="0.85"/>
  <circle cx="730" cy="530" r="16" fill="#457B9D" opacity="0.8"/>

  <!-- Band 7 - Light Blue -->
  <line x1="400" y1="400" x2="720" y2="600" stroke="#A8DADC" stroke-width="4" opacity="0.9"/>
  <circle cx="720" cy="600" r="18" fill="#A8DADC" opacity="0.85"/>

  <!-- Secondary refraction lines (thinner, between main bands) -->
  <line x1="400" y1="400" x2="700" y2="235" stroke="#E63946" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="400" x2="710" y2="305" stroke="#E76F51" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="400" x2="715" y2="370" stroke="#F4D35E" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="400" x2="715" y2="430" stroke="#2A9D8F" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="400" x2="710" y2="495" stroke="#457B9D" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="400" x2="700" y2="565" stroke="#A8DADC" stroke-width="1" opacity="0.3"/>

  <!-- Small decorative shapes -->
  <rect x="50" y="100" width="12" height="12" fill="#E63946" opacity="0.3" transform="rotate(45 56 106)"/>
  <rect x="50" y="680" width="12" height="12" fill="#457B9D" opacity="0.3" transform="rotate(45 56 686)"/>
  <circle cx="750" cy="100" r="6" fill="#F4D35E" opacity="0.3"/>
  <circle cx="750" cy="700" r="6" fill="#2A9D8F" opacity="0.3"/>

  <!-- Accent dots along bottom -->
  <circle cx="300" cy="720" r="4" fill="#E63946" opacity="0.25"/>
  <circle cx="400" cy="720" r="4" fill="#F4D35E" opacity="0.25"/>
  <circle cx="500" cy="720" r="4" fill="#2A9D8F" opacity="0.25"/>
  <circle cx="600" cy="720" r="4" fill="#A8DADC" opacity="0.25"/>

  <!-- Glow effect behind prism -->
  <circle cx="310" cy="400" r="80" fill="#FFFFFF" opacity="0.04"/>
  <circle cx="310" cy="400" r="50" fill="#FFFFFF" opacity="0.06"/>
</svg>