<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Concentric rings at low opacity in background -->
  <circle cx="400" cy="400" r="380" fill="none" stroke="#A89F91" stroke-width="1" opacity="0.08"/>
  <circle cx="400" cy="400" r="320" fill="none" stroke="#A89F91" stroke-width="1" opacity="0.1"/>
  <circle cx="400" cy="400" r="260" fill="none" stroke="#A89F91" stroke-width="0.8" opacity="0.1"/>
  <circle cx="400" cy="400" r="200" fill="none" stroke="#A89F91" stroke-width="0.8" opacity="0.12"/>
  <circle cx="400" cy="400" r="140" fill="none" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <circle cx="400" cy="400" r="80" fill="none" stroke="#A89F91" stroke-width="0.5" opacity="0.08"/>
  <!-- Thin structural lines -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.8" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.8" opacity="0.1"/>
  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <!-- Dominant blue rectangle - slightly rotated for dynamism -->
  <rect x="120" y="200" width="320" height="420" fill="#1D3557" opacity="0.9"/>
  <!-- Bold red circle - overlapping the rectangle -->
  <circle cx="520" cy="320" r="160" fill="#E63946" opacity="0.85"/>
  <!-- Yellow triangle - the third Bauhaus fundamental -->
  <polygon points="500,680 650,400 800,680" fill="#F4D35E" opacity="0.8"/>
  <!-- Overlap accent - circle on rectangle -->
  <rect x="360" y="200" width="80" height="280" fill="#6D2E46" opacity="0.35"/>
  <!-- Black anchor lines -->
  <line x1="120" y1="200" x2="440" y2="200" stroke="#000000" stroke-width="3" opacity="0.9"/>
  <line x1="120" y1="620" x2="440" y2="620" stroke="#000000" stroke-width="3" opacity="0.9"/>
  <line x1="120" y1="200" x2="120" y2="620" stroke="#000000" stroke-width="3" opacity="0.9"/>
  <line x1="440" y1="200" x2="440" y2="620" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <!-- Supporting accent shapes -->
  <circle cx="180" cy="150" r="18" fill="#2A9D8F" opacity="0.7"/>
  <circle cx="680" cy="200" r="12" fill="#E76F51" opacity="0.65"/>
  <rect x="60" y="680" width="50" height="50" fill="#457B9D" opacity="0.55"/>
  <rect x="560" y="100" width="40" height="12" fill="#000000" opacity="0.5"/>
  <rect x="620" y="720" width="60" height="10" fill="#1D3557" opacity="0.4"/>
  <!-- Small scattered elements for texture -->
  <circle cx="90" cy="100" r="6" fill="#E63946" opacity="0.4"/>
  <circle cx="750" cy="750" r="8" fill="#F4D35E" opacity="0.5"/>
  <circle cx="300" cy="700" r="5" fill="#000000" opacity="0.35"/>
  <rect x="700" y="350" width="12" height="12" fill="#2A9D8F" opacity="0.45"/>
  <rect x="50" y="450" width="8" height="40" fill="#DDA15E" opacity="0.35"/>
  <!-- Thin horizontal rhythm lines -->
  <line x1="500" y1="680" x2="800" y2="680" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="0" y1="150" x2="100" y2="150" stroke="#457B9D" stroke-width="1.5" opacity="0.3"/>
  <line x1="650" y1="400" x2="750" y2="400" stroke="#E63946" stroke-width="1" opacity="0.25"/>
  <!-- Arc element -->
  <path d="M 520 160 A 160 160 0 0 1 680 320" fill="none" stroke="#000000" stroke-width="2" opacity="0.3"/>
  <!-- Corner frame accents -->
  <rect x="0" y="0" width="20" height="4" fill="#000000" opacity="0.3"/>
  <rect x="0" y="0" width="4" height="20" fill="#000000" opacity="0.3"/>
  <rect x="780" y="796" width="20" height="4" fill="#000000" opacity="0.3"/>
  <rect x="796" y="780" width="4" height="20" fill="#000000" opacity="0.3"/>
  <!-- Final small highlights -->
  <circle cx="280" cy="410" r="25" fill="#F4D35E" opacity="0.25"/>
  <circle cx="520" cy="320" r="40" fill="#FEFAE0" opacity="0.15"/>
</svg>