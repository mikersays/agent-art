<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>

  <!-- Dominant large yellow rectangle -->
  <rect x="50" y="120" width="500" height="400" fill="#F4D35E" opacity="0.9"/>

  <!-- Large blue block overlapping -->
  <rect x="400" y="80" width="320" height="280" fill="#1D3557" opacity="0.85"/>

  <!-- Red block -->
  <rect x="30" y="450" width="280" height="250" fill="#E63946" opacity="0.8"/>

  <!-- Teal block -->
  <rect x="500" y="400" width="250" height="300" fill="#2A9D8F" opacity="0.75"/>

  <!-- Forest block overlapping bottom right -->
  <rect x="350" y="550" width="200" height="200" fill="#264653" opacity="0.8"/>

  <!-- Thin black separator lines -->
  <line x1="50" y1="120" x2="550" y2="120" stroke="#000000" stroke-width="1.5"/>
  <line x1="50" y1="520" x2="550" y2="520" stroke="#000000" stroke-width="1.5"/>
  <line x1="50" y1="120" x2="50" y2="520" stroke="#000000" stroke-width="1.5"/>
  <line x1="550" y1="120" x2="550" y2="520" stroke="#000000" stroke-width="1.5"/>
  <line x1="400" y1="80" x2="400" y2="520" stroke="#000000" stroke-width="1"/>
  <line x1="400" y1="80" x2="720" y2="80" stroke="#000000" stroke-width="1.5"/>
  <line x1="720" y1="80" x2="720" y2="360" stroke="#000000" stroke-width="1.5"/>
  <line x1="400" y1="360" x2="720" y2="360" stroke="#000000" stroke-width="1"/>
  <line x1="30" y1="450" x2="310" y2="450" stroke="#000000" stroke-width="1"/>
  <line x1="30" y1="700" x2="310" y2="700" stroke="#000000" stroke-width="1"/>
  <line x1="500" y1="400" x2="750" y2="400" stroke="#000000" stroke-width="1"/>
  <line x1="500" y1="700" x2="750" y2="700" stroke="#000000" stroke-width="1"/>

  <!-- Small accent circles in burgundy -->
  <circle cx="400" cy="120" r="8" fill="#6D2E46"/>
  <circle cx="50" cy="520" r="8" fill="#6D2E46"/>
  <circle cx="550" cy="520" r="6" fill="#6D2E46"/>
  <circle cx="310" cy="450" r="7" fill="#6D2E46"/>

  <!-- Small accent circles in orange -->
  <circle cx="720" cy="80" r="8" fill="#E76F51"/>
  <circle cx="720" cy="360" r="7" fill="#E76F51"/>
  <circle cx="500" cy="700" r="6" fill="#E76F51"/>
  <circle cx="750" cy="400" r="7" fill="#E76F51"/>

  <!-- Subtle overlap accent - steel blue -->
  <rect x="400" y="120" width="150" height="240" fill="#457B9D" opacity="0.25"/>

  <!-- Sand colored subtle shape -->
  <rect x="30" y="700" width="320" height="60" fill="#DDA15E" opacity="0.5"/>

  <!-- Light blue accent strip -->
  <rect x="550" y="360" width="170" height="40" fill="#A8DADC" opacity="0.6"/>

  <!-- Warm gray balancing element -->
  <rect x="600" y="710" width="150" height="50" fill="#A89F91" opacity="0.6"/>

  <!-- Corner accents -->
  <rect x="0" y="0" width="30" height="30" fill="#000000" opacity="0.1"/>
  <rect x="770" y="0" width="30" height="30" fill="#000000" opacity="0.1"/>
  <rect x="0" y="770" width="30" height="30" fill="#000000" opacity="0.1"/>
  <rect x="770" y="770" width="30" height="30" fill="#000000" opacity="0.1"/>
</svg>