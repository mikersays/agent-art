<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background - Light blue -->
  <rect width="800" height="800" fill="#A8DADC"/>
  <!-- Subtle grid -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <!-- Large dominant triangle - Blue -->
  <polygon points="150,180 450,180 300,480" fill="#1D3557" opacity="0.85"/>
  <!-- Large hexagon - Red -->
  <polygon points="600,300 660,250 720,300 720,400 660,450 600,400" fill="#E63946" opacity="0.8" stroke="#000000" stroke-width="2"/>
  <!-- Medium triangle - Yellow -->
  <polygon points="500,550 620,700 380,700" fill="#F4D35E" opacity="0.85"/>
  <!-- Medium pentagon - Blue -->
  <polygon points="130,600 170,560 220,580 210,630 150,640" fill="#1D3557" opacity="0.7" stroke="#000000" stroke-width="1.5"/>
  <!-- Small triangle - Red, rotated -->
  <polygon points="680,100 740,180 620,180" fill="#E63946" opacity="0.75"/>
  <!-- Small hexagon - Teal -->
  <polygon points="80,100 110,80 140,100 140,140 110,160 80,140" fill="#2A9D8F" opacity="0.8"/>
  <!-- Medium triangle - Forest -->
  <polygon points="550,80 620,200 480,200" fill="#264653" opacity="0.7"/>
  <!-- Small pentagon - Orange -->
  <polygon points="720,550 750,530 780,550 770,580 730,580" fill="#E76F51" opacity="0.8" stroke="#000000" stroke-width="1.5"/>
  <!-- Small triangle - Yellow -->
  <polygon points="60,350 110,430 10,430" fill="#F4D35E" opacity="0.7"/>
  <!-- Tiny hexagons scattered -->
  <polygon points="330,100 345,90 360,100 360,120 345,130 330,120" fill="#E63946" opacity="0.6"/>
  <polygon points="700,680 715,670 730,680 730,700 715,710 700,700" fill="#1D3557" opacity="0.7"/>
  <polygon points="200,480 215,470 230,480 230,500 215,510 200,500" fill="#F4D35E" opacity="0.75"/>
  <!-- Small triangles scattered -->
  <polygon points="450,400 480,450 420,450" fill="#E63946" opacity="0.6"/>
  <polygon points="100,750 130,780 70,780" fill="#1D3557" opacity="0.5"/>
  <polygon points="350,350 370,380 330,380" fill="#2A9D8F" opacity="0.65"/>
  <polygon points="750,400 770,440 730,440" fill="#F4D35E" opacity="0.7"/>
  <!-- Medium pentagon - Red with outline -->
  <polygon points="400,250 440,220 470,260 450,300 410,290" fill="#E63946" opacity="0.65" stroke="#000000" stroke-width="1"/>
  <!-- Large triangle outline only -->
  <polygon points="250,650 350,500 450,650" fill="none" stroke="#1D3557" stroke-width="3" opacity="0.4"/>
  <!-- Small scattered pentagons -->
  <polygon points="580,480 600,465 620,480 615,505 585,505" fill="#E76F51" opacity="0.6"/>
  <polygon points="50,500 70,485 90,500 85,525 55,525" fill="#F4D35E" opacity="0.65"/>
  <!-- Additional small shapes for texture -->
  <polygon points="310,720 325,700 340,720" fill="#000000" opacity="0.35"/>
  <polygon points="650,600 665,585 680,600 680,620 665,635 650,620" fill="#E9C46A" opacity="0.6"/>
  <polygon points="480,650 500,635 520,650 515,675 485,675" fill="#457B9D" opacity="0.55"/>
  <!-- Corner accents -->
  <rect x="0" y="0" width="20" height="20" fill="#1D3557" opacity="0.4"/>
  <rect x="780" y="0" width="20" height="20" fill="#E63946" opacity="0.4"/>
  <rect x="0" y="780" width="20" height="20" fill="#F4D35E" opacity="0.4"/>
  <rect x="780" y="780" width="20" height="20" fill="#264653" opacity="0.4"/>
  <!-- A few circles as contrast to angular shapes -->
  <circle cx="500" cy="350" r="12" fill="#000000" opacity="0.3"/>
  <circle cx="300" cy="600" r="10" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="660" cy="350" r="8" fill="#FFFFFF" opacity="0.7"/>
</svg>