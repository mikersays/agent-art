<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Warm gray background -->
  <rect x="0" y="0" width="800" height="800" fill="#A89F91"/>

  <!-- Background texture rectangles -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0" opacity="0.3"/>

  <!-- Horizontal scaffold lines -->
  <line x1="40" y1="80" x2="760" y2="80" stroke="#000000" stroke-width="4" opacity="0.7"/>
  <line x1="40" y1="180" x2="760" y2="180" stroke="#1D3557" stroke-width="3" opacity="0.65"/>
  <line x1="40" y1="280" x2="760" y2="280" stroke="#000000" stroke-width="4" opacity="0.7"/>
  <line x1="40" y1="380" x2="760" y2="380" stroke="#1D3557" stroke-width="3" opacity="0.65"/>
  <line x1="40" y1="480" x2="760" y2="480" stroke="#000000" stroke-width="4" opacity="0.7"/>
  <line x1="40" y1="580" x2="760" y2="580" stroke="#1D3557" stroke-width="3" opacity="0.65"/>
  <line x1="40" y1="680" x2="760" y2="680" stroke="#000000" stroke-width="4" opacity="0.7"/>

  <!-- Vertical scaffold lines -->
  <line x1="100" y1="40" x2="100" y2="760" stroke="#1D3557" stroke-width="3" opacity="0.55"/>
  <line x1="250" y1="40" x2="250" y2="760" stroke="#000000" stroke-width="3" opacity="0.6"/>
  <line x1="400" y1="40" x2="400" y2="760" stroke="#1D3557" stroke-width="3.5" opacity="0.55"/>
  <line x1="550" y1="40" x2="550" y2="760" stroke="#000000" stroke-width="3" opacity="0.6"/>
  <line x1="700" y1="40" x2="700" y2="760" stroke="#1D3557" stroke-width="3" opacity="0.55"/>

  <!-- Diagonal cross braces -->
  <line x1="100" y1="80" x2="250" y2="180" stroke="#457B9D" stroke-width="1.5" opacity="0.5"/>
  <line x1="250" y1="280" x2="400" y2="380" stroke="#457B9D" stroke-width="1.5" opacity="0.5"/>
  <line x1="550" y1="480" x2="700" y2="580" stroke="#457B9D" stroke-width="1.5" opacity="0.5"/>
  <line x1="400" y1="580" x2="550" y2="680" stroke="#457B9D" stroke-width="1.5" opacity="0.5"/>

  <!-- Hanging red rectangle from top bar -->
  <rect x="140" y="80" width="60" height="90" fill="#E63946" opacity="0.85"/>

  <!-- Yellow circle resting on second bar -->
  <circle cx="550" cy="145" r="35" fill="#F4D35E" opacity="0.9"/>

  <!-- Red circle hanging from third bar -->
  <circle cx="330" cy="310" r="28" fill="#E63946" opacity="0.8"/>

  <!-- Yellow rectangle resting on fourth bar -->
  <rect x="580" y="340" width="80" height="40" fill="#F4D35E" opacity="0.85"/>

  <!-- Large blue rectangle resting on fifth bar -->
  <rect x="120" y="420" width="100" height="55" fill="#1D3557" opacity="0.75"/>

  <!-- Orange circle hanging from fifth bar -->
  <circle cx="680" cy="510" r="25" fill="#E76F51" opacity="0.85"/>

  <!-- Teal rectangle on sixth bar -->
  <rect x="280" y="540" width="70" height="40" fill="#2A9D8F" opacity="0.8"/>

  <!-- Yellow triangle hanging from bar -->
  <polygon points="460,480 430,545 490,545" fill="#F4D35E" opacity="0.85"/>

  <!-- Red rectangle on bottom bar -->
  <rect x="500" y="635" width="90" height="45" fill="#E63946" opacity="0.8"/>

  <!-- Small accent circles at intersections -->
  <circle cx="100" cy="80" r="6" fill="#000000" opacity="0.7"/>
  <circle cx="250" cy="180" r="6" fill="#000000" opacity="0.7"/>
  <circle cx="400" cy="280" r="6" fill="#000000" opacity="0.7"/>
  <circle cx="550" cy="380" r="6" fill="#000000" opacity="0.7"/>
  <circle cx="700" cy="480" r="6" fill="#000000" opacity="0.7"/>
  <circle cx="100" cy="580" r="6" fill="#000000" opacity="0.7"/>
  <circle cx="250" cy="680" r="6" fill="#000000" opacity="0.7"/>

  <!-- Small warm gray squares as bolts/joints -->
  <rect x="396" y="76" width="8" height="8" fill="#FEFAE0" opacity="0.6"/>
  <rect x="696" y="176" width="8" height="8" fill="#FEFAE0" opacity="0.6"/>
  <rect x="96" y="376" width="8" height="8" fill="#FEFAE0" opacity="0.6"/>
  <rect x="546" y="576" width="8" height="8" fill="#FEFAE0" opacity="0.6"/>

  <!-- Burgundy accent rectangle -->
  <rect x="650" y="220" width="40" height="55" fill="#6D2E46" opacity="0.65"/>

  <!-- Sand colored circle -->
  <circle cx="170" cy="640" r="22" fill="#DDA15E" opacity="0.75"/>
</svg>