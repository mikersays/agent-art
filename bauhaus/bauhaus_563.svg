<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle grid structure -->
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.05"/>

  <!-- GEAR 1 - Large, center-left -->
  <circle cx="260" cy="340" r="100" fill="#457B9D" opacity="0.7"/>
  <circle cx="260" cy="340" r="70" fill="#A89F91" opacity="0.6"/>
  <circle cx="260" cy="340" r="25" fill="#000000" opacity="0.8"/>
  <!-- Gear teeth - rectangles around edge -->
  <rect x="240" y="228" width="40" height="20" fill="#457B9D" opacity="0.9"/>
  <rect x="240" y="432" width="40" height="20" fill="#457B9D" opacity="0.9"/>
  <rect x="148" y="320" width="20" height="40" fill="#457B9D" opacity="0.9"/>
  <rect x="352" y="320" width="20" height="40" fill="#457B9D" opacity="0.9"/>
  <rect x="170" y="258" width="35" height="18" fill="#457B9D" opacity="0.9" transform="rotate(-45, 187, 267)"/>
  <rect x="320" y="258" width="35" height="18" fill="#457B9D" opacity="0.9" transform="rotate(45, 337, 267)"/>
  <rect x="170" y="405" width="35" height="18" fill="#457B9D" opacity="0.9" transform="rotate(45, 187, 414)"/>
  <rect x="320" y="405" width="35" height="18" fill="#457B9D" opacity="0.9" transform="rotate(-45, 337, 414)"/>

  <!-- GEAR 2 - Medium, upper right -->
  <circle cx="520" cy="220" r="75" fill="#A89F91" opacity="0.7"/>
  <circle cx="520" cy="220" r="50" fill="#457B9D" opacity="0.5"/>
  <circle cx="520" cy="220" r="18" fill="#000000" opacity="0.8"/>
  <!-- Gear teeth -->
  <rect x="505" y="136" width="30" height="16" fill="#A89F91" opacity="0.9"/>
  <rect x="505" y="288" width="30" height="16" fill="#A89F91" opacity="0.9"/>
  <rect x="436" y="205" width="16" height="30" fill="#A89F91" opacity="0.9"/>
  <rect x="588" y="205" width="16" height="30" fill="#A89F91" opacity="0.9"/>
  <rect x="455" y="158" width="28" height="14" fill="#A89F91" opacity="0.9" transform="rotate(-45, 469, 165)"/>
  <rect x="565" y="158" width="28" height="14" fill="#A89F91" opacity="0.9" transform="rotate(45, 579, 165)"/>
  <rect x="455" y="268" width="28" height="14" fill="#A89F91" opacity="0.9" transform="rotate(45, 469, 275)"/>
  <rect x="565" y="268" width="28" height="14" fill="#A89F91" opacity="0.9" transform="rotate(-45, 579, 275)"/>

  <!-- GEAR 3 - Large, lower right -->
  <circle cx="560" cy="540" r="110" fill="#457B9D" opacity="0.6"/>
  <circle cx="560" cy="540" r="80" fill="#A89F91" opacity="0.5"/>
  <circle cx="560" cy="540" r="30" fill="#000000" opacity="0.8"/>
  <!-- Gear teeth -->
  <rect x="538" y="416" width="44" height="22" fill="#457B9D" opacity="0.9"/>
  <rect x="538" y="642" width="44" height="22" fill="#457B9D" opacity="0.9"/>
  <rect x="436" y="518" width="22" height="44" fill="#457B9D" opacity="0.9"/>
  <rect x="662" y="518" width="22" height="44" fill="#457B9D" opacity="0.9"/>
  <rect x="464" y="452" width="38" height="20" fill="#457B9D" opacity="0.9" transform="rotate(-45, 483, 462)"/>
  <rect x="630" y="452" width="38" height="20" fill="#457B9D" opacity="0.9" transform="rotate(45, 649, 462)"/>
  <rect x="464" y="612" width="38" height="20" fill="#457B9D" opacity="0.9" transform="rotate(45, 483, 622)"/>
  <rect x="630" y="612" width="38" height="20" fill="#457B9D" opacity="0.9" transform="rotate(-45, 649, 622)"/>

  <!-- Red accent shapes between gears -->
  <circle cx="390" cy="280" r="10" fill="#E63946" opacity="0.8"/>
  <circle cx="410" cy="420" r="8" fill="#E63946" opacity="0.7"/>
  <rect x="480" y="380" width="14" height="14" fill="#E63946" opacity="0.6" transform="rotate(45, 487, 387)"/>

  <!-- Yellow accent shapes between gears -->
  <circle cx="350" cy="460" r="7" fill="#F4D35E" opacity="0.85"/>
  <polygon points="440,310 450,325 430,325" fill="#F4D35E" opacity="0.8"/>
  <circle cx="640" cy="380" r="9" fill="#F4D35E" opacity="0.7"/>
  <rect x="300" cy="500" width="12" height="12" fill="#F4D35E" opacity="0.7" y="580"/>

  <!-- Connection lines between gears -->
  <line x1="340" y1="300" x2="460" y2="250" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <line x1="340" y1="400" x2="470" y2="480" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <line x1="560" y1="310" x2="560" y2="430" stroke="#000000" stroke-width="1.5" opacity="0.2"/>

  <!-- Corner accents -->
  <rect x="20" y="20" width="50" height="4" fill="#000000" opacity="0.15"/>
  <rect x="20" y="20" width="4" height="50" fill="#000000" opacity="0.15"/>
  <rect x="730" y="776" width="50" height="4" fill="#000000" opacity="0.15"/>
  <rect x="776" y="730" width="4" height="50" fill="#000000" opacity="0.15"/>

  <!-- Small decorative elements -->
  <circle cx="100" cy="650" r="15" fill="#E76F51" opacity="0.3"/>
  <circle cx="680" cy="100" r="12" fill="#2A9D8F" opacity="0.3"/>
  <rect x="100" y="100" width="20" height="20" fill="#264653" opacity="0.2"/>
</svg>