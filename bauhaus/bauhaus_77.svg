<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Stage floor -->
  <rect x="200" y="520" width="400" height="120" fill="#333333"/>
  <rect x="210" y="530" width="380" height="100" fill="#1D3557"/>

  <!-- Stage front edge -->
  <rect x="180" y="630" width="440" height="10" fill="#000000"/>

  <!-- Concentric semicircular seating rows (audience) -->
  <!-- Row 1 (closest to stage) -->
  <path d="M 100,640 A 300,150 0 0,0 700,640" fill="none" stroke="#E63946" stroke-width="14"/>
  <!-- Row 2 -->
  <path d="M 70,640 A 330,190 0 0,0 730,640" fill="none" stroke="#F4D35E" stroke-width="14"/>
  <!-- Row 3 -->
  <path d="M 40,640 A 360,230 0 0,0 760,640" fill="none" stroke="#2A9D8F" stroke-width="14"/>
  <!-- Row 4 -->
  <path d="M 10,640 A 390,270 0 0,0 790,640" fill="none" stroke="#1D3557" stroke-width="14"/>
  <!-- Row 5 (farthest) -->
  <path d="M -10,640 A 410,310 0 0,0 810,640" fill="none" stroke="#E63946" stroke-width="14"/>

  <!-- Seat dots Row 1 -->
  <circle cx="200" cy="695" r="8" fill="#333333"/>
  <circle cx="270" cy="715" r="8" fill="#333333"/>
  <circle cx="340" cy="725" r="8" fill="#333333"/>
  <circle cx="400" cy="728" r="8" fill="#333333"/>
  <circle cx="460" cy="725" r="8" fill="#333333"/>
  <circle cx="530" cy="715" r="8" fill="#333333"/>
  <circle cx="600" cy="695" r="8" fill="#333333"/>

  <!-- Seat dots Row 2 -->
  <circle cx="170" cy="730" r="7" fill="#000000"/>
  <circle cx="250" cy="755" r="7" fill="#000000"/>
  <circle cx="330" cy="768" r="7" fill="#000000"/>
  <circle cx="400" cy="772" r="7" fill="#000000"/>
  <circle cx="470" cy="768" r="7" fill="#000000"/>
  <circle cx="550" cy="755" r="7" fill="#000000"/>
  <circle cx="630" cy="730" r="7" fill="#000000"/>

  <!-- Geometric Performer 1 - triangle body, circle head -->
  <polygon points="320,520 300,580 340,580" fill="#E63946"/>
  <circle cx="320" cy="510" r="14" fill="#F4D35E"/>
  <line x1="300" y1="555" x2="280" y2="540" stroke="#000000" stroke-width="3"/>
  <line x1="340" y1="555" x2="360" y2="540" stroke="#000000" stroke-width="3"/>

  <!-- Geometric Performer 2 - rectangle body, circle head -->
  <rect x="390" y="530" width="30" height="50" fill="#2A9D8F"/>
  <circle cx="405" cy="520" r="14" fill="#A8DADC"/>
  <line x1="390" y1="550" x2="370" y2="540" stroke="#000000" stroke-width="3"/>
  <line x1="420" y1="550" x2="440" y2="540" stroke="#000000" stroke-width="3"/>

  <!-- Geometric Performer 3 - diamond body, circle head -->
  <polygon points="500,530 485,560 500,590 515,560" fill="#F4D35E"/>
  <circle cx="500" cy="520" r="14" fill="#E63946"/>

  <!-- Stage curtain left -->
  <rect x="180" y="420" width="30" height="220" fill="#E63946"/>
  <rect x="185" y="420" width="20" height="220" fill="#1D3557" opacity="0.3"/>

  <!-- Stage curtain right -->
  <rect x="590" y="420" width="30" height="220" fill="#E63946"/>
  <rect x="595" y="420" width="20" height="220" fill="#1D3557" opacity="0.3"/>

  <!-- Curtain valance -->
  <path d="M 180,420 Q 300,460 400,420 Q 500,460 620,420" fill="#E63946" stroke="#000000" stroke-width="2"/>

  <!-- Stage lights -->
  <polygon points="250,400 240,420 260,420" fill="#F4D35E"/>
  <polygon points="400,390 390,420 410,420" fill="#F4D35E"/>
  <polygon points="550,400 540,420 560,420" fill="#F4D35E"/>

  <!-- Light beams -->
  <polygon points="250,420 220,520 280,520" fill="#F4D35E" opacity="0.15"/>
  <polygon points="400,420 370,520 430,520" fill="#F4D35E" opacity="0.15"/>
  <polygon points="550,420 520,520 580,520" fill="#F4D35E" opacity="0.15"/>

  <!-- Title banner -->
  <rect x="280" y="50" width="240" height="40" fill="#000000"/>
  <rect x="285" y="55" width="230" height="30" fill="#1D3557"/>

  <!-- Decorative elements top -->
  <circle cx="100" cy="70" r="25" fill="#F4D35E"/>
  <circle cx="700" cy="70" r="25" fill="#E63946"/>
  <rect x="340" y="110" width="120" height="6" fill="#333333"/>

  <!-- Aisle lines -->
  <line x1="400" y1="640" x2="400" y2="800" stroke="#A8DADC" stroke-width="2"/>
  <line x1="250" y1="640" x2="150" y2="800" stroke="#A8DADC" stroke-width="2"/>
  <line x1="550" y1="640" x2="650" y2="800" stroke="#A8DADC" stroke-width="2"/>

  <!-- Border -->
  <rect x="5" y="5" width="790" height="790" fill="none" stroke="#000000" stroke-width="3"/>
</svg>