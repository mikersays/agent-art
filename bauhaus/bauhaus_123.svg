<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#1D3557"/>
  <!-- Ceiling mount point -->
  <rect x="360" y="0" width="80" height="30" fill="#000"/>
  <!-- Chain links from top -->
  <ellipse cx="400" cy="50" rx="12" ry="18" fill="none" stroke="#DDA15E" stroke-width="4"/>
  <ellipse cx="400" cy="80" rx="12" ry="18" fill="none" stroke="#DDA15E" stroke-width="4"/>
  <ellipse cx="400" cy="110" rx="12" ry="18" fill="none" stroke="#DDA15E" stroke-width="4"/>
  <ellipse cx="400" cy="140" rx="12" ry="18" fill="none" stroke="#DDA15E" stroke-width="4"/>
  <ellipse cx="400" cy="170" rx="12" ry="18" fill="none" stroke="#DDA15E" stroke-width="4"/>
  <!-- Central hub -->
  <circle cx="400" cy="220" r="40" fill="#000"/>
  <circle cx="400" cy="220" r="28" fill="#6D2E46"/>
  <circle cx="400" cy="220" r="14" fill="#F4D35E"/>
  <!-- Arms extending outward - left far -->
  <line x1="360" y1="220" x2="120" y2="320" stroke="#000" stroke-width="10"/>
  <line x1="120" y1="320" x2="120" y2="420" stroke="#000" stroke-width="6"/>
  <circle cx="120" cy="430" r="35" fill="#F4D35E" opacity="0.9"/>
  <circle cx="120" cy="430" r="20" fill="#FFF" opacity="0.6"/>
  <!-- Arm left near -->
  <line x1="370" y1="230" x2="230" y2="300" stroke="#000" stroke-width="10"/>
  <line x1="230" y1="300" x2="230" y2="400" stroke="#000" stroke-width="6"/>
  <circle cx="230" cy="410" r="35" fill="#F4D35E" opacity="0.9"/>
  <circle cx="230" cy="410" r="20" fill="#FFF" opacity="0.6"/>
  <!-- Arm right near -->
  <line x1="430" y1="230" x2="570" y2="300" stroke="#000" stroke-width="10"/>
  <line x1="570" y1="300" x2="570" y2="400" stroke="#000" stroke-width="6"/>
  <circle cx="570" cy="410" r="35" fill="#F4D35E" opacity="0.9"/>
  <circle cx="570" cy="410" r="20" fill="#FFF" opacity="0.6"/>
  <!-- Arm right far -->
  <line x1="440" y1="220" x2="680" y2="320" stroke="#000" stroke-width="10"/>
  <line x1="680" y1="320" x2="680" y2="420" stroke="#000" stroke-width="6"/>
  <circle cx="680" cy="430" r="35" fill="#F4D35E" opacity="0.9"/>
  <circle cx="680" cy="430" r="20" fill="#FFF" opacity="0.6"/>
  <!-- Center drop -->
  <line x1="400" y1="260" x2="400" y2="380" stroke="#000" stroke-width="8"/>
  <circle cx="400" cy="400" r="45" fill="#E63946"/>
  <circle cx="400" cy="400" r="28" fill="#F4D35E" opacity="0.9"/>
  <circle cx="400" cy="400" r="14" fill="#FFF" opacity="0.7"/>
  <!-- Decorative triangles hanging from arms -->
  <polygon points="120,470 105,510 135,510" fill="#E63946"/>
  <polygon points="230,450 215,490 245,490" fill="#E63946"/>
  <polygon points="570,450 555,490 585,490" fill="#E63946"/>
  <polygon points="680,470 665,510 695,510" fill="#E63946"/>
  <!-- Light glow rectangles below bulbs -->
  <rect x="100" y="520" width="40" height="4" rx="2" fill="#F4D35E" opacity="0.4"/>
  <rect x="210" y="500" width="40" height="4" rx="2" fill="#F4D35E" opacity="0.4"/>
  <rect x="380" y="450" width="40" height="4" rx="2" fill="#F4D35E" opacity="0.4"/>
  <rect x="550" y="500" width="40" height="4" rx="2" fill="#F4D35E" opacity="0.4"/>
  <rect x="660" y="520" width="40" height="4" rx="2" fill="#F4D35E" opacity="0.4"/>
  <!-- Subtle radial light beams from center bulb -->
  <line x1="400" y1="450" x2="350" y2="700" stroke="#F4D35E" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="450" x2="400" y2="750" stroke="#F4D35E" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="450" x2="450" y2="700" stroke="#F4D35E" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="450" x2="300" y2="750" stroke="#F4D35E" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="450" x2="500" y2="750" stroke="#F4D35E" stroke-width="1" opacity="0.15"/>
</svg>