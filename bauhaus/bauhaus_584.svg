<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- White background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>

  <!-- Row 1 (y=60) - full bricks -->
  <rect x="40" y="60" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <rect x="190" y="60" width="140" height="60" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
  <rect x="340" y="60" width="140" height="60" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <rect x="490" y="60" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <rect x="640" y="60" width="120" height="60" fill="#2A9D8F" stroke="#000000" stroke-width="1.5"/>

  <!-- Row 2 (y=130) - offset bricks with variations -->
  <rect x="110" y="130" width="140" height="60" fill="#457B9D" stroke="#000000" stroke-width="1.5"/>
  <circle cx="330" cy="160" r="28" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <rect x="370" y="130" width="140" height="60" fill="#F4D35E" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <rect x="520" y="130" width="140" height="60" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
  <rect x="670" y="130" width="100" height="60" fill="#DDA15E" stroke="#000000" stroke-width="1.5"/>

  <!-- Row 3 (y=200) -->
  <rect x="40" y="200" width="140" height="60" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <rect x="190" y="200" width="140" height="60" fill="#E76F51" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <polygon points="410,200 480,200 480,260 410,260 340,230" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
  <rect x="490" y="200" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <rect x="640" y="200" width="120" height="60" fill="#A89F91" stroke="#000000" stroke-width="1.5"/>

  <!-- Row 4 (y=270) - offset -->
  <rect x="110" y="270" width="140" height="60" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
