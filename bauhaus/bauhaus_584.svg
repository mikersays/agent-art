  <polygon points="420,270 490,270 455,330" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <rect x="500" y="270" width="140" height="60" fill="#2A9D8F" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <rect x="650" y="270" width="110" height="60" fill="#E63946" stroke="#000000" stroke-width="1.5"/>

  <!-- Row 5 (y=340) -->
  <rect x="40" y="340" width="140" height="60" fill="#E76F51" stroke="#000000" stroke-width="1.5"/>
  <circle cx="260" cy="370" r="28" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <rect x="300" y="340" width="140" height="60" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
  <rect x="450" y="340" width="140" height="60" fill="#F4D35E" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <rect x="600" y="340" width="160" height="60" fill="#6D2E46" stroke="#000000" stroke-width="1.5"/>

  <!-- Row 6 (y=410) - offset -->
  <rect x="110" y="410" width="140" height="60" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <rect x="260" y="410" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <rect x="410" y="410" width="140" height="60" fill="#457B9D" stroke="#000000" stroke-width="1.5"/>
  <polygon points="570,410 640,410 605,470" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <rect x="650" y="410" width="110" height="60" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>

  <!-- Row 7 (y=480) -->
  <rect x="40" y="480" width="140" height="60" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
  <rect x="190" y="480" width="140" height="60" fill="#2A9D8F" stroke="#000000" stroke-width="1.5"/>
  <circle cx="410" cy="510" r="28" fill="#1D3557" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <rect x="450" y="480" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <rect x="600" y="480" width="160" height="60" fill="#E9C46A" stroke="#000000" stroke-width="1.5"/>

  <!-- Row 8 (y=550) - offset -->
  <rect x="110" y="550" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <rect x="260" y="550" width="140" height="60" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
  <rect x="410" y="550" width="140" height="60" fill="#264653" stroke="#000000" stroke-width="1.5"/>
  <rect x="560" y="550" width="140" height="60" fill="#1D3557" stroke="#000000" stroke-width="1.5" opacity="0.5"/>

  <!-- Row 9 (y=620) -->
  <rect x="40" y="620" width="140" height="60" fill="#A8DADC" stroke="#000000" stroke-width="1.5"/>
  <polygon points="200,620 270,620 235,680" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <rect x="280" y="620" width="140" height="60" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
  <rect x="430" y="620" width="140" height="60" fill="#F4D35E" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
  <rect x="580" y="620" width="180" height="60" fill="#E76F51" stroke="#000000" stroke-width="1.5"/>

  <!-- Row 10 (y=690) - partial offset -->
  <rect x="110" y="690" width="140" height="60" fill="#1D3557" stroke="#000000" stroke-width="1.5"/>
  <rect x="260" y="690" width="140" height="60" fill="#E63946" stroke="#000000" stroke-width="1.5"/>
  <circle cx="480" cy="720" r="28" fill="#2A9D8F" stroke="#000000" stroke-width="1.5"/>
  <rect x="520" y="690" width="140" height="60" fill="#F4D35E" stroke="#000000" stroke-width="1.5"/>
