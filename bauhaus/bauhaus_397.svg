<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FFFFFF"/>

  <!-- Structural axis lines -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="2" opacity="0.15"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="2" opacity="0.15"/>

  <!-- Top-right quadrant - primary pattern -->
  <!-- Large shapes near center -->
  <polygon points="400,400 500,400 400,300" fill="#E63946" opacity="0.85"/>
  <polygon points="400,400 400,300 500,300" fill="#1D3557" opacity="0.75"/>
  <circle cx="480" cy="350" r="40" fill="#F4D35E" opacity="0.7"/>
  <rect x="520" y="320" width="60" height="60" fill="#E63946" opacity="0.6"/>
  <polygon points="450,400 500,340 550,400" fill="#2A9D8F" opacity="0.5"/>
  <circle cx="560" cy="380" r="25" fill="#1D3557" opacity="0.7"/>
  <rect x="600" y="350" width="40" height="40" fill="#F4D35E" opacity="0.5"/>

  <!-- Outer shapes (less complex) -->
  <polygon points="650,300 700,250 700,350" fill="#E63946" opacity="0.4"/>
  <circle cx="720" cy="380" r="18" fill="#1D3557" opacity="0.5"/>
  <rect x="680" y="200" width="30" height="30" fill="#F4D35E" opacity="0.4"/>

  <!-- Mirror: bottom-right quadrant -->
  <polygon points="400,400 500,400 400,500" fill="#E63946" opacity="0.85"/>
  <polygon points="400,400 400,500 500,500" fill="#1D3557" opacity="0.75"/>
  <circle cx="480" cy="450" r="40" fill="#F4D35E" opacity="0.7"/>
  <rect x="520" y="420" width="60" height="60" fill="#E63946" opacity="0.6"/>
  <polygon points="450,400 500,460 550,400" fill="#2A9D8F" opacity="0.5"/>
  <circle cx="560" cy="420" r="25" fill="#1D3557" opacity="0.7"/>
  <rect x="600" y="410" width="40" height="40" fill="#F4D35E" opacity="0.5"/>
  <polygon points="650,500 700,550 700,450" fill="#E63946" opacity="0.4"/>
  <circle cx="720" cy="420" r="18" fill="#1D3557" opacity="0.5"/>
  <rect x="680" y="570" width="30" height="30" fill="#F4D35E" opacity="0.4"/>

  <!-- Mirror: top-left quadrant -->
  <polygon points="400,400 300,400 400,300" fill="#E63946" opacity="0.85"/>
  <polygon points="400,400 400,300 300,300" fill="#1D3557" opacity="0.75"/>
  <circle cx="320" cy="350" r="40" fill="#F4D35E" opacity="0.7"/>
  <rect x="220" y="320" width="60" height="60" fill="#E63946" opacity="0.6"/>
  <polygon points="350,400 300,340 250,400" fill="#2A9D8F" opacity="0.5"/>
  <circle cx="240" cy="380" r="25" fill="#1D3557" opacity="0.7"/>
  <rect x="160" y="350" width="40" height="40" fill="#F4D35E" opacity="0.5"/>
  <polygon points="150,300 100,250 100,350" fill="#E63946" opacity="0.4"/>
  <circle cx="80" cy="380" r="18" fill="#1D3557" opacity="0.5"/>
  <rect x="90" y="200" width="30" height="30" fill="#F4D35E" opacity="0.4"/>

  <!-- Mirror: bottom-left quadrant -->
  <polygon points="400,400 300,400 400,500" fill="#E63946" opacity="0.85"/>
  <polygon points="400,400 400,500 300,500" fill="#1D3557" opacity="0.75"/>
  <circle cx="320" cy="450" r="40" fill="#F4D35E" opacity="0.7"/>
  <rect x="220" y="420" width="60" height="60" fill="#E63946" opacity="0.6"/>
  <polygon points="350,400 300,460 250,400" fill="#2A9D8F" opacity="0.5"/>
  <circle cx="240" cy="420" r="25" fill="#1D3557" opacity="0.7"/>
  <rect x="160" y="410" width="40" height="40" fill="#F4D35E" opacity="0.5"/>
  <polygon points="150,500 100,550 100,450" fill="#E63946" opacity="0.4"/>
  <circle cx="80" cy="420" r="18" fill="#1D3557" opacity="0.5"/>
  <rect x="90" y="570" width="30" height="30" fill="#F4D35E" opacity="0.4"/>

  <!-- Center focal point -->
  <circle cx="400" cy="400" r="15" fill="#000000"/>
  <circle cx="400" cy="400" r="8" fill="#E63946"/>

  <!-- Black structural lines radiating from center -->
  <line x1="400" y1="400" x2="550" y2="250" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="400" x2="550" y2="550" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="400" x2="250" y2="250" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="400" x2="250" y2="550" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
</svg>