<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background forest green -->
  <rect x="0" y="0" width="800" height="800" fill="#264653"/>
  <!-- Black lines extending from center outward past the circle -->
  <line x1="400" y1="400" x2="400" y2="0" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="400" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="400" y1="400" x2="400" y2="800" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="400" y1="400" x2="0" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="400" y1="400" x2="700" y2="100" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="400" x2="100" y2="700" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="400" x2="700" y2="700" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="400" x2="100" y2="100" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="400" x2="800" y2="200" stroke="#000000" stroke-width="0.8" opacity="0.4"/>
  <line x1="400" y1="400" x2="0" y2="600" stroke="#000000" stroke-width="0.8" opacity="0.4"/>
  <line x1="400" y1="400" x2="200" y2="0" stroke="#000000" stroke-width="0.8" opacity="0.4"/>
  <line x1="400" y1="400" x2="600" y2="800" stroke="#000000" stroke-width="0.8" opacity="0.4"/>
  <!-- Fragmented circle - pie segments with gaps (each is a path wedge) -->
  <!-- Fragment 1: Red - 0 to 50 degrees -->
  <path d="M 400 400 L 400 200 A 200 200 0 0 1 553 253 Z" fill="#E63946" opacity="0.9" transform="translate(3, -3)"/>
  <!-- Fragment 2: Blue - 50 to 120 degrees -->
  <path d="M 400 400 L 553 253 A 200 200 0 0 1 600 400 Z" fill="#1D3557" opacity="0.9" transform="translate(4, 2)"/>
  <!-- Fragment 3: Yellow - 120 to 180 degrees -->
  <path d="M 400 400 L 600 400 A 200 200 0 0 1 500 573 Z" fill="#F4D35E" opacity="0.9" transform="translate(3, 4)"/>
  <!-- Fragment 4: Teal - 180 to 230 degrees -->
  <path d="M 400 400 L 500 573 A 200 200 0 0 1 400 600 Z" fill="#2A9D8F" opacity="0.85" transform="translate(0, 5)"/>
  <!-- Fragment 5: Orange - 230 to 280 degrees -->
  <path d="M 400 400 L 400 600 A 200 200 0 0 1 247 547 Z" fill="#E76F51" opacity="0.9" transform="translate(-4, 3)"/>
  <!-- Fragment 6: Steel Blue - 280 to 320 degrees -->
  <path d="M 400 400 L 247 547 A 200 200 0 0 1 200 400 Z" fill="#457B9D" opacity="0.85" transform="translate(-5, 0)"/>
  <!-- Fragment 7: White - 320 to 350 degrees -->
  <path d="M 400 400 L 200 400 A 200 200 0 0 1 235 280 Z" fill="#FFFFFF" opacity="0.9" transform="translate(-3, -3)"/>
  <!-- Fragment 8: Black - 350 to 360 degrees -->
  <path d="M 400 400 L 235 280 A 200 200 0 0 1 400 200 Z" fill="#000000" opacity="0.8" transform="translate(0, -5)"/>
  <!-- Small yellow circles orbiting outside -->
  <circle cx="400" cy="100" r="12" fill="#F4D35E" opacity="0.85"/>
  <circle cx="620" cy="180" r="10" fill="#F4D35E" opacity="0.8"/>
  <circle cx="700" cy="400" r="14" fill="#F4D35E" opacity="0.75"/>
  <circle cx="620" cy="620" r="11" fill="#F4D35E" opacity="0.8"/>
  <circle cx="400" cy="700" r="13" fill="#F4D35E" opacity="0.85"/>
  <circle cx="180" cy="620" r="10" fill="#F4D35E" opacity="0.75"/>
  <circle cx="100" cy="400" r="12" fill="#F4D35E" opacity="0.8"/>
  <circle cx="180" cy="180" r="9" fill="#F4D35E" opacity="0.85"/>
  <!-- Burgundy rectangles in corners -->
  <rect x="30" y="30" width="80" height="50" fill="#6D2E46" opacity="0.85"/>
  <rect x="690" y="30" width="80" height="50" fill="#6D2E46" opacity="0.8"/>
  <rect x="30" y="720" width="80" height="50" fill="#6D2E46" opacity="0.8"/>
  <rect x="690" y="720" width="80" height="50" fill="#6D2E46" opacity="0.85"/>
  <!-- Additional small accents -->
  <circle cx="400" cy="400" r="8" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="750" cy="300" r="6" fill="#E9C46A" opacity="0.6"/>
  <circle cx="50" cy="500" r="6" fill="#E9C46A" opacity="0.6"/>
  <rect x="350" y="50" width="10" height="10" fill="#A8DADC" opacity="0.7"/>
  <rect x="680" y="500" width="10" height="10" fill="#A8DADC" opacity="0.7"/>
</svg>