<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Celebratory background rays -->
  <polygon points="400,400 0,0 200,0" fill="#F4D35E" opacity="0.08"/>
  <polygon points="400,400 200,0 400,0" fill="#E63946" opacity="0.06"/>
  <polygon points="400,400 400,0 600,0" fill="#1D3557" opacity="0.06"/>
  <polygon points="400,400 600,0 800,0" fill="#F4D35E" opacity="0.08"/>
  <polygon points="400,400 800,0 800,200" fill="#E76F51" opacity="0.06"/>
  <polygon points="400,400 800,200 800,400" fill="#A8DADC" opacity="0.08"/>
  <polygon points="400,400 800,400 800,600" fill="#F4D35E" opacity="0.06"/>
  <polygon points="400,400 800,600 800,800" fill="#E63946" opacity="0.06"/>
  <polygon points="400,400 800,800 600,800" fill="#1D3557" opacity="0.08"/>
  <polygon points="400,400 600,800 400,800" fill="#E76F51" opacity="0.06"/>
  <polygon points="400,400 400,800 200,800" fill="#A8DADC" opacity="0.06"/>
  <polygon points="400,400 200,800 0,800" fill="#F4D35E" opacity="0.08"/>
  <polygon points="400,400 0,800 0,600" fill="#E63946" opacity="0.06"/>
  <polygon points="400,400 0,600 0,400" fill="#1D3557" opacity="0.08"/>
  <polygon points="400,400 0,400 0,200" fill="#E76F51" opacity="0.06"/>
  <polygon points="400,400 0,200 0,0" fill="#A8DADC" opacity="0.08"/>

  <!-- The "1" - built from rectangles -->
  <rect x="120" y="250" width="60" height="300" fill="#E63946"/>
  <rect x="120" y="250" width="60" height="300" fill="none" stroke="#000000" stroke-width="3"/>
  <!-- Serif/base of 1 -->
  <rect x="90" y="520" width="120" height="30" fill="#E63946"/>
  <rect x="90" y="520" width="120" height="30" fill="none" stroke="#000000" stroke-width="3"/>
  <!-- Top angle of 1 -->
  <polygon points="120,250 120,290 85,290" fill="#E63946" stroke="#000000" stroke-width="3"/>

  <!-- First "0" - built from circle -->
  <circle cx="330" cy="400" r="120" fill="#1D3557"/>
  <circle cx="330" cy="400" r="120" fill="none" stroke="#000000" stroke-width="4"/>
  <circle cx="330" cy="400" r="70" fill="#FFFFFF"/>
  <circle cx="330" cy="400" r="70" fill="none" stroke="#000000" stroke-width="3"/>

  <!-- Second "0" - built from circle -->
  <circle cx="560" cy="400" r="120" fill="#F4D35E"/>
  <circle cx="560" cy="400" r="120" fill="none" stroke="#000000" stroke-width="4"/>
  <circle cx="560" cy="400" r="70" fill="#FFFFFF"/>
  <circle cx="560" cy="400" r="70" fill="none" stroke="#000000" stroke-width="3"/>

  <!-- Inner decoration in first 0 -->
  <circle cx="330" cy="400" r="25" fill="#E63946" opacity="0.6"/>

  <!-- Inner decoration in second 0 -->
  <circle cx="560" cy="400" r="25" fill="#E76F51" opacity="0.6"/>

  <!-- Confetti / celebration elements -->
  <!-- Squares -->
  <rect x="50" y="80" width="25" height="25" fill="#E63946" transform="rotate(30, 62, 92)"/>
  <rect x="700" y="100" width="20" height="20" fill="#1D3557" transform="rotate(-20, 710, 110)"/>
  <rect x="650" y="650" width="22" height="22" fill="#F4D35E" transform="rotate(45, 661, 661)"/>
  <rect x="100" y="680" width="18" height="18" fill="#E76F51" transform="rotate(15, 109, 689)"/>

  <!-- Triangles -->
  <polygon points="250,100 265,70 280,100" fill="#F4D35E"/>
  <polygon points="550,80 565,50 580,80" fill="#E63946"/>
  <polygon points="400,700 415,670 430,700" fill="#1D3557"/>
  <polygon points="700,400 720,380 720,420" fill="#E76F51"/>

  <!-- Circles -->
  <circle cx="150" cy="150" r="12" fill="#A8DADC"/>
  <circle cx="680" cy="250" r="10" fill="#E63946" opacity="0.7"/>
  <circle cx="50" cy="500" r="14" fill="#F4D35E" opacity="0.6"/>
  <circle cx="750" cy="550" r="11" fill="#1D3557" opacity="0.7"/>
  <circle cx="400" cy="120" r="8" fill="#000000"/>
  <circle cx="400" cy="680" r="8" fill="#000000"/>

  <!-- Stars (diamond shapes) -->
  <polygon points="300,650 310,635 320,650 310,665" fill="#E63946"/>
  <polygon points="500,150 510,135 520,150 510,165" fill="#1D3557"/>

  <!-- Underline flourish -->
  <rect x="80" y="580" width="620" height="8" fill="#000000"/>
  <rect x="120" y="595" width="540" height="4" fill="#333333"/>

  <!-- Corner accents -->
  <rect x="0" y="0" width="60" height="8" fill="#E63946"/>
  <rect x="0" y="0" width="8" height="60" fill="#E63946"/>
  <rect x="740" y="0" width="60" height="8" fill="#1D3557"/>
  <rect x="792" y="0" width="8" height="60" fill="#1D3557"/>
  <rect x="0" y="792" width="60" height="8" fill="#F4D35E"/>
  <rect x="0" y="740" width="8" height="60" fill="#F4D35E"/>
  <rect x="740" y="792" width="60" height="8" fill="#E76F51"/>
  <rect x="792" y="740" width="8" height="60" fill="#E76F51"/>

  <!-- Decorative arcs -->
  <path d="M 80 250 A 40 40 0 0 1 80 170" fill="none" stroke="#A8DADC" stroke-width="3"/>
  <path d="M 720 250 A 40 40 0 0 0 720 170" fill="none" stroke="#A8DADC" stroke-width="3"/>
</svg>