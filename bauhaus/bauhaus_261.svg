<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>

  <!-- Row 1 of tessellation - hexagon-like shapes from triangles and rhombuses -->
  <polygon points="100,100 160,60 220,100 220,170 160,210 100,170" fill="#1D3557" stroke="#000000" stroke-width="2" opacity="0.85"/>
  <polygon points="220,100 280,60 340,100 340,170 280,210 220,170" fill="#F4D35E" stroke="#000000" stroke-width="2" opacity="0.8"/>
  <polygon points="340,100 400,60 460,100 460,170 400,210 340,170" fill="#2A9D8F" stroke="#000000" stroke-width="2" opacity="0.85"/>
  <polygon points="460,100 520,60 580,100 580,170 520,210 460,170" fill="#1D3557" stroke="#000000" stroke-width="2" opacity="0.75"/>
  <polygon points="580,100 640,60 700,100 700,170 640,210 580,170" fill="#F4D35E" stroke="#000000" stroke-width="2" opacity="0.9"/>

  <!-- Rhombus connectors row 1-2 -->
  <polygon points="160,210 220,170 220,250 160,290" fill="#E63946" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <polygon points="280,210 340,170 340,250 280,290" fill="#2A9D8F" stroke="#000000" stroke-width="1.5" opacity="0.65"/>
  <polygon points="400,210 460,170 460,250 400,290" fill="#F4D35E" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <polygon points="520,210 580,170 580,250 520,290" fill="#E63946" stroke="#000000" stroke-width="1.5" opacity="0.8"/>
  <polygon points="640,210 700,170 700,250 640,290" fill="#1D3557" stroke="#000000" stroke-width="1.5" opacity="0.7"/>

  <!-- Row 2 -->
  <polygon points="160,290 220,250 280,290 280,360 220,400 160,360" fill="#2A9D8F" stroke="#000000" stroke-width="2" opacity="0.8"/>
  <polygon points="280,290 340,250 400,290 400,360 340,400 280,360" fill="#1D3557" stroke="#000000" stroke-width="2" opacity="0.85"/>
  <polygon points="400,290 460,250 520,290 520,360 460,400 400,360" fill="#F4D35E" stroke="#000000" stroke-width="2" opacity="0.75"/>
  <polygon points="520,290 580,250 640,290 640,360 580,400 520,360" fill="#2A9D8F" stroke="#000000" stroke-width="2" opacity="0.9"/>

  <!-- Triangle accents between rows -->
  <polygon points="100,290 160,290 130,250" fill="#E63946" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <polygon points="700,290 760,290 730,250" fill="#E63946" stroke="#000000" stroke-width="1" opacity="0.55"/>

  <!-- Rhombus connectors row 2-3 -->
  <polygon points="220,400 280,360 280,440 220,480" fill="#1D3557" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <polygon points="340,400 400,360 400,440 340,480" fill="#E63946" stroke="#000000" stroke-width="1.5" opacity="0.75"/>
  <polygon points="460,400 520,360 520,440 460,480" fill="#1D3557" stroke="#000000" stroke-width="1.5" opacity="0.65"/>
  <polygon points="580,400 640,360 640,440 580,480" fill="#F4D35E" stroke="#000000" stroke-width="1.5" opacity="0.7"/>

  <!-- Row 3 -->
  <polygon points="100,480 160,440 220,480 220,550 160,590 100,550" fill="#F4D35E" stroke="#000000" stroke-width="2" opacity="0.85"/>
  <polygon points="220,480 280,440 340,480 340,550 280,590 220,550" fill="#2A9D8F" stroke="#000000" stroke-width="2" opacity="0.8"/>
  <polygon points="340,480 400,440 460,480 460,550 400,590 340,550" fill="#1D3557" stroke="#000000" stroke-width="2" opacity="0.9"/>
  <polygon points="460,480 520,440 580,480 580,550 520,590 460,550" fill="#F4D35E" stroke="#000000" stroke-width="2" opacity="0.75"/>
  <polygon points="580,480 640,440 700,480 700,550 640,590 580,550" fill="#E63946" stroke="#000000" stroke-width="2" opacity="0.8"/>

  <!-- Rhombus connectors row 3-4 -->
  <polygon points="160,590 220,550 220,630 160,670" fill="#2A9D8F" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <polygon points="280,590 340,550 340,630 280,670" fill="#F4D35E" stroke="#000000" stroke-width="1.5" opacity="0.65"/>
  <polygon points="400,590 460,550 460,630 400,670" fill="#E63946" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
  <polygon points="520,590 580,550 580,630 520,670" fill="#2A9D8F" stroke="#000000" stroke-width="1.5" opacity="0.75"/>
  <polygon points="640,590 700,550 700,630 640,670" fill="#1D3557" stroke="#000000" stroke-width="1.5" opacity="0.7"/>

  <!-- Row 4 partial -->
  <polygon points="160,670 220,630 280,670 280,740 220,780 160,740" fill="#1D3557" stroke="#000000" stroke-width="2" opacity="0.8"/>
  <polygon points="280,670 340,630 400,670 400,740 340,780 280,740" fill="#F4D35E" stroke="#000000" stroke-width="2" opacity="0.85"/>
  <polygon points="400,670 460,630 520,670 520,740 460,780 400,740" fill="#2A9D8F" stroke="#000000" stroke-width="2" opacity="0.8"/>
  <polygon points="520,670 580,630 640,670 640,740 580,780 520,740" fill="#1D3557" stroke="#000000" stroke-width="2" opacity="0.9"/>

  <!-- Asymmetric accent triangles -->
  <polygon points="50,50 90,30 70,80" fill="#E63946" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <polygon points="720,720 770,700 750,760" fill="#E63946" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <polygon points="60,700 100,740 40,740" fill="#F4D35E" stroke="#000000" stroke-width="1" opacity="0.4"/>

  <!-- Corner small circles -->
  <circle cx="750" cy="50" r="12" fill="#E63946" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <circle cx="50" cy="400" r="8" fill="#2A9D8F" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <circle cx="760" cy="400" r="10" fill="#F4D35E" stroke="#000000" stroke-width="1" opacity="0.5"/>
</svg>