<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Cream sky background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- TOP THIRD: sky with small yellow circles and coral lines -->
  <circle cx="120" cy="60" r="8" fill="#F4D35E" opacity="0.6"/>
  <circle cx="300" cy="40" r="6" fill="#F4D35E" opacity="0.5"/>
  <circle cx="500" cy="80" r="10" fill="#F4D35E" opacity="0.7"/>
  <circle cx="680" cy="50" r="7" fill="#F4D35E" opacity="0.55"/>
  <circle cx="200" cy="130" r="5" fill="#F4D35E" opacity="0.65"/>
  <circle cx="580" cy="150" r="9" fill="#F4D35E" opacity="0.5"/>
  <circle cx="400" cy="100" r="12" fill="#F4D35E" opacity="0.6"/>
  <circle cx="750" cy="120" r="6" fill="#F4D35E" opacity="0.45"/>
  <line x1="30" y1="70" x2="770" y2="70" stroke="#E9C46A" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="120" x2="770" y2="120" stroke="#E9C46A" stroke-width="0.8" opacity="0.25"/>
  <line x1="30" y1="170" x2="770" y2="170" stroke="#E9C46A" stroke-width="0.6" opacity="0.2"/>
  <line x1="30" y1="220" x2="770" y2="220" stroke="#E9C46A" stroke-width="1" opacity="0.15"/>
  <!-- MIDDLE THIRD: structures -->
  <!-- Tall blue triangle -->
  <polygon points="180,530 230,250 280,530" fill="#1D3557" opacity="0.85"/>
  <!-- Steel blue rectangle building -->
  <rect x="320" y="330" width="80" height="200" fill="#457B9D" opacity="0.8"/>
  <!-- Teal tall triangle -->
  <polygon points="450,530 490,280 530,530" fill="#2A9D8F" opacity="0.75"/>
  <!-- Blue rectangle building -->
  <rect x="570" y="370" width="60" height="160" fill="#1D3557" opacity="0.7"/>
  <!-- Small steel blue structure -->
  <rect x="660" y="420" width="50" height="110" fill="#457B9D" opacity="0.65"/>
  <!-- Teal accent bar -->
  <rect x="100" y="480" width="120" height="30" fill="#2A9D8F" opacity="0.6"/>
  <!-- Red sun at horizon -->
  <circle cx="400" cy="530" r="60" fill="#E63946" opacity="0.9"/>
  <!-- Horizon line -->
  <line x1="0" y1="530" x2="800" y2="530" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  <!-- BOTTOM THIRD: dark ground -->
  <!-- Forest angular ground shapes -->
  <polygon points="0,530 200,530 150,650 0,700" fill="#264653" opacity="0.9"/>
  <polygon points="150,530 400,530 350,680 100,700" fill="#000000" opacity="0.8"/>
  <polygon points="350,530 550,530 600,660 300,680" fill="#6D2E46" opacity="0.85"/>
  <polygon points="500,530 700,530 750,640 550,700" fill="#264653" opacity="0.8"/>
  <polygon points="650,530 800,530 800,700 700,680" fill="#000000" opacity="0.75"/>
  <!-- Bottom fill -->
  <polygon points="0,700 150,650 300,680 550,700 700,680 800,700 800,800 0,800" fill="#264653" opacity="0.95"/>
  <!-- Ground texture: dark shapes -->
  <rect x="50" y="720" width="40" height="20" fill="#6D2E46" opacity="0.5"/>
  <rect x="200" y="740" width="60" height="15" fill="#000000" opacity="0.4"/>
  <rect x="500" y="730" width="45" height="25" fill="#6D2E46" opacity="0.45"/>
  <rect x="650" y="750" width="55" height="18" fill="#000000" opacity="0.35"/>
  <!-- White negative space accents -->
  <rect x="340" y="350" width="40" height="25" fill="#FFFFFF" opacity="0.6"/>
  <rect x="580" y="390" width="30" height="20" fill="#FFFFFF" opacity="0.5"/>
</svg>