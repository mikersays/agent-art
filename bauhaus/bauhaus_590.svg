<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle structural lines -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="650" x2="800" y2="650" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>

  <!-- Triangular base -->
  <polygon points="250,750 550,750 400,650" fill="#1D3557" opacity="0.9"/>
  <polygon points="270,748 530,748 400,660" fill="#264653" opacity="0.5"/>
  <!-- Base platform -->
  <rect x="220" y="750" width="360" height="30" fill="#000000" opacity="0.85"/>

  <!-- Tick arc path -->
  <path d="M 180 300 A 300 300 0 0 1 620 300" fill="none" stroke="#000000" stroke-width="2" opacity="0.3"/>

  <!-- Tick marks along the arc -->
  <line x1="188" y1="310" x2="205" y2="330" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="245" x2="240" y2="270" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="270" y1="195" x2="288" y2="222" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="332" y1="162" x2="345" y2="192" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="150" x2="400" y2="182" stroke="#000000" stroke-width="3" opacity="0.7"/>
  <line x1="468" y1="162" x2="455" y2="192" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="530" y1="195" x2="512" y2="222" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="580" y1="245" x2="560" y2="270" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="612" y1="310" x2="595" y2="330" stroke="#000000" stroke-width="2" opacity="0.5"/>

  <!-- Ghost arm position 1 - far left -->
  <line x1="400" y1="650" x2="215" y2="270" stroke="#E63946" stroke-width="4" opacity="0.15"/>
  <circle cx="215" cy="270" r="14" fill="#E63946" opacity="0.15"/>

  <!-- Ghost arm position 2 - left -->
  <line x1="400" y1="650" x2="270" y2="210" stroke="#E63946" stroke-width="4" opacity="0.2"/>
  <circle cx="270" cy="210" r="14" fill="#E63946" opacity="0.2"/>

  <!-- Ghost arm position 3 - left-center -->
  <line x1="400" y1="650" x2="335" y2="175" stroke="#F4D35E" stroke-width="4" opacity="0.3"/>
  <circle cx="335" cy="175" r="14" fill="#F4D35E" opacity="0.3"/>

  <!-- Main arm position - center (current) -->
  <line x1="400" y1="650" x2="400" y2="160" stroke="#000000" stroke-width="5" opacity="0.9"/>
  <circle cx="400" cy="160" r="18" fill="#E63946"/>
  <circle cx="400" cy="160" r="10" fill="#1D3557"/>

  <!-- Ghost arm position 5 - right-center -->
  <line x1="400" y1="650" x2="465" y2="175" stroke="#F4D35E" stroke-width="4" opacity="0.3"/>
  <circle cx="465" cy="175" r="14" fill="#F4D35E" opacity="0.3"/>

  <!-- Ghost arm position 6 - right -->
  <line x1="400" y1="650" x2="530" y2="210" stroke="#1D3557" stroke-width="4" opacity="0.2"/>
  <circle cx="530" cy="210" r="14" fill="#1D3557" opacity="0.2"/>

  <!-- Ghost arm position 7 - far right -->
  <line x1="400" y1="650" x2="585" y2="270" stroke="#1D3557" stroke-width="4" opacity="0.15"/>
  <circle cx="585" cy="270" r="14" fill="#1D3557" opacity="0.15"/>

  <!-- Pivot point -->
  <circle cx="400" cy="650" r="12" fill="#000000"/>
  <circle cx="400" cy="650" r="7" fill="#A89F91"/>
  <circle cx="400" cy="650" r="3" fill="#000000"/>

  <!-- Weight on arm -->
  <rect x="388" y="380" width="24" height="50" fill="#F4D35E" opacity="0.85"/>
  <rect x="385" y="375" width="30" height="8" fill="#000000" opacity="0.6"/>

  <!-- Small decorative elements -->
  <circle cx="100" cy="100" r="8" fill="#E63946" opacity="0.2"/>
  <circle cx="700" cy="100" r="8" fill="#1D3557" opacity="0.2"/>
  <rect x="50" y="740" width="40" height="8" fill="#F4D35E" opacity="0.3"/>
  <rect x="710" y="740" width="40" height="8" fill="#F4D35E" opacity="0.3"/>

  <!-- Motion blur lines -->
  <path d="M 250 350 A 200 200 0 0 1 550 350" fill="none" stroke="#E63946" stroke-width="1" opacity="0.12"/>
  <path d="M 280 400 A 170 170 0 0 1 520 400" fill="none" stroke="#1D3557" stroke-width="1" opacity="0.1"/>
</svg>