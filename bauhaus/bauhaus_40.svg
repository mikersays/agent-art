<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Kaleidoscope</title>
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Background circle -->
  <circle cx="400" cy="400" r="370" fill="none" stroke="#A89F91" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="400" r="350" fill="#000000" opacity="0.02"/>

  <defs>
    <!-- Define one quadrant (top-right), then mirror it 4 ways -->
    <g id="quadrant">
      <!-- Large triangle -->
      <polygon points="400,400 560,240 700,400" fill="#E63946" opacity="0.8"/>
      <!-- Medium triangle -->
      <polygon points="400,400 480,280 560,400" fill="#1D3557" opacity="0.85"/>
      <!-- Small triangle accent -->
      <polygon points="400,400 440,340 480,400" fill="#F4D35E" opacity="0.9"/>

      <!-- Outer triangles -->
      <polygon points="560,240 630,200 700,280" fill="#457B9D" opacity="0.7"/>
      <polygon points="630,200 700,180 700,280" fill="#E9C46A" opacity="0.6"/>
      <polygon points="480,280 530,220 580,280" fill="#F4D35E" opacity="0.5"/>

      <!-- Decorative triangles -->
      <polygon points="600,300 650,260 700,340" fill="#A89F91" opacity="0.6"/>
      <polygon points="500,360 540,320 580,380" fill="#E63946" opacity="0.4"/>
      <polygon points="620,350 660,320 700,380" fill="#1D3557" opacity="0.5"/>

      <!-- Circles at key intersections -->
      <circle cx="560" cy="320" r="22" fill="#F4D35E" opacity="0.7"/>
      <circle cx="560" cy="320" r="12" fill="#FFFFFF" opacity="0.5"/>
      <circle cx="480" cy="340" r="14" fill="#1D3557" opacity="0.6"/>
      <circle cx="480" cy="340" r="7" fill="#FFFFFF" opacity="0.4"/>
      <circle cx="640" cy="280" r="16" fill="#E63946" opacity="0.5"/>
      <circle cx="640" cy="280" r="8" fill="#FFFFFF" opacity="0.4"/>
      <circle cx="520" cy="380" r="10" fill="#457B9D" opacity="0.7"/>
      <circle cx="670" cy="350" r="12" fill="#E9C46A" opacity="0.6"/>
      <circle cx="670" cy="350" r="6" fill="#000000" opacity="0.3"/>

      <!-- Small accent circles -->
      <circle cx="440" cy="370" r="6" fill="#E63946" opacity="0.8"/>
      <circle cx="600" cy="260" r="8" fill="#000000" opacity="0.4"/>
      <circle cx="700" cy="340" r="5" fill="#F4D35E" opacity="0.6"/>
      <circle cx="530" cy="290" r="5" fill="#E9C46A" opacity="0.7"/>

      <!-- Line accents -->
      <line x1="400" y1="400" x2="700" y2="200" stroke="#000000" stroke-width="1" opacity="0.15"/>
      <line x1="400" y1="400" x2="700" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
    </g>
  </defs>

  <!-- Four-fold symmetry: place the quadrant in all four orientations -->
  <!-- Top-right quadrant (original) -->
  <use href="#quadrant"/>

  <!-- Top-left quadrant (mirror horizontally) -->
  <g transform="scale(-1,1) translate(-800,0)">
    <use href="#quadrant"/>
  </g>

  <!-- Bottom-right quadrant (mirror vertically) -->
  <g transform="scale(1,-1) translate(0,-800)">
    <use href="#quadrant"/>
  </g>

  <!-- Bottom-left quadrant (mirror both) -->
  <g transform="scale(-1,-1) translate(-800,-800)">
    <use href="#quadrant"/>
  </g>

  <!-- Central hub overlay -->
  <circle cx="400" cy="400" r="40" fill="#000000"/>
  <circle cx="400" cy="400" r="30" fill="#E63946"/>
  <circle cx="400" cy="400" r="20" fill="#F4D35E"/>
  <circle cx="400" cy="400" r="10" fill="#000000"/>
  <circle cx="400" cy="400" r="4" fill="#FFFFFF"/>

  <!-- Axis lines through center -->
  <line x1="400" y1="30" x2="400" y2="770" stroke="#000000" stroke-width="0.8" opacity="0.15"/>
  <line x1="30" y1="400" x2="770" y2="400" stroke="#000000" stroke-width="0.8" opacity="0.15"/>
  <line x1="130" y1="130" x2="670" y2="670" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="670" y1="130" x2="130" y2="670" stroke="#000000" stroke-width="0.5" opacity="0.1"/>

  <!-- Outer frame ring -->
  <circle cx="400" cy="400" r="360" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Outer decorative tick marks -->
  <line x1="400" y1="38" x2="400" y2="55" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="745" x2="400" y2="762" stroke="#000000" stroke-width="2"/>
  <line x1="38" y1="400" x2="55" y2="400" stroke="#000000" stroke-width="2"/>
  <line x1="745" y1="400" x2="762" y2="400" stroke="#000000" stroke-width="2"/>
  <!-- Diagonal ticks -->
  <line x1="148" y1="148" x2="160" y2="160" stroke="#000000" stroke-width="1.5"/>
  <line x1="640" y1="148" x2="652" y2="160" stroke="#000000" stroke-width="1.5"/>
  <line x1="148" y1="652" x2="160" y2="640" stroke="#000000" stroke-width="1.5"/>
  <line x1="640" y1="652" x2="652" y2="640" stroke="#000000" stroke-width="1.5"/>

  <!-- Corner squares -->
  <rect x="15" y="15" width="35" height="35" fill="#E63946"/>
  <rect x="750" y="15" width="35" height="35" fill="#1D3557"/>
  <rect x="15" y="750" width="35" height="35" fill="#F4D35E"/>
  <rect x="750" y="750" width="35" height="35" fill="#457B9D"/>

  <!-- Title -->
  <text x="400" y="792" font-family="sans-serif" font-size="14" fill="#000000" text-anchor="middle" letter-spacing="4">KALEIDOSCOPE</text>
</svg>