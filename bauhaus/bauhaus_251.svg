<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Grid lines -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <!-- Radiating lines from center -->
  <line x1="400" y1="400" x2="800" y2="0" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="400" y1="400" x2="0" y2="0" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="400" y1="400" x2="800" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="400" y1="400" x2="0" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="400" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <line x1="400" y1="400" x2="0" y2="400" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <line x1="400" y1="400" x2="400" y2="0" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <line x1="400" y1="400" x2="400" y2="800" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <line x1="400" y1="400" x2="700" y2="100" stroke="#A89F91" stroke-width="0.8" opacity="0.15"/>
  <line x1="400" y1="400" x2="100" y2="100" stroke="#A89F91" stroke-width="0.8" opacity="0.15"/>
  <line x1="400" y1="400" x2="700" y2="700" stroke="#A89F91" stroke-width="0.8" opacity="0.15"/>
  <line x1="400" y1="400" x2="100" y2="700" stroke="#A89F91" stroke-width="0.8" opacity="0.15"/>
  <!-- Large central blue circle -->
  <circle cx="400" cy="400" r="240" fill="#1D3557" opacity="0.85"/>
  <!-- Concentric ring - red -->
  <circle cx="400" cy="400" r="190" fill="none" stroke="#E63946" stroke-width="12" opacity="0.8"/>
  <!-- Concentric ring - yellow -->
  <circle cx="400" cy="400" r="145" fill="none" stroke="#F4D35E" stroke-width="10" opacity="0.75"/>
  <!-- Concentric ring - teal -->
  <circle cx="400" cy="400" r="105" fill="none" stroke="#2A9D8F" stroke-width="8" opacity="0.8"/>
  <!-- Inner circle - white -->
  <circle cx="400" cy="400" r="60" fill="#FFFFFF" opacity="0.9"/>
  <!-- Inner accent - red dot -->
  <circle cx="400" cy="400" r="22" fill="#E63946" opacity="0.9"/>
  <!-- Scattered corner squares - top left -->
  <rect x="30" y="30" width="28" height="28" fill="#E63946" opacity="0.7"/>
  <rect x="75" y="55" width="18" height="18" fill="#F4D35E" opacity="0.6"/>
  <rect x="45" y="90" width="22" height="22" fill="#1D3557" opacity="0.5"/>
  <!-- Scattered corner squares - top right -->
  <rect x="740" y="40" width="24" height="24" fill="#2A9D8F" opacity="0.7"/>
  <rect x="710" y="75" width="16" height="16" fill="#E63946" opacity="0.55"/>
  <rect x="750" y="95" width="20" height="20" fill="#F4D35E" opacity="0.6"/>
  <!-- Scattered corner squares - bottom left -->
  <rect x="35" y="700" width="26" height="26" fill="#F4D35E" opacity="0.65"/>
  <rect x="70" y="730" width="20" height="20" fill="#2A9D8F" opacity="0.7"/>
  <rect x="40" y="755" width="15" height="15" fill="#000000" opacity="0.4"/>
  <!-- Scattered corner squares - bottom right -->
  <rect x="730" y="710" width="30" height="30" fill="#1D3557" opacity="0.6"/>
  <rect x="700" y="745" width="18" height="18" fill="#E63946" opacity="0.65"/>
  <rect x="755" y="755" width="14" height="14" fill="#F4D35E" opacity="0.5"/>
  <!-- Additional accent circles on radiating lines -->
  <circle cx="600" cy="200" r="12" fill="#E76F51" opacity="0.6"/>
  <circle cx="200" cy="600" r="15" fill="#457B9D" opacity="0.55"/>
  <circle cx="620" cy="620" r="10" fill="#F4D35E" opacity="0.5"/>
  <circle cx="180" cy="180" r="14" fill="#2A9D8F" opacity="0.5"/>
  <!-- Outer partial arc accents -->
  <path d="M 400 80 A 320 320 0 0 1 720 400" fill="none" stroke="#E76F51" stroke-width="3" opacity="0.3"/>
  <path d="M 80 400 A 320 320 0 0 1 400 720" fill="none" stroke="#457B9D" stroke-width="3" opacity="0.3"/>
  <!-- Small structural rectangles -->
  <rect x="340" y="120" width="40" height="6" fill="#000000" opacity="0.25"/>
  <rect x="640" y="380" width="6" height="40" fill="#000000" opacity="0.25"/>
</svg>