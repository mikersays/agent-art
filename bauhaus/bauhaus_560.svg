<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Diagonal connecting lines between nest groups -->
  <line x1="160" y1="180" x2="580" y2="200" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <line x1="160" y1="180" x2="350" y2="580" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <line x1="580" y1="200" x2="350" y2="580" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <line x1="160" y1="180" x2="350" y2="580" stroke="#A89F91" stroke-width="1" opacity="0.15"/>
  <line x1="580" y1="200" x2="160" y2="180" stroke="#A89F91" stroke-width="1" opacity="0.15"/>

  <!-- NEST GROUP 1 - Top left area, center at 160,180 -->
  <rect x="60" y="80" width="200" height="200" fill="none" stroke="#1D3557" stroke-width="3" opacity="0.8"/>
  <rect x="85" y="105" width="150" height="150" fill="none" stroke="#E63946" stroke-width="2.5" opacity="0.7"/>
  <rect x="110" y="130" width="100" height="100" fill="none" stroke="#F4D35E" stroke-width="2.5" opacity="0.75"/>
  <rect x="130" y="150" width="60" height="60" fill="none" stroke="#2A9D8F" stroke-width="2" opacity="0.7"/>
  <rect x="145" y="165" width="30" height="30" fill="#1D3557" opacity="0.5"/>

  <!-- NEST GROUP 2 - Top right area, center at 580,200 -->
  <rect x="480" y="100" width="200" height="200" fill="none" stroke="#E63946" stroke-width="3" opacity="0.75"/>
  <rect x="505" y="125" width="150" height="150" fill="none" stroke="#F4D35E" stroke-width="2.5" opacity="0.7"/>
  <rect x="530" y="150" width="100" height="100" fill="none" stroke="#1D3557" stroke-width="2.5" opacity="0.7"/>
  <rect x="550" y="170" width="60" height="60" fill="none" stroke="#E76F51" stroke-width="2" opacity="0.65"/>
  <rect x="565" y="185" width="30" height="30" fill="#E63946" opacity="0.5"/>

  <!-- NEST GROUP 3 - Bottom center area, center at 350,580 -->
  <rect x="225" y="455" width="250" height="250" fill="none" stroke="#F4D35E" stroke-width="3.5" opacity="0.7"/>
  <rect x="262" y="492" width="176" height="176" fill="none" stroke="#264653" stroke-width="3" opacity="0.65"/>
  <rect x="295" y="525" width="110" height="110" fill="none" stroke="#E63946" stroke-width="2.5" opacity="0.7"/>
  <rect x="320" y="550" width="60" height="60" fill="none" stroke="#457B9D" stroke-width="2" opacity="0.65"/>
  <rect x="338" y="568" width="24" height="24" fill="#F4D35E" opacity="0.6"/>

  <!-- Additional diagonal accent lines -->
  <line x1="260" y1="280" x2="480" y2="455" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="680" y1="300" x2="475" y2="455" stroke="#000000" stroke-width="1" opacity="0.15"/>

  <!-- Corner accent circles -->
  <circle cx="40" cy="40" r="14" fill="#E63946" opacity="0.5"/>
  <circle cx="760" cy="40" r="10" fill="#1D3557" opacity="0.5"/>
  <circle cx="40" cy="760" r="12" fill="#F4D35E" opacity="0.5"/>
  <circle cx="760" cy="760" r="16" fill="#264653" opacity="0.5"/>

  <!-- Small circles near nest centers -->
  <circle cx="160" cy="180" r="5" fill="#000000" opacity="0.6"/>
  <circle cx="580" cy="200" r="5" fill="#000000" opacity="0.6"/>
  <circle cx="350" cy="580" r="5" fill="#000000" opacity="0.6"/>

  <!-- Edge accent rectangles -->
  <rect x="0" y="390" width="30" height="8" fill="#E76F51" opacity="0.4"/>
  <rect x="770" y="400" width="30" height="8" fill="#2A9D8F" opacity="0.4"/>
  <rect x="395" y="0" width="8" height="30" fill="#DDA15E" opacity="0.4"/>
  <rect x="390" y="770" width="8" height="30" fill="#457B9D" opacity="0.4"/>

  <!-- Small scattered accent squares -->
  <rect x="300" y="350" width="12" height="12" fill="#A89F91" opacity="0.3" transform="rotate(45, 306, 356)"/>
  <rect x="450" y="400" width="10" height="10" fill="#6D2E46" opacity="0.3" transform="rotate(30, 455, 405)"/>
  <rect x="200" y="450" width="8" height="8" fill="#E9C46A" opacity="0.35"/>
</svg>