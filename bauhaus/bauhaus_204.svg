<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFF"/>
  <!-- Outermost circle ring -->
  <circle cx="400" cy="400" r="370" fill="none" stroke="#000" stroke-width="4"/>
  <circle cx="400" cy="400" r="360" fill="#1D3557" opacity="0.15"/>
  <!-- Outer petal ring - 12 petals -->
  <ellipse cx="400" cy="100" rx="40" ry="90" fill="#E63946" transform="rotate(0,400,400)"/>
  <ellipse cx="400" cy="100" rx="40" ry="90" fill="#1D3557" transform="rotate(30,400,400)"/>
  <ellipse cx="400" cy="100" rx="40" ry="90" fill="#E63946" transform="rotate(60,400,400)"/>
  <ellipse cx="400" cy="100" rx="40" ry="90" fill="#1D3557" transform="rotate(90,400,400)"/>
  <ellipse cx="400" cy="100" rx="40" ry="90" fill="#E63946" transform="rotate(120,400,400)"/>
  <ellipse cx="400" cy="100" rx="40" ry="90" fill="#1D3557" transform="rotate(150,400,400)"/>
  <ellipse cx="400" cy="100" rx="40" ry="90" fill="#E63946" transform="rotate(180,400,400)"/>
  <ellipse cx="400" cy="100" rx="40" ry="90" fill="#1D3557" transform="rotate(210,400,400)"/>
  <ellipse cx="400" cy="100" rx="40" ry="90" fill="#E63946" transform="rotate(240,400,400)"/>
  <ellipse cx="400" cy="100" rx="40" ry="90" fill="#1D3557" transform="rotate(270,400,400)"/>
  <ellipse cx="400" cy="100" rx="40" ry="90" fill="#E63946" transform="rotate(300,400,400)"/>
  <ellipse cx="400" cy="100" rx="40" ry="90" fill="#1D3557" transform="rotate(330,400,400)"/>
  <!-- Middle ring - geometric diamonds -->
  <polygon points="400,180 420,220 400,260 380,220" fill="#F4D35E" transform="rotate(0,400,400)"/>
  <polygon points="400,180 420,220 400,260 380,220" fill="#E76F51" transform="rotate(45,400,400)"/>
  <polygon points="400,180 420,220 400,260 380,220" fill="#F4D35E" transform="rotate(90,400,400)"/>
  <polygon points="400,180 420,220 400,260 380,220" fill="#E76F51" transform="rotate(135,400,400)"/>
  <polygon points="400,180 420,220 400,260 380,220" fill="#F4D35E" transform="rotate(180,400,400)"/>
  <polygon points="400,180 420,220 400,260 380,220" fill="#E76F51" transform="rotate(225,400,400)"/>
  <polygon points="400,180 420,220 400,260 380,220" fill="#F4D35E" transform="rotate(270,400,400)"/>
  <polygon points="400,180 420,220 400,260 380,220" fill="#E76F51" transform="rotate(315,400,400)"/>
  <!-- Inner ring circle -->
  <circle cx="400" cy="400" r="150" fill="none" stroke="#2A9D8F" stroke-width="6"/>
  <!-- Inner triangles pointing outward -->
  <polygon points="400,260 420,290 380,290" fill="#2A9D8F" transform="rotate(0,400,400)"/>
  <polygon points="400,260 420,290 380,290" fill="#2A9D8F" transform="rotate(60,400,400)"/>
  <polygon points="400,260 420,290 380,290" fill="#2A9D8F" transform="rotate(120,400,400)"/>
  <polygon points="400,260 420,290 380,290" fill="#2A9D8F" transform="rotate(180,400,400)"/>
  <polygon points="400,260 420,290 380,290" fill="#2A9D8F" transform="rotate(240,400,400)"/>
  <polygon points="400,260 420,290 380,290" fill="#2A9D8F" transform="rotate(300,400,400)"/>
  <!-- Inner concentric circles -->
  <circle cx="400" cy="400" r="100" fill="#457B9D" opacity="0.5"/>
  <circle cx="400" cy="400" r="100" fill="none" stroke="#000" stroke-width="3"/>
  <circle cx="400" cy="400" r="70" fill="#F4D35E" opacity="0.6"/>
  <circle cx="400" cy="400" r="70" fill="none" stroke="#E63946" stroke-width="3"/>
  <circle cx="400" cy="400" r="40" fill="#E63946"/>
  <circle cx="400" cy="400" r="40" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Center dot -->
  <circle cx="400" cy="400" r="12" fill="#000"/>
  <circle cx="400" cy="400" r="5" fill="#FFF"/>
  <!-- Radiating lines from center -->
  <line x1="400" y1="400" x2="400" y2="30" stroke="#000" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="400" x2="720" y2="215" stroke="#000" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="400" x2="720" y2="585" stroke="#000" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="400" x2="400" y2="770" stroke="#000" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="400" x2="80" y2="585" stroke="#000" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="400" x2="80" y2="215" stroke="#000" stroke-width="1.5" opacity="0.3"/>
</svg>