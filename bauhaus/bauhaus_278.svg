<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Parallel diagonal lines at 30 degrees - varying colors and thicknesses -->
  <!-- Blue lines -->
  <line x1="0" y1="100" x2="173" y2="0" stroke="#1D3557" stroke-width="2.5" opacity="0.8"/>
  <line x1="0" y1="200" x2="346" y2="0" stroke="#1D3557" stroke-width="1.5" opacity="0.6"/>
  <line x1="0" y1="350" x2="606" y2="0" stroke="#1D3557" stroke-width="3" opacity="0.7"/>
  <line x1="0" y1="550" x2="800" y2="88" stroke="#1D3557" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="700" x2="800" y2="238" stroke="#1D3557" stroke-width="1" opacity="0.65"/>
  <!-- Red lines -->
  <line x1="0" y1="150" x2="260" y2="0" stroke="#E63946" stroke-width="2" opacity="0.75"/>
  <line x1="0" y1="300" x2="520" y2="0" stroke="#E63946" stroke-width="2.5" opacity="0.7"/>
  <line x1="0" y1="480" x2="800" y2="18" stroke="#E63946" stroke-width="1.5" opacity="0.6"/>
  <line x1="0" y1="650" x2="800" y2="188" stroke="#E63946" stroke-width="3" opacity="0.55"/>
  <line x1="100" y1="800" x2="800" y2="396" stroke="#E63946" stroke-width="1.5" opacity="0.5"/>
  <!-- Yellow lines -->
  <line x1="0" y1="250" x2="433" y2="0" stroke="#F4D35E" stroke-width="3" opacity="0.8"/>
  <line x1="0" y1="430" x2="744" y2="0" stroke="#F4D35E" stroke-width="2" opacity="0.65"/>
  <line x1="0" y1="600" x2="800" y2="138" stroke="#F4D35E" stroke-width="2.5" opacity="0.6"/>
  <line x1="0" y1="760" x2="800" y2="298" stroke="#F4D35E" stroke-width="1.5" opacity="0.7"/>
  <line x1="200" y1="800" x2="800" y2="454" stroke="#F4D35E" stroke-width="2" opacity="0.5"/>
  <!-- Black lines -->
  <line x1="0" y1="50" x2="87" y2="0" stroke="#000000" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="800" x2="800" y2="367" stroke="#000000" stroke-width="1.5" opacity="0.45"/>
  <line x1="300" y1="800" x2="800" y2="511" stroke="#000000" stroke-width="2" opacity="0.4"/>
  <line x1="500" y1="800" x2="800" y2="627" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <!-- Teal lines -->
  <line x1="0" y1="500" x2="800" y2="38" stroke="#2A9D8F" stroke-width="2" opacity="0.55"/>
  <line x1="400" y1="800" x2="800" y2="569" stroke="#2A9D8F" stroke-width="2.5" opacity="0.5"/>
  <line x1="0" y1="800" x2="800" y2="338" stroke="#2A9D8F" stroke-width="1.5" opacity="0.45"/>
  <!-- Circles interrupting the lines -->
  <circle cx="200" cy="200" r="45" fill="#E63946" opacity="0.8"/>
  <circle cx="550" cy="150" r="35" fill="#F4D35E" opacity="0.75"/>
  <circle cx="400" cy="450" r="55" fill="#1D3557" opacity="0.7"/>
  <circle cx="650" cy="350" r="30" fill="#2A9D8F" opacity="0.65"/>
  <circle cx="150" cy="550" r="40" fill="#000000" opacity="0.5"/>
  <circle cx="600" cy="600" r="50" fill="#E63946" opacity="0.6"/>
  <!-- Squares interrupting the lines -->
  <rect x="320" y="120" width="60" height="60" fill="#F4D35E" opacity="0.8"/>
  <rect x="100" y="350" width="50" height="50" fill="#1D3557" opacity="0.7"/>
  <rect x="500" y="500" width="70" height="70" fill="#000000" opacity="0.45"/>
  <rect x="680" y="200" width="45" height="45" fill="#E63946" opacity="0.65"/>
  <rect x="350" y="650" width="55" height="55" fill="#F4D35E" opacity="0.7"/>
  <!-- Lines with gaps (shorter segments creating rhythm) -->
  <line x1="0" y1="170" x2="100" y2="112" stroke="#457B9D" stroke-width="2" opacity="0.6"/>
  <line x1="150" y1="83" x2="295" y2="0" stroke="#457B9D" stroke-width="2" opacity="0.6"/>
  <line x1="250" y1="800" x2="400" y2="713" stroke="#457B9D" stroke-width="2" opacity="0.5"/>
  <line x1="450" y1="684" x2="650" y2="569" stroke="#457B9D" stroke-width="2" opacity="0.5"/>
  <!-- Small accent shapes -->
  <circle cx="300" cy="300" r="8" fill="#F4D35E" opacity="0.9"/>
  <circle cx="700" cy="500" r="6" fill="#E63946" opacity="0.8"/>
  <circle cx="450" cy="250" r="7" fill="#2A9D8F" opacity="0.7"/>
  <!-- Corner accents -->
  <rect x="15" y="15" width="25" height="25" fill="#1D3557" opacity="0.3"/>
  <rect x="760" y="760" width="25" height="25" fill="#E63946" opacity="0.3"/>
  <circle cx="775" cy="30" r="12" fill="#F4D35E" opacity="0.35"/>
  <circle cx="25" cy="775" r="12" fill="#2A9D8F" opacity="0.35"/>
</svg>