<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Nested Frames - Bauhaus Style</title>
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Outermost frame - Black -->
  <rect x="20" y="20" width="760" height="760" fill="none" stroke="#000000" stroke-width="8"/>

  <!-- Frame 2 - rotated slightly clockwise, deep blue fill -->
  <g transform="rotate(3, 400, 400)">
    <rect x="50" y="50" width="700" height="700" fill="#1D3557" opacity="0.15"/>
    <rect x="50" y="50" width="700" height="700" fill="none" stroke="#1D3557" stroke-width="6"/>
  </g>

  <!-- Frame 3 - rotated counter-clockwise, red -->
  <g transform="rotate(-5, 400, 400)">
    <rect x="85" y="85" width="630" height="630" fill="#E63946" opacity="0.1"/>
    <rect x="85" y="85" width="630" height="630" fill="none" stroke="#E63946" stroke-width="5"/>
  </g>

  <!-- Frame 4 - rotated clockwise, forest green -->
  <g transform="rotate(8, 400, 400)">
    <rect x="120" y="120" width="560" height="560" fill="#264653" opacity="0.12"/>
    <rect x="120" y="120" width="560" height="560" fill="none" stroke="#264653" stroke-width="5"/>
  </g>

  <!-- Frame 5 - rotated counter-clockwise, yellow fill -->
  <g transform="rotate(-4, 400, 400)">
    <rect x="155" y="155" width="490" height="490" fill="#F4D35E" opacity="0.2"/>
    <rect x="155" y="155" width="490" height="490" fill="none" stroke="#F4D35E" stroke-width="5"/>
  </g>

  <!-- Frame 6 - rotated clockwise, burgundy -->
  <g transform="rotate(11, 400, 400)">
    <rect x="190" y="190" width="420" height="420" fill="#6D2E46" opacity="0.12"/>
    <rect x="190" y="190" width="420" height="420" fill="none" stroke="#6D2E46" stroke-width="4"/>
  </g>

  <!-- Frame 7 - rotated counter-clockwise, sand -->
  <g transform="rotate(-7, 400, 400)">
    <rect x="225" y="225" width="350" height="350" fill="#DDA15E" opacity="0.18"/>
    <rect x="225" y="225" width="350" height="350" fill="none" stroke="#DDA15E" stroke-width="4"/>
  </g>

  <!-- Frame 8 - rotated clockwise, black -->
  <g transform="rotate(6, 400, 400)">
    <rect x="260" y="260" width="280" height="280" fill="#000000" opacity="0.06"/>
    <rect x="260" y="260" width="280" height="280" fill="none" stroke="#000000" stroke-width="4"/>
  </g>

  <!-- Frame 9 - rotated counter-clockwise, red -->
  <g transform="rotate(-10, 400, 400)">
    <rect x="295" y="295" width="210" height="210" fill="#E63946" opacity="0.15"/>
    <rect x="295" y="295" width="210" height="210" fill="none" stroke="#E63946" stroke-width="3"/>
  </g>

  <!-- Frame 10 - rotated clockwise, blue -->
  <g transform="rotate(14, 400, 400)">
    <rect x="325" y="325" width="150" height="150" fill="#1D3557" opacity="0.2"/>
    <rect x="325" y="325" width="150" height="150" fill="none" stroke="#1D3557" stroke-width="3"/>
  </g>

  <!-- Frame 11 - rotated counter-clockwise, yellow -->
  <g transform="rotate(-3, 400, 400)">
    <rect x="350" y="350" width="100" height="100" fill="#F4D35E" opacity="0.35"/>
    <rect x="350" y="350" width="100" height="100" fill="none" stroke="#F4D35E" stroke-width="3"/>
  </g>

  <!-- Frame 12 - innermost, rotated, forest fill -->
  <g transform="rotate(9, 400, 400)">
    <rect x="372" y="372" width="56" height="56" fill="#264653" opacity="0.4"/>
    <rect x="372" y="372" width="56" height="56" fill="none" stroke="#264653" stroke-width="2.5"/>
  </g>

  <!-- Center point -->
  <circle cx="400" cy="400" r="6" fill="#E63946"/>
  <circle cx="400" cy="400" r="3" fill="#000000"/>

  <!-- Corner accent marks on outermost frame -->
  <rect x="20" y="20" width="30" height="30" fill="#E63946"/>
  <rect x="750" y="20" width="30" height="30" fill="#1D3557"/>
  <rect x="20" y="750" width="30" height="30" fill="#F4D35E"/>
  <rect x="750" y="750" width="30" height="30" fill="#264653"/>

  <!-- Diagonal reference lines through center -->
  <line x1="20" y1="20" x2="780" y2="780" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="780" y1="20" x2="20" y2="780" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="20" x2="400" y2="780" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="20" y1="400" x2="780" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.1"/>

  <!-- Small decorative circles at intersections of frames -->
  <circle cx="85" cy="85" r="4" fill="#E63946"/>
  <circle cx="715" cy="85" r="4" fill="#E63946"/>
  <circle cx="85" cy="715" r="4" fill="#E63946"/>
  <circle cx="715" cy="715" r="4" fill="#E63946"/>

  <circle cx="155" cy="155" r="3" fill="#F4D35E"/>
  <circle cx="645" cy="155" r="3" fill="#F4D35E"/>
  <circle cx="155" cy="645" r="3" fill="#F4D35E"/>
  <circle cx="645" cy="645" r="3" fill="#F4D35E"/>

  <circle cx="225" cy="225" r="3" fill="#DDA15E"/>
  <circle cx="575" cy="225" r="3" fill="#DDA15E"/>
  <circle cx="225" cy="575" r="3" fill="#DDA15E"/>
  <circle cx="575" cy="575" r="3" fill="#DDA15E"/>

  <!-- Shadow/depth rectangles offset slightly -->
  <rect x="55" y="55" width="700" height="700" fill="none" stroke="#1D3557" stroke-width="1" opacity="0.08" transform="translate(3,3)"/>
  <rect x="120" y="120" width="560" height="560" fill="none" stroke="#264653" stroke-width="1" opacity="0.08" transform="translate(3,3)"/>
  <rect x="190" y="190" width="420" height="420" fill="none" stroke="#6D2E46" stroke-width="1" opacity="0.08" transform="translate(3,3)"/>
</svg>