<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFF"/>
  <!-- Accordion: Zigzag folded form with alternating colored panels -->

  <!-- Background subtle grid -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#A89F91" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#A89F91" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#A89F91" stroke-width="0.5" opacity="0.3"/>

  <!-- Main accordion bellows - zigzag panels -->
  <!-- Panel 1 -->
  <polygon points="100,200 200,150 200,600 100,650" fill="#E63946" stroke="#000" stroke-width="2"/>
  <!-- Panel 2 -->
  <polygon points="200,150 300,220 300,620 200,600" fill="#1D3557" stroke="#000" stroke-width="2"/>
  <!-- Panel 3 -->
  <polygon points="300,220 400,160 400,610 300,620" fill="#F4D35E" stroke="#000" stroke-width="2"/>
  <!-- Panel 4 -->
  <polygon points="400,160 500,230 500,630 400,610" fill="#E63946" stroke="#000" stroke-width="2"/>
  <!-- Panel 5 -->
  <polygon points="500,230 600,170 600,620 500,630" fill="#2A9D8F" stroke="#000" stroke-width="2"/>
  <!-- Panel 6 -->
  <polygon points="600,170 700,240 700,640 600,620" fill="#F4D35E" stroke="#000" stroke-width="2"/>

  <!-- Top bellows folds - zigzag lines -->
  <polyline points="100,200 200,150 300,220 400,160 500,230 600,170 700,240" fill="none" stroke="#000" stroke-width="3"/>
  <!-- Bottom bellows folds -->
  <polyline points="100,650 200,600 300,620 400,610 500,630 600,620 700,640" fill="none" stroke="#000" stroke-width="3"/>

  <!-- Bellows crease lines - horizontal across panels -->
  <polyline points="100,350 200,300 300,350 400,310 500,360 600,320 700,370" fill="none" stroke="#000" stroke-width="1.5" opacity="0.6"/>
  <polyline points="100,500 200,450 300,500 400,460 500,510 600,470 700,520" fill="none" stroke="#000" stroke-width="1.5" opacity="0.6"/>

  <!-- Left end piece (keyboard end) -->
  <rect x="50" y="190" width="50" height="470" fill="#000" stroke="#000" stroke-width="2"/>
  <rect x="55" y="250" width="40" height="30" rx="2" fill="#FFF"/>
  <rect x="55" y="310" width="40" height="30" rx="2" fill="#FFF"/>
  <rect x="55" y="370" width="40" height="30" rx="2" fill="#FFF"/>
  <rect x="55" y="430" width="40" height="30" rx="2" fill="#FFF"/>
  <rect x="55" y="490" width="40" height="30" rx="2" fill="#FFF"/>
  <rect x="55" y="550" width="40" height="30" rx="2" fill="#FFF"/>

  <!-- Right end piece -->
  <rect x="700" y="230" width="50" height="420" fill="#000" stroke="#000" stroke-width="2"/>
  <circle cx="725" cy="350" r="8" fill="#E63946"/>
  <circle cx="725" cy="440" r="8" fill="#2A9D8F"/>
  <circle cx="725" cy="530" r="8" fill="#F4D35E"/>

  <!-- Shadow/depth lines on panels -->
  <line x1="150" y1="180" x2="150" y2="625" stroke="#000" stroke-width="0.8" opacity="0.3"/>
  <line x1="250" y1="185" x2="250" y2="610" stroke="#000" stroke-width="0.8" opacity="0.3"/>
  <line x1="350" y1="190" x2="350" y2="615" stroke="#000" stroke-width="0.8" opacity="0.3"/>
  <line x1="450" y1="195" x2="450" y2="620" stroke="#000" stroke-width="0.8" opacity="0.3"/>
  <line x1="550" y1="200" x2="550" y2="625" stroke="#000" stroke-width="0.8" opacity="0.3"/>
  <line x1="650" y1="195" x2="650" y2="630" stroke="#000" stroke-width="0.8" opacity="0.3"/>

  <!-- Title circle -->
  <circle cx="400" cy="80" r="45" fill="#1D3557"/>
  <text x="400" y="87" font-family="sans-serif" font-size="18" fill="#FFF" text-anchor="middle" font-weight="bold">126</text>

  <!-- Decorative corner elements -->
  <rect x="20" y="20" width="40" height="4" fill="#E63946"/>
  <rect x="20" y="20" width="4" height="40" fill="#E63946"/>
  <rect x="740" y="20" width="40" height="4" fill="#1D3557"/>
  <rect x="776" y="20" width="4" height="40" fill="#1D3557"/>
  <rect x="20" y="776" width="40" height="4" fill="#F4D35E"/>
  <rect x="20" y="740" width="4" height="40" fill="#F4D35E"/>
  <rect x="740" y="776" width="40" height="4" fill="#2A9D8F"/>
  <rect x="776" y="740" width="4" height="40" fill="#2A9D8F"/>

  <!-- Musical note decorations -->
  <circle cx="160" cy="720" r="6" fill="#000"/>
  <line x1="166" y1="720" x2="166" y2="695" stroke="#000" stroke-width="2"/>
  <circle cx="220" cy="730" r="6" fill="#000"/>
  <line x1="226" y1="730" x2="226" y2="705" stroke="#000" stroke-width="2"/>
</svg>