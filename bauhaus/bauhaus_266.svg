<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Outermost square - Blue -->
  <rect x="80" y="120" width="600" height="600" fill="#1D3557" opacity="0.9" stroke="#000000" stroke-width="2"/>

  <!-- Second square - Red -->
  <rect x="140" y="160" width="500" height="500" fill="#E63946" opacity="0.8" stroke="#000000" stroke-width="1.5"/>

  <!-- Third square - Yellow -->
  <rect x="210" y="210" width="400" height="400" fill="#F4D35E" opacity="0.7" stroke="#000000" stroke-width="1"/>

  <!-- Fourth square - Teal -->
  <rect x="290" y="270" width="300" height="300" fill="#2A9D8F" opacity="0.6" stroke="#000000" stroke-width="1"/>

  <!-- Fifth square - Steel Blue -->
  <rect x="360" y="340" width="220" height="220" fill="#457B9D" opacity="0.5" stroke="#000000" stroke-width="1"/>

  <!-- Sixth square - Burgundy -->
  <rect x="420" y="400" width="140" height="140" fill="#6D2E46" opacity="0.45" stroke="#000000" stroke-width="0.5"/>

  <!-- Innermost square - White -->
  <rect x="465" y="445" width="70" height="70" fill="#FFFFFF" opacity="0.9" stroke="#000000" stroke-width="0.5"/>

  <!-- Diagonal lines cutting through -->
  <line x1="80" y1="120" x2="680" y2="720" stroke="#000000" stroke-width="2" opacity="0.3"/>
  <line x1="680" y1="120" x2="80" y2="720" stroke="#000000" stroke-width="2" opacity="0.3"/>
  <line x1="50" y1="400" x2="750" y2="200" stroke="#E63946" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="50" x2="600" y2="780" stroke="#1D3557" stroke-width="1.5" opacity="0.4"/>
  <line x1="30" y1="600" x2="770" y2="350" stroke="#000000" stroke-width="1" opacity="0.2"/>

  <!-- Small circles in gaps between squares -->
  <circle cx="110" cy="150" r="12" fill="#E63946" opacity="0.8"/>
  <circle cx="650" cy="700" r="10" fill="#1D3557" opacity="0.7"/>
  <circle cx="160" cy="640" r="8" fill="#F4D35E" opacity="0.9"/>
  <circle cx="600" cy="180" r="14" fill="#E63946" opacity="0.6"/>
  <circle cx="230" cy="230" r="6" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="570" cy="580" r="9" fill="#1D3557" opacity="0.7"/>
  <circle cx="320" cy="290" r="7" fill="#E63946" opacity="0.75"/>
  <circle cx="500" cy="340" r="5" fill="#F4D35E" opacity="0.8"/>
  <circle cx="130" cy="400" r="11" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="670" cy="450" r="10" fill="#E76F51" opacity="0.7"/>
  <circle cx="400" cy="140" r="8" fill="#1D3557" opacity="0.8"/>
  <circle cx="250" cy="700" r="13" fill="#E63946" opacity="0.5"/>

  <!-- Additional accent circles -->
  <circle cx="500" cy="160" r="6" fill="#A8DADC" opacity="0.7"/>
  <circle cx="660" cy="300" r="7" fill="#DDA15E" opacity="0.6"/>
  <circle cx="100" cy="700" r="9" fill="#E9C46A" opacity="0.5"/>
  <circle cx="720" cy="600" r="8" fill="#A89F91" opacity="0.6"/>

  <!-- Extra diagonal accents -->
  <line x1="100" y1="750" x2="350" y2="100" stroke="#E63946" stroke-width="1" opacity="0.25"/>
  <line x1="450" y1="80" x2="750" y2="700" stroke="#1D3557" stroke-width="1" opacity="0.25"/>

  <!-- Corner accent shapes -->
  <rect x="20" y="20" width="30" height="30" fill="#1D3557" opacity="0.4"/>
  <rect x="750" y="20" width="30" height="30" fill="#E63946" opacity="0.4"/>
  <rect x="20" y="750" width="30" height="30" fill="#E63946" opacity="0.4"/>
  <rect x="750" y="750" width="30" height="30" fill="#1D3557" opacity="0.4"/>
</svg>