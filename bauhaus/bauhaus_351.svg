<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Background grid lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>

  <!-- Massive teal circle at center-right -->
  <circle cx="500" cy="380" r="250" fill="#2A9D8F" opacity="0.85"/>

  <!-- Concentric rings in blue -->
  <circle cx="500" cy="380" r="200" fill="none" stroke="#1D3557" stroke-width="4" opacity="0.7"/>
  <circle cx="500" cy="380" r="150" fill="none" stroke="#1D3557" stroke-width="3" opacity="0.5"/>
  <circle cx="500" cy="380" r="100" fill="none" stroke="#E63946" stroke-width="4" opacity="0.8"/>
  <circle cx="500" cy="380" r="60" fill="none" stroke="#E63946" stroke-width="2.5" opacity="0.6"/>
  <circle cx="500" cy="380" r="30" fill="#E63946" opacity="0.9"/>

  <!-- Thin black diagonal lines crossing composition -->
  <line x1="0" y1="0" x2="800" y2="800" stroke="#000000" stroke-width="1.5" opacity="0.25"/>
  <line x1="100" y1="0" x2="800" y2="700" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="100" x2="700" y2="800" stroke="#000000" stroke-width="1" opacity="0.15"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="#000000" stroke-width="1.5" opacity="0.2"/>
  <line x1="600" y1="0" x2="0" y2="600" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="800" y1="200" x2="200" y2="800" stroke="#000000" stroke-width="1" opacity="0.12"/>

  <!-- Scattered small yellow squares radiating outward -->
  <rect x="280" y="200" width="15" height="15" fill="#F4D35E" opacity="0.9"/>
  <rect x="350" y="140" width="12" height="12" fill="#F4D35E" opacity="0.85"/>
  <rect x="200" y="350" width="18" height="18" fill="#F4D35E" opacity="0.9"/>
  <rect x="150" y="280" width="10" height="10" fill="#F4D35E" opacity="0.8"/>
  <rect x="680" y="180" width="14" height="14" fill="#F4D35E" opacity="0.9"/>
  <rect x="720" y="500" width="16" height="16" fill="#F4D35E" opacity="0.85"/>
  <rect x="620" y="620" width="12" height="12" fill="#F4D35E" opacity="0.8"/>
  <rect x="380" y="650" width="20" height="20" fill="#F4D35E" opacity="0.9"/>
  <rect x="100" y="500" width="13" height="13" fill="#F4D35E" opacity="0.85"/>
  <rect x="250" y="600" width="11" height="11" fill="#F4D35E" opacity="0.75"/>
  <rect x="700" y="300" width="15" height="15" fill="#F4D35E" opacity="0.9"/>
  <rect x="450" y="100" width="10" height="10" fill="#F4D35E" opacity="0.7"/>
  <rect x="130" y="150" width="14" height="14" fill="#F4D35E" opacity="0.8"/>
  <rect x="550" y="680" width="16" height="16" fill="#F4D35E" opacity="0.85"/>

  <!-- Small burgundy circles in corners -->
  <circle cx="50" cy="50" r="20" fill="#6D2E46" opacity="0.8"/>
  <circle cx="750" cy="50" r="15" fill="#6D2E46" opacity="0.7"/>
  <circle cx="50" cy="750" r="18" fill="#6D2E46" opacity="0.75"/>
  <circle cx="750" cy="750" r="22" fill="#6D2E46" opacity="0.8"/>
  <circle cx="40" cy="120" r="8" fill="#6D2E46" opacity="0.5"/>
  <circle cx="760" cy="700" r="10" fill="#6D2E46" opacity="0.5"/>

  <!-- Additional accent elements -->
  <rect x="60" y="400" width="80" height="6" fill="#1D3557" opacity="0.6"/>
  <rect x="100" y="430" width="60" height="4" fill="#E63946" opacity="0.5"/>
  <circle cx="300" cy="450" r="8" fill="#E76F51" opacity="0.7"/>
  <circle cx="650" cy="250" r="6" fill="#E76F51" opacity="0.6"/>
</svg>