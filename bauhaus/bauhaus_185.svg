<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <title>Fractal Tree</title>
  <!-- Background -->
  <rect width="800" height="800" fill="#FFF"/>
  <!-- Ground -->
  <rect x="0" y="700" width="800" height="100" fill="#000"/>
  <!-- Ground accent line -->
  <line x1="0" y1="700" x2="800" y2="700" stroke="#2A9D8F" stroke-width="3"/>
  <!-- LEVEL 0: Trunk -->
  <rect x="385" y="560" width="30" height="140" fill="#000"/>
  <!-- LEVEL 1: Two main branches from trunk top -->
  <!-- Left branch L1 -->
  <line x1="400" y1="560" x2="280" y2="440" stroke="#6D2E46" stroke-width="14"/>
  <!-- Right branch L1 -->
  <line x1="400" y1="560" x2="520" y2="440" stroke="#6D2E46" stroke-width="14"/>
  <!-- LEVEL 2: Each L1 splits into 2 -->
  <!-- Left-Left L2 -->
  <line x1="280" y1="440" x2="200" y2="340" stroke="#1D3557" stroke-width="9"/>
  <!-- Left-Right L2 -->
  <line x1="280" y1="440" x2="330" y2="330" stroke="#1D3557" stroke-width="9"/>
  <!-- Right-Left L2 -->
  <line x1="520" y1="440" x2="470" y2="330" stroke="#1D3557" stroke-width="9"/>
  <!-- Right-Right L2 -->
  <line x1="520" y1="440" x2="600" y2="340" stroke="#1D3557" stroke-width="9"/>
  <!-- LEVEL 3: Each L2 splits into 2 (8 branches) -->
  <!-- LL-L -->
  <line x1="200" y1="340" x2="150" y2="260" stroke="#457B9D" stroke-width="6"/>
  <!-- LL-R -->
  <line x1="200" y1="340" x2="230" y2="255" stroke="#457B9D" stroke-width="6"/>
  <!-- LR-L -->
  <line x1="330" y1="330" x2="300" y2="245" stroke="#457B9D" stroke-width="6"/>
  <!-- LR-R -->
  <line x1="330" y1="330" x2="365" y2="250" stroke="#457B9D" stroke-width="6"/>
  <!-- RL-L -->
  <line x1="470" y1="330" x2="435" y2="250" stroke="#457B9D" stroke-width="6"/>
  <!-- RL-R -->
  <line x1="470" y1="330" x2="500" y2="245" stroke="#457B9D" stroke-width="6"/>
  <!-- RR-L -->
  <line x1="600" y1="340" x2="570" y2="255" stroke="#457B9D" stroke-width="6"/>
  <!-- RR-R -->
  <line x1="600" y1="340" x2="650" y2="260" stroke="#457B9D" stroke-width="6"/>
  <!-- LEVEL 4: Each L3 splits into 2 (16 branches) -->
  <line x1="150" y1="260" x2="120" y2="200" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="150" y1="260" x2="165" y2="195" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="230" y1="255" x2="210" y2="195" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="230" y1="255" x2="250" y2="190" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="300" y1="245" x2="278" y2="185" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="300" y1="245" x2="318" y2="182" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="365" y1="250" x2="345" y2="188" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="365" y1="250" x2="385" y2="190" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="435" y1="250" x2="415" y2="190" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="435" y1="250" x2="455" y2="188" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="500" y1="245" x2="482" y2="182" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="500" y1="245" x2="522" y2="185" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="570" y1="255" x2="550" y2="190" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="570" y1="255" x2="590" y2="195" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="650" y1="260" x2="635" y2="195" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="650" y1="260" x2="680" y2="200" stroke="#2A9D8F" stroke-width="3"/>
  <!-- LEVEL 5: Terminal leaf nodes (32 dots as circles) -->
  <circle cx="120" cy="195" r="8" fill="#E63946"/>
  <circle cx="165" cy="190" r="8" fill="#F4D35E"/>
  <circle cx="210" cy="190" r="8" fill="#E63946"/>
  <circle cx="250" cy="185" r="8" fill="#F4D35E"/>
  <circle cx="278" cy="180" r="8" fill="#E63946"/>
  <circle cx="318" cy="177" r="8" fill="#F4D35E"/>
  <circle cx="345" cy="183" r="8" fill="#E63946"/>
  <circle cx="385" cy="185" r="8" fill="#F4D35E"/>
  <circle cx="415" cy="185" r="8" fill="#E63946"/>
  <circle cx="455" cy="183" r="8" fill="#F4D35E"/>
  <circle cx="482" cy="177" r="8" fill="#E63946"/>
  <circle cx="522" cy="180" r="8" fill="#F4D35E"/>
  <circle cx="550" cy="185" r="8" fill="#E63946"/>
  <circle cx="590" cy="190" r="8" fill="#F4D35E"/>
  <circle cx="635" cy="190" r="8" fill="#E63946"/>
  <circle cx="680" cy="195" r="8" fill="#F4D35E"/>
  <!-- Sun/moon in sky -->
  <circle cx="650" cy="80" r="45" fill="#F4D35E"/>
  <circle cx="650" cy="80" r="35" fill="#FFF" opacity="0.3"/>
  <!-- Bauhaus corner accents -->
  <rect x="20" y="20" width="40" height="40" fill="#E63946"/>
  <rect x="20" y="70" width="40" height="5" fill="#000"/>
</svg>