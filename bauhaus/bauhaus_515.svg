<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- HORIZONTAL LINES - Red and Blue, dense in center, sparse at edges -->
  <!-- Sparse top region -->
  <line x1="200" y1="80" x2="600" y2="80" stroke="#E63946" stroke-width="2" opacity="0.3"/>
  <line x1="250" y1="130" x2="550" y2="130" stroke="#1D3557" stroke-width="3" opacity="0.3"/>
  <!-- Transitioning to denser -->
  <line x1="150" y1="200" x2="650" y2="200" stroke="#E63946" stroke-width="3" opacity="0.5"/>
  <line x1="120" y1="250" x2="680" y2="250" stroke="#1D3557" stroke-width="4" opacity="0.5"/>
  <line x1="100" y1="300" x2="700" y2="300" stroke="#E63946" stroke-width="5" opacity="0.6"/>
  <line x1="80" y1="350" x2="720" y2="350" stroke="#1D3557" stroke-width="6" opacity="0.65"/>
  <!-- Dense center -->
  <line x1="60" y1="380" x2="740" y2="380" stroke="#E63946" stroke-width="7" opacity="0.7"/>
  <line x1="50" y1="410" x2="750" y2="410" stroke="#1D3557" stroke-width="8" opacity="0.7"/>
  <line x1="50" y1="440" x2="750" y2="440" stroke="#E63946" stroke-width="7" opacity="0.7"/>
  <line x1="60" y1="470" x2="740" y2="470" stroke="#1D3557" stroke-width="6" opacity="0.65"/>
  <!-- Transitioning sparser -->
  <line x1="80" y1="510" x2="720" y2="510" stroke="#E63946" stroke-width="5" opacity="0.6"/>
  <line x1="100" y1="560" x2="700" y2="560" stroke="#1D3557" stroke-width="4" opacity="0.5"/>
  <line x1="150" y1="620" x2="650" y2="620" stroke="#E63946" stroke-width="3" opacity="0.5"/>
  <!-- Sparse bottom -->
  <line x1="200" y1="690" x2="600" y2="690" stroke="#1D3557" stroke-width="3" opacity="0.3"/>
  <line x1="250" y1="740" x2="550" y2="740" stroke="#E63946" stroke-width="2" opacity="0.3"/>
  <!-- VERTICAL LINES - Yellow and Teal -->
  <line x1="80" y1="200" x2="80" y2="600" stroke="#F4D35E" stroke-width="2" opacity="0.3"/>
  <line x1="150" y1="150" x2="150" y2="650" stroke="#2A9D8F" stroke-width="3" opacity="0.4"/>
  <line x1="230" y1="100" x2="230" y2="700" stroke="#F4D35E" stroke-width="4" opacity="0.5"/>
  <line x1="300" y1="80" x2="300" y2="720" stroke="#2A9D8F" stroke-width="5" opacity="0.55"/>
  <line x1="360" y1="60" x2="360" y2="740" stroke="#F4D35E" stroke-width="6" opacity="0.6"/>
  <line x1="410" y1="50" x2="410" y2="750" stroke="#2A9D8F" stroke-width="7" opacity="0.65"/>
  <line x1="460" y1="50" x2="460" y2="750" stroke="#F4D35E" stroke-width="7" opacity="0.65"/>
  <line x1="520" y1="60" x2="520" y2="740" stroke="#2A9D8F" stroke-width="6" opacity="0.6"/>
  <line x1="580" y1="80" x2="580" y2="720" stroke="#F4D35E" stroke-width="5" opacity="0.55"/>
  <line x1="640" y1="100" x2="640" y2="700" stroke="#2A9D8F" stroke-width="4" opacity="0.5"/>
  <line x1="710" y1="150" x2="710" y2="650" stroke="#F4D35E" stroke-width="3" opacity="0.4"/>
  <line x1="760" y1="200" x2="760" y2="600" stroke="#2A9D8F" stroke-width="2" opacity="0.3"/>
  <!-- Intersection accents - small squares and circles at key crossings -->
  <!-- Center crossings -->
  <rect x="355" y="405" width="12" height="12" fill="#E76F51" opacity="0.9"/>
  <circle cx="460" cy="410" r="6" fill="#6D2E46" opacity="0.8"/>
  <rect x="404" y="434" width="12" height="12" fill="#000000" opacity="0.7"/>
  <circle cx="360" cy="440" r="5" fill="#E76F51" opacity="0.8"/>
  <rect x="455" y="465" width="10" height="10" fill="#6D2E46" opacity="0.7"/>
  <circle cx="520" cy="380" r="6" fill="#000000" opacity="0.7"/>
  <rect x="295" y="375" width="10" height="10" fill="#E76F51" opacity="0.8"/>
  <circle cx="300" cy="410" r="5" fill="#000000" opacity="0.7"/>
  <circle cx="580" cy="440" r="5" fill="#6D2E46" opacity="0.7"/>
  <rect x="225" y="345" width="10" height="10" fill="#E76F51" opacity="0.6"/>
  <circle cx="640" cy="350" r="5" fill="#000000" opacity="0.6"/>
  <rect x="515" y="505" width="8" height="8" fill="#E76F51" opacity="0.6"/>
  <circle cx="230" cy="510" r="4" fill="#6D2E46" opacity="0.6"/>
</svg>