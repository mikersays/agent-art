  <rect x="317" y="308" width="10" height="10" fill="#E63946" opacity="0.6" transform="rotate(45,322,313)"/>
  <rect x="317" y="508" width="10" height="10" fill="#F4D35E" opacity="0.6" transform="rotate(45,322,513)"/>
