  <polygon points="660,175 705,250 615,250" fill="#F4D35E" opacity="0.85"/>
  <polygon points="660,285 695,345 625,345" fill="#F4D35E" opacity="0.8"/>
  <polygon points="660,380 710,460 610,460" fill="#F4D35E" opacity="0.9"/>
  <polygon points="660,490 700,555 620,555" fill="#F4D35E" opacity="0.85"/>
  <polygon points="660,585 705,655 615,655" fill="#F4D35E" opacity="0.8"/>
