  <rect x="205" y="310" width="115" height="5" fill="#000000" opacity="0.6"/>
  <rect x="490" y="320" width="130" height="5" fill="#000000" opacity="0.6"/>
  <rect x="205" y="510" width="115" height="6" fill="#000000" opacity="0.65"/>
  <rect x="490" y="500" width="130" height="6" fill="#000000" opacity="0.65"/>
  <rect x="205" y="700" width="115" height="5" fill="#000000" opacity="0.55"/>
  <rect x="490" y="690" width="130" height="5" fill="#000000" opacity="0.55"/>
