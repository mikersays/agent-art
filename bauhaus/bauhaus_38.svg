<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Propeller</title>
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Subtle radial background -->
  <circle cx="400" cy="400" r="380" fill="none" stroke="#A89F91" stroke-width="0.3"/>
  <circle cx="400" cy="400" r="340" fill="none" stroke="#A89F91" stroke-width="0.3"/>
  <circle cx="400" cy="400" r="300" fill="none" stroke="#A89F91" stroke-width="0.3"/>
  <circle cx="400" cy="400" r="260" fill="none" stroke="#A89F91" stroke-width="0.3"/>

  <!-- Motion arc lines - outermost -->
  <path d="M400,50 A350,350 0 0,1 740,320" fill="none" stroke="#A89F91" stroke-width="1" stroke-dasharray="8,6" opacity="0.5"/>
  <path d="M740,480 A350,350 0 0,1 400,750" fill="none" stroke="#A89F91" stroke-width="1" stroke-dasharray="8,6" opacity="0.5"/>
  <path d="M400,750 A350,350 0 0,1 60,480" fill="none" stroke="#A89F91" stroke-width="1" stroke-dasharray="8,6" opacity="0.5"/>
  <path d="M60,320 A350,350 0 0,1 400,50" fill="none" stroke="#A89F91" stroke-width="1" stroke-dasharray="8,6" opacity="0.5"/>

  <!-- BLADE 1 - Top (Red) - pointing up -->
  <ellipse cx="400" cy="220" rx="60" ry="180" fill="#E63946" opacity="0.85" transform="rotate(-15, 400, 400)"/>
  <ellipse cx="400" cy="240" rx="40" ry="150" fill="#E63946" opacity="0.6" transform="rotate(-5, 400, 400)"/>
  <!-- Blade 1 highlight -->
  <ellipse cx="395" cy="250" rx="18" ry="120" fill="#FFFFFF" opacity="0.15" transform="rotate(-10, 400, 400)"/>

  <!-- BLADE 2 - Right (Blue) - pointing right-down -->
  <ellipse cx="555" cy="490" rx="60" ry="180" fill="#1D3557" opacity="0.85" transform="rotate(105, 400, 400)"/>
  <ellipse cx="540" cy="480" rx="40" ry="150" fill="#1D3557" opacity="0.6" transform="rotate(115, 400, 400)"/>
  <!-- Blade 2 highlight -->
  <ellipse cx="530" cy="475" rx="18" ry="120" fill="#FFFFFF" opacity="0.15" transform="rotate(110, 400, 400)"/>

  <!-- BLADE 3 - Left (Yellow) - pointing left-down -->
  <ellipse cx="245" cy="490" rx="60" ry="180" fill="#F4D35E" opacity="0.85" transform="rotate(-105, 400, 400)"/>
  <ellipse cx="260" cy="480" rx="40" ry="150" fill="#F4D35E" opacity="0.6" transform="rotate(-115, 400, 400)"/>
  <!-- Blade 3 highlight -->
  <ellipse cx="270" cy="475" rx="18" ry="120" fill="#FFFFFF" opacity="0.15" transform="rotate(-110, 400, 400)"/>

  <!-- BLADE 4 - Bottom (Steel Blue) -->
  <ellipse cx="400" cy="580" rx="55" ry="170" fill="#457B9D" opacity="0.75" transform="rotate(195, 400, 400)"/>
  <ellipse cx="400" cy="565" rx="35" ry="140" fill="#457B9D" opacity="0.5" transform="rotate(185, 400, 400)"/>

  <!-- Overlapping blade intersection accents -->
  <circle cx="400" cy="310" r="20" fill="#000000" opacity="0.1"/>
  <circle cx="480" cy="450" r="20" fill="#000000" opacity="0.1"/>
  <circle cx="320" cy="450" r="20" fill="#000000" opacity="0.1"/>

  <!-- Motion lines - curved streaks around the propeller -->
  <!-- Outer motion arcs -->
  <path d="M200,100 Q250,90 280,110" fill="none" stroke="#E63946" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M170,130 Q220,115 260,140" fill="none" stroke="#E63946" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M150,160 Q195,148 235,170" fill="none" stroke="#E63946" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

  <path d="M680,220 Q695,270 675,310" fill="none" stroke="#1D3557" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M710,250 Q720,295 700,335" fill="none" stroke="#1D3557" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M735,275 Q742,315 725,350" fill="none" stroke="#1D3557" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

  <path d="M600,680 Q555,700 510,690" fill="none" stroke="#457B9D" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M620,710 Q575,725 530,715" fill="none" stroke="#457B9D" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M635,735 Q590,748 545,740" fill="none" stroke="#457B9D" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

  <path d="M120,550 Q110,500 130,460" fill="none" stroke="#F4D35E" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M90,570 Q82,520 100,480" fill="none" stroke="#F4D35E" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M65,585 Q58,540 75,500" fill="none" stroke="#F4D35E" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

  <!-- Speed lines - small dashes radiating outward -->
  <line x1="280" y1="150" x2="260" y2="130" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="300" y1="130" x2="285" y2="108" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="660" y1="320" x2="685" y2="305" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="650" y1="350" x2="675" y2="340" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="520" y1="660" x2="530" y2="685" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="490" y1="670" x2="495" y2="695" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="150" y1="470" x2="125" y2="460" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  <line x1="145" y1="500" x2="120" y2="495" stroke="#000000" stroke-width="1.5" opacity="0.4"/>

  <!-- Central hub -->
  <circle cx="400" cy="400" r="50" fill="#000000"/>
  <circle cx="400" cy="400" r="38" fill="#1D3557"/>
  <circle cx="400" cy="400" r="26" fill="#A89F91"/>
  <circle cx="400" cy="400" r="16" fill="#000000"/>
  <circle cx="400" cy="400" r="8" fill="#E63946"/>
  <!-- Hub bolt details -->
  <circle cx="400" cy="370" r="4" fill="#000000" opacity="0.5"/>
  <circle cx="426" cy="387" r="4" fill="#000000" opacity="0.5"/>
  <circle cx="426" cy="413" r="4" fill="#000000" opacity="0.5"/>
  <circle cx="400" cy="430" r="4" fill="#000000" opacity="0.5"/>
  <circle cx="374" cy="413" r="4" fill="#000000" opacity="0.5"/>
  <circle cx="374" cy="387" r="4" fill="#000000" opacity="0.5"/>

  <!-- Corner geometric accents -->
  <rect x="20" y="20" width="60" height="8" fill="#000000"/>
  <rect x="20" y="20" width="8" height="60" fill="#000000"/>
  <rect x="720" y="20" width="60" height="8" fill="#E63946"/>
  <rect x="772" y="20" width="8" height="60" fill="#E63946"/>
  <rect x="20" y="772" width="60" height="8" fill="#F4D35E"/>
  <rect x="20" y="720" width="8" height="60" fill="#F4D35E"/>
  <rect x="720" y="772" width="60" height="8" fill="#1D3557"/>
  <rect x="772" y="720" width="8" height="60" fill="#1D3557"/>

  <!-- Title -->
  <text x="400" y="785" font-family="sans-serif" font-size="14" fill="#000000" text-anchor="middle" letter-spacing="4">PROPELLER</text>
</svg>