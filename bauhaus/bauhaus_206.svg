<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#1D3557"/>
  <!-- Orrery - Mechanical solar system model -->
  <!-- Background starfield dots -->
  <circle cx="50" cy="80" r="1.5" fill="#FFF" opacity="0.6"/>
  <circle cx="150" cy="40" r="1" fill="#FFF" opacity="0.5"/>
  <circle cx="700" cy="100" r="1.5" fill="#FFF" opacity="0.7"/>
  <circle cx="620" cy="60" r="1" fill="#FFF" opacity="0.4"/>
  <circle cx="300" cy="30" r="1.2" fill="#FFF" opacity="0.5"/>
  <circle cx="750" cy="300" r="1" fill="#FFF" opacity="0.6"/>
  <circle cx="80" cy="700" r="1.5" fill="#FFF" opacity="0.5"/>
  <circle cx="680" cy="720" r="1" fill="#FFF" opacity="0.4"/>
  <!-- Base/pedestal -->
  <rect x="340" y="650" width="120" height="20" rx="3" fill="#A89F91"/>
  <rect x="360" y="620" width="80" height="30" fill="#000"/>
  <rect x="320" y="670" width="160" height="12" rx="4" fill="#000"/>
  <line x1="400" y1="400" x2="400" y2="620" stroke="#A89F91" stroke-width="4"/>
  <!-- Central post connector -->
  <circle cx="400" cy="400" r="8" fill="#A89F91" stroke="#000" stroke-width="2"/>
  <!-- Orbit track 1 (innermost) -->
  <circle cx="400" cy="400" r="60" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.5"/>
  <!-- Orbit arm 1 -->
  <line x1="400" y1="400" x2="460" y2="400" stroke="#A89F91" stroke-width="2"/>
  <!-- Planet 1 - Mercury -->
  <circle cx="460" cy="400" r="8" fill="#E9C46A"/>
  <!-- Orbit track 2 -->
  <circle cx="400" cy="400" r="110" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.4"/>
  <!-- Orbit arm 2 -->
  <line x1="400" y1="400" x2="345" y2="300" stroke="#A89F91" stroke-width="2"/>
  <!-- Planet 2 - Venus -->
  <circle cx="345" cy="300" r="12" fill="#F4D35E"/>
  <!-- Orbit track 3 -->
  <circle cx="400" cy="400" r="170" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.35"/>
  <!-- Orbit arm 3 -->
  <line x1="400" y1="400" x2="530" y2="280" stroke="#A89F91" stroke-width="2"/>
  <!-- Planet 3 - Earth -->
  <circle cx="530" cy="280" r="14" fill="#264653"/>
  <!-- Moon -->
  <circle cx="548" cy="272" r="4" fill="#FFF"/>
  <!-- Orbit track 4 -->
  <circle cx="400" cy="400" r="230" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.3"/>
  <!-- Orbit arm 4 -->
  <line x1="400" y1="400" x2="250" y2="520" stroke="#A89F91" stroke-width="2"/>
  <!-- Planet 4 - Mars -->
  <circle cx="250" cy="520" r="10" fill="#E63946"/>
  <!-- Orbit track 5 (outermost) -->
  <circle cx="400" cy="400" r="300" fill="none" stroke="#A89F91" stroke-width="1.5" opacity="0.25"/>
  <!-- Orbit arm 5 -->
  <line x1="400" y1="400" x2="400" y2="100" stroke="#A89F91" stroke-width="2"/>
  <!-- Planet 5 - Jupiter -->
  <circle cx="400" cy="100" r="22" fill="#E9C46A" stroke="#A89F91" stroke-width="1"/>
  <line x1="378" y1="95" x2="422" y2="95" stroke="#A89F91" stroke-width="1" opacity="0.6"/>
  <line x1="380" y1="105" x2="420" y2="105" stroke="#A89F91" stroke-width="1" opacity="0.6"/>
  <!-- Sun at center -->
  <circle cx="400" cy="400" r="28" fill="#F4D35E"/>
  <circle cx="400" cy="400" r="22" fill="#E9C46A"/>
  <!-- Sun rays -->
  <line x1="400" y1="368" x2="400" y2="358" stroke="#F4D35E" stroke-width="2"/>
  <line x1="400" y1="432" x2="400" y2="442" stroke="#F4D35E" stroke-width="2"/>
  <line x1="368" y1="400" x2="358" y2="400" stroke="#F4D35E" stroke-width="2"/>
  <line x1="432" y1="400" x2="442" y2="400" stroke="#F4D35E" stroke-width="2"/>
  <!-- Gear decoration on base -->
  <circle cx="400" cy="660" r="12" fill="none" stroke="#A89F91" stroke-width="2"/>
  <circle cx="400" cy="660" r="6" fill="#A89F91"/>
</svg>