<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Tension field: diagonal lines left-to-right -->
  <line x1="0" y1="50" x2="800" y2="200" stroke="#E63946" stroke-width="2" opacity="0.8"/>
  <line x1="0" y1="120" x2="800" y2="450" stroke="#1D3557" stroke-width="4" opacity="0.7"/>
  <line x1="0" y1="200" x2="800" y2="100" stroke="#000000" stroke-width="1.5" opacity="0.9"/>
  <line x1="0" y1="300" x2="800" y2="600" stroke="#E63946" stroke-width="3" opacity="0.6"/>
  <line x1="0" y1="350" x2="800" y2="50" stroke="#1D3557" stroke-width="2" opacity="0.8"/>
  <line x1="0" y1="420" x2="800" y2="350" stroke="#000000" stroke-width="5" opacity="0.5"/>
  <line x1="0" y1="500" x2="800" y2="750" stroke="#E63946" stroke-width="1" opacity="0.9"/>
  <line x1="0" y1="580" x2="800" y2="300" stroke="#1D3557" stroke-width="3" opacity="0.7"/>
  <line x1="0" y1="650" x2="800" y2="550" stroke="#000000" stroke-width="2" opacity="0.8"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#E63946" stroke-width="4" opacity="0.5"/>
  <line x1="0" y1="760" x2="800" y2="150" stroke="#1D3557" stroke-width="1.5" opacity="0.6"/>
  <line x1="0" y1="160" x2="800" y2="680" stroke="#000000" stroke-width="3" opacity="0.4"/>
  <!-- Endpoint circles - left side -->
  <circle cx="0" cy="50" r="5" fill="#E63946"/>
  <circle cx="0" cy="120" r="7" fill="#1D3557"/>
  <circle cx="0" cy="200" r="4" fill="#000000"/>
  <circle cx="0" cy="300" r="6" fill="#E63946"/>
  <circle cx="0" cy="420" r="8" fill="#000000"/>
  <circle cx="0" cy="580" r="5" fill="#1D3557"/>
  <circle cx="0" cy="700" r="7" fill="#E63946"/>
  <!-- Endpoint circles - right side -->
  <circle cx="800" cy="200" r="5" fill="#E63946"/>
  <circle cx="800" cy="450" r="7" fill="#1D3557"/>
  <circle cx="800" cy="100" r="4" fill="#000000"/>
  <circle cx="800" cy="600" r="6" fill="#E63946"/>
  <circle cx="800" cy="350" r="8" fill="#000000"/>
  <circle cx="800" cy="750" r="5" fill="#E63946"/>
  <circle cx="800" cy="300" r="6" fill="#1D3557"/>
  <!-- Yellow rectangles at intersections -->
  <rect x="280" y="240" width="45" height="30" fill="#F4D35E" opacity="0.85"/>
  <rect x="520" y="380" width="35" height="50" fill="#F4D35E" opacity="0.75"/>
  <rect x="150" y="450" width="55" height="25" fill="#F4D35E" opacity="0.9"/>
  <rect x="620" y="180" width="40" height="40" fill="#F4D35E" opacity="0.8"/>
  <!-- Teal rectangles at intersections -->
  <rect x="400" y="320" width="50" height="35" fill="#2A9D8F" opacity="0.7"/>
  <rect x="100" y="150" width="30" height="55" fill="#2A9D8F" opacity="0.8"/>
  <rect x="680" y="520" width="45" height="30" fill="#2A9D8F" opacity="0.75"/>
  <rect x="350" y="600" width="35" height="45" fill="#2A9D8F" opacity="0.65"/>
  <!-- Additional accent shapes -->
  <circle cx="400" cy="400" r="12" fill="#E63946" opacity="0.6"/>
  <circle cx="200" cy="300" r="8" fill="#1D3557" opacity="0.7"/>
  <circle cx="600" cy="500" r="10" fill="#000000" opacity="0.5"/>
  <rect x="450" y="150" width="20" height="20" fill="#E76F51" opacity="0.7"/>
  <rect x="250" y="550" width="25" height="15" fill="#E76F51" opacity="0.6"/>
</svg>