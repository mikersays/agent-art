<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Background grid lines -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.08"/>
  <!-- Irregular floating grid rectangles with slight rotations -->
  <!-- Row 1 -->
  <rect x="50" y="40" width="140" height="100" fill="#1D3557" stroke="#000000" stroke-width="2" opacity="0.75" transform="rotate(2 120 90)"/>
  <rect x="230" y="50" width="120" height="80" fill="none" stroke="#000000" stroke-width="2" opacity="0.6" transform="rotate(-1 290 90)"/>
  <rect x="400" y="30" width="160" height="110" fill="#E63946" stroke="#000000" stroke-width="2" opacity="0.7" transform="rotate(3 480 85)"/>
  <rect x="610" y="55" width="130" height="90" fill="#F4D35E" stroke="#000000" stroke-width="2" opacity="0.65" transform="rotate(-2 675 100)"/>
  <!-- Row 2 -->
  <rect x="70" y="190" width="110" height="130" fill="#F4D35E" stroke="#000000" stroke-width="2" opacity="0.6" transform="rotate(-3 125 255)"/>
  <rect x="220" y="180" width="150" height="100" fill="none" stroke="#000000" stroke-width="2" opacity="0.5" transform="rotate(1 295 230)"/>
  <rect x="420" y="200" width="100" height="120" fill="#1D3557" stroke="#000000" stroke-width="2" opacity="0.55" transform="rotate(-2 470 260)"/>
  <rect x="580" y="185" width="170" height="95" fill="#E63946" stroke="#000000" stroke-width="2" opacity="0.5" transform="rotate(2 665 232)"/>
  <!-- Row 3 -->
  <rect x="40" y="370" width="180" height="80" fill="#E63946" stroke="#000000" stroke-width="2" opacity="0.6" transform="rotate(1 130 410)"/>
  <rect x="260" y="350" width="130" height="130" fill="none" stroke="#000000" stroke-width="2.5" opacity="0.55" transform="rotate(-1 325 415)"/>
  <rect x="440" y="380" width="110" height="90" fill="#F4D35E" stroke="#000000" stroke-width="2" opacity="0.7" transform="rotate(3 495 425)"/>
  <rect x="600" y="360" width="150" height="110" fill="#1D3557" stroke="#000000" stroke-width="2" opacity="0.6" transform="rotate(-3 675 415)"/>
  <!-- Row 4 -->
  <rect x="60" y="520" width="130" height="110" fill="none" stroke="#000000" stroke-width="2" opacity="0.5" transform="rotate(2 125 575)"/>
  <rect x="240" y="540" width="140" height="80" fill="#2A9D8F" stroke="#000000" stroke-width="2" opacity="0.65" transform="rotate(-2 310 580)"/>
  <rect x="430" y="530" width="120" height="100" fill="#E63946" stroke="#000000" stroke-width="2" opacity="0.45" transform="rotate(1 490 580)"/>
  <rect x="600" y="515" width="160" height="120" fill="none" stroke="#000000" stroke-width="2" opacity="0.6" transform="rotate(-1 680 575)"/>
  <!-- Row 5 -->
  <rect x="80" y="690" width="150" height="80" fill="#1D3557" stroke="#000000" stroke-width="2" opacity="0.55" transform="rotate(-2 155 730)"/>
  <rect x="280" y="700" width="100" height="70" fill="#F4D35E" stroke="#000000" stroke-width="2" opacity="0.6" transform="rotate(3 330 735)"/>
  <rect x="430" y="680" width="140" height="95" fill="none" stroke="#000000" stroke-width="2" opacity="0.5" transform="rotate(-1 500 727)"/>
  <rect x="620" y="695" width="130" height="75" fill="#2A9D8F" stroke="#000000" stroke-width="2" opacity="0.7" transform="rotate(2 685 732)"/>
  <!-- Circles at grid intersections -->
  <circle cx="200" cy="160" r="8" fill="#000000" opacity="0.6"/>
  <circle cx="380" cy="160" r="6" fill="#E63946" opacity="0.7"/>
  <circle cx="570" cy="160" r="7" fill="#F4D35E" opacity="0.65"/>
  <circle cx="200" cy="340" r="7" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="400" cy="340" r="9" fill="#000000" opacity="0.55"/>
  <circle cx="570" cy="340" r="6" fill="#E63946" opacity="0.6"/>
  <circle cx="200" cy="510" r="8" fill="#F4D35E" opacity="0.65"/>
  <circle cx="400" cy="510" r="7" fill="#1D3557" opacity="0.6"/>
  <circle cx="580" cy="510" r="9" fill="#000000" opacity="0.5"/>
  <circle cx="200" cy="680" r="6" fill="#E63946" opacity="0.55"/>
  <circle cx="400" cy="680" r="8" fill="#2A9D8F" opacity="0.65"/>
  <circle cx="580" cy="680" r="7" fill="#F4D35E" opacity="0.6"/>
  <!-- Small accent circles -->
  <circle cx="750" cy="160" r="5" fill="#E76F51" opacity="0.5"/>
  <circle cx="750" cy="510" r="5" fill="#457B9D" opacity="0.5"/>
  <circle cx="50" cy="340" r="5" fill="#DDA15E" opacity="0.5"/>
  <circle cx="50" cy="680" r="5" fill="#6D2E46" opacity="0.5"/>
</svg>