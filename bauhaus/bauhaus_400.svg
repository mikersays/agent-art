<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Background grid lines at 0.05 opacity -->
  <line x1="100" y1="0" x2="100" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="700" y1="0" x2="700" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#000000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#000000" stroke-width="0.5" opacity="0.05"/>

  <!-- Dominant large blue circle -->
  <circle cx="320" cy="380" r="220" fill="#1D3557" opacity="0.8"/>

  <!-- Dominant large red rectangle -->
  <rect x="350" y="250" width="320" height="350" fill="#E63946" opacity="0.7"/>

  <!-- Overlap creates visual interest -->

  <!-- Medium shapes layer -->
  <circle cx="550" cy="200" r="80" fill="#F4D35E" opacity="0.65"/>
  <rect x="80" y="100" width="150" height="100" fill="#2A9D8F" opacity="0.6"/>
  <polygon points="650,550 750,700 550,700" fill="#264653" opacity="0.7"/>
  <circle cx="180" cy="620" r="90" fill="#E76F51" opacity="0.5"/>
  <rect x="500" y="100" width="200" height="80" fill="#457B9D" opacity="0.55"/>
  <ellipse cx="680" cy="350" rx="60" ry="40" fill="#DDA15E" opacity="0.5"/>
  <polygon points="100,350 50,500 150,500" fill="#F4D35E" opacity="0.5"/>
  <rect x="600" y="600" width="120" height="80" fill="#A8DADC" opacity="0.6"/>

  <!-- Overlapping accent shapes -->
  <circle cx="400" cy="400" r="50" fill="#F4D35E" opacity="0.6"/>
  <rect x="250" y="550" width="100" height="60" fill="#6D2E46" opacity="0.6"/>
  <polygon points="350,100 400,30 450,100" fill="#E63946" opacity="0.5"/>
  <circle cx="150" cy="250" r="35" fill="#E9C46A" opacity="0.55"/>
  <rect x="50" y="650" width="80" height="120" fill="#1D3557" opacity="0.5"/>
  <ellipse cx="500" cy="650" rx="70" ry="35" fill="#2A9D8F" opacity="0.5"/>
  <polygon points="700,100 750,50 780,120" fill="#E76F51" opacity="0.5"/>
  <rect x="300" y="700" width="150" height="30" fill="#A89F91" opacity="0.6"/>

  <!-- Small scattered shapes for texture -->
  <circle cx="600" cy="500" r="20" fill="#F4D35E" opacity="0.7"/>
  <rect x="420" y="180" width="30" height="30" fill="#FFFFFF" opacity="0.5"/>
  <polygon points="250,200 270,170 290,200" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="700" cy="250" r="15" fill="#E63946" opacity="0.5"/>
  <rect x="150" y="450" width="40" height="25" fill="#F4D35E" opacity="0.5"/>
  <circle cx="450" cy="550" r="18" fill="#FFFFFF" opacity="0.4"/>
  <polygon points="50,50 80,20 110,50" fill="#1D3557" opacity="0.4"/>
  <rect x="680" y="450" width="25" height="50" fill="#6D2E46" opacity="0.5"/>

  <!-- Black dots at key intersections -->
  <circle cx="100" cy="100" r="4" fill="#000000"/>
  <circle cx="200" cy="200" r="4" fill="#000000"/>
  <circle cx="300" cy="300" r="4" fill="#000000"/>
  <circle cx="400" cy="400" r="5" fill="#000000"/>
  <circle cx="500" cy="500" r="4" fill="#000000"/>
  <circle cx="600" cy="600" r="4" fill="#000000"/>
  <circle cx="700" cy="700" r="4" fill="#000000"/>
  <circle cx="200" cy="400" r="3" fill="#000000"/>
  <circle cx="400" cy="200" r="3" fill="#000000"/>
  <circle cx="600" cy="400" r="3" fill="#000000"/>
  <circle cx="400" cy="600" r="3" fill="#000000"/>
  <circle cx="300" cy="500" r="3" fill="#000000"/>
  <circle cx="500" cy="300" r="3" fill="#000000"/>
  <circle cx="100" cy="700" r="3" fill="#000000"/>
  <circle cx="700" cy="100" r="3" fill="#000000"/>

  <!-- Final accent lines -->
  <line x1="320" y1="160" x2="320" y2="600" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="350" y1="250" x2="670" y2="250" stroke="#000000" stroke-width="1" opacity="0.1"/>
  <line x1="670" y1="250" x2="670" y2="600" stroke="#000000" stroke-width="1" opacity="0.1"/>
</svg>