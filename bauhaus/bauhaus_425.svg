<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle background vertical lines for structure -->
  <line x1="400" y1="0" x2="400" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
  <line x1="500" y1="0" x2="500" y2="800" stroke="#000000" stroke-width="0.5" opacity="0.06"/>

  <!-- Outer frame -->
  <rect x="50" y="30" width="700" height="740" fill="none" stroke="#000000" stroke-width="2" opacity="0.15"/>

  <!-- TOTEM - stacked shapes from top to bottom, centered on x=400 -->

  <!-- 1. TOP: Circle - Red -->
  <circle cx="400" cy="110" r="65" fill="#E63946"/>
  <circle cx="400" cy="110" r="48" fill="none" stroke="#000000" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="110" r="28" fill="#FEFAE0" opacity="0.4"/>

  <!-- Separator line 1 -->
  <line x1="160" y1="178" x2="640" y2="178" stroke="#000000" stroke-width="2.5"/>
  <line x1="200" y1="182" x2="600" y2="182" stroke="#000000" stroke-width="0.8" opacity="0.4"/>

  <!-- 2. Wide square - Blue -->
  <rect x="240" y="190" width="320" height="110" fill="#1D3557"/>
  <rect x="260" y="206" width="280" height="78" fill="none" stroke="#A8DADC" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="190" x2="400" y2="300" stroke="#FEFAE0" stroke-width="1" opacity="0.25"/>

  <!-- Separator line 2 -->
  <line x1="140" y1="304" x2="660" y2="304" stroke="#000000" stroke-width="2.5"/>
  <line x1="180" y1="308" x2="620" y2="308" stroke="#000000" stroke-width="0.8" opacity="0.4"/>

  <!-- 3. Triangle - Yellow (wide base) -->
  <polygon points="400,318 560,428 240,428" fill="#F4D35E"/>
  <polygon points="400,330 548,422 252,422" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.25"/>
  <!-- Inner triangle detail -->
  <polygon points="400,345 490,415 310,415" fill="#E63946" opacity="0.3"/>

  <!-- Separator line 3 -->
  <line x1="120" y1="432" x2="680" y2="432" stroke="#000000" stroke-width="2.5"/>
  <line x1="160" y1="436" x2="640" y2="436" stroke="#000000" stroke-width="0.8" opacity="0.4"/>

  <!-- 4. Tall rectangle - Teal (narrower) -->
  <rect x="300" y="445" width="200" height="100" fill="#2A9D8F"/>
  <rect x="314" y="457" width="172" height="76" fill="none" stroke="#FEFAE0" stroke-width="1.5" opacity="0.35"/>
  <line x1="400" y1="445" x2="400" y2="545" stroke="#FEFAE0" stroke-width="1" opacity="0.2"/>

  <!-- Separator line 4 -->
  <line x1="130" y1="549" x2="670" y2="549" stroke="#000000" stroke-width="2.5"/>
  <line x1="170" y1="553" x2="630" y2="553" stroke="#000000" stroke-width="0.8" opacity="0.4"/>

  <!-- 5. Wide ellipse - Orange (very wide) -->
  <ellipse cx="400" cy="605" rx="180" ry="45" fill="#E76F51"/>
  <ellipse cx="400" cy="605" rx="163" ry="33" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.25"/>
  <ellipse cx="400" cy="605" rx="100" ry="22" fill="#FEFAE0" opacity="0.2"/>

  <!-- Separator line 5 -->
  <line x1="150" y1="654" x2="650" y2="654" stroke="#000000" stroke-width="2.5"/>
  <line x1="190" y1="658" x2="610" y2="658" stroke="#000000" stroke-width="0.8" opacity="0.4"/>

  <!-- 6. BOTTOM: Small square - Forest/Dark (narrow) -->
  <rect x="340" y="666" width="120" height="80" fill="#264653"/>
  <rect x="352" y="676" width="96" height="60" fill="none" stroke="#A8DADC" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="666" x2="400" y2="746" stroke="#A8DADC" stroke-width="1" opacity="0.3"/>

  <!-- Bottom base line -->
  <line x1="200" y1="750" x2="600" y2="750" stroke="#000000" stroke-width="3"/>

  <!-- Side accent marks (left) -->
  <rect x="80" y="100" width="30" height="8" fill="#E63946"/>
  <rect x="80" y="235" width="30" height="8" fill="#1D3557"/>
  <rect x="80" y="375" width="30" height="8" fill="#F4D35E"/>
  <rect x="80" y="488" width="30" height="8" fill="#2A9D8F"/>
  <rect x="80" y="600" width="30" height="8" fill="#E76F51"/>
  <rect x="80" y="700" width="30" height="8" fill="#264653"/>

  <!-- Side accent marks (right) -->
  <rect x="690" y="100" width="30" height="8" fill="#E63946"/>
  <rect x="690" y="235" width="30" height="8" fill="#1D3557"/>
  <rect x="690" y="375" width="30" height="8" fill="#F4D35E"/>
  <rect x="690" y="488" width="30" height="8" fill="#2A9D8F"/>
  <rect x="690" y="600" width="30" height="8" fill="#E76F51"/>
  <rect x="690" y="700" width="30" height="8" fill="#264653"/>

  <!-- Side tick marks (left) -->
  <line x1="50" y1="178" x2="75" y2="178" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="304" x2="75" y2="304" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="432" x2="75" y2="432" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="549" x2="75" y2="549" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="654" x2="75" y2="654" stroke="#000000" stroke-width="2" opacity="0.5"/>

  <!-- Side tick marks (right) -->
  <line x1="750" y1="178" x2="725" y2="178" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="750" y1="304" x2="725" y2="304" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="750" y1="432" x2="725" y2="432" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="750" y1="549" x2="725" y2="549" stroke="#000000" stroke-width="2" opacity="0.5"/>
  <line x1="750" y1="654" x2="725" y2="654" stroke="#000000" stroke-width="2" opacity="0.5"/>

  <!-- Small decorative circles on separators -->
  <circle cx="400" cy="178" r="6" fill="#000000"/>
  <circle cx="400" cy="304" r="6" fill="#000000"/>
  <circle cx="400" cy="432" r="6" fill="#000000"/>
  <circle cx="400" cy="549" r="6" fill="#000000"/>
  <circle cx="400" cy="654" r="6" fill="#000000"/>
  <circle cx="400" cy="750" r="7" fill="#000000"/>

  <!-- Corner accent squares -->
  <rect x="55" y="35" width="16" height="16" fill="#000000" opacity="0.6"/>
  <rect x="729" y="35" width="16" height="16" fill="#000000" opacity="0.6"/>
  <rect x="55" y="749" width="16" height="16" fill="#000000" opacity="0.6"/>
  <rect x="729" y="749" width="16" height="16" fill="#000000" opacity="0.6"/>
</svg>
