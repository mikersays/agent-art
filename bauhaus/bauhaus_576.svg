<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#A89F91" stroke-width="0.5" opacity="0.1"/>

  <!-- Top connecting bar -->
  <rect x="80" y="120" width="640" height="12" fill="#E63946" opacity="0.85"/>
  <!-- Bottom connecting bar -->
  <rect x="80" y="668" width="640" height="12" fill="#E63946" opacity="0.85"/>

  <!-- Vertical radiator lines - varying thickness -->
  <rect x="100" y="132" width="8" fill="#E76F51" height="536" opacity="0.9"/>
  <rect x="140" y="132" width="14" fill="#DDA15E" height="536" opacity="0.8"/>
  <rect x="180" y="132" width="6" fill="#E63946" height="536" opacity="0.85"/>
  <rect x="215" y="132" width="18" fill="#E9C46A" height="536" opacity="0.75"/>
  <rect x="258" y="132" width="10" fill="#E76F51" height="536" opacity="0.9"/>
  <rect x="295" y="132" width="5" fill="#DDA15E" height="536" opacity="0.85"/>
  <rect x="328" y="132" width="16" fill="#E63946" height="536" opacity="0.8"/>
  <rect x="370" y="132" width="7" fill="#E9C46A" height="536" opacity="0.9"/>
  <rect x="405" y="132" width="20" fill="#E76F51" height="536" opacity="0.7"/>
  <rect x="450" y="132" width="9" fill="#DDA15E" height="536" opacity="0.85"/>
  <rect x="488" y="132" width="12" fill="#E63946" height="536" opacity="0.9"/>
  <rect x="528" y="132" width="6" fill="#E9C46A" height="536" opacity="0.8"/>
  <rect x="560" y="132" width="15" fill="#E76F51" height="536" opacity="0.85"/>
  <rect x="600" y="132" width="11" fill="#DDA15E" height="536" opacity="0.9"/>
  <rect x="638" y="132" width="8" fill="#E63946" height="536" opacity="0.75"/>
  <rect x="672" y="132" width="18" fill="#E9C46A" height="536" opacity="0.8"/>

  <!-- Secondary horizontal connecting bars -->
  <rect x="100" y="300" width="590" height="4" fill="#A89F91" opacity="0.4"/>
  <rect x="100" y="500" width="590" height="4" fill="#A89F91" opacity="0.4"/>

  <!-- Cool accent circles breaking the pattern -->
  <circle cx="183" cy="250" r="18" fill="#1D3557" opacity="0.85"/>
  <circle cx="410" cy="400" r="24" fill="#457B9D" opacity="0.75"/>
  <circle cx="530" cy="580" r="15" fill="#1D3557" opacity="0.8"/>
  <circle cx="298" cy="480" r="20" fill="#457B9D" opacity="0.7"/>
  <circle cx="640" cy="200" r="12" fill="#1D3557" opacity="0.9"/>
  <circle cx="143" cy="620" r="16" fill="#457B9D" opacity="0.8"/>

  <!-- Small accent squares at corners -->
  <rect x="60" y="60" width="15" height="15" fill="#1D3557" opacity="0.6"/>
  <rect x="725" y="60" width="15" height="15" fill="#E63946" opacity="0.6"/>
  <rect x="60" y="725" width="15" height="15" fill="#E76F51" opacity="0.6"/>
  <rect x="725" y="725" width="15" height="15" fill="#1D3557" opacity="0.6"/>

  <!-- Diagonal accent line -->
  <line x1="60" y1="90" x2="740" y2="90" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
  <line x1="60" y1="710" x2="740" y2="710" stroke="#000000" stroke-width="1.5" opacity="0.15"/>
</svg>