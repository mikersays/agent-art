<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FEFAE0"/>
  <!-- Center aligned grid rectangles -->
  <rect x="280" y="280" width="60" height="60" fill="#1D3557" opacity="0.8"/>
  <rect x="350" y="280" width="60" height="60" fill="#E63946" opacity="0.8"/>
  <rect x="420" y="280" width="60" height="60" fill="#F4D35E" opacity="0.8"/>
  <rect x="280" y="350" width="60" height="60" fill="#F4D35E" opacity="0.75"/>
  <rect x="350" y="350" width="60" height="60" fill="#000000" opacity="0.7"/>
  <rect x="420" y="350" width="60" height="60" fill="#1D3557" opacity="0.8"/>
  <rect x="280" y="420" width="60" height="60" fill="#E63946" opacity="0.75"/>
  <rect x="350" y="420" width="60" height="60" fill="#1D3557" opacity="0.7"/>
  <rect x="420" y="420" width="60" height="60" fill="#F4D35E" opacity="0.8"/>
  <!-- Grid lines - center (aligned) -->
  <line x1="280" y1="270" x2="480" y2="270" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="280" y1="340" x2="480" y2="340" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="280" y1="410" x2="480" y2="410" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="280" y1="480" x2="480" y2="480" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="270" y1="280" x2="270" y2="480" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <line x1="340" y1="280" x2="340" y2="480" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="410" y1="280" x2="410" y2="480" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="480" y1="280" x2="480" y2="480" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
  <!-- Slightly rotated rectangles - ring 2 -->
  <rect x="170" y="180" width="55" height="55" fill="#1D3557" opacity="0.65" transform="rotate(5,197,207)"/>
  <rect x="310" y="170" width="55" height="55" fill="#E63946" opacity="0.6" transform="rotate(-3,337,197)"/>
  <rect x="450" y="175" width="55" height="55" fill="#F4D35E" opacity="0.65" transform="rotate(7,477,202)"/>
  <rect x="170" y="380" width="55" height="55" fill="#E76F51" opacity="0.6" transform="rotate(-8,197,407)"/>
  <rect x="490" y="310" width="55" height="55" fill="#1D3557" opacity="0.6" transform="rotate(10,517,337)"/>
  <rect x="490" y="400" width="55" height="55" fill="#E63946" opacity="0.6" transform="rotate(-6,517,427)"/>
  <rect x="175" y="490" width="55" height="55" fill="#F4D35E" opacity="0.6" transform="rotate(8,202,517)"/>
  <rect x="350" y="500" width="55" height="55" fill="#1D3557" opacity="0.6" transform="rotate(-5,377,527)"/>
  <rect x="490" y="490" width="55" height="55" fill="#E76F51" opacity="0.55" transform="rotate(12,517,517)"/>
  <!-- Fragmenting grid lines - ring 2 -->
  <line x1="160" y1="170" x2="520" y2="170" stroke="#000000" stroke-width="1" opacity="0.3" transform="rotate(2,340,170)"/>
  <line x1="160" y1="550" x2="530" y2="550" stroke="#000000" stroke-width="1" opacity="0.3" transform="rotate(-2,345,550)"/>
  <line x1="160" y1="170" x2="160" y2="560" stroke="#000000" stroke-width="1" opacity="0.3" transform="rotate(3,160,365)"/>
  <line x1="550" y1="170" x2="550" y2="560" stroke="#000000" stroke-width="1" opacity="0.3" transform="rotate(-3,550,365)"/>
  <!-- More rotated/scattered shapes - outer ring -->
  <rect x="50" y="80" width="50" height="50" fill="#E63946" opacity="0.5" transform="rotate(20,75,105)"/>
  <rect x="600" y="60" width="50" height="50" fill="#1D3557" opacity="0.45" transform="rotate(-25,625,85)"/>
  <rect x="680" y="250" width="48" height="48" fill="#F4D35E" opacity="0.5" transform="rotate(30,704,274)"/>
  <rect x="30" y="350" width="48" height="48" fill="#F4D35E" opacity="0.45" transform="rotate(-18,54,374)"/>
  <rect x="70" y="600" width="50" height="50" fill="#1D3557" opacity="0.5" transform="rotate(35,95,625)"/>
  <rect x="350" y="680" width="50" height="50" fill="#E63946" opacity="0.45" transform="rotate(-30,375,705)"/>
  <rect x="650" y="600" width="50" height="50" fill="#F4D35E" opacity="0.5" transform="rotate(40,675,625)"/>
  <rect x="700" y="450" width="45" height="45" fill="#E63946" opacity="0.4" transform="rotate(-35,722,472)"/>
  <rect x="30" y="200" width="45" height="45" fill="#2A9D8F" opacity="0.5" transform="rotate(15,52,222)"/>
  <!-- Teal circles in broken sections -->
  <circle cx="100" cy="130" r="18" fill="#2A9D8F" opacity="0.65"/>
  <circle cx="680" cy="150" r="15" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="720" cy="550" r="20" fill="#2A9D8F" opacity="0.55"/>
  <circle cx="80" cy="500" r="16" fill="#2A9D8F" opacity="0.6"/>
  <circle cx="200" cy="700" r="18" fill="#2A9D8F" opacity="0.55"/>
  <circle cx="600" cy="720" r="14" fill="#2A9D8F" opacity="0.5"/>
  <!-- Fragmented outer grid lines -->
  <line x1="20" y1="60" x2="180" y2="60" stroke="#000000" stroke-width="1" opacity="0.15" transform="rotate(8,100,60)"/>
  <line x1="600" y1="40" x2="780" y2="40" stroke="#000000" stroke-width="1" opacity="0.15" transform="rotate(-10,690,40)"/>
  <line x1="20" y1="740" x2="200" y2="740" stroke="#000000" stroke-width="1" opacity="0.12" transform="rotate(12,110,740)"/>
  <line x1="620" y1="750" x2="780" y2="750" stroke="#000000" stroke-width="1" opacity="0.12" transform="rotate(-8,700,750)"/>
  <!-- Corner accent squares -->
  <rect x="5" y="5" width="12" height="12" fill="#000000" opacity="0.5" transform="rotate(15,11,11)"/>
  <rect x="783" y="5" width="12" height="12" fill="#000000" opacity="0.5" transform="rotate(-20,789,11)"/>
  <rect x="5" y="783" width="12" height="12" fill="#000000" opacity="0.5" transform="rotate(25,11,789)"/>
  <rect x="783" y="783" width="12" height="12" fill="#000000" opacity="0.5" transform="rotate(-30,789,789)"/>
</svg>