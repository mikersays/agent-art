<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>

  <!-- Main grid lines - thick black dividers -->
  <line x1="0" y1="180" x2="800" y2="180" stroke="#000000" stroke-width="10"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="#000000" stroke-width="10"/>
  <line x1="0" y1="620" x2="800" y2="620" stroke="#000000" stroke-width="10"/>
  <line x1="220" y1="0" x2="220" y2="800" stroke="#000000" stroke-width="10"/>
  <line x1="520" y1="0" x2="520" y2="800" stroke="#000000" stroke-width="10"/>
  <line x1="680" y1="180" x2="680" y2="620" stroke="#000000" stroke-width="10"/>
  <line x1="360" y1="420" x2="360" y2="800" stroke="#000000" stroke-width="10"/>
  <line x1="220" y1="300" x2="520" y2="300" stroke="#000000" stroke-width="10"/>

  <!-- Filled rectangles -->
  <!-- Top row -->
  <rect x="5" y="5" width="210" height="170" fill="#E63946"/>
  <rect x="225" y="5" width="290" height="170" fill="#1D3557"/>
  <rect x="525" y="5" width="270" height="170" fill="#FEFAE0"/>

  <!-- Middle sections -->
  <rect x="5" y="185" width="210" height="230" fill="#F4D35E"/>
  <rect x="225" y="185" width="290" height="110" fill="#FEFAE0"/>
  <rect x="225" y="305" width="290" height="110" fill="#E63946"/>
  <rect x="525" y="185" width="150" height="230" fill="#2A9D8F"/>
  <rect x="680" y="185" width="115" height="230" fill="#1D3557"/>

  <!-- Lower middle -->
  <rect x="5" y="425" width="210" height="190" fill="#1D3557"/>
  <rect x="225" y="425" width="130" height="190" fill="#FEFAE0"/>
  <rect x="360" y="425" width="155" height="190" fill="#F4D35E"/>
  <rect x="525" y="425" width="150" height="190" fill="#E63946"/>
  <rect x="680" y="425" width="115" height="190" fill="#FEFAE0"/>

  <!-- Bottom row -->
  <rect x="5" y="625" width="210" height="170" fill="#FEFAE0"/>
  <rect x="225" y="625" width="130" height="170" fill="#E63946"/>
  <rect x="360" y="625" width="155" height="170" fill="#1D3557"/>
  <rect x="525" y="625" width="270" height="170" fill="#F4D35E"/>

  <!-- Small accent rectangles within cells -->
  <rect x="30" y="30" width="60" height="60" fill="#000000" opacity="0.12"/>
  <rect x="560" y="30" width="80" height="40" fill="#000000" opacity="0.10"/>
  <rect x="40" y="460" width="100" height="20" fill="#F4D35E" opacity="0.6"/>
  <rect x="260" y="450" width="50" height="50" fill="#000000" opacity="0.10"/>
  <rect x="390" y="650" width="80" height="30" fill="#FFFFFF" opacity="0.4"/>

  <!-- Outer border -->
  <rect x="0" y="0" width="800" height="800" fill="none" stroke="#000000" stroke-width="10"/>
</svg>
