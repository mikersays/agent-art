  <circle cx="450" cy="587" r="7" fill="#FEFAE0"/>
  <circle cx="300" cy="731" r="9" fill="#FEFAE0"/>
  <!-- Thin vertical accent lines -->
  <line x1="160" y1="20" x2="160" y2="780" stroke="#000000" stroke-width="0.8" opacity="0.15"/>
  <line x1="350" y1="20" x2="350" y2="780" stroke="#000000" stroke-width="0.8" opacity="0.15"/>
  <line x1="540" y1="20" x2="540" y2="780" stroke="#000000" stroke-width="0.8" opacity="0.15"/>
  <line x1="680" y1="20" x2="680" y2="780" stroke="#000000" stroke-width="0.8" opacity="0.15"/>
