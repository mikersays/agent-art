  <rect x="150" y="580" width="600" height="15" fill="#E63946" opacity="0.7"/>
  <rect x="50" y="625" width="300" height="26" fill="#1D3557" opacity="0.85"/>
  <rect x="400" y="620" width="350" height="20" fill="#2A9D8F" opacity="0.75"/>
