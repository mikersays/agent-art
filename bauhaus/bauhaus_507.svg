  <rect x="30" y="765" width="450" height="18" fill="#1D3557" opacity="0.7"/>
  <!-- White circular cutouts on bars -->
  <circle cx="250" cy="39" r="8" fill="#FEFAE0"/>
  <circle cx="350" cy="117" r="11" fill="#FEFAE0"/>
  <circle cx="500" cy="210" r="13" fill="#FEFAE0"/>
  <circle cx="380" cy="359" r="12" fill="#FEFAE0"/>
  <circle cx="600" cy="445" r="10" fill="#FEFAE0"/>
