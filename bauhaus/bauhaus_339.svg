<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#FEFAE0"/>
  <!-- Black ground line -->
  <line x1="50" y1="750" x2="750" y2="750" stroke="#000000" stroke-width="3"/>
  <!-- Thin orange diagonal lines suggesting motion paths -->
  <line x1="300" y1="60" x2="320" y2="250" stroke="#E76F51" stroke-width="1" opacity="0.4"/>
  <line x1="550" y1="80" x2="530" y2="300" stroke="#E76F51" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="200" x2="230" y2="500" stroke="#E76F51" stroke-width="1" opacity="0.35"/>
  <line x1="600" y1="150" x2="580" y2="550" stroke="#E76F51" stroke-width="1" opacity="0.35"/>
  <line x1="400" y1="100" x2="420" y2="600" stroke="#E76F51" stroke-width="1" opacity="0.3"/>
  <line x1="150" y1="350" x2="200" y2="700" stroke="#E76F51" stroke-width="1" opacity="0.3"/>
  <line x1="680" y1="300" x2="650" y2="720" stroke="#E76F51" stroke-width="1" opacity="0.3"/>
  <!-- TOP: 2-3 shapes, widely spaced, slight rotation -->
  <rect x="280" y="60" width="45" height="35" fill="#E63946" opacity="0.9" transform="rotate(5, 302, 77)"/>
  <circle cx="550" cy="90" r="22" fill="#F4D35E" opacity="0.85"/>
  <polygon points="180,120 200,80 220,120" fill="#E63946" opacity="0.8" transform="rotate(8, 200, 100)"/>
  <!-- MIDDLE: 5-6 shapes, closer together, more rotation -->
  <rect x="350" y="260" width="55" height="40" fill="#1D3557" opacity="0.85" transform="rotate(15, 377, 280)"/>
  <circle cx="480" cy="310" r="28" fill="#2A9D8F" opacity="0.8"/>
  <polygon points="220,330 250,280 280,330" fill="#1D3557" opacity="0.85" transform="rotate(20, 250, 305)"/>
  <rect x="560" y="290" width="40" height="50" fill="#2A9D8F" opacity="0.75" transform="rotate(25, 580, 315)"/>
  <circle cx="150" cy="350" r="20" fill="#457B9D" opacity="0.8"/>
  <rect x="650" y="340" width="35" height="45" fill="#1D3557" opacity="0.7" transform="rotate(18, 667, 362)"/>
  <!-- BOTTOM: 10+ shapes, overlapping, heavy rotation, all colors -->
  <rect x="100" y="500" width="60" height="45" fill="#E63946" opacity="0.85" transform="rotate(30, 130, 522)"/>
  <circle cx="200" cy="560" r="30" fill="#F4D35E" opacity="0.8"/>
  <polygon points="280,600 320,540 360,600" fill="#1D3557" opacity="0.8" transform="rotate(35, 320, 570)"/>
  <rect x="340" y="530" width="50" height="60" fill="#2A9D8F" opacity="0.75" transform="rotate(40, 365, 560)"/>
  <circle cx="450" cy="580" r="25" fill="#E76F51" opacity="0.85"/>
  <rect x="490" y="550" width="55" height="40" fill="#E63946" opacity="0.7" transform="rotate(45, 517, 570)"/>
  <polygon points="580,620 610,560 640,620" fill="#F4D35E" opacity="0.8" transform="rotate(50, 610, 590)"/>
  <circle cx="680" cy="570" r="22" fill="#1D3557" opacity="0.85"/>
  <rect x="120" y="640" width="45" height="55" fill="#457B9D" opacity="0.75" transform="rotate(55, 142, 667)"/>
  <polygon points="230,700 260,650 290,700" fill="#E76F51" opacity="0.8" transform="rotate(38, 260, 675)"/>
  <circle cx="370" cy="680" r="28" fill="#E63946" opacity="0.8"/>
  <rect x="420" y="660" width="50" height="40" fill="#F4D35E" opacity="0.75" transform="rotate(60, 445, 680)"/>
  <polygon points="530,720 560,660 590,720" fill="#2A9D8F" opacity="0.8" transform="rotate(42, 560, 690)"/>
  <circle cx="650" cy="690" r="20" fill="#DDA15E" opacity="0.85"/>
  <rect x="690" y="650" width="40" height="50" fill="#6D2E46" opacity="0.7" transform="rotate(65, 710, 675)"/>
</svg>